<style>

@keyframes patternDrift{from{background-position:0 0}to{background-position:180px 180px}}

header{position:relative;z-index:10;text-align:center;padding:14px 20px 10px;background:rgba(255,255,255,0.18);backdrop-filter:blur(12px);border-bottom:2px solid rgba(255,255,255,0.35)}
header h1{font-size:1.4rem;font-weight:900;color:#fff;text-shadow:2px 2px 6px rgba(0,0,0,0.35)}

#quiz-container{position:relative;z-index:1;max-width:840px;margin:0 auto;padding:20px 16px 30px;display:flex;flex-direction:column;gap:18px}

.section-header .sh-title{font-size:1.05rem;font-weight:900;text-shadow:1px 1px 3px rgba(0,0,0,0.3)}
.section-header .sh-inst{font-size:0.82rem;font-weight:600;opacity:0.97;margin-top:5px;font-style:italic;line-height:1.5}
.q-card{background:rgba(255,255,255,0.94);backdrop-filter:blur(10px);border-radius:22px;padding:22px 24px;box-shadow:0 8px 32px rgba(0,0,0,0.12);border:2px solid rgba(255,255,255,0.7);transition:transform .2s ease}

.q-block{background:#f8f5ff;border-radius:12px;padding:13px 16px;margin-bottom:14px;font-size:0.97rem;line-height:1.75;color:#2d3436;border-left:4px solid #8854C0}

.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.opt-btn{display:flex;align-items:center;gap:10px;padding:12px 15px;background:#fff;border:2.5px solid #e0e0e0;border-radius:16px;cursor:pointer;transition:all .18s ease;font-family:'Nunito',sans-serif;font-size:1.08rem;font-weight:600;color:#2d3436;text-align:left;box-shadow:0 4px 0 #d0d0d0;position:relative}

.expl-box{display:none;margin-top:16px;background:linear-gradient(135deg,#f2ebff,#e6faf6);border-radius:15px;padding:16px 18px;font-size:1rem;line-height:1.75;color:#2d3436;border-left:5px solid #8854C0;animation:fadeUp .4s ease}

@keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
.sign-wrap{display:flex;justify-content:center;margin-bottom:16px}
.trash-sign{border:3px solid #222;border-radius:8px;padding:12px 18px 12px 14px;background:#fff;display:flex;align-items:center;gap:14px;box-shadow:4px 4px 0 #ccc;max-width:300px}
.sign-svgs{display:flex;flex-direction:column;gap:6px;align-items:center}
.sign-label{font-weight:900;font-size:1.1rem;line-height:1.45;color:#111;text-align:center}
.notice-box-wrap{display:flex;justify-content:center;margin-bottom:16px}
.notice-box{border:3px solid #222;border-radius:6px;padding:16px 22px;background:#fff;font-size:1.05rem;font-weight:800;color:#111;text-align:center;box-shadow:4px 4px 0 #ccc;max-width:420px;line-height:1.6}
.convo-box{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:14px;border:2px solid #e0e0e0;font-size:1rem;line-height:1.7}
.convo-box b{color:#8854C0}
#submit-area{position:relative;z-index:1;text-align:center;padding:16px 20px 44px}
#submit-btn{font-family:'Nunito',sans-serif;font-size:1.25rem;font-weight:900;padding:16px 50px;background:linear-gradient(135deg,#8854C0,#6C63FF);color:#fff;border:none;border-radius:22px;cursor:pointer;box-shadow:0 7px 0 #5c3896;transition:all .2s ease;letter-spacing:.5px}
#submit-btn:hover{transform:translateY(-3px);box-shadow:0 10px 0 #5c3896}
#submit-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #5c3896}
#result-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);z-index:10000;align-items:center;justify-content:center}
#result-overlay.show{display:flex}
#result-popup{background:#fff;border-radius:26px;padding:38px 40px 34px;text-align:center;max-width:460px;width:92%;box-shadow:0 22px 65px rgba(0,0,0,0.35);animation:popIn .45s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popIn{from{transform:scale(.65);opacity:0}to{transform:scale(1);opacity:1}}
#res-emoji{font-size:4.5rem;margin-bottom:6px}

#retry-btn:hover{transform:translateY(-2px);box-shadow:0 7px 0 #007a62}

<body>
<div class="bg-pattern"></div>
<div id="confetti-container"></div>

<header>
  <h1>🌟 ENGLISH TEST — Mã đề 901</h1>
  <p>Giáo viên: Ms Mai An ULIS</p>
</header>

<div id="score-bar">
  <span id="score-text">⭐ 0 / 20</span>
  <div id="progress-bg"><div id="progress-fill"></div></div>
  <span id="answered-count">0 / 20 câu</span>
</div>

<div id="quiz-container"></div>

<div id="submit-area">
  <button id="submit-btn" onclick="submitQuiz()">📝 Nộp Bài &amp; Xem Điểm</button>
</div>

<div id="result-overlay">
  <div id="result-popup">
    <div id="res-emoji">🏆</div>
    <div id="res-title">Kết Quả Bài Thi</div>
    <div id="res-score"></div>
    <div id="res-pct"></div>
    <div id="res-msg"></div>
    <button id="retry-btn" onclick="retryQuiz()">🔄 Làm Lại Từ Đầu</button>
  </div>
</div>

<script>
// ─── Audio Engine ──────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx = null;
function getCtx(){if(!ctx)ctx=new AudioCtx();return ctx;}

function playCorrect(){
  try{
    const c=getCtx();
    const freqs=[523,659,784,1047];
    freqs.forEach((f,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,c.currentTime+i*.08);
      g.gain.linearRampToValueAtTime(0.18,c.currentTime+i*.08+.04);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*.08+.28);
      o.start(c.currentTime+i*.08);o.stop(c.currentTime+i*.08+.3);
    });
  }catch(e){}
}

function playWrong(){
  try{
    const c=getCtx();
    [[200,0],[160,.15],[130,.3]].forEach(([f,t])=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type='sawtooth';o.frequency.value=f;
      g.gain.setValueAtTime(0,c.currentTime+t);
      g.gain.linearRampToValueAtTime(0.14,c.currentTime+t+.04);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+.22);
      o.start(c.currentTime+t);o.stop(c.currentTime+t+.25);
    });
  }catch(e){}
}

// ─── Confetti ──────────────────────────────────────────────────
function boom(x,y){
  const container=document.getElementById('confetti-container');
  const colors=['#FF4757','#FDCB6E','#00D26A','#8854C0','#00C9A7','#FF6B9D','#6C63FF'];
  for(let i=0;i<55;i++){
    const p=document.createElement('div');
    p.className='cp';
    p.style.cssText=`left:${x+Math.random()*120-60}px;top:${y-10}px;background:${colors[i%colors.length]};width:${8+Math.random()*8}px;height:${8+Math.random()*6}px;animation-duration:${0.9+Math.random()*1.2}s;border-radius:${Math.random()>0.5?'50%':'3px'}`;
    container.appendChild(p);
    setTimeout(()=>p.remove(),(2200));
  }
}

// ─── State ─────────────────────────────────────────────────────
const state={answered:{},score:0,total:20};

function shuffleArr(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

// ─── Questions Data ────────────────────────────────────────────
const sections=[
  {
    id:'s1',
    title:'🔊 PHẦN I: TRỌNG ÂM (STRESS)',
    instruction:'Mark the letter A, B, C, or D on your answer sheet to indicate the word that differs from the other three in the position of primary stress in each of the following questions.',
    questions:[
      {
        id:'q1',
        qnum:'Question 1',
        qhtml:'Question 1.',
        opts:[{id:'A',html:'authentic'},{id:'B',html:'luxurious'},{id:'C',html:'electric'},{id:'D',html:'various'}],
        correct:'D',
        expl:`<strong>🎯 Đáp án đúng: D. various</strong><br><br>
<strong>📖 Phân tích vị trí trọng âm từng đáp án:</strong><br>
• A. <b>au·THEN·tic</b> /ɔːˈθentɪk/ — Trọng âm rơi vào âm tiết thứ <b>2</b> (THEN)<br>
• B. <b>lux·U·ri·ous</b> /lʌɡˈʒʊəriəs/ — Trọng âm rơi vào âm tiết thứ <b>2</b> (XU)<br>
• C. <b>e·LEC·tric</b> /ɪˈlektrɪk/ — Trọng âm rơi vào âm tiết thứ <b>2</b> (LEC)<br>
• D. <b>VA·ri·ous</b> /ˈveəriəs/ — Trọng âm rơi vào âm tiết thứ <b>1</b> (VA)<br><br>
<strong>💡 Kết luận:</strong> Các từ A (<em>authentic</em>), B (<em>luxurious</em>), C (<em>electric</em>) đều nhấn trọng âm vào âm tiết thứ <b>2</b>. Riêng D. <em>various</em> nhấn trọng âm vào âm tiết thứ <b>1</b> → D là từ <b>khác biệt</b>.<br><br>
📝 <em>Dịch nghĩa: authentic = xác thực/thật sự; luxurious = xa hoa/sang trọng; electric = điện/điện khí; various = nhiều loại/đa dạng.</em>`
      },
      {
        id:'q2',
        qnum:'Question 2',
        qhtml:'Question 2.',
        opts:[{id:'A',html:'diversity'},{id:'B',html:'activity'},{id:'C',html:'hilarious'},{id:'D',html:'destination'}],
        correct:'D',
        expl:`<strong>🎯 Đáp án đúng: D. destination</strong><br><br>
<strong>📖 Phân tích vị trí trọng âm từng đáp án:</strong><br>
• A. <b>di·VER·si·ty</b> /daɪˈvɜːrsɪti/ — Trọng âm rơi vào âm tiết thứ <b>2</b> (VER)<br>
• B. <b>ac·TIV·i·ty</b> /ækˈtɪvɪti/ — Trọng âm rơi vào âm tiết thứ <b>2</b> (TIV)<br>
• C. <b>hi·LAR·i·ous</b> /hɪˈleəriəs/ — Trọng âm rơi vào âm tiết thứ <b>2</b> (LAR)<br>
• D. <b>des·ti·NA·tion</b> /ˌdestɪˈneɪʃn/ — Trọng âm rơi vào âm tiết thứ <b>3</b> (NA)<br><br>
<strong>💡 Kết luận:</strong> A, B, C đều nhấn trọng âm âm tiết thứ <b>2</b>. D. <em>destination</em> nhấn trọng âm âm tiết thứ <b>3</b> → D là từ <b>khác biệt</b>.<br><br>
📝 <em>Dịch nghĩa: diversity = sự đa dạng; activity = hoạt động; hilarious = rất buồn cười; destination = điểm đến.</em>`
      }
    ]
  },
  {
    id:'s2',
    title:'📝 PHẦN II: NGỮ PHÁP & TỪ VỰNG',
    instruction:'Mark the letter A, B, C, or D on your answer sheet to indicate the correct answer to each of the following questions.',
    questions:[
      {
        id:'q3',
        qnum:'Question 3',
        qhtml:'The tour included a ____________ hike through the rainforest.',
        opts:[{id:'A',html:'two-hour'},{id:'B',html:'two hours'},{id:'C',html:"two-hours'"},{id:'D',html:'two-hours'}],
        correct:'A',
        expl:`<strong>🎯 Đáp án đúng: A. two-hour</strong><br><br>
<strong>📖 Phân tích 4 đáp án:</strong><br>
• A. <b>two-hour</b> (tính từ ghép có gạch nối, dạng số ít): hai tiếng / hai giờ → <b>ĐÚNG</b><br>
• B. <b>two hours</b> (cụm danh từ, không nối gạch): sai vì không thể dùng danh từ số nhiều trực tiếp bổ nghĩa cho danh từ khác<br>
• C. <b>two-hours'</b> (dạng sở hữu cách): sai cấu trúc<br>
• D. <b>two-hours</b> (sai vì tính từ ghép trước danh từ phải dùng số ít + gạch nối)<br><br>
<strong>💡 Quy tắc ngữ pháp:</strong> Khi tính từ ghép chỉ số lượng đứng <em>trước danh từ</em>, danh từ trong tính từ đó phải ở <b>dạng số ít</b> và có <b>gạch nối</b>: <em>a two-hour hike</em> (không phải "two-hours"). So sánh: <em>a five-minute break, a ten-kilometer race.</em><br><br>
📝 <em>Dịch câu: "Chuyến du lịch bao gồm một chuyến đi bộ <b>hai giờ</b> xuyên rừng nhiệt đới."</em>`
      },
      {
        id:'q4',
        qnum:'Question 4',
        qhtml:"I'm sure you will be amazed by the ____________ of the Atacama Desert.",
        opts:[{id:'A',html:'landscape'},{id:'B',html:'land'},{id:'C',html:'backdrop'},{id:'D',html:'territory'}],
        correct:'A',
        expl:`<strong>🎯 Đáp án đúng: A. landscape</strong><br><br>
<strong>📖 Phân tích 4 đáp án:</strong><br>
• A. <b>landscape</b> (n): phong cảnh, cảnh quan thiên nhiên → ĐÚNG — phù hợp khi nói về vẻ đẹp thiên nhiên đặc sắc của sa mạc<br>
• B. <b>land</b> (n): đất, vùng đất → quá chung chung, không mang sắc thái "ngạc nhiên/ấn tượng"<br>
• C. <b>backdrop</b> (n): phông nền, cảnh nền → thường dùng cho phim ảnh/sân khấu, không tự nhiên khi nói về sa mạc<br>
• D. <b>territory</b> (n): lãnh thổ, vùng đất → mang nghĩa chính trị/địa lý, không diễn đạt vẻ đẹp thiên nhiên<br><br>
<strong>💡 Collocation:</strong> <em>be amazed by the landscape</em> = bị choáng ngợp bởi phong cảnh → đây là cách diễn đạt tự nhiên và chuẩn xác nhất.<br><br>
📝 <em>Dịch câu: "Tôi chắc chắn bạn sẽ kinh ngạc trước <b>phong cảnh</b> của Sa mạc Atacama."</em>`
      },
      {
        id:'q5',
        qnum:'Question 5',
        qhtml:'The children ____________ attend that English school receive good education.',
        opts:[{id:'A',html:'which'},{id:'B',html:'whose'},{id:'C',html:'who'},{id:'D',html:'whom'}],
        correct:'C',
        expl:`<strong>🎯 Đáp án đúng: C. who</strong><br><br>
<strong>📖 Phân tích 4 đáp án (đại từ quan hệ):</strong><br>

// ─── Render ────────────────────────────────────────────────────
let shuffledOpts = {};

function renderAll(){
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  sections.forEach(sec=>{
    // Section header
    const sh = document.createElement('div');
    sh.className = 'section-header';
    sh.innerHTML = `<div class="sh-title">${sec.title}</div><div class="sh-inst">${sec.instruction}</div>`;
    container.appendChild(sh);

    sec.questions.forEach(q=>{
      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = 'card-'+q.id;

      const opts = shuffleArr(q.opts);
      shuffledOpts[q.id] = opts;

      // Sign HTML
      let signHtml = '';
      if(q.signType === 'trash'){
        signHtml = `<div class="sign-wrap">
          <div class="trash-sign">

              <svg width="52" height="52" viewBox="0 0 52 52">

                <rect x="10" y="16" width="32" height="5" rx="2" fill="#555"/>
                <rect x="19" y="10" width="14" height="7" rx="2" fill="#555"/>
                <line x1="20" y1="24" x2="20" y2="38" stroke="white" stroke-width="2"/>

                <line x1="26" y1="20" x2="14" y2="28" stroke="#27AE60" stroke-width="3" stroke-linecap="round"/>
                <line x1="26" y1="20" x2="38" y2="26" stroke="#27AE60" stroke-width="3" stroke-linecap="round"/>
                <line x1="26" y1="32" x2="20" y2="46" stroke="#27AE60" stroke-width="3" stroke-linecap="round"/>
                <line x1="26" y1="32" x2="32" y2="46" stroke="#27AE60" stroke-width="3" stroke-linecap="round"/>

// ─── Select Answer ─────────────────────────────────────────────
function selectAnswer(qId, chosen, evt){
  if(state.answered[qId]) return;
  state.answered[qId] = chosen;

  // Get correct
  let correct = '';
  sections.forEach(s=>s.questions.forEach(q=>{ if(q.id===qId) correct=q.correct; }));

  const opts = shuffledOpts[qId];
  opts.forEach(o=>{
    const btn = document.getElementById(`opt-${qId}-${o.id}`);
    btn.disabled = true;
    if(o.id === correct && o.id !== chosen){
      btn.classList.add('reveal');
    }
  });

  const chosenBtn = document.getElementById(`opt-${qId}-${chosen}`);
  if(chosen === correct){
    chosenBtn.classList.add('correct');
    playCorrect();
    const rect = chosenBtn.getBoundingClientRect();
    boom(rect.left + rect.width/2, rect.top + window.scrollY);
    state.score++;
  } else {
    chosenBtn.classList.add('wrong');
    playWrong();
  }

  // Show explanation
  const expl = document.getElementById(`expl-${qId}`);
  expl.classList.add('show');
  expl.scrollIntoView({behavior:'smooth', block:'nearest'});

  updateHUD();
}

function updateHUD(){
  const total = state.total;
  const done = Object.keys(state.answered).length;
  const score = state.score;
  document.getElementById('score-text').textContent = `⭐ ${score} / ${total}`;
  document.getElementById('answered-count').textContent = `${done} / ${total} câu`;
  document.getElementById('progress-fill').style.width = `${(done/total)*100}%`;
}

// ─── Submit ────────────────────────────────────────────────────
function submitQuiz(){
  const total = state.total;
  const score = state.score;
  const pct = Math.round((score/total)*100);

  let emoji, title, msg;
  if(pct === 100){
    emoji='🏆';title='XUẤT SẮC!';
    msg='Hoàn hảo tuyệt đối! Em thật sự giỏi, cô rất tự hào về em! 🌟🌟🌟';
  } else if(pct>=85){
    emoji='🥇';title='Rất Giỏi!';
    msg='Tuyệt vời! Em làm bài rất xuất sắc. Hãy ôn thêm một chút nữa là hoàn hảo! 💪';
  } else if(pct>=70){
    emoji='🎉';title='Khá Tốt!';
    msg='Kết quả khá tốt! Em đã nắm được nhiều kiến thức. Cố gắng thêm nhé! 😊';
  } else if(pct>=50){
    emoji='📚';title='Cố Lên!';
    msg='Còn một số điểm cần ôn tập thêm. Hãy xem lại phần giải thích và thử lại nhé! 🌈';
  } else {
    emoji='💡';title='Tiếp Tục Học!';
    msg='Đừng nản lòng! Học thêm, luyện thêm và em sẽ tiến bộ rất nhiều! 🚀';
  }

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-score').textContent = `${score} / ${total}`;
  document.getElementById('res-pct').textContent = `Tỉ lệ đúng: ${pct}%`;
  document.getElementById('res-msg').textContent = msg;

  document.getElementById('result-overlay').classList.add('show');

  if(score >= Math.floor(total*0.7)){
    setTimeout(()=>{
      for(let i=0;i<8;i++) setTimeout(()=>boom(Math.random()*window.innerWidth, Math.random()*window.innerHeight*0.5), i*180);
    }, 300);
  }
}

function retryQuiz(){
  state.answered = {};
  state.score = 0;
  document.getElementById('result-overlay').classList.remove('show');
  shuffledOpts = {};
  renderAll();
  updateHUD();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ─── Init ──────────────────────────────────────────────────────
renderAll();
updateHUD();
</script>
