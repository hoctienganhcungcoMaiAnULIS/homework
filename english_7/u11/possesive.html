    <style>
        :root {

            --secondary-bg: #FECFEF;

        @keyframes gradientShift {

        body {

        }

        .floating-icon {
            position: absolute;
            font-size: 2.5rem;
            animation: floatUp linear infinite;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.1));
        }

        header {

<script>
// --- AUDIO SYSTEM (Web Audio API) - Tự sinh âm thanh không cần link ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playDing() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, audioCtx.currentTime); // Nốt A5
    osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1); // Vuốt lên A6
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
}

function playBuzz() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
}

// --- CONFETTI SYSTEM ---
function createConfetti() {
    const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#ff69b4', '#a29bfe'];
    for(let i=0; i<40; i++) {
        const conf = document.createElement('div');
        conf.classList.add('confetti');
        conf.style.left = Math.random() * 100 + 'vw';
        conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        conf.style.top = '-10px';
        document.body.appendChild(conf);
        
        let x = (Math.random() - 0.5) * 12;
        let y = Math.random() * 6 + 3;
        let rot = Math.random() * 360;
        
        const anim = setInterval(() => {
            let currentTop = parseFloat(conf.style.top);
            let currentLeft = parseFloat(conf.style.left);
            conf.style.top = (currentTop + y) + 'px';
            conf.style.left = (currentLeft + x) + 'px';
            conf.style.transform = `rotate(${rot}deg)`;
            rot += 8;
            if(currentTop > window.innerHeight) {
                clearInterval(anim);
                conf.remove();
            }
        }, 20);
    }
}

// --- FLOATING BACKGROUND ICONS ---
const bgIcons = ['🎈', '🌈', '🍭', '🍓', '🍀', '🐥', '🌟', '🦄'];
const bgContainer = document.getElementById('floatingBg');
for(let i=0; i<15; i++) {
    const icon = document.createElement('div');
    icon.classList.add('floating-icon');
    icon.innerText = bgIcons[Math.floor(Math.random() * bgIcons.length)];
    icon.style.left = Math.random() * 100 + 'vw';
    icon.style.animationDuration = (Math.random() * 25 + 15) + 's';
    icon.style.animationDelay = (Math.random() * -30) + 's';
    bgContainer.appendChild(icon);
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// --- DATA SYSTEM (100% Giữ nguyên văn bản gốc + Giải thích siêu chi tiết) ---
const quizData = [
    // --- EXERCISE 2 ---
    {
        part: "Exercise 2: Circle the correct answer. (Khoanh tròn đáp án đúng)",
        q: "1. Please move to another table. This is (our/ ours) table.",
        opts: [
            { text: "our", isCorrect: true },
            { text: "ours", isCorrect: false },
            { text: "we", isCorrect: false },
            { text: "us", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Vui lòng chuyển sang bàn khác. Đây là bàn của chúng tôi.<br>
        <b>2. Phân tích các đáp án:</b><br>
        - A. our (Tính từ sở hữu - TTSH): của chúng tôi.<br>
        - B. ours (Đại từ sở hữu - ĐTSH): cái của chúng tôi.<br>
        - C. we (Đại từ nhân xưng): chúng tôi (làm Chủ ngữ).<br>
        - D. us (Tân ngữ): chúng tôi.<br>
        <b>3. Tại sao chọn 'our':</b> Phía sau chỗ trống có danh từ "table" (cái bàn). Theo quy tắc, ta cần một Tính từ sở hữu đứng trước để bổ nghĩa (our + Noun).<br>
        <b>4. Tại sao các đáp án khác sai:</b> 'ours' là Đại từ sở hữu, bản thân nó đã bằng "our + danh từ" rồi nên tuyệt đối không được đứng trước một danh từ khác nữa. 'we/us' không mang nghĩa sở hữu.`
    },
    {
        q: "2. The last decision will be (my/ mine).",
        opts: [
            { text: "mine", isCorrect: true },
            { text: "my", isCorrect: false },
            { text: "I", isCorrect: false },
            { text: "me", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Quyết định cuối cùng sẽ là của tôi.<br>
        <b>2. Phân tích:</b><br>
        - A. mine (ĐTSH): cái của tôi / quyết định của tôi.<br>
        - B. my (TTSH): của tôi.<br>
        - C. I (Chủ ngữ): tôi.<br>
        - D. me (Tân ngữ): tôi.<br>
        <b>3. Tại sao chọn 'mine':</b> Chỗ trống đứng cuối câu, không có danh từ nào theo sau. Ta cần một Đại từ sở hữu (mine) để thay thế cho cụm "my decision" đã được nhắc đến ở trước, tránh lặp từ.<br>
        <b>4. Tại sao sai:</b> 'my' bắt buộc phải có danh từ đi kèm ngay phía sau (Ví dụ: my decision). Ở đây không có danh từ nên 'my' là sai.`
    },
    {
        q: "3. My house is not as modern as (your/ yours) house.",
        opts: [
            { text: "your", isCorrect: true },
            { text: "yours", isCorrect: false },
            { text: "you", isCorrect: false },
            { text: "yours'", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Nhà của tôi không hiện đại bằng nhà của bạn.<br>
        <b>2. Phân tích:</b><br>
        - A. your (TTSH): của bạn.<br>
        - B. yours (ĐTSH): cái của bạn.<br>
        <b>3. Tại sao chọn 'your':</b> Ngay sau chỗ trống là danh từ "house". Quy tắc ngữ pháp cơ bản: Tính từ sở hữu + Danh từ -> "your house".<br>
        <b>4. Tại sao sai:</b> 'yours' đứng một mình, không bao giờ đi kèm danh từ phía sau. Nếu bỏ chữ 'house' ở cuối đi thì ta mới được chọn 'yours'.`
    },
    {
        q: "4. Jane's voice is good. (I/ mine) is good, too.",
        opts: [
            { text: "Mine", isCorrect: true },
            { text: "I", isCorrect: false },
            { text: "My", isCorrect: false },
            { text: "Me", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Giọng của Jane rất hay. Giọng của tôi cũng hay.<br>
        <b>2. Phân tích:</b><br>
        - A. Mine (ĐTSH): Cái của tôi.<br>
        - B. I (Chủ ngữ): Tôi.<br>
        - C. My (TTSH): Của tôi.<br>
        <b>3. Tại sao chọn 'Mine':</b> Chỗ trống đóng vai trò làm Chủ ngữ cho câu thứ hai. Tuy nhiên, nếu dịch là "Tôi cũng hay" (I is good) thì sai ngữ pháp và sai nghĩa. Ở đây đang so sánh 'giọng nói' (voice). Do đó ta dùng đại từ sở hữu "Mine" (thay cho 'My voice') để làm chủ ngữ.<br>
        <b>4. Tại sao sai:</b> 'I' đi với 'am', không đi với 'is'. 'My' thì thiếu mất danh từ phía sau.`
    },
    {
        q: "5. (My/ mine) cat is adorable. (Your/ Yours) is adorable too.",
        opts: [
            { text: "My / Yours", isCorrect: true },
            { text: "Mine / Your", isCorrect: false },
            { text: "My / Your", isCorrect: false },
            { text: "Mine / Yours", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Con mèo của tôi rất đáng yêu. Con của bạn cũng đáng yêu.<br>
        <b>2. Phân tích & Lựa chọn:</b><br>
        - <b>Chỗ trống 1:</b> Phía sau có danh từ "cat", do đó bắt buộc dùng Tính từ sở hữu -> <b>My</b>.<br>
        - <b>Chỗ trống 2:</b> Đóng vai trò làm chủ ngữ, phía sau KHÔNG CÓ danh từ (chỉ có động từ 'is'). Ta phải dùng Đại từ sở hữu thay thế cho 'Your cat' để tránh lặp từ -> <b>Yours</b>.<br>
        <b>3. Cấu trúc cần nhớ:</b> Tính từ sở hữu + Danh từ = Đại từ sở hữu (My cat = Mine; Your cat = Yours).<br>
        <b>4. Tại sao các đáp án khác sai:</b> Đảo lộn vị trí của TTSH (đứng một mình) và ĐTSH (đứng trước danh từ) là lỗi bẫy kinh điển nhất của dạng bài này.`
    },
    {
        q: "6. The dog wagged (his/ him) tail to show how happy he was.",
        opts: [
            { text: "his", isCorrect: true },
            { text: "him", isCorrect: false },
            { text: "he", isCorrect: false },
            { text: "its", isCorrect: false } // Đề bài cho his/him nên chỉ tập trung his/him
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Chú chó vẫy đuôi để thể hiện rằng cậu ấy đang rất vui.<br>
        <b>2. Phân tích:</b><br>
        - A. his (TTSH): của anh ấy / của nó.<br>
        - B. him (Tân ngữ): anh ấy (nhận hành động).<br>
        <b>3. Tại sao chọn 'his':</b> Phía sau chỗ trống có danh từ "tail" (cái đuôi). Cần một tính từ chỉ sự sở hữu -> cái đuôi của nó (chú chó này được nhân hóa gọi là 'he'). Ta chọn 'his' + tail.<br>
        <b>4. Tại sao sai:</b> 'him' là đại từ tân ngữ, không có chức năng chỉ sự sở hữu đứng trước danh từ.`
    },
    {
        q: "7. Please return (my/ mine) phone at once.",
        opts: [
            { text: "my", isCorrect: true },
            { text: "mine", isCorrect: false },
            { text: "I", isCorrect: false },
            { text: "me", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Làm ơn trả lại điện thoại của tôi ngay lập tức.<br>
        <b>2. Phân tích:</b><br>
        - A. my (TTSH): của tôi.<br>
        - B. mine (ĐTSH): cái của tôi.<br>
        <b>3. Tại sao chọn 'my':</b> Phía sau có danh từ "phone" (điện thoại). Rất đơn giản, áp dụng công thức: Tính từ sở hữu + Danh từ -> my phone.<br>
        <b>4. Tại sao sai:</b> 'mine' tuyệt đối không đi kèm danh từ phía sau. Đừng nhầm lẫn!`

        <b>4. Tại sao sai:</b> 'your' không bao giờ làm chủ ngữ nếu thiếu danh từ đi kèm. ("your is still working" là sai hoàn toàn).`
    },
    {
        q: "11. We moved into the new house several weeks ago, but we still don't have (we) _______ new house number.",
        opts: [
            { text: "our", isCorrect: true },
            { text: "ours", isCorrect: false },
            { text: "us", isCorrect: false },
            { text: "we", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Chúng tôi đã chuyển đến nhà mới vài tuần trước, nhưng chúng tôi vẫn chưa có số nhà mới của mình.<br>
        <b>2. Phân tích:</b> Phía sau chỗ trống là một cụm danh từ "new house number" (số nhà mới).<br>
        <b>3. Tại sao chọn 'our':</b> Cứ đứng trước Danh từ / Cụm danh từ để chỉ sự sở hữu thì dùng Tính từ sở hữu. Của đại từ 'We' là 'our'. -> our + new house number.<br>
        <b>4. Tại sao sai:</b> 'ours' là đại từ sở hữu đã bao hàm danh từ bên trong, không được đứng trước danh từ nữa.`
    },
    {
        q: "12. Oxford is famous for (it) _______ colleges.",
        opts: [
            { text: "its", isCorrect: true },
            { text: "it's", isCorrect: false },
            { text: "it", isCorrect: false },
            { text: "its'", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Oxford nổi tiếng vì các trường cao đẳng của nó.<br>
        <b>2. Phân tích:</b> Oxford là một danh từ chỉ tên địa danh (vật/sự vật), đại diện là đại từ "It". Phía sau chỗ trống có danh từ "colleges".<br>
        <b>3. Tại sao chọn 'its':</b> Cần tính từ sở hữu của 'It' đứng trước danh từ. Đó chính là 'its' (không phẩy).<br>
        <b>4. Tại sao sai:</b> Bẫy "it's" (nó là) cực kỳ quen thuộc. Nhắc lại: it's = it is. Đừng để bị lừa nhé!`
    },
    {
        q: "13. ESL printables is a nice site. Most teachers make (they) _______ worksheets.",
        opts: [
            { text: "their", isCorrect: true },
            { text: "theirs", isCorrect: false },
            { text: "them", isCorrect: false },
            { text: "they", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> ESL printables là một trang web hay. Hầu hết các giáo viên tạo ra các phiếu bài tập của họ (trên đó).<br>
        <b>2. Phân tích:</b> Sau chỗ trống là danh từ số nhiều "worksheets" (các phiếu bài tập).<br>
        <b>3. Tại sao chọn 'their':</b> Đứng trước danh từ, bổ nghĩa cho danh từ đó -> Tính từ sở hữu. Của 'they' (ám chỉ teachers) là 'their'. -> their worksheets.<br>
        <b>4. Tại sao sai:</b> 'theirs' không đứng trước danh từ. 'them' là tân ngữ, không chỉ sở hữu.`
    },
    {
        q: "14. Jessica has eaten her lunch already but I'm saving (I) _______ until later.",
        opts: [
            { text: "mine", isCorrect: true },
            { text: "my", isCorrect: false },
            { text: "me", isCorrect: false },
            { text: "I", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Jessica đã ăn xong bữa trưa của cô ấy rồi nhưng tôi đang cất phần của tôi cho đến lát nữa.<br>
        <b>2. Phân tích:</b> Đứng sau động từ "saving" (cất giữ), làm tân ngữ. Đằng sau không có danh từ.<br>
        <b>3. Tại sao chọn 'mine':</b> Ta cần một Đại từ sở hữu (mine) để thay thế cho cụm "my lunch" (bữa trưa của tôi).<br>
        <b>4. Tại sao sai:</b> Nếu dùng 'my', câu bị thiếu hụt danh từ (saving my.... cái gì?).`
    },
    {
        q: "15. It's not theirs. It's (we) _______. We bought it yesterday.",
        opts: [
            { text: "ours", isCorrect: true },
            { text: "our", isCorrect: false },
            { text: "us", isCorrect: false },
            { text: "we", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Nó không phải của họ. Nó là của chúng tôi. Chúng tôi đã mua nó ngày hôm qua.<br>
        <b>2. Phân tích:</b> Chữ "It's" (It is) đóng vai trò cấu trúc "Nó là...". Chỗ trống đứng ở cuối câu, đằng sau không có danh từ.<br>
        <b>3. Tại sao chọn 'ours':</b> Ta cần Đại từ sở hữu của 'we'. Thêm 's' vào tính từ sở hữu 'our' -> 'ours' (cái của chúng tôi).<br>
        <b>4. Tại sao sai:</b> 'our' là tính từ sở hữu, bắt buộc phải có danh từ theo sau (vd: It's our thing). Đứng bơ vơ một mình thì phải là 'ours'.`
    }
];

// --- QUIZ LOGIC CORE ---
let currentScore = 0;
let answeredQuestions = new Set();
const quizContainer = document.getElementById('quiz-container');

function renderQuiz() {
    let currentPart = "";
    
    quizData.forEach((item, index) => {
        // Group Header
        if (item.part && item.part !== currentPart) {
            const partEl = document.createElement('div');
            partEl.className = 'part-title';
            partEl.innerText = item.part;
            quizContainer.appendChild(partEl);
            currentPart = item.part;
        }

        const card = document.createElement('div');
        card.className = 'card';
        card.id = `q-card-${index}`;

        // Question Title
        const qTitle = document.createElement('div');
        qTitle.className = 'question-title';
        qTitle.innerHTML = item.q;
        card.appendChild(qTitle);

        const optionsGrid = document.createElement('div');
        optionsGrid.className = 'options-grid';

        // Xáo trộn đáp án
        const shuffledOpts = shuffleArray([...item.opts]);
        const letters = ['A', 'B', 'C', 'D'];

        shuffledOpts.forEach((opt, oIndex) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${letters[oIndex]}.</strong> ${opt.text}`;
            btn.onclick = () => handleAnswer(index, opt.isCorrect, btn, optionsGrid, item.exp);
            optionsGrid.appendChild(btn);
        });

        card.appendChild(optionsGrid);

        // Explanation Div
        const expDiv = document.createElement('div');
        expDiv.className = 'explanation';
        expDiv.id = `exp-${index}`;
        expDiv.innerHTML = `<h4>💡 GIẢI THÍCH CHI TIẾT:</h4><p>${item.exp}</p>`;
        card.appendChild(expDiv);

        quizContainer.appendChild(card);
    });
}

function handleAnswer(qIndex, isCorrect, btnElement, gridElement, explanationHtml) {
    if (answeredQuestions.has(qIndex)) return; 

    answeredQuestions.add(qIndex);
    document.getElementById('current-q').innerText = answeredQuestions.size;

    const allBtns = gridElement.querySelectorAll('.option-btn');
    allBtns.forEach(b => b.disabled = true); // Lock all options

    if (isCorrect) {
        btnElement.classList.add('correct');
        playDing();
        createConfetti();
        currentScore++;
        document.getElementById('score').innerText = currentScore;
    } else {
        btnElement.classList.add('wrong');
        playBuzz();
        // Highlight correct answer
        allBtns.forEach(b => {
            const btnText = b.innerText.substring(3).trim();
            const correctOpt = quizData[qIndex].opts.find(o => o.isCorrect).text;
            if (btnText === correctOpt) {
                b.style.border = "3px dashed var(--correct-color)";
                b.style.color = "var(--correct-color)";
                b.style.transform = "scale(1.02)";
            }
        });
    }

    // Hiển thị giải thích CHI TIẾT ngay lập tức sau khi bấm (Yêu cầu bắt buộc)
    const expDiv = document.getElementById(`exp-${qIndex}`);
    expDiv.style.display = 'block';
}

function showResults() {
    if (answeredQuestions.size < quizData.length) {
        alert("Bạn còn vài câu chưa làm xong kìa! Vuốt lên kiểm tra lại nhé! 🚀");
        return;
    }
    document.getElementById('popup').style.display = 'flex';
    document.getElementById('final-score').innerText = currentScore;
    
    let msg = "";
    if (currentScore === 30) msg = "Đỉnh của đỉnh! Chức vô địch Ngữ Pháp thuộc về bạn! 🌟🌟🌟";
    else if (currentScore >= 20) msg = "Quá giỏi! Nền tảng ngữ pháp của bạn rất chắc chắn! 👍";
    else msg = "Không sao đâu! Đọc kỹ phần giải thích chi tiết và làm lại lần nữa là nhớ ngay! ❤️";
    document.getElementById('feedback-msg').innerText = msg;
    createConfetti();
}

// Khởi chạy
renderQuiz();
</script>
