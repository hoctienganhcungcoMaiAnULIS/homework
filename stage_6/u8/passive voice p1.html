<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra Tiếng Anh - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #FDCB6E;
            --tertiary: #00C9A7;
            --correct: #00D26A;
            --wrong: #FF4757;
            --text-dark: #2d3436;
            --bg-card: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--tertiary), #ff9ff3);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: var(--text-dark);
            position: relative;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* SVG Pattern Floating Background */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' font-size='20'%3E🌟%3C/text%3E%3Ctext x='60' y='80' font-size='25'%3E☁️%3C/text%3E%3Ctext x='80' y='20' font-size='15'%3E🍎%3C/text%3E%3Ctext x='20' y='90' font-size='20'%3E🐱%3C/text%3E%3C/svg%3E");
            animation: floatPattern 40s linear infinite;
            opacity: 0.5;
        }

        @keyframes floatPattern {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
            margin-bottom: 30px;
            margin-top: 20px;
            border: 3px solid #fff;
        }

        .header h3 { font-size: 1.1rem; color: #636e72; margin-bottom: 5px; }
        .header h1 { font-size: 2rem; color: var(--primary); font-weight: 900; }

        .score-bar {
            background: #fff;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 5px 0 rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 30px;
            position: sticky;
            top: 10px;
            z-index: 10;
        }
        
        #score-display { color: var(--primary); font-size: 1.5rem; }

        .section-title {
            background: var(--text-dark);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            margin: 20px 0;
            font-size: 1.4rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 0 #dfe6e9;
            border: 3px solid #fff;
            transition: transform 0.2s;
        }
        
        .card:hover { transform: translateY(-2px); }

        .question-text {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.5;
            color: #2d3436;
        }

        /* Bài 1: Multiple Choice */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .option-btn {
            background: #f1f2f6;
            border: 3px solid #dfe6e9;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 1.15rem;
            font-weight: 700;
            color: #2f3542;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 0 #dfe6e9;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.02) translateY(-2px);
            background: #eccc68;
            border-color: #ffa502;
            box-shadow: 0 7px 0 #ffa502;
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #dfe6e9;
        }

        /* Trạng thái nút */
        .option-btn.correct {
            background: var(--correct) !important;
            color: white;
            border-color: #00b894;
            box-shadow: 0 5px 0 #00b894 !important;
        }

        .option-btn.wrong {
            background: var(--wrong) !important;
            color: white;
            border-color: #d63031;
            box-shadow: 0 5px 0 #d63031 !important;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        /* Bài 2 & 3: Inputs & Selects */
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            min-width: 250px;
            padding: 15px;
            border: 3px solid #dfe6e9;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.05);
            outline: none;
            transition: border 0.3s;
        }
        input[type="text"]:focus { border-color: var(--primary); }
        
        select.gap-fill {
            padding: 10px 15px;
            font-size: 1.2rem;
            font-weight: 700;
            border: 3px solid var(--primary);
            border-radius: 10px;
            background: #fff;
            color: var(--primary);
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(136, 84, 192, 0.3);
            outline: none;
            appearance: none;
            text-align: center;
            min-width: 150px;
        }

        .check-btn {
            background: var(--tertiary);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1.15rem;
            font-weight: 800;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 0 #00b894;
            transition: all 0.2s;
        }
        .check-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #00b894; }
        .check-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #00b894; }

        /* Vùng giải thích */
        .explanation {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #fff3cd;
            border-left: 6px solid #ff9f43;
            border-radius: 10px;
            font-size: 1.05rem;
            line-height: 1.6;
            animation: slideDown 0.3s ease-out;
        }

        .explanation h4 { color: #d35400; margin-bottom: 10px; font-size: 1.2rem; }
        .explanation ul { padding-left: 20px; margin-bottom: 10px; }
        .explanation li { margin-bottom: 5px; }
        .highlight-red { color: #d63031; font-weight: bold; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Nút Nộp Bài */
        .submit-btn {
            display: block;
            width: 100%;
            background: #FF4757;
            color: white;
            font-size: 1.8rem;
            font-weight: 900;
            padding: 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 #c0392b;
            margin-top: 40px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 11px 0 #c0392b; }
        .submit-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #c0392b; }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid var(--primary);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal h2 { font-size: 2rem; margin-bottom: 20px; color: var(--primary); }
        .modal input {
            width: 100%;
            padding: 15px;
            font-size: 1.3rem;
            border: 3px solid #dfe6e9;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .modal input.error { border-color: var(--wrong); background: #ffefef; }
        .error-msg { color: var(--wrong); font-weight: bold; margin-bottom: 15px; display: none; }
        
        .modal-btn {
            background: var(--correct);
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0 #00b894;
            width: 100%;
        }

        .result-gif {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin: 20px 0;
            border: 3px solid #dfe6e9;
        }

        #confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }
        
        .correct-input { border-color: var(--correct) !important; background: #e8f8f5; color: #16a085;}
        .wrong-input { border-color: var(--wrong) !important; background: #fdedf0; color: #c0392b;}
    </style>
</head>
<body>

<div class="bg-pattern"></div>
<canvas id="confetti-canvas"></canvas>

<div class="container">
    <div class="header">
        <h3>Giáo viên tạo: Ms Mai An ULIS</h3>
        <h1>🎯 BÀI KIỂM TRA NGỮ PHÁP SIÊU CẤP 🎯</h1>
    </div>

    <div class="score-bar">
        <span>Tiến độ làm bài:</span>
        <span id="score-display">0 / 30 🌟</span>
    </div>

    <div id="quiz-container">
        </div>

    <button class="submit-btn" onclick="showNameModal()">🎯 Nộp Bài & Xem Kết Quả</button>
</div>

<div class="modal-overlay" id="name-modal">
    <div class="modal">
        <h2>Bạn tên là gì nhỉ? 🤔</h2>
        <div class="error-msg" id="name-error">⚠️ Vui lòng nhập tên trước khi xem điểm nhé!</div>
        <input type="text" id="student-name" placeholder="Ví dụ: Nguyễn Văn A..." onkeypress="handleEnter(event)">
        <button class="modal-btn" onclick="submitName()">Xác nhận</button>
    </div>
</div>

<div class="modal-overlay" id="result-modal">
    <div class="modal">
        <h2 id="result-title">Kết quả của bạn!</h2>
        <h1 style="font-size: 3rem; color: var(--primary); margin: 10px 0;" id="final-score">0/30</h1>
        <img id="result-img" class="result-gif" src="" alt="Meme">
        <p id="result-message" style="font-size: 1.2rem; font-weight: bold; color: #636e72;"></p>
        <button class="modal-btn" style="margin-top: 20px; background: var(--tertiary); box-shadow: 0 6px 0 #01a388;" onclick="location.reload()">Làm Lại Nào! 🔄</button>
    </div>
</div>

<script>
    // --- WEB AUDIO API CHO HIỆU ỨNG ÂM THANH ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (type === 'correct') {
            // Tiếng "Ding" vui tai
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.exponentialRampToValueAtTime(1046.5, audioCtx.currentTime + 0.1); // C6
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        } else {
            // Tiếng "Téo tèo tèo" (Buzz)
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    // --- HIỆU ỨNG PHÁO GIẤY (CONFETTI) ---
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];

    function fireConfetti() {
        for (let i = 0; i < 100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: -10,
                r: Math.random() * 6 + 2,
                dx: Math.random() * 4 - 2,
                dy: Math.random() * 5 + 2,
                color: `hsl(${Math.random() * 360}, 100%, 50%)`
            });
        }
    }

    function animateConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, index) => {
            p.x += p.dx;
            p.y += p.dy;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            if (p.y > canvas.height) particles.splice(index, 1);
        });
        requestAnimationFrame(animateConfetti);
    }
    animateConfetti();

    // --- DỮ LIỆU ĐỀ BÀI (100% TOÀN VẸN) ---
    const dataB1 = [
        {
            q: "(Present Simple) English ________ in many countries.",
            opts: [{t:"is spoken", c:true}, {t:"are spoken", c:false}, {t:"speaks", c:false}],
            exp: `
                <h4>PHẦN GIẢI THÍCH CHI TIẾT:</h4>
                <ol>
                    <li><b>Dịch câu:</b> "Tiếng Anh được nói ở nhiều quốc gia."</li>
                    <li><b>Phân tích đáp án:</b>
                        <ul>
                            <li>A. is spoken (động từ tobe số ít + Vp2): được nói.</li>
                            <li>B. are spoken (động từ tobe số nhiều + Vp2): được nói.</li>
                            <li>C. speaks (động từ chủ động thêm 's'): nói.</li>
                        </ul>
                    </li>
                    <li><b>Tại sao đúng?</b> "English" là danh từ không đếm được (tính là số ít), sự việc là sự thật hiển nhiên -> dùng Bị động Hiện tại đơn với to-be là "is".</li>
                    <li><span class="highlight-red">Tại sao sai?</span> B sai vì dùng to-be số nhiều "are". C sai vì là câu chủ động (Tiếng Anh là vật/ngôn ngữ, không tự thực hiện hành động "nói" được).</li>
                </ol>
            `
        },
        {
            q: "(Past Simple) The window ________ by Nam yesterday.",
            opts: [{t:"breaks", c:false}, {t:"is broken", c:false}, {t:"was broken", c:true}],
            exp: `
                <h4>PHẦN GIẢI THÍCH CHI TIẾT:</h4>
                <ol>
                    <li><b>Dịch câu:</b> "Cái cửa sổ đã bị làm vỡ bởi Nam vào ngày hôm qua."</li>
                    <li><b>Phân tích đáp án:</b>
                        <ul>
                            <li>A. breaks (động từ chủ động HTĐ): làm vỡ.</li>
                            <li>B. is broken (bị động HTĐ): bị làm vỡ.</li>
                            <li>C. was broken (bị động QKĐ): đã bị làm vỡ.</li>
                        </ul>
                    </li>
                    <li><b>Tại sao đúng?</b> Có dấu hiệu thời gian "yesterday" (hôm qua) -> Quá khứ đơn. "The window" số ít nên dùng "was" + Vp2 (broken).</li>
                    <li><span class="highlight-red">Tại sao sai?</span> A sai vì chia thì Hiện tại đơn chủ động. B sai vì chia thì Hiện tại đơn bị động (không khớp "yesterday").</li>
                </ol>
            `
        },
        {
            q: "(Present Continuous) Look! The trees ________ by my grandfather now.",
            opts: [{t:"are being watered", c:true}, {t:"is being watered", c:false}, {t:"are watering", c:false}],
            exp: `
                <h4>PHẦN GIẢI THÍCH CHI TIẾT:</h4>
                <ol>
                    <li><b>Dịch câu:</b> "Nhìn kìa! Những cái cây đang được tưới bởi ông của tôi bây giờ."</li>
                    <li><b>Phân tích đáp án:</b>
                        <ul>
                            <li>A. are being watered: đang được tưới (Bị động HTTD số nhiều).</li>
                            <li>B. is being watered: đang được tưới (Bị động HTTD số ít).</li>
                            <li>C. are watering: đang tưới (Chủ động HTTD).</li>
                        </ul>
                    </li>
                    <li><b>Tại sao đúng?</b> Dấu hiệu "Look!", "now" -> Hiện tại tiếp diễn. "The trees" (số nhiều) đứng làm chủ ngữ bị tác động -> Bị động số nhiều: are + being + Vp2.</li>
                    <li><span class="highlight-red">Tại sao sai?</span> B sai vì "The trees" số nhiều không dùng "is". C sai vì cây không tự tưới nước được (sai nghĩa chủ động).</li>
                </ol>
            `
        },
        {
            q: "(Past Continuous) A book ________ by him at 8 p.m last night.",
            opts: [{t:"was read", c:false}, {t:"was being read", c:true}, {t:"is being read", c:false}],
            exp: `
                <h4>PHẦN GIẢI THÍCH CHI TIẾT:</h4>
                <ol>
                    <li><b>Dịch câu:</b> "Một cuốn sách đang được đọc bởi anh ấy vào lúc 8 giờ tối qua."</li>
                    <li><b>Phân tích đáp án:</b>
                        <ul>
                            <li>A. was read: đã được đọc (Bị động QKĐ).</li>
                            <li>B. was being read: đang được đọc (Bị động QKTD).</li>
                            <li>C. is being read: đang được đọc (Bị động HTTD).</li>
                        </ul>
                    </li>
                    <li><b>Tại sao đúng?</b> Dấu hiệu "at 8 p.m last night" (giờ cụ thể trong quá khứ) -> Quá khứ tiếp diễn. Cấu trúc bị động: S + was/were + being + Vp2.</li>
                    <li><span class="highlight-red">Tại sao sai?</span> A sai vì thiếu "being" (chỉ là quá khứ đơn). C sai thì (hiện tại tiếp diễn không dùng cho "last night").</li>
                </ol>
            `
        },
        {
            q: "(Present Perfect) The homework ________ by the students.",
            opts: [{t:"has been finished", c:true}, {t:"have been finished", c:false}, {t:"has finished", c:false}],
            exp: `
                <h4>PHẦN GIẢI THÍCH CHI TIẾT:</h4>
                <ol>
                    <li><b>Dịch câu:</b> "Bài tập về nhà đã được hoàn thành bởi các học sinh."</li>
                    <li><b>Phân tích đáp án:</b>
                        <ul>
                            <li>A. has been finished: đã được hoàn thành (Bị động HTHT số ít).</li>
                            <li>B. have been finished: đã được hoàn thành (Bị động HTHT số nhiều).</li>
                            <li>C. has finished: đã hoàn thành (Chủ động HTHT).</li>
                        </ul>
                    </li>
                    <li><b>Tại sao đúng?</b> "The homework" là danh từ không đếm được -> dùng trợ động từ số ít "has". Cấu trúc bị động HTHT: has + been + Vp2.</li>
                    <li><span class="highlight-red">Tại sao sai?</span> B sai ngữ pháp vì "homework" không dùng "have". C sai nghĩa vì bài tập không tự hoàn thành chính nó (sai thể chủ động).</li>
                </ol>
            `
        },
        {
            q: "(Past Perfect) The floor ________ before my mom came home.",
            opts: [{t:"had been cleaned", c:true}, {t:"had cleaned", c:false}, {t:"has been cleaned", c:false}],
            exp: `
                <h4>PHẦN GIẢI THÍCH CHI TIẾT:</h4>
                <ol>
                    <li><b>Dịch câu:</b> "Sàn nhà đã được lau sạch trước khi mẹ tôi về nhà."</li>

        document.getElementById('score-display').innerText = `${score} / ${totalQuestions} 🌟`;
    }

    function markAnswered() {
        answered++;
        if(answered === totalQuestions) {
            // trigger small celebration when all done
            fireConfetti();
        }
    }

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        let html = '';

        // BÀI 1
        html += `<h2 class="section-title">BÀI 1: TRẮC NGHIỆM (MULTIPLE CHOICE)</h2>`;
        dataB1.forEach((item, index) => {
            let shuffledOpts = shuffleArray([...item.opts]);
            let optsHtml = shuffledOpts.map((opt, i) => `
                <button class="option-btn" onclick="checkB1(this, ${opt.c}, 'exp-b1-${index}')">
                    ${String.fromCharCode(65 + i)}. ${opt.t}
                </button>
            `).join('');

            html += `
                <div class="card">
                    <div class="question-text">Câu ${index + 1}: ${item.q}</div>
                    <div class="options-grid">${optsHtml}</div>
                    <div class="explanation" id="exp-b1-${index}">${item.exp}</div>
                </div>
            `;
        });

        // BÀI 2
        html += `<h2 class="section-title">BÀI 2: VIẾT LẠI CÂU (REWRITE THE SENTENCES)</h2>`;
        dataB2.forEach((item, index) => {
            let safeAnsArr = JSON.stringify(item.ans).replace(/"/g, '&quot;');
            html += `
                <div class="card">
                    <div class="question-text">Câu ${index + 11}: ${item.q}</div>
                    <div class="input-group">
                        <span style="font-weight: bold; font-size: 1.2rem;">${item.prefix}</span>
                        <input type="text" id="input-b2-${index}" placeholder="Nhập phần còn lại...">
                        <button class="check-btn" onclick="checkB2(${index}, ${safeAnsArr})">Kiểm tra</button>
                    </div>
                    <div class="explanation" id="exp-b2-${index}">${item.exp}</div>
                </div>
            `;
        });

        // BÀI 3
        html += `<h2 class="section-title">BÀI 3: CHIA ĐỘNG TỪ (FILL IN THE BLANKS)</h2>`;
        dataB3.forEach((item, index) => {
            let parts = item.q.split("________");
            let shuffledOpts = shuffleArray([...item.opts]);
            let optsHtml = shuffledOpts.map(opt => `<option value="${opt}">${opt}</option>`).join('');
            
            html += `
                <div class="card">
                    <div class="question-text">
                        Câu ${index + 21}: ${parts[0]}
                        <select class="gap-fill" onchange="checkB3(this, '${item.ans}', 'exp-b3-${index}')">
                            <option value="" disabled selected>Chọn đáp án</option>
                            ${optsHtml}
                        </select>
                        ${parts[1] || ''}
                    </div>
                    <div class="explanation" id="exp-b3-${index}">${item.exp}</div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // Checking Functions
    function checkB1(btn, isCorrect, expId) {
        if (btn.parentNode.hasAttribute('data-answered')) return; // Ngăn bấm nhiều lần
        btn.parentNode.setAttribute('data-answered', 'true');
        
        let buttons = btn.parentNode.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);

        if (isCorrect) {
            btn.classList.add('correct');
            playSound('correct');
            fireConfetti();
            score++;
        } else {
            btn.classList.add('wrong');
            playSound('wrong');
            // Show correct answer
            buttons.forEach(b => {
                if(b.onclick.toString().includes('true')) b.classList.add('correct');
            });
        }
        
        document.getElementById(expId).style.display = 'block';
        markAnswered();
        updateScore();
    }

    function checkB2(index, validAnswers) {
        const inputEl = document.getElementById(`input-b2-${index}`);
        const expId = `exp-b2-${index}`;
        if (inputEl.disabled) return;

        let userVal = inputEl.value.trim().toLowerCase().replace(/\s+/g, ' ').replace(/\.$/, ''); // clean string
        if(userVal === "") {
            alert("Bạn chưa điền đáp án kìa!"); return;
        }

        inputEl.disabled = true;
        
        // Kiểm tra xem user có nhập đúng 1 trong các cách viết không
        let isCorrect = validAnswers.includes(userVal);

        if (isCorrect) {
            inputEl.classList.add('correct-input');
            playSound('correct');
            fireConfetti();
            score++;
        } else {
            inputEl.classList.add('wrong-input');
            playSound('wrong');
        }

        document.getElementById(expId).style.display = 'block';
        markAnswered();
        updateScore();
    }

    function checkB3(selectEl, correctAns, expId) {
        if (selectEl.disabled) return;
        selectEl.disabled = true;

        if (selectEl.value === correctAns) {
            selectEl.style.borderColor = 'var(--correct)';
            selectEl.style.backgroundColor = '#e8f8f5';
            selectEl.style.color = 'var(--correct)';
            playSound('correct');
            fireConfetti();
            score++;
        } else {
            selectEl.style.borderColor = 'var(--wrong)';
            selectEl.style.backgroundColor = '#fdedf0';
            selectEl.style.color = 'var(--wrong)';
            playSound('wrong');
            // Tạo span báo đáp án đúng
            let span = document.createElement('span');
            span.innerHTML = ` (Đúng phải là: <b>${correctAns}</b>)`;
            span.style.color = 'var(--wrong)';
            span.style.fontSize = '1rem';
            selectEl.parentNode.appendChild(span);
        }

        document.getElementById(expId).style.display = 'block';
        markAnswered();
        updateScore();
    }

    // Modal Logic
    function showNameModal() {
        if(answered < totalQuestions) {
            if(!confirm("Bạn chưa làm xong bài, bạn có chắc chắn muốn nộp bài không?")) return;
        }
        document.getElementById('name-modal').style.display = 'flex';
        document.getElementById('student-name').focus();
    }

    function handleEnter(e) {
        if (e.key === 'Enter') submitName();
    }

    function submitName() {
        const nameInput = document.getElementById('student-name');
        const name = nameInput.value.trim();
        const errorMsg = document.getElementById('name-error');

        if (!name) {
            errorMsg.style.display = 'block';
            nameInput.classList.add('error');
            playSound('wrong');
            return;
        }

        document.getElementById('name-modal').style.display = 'none';
        showResult(name);
    }

    function showResult(name) {
        const modal = document.getElementById('result-modal');
        const title = document.getElementById('result-title');
        const scoreDisplay = document.getElementById('final-score');
        const msg = document.getElementById('result-message');
        const img = document.getElementById('result-img');

        let percent = (score / totalQuestions) * 100;

        scoreDisplay.innerText = `${score}/${totalQuestions}`;

        if (percent === 100) {
            title.innerText = `🌟 THIÊN TÀI!`;
            msg.innerText = `${name} xuất sắc tuyệt đối! Đỉnh của chóp!`;
            img.src = "https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif"; // Mind blown
            fireConfetti();
            setInterval(fireConfetti, 1000);
        } else if (percent >= 60) {
            title.innerText = `👏 RẤT TỐT!`;
            msg.innerText = `${name} làm rất khá! Tiếp tục phát huy nhé!`;
            img.src = "https://media.giphy.com/media/11ISwbgCxEzMyY/giphy.gif"; // High five / nod
            fireConfetti();
        } else {
            title.innerText = `💪 CỐ LÊN NHÉ!`;
            msg.innerText = `${name} cần ôn tập thêm một chút, không sao cả!`;
            img.src = "https://media.giphy.com/media/d2lcHJTG5Tscg/giphy.gif"; // Crying/sad but funny
        }

        modal.style.display = 'flex';
        playSound('correct');
    }

    // Khởi tạo bài tập
    window.onload = renderQuiz;
</script>

</body>
</html>
