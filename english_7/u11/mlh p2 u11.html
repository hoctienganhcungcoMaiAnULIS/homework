<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit 11: Travelling in the Future – Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#8854C0;--secondary:#FDCB6E;--teal:#00C9A7;
  --correct:#00D26A;--wrong:#FF4757;
  --card-bg:rgba(255,255,255,0.93);--shadow:0 8px 32px rgba(136,84,192,0.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;
  background:linear-gradient(-45deg,#f093fb,#f5576c,#4facfe,#00f2fe,#43e97b,#fa709a,#fee140,#a18cd1);
  background-size:400% 400%;animation:gradientShift 12s ease infinite;position:relative;}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.pattern-layer{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;overflow:hidden}
.float-icon{position:absolute;animation:floatAround linear infinite;opacity:0.32;user-select:none}
@keyframes floatAround{0%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-18px) rotate(10deg)}50%{transform:translateY(-4px) rotate(-5deg)}75%{transform:translateY(-22px) rotate(7deg)}100%{transform:translateY(0) rotate(0deg)}}
.container{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:18px 14px 60px}
header{text-align:center;margin-bottom:20px;padding:14px 18px 10px;background:rgba(255,255,255,0.9);border-radius:20px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
header .subtitle{font-size:.78rem;color:var(--primary);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
header h1{font-size:1.25rem;font-weight:900;background:linear-gradient(135deg,#8854C0,#00C9A7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.3}
header .teacher{font-size:.76rem;color:#888;margin-top:3px}
.score-bar{background:rgba(255,255,255,0.9);border-radius:50px;padding:9px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
.score-text{font-weight:800;font-size:.95rem;color:var(--primary)}
.progress-wrap{flex:1;margin:0 14px;background:#e8e0ff;border-radius:50px;height:11px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#8854C0,#00C9A7);border-radius:50px;transition:width .4s ease;width:0%}
.section-card{background:var(--card-bg);border-radius:22px;box-shadow:var(--shadow);margin-bottom:22px;padding:20px 18px;backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,0.7)}
.section-title{font-size:1rem;font-weight:900;color:white;background:linear-gradient(135deg,#8854C0,#00C9A7);padding:7px 16px;border-radius:50px;display:inline-block;margin-bottom:14px;box-shadow:0 4px 12px rgba(136,84,192,0.3)}
.section-instruction{font-size:.88rem;color:#555;margin-bottom:14px;padding:9px 13px;background:#f0e8ff;border-radius:11px;border-left:4px solid var(--primary);font-weight:600;line-height:1.5}
.question-block{margin-bottom:18px;padding:14px;background:rgba(248,245,255,0.9);border-radius:15px;border:2px solid #e8e0ff;transition:border-color .3s}
.question-block.answered{border-color:#c8f0e0}
.question-text{font-size:1.05rem;font-weight:700;color:#2d2d2d;margin-bottom:11px;line-height:1.5}
.question-num{display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#8854C0,#f093fb);color:white;font-weight:900;font-size:.82rem;width:26px;height:26px;border-radius:50%;margin-right:7px;flex-shrink:0;vertical-align:middle}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:500px){.options-grid{grid-template-columns:1fr}}
.option-btn{padding:9px 13px;border-radius:15px;border:none;font-family:'Nunito',sans-serif;font-size:.97rem;font-weight:700;cursor:pointer;background:white;color:#3d3d3d;box-shadow:0 5px 0 #c8bfff,0 6px 12px rgba(136,84,192,0.13);transition:all .15s ease;text-align:left}
.option-btn:hover:not(:disabled){transform:translateY(-3px) scale(1.02);box-shadow:0 8px 0 #c8bfff,0 10px 20px rgba(136,84,192,0.18)}
.option-btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 #c8bfff}
.option-btn.correct{background:linear-gradient(135deg,#00D26A,#00b359);color:white;box-shadow:0 5px 0 #009944}
.option-btn.wrong{background:linear-gradient(135deg,#FF4757,#dd3347);color:white;box-shadow:0 5px 0 #c02233;animation:shake .5s ease}
.option-btn.reveal-correct{background:linear-gradient(135deg,#00D26A,#00b359);color:white;box-shadow:0 5px 0 #009944}
.option-btn:disabled{cursor:default}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.explanation-box{display:none;margin-top:13px;padding:13px 15px;background:linear-gradient(135deg,#fff9f0,#f0fff8);border-radius:13px;border-left:4px solid var(--secondary);font-size:.9rem;color:#444;line-height:1.75;animation:slideIn .3s ease}
.explanation-box.show{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.explanation-box strong{color:var(--primary)}
.explanation-box .correct-ans{color:var(--correct);font-weight:800}
.explanation-box .wrong-ans{color:var(--wrong);font-weight:700}
.explanation-box ul{margin:5px 0 5px 15px}
.explanation-box li{margin-bottom:3px}
.explanation-box .trans{font-style:italic;color:#666;background:#f5f0ff;padding:4px 10px;border-radius:8px;margin-top:5px;display:block}
/* Gap fill */
.sentence-gap{font-size:1.02rem;font-weight:700;color:#2d2d2d;line-height:2.4;margin-bottom:6px}
.gap-btn{display:inline-block;min-width:68px;padding:2px 11px;border-radius:9px;border:2.5px dashed var(--primary);background:#f0e8ff;color:var(--primary);font-weight:800;font-size:.97rem;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;vertical-align:middle}
.gap-btn:hover:not([data-done]){background:#e0d0ff;transform:scale(1.05)}
.gap-btn.gap-correct{background:var(--correct);color:white;border-color:var(--correct);cursor:default}
.gap-btn.gap-wrong{background:var(--wrong);color:white;border-color:var(--wrong);animation:shake .5s ease;cursor:default}
/* Popup */
.popup-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:1000;justify-content:center;align-items:center}
.popup-overlay.show{display:flex}
.popup-box{background:white;border-radius:22px;padding:22px;max-width:420px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,0.22);animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.popup-title{font-size:.95rem;font-weight:800;color:var(--primary);margin-bottom:14px;text-align:center}
.popup-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.popup-opt{padding:10px;border-radius:12px;border:none;background:#f0e8ff;color:#333;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:all .2s;box-shadow:0 3px 0 #c8bfff;text-align:center}
.popup-opt:hover{background:#e0d0ff;transform:translateY(-2px)}
/* Result popup */
.result-popup{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:2000;justify-content:center;align-items:center}
.result-popup.show{display:flex}
.result-box{background:white;border-radius:28px;padding:34px 28px;max-width:400px;width:92%;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.28);animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
.result-emoji{font-size:3.8rem;margin-bottom:9px}
.result-score{font-size:2.4rem;font-weight:900;color:var(--primary)}
.result-msg{font-size:1rem;font-weight:700;color:#555;margin:9px 0 18px}
.btn-submit{width:100%;padding:15px;border-radius:18px;border:none;background:linear-gradient(135deg,#8854C0,#00C9A7);color:white;font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:900;cursor:pointer;box-shadow:0 6px 0 #5a3090,0 8px 20px rgba(136,84,192,0.28);transition:all .2s;margin-top:8px}
.btn-submit:hover{transform:translateY(-3px);box-shadow:0 9px 0 #5a3090}
.btn-submit:active{transform:translateY(2px);box-shadow:0 3px 0 #5a3090}
.btn-retry{padding:11px 26px;border-radius:50px;border:none;background:linear-gradient(135deg,#FDCB6E,#fa709a);color:white;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:900;cursor:pointer;box-shadow:0 4px 0 #c99030;transition:all .2s;margin-top:9px}
.btn-retry:hover{transform:translateY(-2px)}
.confetti-piece{position:fixed;width:10px;height:10px;pointer-events:none;z-index:9999;animation:confettiFall 1.2s ease forwards;border-radius:2px}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(200px) rotate(720deg) scale(0);opacity:0}}
/* Speaking */
.sentence-ref-box{background:#fffbf0;border-radius:13px;border:2px solid #fde8a0;padding:11px 14px;margin-bottom:14px}
.ref-title{font-size:.8rem;font-weight:800;color:#b87a00;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.ref-item{display:flex;gap:8px;margin-bottom:5px;font-size:.87rem;color:#555;line-height:1.5}
.ref-letter{font-weight:900;color:var(--primary);min-width:18px}
.dialogue-wrap{background:#f8f5ff;border-radius:14px;padding:14px 15px;border:2px solid #e0d0ff}
.dia-line{display:flex;align-items:flex-start;margin-bottom:10px;gap:8px;font-size:.95rem;line-height:1.6}
.dia-line:last-child{margin-bottom:0}
.speaker-tag{font-weight:900;min-width:72px;flex-shrink:0;font-size:.85rem;padding:2px 8px;border-radius:20px;text-align:center;align-self:flex-start;margin-top:2px}
.sp-janet{background:#fde8f5;color:#c0397a}
.sp-justin{background:#e0f0ff;color:#0077aa}
.dia-content{flex:1}
.dia-gap-block{display:inline-block}
/* Writing II */
.rewrite-block{margin-bottom:18px;padding:14px;background:rgba(248,245,255,0.9);border-radius:15px;border:2px solid #e8e0ff;transition:border-color .3s}
.rewrite-block.answered{border-color:#c8f0e0}
.orig-sent{font-size:1rem;font-weight:700;color:#333;margin-bottom:6px;line-height:1.5}
.kw-badge{display:inline-block;background:linear-gradient(135deg,#FDCB6E,#fa709a);color:white;font-weight:900;font-size:.8rem;padding:1px 9px;border-radius:20px;margin-left:6px;vertical-align:middle}
.rewrite-arrow{color:var(--primary);font-weight:900;margin:5px 0 3px;display:block;font-size:.95rem}
.rewrite-sent{font-size:1rem;font-weight:700;color:#2d2d2d;line-height:2.4}
</style>
</head>
<body>
<div class="pattern-layer" id="patternLayer"></div>
<div id="confettiCont"></div>
<div class="popup-overlay" id="popupOv">
  <div class="popup-box">
    <div class="popup-title" id="popupTitle">Chọn đáp án:</div>
    <div id="popupBody"></div>
  </div>
</div>
<div class="result-popup" id="resultPopup">
  <div class="result-box">
    <div class="result-emoji" id="resEmoji">🎉</div>
    <div class="result-score" id="resScore">0/0</div>
    <div class="result-msg" id="resMsg"></div>
    <button class="btn-retry" onclick="location.reload()">🔄 Làm lại</button>
  </div>
</div>
<div class="container">
  <header>
    <div class="subtitle">✈️ Unit 11</div>
    <h1>Travelling in the Future</h1>
    <div class="teacher">👩‍🏫 Giáo viên tạo: Ms. Mai An – ULIS</div>
  </header>
  <div class="score-bar">
    <div class="score-text">⭐ <span id="scoreDisp">0</span> điểm</div>
    <div class="progress-wrap"><div class="progress-fill" id="progFill"></div></div>
    <div class="score-text">📝 <span id="ansDisp">0</span> / <span id="totDisp">0</span></div>
  </div>
  <div id="QC"></div>
  <button class="btn-submit" onclick="submitQuiz()">🏆 Nộp bài &amp; Xem điểm</button>
</div>
<script>
// ── Floating icons
const ICONS=['⭐','🌸','🚀','🌈','✈️','🚗','🌟','🍭','🎈','🎀','🚂','🛸','🍀','🌺','🦋','🌙','💫','🎪'];
const PL=document.getElementById('patternLayer');
for(let i=0;i<26;i++){const e=document.createElement('div');e.className='float-icon';e.textContent=ICONS[i%ICONS.length];e.style.cssText=`left:${Math.random()*97}%;top:${Math.random()*97}%;font-size:${1.1+Math.random()*1.8}rem;animation-duration:${4+Math.random()*6}s;animation-delay:${Math.random()*4}s`;PL.appendChild(e);}
// ── Audio
let AC;function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function playOK(){try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';[523,659,784].forEach((f,i)=>o.frequency.setValueAtTime(f,c.currentTime+i*.1));g.gain.setValueAtTime(.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5);o.start(c.currentTime);o.stop(c.currentTime+.5);}catch(e){}}
function playNG(){try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';[200,150,100].forEach((f,i)=>o.frequency.setValueAtTime(f,c.currentTime+i*.1));g.gain.setValueAtTime(.22,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.4);o.start(c.currentTime);o.stop(c.currentTime+.4);}catch(e){}}
// ── Confetti
function confetti(x,y){const C=['#8854C0','#FDCB6E','#00C9A7','#FF6B9D','#00D26A','#FFD700','#FF4757','#74B9FF'];for(let i=0;i<18;i++){const e=document.createElement('div');e.className='confetti-piece';e.style.cssText=`background:${C[i%C.length]};left:${x+Math.random()*80-40}px;top:${y+Math.random()*40-20}px;transform:rotate(${Math.random()*360}deg);animation-duration:${.8+Math.random()*.7}s;animation-delay:${Math.random()*.25}s;border-radius:${Math.random()>.5?'50%':'2px'}`;document.getElementById('confettiCont').appendChild(e);setTimeout(()=>e.remove(),1500);}}
// ── State
let total=0,answered=0,correct=0;
function upd(){document.getElementById('scoreDisp').textContent=correct;document.getElementById('ansDisp').textContent=answered;document.getElementById('totDisp').textContent=total;document.getElementById('progFill').style.width=(total?answered/total*100:0)+'%';}
function sh(arr){return arr.sort(()=>Math.random()-.5);}
// ── MCQ
function renderMCQ(cont,qs){
  qs.forEach(q=>{
    total++;const id='q'+Math.random().toString(36).substr(2,8);
    const bl=document.createElement('div');bl.className='question-block';bl.id=id;
    bl.innerHTML=`<div class="question-text"><span class="question-num">${q.n}</span>${q.q}</div>
    <div class="options-grid">${sh([...q.opts]).map(o=>`<button class="option-btn" data-v="${o.v}" onclick="doMCQ(this,'${id}','${q.c}',event)">${o.t}</button>`).join('')}</div>
    <div class="explanation-box" id="ex_${id}">${q.ex}</div>`;
    cont.appendChild(bl);
  });
}
function doMCQ(btn,id,c,ev){
  const bl=document.getElementById(id);if(bl.classList.contains('answered'))return;
  bl.classList.add('answered');
  bl.querySelectorAll('.option-btn').forEach(b=>{b.disabled=true;if(b.dataset.v===c)b.classList.add('reveal-correct');});
  answered++;
  if(btn.dataset.v===c){btn.classList.remove('reveal-correct');btn.classList.add('correct');correct++;playOK();confetti(ev.clientX,ev.clientY);}
  else{btn.classList.add('wrong');playNG();}
  document.getElementById('ex_'+id).classList.add('show');upd();
}
// ── Generic gap (for XII)
function renderGapFill(cont,qs){
  qs.forEach(q=>{
    total++;const id='g'+Math.random().toString(36).substr(2,8);
    const bl=document.createElement('div');bl.className='question-block';bl.id=id;
    const pts=q.t.split('___');
    const enc=JSON.stringify(sh([...q.opts])).replace(/"/g,'&quot;');
    bl.innerHTML=`<div class="sentence-gap"><span class="question-num">${q.n}</span>${pts[0]}<button class="gap-btn" id="gb_${id}" onclick="openGap('${id}',this)" data-opts="${enc}" data-c="${q.c}" data-title="${q.pt||'Chọn giới từ:'}">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</button>${pts[1]||''}</div>
    <div class="explanation-box" id="ex_${id}">${q.ex}</div>`;
    cont.appendChild(bl);
  });
}
function openGap(id,el){
  const bl=document.getElementById(id);if(bl.classList.contains('answered'))return;
  const opts=JSON.parse(el.dataset.opts.replace(/&quot;/g,'"'));
  const c=el.dataset.c,tt=el.dataset.title;
  document.getElementById('popupTitle').textContent=tt;
  document.getElementById('popupBody').innerHTML=`<div class="popup-grid">${opts.map(o=>`<button class="popup-opt" onclick="doGap('${id}','${o}','${c}',this)">${o}</button>`).join('')}</div>`;
  document.getElementById('popupOv').classList.add('show');
}
function doGap(id,chosen,c,btn){
  document.getElementById('popupOv').classList.remove('show');
  const bl=document.getElementById(id);if(bl.classList.contains('answered'))return;
  bl.classList.add('answered');
  const gb=document.getElementById('gb_'+id);gb.textContent=chosen;gb.setAttribute('data-done','1');
  answered++;const ex=document.getElementById('ex_'+id);
  if(chosen===c){gb.classList.add('gap-correct');correct++;playOK();confetti(gb.getBoundingClientRect().left+35,gb.getBoundingClientRect().top);}
  else{gb.classList.add('gap-wrong');playNG();ex.innerHTML=`<strong>✅ Đáp án đúng: <span class="correct-ans">${c}</span></strong> | Bạn chọn: <span class="wrong-ans">${chosen}</span><br><br>`+ex.innerHTML;}
  ex.classList.add('show');upd();
}
document.getElementById('popupOv').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
// ── Submit
function submitQuiz(){
  const msgs=[{m:90,e:'🏆',t:'Xuất sắc! Điểm số hoàn hảo! 🎉'},{m:75,e:'🌟',t:'Rất giỏi! Tiếp tục phát huy! 💪'},{m:60,e:'😊',t:'Khá tốt! Ôn lại phần chưa nắm nhé! 📚'},{m:40,e:'🌈',t:'Đọc giải thích và thử lại nhé! ✨'},{m:0,e:'🤗',t:'Đừng nản! Ôn kỹ rồi làm lại! 💖'}];
  const p=total>0?(correct/total*100):0,f=msgs.find(m=>p>=m.m);
  document.getElementById('resEmoji').textContent=f.e;document.getElementById('resScore').textContent=correct+'/'+total+' ('+Math.round(p)+'%)';document.getElementById('resMsg').textContent=f.t;
  document.getElementById('resultPopup').classList.add('show');
  if(p>=75)for(let i=0;i<5;i++)setTimeout(()=>confetti(Math.random()*window.innerWidth,Math.random()*280),i*200);
}
// ══════════════ DATA ══════════════
const QC=document.getElementById('QC');
// ── Section X
const sX=document.createElement('div');sX.className='section-card';
sX.innerHTML=`<div class="section-title">📝 X. Choose the Correct Answers</div><div class="section-instruction">Chọn đáp án đúng để hoàn thành câu (Possessive pronouns &amp; adjectives).</div>`;
QC.appendChild(sX);
renderMCQ(sX,[
{n:1,c:'d',q:"Jane has already eaten her lunch, but I'm saving ______ until later.",
 opts:sh([{v:'a',t:'A. ours'},{v:'b',t:'B. hers'},{v:'c',t:'C. yours'},{v:'d',t:'D. mine'}]),
 ex:`<strong>✅ Đáp án đúng: D. mine</strong>
<span class="trans">🇻🇳 Jane đã ăn bữa trưa của cô ấy rồi, nhưng tôi đang giữ phần của tôi để ăn sau.</span>
<strong>📚 Phân tích 4 đáp án:</strong>
<ul><li><span class="wrong-ans">A. ours</span>: của chúng tôi → Sai, chủ ngữ là "I" (tôi), không phải "chúng tôi"</li>
<li><span class="wrong-ans">B. hers</span>: của cô ấy → Sai, đây là phần của người nói (I), không phải của Jane</li>
<li><span class="wrong-ans">C. yours</span>: của bạn → Sai, người nói là "I"</li>
<li><span class="correct-ans">D. mine ✓</span>: của tôi → "mine" thay cho "my lunch", đại từ sở hữu độc lập của "I"</li></ul>
<strong>💡 Quy tắc:</strong> "mine" = đại từ sở hữu độc lập, thay thế cho "my + danh từ".`},
{n:2,c:'c',q:"______ home is located downtown, so it's close to my work.",
 opts:sh([{v:'a',t:'A. Mine'},{v:'b',t:'B. Ours'},{v:'c',t:'C. Our'},{v:'d',t:'D. We'}]),
 ex:`<strong>✅ Đáp án đúng: C. Our</strong>
<span class="trans">🇻🇳 Nhà của chúng tôi ở trung tâm, nên gần chỗ làm của tôi.</span>
<strong>📚 Phân tích 4 đáp án:</strong>
<ul><li><span class="wrong-ans">A. Mine</span>: đại từ sở hữu → Sai, không đứng trước danh từ được</li>
<li><span class="wrong-ans">B. Ours</span>: đại từ sở hữu → Sai, "ours" không đứng trước "home"</li>
<li><span class="correct-ans">C. Our ✓</span>: tính từ sở hữu → "Our home" đứng trước danh từ</li>
<li><span class="wrong-ans">D. We</span>: đại từ nhân xưng chủ ngữ → Sai hoàn toàn</li></ul>
<strong>💡 Quy tắc:</strong> Trước danh từ PHẢI dùng <em>tính từ sở hữu</em>: my/our/his/her/its/their/your.`},
{n:3,c:'b',q:"Her friend says it's ______, but I think it belongs to them.",
 opts:sh([{v:'a',t:'A. her'},{v:'b',t:'B. his'},{v:'c',t:'C. our'},{v:'d',t:'D. theirs'}]),
 ex:`<strong>✅ Đáp án đúng: B. his</strong>
<span class="trans">🇻🇳 Bạn của cô ấy nói đó là của anh ấy, nhưng tôi nghĩ nó thuộc về họ.</span>
<strong>📚 Phân tích 4 đáp án:</strong>
<ul><li><span class="wrong-ans">A. her</span>: của cô ấy → Sai, người bạn nói đây là "của anh ấy" (his)</li>
<li><span class="correct-ans">B. his ✓</span>: của anh ấy → Người bạn (nam) của cô ấy nói vật đó là của anh ấy</li>
<li><span class="wrong-ans">C. our</span>: của chúng tôi → Sai ngữ cảnh</li>
<li><span class="wrong-ans">D. theirs</span>: của họ → Sai, người bạn đó nói là của một người (his)</li></ul>
<strong>💡 Bẫy:</strong> "Her friend" ≠ "hers" — "her" là tính từ sở hữu bổ nghĩa "friend". Người bạn đó (nam) → "his".`},
{n:4,c:'a',q:"These suitcases belong to you and your wife. These suitcases are ______.",
 opts:sh([{v:'a',t:'A. yours'},{v:'b',t:"B. your's"},{v:'c',t:'C. hers'},{v:'d',t:'D. ours'}]),
 ex:`<strong>✅ Đáp án đúng: A. yours</strong>
<span class="trans">🇻🇳 Những chiếc vali này của bạn và vợ bạn. Những chiếc vali này là của bạn.</span>
<strong>📚 Phân tích 4 đáp án:</strong>
<ul><li><span class="correct-ans">A. yours ✓</span>: của bạn → "belong to you and your wife" → chủ sở hữu là "you" → dùng "yours"</li>
<li><span class="wrong-ans">B. your's</span>: SAI CHÍNH TẢ → đại từ sở hữu KHÔNG có dấu apostrophe</li>
<li><span class="wrong-ans">C. hers</span>: của cô ấy → Sai, chủ sở hữu là cả "you AND your wife"</li>
<li><span class="wrong-ans">D. ours</span>: của chúng tôi → Sai, người hỏi không phải chủ sở hữu</li></ul>
<strong>💡 Quy tắc:</strong> Không bao giờ viết "your's" hay "mine's" — đại từ sở hữu không có apostrophe.`},
{n:5,c:'a',q:"The teacher told the children to open ______ books.",
 opts:sh([{v:'a',t:'A. their'},{v:'b',t:'B. theirs'},{v:'c',t:"C. their's"},{v:'d',t:'D. his'}]),
 ex:`<strong>✅ Đáp án đúng: A. their</strong>
<span class="trans">🇻🇳 Giáo viên bảo các em học sinh mở sách của mình ra.</span>
<strong>📚 Phân tích 4 đáp án:</strong>
<ul><li><span class="correct-ans">A. their ✓</span>: tính từ sở hữu → "their books" đứng trước danh từ "books"</li>
<li><span class="wrong-ans">B. theirs</span>: đại từ sở hữu → Sai, không đứng trước danh từ</li>
<li><span class="wrong-ans">C. their's</span>: SAI CHÍNH TẢ → không tồn tại</li>
<li><span class="wrong-ans">D. his</span>: của anh ấy → Sai, "children" là số nhiều</li></ul>
<strong>💡 Quy tắc:</strong> Trước danh từ → tính từ sở hữu (their). "Theirs" không đứng trước danh từ.`},
{n:6,c:'c',q:"I'd like you to meet Rita. She's a great friend of ______.",
 opts:sh([{v:'a',t:'A. us'},{v:'b',t:'B. our'},{v:'c',t:'C. ours'},{v:'d',t:'D. me'}]),
 ex:`<strong>✅ Đáp án đúng: C. ours</strong>
<span class="trans">🇻🇳 Tôi muốn giới thiệu với bạn Rita. Cô ấy là người bạn thân của chúng tôi.</span>
<strong>📚 Cấu trúc: "a/an + N + of + Possessive Pronoun"</strong>
<ul><li><span class="wrong-ans">A. us</span>: đại từ tân ngữ → Sai, sau "of" trong cấu trúc này dùng đại từ sở hữu</li>
<li><span class="wrong-ans">B. our</span>: tính từ sở hữu → Sai, không đứng đơn độc sau "of"</li>
<li><span class="correct-ans">C. ours ✓</span>: đại từ sở hữu → "a great friend of ours"</li>
<li><span class="wrong-ans">D. me</span>: đại từ tân ngữ của "I" → Sai, người nói nói về "chúng tôi"</li></ul>
<strong>💡 Cấu trúc:</strong> a friend of <em>mine/yours/his/hers/ours/theirs</em> = one of my/your/his/her/our/their friends.`},
{n:7,c:'b',q:"The house is big, but ______ windows are small.",
 opts:sh([{v:'a',t:'A. it'},{v:'b',t:'B. its'},{v:'c',t:"C. it's"},{v:'d',t:'D. their'}]),
 ex:`<strong>✅ Đáp án đúng: B. its</strong>
<span class="trans">🇻🇳 Ngôi nhà rất to, nhưng những cái cửa sổ của nó thì nhỏ.</span>
<strong>📚 Phân tích 4 đáp án:</strong>
<ul><li><span class="wrong-ans">A. it</span>: đại từ nhân xưng → Sai, không đứng trước danh từ</li>
<li><span class="correct-ans">B. its ✓</span>: tính từ sở hữu của "it" → "its windows" = cửa sổ của ngôi nhà</li>
<li><span class="wrong-ans">C. it's</span>: = "it is" → Sai hoàn toàn về nghĩa</li>
<li><span class="wrong-ans">D. their</span>: của họ → Sai, "the house" là đồ vật số ít</li></ul>
<strong>💡 Bẫy cổ điển:</strong> "its" (sở hữu) ≠ "it's" (= it is). Không có apostrophe trong "its" sở hữu!`},
{n:8,c:'a',q:"Sue fell down the stairs and broke ______ leg.",
 opts:sh([{v:'a',t:'A. her'},{v:'b',t:'B. hers'},{v:'c',t:'C. its'},{v:'d',t:'D. his'}]),

<span class="trans">🇻🇳 Sue ngã xuống cầu thang và bị gãy chân.</span>
<strong>📚 Phân tích 4 đáp án:</strong>
<ul><li><span class="correct-ans">A. her ✓</span>: tính từ sở hữu nữ → "her leg" đứng trước danh từ "leg"</li>
<li><span class="wrong-ans">B. hers</span>: đại từ sở hữu → Sai, không đứng trước danh từ</li>
<li><span class="wrong-ans">C. its</span>: của đồ vật → Sai, Sue là người</li>
<li><span class="wrong-ans">D. his</span>: của anh ấy → Sai, Sue là phụ nữ</li></ul>
<strong>💡 Quy tắc:</strong> Sue → giới tính nữ → "her" (tính từ sở hữu trước danh từ "leg").`},
{n:9,c:'d',q:"Your travel plans sound just as exciting as ______!",
 opts:sh([{v:'a',t:'A. I'},{v:'b',t:'B. me'},{v:'c',t:'C. my'},{v:'d',t:'D. mine'}]),

<span class="trans">🇻🇳 Kế hoạch du lịch của bạn nghe hay không kém gì của tôi!</span>
<strong>📚 Phân tích 4 đáp án:</strong>
<ul><li><span class="wrong-ans">A. I</span>: đại từ chủ ngữ → Không thể so sánh "plans" với "I"</li>
<li><span class="wrong-ans">B. me</span>: đại từ tân ngữ → Sai cấu trúc</li>
<li><span class="wrong-ans">C. my</span>: tính từ sở hữu → Sai, không đứng một mình sau "as"</li>
<li><span class="correct-ans">D. mine ✓</span>: đại từ sở hữu → "mine" thay cho "my travel plans"</li></ul>
<strong>💡 Cấu trúc:</strong> "as exciting as <em>mine</em>" = "as exciting as my travel plans" — tránh lặp danh từ.`},
{n:10,c:'c',q:"The mother cat and ______ kittens were napping in the sunshine.",
 opts:sh([{v:'a',t:'A. his'},{v:'b',t:"B. it's"},{v:'c',t:'C. her'},{v:'d',t:'D. hers'}]),
 ex:`<strong>✅ Đáp án đúng: C. her</strong>
<span class="trans">🇻🇳 Con mèo mẹ và những chú mèo con của nó đang ngủ trưa dưới ánh nắng.</span>
<strong>📚 Phân tích 4 đáp án:</strong>
<ul><li><span class="wrong-ans">A. his</span>: giống đực → Sai, "mother cat" là giống cái</li>
<li><span class="wrong-ans">B. it's</span>: = "it is" → Sai hoàn toàn</li>
<li><span class="correct-ans">C. her ✓</span>: tính từ sở hữu giống cái → "her kittens" đứng trước danh từ</li>
<li><span class="wrong-ans">D. hers</span>: đại từ sở hữu → Sai, không đứng trước danh từ</li></ul>
<strong>💡 Lưu ý:</strong> "Mother cat" → giống cái → "her". Tính từ sở hữu đứng trước danh từ.`}
]);

function openSpGap(id,el){
  const bl=document.getElementById(id);if(bl.classList.contains('answered'))return;
  const opts=JSON.parse(el.dataset.opts.replace(/&quot;/g,'"'));
  document.getElementById('popupTitle').textContent='Chọn câu phù hợp (A – F):';
  document.getElementById('popupBody').innerHTML=`<div class="popup-grid">${opts.map(l=>`<button class="popup-opt" style="font-size:1.4rem;padding:14px;" onclick="doSpGap('${id}','${l}','${el.dataset.c}',this)">${l}</button>`).join('')}</div>`;
  document.getElementById('popupOv').classList.add('show');
}
function doSpGap(id,chosen,c,btn){
  document.getElementById('popupOv').classList.remove('show');
  const bl=document.getElementById(id);if(bl.classList.contains('answered'))return;
  bl.classList.add('answered');
  const gb=document.getElementById('spgb_'+id);gb.textContent=chosen;gb.setAttribute('data-done','1');
  answered++;
  const ex=document.getElementById('ex_'+id);
  if(chosen===c){gb.classList.add('gap-correct');correct++;playOK();confetti(gb.getBoundingClientRect().left+28,gb.getBoundingClientRect().top);}
  else{gb.classList.add('gap-wrong');playNG();ex.innerHTML=`<strong>✅ Đáp án đúng: <span class="correct-ans">${c}</span></strong> | Bạn chọn: <span class="wrong-ans">${chosen}</span><br><br>`+ex.innerHTML;}
  ex.classList.add('show');upd();
}

    <div class="rewrite-sent">${sentHTML}</div>
    <div class="explanation-box" id="ex_${id}">${item.ex}</div>`;
    sec.appendChild(bl);
  });
  QC.appendChild(sec);
})();

function openW2Gap(id,el){
  const bl=document.getElementById(id);if(bl.classList.contains('answered'))return;
  const opts=JSON.parse(el.dataset.opts.replace(/&quot;/g,'"').replace(/&#39;/g,"'"));
  const c=el.dataset.c.replace(/&quot;/g,'"').replace(/&#39;/g,"'");
  document.getElementById('popupTitle').textContent='Chọn phần còn thiếu:';
  document.getElementById('popupBody').innerHTML=`<div style="display:flex;flex-direction:column;gap:9px;">${opts.map(o=>`<button class="popup-opt" style="text-align:left;padding:10px 14px;" onclick="doW2Gap('${id}','${o.replace(/'/g,'&#39;').replace(/"/g,'&quot;')}','${c.replace(/'/g,'&#39;').replace(/"/g,'&quot;')}',this)">${o}</button>`).join('')}</div>`;
  document.getElementById('popupOv').classList.add('show');
}
function doW2Gap(id,cho,cor,btn){
  document.getElementById('popupOv').classList.remove('show');
  const chosen=cho.replace(/&#39;/g,"'").replace(/&quot;/g,'"');
  const c=cor.replace(/&#39;/g,"'").replace(/&quot;/g,'"');
  const bl=document.getElementById(id);if(bl.classList.contains('answered'))return;
  bl.classList.add('answered');
  const gb=document.getElementById('wgb_'+id);gb.textContent=chosen;gb.setAttribute('data-done','1');
  answered++;
  const ex=document.getElementById('ex_'+id);
  if(chosen===c){gb.classList.add('gap-correct');correct++;playOK();confetti(gb.getBoundingClientRect().left+50,gb.getBoundingClientRect().top);}
  else{gb.classList.add('gap-wrong');playNG();ex.innerHTML=`<strong>✅ Đáp án đúng: <span class="correct-ans">${c}</span></strong> | Bạn chọn: <span class="wrong-ans">${chosen}</span><br><br>`+ex.innerHTML;}
  ex.classList.add('show');upd();
}
upd();
</script>
