<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reported Speech Quiz – Ms Mai An ULIS</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #FF6B9D;
  --purple: #8854C0;
  --yellow: #FDCB6E;
  --teal: #00C9A7;
  --blue: #4ECDC4;
  --orange: #FF9F43;
  --correct: #00D26A;
  --wrong: #FF4757;
  --card-bg: rgba(255,255,255,0.95);
  --shadow: 0 8px 32px rgba(136,84,192,0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  background: #f0e6ff;
}

/* ===== ANIMATED GRADIENT BACKGROUND ===== */
.bg-gradient {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffecd2, #a1c4fd, #c2e9fb, #d4fc79, #96e6a1, #a18cd1, #fbc2eb);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
}
@keyframes gradientMove {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== SVG PATTERN OVERLAY ===== */
.bg-pattern {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.float-icon {
  position: absolute;
  font-size: 2rem;
  animation: floatUp linear infinite;
  opacity: 0.18;
  user-select: none;
}
@keyframes floatUp {
  0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.12; }
  50%  { opacity: 0.22; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0.08; }
}

/* ===== MAIN WRAPPER ===== */
.wrapper {
  position: relative; z-index: 2;
  max-width: 820px;
  margin: 0 auto;
  padding: 16px 12px 60px;
}

/* ===== HEADER ===== */
.quiz-header {
  background: linear-gradient(135deg, var(--purple), var(--pink));
  border-radius: 20px;
  padding: 16px 24px 14px;
  text-align: center;
  margin-bottom: 16px;
  box-shadow: 0 6px 24px rgba(136,84,192,0.35);
  color: white;
}
.quiz-header h1 {
  font-size: 1.35rem;
  font-weight: 900;
  letter-spacing: 0.5px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.18);
}
.quiz-header p {
  font-size: 0.85rem;
  opacity: 0.88;
  margin-top: 3px;
}

/* ===== SCORE BAR ===== */
.score-bar {
  background: rgba(255,255,255,0.88);
  border-radius: 50px;
  padding: 8px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  font-size: 1rem;
  font-weight: 800;
}
.score-bar .score-val { color: var(--purple); font-size: 1.1rem; }
.progress-wrap { flex: 1; margin: 0 14px; height: 10px; background: #e0d4f7; border-radius: 99px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--teal), var(--purple)); border-radius: 99px; transition: width 0.5s ease; }

/* ===== SECTION TITLE ===== */
.section-title {
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--purple);
  background: rgba(255,255,255,0.85);
  border-radius: 14px;
  padding: 8px 18px;
  margin: 18px 0 10px;
  display: inline-block;
  box-shadow: 0 2px 12px rgba(136,84,192,0.12);
}

/* ===== QUESTION CARD ===== */
.q-card {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 20px 22px 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  transition: transform 0.2s;
}
.q-card:hover { transform: translateY(-2px); }

.q-num {
  display: inline-block;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: white;
  font-weight: 900;
  font-size: 0.85rem;
  border-radius: 50px;
  padding: 3px 12px;
  margin-bottom: 8px;
}
.q-text {
  font-size: 1.15rem;
  font-weight: 700;
  color: #2d1b6e;
  line-height: 1.55;
  margin-bottom: 12px;
}
.q-text .blank {
  display: inline-block;
  background: linear-gradient(90deg, #e0d0ff, #ffd6ec);
  border-radius: 8px;
  padding: 1px 18px;
  min-width: 80px;
  text-align: center;
  border-bottom: 2.5px dashed var(--purple);
  cursor: pointer;
  font-weight: 800;
  transition: background 0.2s;
}

/* ===== OPTIONS GRID ===== */
.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 4px;
}
@media(max-width:500px) { .options { grid-template-columns: 1fr; } }

.opt-btn {
  background: linear-gradient(135deg, #f8f0ff, #fff0f7);
  border: 2.5px solid #d4b8ff;
  border-radius: 16px;
  padding: 10px 14px;
  font-size: 1.08rem;
  font-weight: 700;
  color: #3d1a78;
  cursor: pointer;
  text-align: left;
  transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
  box-shadow: 0 4px 0 #c4a0f0, 0 6px 16px rgba(136,84,192,0.10);
  position: relative;
  display: flex;
  align-items: center;
  gap: 8px;
  line-height: 1.4;
}
.opt-btn:hover:not(:disabled) {
  transform: scale(1.04) translateY(-2px);
  box-shadow: 0 6px 0 #c4a0f0, 0 10px 20px rgba(136,84,192,0.18);
  background: linear-gradient(135deg, #ede0ff, #ffe0f0);
}
.opt-btn.correct {
  background: linear-gradient(135deg, #d4fff0, #b8ffe0) !important;
  border-color: var(--correct) !important;
  color: #00873e !important;
  box-shadow: 0 4px 0 #00a854, 0 6px 16px rgba(0,210,106,0.18) !important;
  transform: scale(1.03) !important;
}
.opt-btn.wrong {
  background: linear-gradient(135deg, #ffe0e3, #ffd0d4) !important;
  border-color: var(--wrong) !important;
  color: #c0002a !important;
  box-shadow: 0 4px 0 #ff2244, 0 6px 16px rgba(255,71,87,0.18) !important;
  animation: shake 0.45s ease;
}
@keyframes shake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
}
.opt-btn:disabled { cursor: default; }

.opt-label {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: white;
  font-weight: 900;
  font-size: 0.88rem;
  flex-shrink: 0;
}
.opt-btn.correct .opt-label { background: var(--correct); }
.opt-btn.wrong .opt-label { background: var(--wrong); }

/* ===== BINARY CHOICE (Exercise 4) ===== */
.binary-item {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 14px 18px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.binary-text { font-size: 1.08rem; font-weight: 700; color: #2d1b6e; line-height: 1.6; margin-bottom: 8px; }
.binary-choices { display: flex; gap: 10px; flex-wrap: wrap; }
.binary-btn {
  background: linear-gradient(135deg, #f8f0ff, #fff0f7);
  border: 2.5px solid #d4b8ff;
  border-radius: 50px;
  padding: 7px 20px;
  font-size: 1rem;
  font-weight: 800;
  color: #3d1a78;
  cursor: pointer;
  transition: all 0.18s;
  box-shadow: 0 3px 0 #c4a0f0;
}
.binary-btn:hover:not(:disabled) { transform: scale(1.07); background: linear-gradient(135deg, #ede0ff, #ffe0f0); }
.binary-btn.correct { background: linear-gradient(135deg, #d4fff0, #b8ffe0) !important; border-color: var(--correct) !important; color: #00873e !important; }
.binary-btn.wrong { background: linear-gradient(135deg, #ffe0e3, #ffd0d4) !important; border-color: var(--wrong) !important; color: #c0002a !important; animation: shake 0.45s ease; }
.binary-btn:disabled { cursor: default; }

/* ===== FILL BLANK (Exercise 8) ===== */
.fill-card {
  background: var(--card-bg);
  border-radius: 18px;
  padding: 16px 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.fill-prompt { font-size: 1.08rem; font-weight: 700; color: #5a3a8a; margin-bottom: 4px; font-style: italic; }
.fill-stem { font-size: 1.08rem; font-weight: 800; color: #2d1b6e; margin-bottom: 10px; }
.fill-input {
  width: 100%;
  border: 2.5px solid #d4b8ff;
  border-radius: 12px;
  padding: 9px 14px;
  font-size: 1rem;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  color: #3d1a78;
  background: #f8f0ff;
  outline: none;
  transition: border 0.2s;
}
.fill-input:focus { border-color: var(--purple); }
.fill-input.correct { background: #d4fff0; border-color: var(--correct); color: #00873e; }
.fill-input.wrong { background: #ffe0e3; border-color: var(--wrong); color: #c0002a; }
.fill-check-btn {
  margin-top: 8px;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: white;
  border: none;
  border-radius: 50px;
  padding: 8px 22px;
  font-size: 0.95rem;
  font-weight: 800;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  box-shadow: 0 4px 0 #7040b0;
  transition: transform 0.15s;
}
.fill-check-btn:hover { transform: scale(1.06); }
.fill-check-btn:disabled { opacity: 0.5; cursor: default; }
.fill-answer-reveal {
  font-size: 0.92rem;
  color: #00873e;
  font-weight: 700;
  margin-top: 4px;
}

/* ===== EXPLANATION BOX ===== */
.explanation {
  display: none;
  margin-top: 12px;
  background: linear-gradient(135deg, #fffbe6, #fff0fa);
  border-left: 5px solid var(--yellow);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 1rem;
  color: #4a3060;
  line-height: 1.65;
  animation: fadeIn 0.35s ease;
}
.explanation.show { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.expl-title { font-weight: 900; color: var(--purple); font-size: 1rem; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.expl-row { margin: 4px 0; }
.expl-correct { color: #00873e; font-weight: 800; }
.expl-wrong-label { color: var(--wrong); font-weight: 800; }

/* ===== SUBMIT BUTTON ===== */
.submit-wrap { text-align: center; margin-top: 28px; }
.submit-btn {
  background: linear-gradient(135deg, #f9ca24, #f0932b);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 14px 48px;
  font-size: 1.25rem;
  font-weight: 900;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  box-shadow: 0 6px 0 #c87000, 0 10px 30px rgba(249,202,36,0.35);
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 1px;
}
.submit-btn:hover { transform: scale(1.07) translateY(-3px); box-shadow: 0 10px 0 #c87000, 0 16px 40px rgba(249,202,36,0.4); }

/* ===== RESULT POPUP ===== */
.overlay {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: rgba(40,0,80,0.55);
  backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
}
.overlay.show { display: flex; }
.result-box {
  background: white;
  border-radius: 28px;
  padding: 36px 40px;
  text-align: center;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(136,84,192,0.4);
  animation: popIn 0.45s cubic-bezier(.18,1.5,.5,1);
}
@keyframes popIn { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }
.result-emoji { font-size: 3.5rem; margin-bottom: 10px; }
.result-title { font-size: 1.6rem; font-weight: 900; color: var(--purple); margin-bottom: 8px; }
.result-score { font-size: 2.4rem; font-weight: 900; color: var(--teal); margin-bottom: 8px; }
.result-msg { font-size: 1.05rem; color: #5a3a8a; margin-bottom: 20px; line-height: 1.5; }
.result-close {
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: white; border: none; border-radius: 50px;
  padding: 11px 36px; font-size: 1.05rem; font-weight: 800;
  cursor: pointer; font-family: 'Nunito', sans-serif;
  box-shadow: 0 4px 0 #7040b0;
  transition: transform 0.15s;
}
.result-close:hover { transform: scale(1.06); }

/* ===== CONFETTI ===== */
.confetti-piece {
  position: fixed;
  width: 10px; height: 10px;
  border-radius: 2px;
  pointer-events: none;
  z-index: 999;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<!-- BG GRADIENT -->
<div class="bg-gradient"></div>

<!-- FLOATING ICONS PATTERN -->
<div class="bg-pattern" id="bgPattern"></div>

<!-- MAIN WRAPPER -->
<div class="wrapper">

  <!-- HEADER -->
  <div class="quiz-header">
    <h1>🚀 Reported Speech – Câu Gián Tiếp 🚀</h1>
    <p>Tiếng Anh 8 – Global Success &nbsp;|&nbsp; Giáo viên: <strong>Ms Mai An – ULIS</strong></p>
  </div>

  <!-- SCORE BAR -->
  <div class="score-bar">
    <span>🌟 Điểm:</span>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <span class="score-val" id="scoreDisplay">0 / 0</span>
  </div>

  <div id="quizContainer"></div>

  <div class="submit-wrap">
    <button class="submit-btn" onclick="submitQuiz()">🎯 NỘP BÀI &amp; XEM KẾT QUẢ</button>
  </div>
</div>

<!-- RESULT POPUP -->
<div class="overlay" id="resultOverlay">
  <div class="result-box">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">Kết quả</div>
    <div class="result-score" id="resultScore">0/0</div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="result-close" onclick="document.getElementById('resultOverlay').classList.remove('show')">✨ Đóng</button>
  </div>
</div>

<script>
// ===== FLOATING ICONS =====
const icons = ['⭐','🌸','🍎','☁️','🐱','🌟','🍊','🌺','🦋','🍓','🌈','🎈','🐸','🌙','🍭','🎀','🐥','🍋'];
const bp = document.getElementById('bgPattern');
for(let i=0;i<28;i++){
  const el = document.createElement('div');
  el.className = 'float-icon';
  el.textContent = icons[Math.floor(Math.random()*icons.length)];
  el.style.left = Math.random()*100+'%';
  el.style.animationDuration = (12+Math.random()*20)+'s';
  el.style.animationDelay = (Math.random()*18)+'s';
  el.style.fontSize = (1.2+Math.random()*2)+'rem';
  bp.appendChild(el);
}

// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getACtx(){ if(!actx) actx = new AudioCtx(); return actx; }

function playDing(){
  const ctx = getACtx();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'sine'; o.frequency.setValueAtTime(880, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime+0.12);
  g.gain.setValueAtTime(0.4, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.5);
  o.start(); o.stop(ctx.currentTime+0.5);
}
function playBuzz(){
  const ctx = getACtx();
  [350,280,200].forEach((freq,i)=>{
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sawtooth'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.18, ctx.currentTime+i*0.12);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+i*0.12+0.18);
    o.start(ctx.currentTime+i*0.12); o.stop(ctx.currentTime+i*0.12+0.18);
  });
}

// ===== CONFETTI =====
function spawnConfetti(x,y){
  const colors=['#FF6B9D','#FDCB6E','#00C9A7','#8854C0','#4ECDC4','#FF9F43','#a29bfe'];
  for(let i=0;i<28;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=(x-40+Math.random()*80)+'px';
    el.style.top=y+'px';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.width=(6+Math.random()*8)+'px';
    el.style.height=(6+Math.random()*8)+'px';
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    el.style.animationDuration=(0.9+Math.random()*1.2)+'s';
    el.style.animationDelay=(Math.random()*0.25)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2200);
  }
}

// ===== SHUFFLE =====
function shuffle(arr){ let a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }

// ===== STATE =====
let totalQ = 0, answered = 0, correctCount = 0;

function updateScore(){
  document.getElementById('scoreDisplay').textContent = correctCount+' / '+answered;
  const pct = totalQ>0?(answered/totalQ*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
}

// ===== RENDER HELPERS =====
function renderMCQ(data, idx){
  // Shuffle options
  const opts = shuffle(data.options.map((o,i)=>({...o, origIdx:i})));
  const card = document.createElement('div');
  card.className='q-card';
  const labels=['A','B','C','D'];
  let optHTML = opts.map((o,i)=>`
    <button class="opt-btn" id="opt_${idx}_${i}" onclick="checkMCQ(${idx},${i},${o.correct},this,event)">
      <span class="opt-label">${labels[i]}</span>
      <span>${o.text}</span>
    </button>`).join('');
  card.innerHTML=`
    <div class="q-num">Câu ${data.num}</div>
    <div class="q-text">${data.question}</div>
    <div class="options">${optHTML}</div>
    <div class="explanation" id="expl_${idx}">
      <div class="expl-title">💡 Giải thích chi tiết</div>
      ${data.explanation}
    </div>`;
  return card;
}

function checkMCQ(idx, optIdx, isCorrect, btn, evt){
  const card = btn.closest('.q-card');
  const allBtns = card.querySelectorAll('.opt-btn');
  allBtns.forEach(b=>b.disabled=true);
  if(isCorrect){
    btn.classList.add('correct');
    playDing(); correctCount++;
    spawnConfetti(evt.clientX, evt.clientY);
  } else {
    btn.classList.add('wrong');
    playBuzz();
    allBtns.forEach(b=>{ if(b.dataset.correct==='true') b.classList.add('correct'); });
  }
  // Mark correct btn
  allBtns.forEach((b,i)=>{
    // find correct
  });
  answered++;
  updateScore();
  document.getElementById('expl_'+idx).classList.add('show');
}

function renderBinary(data, idx){
  const div = document.createElement('div');
  div.className='binary-item';
  const btnHTML = data.choices.map((c,i)=>`
    <button class="binary-btn" onclick="checkBinary(this,${c.correct},${idx})" data-correct="${c.correct}">${c.text}</button>`).join('');
  div.innerHTML=`
    <div class="binary-text"><span class="q-num" style="font-size:0.78rem">Câu ${data.num}</span> ${data.question}</div>
    <div class="binary-choices">${btnHTML}</div>
    <div class="explanation" id="expl_${idx}">
      <div class="expl-title">💡 Giải thích</div>
      ${data.explanation}
    </div>`;
  return div;
}

function checkBinary(btn, isCorrect, idx){
  const wrap = btn.closest('.binary-item');
  wrap.querySelectorAll('.binary-btn').forEach(b=>b.disabled=true);
  if(isCorrect){
    btn.classList.add('correct'); playDing(); correctCount++;
    spawnConfetti(btn.getBoundingClientRect().left+btn.offsetWidth/2, btn.getBoundingClientRect().top);
  } else {
    btn.classList.add('wrong'); playBuzz();
    wrap.querySelectorAll('.binary-btn').forEach(b=>{ if(b.dataset.correct==='true') b.classList.add('correct'); });
  }
  answered++; updateScore();
  document.getElementById('expl_'+idx).classList.add('show');
}

function renderFill(data, idx){
  const div = document.createElement('div');
  div.className='fill-card';
  div.innerHTML=`
    <div class="q-num" style="font-size:0.78rem;margin-bottom:6px">Câu ${data.num}</div>
    <div class="fill-prompt">📢 "${data.original}"</div>
    <div class="fill-stem">${data.stem}</div>
    <input class="fill-input" id="fill_${idx}" type="text" placeholder="Điền câu trả lời vào đây..." autocomplete="off"/>
    <div id="fillReveal_${idx}" class="fill-answer-reveal" style="display:none"></div>
    <br><button class="fill-check-btn" id="fillBtn_${idx}" onclick="checkFill(${idx})">✅ Kiểm tra</button>
    <div class="explanation" id="expl_${idx}">
      <div class="expl-title">💡 Giải thích</div>
      ${data.explanation}
    </div>`;
  return div;
}

function normalize(s){ return s.trim().toLowerCase().replace(/\s+/g,' ').replace(/[.!?,;]/g,''); }

function checkFill(idx){
  const inp = document.getElementById('fill_'+idx);
  const btn = document.getElementById('fillBtn_'+idx);

let allFillData = {};

// ===== BUILD QUIZ =====
function buildQuiz(){
  const container = document.getElementById('quizContainer');

  // Section 1: MCQ
  const s1 = document.createElement('div');
  s1.innerHTML = '<div class="section-title">📝 Phần 1: Trắc Nghiệm (Multiple Choice)</div>';
  container.appendChild(s1);

  mcqData.forEach((data, idx)=>{
    totalQ++;
    const card = renderMCQ(data, idx);
    // set correct on buttons for later highlighting
    const opts = shuffle(data.options.map((o,i)=>({...o})));
    container.appendChild(renderMCQDirect(data, idx));
  });

  // Section 2: Binary
  const s2 = document.createElement('div');
  s2.innerHTML = '<div class="section-title">✏️ Phần 2: Exercise 4 – Khoanh chọn đúng</div>';
  container.appendChild(s2);

  binaryData.forEach((data, i)=>{
    totalQ++;
    const idx = 'b'+i;
    container.appendChild(renderBinaryDirect(data, idx));
  });

  // Section 3: Fill
  const s3 = document.createElement('div');
  s3.innerHTML = '<div class="section-title">✍️ Phần 3: Exercise 8 – Viết lại câu</div>';
  container.appendChild(s3);

  fillData.forEach((data, i)=>{
    totalQ++;
    const idx = 'f'+i;
    allFillData[idx] = data;
    container.appendChild(renderFillDirect(data, idx));
  });

  updateScore();
}

function renderMCQDirect(data, idx){
  const opts = shuffle(data.options.map((o,i)=>({...o})));
  const card = document.createElement('div');
  card.className='q-card';
  const labels=['A','B','C','D'];
  let optHTML = opts.map((o,i)=>`
    <button class="opt-btn" data-correct="${o.correct}" onclick="checkMCQDirect(this,event,${idx})">
      <span class="opt-label">${labels[i]}</span>
      <span>${o.text}</span>
    </button>`).join('');
  card.innerHTML=`
    <div class="q-num">Câu ${data.num}</div>
    <div class="q-text">${data.question}</div>
    <div class="options">${optHTML}</div>
    <div class="explanation" id="expl_${idx}">
      <div class="expl-title">💡 Giải thích chi tiết</div>
      ${data.explanation}
    </div>`;
  return card;
}

function checkMCQDirect(btn, evt, idx){
  const card = btn.closest('.q-card');
  const allBtns = card.querySelectorAll('.opt-btn');
  allBtns.forEach(b=>b.disabled=true);
  const isCorrect = btn.dataset.correct==='true';
  if(isCorrect){
    btn.classList.add('correct'); playDing(); correctCount++;
    spawnConfetti(evt.clientX, evt.clientY);
  } else {
    btn.classList.add('wrong'); playBuzz();
    allBtns.forEach(b=>{ if(b.dataset.correct==='true') b.classList.add('correct'); });
  }
  answered++; updateScore();
  document.getElementById('expl_'+idx).classList.add('show');
}

function renderBinaryDirect(data, idx){
  const div = document.createElement('div');
  div.className='binary-item';
  const btnHTML = data.choices.map((c,i)=>`
    <button class="binary-btn" data-correct="${c.correct}" onclick="checkBinaryDirect(this,event,'${idx}')">${c.text}</button>`).join('');
  div.innerHTML=`
    <div class="binary-text"><span class="q-num" style="font-size:0.78rem;margin-right:6px">${data.num}</span>${data.question}</div>
    <div class="binary-choices">${btnHTML}</div>
    <div class="explanation" id="expl_${idx}">
      <div class="expl-title">💡 Giải thích</div>
      ${data.explanation}
    </div>`;
  return div;
}

function checkBinaryDirect(btn, evt, idx){
  const wrap = btn.closest('.binary-item');
  wrap.querySelectorAll('.binary-btn').forEach(b=>b.disabled=true);
  const isCorrect = btn.dataset.correct==='true';
  if(isCorrect){
    btn.classList.add('correct'); playDing(); correctCount++;
    spawnConfetti(evt.clientX||200, evt.clientY||200);
  } else {
    btn.classList.add('wrong'); playBuzz();
    wrap.querySelectorAll('.binary-btn').forEach(b=>{ if(b.dataset.correct==='true') b.classList.add('correct'); });
  }
  answered++; updateScore();
  document.getElementById('expl_'+idx).classList.add('show');
}

function renderFillDirect(data, idx){
  const div = document.createElement('div');
  div.className='fill-card';
  div.innerHTML=`
    <div class="q-num" style="font-size:0.78rem;margin-bottom:6px">${data.num}</div>
    <div class="fill-prompt">📢 "${data.original}"</div>
    <div class="fill-stem" style="margin:6px 0 8px">${data.stem}</div>
    <input class="fill-input" id="fill_${idx}" type="text" placeholder="Nhập đáp án của bạn..." autocomplete="off"/>
    <div id="fillReveal_${idx}" class="fill-answer-reveal" style="display:none"></div>
    <br><button class="fill-check-btn" id="fillBtn_${idx}" onclick="checkFill('${idx}')">✅ Kiểm tra</button>
    <div class="explanation" id="expl_${idx}">
      <div class="expl-title">💡 Giải thích</div>
      ${data.explanation}
    </div>`;
  return div;
}

function checkFill(idx){
  const inp = document.getElementById('fill_'+idx);
  const btn = document.getElementById('fillBtn_'+idx);
  const rev = document.getElementById('fillReveal_'+idx);
  if(!inp||inp.disabled) return;
  const userVal = normalize(inp.value);
  if(!userVal){ alert('Vui lòng nhập đáp án!'); return; }
  const dataItem = allFillData[idx];
  const correct = dataItem.answers.some(a=>normalize(a)===userVal);
  inp.disabled=true; btn.disabled=true;
  if(correct){
    inp.classList.add('correct'); playDing(); correctCount++;
    const rect = inp.getBoundingClientRect();
    spawnConfetti(rect.left+rect.width/2, rect.top);
  } else {
    inp.classList.add('wrong'); playBuzz();
    rev.style.display='block';
    rev.textContent = '✅ Đáp án mẫu: '+dataItem.answers[0];
  }
  answered++; updateScore();
  document.getElementById('expl_'+idx).classList.add('show');
}

// ===== SUBMIT =====
function submitQuiz(){
  const msgs = [
    ['🏆','Xuất sắc!','Bạn thật tuyệt vời! Hãy tiếp tục phát huy nhé! 🌟'],
    ['🎉','Giỏi lắm!','Bạn đã nắm vững câu gián tiếp rất tốt! ✨'],
    ['💪','Cố lên nào!','Ôn luyện thêm một chút là bạn sẽ đạt điểm cao thôi! 💡'],
    ['📚','Tiếp tục học!','Đừng bỏ cuộc, kiến thức sẽ đến với bạn! 🌈'],
  ];
  const pct = totalQ>0?(correctCount/totalQ):0;
  let msgIdx = pct>=0.9?0:pct>=0.7?1:pct>=0.5?2:3;
  const [emoji,title,msg] = msgs[msgIdx];
  document.getElementById('resultEmoji').textContent=emoji;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultScore').textContent=correctCount+' / '+totalQ;
  document.getElementById('resultMsg').textContent=msg;
  document.getElementById('resultOverlay').classList.add('show');
  // Final confetti burst
  for(let i=0;i<5;i++) setTimeout(()=>spawnConfetti(Math.random()*window.innerWidth, 100), i*200);
}

buildQuiz();
</script>
