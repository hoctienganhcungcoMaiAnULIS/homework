<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thạc sỹ Mai An - Ocean Quiz 45 Questions</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --deep-sea: #001219;
            --ocean-blue: #005f73;
            --cyan: #94d2bd;
            --coral: #ee9b00;
            --correct: #2ecc71;
            --wrong: #e74c3c;
        }

        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; }

        body {
            margin: 0; min-height: 100vh;
            background: linear-gradient(180deg, #001219, #002b5b, #005f73, #0a9396);
            background-size: 400% 400%;
            animation: oceanMove 15s ease infinite;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
            color: white; overflow-x: hidden;
        }

        @keyframes oceanMove { 0%{background-position:50% 0%} 50%{background-position:50% 100%} 100%{background-position:50% 0%} }

        /* Bubbles effect */
        .bubble {
            position: fixed; bottom: -100px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%; pointer-events: none; z-index: 0;
            animation: floatUp 12s infinite linear;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.5; }
            100% { transform: translateY(-110vh) scale(1.8); opacity: 0; }
        }

        .header { text-align: center; z-index: 10; margin-bottom: 20px; }
        .header h1 { font-size: 1rem; color: var(--cyan); margin: 0; letter-spacing: 3px; font-weight: 700; }
        .header h2 { font-size: 2.3rem; margin: 10px 0; text-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        .score-bar {
            position: sticky; top: 10px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 15px 40px; border-radius: 50px;
            display: flex; gap: 40px; font-weight: 700; font-size: 1.3rem;
            z-index: 100; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .container { width: 100%; max-width: 850px; z-index: 10; }

        .card {
            background: rgba(255, 255, 255, 0.96); border-radius: 25px;
            padding: 30px; margin-bottom: 35px; color: #1a202c;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); transition: 0.3s;
            border-bottom: 6px solid #cbd5e0;
        }

        .section-tag {
            background: var(--ocean-blue); color: white;
            padding: 5px 15px; border-radius: 10px; font-size: 0.85rem;
            font-weight: 800; margin-bottom: 20px; display: inline-block;
        }

        .q-text { font-size: 1.25rem; font-weight: 700; margin-bottom: 20px; line-height: 1.5; color: #2d3748; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }

        .opt-btn {
            background: white; border: 2px solid #edf2f7; padding: 18px;
            border-radius: 18px; cursor: pointer; font-size: 1.1rem; font-weight: 600;
            transition: 0.2s; text-align: left; box-shadow: 0 4px 0 #edf2f7;
        }

        .opt-btn:hover:not(:disabled) { border-color: var(--ocean-blue); background: #f0faff; transform: translateY(-2px); }

        .opt-btn.correct { background: var(--correct) !important; color: white !important; border-color: #27ae60 !important; box-shadow: 0 4px 0 #1e8449 !important; }
        .opt-btn.wrong { background: var(--wrong) !important; color: white !important; border-color: #c0392b !important; box-shadow: 0 4px 0 #922b21 !important; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .explanation {
            margin-top: 25px; padding: 20px; border-radius: 15px;
            background: #fdfcff; border-left: 6px solid var(--ocean-blue);
            display: none; animation: fadeIn 0.5s; line-height: 1.7; color: #4a5568;
        }

        .explanation strong { color: var(--ocean-blue); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-finish {
            background: var(--coral); color: white; border: none; padding: 20px 70px;
            border-radius: 50px; font-size: 1.6rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 8px 0 #b37400; margin: 40px 0; transition: 0.2s;
        }

        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0, 18, 25, 0.95);
            z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .modal-box { background: white; padding: 50px; border-radius: 40px; text-align: center; color: #2d3436; max-width: 500px; width: 90%; }
    </style>
</head>
<body>

    <div id="bubbles"></div>

    <div class="header">
        <h1>Giáo viên: Thạc sỹ Mai An (ULIS)</h1>
        <h2>🔱 OCEAN MASTER: 45 COMPARISON CHALLENGES 🔱</h2>
    </div>

    <div class="score-bar">
        <span>✅ <span id="correct-count">0</span></span>
        <span>❌ <span id="wrong-count">0</span></span>
    </div>

    <div class="container" id="quiz-container"></div>

    <button class="btn-finish" onclick="finishQuiz()">NỘP BÀI 🐚</button>

    <div id="modal">
        <div class="modal-box">
            <h2 id="modal-title">Kết quả</h2>
            <p id="modal-score" style="font-size: 2.5rem; font-weight: 800; margin: 20px 0; color: var(--ocean-blue);"></p>
            <p id="modal-msg" style="margin-bottom: 30px;"></p>
            <button class="btn-finish" style="padding: 15px 40px; font-size: 1.2rem;" onclick="location.reload()">Làm lại 🔄</button>
        </div>
    </div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(isCorrect) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(isCorrect ? 523 : 150, audioCtx.currentTime);
        if(isCorrect) osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    // Create Bubbles
    const bContainer = document.getElementById('bubbles');
    for(let i=0; i<45; i++) {
        const b = document.createElement('div');
        b.className = 'bubble';
        const size = Math.random() * 50 + 15;
        b.style.width = b.style.height = size + 'px';
        b.style.left = Math.random() * 100 + '%';
        b.style.animationDuration = (Math.random() * 7 + 8) + 's';
        b.style.animationDelay = Math.random() * 10 + 's';
        bContainer.appendChild(b);
    }

    const quizData = [
        // BÀI 5: 1-15 (SO SÁNH NHẤT)
        { 
            s: "BÀI 5: SO SÁNH NHẤT (SUPERLATIVES)", 
            q: "This villa is nice. It's ________ the resort.", 
            a: "the nicest villa in", 
            opts: ["the nicest villa in", "nicer than", "the most nice villa", "the nicest of"], 
            ex: "<strong>Dịch nghĩa:</strong> Căn biệt thự này rất đẹp. Nó là căn biệt thự đẹp nhất trong khu nghỉ dưỡng.<br><strong>Phân tích:</strong><br>- Ngữ cảnh so sánh 1 vật với 1 tổng thể (khu resort) -> Dùng <strong>So sánh nhất</strong>.<br>- 'Nice' là tính từ ngắn (1 âm tiết), tận cùng là 'e' -> thêm 'st' thành 'nicest'. Bắt buộc phải có mạo từ 'the' phía trước.<br>- Dùng giới từ 'in' cho phạm vi không gian/địa điểm (in the resort, in the world).<br><strong>Loại trừ:</strong><br>❌ nicer than: So sánh hơn, thiếu đối tượng thứ 2.<br>❌ the most nice: Sai quy tắc tính từ ngắn.<br>❌ the nicest of: Dùng 'of' cho tập hợp số lượng (of the three, of all), không dùng cho địa điểm." 
        },
        { 
            s: "BÀI 5", 
            q: "Mai is very lazy. She's ________ I've ever met.", 
            a: "the laziest person", 
            opts: ["the laziest person", "lazier person", "most lazy person", "the most lazy person"], 
            ex: "<strong>Dịch nghĩa:</strong> Mai rất lười. Cô ấy là người lười nhất mà tôi từng gặp.<br><strong>Phân tích:</strong><br>- Dấu hiệu <em>'I have ever met' (Tôi từng gặp)</em> -> Bắt buộc dùng <strong>So sánh nhất</strong> vì đây là trải nghiệm từ trước đến nay.<br>- 'Lazy' là tính từ 2 âm tiết nhưng tận cùng là 'y' -> Được xem là tính từ ngắn. Quy tắc: đổi 'y' thành 'i' và thêm 'est' -> 'the laziest'.<br><strong>Loại trừ:</strong><br>❌ lazier: So sánh hơn.<br>❌ most lazy / the most lazy: Sai quy tắc thêm đuôi của tính từ tận cùng bằng 'y'." 
        },
        { 
            s: "BÀI 5", 
            q: "It was a very happy day. It was ________ my life.", 
            a: "the happiest day in", 
            opts: ["the happiest day in", "happier than", "happy day in", "the most happy day"], 
            ex: "<strong>Dịch nghĩa:</strong> Đó là một ngày rất hạnh phúc. Đó là ngày hạnh phúc nhất trong đời tôi.<br><strong>Phân tích:</strong><br>- So sánh 1 ngày với toàn bộ cuộc đời -> <strong>So sánh nhất</strong>.<br>- 'Happy' có tận cùng là 'y' -> đổi thành 'i' + 'est' -> 'the happiest'.<br>- Giới từ đi kèm với 'my life' hoặc 'the world' là 'in' (trong cuộc đời tôi).<br><strong>Loại trừ:</strong><br>❌ happier than: So sánh hơn (cần 2 đối tượng).<br>❌ the most happy: Sai quy tắc tính từ tận cùng bằng đuôi 'y'." 
        },
        { 
            s: "BÀI 5", 
            q: "She is a very smart student. She's ________ the class.", 
            a: "the smartest student in", 
            opts: ["the smartest student in", "smarter than", "the smartest student of", "the most smart student"], 
            ex: "<strong>Dịch nghĩa:</strong> Cô ấy là một học sinh rất thông minh. Cô ấy là học sinh thông minh nhất lớp.<br><strong>Phân tích:</strong><br>- 'Smart' là tính từ ngắn (1 âm tiết) -> thêm 'est' thành 'the smartest'.<br>- Phạm vi là một tập thể/địa điểm (the class, the team, the company) -> Dùng giới từ 'in'.<br><strong>Loại trừ:</strong><br>❌ the smartest student of: Sai giới từ, 'of' thường đi với mốc thời gian (of the year) hoặc số lượng (of all, of the 5 students)." 
        },
        { 
            s: "BÀI 5", 
            q: "The novel is very thick. It is ________ I've ever read.", 
            a: "the thickest novel", 
            opts: ["the thickest novel", "the thicker novel", "the thickest in", "most thick novel"], 
            ex: "<strong>Dịch nghĩa:</strong> Cuốn tiểu thuyết này rất dày. Nó là cuốn tiểu thuyết dày nhất tôi từng đọc.<br><strong>Phân tích:</strong><br>- Dấu hiệu thì Hiện tại hoàn thành <em>'I've ever read'</em> -> Dùng <strong>So sánh nhất</strong>.<br>- 'Thick' (dày) là tính từ ngắn -> thêm 'est' thành 'the thickest'. Bắt buộc có 'the'.<br><strong>Loại trừ:</strong><br>❌ the thicker novel: 'thicker' là so sánh hơn, không đi với mạo từ 'the' trong trường hợp này.<br>❌ the thickest in: Thiếu danh từ 'novel' và dư giới từ 'in' (do vế sau đã là một mệnh đề 'I've ever...')." 
        },
        { 
            s: "BÀI 5", 
            q: "It's a very large working space. It's ________ the town.", 
            a: "the largest one in", 
            opts: ["the largest one in", "larger than", "the most large", "the largest in"], 
            ex: "<strong>Dịch nghĩa:</strong> Đó là một không gian làm việc rất rộng. Nó là cái rộng nhất trong thị trấn.<br><strong>Phân tích:</strong><br>- 'Large' (rộng lớn) là tính từ ngắn, kết thúc bằng 'e' -> thêm 'st' thành 'the largest'.<br>- Đại từ 'one' được dùng để thay thế cho danh từ 'working space' ở câu trước để tránh lặp từ (nghĩa là 'the largest working space').<br>- Phạm vi 'the town' (thị trấn) -> Dùng giới từ 'in'.<br><strong>Loại trừ:</strong><br>❌ the largest in: Thiếu đại từ 'one' thay thế cho chủ thể." 
        },
        { 
            s: "BÀI 5", 
            q: "December is so cold. It's ________ the year.", 
            a: "the coldest month of", 
            opts: ["the coldest month of", "the coldest in", "the most cold month", "colder than"], 
            ex: "<strong>Dịch nghĩa:</strong> Tháng 12 rất lạnh. Nó là tháng lạnh nhất trong năm.<br><strong>Phân tích:</strong><br>- 'Cold' (lạnh) là tính từ ngắn -> 'the coldest'.<br>- Lưu ý quan trọng: Với danh từ chỉ thời gian (năm, tháng, tuần), ta dùng giới từ 'of' (of the year, of the month). Ví dụ: the happiest day of my life.<br><strong>Loại trừ:</strong><br>❌ the coldest in: Sai giới từ khi đi với 'the year'.<br>❌ the most cold: Sai quy tắc tính từ ngắn." 
        },
        { 
            s: "BÀI 5", 
            q: "The food was so tasty. That was ________ I've had for a long time.", 
            a: "the tastiest meal", 
            opts: ["the tastiest meal", "the most tasty meal", "tastier meal", "tasty meal"], 
            ex: "<strong>Dịch nghĩa:</strong> Đồ ăn rất ngon. Đó là bữa ăn ngon nhất mà tôi từng ăn trong một khoảng thời gian dài.<br><strong>Phân tích:</strong><br>- Ngữ cảnh diễn tả trải nghiệm cực độ ('I've had for a long time') -> Dùng <strong>So sánh nhất</strong>.<br>- 'Tasty' (ngon miệng) kết thúc bằng 'y' -> đổi 'y' thành 'i' rồi thêm 'est' -> 'the tastiest'.<br><strong>Loại trừ:</strong><br>❌ the most tasty: Sai quy tắc đuôi 'y'.<br>❌ tastier: SS hơn, không phù hợp ngữ cảnh." 
        },
        { 
            s: "BÀI 5", 
            q: "Matt always drives carefully. He is ________ all.", 
            a: "the most careful driver of", 
            opts: ["the most careful driver of", "the most carefully", "the carefullest of", "more careful driver"], 
            ex: "<strong>Dịch nghĩa:</strong> Matt luôn lái xe cẩn thận. Anh ấy là tài xế cẩn thận nhất trong số tất cả mọi người.<br><strong>Phân tích:</strong><br>- 'Careful' (cẩn thận) là tính từ dài (2 âm tiết trở lên) -> Dùng 'the most careful'.<br>- Chú ý: Sau động từ to-be 'is' ta phải dùng TÍNH TỪ (careful), không dùng TRẠNG TỪ (carefully). Từ 'driver' là danh từ (người lái xe).<br>- Giới từ đi với 'all' là 'of' (of all = trong số tất cả).<br><strong>Loại trừ:</strong><br>❌ the most carefully: Dư đuôi 'ly' vì sau to-be cần tính từ hoặc cụm danh từ.<br>❌ the carefullest: Sai quy tắc vì 'careful' là tính từ dài." 
        },
        { 
            s: "BÀI 5", 
            q: "Ronaldo is a very good player. He is one of ________ the national team.", 
            a: "the best players in", 
            opts: ["the best players in", "the best player in", "the most good players", "better players"], 
            ex: "<strong>Dịch nghĩa:</strong> Ronaldo là một cầu thủ rất giỏi. Anh ấy là một trong những cầu thủ xuất sắc nhất đội tuyển quốc gia.<br><strong>Phân tích CẤU TRÚC VÀNG:</strong><br>- <strong>One of the + So sánh nhất + Danh từ SỐ NHIỀU</strong> (Một trong những...).<br>- 'Good' là tính từ bất quy tắc -> So sánh nhất là 'the best'.<br>- Danh từ 'player' bắt buộc phải thêm 's' (players) vì nằm trong cụm 'một trong NHỮNG...'.<br>- Phạm vi tập thể 'the national team' -> Dùng giới từ 'in'.<br><strong>Loại trừ:</strong><br>❌ the best player in: Thiếu 's' ở chữ player (Lỗi học sinh rất hay mắc)." 
        },
        { 
            s: "BÀI 5", 
            q: "Liverpool is a very famous football team. They're one of ________ the world.", 
            a: "the most famous teams in", 
            opts: ["the most famous teams in", "the most famous team in", "the famousest teams", "more famous teams"], 
            ex: "<strong>Dịch nghĩa:</strong> Liverpool là một đội bóng rất nổi tiếng. Họ là một trong những đội nổi tiếng nhất trên thế giới.<br><strong>Phân tích:</strong><br>- Áp dụng cấu trúc: <strong>One of the + SS nhất + Danh từ SỐ NHIỀU</strong>.<br>- 'Famous' là tính từ dài -> 'the most famous'.<br>- Danh từ 'team' phải ở dạng số nhiều -> 'teams'.<br>- Phạm vi 'the world' -> Dùng 'in the world'.<br><strong>Loại trừ:</strong><br>❌ the most famous team: Thiếu 's' ở từ teams." 
        },
        { 
            s: "BÀI 5", 
            q: "Alice is my quick daughter. She is ________ the three kids.", 
            a: "the quickest of", 
            opts: ["the quickest of", "the quickest in", "quicker than", "the most quick of"], 
            ex: "<strong>Dịch nghĩa:</strong> Alice là cô con gái nhanh nhẹn của tôi. Con bé là đứa nhanh nhất trong 3 đứa trẻ.<br><strong>Phân tích:</strong><br>- 'Quick' là tính từ ngắn -> 'the quickest'.<br>- Khi so sánh trong một nhóm có SỐ LƯỢNG CỤ THỂ (the three kids, the two, the five...), ta dùng giới từ <strong>'of'</strong> (trong số).<br><strong>Loại trừ:</strong><br>❌ the quickest in: Sai giới từ, 'in' dùng cho địa điểm/tập thể, không dùng với số đếm." 
        },
        { 
            s: "BÀI 5", 
            q: "It was a bad time. It is one of ________ my life.", 
            a: "the worst times in", 
            opts: ["the worst times in", "the baddest times", "the worse times", "the most bad times"], 
            ex: "<strong>Dịch nghĩa:</strong> Đó là một khoảng thời gian tồi tệ. Đó là một trong những khoảng thời gian tệ nhất trong đời tôi.<br><strong>Phân tích:</strong><br>- Cấu trúc quen thuộc: <strong>One of the + SS nhất + N(số nhiều)</strong>.<br>- 'Bad' là tính từ bất quy tắc. SS hơn là 'worse', SS nhất là 'the worst'.<br>- Danh từ 'time' thêm 's' thành 'times' (những khoảng thời gian).<br><strong>Loại trừ:</strong><br>❌ the baddest / the most bad: Sai hoàn toàn vì 'bad' là bất quy tắc.<br>❌ the worse times: 'Worse' là so sánh hơn, không dùng với cấu trúc này." 
        },
        { 
            s: "BÀI 5", 
            q: "It's an old painting. It's ________ the exhibition.", 
            a: "the oldest one in", 
            opts: ["the oldest one in", "the oldest in", "older than", "the most old one"], 
            ex: "<strong>Dịch nghĩa:</strong> Đó là một bức tranh cũ. Nó là bức tranh cũ nhất trong buổi triển lãm.<br><strong>Phân tích:</strong><br>- 'Old' (cũ/già) là tính từ ngắn -> 'the oldest'.<br>- Dùng đại từ 'one' để thay thế cho danh từ 'painting' đã nhắc ở trước -> 'the oldest one' (bức cũ nhất).<br>- Phạm vi sự kiện 'the exhibition' (triển lãm) -> Dùng giới từ 'in'.<br><strong>Loại trừ:</strong><br>❌ the oldest in: Câu bị hụt cụm danh từ do thiếu đại từ 'one'." 
        },
        { 
            s: "BÀI 5", 
            q: "Summer is a very busy time for me. It's ________ of the year.",

            a: "is the more beautiful", 
            opts: ["is the more beautiful", "is more beautiful", "is most beautiful", "is the most beautiful"], 
            ex: "<strong>🚨 NHẮC LẠI BẪY 'OF THE TWO':</strong><br><strong>Dịch nghĩa:</strong> Trong số 2 chị em, Cinzy là người xinh đẹp hơn.<br><strong>Phân tích:</strong><br>- Thấy cụm <strong>'Of the two'</strong> (Trong số 2...) -> Bắt buộc dùng <strong>THE + SO SÁNH HƠN</strong>.<br>- 'Beautiful' là tính từ dài -> So sánh hơn là 'more beautiful'.<br>- Ghép công thức: is + <strong>the + more beautiful</strong>.<br><strong>Loại trừ:</strong><br>❌ is more beautiful: Bị thiếu mạo từ 'the'.<br>❌ is the most beautiful: Sai cấu trúc (có 2 người thì không dùng SS nhất)." 
        },
        { 
            s: "BÀI 7", 
            q: "________ I play with him, the more I like him.", 
            a: "The more", 
            opts: ["The more", "Much", "More", "Much more"], 
            ex: "<strong>Dịch nghĩa:</strong> Càng chơi với anh ấy, tôi càng thích anh ấy.<br><strong>Phân tích:</strong><br>- Cấu trúc <em>Càng... Càng...</em> với động từ (nhấn mạnh mức độ hành động).<br>- Công thức: <strong>The more + S + V, The more + S + V</strong>.<br>- Ở đây thiếu nguyên cụm mở đầu của vế thứ nhất -> Điền <strong>The more</strong>.<br><strong>Loại trừ:</strong><br>❌ More / Much more: Bị thiếu mạo từ 'the' đặc trưng của cấu trúc này." 
        },
        { 
            s: "BÀI 7", 
            q: "The noise in Ho Chi Minh City is ________ worse than in Ha Noi city.", 
            a: "much", 
            opts: ["much", "by far", "All are correct", "All are incorrect"], 
            ex: "<strong>Dịch nghĩa:</strong> Tiếng ồn ở TP. Hồ Chí Minh thì tệ HƠN NHIỀU so với ở Hà Nội.<br><strong>Phân tích:</strong><br>- Cấu trúc So sánh hơn 'worse than' đã hoàn chỉnh.<br>- Để <strong>nhấn mạnh</strong> mức độ trong So sánh hơn (hơn RẤT NHIỀU), ta dùng các từ: <strong>much, far, a lot, significantly</strong> đứng trước hình thức so sánh hơn.<br>- Nên đáp án <strong>much</strong> là chính xác (much worse = tệ hơn nhiều).<br><strong>Loại trừ:</strong><br>❌ by far: Từ này dùng để nhấn mạnh cho <em>So sánh nhất</em> (ví dụ: by far the best), hiếm khi dùng cho SS hơn." 
        },
        { 
            s: "BÀI 7", 
            q: "The rooms in Graduate Towers are ________ Patterson Hall.", 
            a: "larger than those in", 
            opts: ["larger than those in", "larger than", "larger than that of", "larger than in"], 
            ex: "<strong>Dịch nghĩa:</strong> Những căn phòng ở toà nhà Graduate Towers thì rộng hơn những căn phòng ở Patterson Hall.<br><strong>Phân tích ĐẠI TỪ THAY THẾ:</strong><br>- Khi so sánh 2 vật thuộc 2 nơi, ta phải so sánh vật tương đương. Tức là so 'rooms' với 'rooms', chứ không thể so sánh 'rooms' với tòa nhà 'Patterson Hall' (lỗi tư duy logic).<br>- Để tránh lặp lại từ 'the rooms' (số nhiều), ta dùng đại từ thay thế <strong>'those'</strong>.<br>- Do đó cấu trúc đầy đủ là: larger than + <strong>those in</strong> (rộng hơn [những căn phòng] ở...).<br><strong>Loại trừ:</strong><br>❌ larger than: So sánh sai đối tượng (phòng vs tòa nhà).<br>❌ larger than that of: 'That' chỉ dùng để thay thế cho danh từ <em>số ít</em> hoặc không đếm được. 'Rooms' là số nhiều nên phải dùng 'those'." 
        },
        { 
            s: "BÀI 7", 
            q: "They are ________ my other neighbors.", 
            a: "more friendly than", 
            opts: ["more friendly than", "more friendly", "friendlier as", "friendlier than"], 
            ex: "<strong>Dịch nghĩa:</strong> Họ thân thiện hơn những người hàng xóm khác của tôi.<br><strong>Phân tích:</strong><br>- Từ 'friendly' (thân thiện) tận cùng bằng 'y' là một trường hợp đặc biệt: Nó có thể dùng cả 2 dạng: <strong>friendlier</strong> HOẶC <strong>more friendly</strong>.<br>- Tuy nhiên, nhìn vào các đáp án: 'friendlier as' là sai ngữ pháp (đã SS hơn thì phải đi với 'than'). Do đó, trong các lựa chọn được cung cấp thì <strong>more friendly than</strong> là cụm đầy đủ và chính xác nhất.<br><em>*Lưu ý: Nếu có đáp án 'friendlier than' thì đó cũng là một đáp án đúng, nhưng trong form đề này 'more friendly than' được ưu tiên.</em>" 
        },
        { 
            s: "BÀI 7", 
            q: "The ________ accident in the history of the city occurred last night.", 
            a: "worst", 
            opts: ["worst", "bader", "most bad", "worse"], 
            ex: "<strong>Dịch nghĩa:</strong> Vụ tai nạn tồi tệ nhất trong lịch sử thành phố đã xảy ra vào đêm qua.<br><strong>Phân tích:</strong><br>- Phạm vi <em>'in the history'</em> (trong lịch sử) -> Chắc chắn là sự kiện tột đỉnh -> <strong>So sánh nhất</strong>.<br>- Tính từ 'bad' là bất quy tắc -> So sánh nhất là <strong>worst</strong> (đề bài đã có sẵn 'the').<br><strong>Loại trừ:</strong><br>❌ bader / most bad: Tính từ bất quy tắc nên không áp dụng thêm đuôi 'er/est' hay 'most'.<br>❌ worse: Là so sánh hơn." 
        },
        { 
            s: "BÀI 7", 
            q: "It's becoming ________ to find a job.", 
            a: "more and more difficult", 
            opts: ["more and more difficult", "more difficult and more difficult", "most and most difficult", "more difficult than"], 
            ex: "<strong>Dịch nghĩa:</strong> Việc tìm kiếm một công việc đang trở nên <strong>ngày càng khó khăn</strong>.<br><strong>Phân tích:</strong><br>- Động từ 'becoming' (đang trở nên) báo hiệu <strong>So sánh tăng tiến</strong>.<br>- 'Difficult' là tính từ dài. Cấu trúc SS tăng tiến tính từ dài: <strong>more and more + Adj</strong> -> <strong>more and more difficult</strong>.<br><strong>Loại trừ:</strong><br>❌ more difficult and more difficult: Cấu trúc này dài dòng và sai ngữ pháp (chỉ lặp lại chữ 'more')." 
        },
        { 
            s: "BÀI 7", 
            q: "This is ________ man of all I've been known.", 
            a: "the best", 
            opts: ["the best", "good", "better", "best"], 
            ex: "<strong>Dịch nghĩa:</strong> Đây là người đàn ông tuyệt vời nhất trong số tất cả những người tôi từng biết.<br><strong>Phân tích:</strong><br>- Dấu hiệu kinh điển gộp 2 cái: <em>'of all'</em> (trong tất cả) và <em>'I have been known'</em> (tôi từng biết) -> Bắt buộc dùng <strong>So sánh nhất</strong>.<br>- Từ gốc 'good' -> So sánh nhất là <strong>the best</strong>. (Luôn nhớ phải có mạo từ 'the').<br><strong>Loại trừ:</strong><br>❌ best: Thiếu mạo từ 'the'.<br>❌ better: So sánh hơn, sai cấu trúc." 
        }
    ];

    let corrects = 0; let wrongs = 0;

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        quizData.forEach((item, idx) => {
            const shuffled = [...item.opts].sort(() => Math.random() - 0.5);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="section-tag">${item.s}</div>
                <div class="q-text">Question ${idx+1}: ${item.q}</div>
                <div class="options-grid" id="q${idx}-opts">
                    ${shuffled.map(o => `<button class="opt-btn" onclick="checkAnswer(${idx}, '${o.replace(/'/g, "\\'")}', this)">${o}</button>`).join('')}
                </div>
                <div class="explanation" id="exp${idx}">${item.ex}</div>
            `;
            container.appendChild(card);
        });
    }

    window.checkAnswer = (idx, choice, btn) => {
        const btns = document.querySelectorAll(`#q${idx}-opts button`);
        const correct = quizData[idx].a;
        btns.forEach(b => b.disabled = true);
        if(choice === correct) {
            btn.classList.add('correct'); corrects++; playSfx(true);
            confetti({ particleCount: 30, spread: 60, origin: { y: 0.8 }, colors: ['#94d2bd', '#005f73'] });
        } else {
            btn.classList.add('wrong'); wrongs++; playSfx(false);
            btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }
        document.getElementById(`exp${idx}`).style.display = 'block';
        document.getElementById('correct-count').innerText = corrects;
        document.getElementById('wrong-count').innerText = wrongs;
    }

    window.finishQuiz = () => {
        const modal = document.getElementById('modal');
        const score = Math.round((corrects / quizData.length) * 10);
        document.getElementById('modal-score').innerText = score + "/10";
        document.getElementById('modal-msg').innerText = score >= 8 ? "Em đã chinh phục đại dương kiến thức! 🔱" : "Hãy đọc kỹ giải thích của Ms Mai An để tiến bộ nhé! 🌊";
        modal.style.display = 'flex';
    }

    renderQuiz();
</script>
