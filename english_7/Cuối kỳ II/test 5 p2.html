<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Practice - Ms Mai An ULIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet"/>
<style>
/* ================= CSS VARIABLES & RESET ================= */
:root {
  --pastel-pink: #FFD1DC;
  --pastel-blue: #AEC6CF;
  --pastel-green: #77DD77;
  --pastel-purple: #CDB4DB;
  --pastel-yellow: #FDFD96;
  --glass-bg: rgba(255, 255, 255, 0.25);
  --glass-border: rgba(255, 255, 255, 0.5);
  --text-dark: #2C3E50;
  --correct: #27ae60;
  --wrong: #e74c3c;
  --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  overflow: hidden; /* Prevent full page scroll, use split screen scroll */
  background: linear-gradient(135deg, var(--pastel-pink), var(--pastel-blue), var(--pastel-purple), var(--pastel-yellow));
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
}
@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* GIAO DIỆN MÀN HÌNH KHÓA (GIỮ NGUYÊN) */
#passwordModal {
  position:fixed; inset:0; z-index:9999;
  display:flex; align-items:center; justify-content:center;
  background:rgba(5,2,15,0.92); backdrop-filter:blur(20px);
}
.pw-card {
  background:linear-gradient(160deg, rgba(40,10,70,0.95) 0%, rgba(15,5,30,0.98) 100%);
  border:1.5px solid rgba(240,192,64,0.4); border-radius:24px; padding:48px 40px 40px; 
  max-width:440px; width:93%; text-align:center; position:relative; overflow:hidden;
  box-shadow:0 0 60px rgba(106,5,114,0.6), 0 0 120px rgba(240,192,64,0.1), inset 0 1px 0 rgba(240,192,64,0.15);
}
.pw-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, #6A0572, #F0C040, #6A0572);
}
.pw-crest { font-size:4rem; margin-bottom:8px; display:block; }
.pw-title { font-family:'Playfair Display', serif; font-size:1.4rem; font-weight:700; color:#F0C040; margin-bottom:6px; letter-spacing:1px; }
.pw-sub   { font-size:.87rem; color:rgba(200,200,212,0.6); margin-bottom:24px; }
.pw-input {
  width:100%; padding:13px 20px; border-radius:12px;
  border:1.5px solid rgba(240,192,64,0.3); background:rgba(255,255,255,0.05);
  color:#FFE082; font-size:1rem; font-family:'Nunito', sans-serif;
  outline:none; letter-spacing:3px; text-align:center; transition:all .3s;
}
.pw-input:focus { border-color:#F0C040; box-shadow:0 0 0 3px rgba(240,192,64,0.15); }
.pw-input.error { border-color:#FF4757; box-shadow:0 0 0 3px rgba(255,71,87,0.25); animation:pwshake .4s ease; }
.pw-input::placeholder { color:rgba(200,200,212,0.3); letter-spacing:1px; }
.pw-btn {
  width:100%; padding:14px; margin-top:14px; border-radius:12px; border:none;
  background:linear-gradient(135deg, #6A0572 0%, #9B1FA8 40%, #F0C040 100%);
  color:#fff; font-size:1rem; font-weight:700; font-family:'Playfair Display', serif;
  cursor:pointer; letter-spacing:.5px; transition:transform .2s;
}
.pw-btn:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(106,5,114,0.7); }
.pw-err { color:#ff8a9a; font-size:.84rem; margin-top:10px; display:none; font-weight:700; }
@keyframes pwshake { 0%,100%{transform:translateX(0)} 15%,45%,75%{transform:translateX(-6px)} 30%,60%,90%{transform:translateX(6px)} }

/* ================= FLOATING PATTERN SVG ================= */
#bg-pattern {
  position: fixed; inset: 0; z-index: -1; opacity: 0.4; pointer-events: none;
  background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2) 0%, transparent 60%);
}

/* ================= SPLIT SCREEN LAYOUT ================= */
#mainContent {
  display: flex; height: 100vh; width: 100vw; position: relative; z-index: 1;
}
.split-pane {
  flex: 1; height: 100%; overflow-y: auto; padding: 20px;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.6) transparent;
}
.split-pane::-webkit-scrollbar { width: 8px; }
.split-pane::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.6); border-radius: 4px; }
.left-pane { border-right: 2px solid var(--glass-border); }
.right-pane { padding-bottom: 80px; }

@media (max-width: 900px) {
  #mainContent { flex-direction: column; }
  .left-pane { border-right: none; border-bottom: 2px solid var(--glass-border); height: 40vh; }
  .right-pane { height: 60vh; }
}

/* ================= GLASSMORPHISM COMPONENTS ================= */
.glass-card {
  background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border); border-radius: 20px;
  padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow);
}
header.glass-card {
  text-align: center; padding: 15px; margin-bottom: 20px; position: relative;
}
.header-teacher { font-size: 0.85rem; font-weight: 700; color: #5D4037; text-transform: uppercase; letter-spacing: 1px;}
.header-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #2C3E50; font-weight: 800; margin-top: 5px;}

/* ================= READING PASSAGE ================= */
.passage-title {
  font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #8E44AD;
  margin-bottom: 12px; border-bottom: 2px dashed rgba(142,68,173,0.3); padding-bottom: 8px;
}
.paragraph-box { margin-bottom: 16px; font-size: 1.1rem; line-height: 1.7; color: #34495E; font-weight: 600;}
.trans-btn {
  background: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.6);
  border-radius: 12px; padding: 6px 12px; font-size: 0.85rem; font-weight: 700;
  color: #2980B9; cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.trans-btn:hover { background: rgba(255,255,255,0.8); transform: translateY(-2px); }
.trans-content {
  display: none; background: rgba(236, 240, 241, 0.6); border-left: 4px solid #3498DB;
  padding: 10px 14px; margin-top: 10px; border-radius: 0 10px 10px 0;
  font-size: 1rem; color: #2C3E50; font-weight: 600;
}
.trans-content.show { display: block; animation: fadeIn 0.3s ease; }

/* ================= GLOSSARY ================= */
.glossary-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: rgba(255,255,255,0.3); border-radius: 12px; overflow: hidden; }
.glossary-table th { background: rgba(142,68,173,0.2); text-align: left; padding: 10px; font-weight: 800; color: #8E44AD; }
.glossary-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.4); font-weight: 600; }
.g-word { color: #2980B9; font-weight: 700; }
.g-pos { color: #D35400; font-style: italic; font-size: 0.9rem; }

/* ================= QUIZ UI ================= */
.q-number {
  display: inline-block; background: #8E44AD; color: #fff; width: 30px; height: 30px;
  line-height: 30px; text-align: center; border-radius: 50%; font-weight: 800; margin-right: 8px;
  box-shadow: 0 4px 10px rgba(142,68,173,0.3);
}
.q-text { font-size: 1.15rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center;}
.options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
.opt-btn {
  background: rgba(255,255,255,0.5); border: 2px solid rgba(255,255,255,0.7);
  border-radius: 16px; padding: 14px 20px; font-size: 1.05rem; font-weight: 700; font-family: 'Nunito', sans-serif;
  color: #2C3E50; cursor: pointer; transition: all 0.2s; text-align: left;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; overflow: hidden;
}
.opt-btn:hover:not(:disabled) { background: rgba(255,255,255,0.8); transform: translateY(-3px); border-color: #8E44AD; }
.opt-btn:active:not(:disabled) { transform: translateY(0); }
.opt-btn:disabled { cursor: default; opacity: 0.8; }
.opt-btn.correct {
  background: #E8F8F5 !important; border-color: var(--correct) !important; color: #1E8449 !important;
  box-shadow: 0 0 20px rgba(46, 204, 113, 0.4) !important;
}
.opt-btn.wrong {
  background: #FDEDEC !important; border-color: var(--wrong) !important; color: #C0392B !important;
  box-shadow: 0 0 20px rgba(231, 76, 60, 0.4) !important;
}
.opt-btn.reveal { background: #E8F8F5 !important; border-color: var(--correct) !important; border-style: dashed; }

@keyframes shakeBtn {
  0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);}
}
.shake { animation: shakeBtn 0.3s ease; }

/* ================= EXPLANATIONS ================= */
.expl-box {
  background: rgba(255,255,255,0.6); border-radius: 16px; padding: 20px; margin-top: 20px;
  border-left: 5px solid #F39C12; display: none; font-size: 1.05rem; line-height: 1.6;
}
.expl-box.show { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(-10px);} to{opacity:1; transform:translateY(0);} }
.expl-title { font-family: 'Playfair Display', serif; color: #D35400; font-weight: 800; font-size: 1.1rem; margin-bottom: 12px;}
.expl-step { margin-bottom: 12px; }

/* THE MASTER COLOR SYSTEM */
.p-word { color: #2980B9; font-weight: 800; }
.p-mean { color: #D35400; font-weight: 700; }
.p-grammar { color: #C0392B; font-weight: 800; text-decoration: underline; text-decoration-color: #E74C3C; text-decoration-style: solid; text-underline-offset: 3px;}
.hl-green { color: #27AE60; font-weight: 800; }
.hl-red { color: #C0392B; font-weight: 800; text-decoration: line-through; }

/* ================= SUBMIT & MODALS ================= */
.submit-btn {
  display: block; width: 100%; padding: 18px; margin-top: 30px; border-radius: 50px;
  background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%);
  color: #fff; font-size: 1.2rem; font-weight: 800; font-family: 'Nunito', sans-serif;
  border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(255,154,158,0.4);
  transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px;
}
.submit-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 25px rgba(255,154,158,0.6); }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
  display: none; place-items: center; z-index: 1000;
}
.modal-overlay.active { display: grid; animation: fadeIn 0.3s ease; }
.modal-content {
  background: rgba(255,255,255,0.95); border-radius: 24px; padding: 40px 30px;
  width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
.m-title { font-size: 1.5rem; color: #8E44AD; font-weight: 800; margin-bottom: 20px; }
.m-input {
  width: 100%; padding: 15px; border: 2px solid #D7BDE2; border-radius: 12px;
  font-size: 1.1rem; font-family: 'Nunito', sans-serif; margin-bottom: 10px; outline: none;
}
.m-input:focus { border-color: #8E44AD; }
.m-btn {
  width: 100%; padding: 14px; background: #8E44AD; color: #fff; border: none;
  border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer; margin-top: 10px;
}
.score-text { font-size: 3.5rem; font-weight: 800; color: #27AE60; margin: 15px 0; font-family: 'Playfair Display', serif;}
.m-gif { width: 100%; border-radius: 16px; margin: 15px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1);}

/* CONFETTI */
#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
</style>
</head>
<body>

<div id="passwordModal">
  <div class="pw-card">
    <span class="pw-crest">🔒</span>
    <div class="pw-title">BẢO MẬT</div>
    <div class="pw-sub">Vui lòng nhập mật khẩu để làm bài</div>
    <input type="password" class="pw-input" id="pwInput" placeholder="Nhập mật khẩu..." autocomplete="off" />
    <button class="pw-btn" onclick="checkPassword()">XÁC NHẬN</button>
    <div class="pw-err" id="pwErr">Mật khẩu không đúng! Vui lòng thử lại.</div>
  </div>
</div>

<script>
// Mật khẩu: "cogangdatdiemcao"
const _k  = [99, 111, 103, 97, 110, 103, 100, 97, 116, 100, 105, 101, 109, 99, 97, 111]; 
const _pw = _k.map(c => String.fromCharCode(c)).join('');

function checkPassword() {
  const inp = document.getElementById('pwInput');
  const err = document.getElementById('pwErr');
  if (inp.value === _pw) {
    document.getElementById('passwordModal').style.display = 'none';
    document.getElementById('mainContent').style.display = 'flex';
  } else {
    inp.classList.remove('error'); void inp.offsetWidth; inp.classList.add('error');
    err.style.display = 'block'; setTimeout(() => inp.classList.remove('error'), 500);
  }
}
document.addEventListener('DOMContentLoaded', () => {
  const pwInput = document.getElementById('pwInput');
  if(pwInput) pwInput.addEventListener('keydown', e => { if (e.key==='Enter') checkPassword(); });
});
</script>

<div id="mainContent" style="display:none;">
  
  <div id="bg-pattern">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="emojiPat" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
          <text x="30" y="40" font-size="24" opacity="0.6">🌍</text>
          <text x="120" y="80" font-size="28" opacity="0.5">✈️</text>
          <text x="50" y="150" font-size="26" opacity="0.6">📚</text>
          <text x="160" y="180" font-size="24" opacity="0.5">🏔️</text>
          <text x="10" y="190" font-size="22" opacity="0.7">🐱</text>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#emojiPat)" />
    </svg>
  </div>
  <canvas id="confetti"></canvas>

  <div class="split-pane left-pane" id="leftPane">
    <header class="glass-card">
      <div class="header-teacher">✨ Giáo viên tạo: Ms Mai An ULIS ✨</div>
      <div class="header-title">Master Reading Skills</div>
    </header>
    <div id="readings-container"></div>
  </div>

  <div class="split-pane right-pane" id="rightPane">
    <div id="quiz-container"></div>
    <button class="submit-btn" onclick="openNameModal()">🎯 NỘP BÀI TÍNH ĐIỂM & XEM KẾT QUẢ</button>
  </div>

</div>

<div class="modal-overlay" id="nameModal">
  <div class="modal-content">
    <div class="m-title">📝 Ghi Danh Bảng Vàng</div>
    <input type="text" class="m-input" id="studentName" placeholder="Nhập tên của bạn..." maxlength="40" onkeydown="if(event.key==='Enter')submitQuiz()"/>
    <div id="nameErr" style="color:red; font-size:0.9rem; margin-bottom:10px; display:none;">Vui lòng nhập tên!</div>
    <button class="m-btn" onclick="submitQuiz()">Xác Nhận Nộp Bài</button>
  </div>
</div>

<div class="modal-overlay" id="resultModal">
  <div class="modal-content">
    <div class="m-title" id="rGreeting"></div>
    <div class="score-text" id="rScore"></div>
    <img id="rGif" class="m-gif" src="" alt="Result GIF"/>
    <div style="font-size:1.1rem; font-weight:700; color:#34495E; margin-bottom:15px;" id="rComment"></div>
    <button class="m-btn" onclick="location.reload()">Làm Lại Lần Nữa 🔄</button>
  </div>
</div>

<script>
// ==================== DỮ LIỆU BÀI ĐỌC ====================
const READINGS = [
  {
    id: "p1",
    title: "SAPA TREKKING TOUR VIET NAM",
    paragraphs: [
      {
        en: "A three-day walk of 20 kilometres a day through the mountains (13) ____ the north of VN. Enjoy some of (14) ____ scenery.",
        vi: "Chuyến đi bộ ba ngày, 20 kilomet mỗi ngày qua những ngọn núi ở phía bắc Việt Nam. Thưởng thức một vài phong cảnh tuyệt đẹp."
      },
      {
        en: "Stay with local people (15) ____ about their culture and (16) ____ local food. Price: $80/ person",
        vi: "Ở lại với người dân địa phương để tìm hiểu về văn hóa của họ và thưởng thức ẩm thực địa phương. Giá: $80/ người."
      }
    ],
    glossary: [
      {w: "Trekking", p: "n", v: "Đi bộ đường dài dã ngoại"},
      {w: "Mountain", p: "n", v: "Ngọn núi"},
      {w: "Scenery", p: "n", v: "Phong cảnh, cảnh vật"},
      {w: "Local", p: "adj", v: "Thuộc về địa phương"},
      {w: "Culture", p: "n", v: "Văn hóa"},
      {w: "Enjoy", p: "v", v: "Thưởng thức, tận hưởng"},
      {w: "Stay", p: "v", v: "Ở lại, lưu trú"},
      {w: "Food", p: "n", v: "Thức ăn, ẩm thực"},
      {w: "Price", p: "n", v: "Giá cả"},
      {w: "Walk", p: "n", v: "Chuyến đi bộ"}
    ]
  },
  {
    id: "p2",
    title: "The Importance of Learning English",
    paragraphs: [
      {
        en: "English is one of the most widely spoken languages in the world. Many people learn English because it is useful for travel, work, and communication. Learning English (19) ______ students more opportunities in the future.",
        vi: "Tiếng Anh là một trong những ngôn ngữ được nói rộng rãi nhất trên thế giới. Nhiều người học tiếng Anh vì nó hữu ích cho việc đi lại, công việc và giao tiếp. Việc học tiếng Anh mang lại cho học sinh nhiều cơ hội hơn trong tương lai."
      },
      {
        en: "There are many ways to improve English skills. Some people take classes, while others practice by watching English movies (20) ______ listening to English songs. Reading books and speaking with native speakers (21) ______ also good ways to learn.",
        vi: "Có nhiều cách để cải thiện kỹ năng tiếng Anh. Một số người tham gia lớp học, trong khi những người khác luyện tập bằng cách xem phim tiếng Anh và nghe các bài hát tiếng Anh. Đọc sách và nói chuyện với người bản xứ cũng là những cách học tốt."
      },
      {
        en: "Nowadays, technology makes learning English easier. There are many apps and websites that help learners practice grammar, vocabulary, and pronunciation. People can also join online courses (22) ______ they can study from anywhere in the world.",

      },
      {

      }
    ],
    glossary: [
      {w: "Widely", p: "adv", v: "Một cách rộng rãi"},
      {w: "Communication", p: "n", v: "Sự giao tiếp"},
      {w: "Opportunity", p: "n", v: "Cơ hội"},
      {w: "Improve", p: "v", v: "Cải thiện, nâng cao"},
      {w: "Native speaker", p: "n", v: "Người bản xứ"},
      {w: "Pronunciation", p: "n", v: "Sự phát âm"},
      {w: "Vocabulary", p: "n", v: "Từ vựng"},
      {w: "Effort", p: "n", v: "Sự nỗ lực, cố gắng"},
      {w: "Rewarding", p: "adj", v: "Đáng giá, bổ ích"},
      {w: "Explore", p: "v", v: "Khám phá"}
    ]
  },
  {
    id: "p3",
    title: "A Trip to Da Nang",
    paragraphs: [
      {
        en: "Last weekend, Minh and his family visited Da Nang, one of the most beautiful and environmentally friendly cities in Vietnam. They were very impressed by the clean streets, modern buildings, and fresh air.",
        vi: "Cuối tuần trước, Minh và gia đình đã đến thăm Đà Nẵng, một trong những thành phố đẹp và thân thiện với môi trường nhất ở Việt Nam. Họ rất ấn tượng bởi những con đường sạch sẽ, các tòa nhà hiện đại và không khí trong lành."

// ==================== HỆ THỐNG XỬ LÝ (JS) ====================
let answeredCount = 0;
let correctCount = 0;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// 1. Render Left Pane (Readings & Glossary)
const leftPane = document.getElementById("readings-container");
READINGS.forEach((read, index) => {
  let pHTML = '';
  read.paragraphs.forEach((p, i) => {
    pHTML += `
      <div class="paragraph-box">
        ${p.en}
        <button class="trans-btn" onclick="toggleTrans('${read.id}_p${i}')">Mở dịch đoạn này 🌟</button>
        <div class="trans-content" id="${read.id}_p${i}">${p.vi}</div>
      </div>
    `;
  });

  let gHTML = `<table class="glossary-table">
    <tr><th>Vocabulary (Từ vựng)</th><th>Type</th><th>Meaning (Nghĩa)</th></tr>`;
  read.glossary.forEach(g => {

  leftPane.innerHTML += `

});

// 3. Xử lý Trả lời & Âm thanh
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

function playTone(frequency, type, duration) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  oscillator.type = type;
  oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
  gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  oscillator.start();
  oscillator.stop(audioCtx.currentTime + duration);
}

function checkAns(btn, qid, selected, correct) {
  const grid = document.getElementById(`qgrid-${qid}`);
  const buttons = grid.querySelectorAll('button');
  
  // Disable all buttons in this grid
  buttons.forEach(b => b.disabled = true);
  answeredCount++;

  if (selected === correct) {
    btn.classList.add("correct");
    correctCount++;
    playTone(800, 'sine', 0.1); setTimeout(()=>playTone(1200, 'sine', 0.2), 100); // Ding
    shootConfetti();
  } else {
    btn.classList.add("wrong", "shake");
    playTone(300, 'sawtooth', 0.15); setTimeout(()=>playTone(200, 'sawtooth', 0.2), 150); // Ting ting
    // Highlight correct answer
    buttons.forEach(b => {
      if(b.textContent === correct) b.classList.add("reveal");
    });
  }

  // Show explanation
  document.getElementById(`expl-${qid}`).classList.add("show");
}

// 4. Confetti (Pháo hoa)
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
let particles = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function shootConfetti() {
  const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d'];
  for(let i=0; i<30; i++){
    particles.push({
      x: window.innerWidth/2, y: window.innerHeight/2,
      vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20 - 5,
      size: Math.random()*10 + 5,
      color: colors[Math.floor(Math.random()*colors.length)],
      life: 1
    });
  }
  if(particles.length <= 30) loopConfetti();
}

function loopConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach((p, i) => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.life -= 0.02;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    if(p.life <= 0) particles.splice(i, 1);
  });
  if(particles.length > 0) requestAnimationFrame(loopConfetti);
  else ctx.clearRect(0,0, canvas.width, canvas.height);
}
