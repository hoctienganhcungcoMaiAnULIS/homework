<script>
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

function playTone(freq, type, duration, vol) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
}
function playCorrect() { playTone(600, 'sine', 0.1, 0.3); setTimeout(() => playTone(800, 'sine', 0.2, 0.3), 100); }
function playWrong() { playTone(300, 'sawtooth', 0.3, 0.2); setTimeout(() => playTone(200, 'sawtooth', 0.4, 0.2), 150); }

function shootConfetti() {
    const container = document.getElementById('confetti-container');
    const colors = ['#FF4757', '#FDCB6E', '#00D26A', '#00C9A7', '#8854C0', '#ffffff'];
    for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div'); piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw'; piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (Math.random() * 2 + 1) + 's'; piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        container.appendChild(piece); setTimeout(() => piece.remove(), 3000);
    }
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; }
    return array;
}

// ---------------- DỮ LIỆU ĐẦY ĐỦ 38 CÂU (KHÔNG CẮT XÉN) ----------------
const quizData = [
    // --- PHẦN VI (10 CÂU) ---
    { section: "VI. Write the correct tense or form of the verbs in brackets.", question: "1. In 1947 pilot Kenneth Arnold ______ (spot) nine shiny, unidentified flying objects flying past Mount Rainier.", options: [{text: "spotted", isCorrect: true}, {text: "spots", isCorrect: false}, {text: "has spotted", isCorrect: false}, {text: "was spotting", isCorrect: false}],
      explanation: "<h4>GIẢI THÍCH CHI TIẾT:</h4><ul><li><b>1. Dịch:</b> Năm 1947, phi công Kenneth Arnold đã phát hiện 9 vật thể bay lạ.</li><li><b>2. Nghĩa 4 đáp án:</b> A. spotted (Quá khứ đơn), B. spots (Hiện tại đơn), C. has spotted (Hiện tại hoàn thành), D. was spotting (Quá khứ tiếp diễn).</li><li><b>3. Tại sao chọn 'spotted'?</b> Có mốc thời gian rõ ràng trong quá khứ 'In 1947' -> Dùng Quá khứ đơn.</li><li><b>4. Tại sao sai?</b> Các thì còn lại không phù hợp với hành động đã chấm dứt hoàn toàn ở một năm cụ thể. Hành động 'spot' (phát hiện) là tức thời, không dùng tiếp diễn.</li></ul>"
    },
    { section: "VI. Write the correct tense or form of the verbs in brackets.", question: "2. I wondered if a giant asteroid ______ (hit) Earth in the future.", options: [{text: "would hit", isCorrect: true}, {text: "will hit", isCorrect: false}, {text: "hit", isCorrect: false}, {text: "hits", isCorrect: false}],
      explanation: "<h4>GIẢI THÍCH CHI TIẾT:</h4><ul><li><b>1. Dịch:</b> Tôi tự hỏi liệu một tiểu hành tinh khổng lồ có đâm vào Trái Đất trong tương lai không.</li><li><b>2. Nghĩa 4 đáp án:</b> A. would hit (Tương lai trong quá khứ), B. will hit (Tương lai đơn), C. hit (Quá khứ đơn), D. hits (Hiện tại đơn).</li><li><b>3. Tại sao chọn 'would hit'?</b> Động từ tường thuật 'wondered' ở quá khứ, nên động từ ở mệnh đề sau phải lùi thì. 'in the future' đáng lẽ dùng 'will hit', lùi thành 'would hit'.</li><li><b>4. Tại sao sai?</b> B chưa lùi thì. C, D không mang nghĩa tương lai.</li></ul>"
    },
    { section: "VI. Write the correct tense or form of the verbs in brackets.", question: "3. Sue asked her teacher how long it ______ (take) to travel to Mars.", options: [{text: "took", isCorrect: true}, {text: "takes", isCorrect: false}, {text: "is taking", isCorrect: false}, {text: "has taken", isCorrect: false}],
      explanation: "<h4>GIẢI THÍCH CHI TIẾT:</h4><ul><li><b>1. Dịch:</b> Sue hỏi giáo viên mất bao lâu để đến Sao Hỏa.</li><li><b>2. Phân tích:</b> A. took (QK đơn), B. takes (HT đơn), C. is taking (HT tiếp diễn), D. has taken (HT hoàn thành).</li><li><b>3. Tại sao đúng:</b> Câu gián tiếp, động từ tường thuật 'asked' ở quá khứ -> Lùi thì Hiện tại đơn 'takes' thành Quá khứ đơn 'took'.</li><li><b>4. Tại sao sai:</b> Các đáp án B, C, D đều chưa tuân thủ quy tắc lùi thì của câu gián tiếp.</li></ul>"
    },
    { section: "VI. Write the correct tense or form of the verbs in brackets.", question: "4. Almost the same as Earth, a day on Mars ______ (have) 24 hours, 39 minutes and 35 seconds.", options: [{text: "has", isCorrect: true}, {text: "have", isCorrect: false}, {text: "had", isCorrect: false}, {text: "is having", isCorrect: false}],
      explanation: "<h4>GIẢI THÍCH CHI TIẾT:</h4><ul><li><b>1. Dịch:</b> Gần giống Trái Đất, một ngày trên Sao Hỏa có 24 giờ, 39 phút và 35 giây.</li><li><b>2. Phân tích:</b> A. has (có - số ít), B. have (có - số nhiều), C. had (đã có), D. is having (đang có).</li><li><b>3. Tại sao đúng:</b> Diễn tả một sự thật hiển nhiên (fact) -> Dùng Hiện tại đơn. Chủ ngữ 'a day' số ít -> dùng 'has'.</li><li><b>4. Tại sao sai:</b> B sai chủ vị. C sai vì đây là sự thật không phải chuyện quá khứ. D sai vì 'have' mang nghĩa sở hữu không dùng tiếp diễn.</li></ul>"
    },
    { section: "VI. Write the correct tense or form of the verbs in brackets.", question: "5. Nick phoned me and said two black silent UFOs ______ (hover) above his back garden then.", options: [{text: "were hovering", isCorrect: true}, {text: "are hovering", isCorrect: false}, {text: "hovered", isCorrect: false}, {text: "have hovered", isCorrect: false}],
      explanation: "<h4>GIẢI THÍCH CHI TIẾT:</h4><ul><li><b>1. Dịch:</b> Nick gọi tôi và nói rằng có hai UFO màu đen đang lơ lửng trên vườn lúc đó.</li><li><b>2. Phân tích:</b> A. were hovering (QKTD), B. are hovering (HTTD), C. hovered (QKĐ), D. have hovered (HTHT).</li><li><b>3. Tại sao đúng:</b> Có từ 'then' (lúc đó - chuyển từ 'now'). Câu gián tiếp lùi thì từ HTTD sang QKTD. Chủ ngữ 'UFOs' số nhiều -> 'were hovering'.</li><li><b>4. Tại sao sai:</b> B chưa lùi thì. C không diễn tả tính đang xảy ra. D sai thì.</li></ul>"
    },
    { section: "VI. Write the correct tense or form of the verbs in brackets.", question: "6. Captain Ray Bowyer gained clear views of two UFOs when he ______ (fly) in the English Channel.", options: [{text: "was flying", isCorrect: true}, {text: "flew", isCorrect: false}, {text: "flies", isCorrect: false}, {text: "has flown", isCorrect: false}],
      explanation: "<h4>GIẢI THÍCH CHI TIẾT:</h4><ul><li><b>1. Dịch:</b> Cơ trưởng Ray có góc nhìn rõ 2 UFO khi ông đang bay qua eo biển Manche.</li><li><b>2. Phân tích:</b> A. was flying (đang bay), B. flew (đã bay), C. flies (bay), D. has flown (đã bay).</li><li><b>3. Tại sao đúng:</b> Diễn tả hành động đang xảy ra trong quá khứ (đang bay) thì có hành động khác xen vào (nhìn thấy UFO). Dùng Quá khứ tiếp diễn.</li><li><b>4. Tại sao sai:</b> Các thì còn lại không diễn tả được tính tiếp diễn 'đang xảy ra' trong quá khứ.</li></ul>"
    },
    { section: "VI. Write the correct tense or form of the verbs in brackets.", question: "7. NASA is planning ______ (launch) two new scientific missions to Venus.", options: [{text: "to launch", isCorrect: true}, {text: "launching", isCorrect: false}, {text: "launched", isCorrect: false}, {text: "launch", isCorrect: false}],
      explanation: "<h4>GIẢI THÍCH CHI TIẾT:</h4><ul><li><b>1. Dịch:</b> NASA đang lên kế hoạch phóng hai sứ mệnh khoa học mới tới Sao Kim.</li><li><b>2. Phân tích:</b> A. to launch (để phóng), B. launching (việc phóng), C. launched (đã phóng), D. launch (phóng).</li><li><b>3. Tại sao đúng:</b> Cấu trúc cố định: 'plan + to V' (lên kế hoạch làm gì).</li><li><b>4. Tại sao sai:</b> Các dạng V-ing, V-ed, V-nguyên thể đều sai cấu trúc của động từ 'plan'.</li></ul>"
    },
    { section: "VI. Write the correct tense or form of the verbs in brackets.", question: "8. What ______ (happen) if we discovered a message from an alien planet?", options: [{text: "would happen", isCorrect: true}, {text: "will happen", isCorrect: false}, {text: "happens", isCorrect: false}, {text: "happened", isCorrect: false}],
      explanation: "<h4>GIẢI THÍCH CHI TIẾT:</h4><ul><li><b>1. Dịch:</b> Điều gì sẽ xảy ra nếu chúng ta phát hiện ra một thông điệp từ hành tinh ngoài hành tinh?</li><li><b>2. Phân tích:</b> A. would happen, B. will happen, C. happens, D. happened.</li><li><b>3. Tại sao đúng:</b> Mệnh đề If dùng thì Quá khứ đơn 'discovered' -> Đây là Câu điều kiện loại 2 (giả định không có thật). Mệnh đề chính dùng 'would + V'.</li><li><b>4. Tại sao sai:</b> B, C dùng cho loại 1. D sai cấu trúc mệnh đề chính câu đk.</li></ul>"
    },
    { section: "VI. Write the correct tense or form of the verbs in brackets.", question: "9. They managed to stop the commander from ______ (destroy) Earth.", options: [{text: "destroying", isCorrect: true}, {text: "destroy", isCorrect: false}, {text: "to destroy", isCorrect: false}, {text: "destroyed", isCorrect: false}],
      explanation: "<h4>GIẢI THÍCH CHI TIẾT:</h4><ul><li><b>1. Dịch:</b> Họ đã xoay sở ngăn chặn người chỉ huy khỏi việc tiêu diệt Trái Đất.</li><li><b>2. Phân tích:</b> A. destroying (V-ing), B. destroy (V-infinitive), C. to destroy (to V), D. destroyed (V-ed).</li><li><b>3. Tại sao đúng:</b> Cấu trúc: 'stop somebody from + V-ing' (Ngăn cản ai đó làm gì).</li><li><b>4. Tại sao sai:</b> Giới từ 'from' bắt buộc đi với V-ing, các dạng khác đều vi phạm ngữ pháp.</li></ul>"
    },
    { section: "VI. Write the correct tense or form of the verbs in brackets.", question: "10. NASA hope they ______ (be) able to send people to Mars by 2030.", options: [{text: "will be", isCorrect: true}, {text: "are", isCorrect: false}, {text: "were", isCorrect: false}, {text: "would be", isCorrect: false}],
      explanation: "<h4>GIẢI THÍCH CHI TIẾT:</h4><ul><li><b>1. Dịch:</b> NASA hi vọng họ sẽ có thể đưa con người lên Sao Hỏa trước năm 2030.</li><li><b>2. Phân tích:</b> A. will be (sẽ), B. are (hiện tại), C. were (quá khứ), D. would be (sẽ - lùi thì).</li><li><b>3. Tại sao đúng:</b> Mốc thời gian 'by 2030' (tương lai) và động từ 'hope' (hiện tại) -> Dùng thì Tương lai đơn 'will be'.</li><li><b>4. Tại sao sai:</b> B, C sai thì. D chỉ dùng khi câu tường thuật ở quá khứ (hoped).</li></ul>"
    },

    // --- PHẦN VII (10 CÂU) ---
    { section: "VII. Supply the correct form of the words in brackets.", question: "1. The Saturn V is the largest and the most ______ rocket ever made. (power)", options: [{text: "powerful", isCorrect: true}, {text: "powerless", isCorrect: false}, {text: "powerfully", isCorrect: false}, {text: "power", isCorrect: false}],
      explanation: "<h4>GIẢI THÍCH CHI TIẾT:</h4><ul><li><b>1. Dịch:</b> Saturn V là tên lửa lớn nhất và mạnh mẽ nhất từng được chế tạo.</li><li><b>2. Nghĩa:</b> A. powerful (mạnh mẽ), B. powerless (yếu đuối/bất lực), C. powerfully (một cách mạnh mẽ), D. power (sức mạnh).</li><li><b>3. Tại sao đúng:</b> Sau 'the most' cần Tính từ bổ nghĩa cho 'rocket'. Nghĩa tích cực -> powerful.</li><li><b>4. Tại sao sai:</b> B sai nghĩa. C là trạng từ. D là danh từ.</li></ul>"
    },
    { section: "VII. Supply the correct form of the words in brackets.", question: "2. How long ago did humans first ______ the Earth? (habitable)", options: [{text: "inhabit", isCorrect: true}, {text: "habitat", isCorrect: false}, {text: "habitation", isCorrect: false}, {text: "habitable", isCorrect: false}],

let currentScore = 0;
let answeredQuestions = 0;

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    quizData.forEach((q, index) => {
        const shuffledOptions = shuffleArray([...q.options]);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="section-title">${q.section}</div>
            <div class="question-text">${q.question}</div>
            <div class="options-grid" id="options-${index}">
                ${shuffledOptions.map((opt, optIndex) => `
                    <button class="option-btn" onclick="handleAnswer(this, ${index}, ${opt.isCorrect})">
                        ${String.fromCharCode(65 + optIndex)}. ${opt.text}
                    </button>
                `).join('')}
            </div>
            <div class="explanation" id="expl-${index}">${q.explanation}</div>
        `;
        container.appendChild(card);
    });
}

function handleAnswer(button, questionIndex, isCorrect) {
    if (button.disabled) return;
    const optionsGrid = document.getElementById(`options-${questionIndex}`);
    const explanation = document.getElementById(`expl-${questionIndex}`);
    const allButtons = optionsGrid.querySelectorAll('.option-btn');
    
    allButtons.forEach(btn => btn.disabled = true);

    if (isCorrect) {
        button.classList.add('correct'); playCorrect(); shootConfetti();
        currentScore++; document.getElementById('score').innerText = currentScore;
    } else {
        button.classList.add('wrong', 'shake'); playWrong();
        allButtons.forEach(btn => {
            const origOpt = quizData[questionIndex].options.find(o => o.text === btn.innerText.substring(3));
            if(origOpt && origOpt.isCorrect) btn.classList.add('correct');
        });
    }
    explanation.style.display = 'block';
    answeredQuestions++;
}

function showFinalScore() {
    const overlay = document.getElementById('popup-overlay');
    const msg = document.getElementById('popup-message');
    let percent = (currentScore / quizData.length) * 100;
    
    if (percent === 100) { msg.innerText = `Đúng ${currentScore}/${quizData.length}. Bạn là một thiên tài Tiếng Anh!`; shootConfetti(); playCorrect(); } 
    else if (percent >= 70) { msg.innerText = `Đúng ${currentScore}/${quizData.length}. Chỉ một chút nữa thôi là hoàn hảo!`; playCorrect(); } 
    else { msg.innerText = `Bạn đúng ${currentScore}/${quizData.length}. Hãy đọc kỹ phần giải thích bên dưới nhé!`; }
    
    overlay.style.display = 'flex';
}

function closePopup() { document.getElementById('popup-overlay').style.display = 'none'; }
window.onload = renderQuiz;
</script>
