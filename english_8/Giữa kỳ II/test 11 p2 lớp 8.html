<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamified English Quiz - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #FDCB6E;
            --tertiary: #00C9A7;
            --success: #00D26A;
            --danger: #FF4757;
            --bg-glass: rgba(255, 255, 255, 0.75);
            --border-glass: rgba(255, 255, 255, 0.5);
            --text-main: #2D3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text-main);
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--tertiary), #FF9FF3);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 600'><text x='50' y='100' font-size='30' opacity='0.3'>🌪️</text><text x='700' y='50' font-size='40' opacity='0.3'>🛒</text><text x='150' y='500' font-size='35' opacity='0.3'>🌍</text><text x='400' y='300' font-size='25' opacity='0.3'>📚</text><text x='600' y='450' font-size='30' opacity='0.3'>🛍️</text><text x='300' y='150' font-size='40' opacity='0.3'>☁️</text></svg>");
            background-size: cover;
            opacity: 0.6;
            animation: floatSVG 20s linear infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatSVG {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(-30px) scale(1.05); }
        }

        .top-bar {
            height: 70px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #4A235A;
            background: rgba(255,255,255,0.6);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .timer-display {
            font-size: 1.5rem;
            font-weight: 700;
            color: #d63031;
            background: #fff;
            padding: 5px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            min-width: 110px;
            text-align: center;
        }

        .btn-timer {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 0 #5f3a8c;
            transition: all 0.2s;
        }

        .btn-timer:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #5f3a8c;
        }

        .split-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 70px);
            z-index: 10;
            gap: 20px;
            padding: 20px;
        }

        .pane {
            flex: 1;
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid var(--border-glass);
            border-radius: 24px;
            padding: 25px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(136, 84, 192, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(136, 84, 192, 0.7); }

        .passage-block {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .paragraph {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 15px;
            text-align: justify;
        }

        .btn-translate {
            background: #ffeaa7;
            color: #d35400;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #f39c12;
            margin-bottom: 15px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-translate:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #f39c12;
        }

        .translation-box {
            display: none;
            background: #e8f8f5;
            border-left: 4px solid var(--tertiary);
            padding: 15px;
            border-radius: 8px;
            font-size: 1.05rem;
            color: #16a085;
            margin-bottom: 20px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        .glossary-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 15px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .glossary-table th {
            background: var(--primary);
            color: white;
            padding: 12px;
            font-size: 1rem;
        }
        .glossary-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }
        .glossary-table tr:last-child td { border-bottom: none; }
        .glossary-table tr:hover { background-color: #f9f9f9; }

        .question-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.05);
            border: 2px solid #f1f2f6;
            transition: transform 0.2s;
        }
        .question-card:hover { transform: translateY(-2px); }

        .question-text {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: #f1f2f6;
            border: 2px solid #dfe4ea;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #2f3542;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 5px 0 #dfe4ea;
            transition: all 0.2s;
            position: relative;
        }

        .option-btn:hover:not(.disabled) {
            transform: translateY(-3px) scale(1.02);
            background: #eccc68;
            border-color: #ffa502;
            box-shadow: 0 8px 0 #ffa502;
        }

        .option-btn:active:not(.disabled) {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #ffa502;
        }

        .option-btn.correct {
            background: var(--success) !important;
            color: white;
            border-color: #00b85c !important;
            box-shadow: 0 5px 0 #00b85c !important;
        }

        .option-btn.wrong {
            background: var(--danger) !important;
            color: white;
            border-color: #ff3838 !important;
            box-shadow: 0 5px 0 #ff3838 !important;
        }

        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .explanation-box {
            display: none;
            margin-top: 20px;
            background: #f8f9fa;
            border: 2px dashed #a4b0be;
            border-radius: 12px;
            padding: 15px;
            font-size: 1rem;
            line-height: 1.6;
            animation: fadeIn 0.4s ease;
        }

        .explanation-box.show { display: block; }

        .explain-title {
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .submit-container {
            text-align: center;
            margin-top: 30px;
            padding-bottom: 20px;
        }

        .btn-submit {
            background: linear-gradient(45deg, #FF9FF3, #feca57);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 0 #e58e26;
            transition: all 0.2s;
        }

        .btn-submit:hover { transform: scale(1.05) translateY(-3px); }
        .btn-submit:active { transform: scale(1) translateY(5px); box-shadow: 0 3px 0 #e58e26; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-title { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
        .modal-score { font-size: 4rem; font-weight: 800; color: var(--success); margin: 20px 0; }
        .modal-message { font-size: 1.2rem; color: #576574; margin-bottom: 30px; }
        .btn-restart {
            background: var(--tertiary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 0 #009688;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        .shake { animation: shakeAnim 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        #confetti-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;
        }
        .confetti {
            position: absolute; width: 10px; height: 10px; background-color: #f00; animation: fall 2s linear forwards;
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="header-title">✨ Ms Mai An ULIS ✨</div>
        <div class="timer-container">
            <button class="btn-timer" id="startTimerBtn" onclick="startTimer()">🚀 BẮT ĐẦU TÍNH GIỜ LÀM BÀI</button>
            <div class="timer-display" id="timerDisplay">10:00</div>
        </div>
    </div>

    <div class="split-container">
        <div class="pane" id="readingPane"></div>
        <div class="pane" id="exercisePane">
            <div id="questionsContainer"></div>
            <div class="submit-container">
                <button class="btn-submit" onclick="submitQuiz()">🏆 NỘP BÀI</button>
            </div>
        </div>
    </div>

    <div id="confetti-container"></div>

    <div class="modal-overlay" id="resultModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Hoàn Thành! 🎉</h2>
            <div class="modal-score" id="modalScore">0/0</div>
            <p class="modal-message" id="modalMessage">Tuyệt vời!</p>
            <button class="btn-restart" onclick="location.reload()">Làm Lại Bài 🔄</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                passageId: 1,
                instruction: "Read the following announcement and mark the letter A, B, C or D on your answer sheet to indicate the correct option that best fits each of the numbered blanks from 13 to 16.",
                paragraphs: [
                    {
                        text: "SUPPORT WORKER<br>Do you have the ability to care for others? Can you understand how older people feel? Are you good (13) ........... communication? Do you have good listening skills?",
                        translation: "NHÂN VIÊN HỖ TRỢ<br>Bạn có khả năng chăm sóc người khác không? Bạn có hiểu được cảm giác của người cao tuổi không? Bạn có giỏi (13) giao tiếp không? Bạn có kỹ năng lắng nghe tốt không?"
                    },
                    {
                        text: "If you have answered YES to (14) ........... questions above, we would like to hear from you:<br>Starting rate of $ 8 per hour<br>Free uniform<br>Excellent training",
                        translation: "Nếu bạn trả lời CÓ cho (14) những câu hỏi ở trên, chúng tôi rất muốn nghe tin từ bạn:<br>Mức lương khởi điểm 8 đô la một giờ<br>Đồng phục miễn phí<br>Được đào tạo xuất sắc"
                    },
                    {
                        text: "For further (15) ..........., you can contact: Email: supportworker@gmail.com<br>Phone manager (16) ........... 01234567789",
                        translation: "Để biết thêm (15) thông tin, bạn có thể liên hệ: Email: supportworker@gmail.com<br>Quản lý qua điện thoại (16) vào số 01234567789"
                    }
                ],
                glossary: [
                    { word: "Ability", type: "n.", meaning: "Khả năng, năng lực" },
                    { word: "Care for", type: "phr. v.", meaning: "Chăm sóc, quan tâm" },
                    { word: "Communication", type: "n.", meaning: "Sự giao tiếp" },
                    { word: "Listening skill", type: "n. phr.", meaning: "Kỹ năng lắng nghe" },
                    { word: "Starting rate", type: "n. phr.", meaning: "Mức lương khởi điểm" },
                    { word: "Uniform", type: "n.", meaning: "Đồng phục" },
                    { word: "Excellent", type: "adj.", meaning: "Xuất sắc, tuyệt vời" },
                    { word: "Training", type: "n.", meaning: "Sự đào tạo, huấn luyện" },
                    { word: "Further", type: "adj.", meaning: "Thêm nữa, sâu hơn" },
                    { word: "Contact", type: "v.", meaning: "Liên hệ, liên lạc" }
                ],
                questions: [
                    {
                        qNum: 13,
                        text: "Question 13: Are you good (13) ........... communication?",
                        options: [
                            { id: "A", text: "for", isCorrect: false },
                            { id: "B", text: "with", isCorrect: false },
                            { id: "C", text: "in", isCorrect: false },
                            { id: "D", text: "at", isCorrect: true }
                        ],
                        explanation: "<b>Cô phân tích từng đáp án cho em hiểu rõ nhé:</b><br><br><b>A. for:</b> Cấu trúc 'be good for' mang ý nghĩa là 'tốt cho cái gì đó', ví dụ như 'Eating vegetables is good for your health' (Ăn rau xanh rất tốt cho sức khỏe của bạn). Ở đây không phù hợp về nghĩa.<br><b>B. with:</b> Cấu trúc 'be good with' dùng khi muốn nói ai đó khéo léo, xử lý tốt với công cụ hoặc với ai đó, ví dụ 'She is very good with children' (Cô ấy rất khéo léo với trẻ nhỏ).<br><b>C. in:</b> Trong tiếng Anh, giới từ 'in' không đi cùng tính từ 'good' để tạo thành cụm từ chỉ sự giỏi giang trong một kỹ năng cụ thể.<br><b>D. at:</b> Cấu trúc 'be good at + Noun / V-ing' mang ý nghĩa là 'giỏi về việc gì hoặc kỹ năng gì'. Ngữ cảnh câu hỏi là muốn biết ứng viên có giỏi kỹ năng giao tiếp hay không.<br><br>👉 Do đó, chúng ta ghép vào được câu hoàn chỉnh: <b>'Are you good at communication?'</b> (Bạn có giỏi giao tiếp không?). Chọn đáp án D là chính xác hoàn toàn."
                    },
                    {
                        qNum: 14,
                        text: "Question 14: If you have answered YES to (14) ........... questions above, we would like to hear from you:",
                        options: [
                            { id: "A", text: "the", isCorrect: true },
                            { id: "B", text: "a", isCorrect: false },
                            { id: "C", text: "an", isCorrect: false },
                            { id: "D", text: "X", isCorrect: false }
                        ],
                        explanation: "<b>Cùng phân tích ngữ pháp để loại trừ nhé:</b><br><br><b>B. a</b> và <b>C. an:</b> Hai mạo từ này có nghĩa là 'một', chỉ đứng trước danh từ đếm được ở dạng số ít. Trong văn bản, từ 'questions' (những câu hỏi) đang ở dạng số nhiều (có đuôi 's'). Do đó, chúng ta loại bỏ ngay lập tức đáp án B và C.<br><b>A. the:</b> Mạo từ xác định 'the' được sử dụng khi cả người nói và người nghe đều biết rõ đối tượng đang được nhắc đến là đối tượng nào. Trong câu này, cụm từ 'questions above' (những câu hỏi ở bên trên) đã xác định rõ ràng vị trí và đối tượng cụ thể mà bài thông báo muốn nhắc tới (chính là những câu hỏi ở đoạn đầu tiên).<br><b>D. X (Không điền gì):</b> Nếu không điền mạo từ thì câu sẽ bị thiếu sự xác định cần thiết cho danh từ đã được chỉ điểm rõ ràng.<br><br>👉 Câu hoàn chỉnh sẽ là: <b>'If you have answered YES to the questions above, we would like to hear from you:'</b> (Nếu bạn trả lời CÓ cho những câu hỏi ở trên, chúng tôi rất muốn nghe tin từ bạn:). Chọn đáp án A."
                    },
                    {
                        qNum: 15,
                        text: "Question 15: For further (15) ..........., you can contact: Email: supportworker@gmail.com",
                        options: [
                            { id: "A", text: "inform", isCorrect: false },
                            { id: "B", text: "information", isCorrect: true },
                            { id: "C", text: "informative", isCorrect: false },
                            { id: "D", text: "informatively", isCorrect: false }
                        ],
                        explanation: "<b>Chúng ta xét từ loại cần điền vào chỗ trống:</b><br><br>Vị trí ô trống đứng ngay sau tính từ 'further' (thêm nữa, chi tiết hơn). Theo quy tắc ngữ pháp tiếng Anh, sau một tính từ thì chúng ta bắt buộc phải sử dụng một Danh từ (Noun) để bổ nghĩa.<br><br><b>Phân tích các đáp án:</b><br><b>A. inform:</b> Đây là Động từ (Verb), mang nghĩa là 'thông báo'. Không thể đứng sau tính từ.<br><b>B. information:</b> Đây là Danh từ (Noun), mang nghĩa là 'thông tin'. Hoàn toàn phù hợp với quy tắc ngữ pháp.<br><b>C. informative:</b> Đây là Tính từ (Adjective), mang nghĩa là 'cung cấp nhiều thông tin hữu ích'. Không thể dùng hai tính từ đứng cạnh nhau mà không có danh từ theo sau.<br><b>D. informatively:</b> Đây là Trạng từ (Adverb). Không phù hợp để đứng sau tính từ.<br><br>👉 Chúng ta có cụm từ cố định rất hay xuất hiện trong các bài viết trang trọng: <b>'For further information'</b> (Để biết thêm thông tin chi tiết). Chọn đáp án B."
                    },
                    {
                        qNum: 16,
                        text: "Question 16: Phone manager (16) ........... 01234567789",
                        options: [
                            { id: "A", text: "on", isCorrect: true },
                            { id: "B", text: "in", isCorrect: false },
                            { id: "C", text: "at", isCorrect: false },
                            { id: "D", text: "from", isCorrect: false }
                        ],

                    readHtml += `
                        <h3 style="color: var(--primary); margin-top: 20px; font-size: 1.2rem;">📚 Bảng Từ Vựng Khó (Glossary)</h3>
                        <table class="glossary-table">
                            <tr><th>Từ vựng</th><th>Loại từ</th><th>Nghĩa tiếng Việt</th></tr>
                    `;
                    passage.glossary.forEach(item => {
                        readHtml += `<tr><td><strong>${item.word}</strong></td><td><i>${item.type}</i></td><td>${item.meaning}</td></tr>`;
                    });
                    readHtml += `</table>`;
                }
                readHtml += `</div>`;
                readPane.innerHTML += readHtml;

                passage.questions.forEach((q) => {
                    totalQuestions++;
                    let shuffledOptions = shuffleArray([...q.options]); 
                    
                    let optionsHtml = `<div class="options-grid">`;
                    shuffledOptions.forEach((opt) => {
                        optionsHtml += `
                            <div class="option-btn" id="opt_${q.qNum}_${opt.id}" 
                                 data-correct="${opt.isCorrect}"
                                 onclick="handleAnswer(${q.qNum}, '${opt.id}')">
                                 ${opt.text}
                            </div>
                        `;
                    });
                    optionsHtml += `</div>`;

                    let qHtml = `
                        <div class="question-card" id="card_${q.qNum}">
                            <div class="question-text">${q.text}</div>
                            ${optionsHtml}
                            <div class="explanation-box" id="exp_${q.qNum}">
                                <div class="explain-title">💡 Phân tích đáp án cùng Ms Mai An:</div>
                                ${q.explanation}
                            </div>
                        </div>
                    `;
                    exerPane.innerHTML += qHtml;
                });
            });
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if(type === 'correct') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            } else {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }

        function createConfetti() {
            const colors = ['#fbc531', '#4cd137', '#00a8ff', '#9c88ff', '#e84118'];
            const container = document.getElementById('confetti-container');
            for(let i=0; i<30; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 1 + 1) + 's';
                container.appendChild(conf);
                setTimeout(() => conf.remove(), 2000);
            }
        }

        function handleAnswer(qNum, optId) {
            if(hasAnswered[qNum]) return; 
            hasAnswered[qNum] = true;

            const clickedBtn = document.getElementById(`opt_${qNum}_${optId}`);
            const isCorrect = clickedBtn.getAttribute('data-correct') === 'true';
            
            const allBtns = document.querySelectorAll(`[id^="opt_${qNum}_"]`);
            allBtns.forEach(btn => btn.classList.add('disabled'));

            if(isCorrect) {
                clickedBtn.classList.add('correct');
                playSound('correct');
                createConfetti();
                answeredCorrectly++;
            } else {
                clickedBtn.classList.add('wrong');
                clickedBtn.classList.add('shake');
                playSound('wrong');
                
                allBtns.forEach(btn => {
                    if(btn.getAttribute('data-correct') === 'true') {
                        btn.classList.add('correct');
                    }
                });
            }

            setTimeout(() => {
                document.getElementById(`exp_${qNum}`).classList.add('show');
            }, 500);
        }

        let timeRemaining = 600; 
        let timerInterval;
        let isTimerRunning = false;

        function updateTimerDisplay() {
            let m = Math.floor(timeRemaining / 60);
            let s = timeRemaining % 60;
            document.getElementById("timerDisplay").innerText = 
                (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
        }

        function startTimer() {
            const btn = document.getElementById("startTimerBtn");
            if(!isTimerRunning) {
                isTimerRunning = true;
                btn.innerHTML = "⏸ TẠM DỪNG";
                btn.style.background = "#e67e22";
                btn.style.boxShadow = "0 5px 0 #d35400";
                
                timerInterval = setInterval(() => {
                    timeRemaining--;
                    updateTimerDisplay();
                    if(timeRemaining <= 0) {
                        clearInterval(timerInterval);
                        alert("⏰ Đã hết giờ làm bài! Bạn vẫn có thể tiếp tục làm, nhưng nhớ là trong phòng thi thật, bạn chỉ nên làm một bài như thế này trong 10 phút thôi nha.");
                    }
                }, 1000);
            } else {
                isTimerRunning = false;
                clearInterval(timerInterval);
                btn.innerHTML = "▶ TIẾP TỤC";
                btn.style.background = "var(--primary)"; 
                btn.style.boxShadow = "0 5px 0 #5f3a8c";
            }
        }

        function submitQuiz() {
            clearInterval(timerInterval);
            let scoreText = `${answeredCorrectly}/${totalQuestions}`;
            document.getElementById("modalScore").innerText = scoreText;
            
            let message = "";
            let percent = answeredCorrectly / totalQuestions;
            if(percent === 1) message = "Trí tuệ Thiên Tài! Bạn đã xuất sắc hoàn thành 100% bài thi. Quá đỉnh! 🌟";
            else if(percent >= 0.8) message = "Làm tốt lắm! Bạn có kỹ năng đọc hiểu rất đáng nể. 👏";
            else if(percent >= 0.5) message = "Khá lắm! Cố gắng ôn thêm từ vựng là điểm sẽ cao vút. Lên nào! 🔥";
            else message = "Không sao đâu! Học tiếng Anh là một hành trình dài. Làm lại lần nữa để nhớ lâu hơn nhé! 💪";
            
            document.getElementById("modalMessage").innerText = message;
            document.getElementById("resultModal").style.display = "flex";
            createConfetti();
        }

        window.onload = () => {
            renderQuiz();
        };
    </script>
</body>
</html>
