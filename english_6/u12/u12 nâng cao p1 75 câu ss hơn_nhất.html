.chkbtn{padding:7px 16px;background:linear-gradient(135deg,#8854C0,#FF6B9D);color:#fff;

.mcls{padding:9px 28px;background:linear-gradient(135deg,#8854C0,#00C9A7);color:#fff;

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

<body>
<div class="pat"></div>
<canvas id="cf"></canvas>

<header>
  <h1>🌟 Superlatives Grammar Quiz 🌟</h1>
  <p>Giáo viên tạo: Ms Mai An ULIS</p>
</header>
<div id="sbar">🏆 Điểm: <span id="sc">0</span> / <span id="st">0</span> câu đúng</div>
<div id="qc"></div>
<button id="subbtn" onclick="submitQ()">📝 Nộp Bài &amp; Xem Kết Quả 🎉</button>

<div id="rmod">
  <div class="mbox">
    <h2>🎊 Kết Quả Bài Thi</h2>
    <div class="mscore" id="ms"></div>
    <div class="mmsg" id="mm"></div>
    <button class="mcls" onclick="document.getElementById('rmod').classList.remove('show')">Đóng ✖</button>
  </div>
</div>

<div id="gpop">
  <div class="pbox">
    <h3>Chọn dạng so sánh nhất đúng:</h3>
    <div class="popts" id="po"></div>
  </div>
</div>

<script>
/* ====== AUDIO ====== */
const AC = new (window.AudioContext||window.webkitAudioContext)();
function resumeAC(){if(AC.state==='suspended')AC.resume();}
function playDing(){
  resumeAC();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.frequency.setValueAtTime(880,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(1320,AC.currentTime+.1);
  g.gain.setValueAtTime(.35,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.5);
  o.start();o.stop(AC.currentTime+.5);
}
function playBuzz(){
  resumeAC();
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sawtooth';o.connect(g);g.connect(AC.destination);
  o.frequency.setValueAtTime(220,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(100,AC.currentTime+.3);
  g.gain.setValueAtTime(.28,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.35);
  o.start();o.stop(AC.currentTime+.35);
}

/* ====== CONFETTI ====== */
const cf=document.getElementById('cf');
const cx=cf.getContext('2d');
let pts=[],cfRun=false;
function rsz(){cf.width=window.innerWidth;cf.height=window.innerHeight;}
rsz();window.addEventListener('resize',rsz);
function launchCF(){
  if(cfRun)return;cfRun=true;
  const cols=['#FF6B9D','#FDCB6E','#00C9A7','#8854C0','#fff','#FFD700'];
  for(let i=0;i<100;i++){
    pts.push({x:Math.random()*cf.width,y:-10,
      w:Math.random()*9+3,h:Math.random()*5+2,
      r:Math.random()*Math.PI*2,vx:(Math.random()-.5)*5,
      vy:Math.random()*4+2,vr:(Math.random()-.5)*.18,
      color:cols[Math.floor(Math.random()*cols.length)],life:1});
  }
  animCF();
  setTimeout(()=>{pts=[];cfRun=false;},2500);
}
function animCF(){
  cx.clearRect(0,0,cf.width,cf.height);
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.vy+=.11;p.life-=.011;
    cx.save();cx.globalAlpha=Math.max(0,p.life);
    cx.translate(p.x,p.y);cx.rotate(p.r);
    cx.fillStyle=p.color;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore();
  });
  if(pts.length)requestAnimationFrame(animCF);
  else cx.clearRect(0,0,cf.width,cf.height);
}

/* ====== STATE ====== */
let score=0,answered=0;
const done=new Set();
function upd(){
  document.getElementById('sc').textContent=score;
  document.getElementById('st').textContent=answered;
}

/* ====== SHUFFLE ====== */
function sh(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

/* ====== DATA ====== */
const E1=[
  {id:'e1q1',before:'June is <em>(hot)</em>',after:'month of the year.',
   ans:'the hottest',opts:['hottest','the hottest','the most hot'],
   vi:'Tháng 6 là tháng nóng nhất trong năm.',
   rule:'"hot" là tính từ 1 âm tiết dạng CVC → gấp đôi phụ âm cuối + "-est". Dạng so sánh nhất luôn có "the" → <span style="color:#00a84f;font-weight:800">the hottest</span>. ❌ "hottest" (thiếu "the"). ❌ "the most hot" (không dùng "most" với tính từ 1 âm tiết).'},
  {id:'e1q2',before:'These are <em>(nice)</em>',after:'shoes in the shop.',
   ans:'the nicest',opts:['nicest','the nicest','the most nice'],
   vi:'Đây là những đôi giày đẹp nhất trong cửa hàng.',
   rule:'"nice" tận cùng bằng "e" → bỏ "e" + "-st" = "nicest". Thêm "the" → <span style="color:#00a84f;font-weight:800">the nicest</span>.'},
  {id:'e1q3',before:'The horse is one of the <em>(fast)</em>',after:'animals that live on land.',
   ans:'fastest',opts:['the fastest','fastest','most fast'],
   vi:'Ngựa là một trong những loài động vật nhanh nhất sống trên cạn.',
   rule:'Cấu trúc "one of the + superlative + danh từ số nhiều": "one of the <span style="color:#00a84f;font-weight:800">fastest</span> animals". Vì "the" đã có trong cụm "one of the", ô trống chỉ cần "fastest". ❌ "most fast" sai hoàn toàn.'},
  {id:'e1q4',before:'I think my mom is <em>(good)</em>',after:'cook in the world.',
   ans:'the best',opts:['the goodest','the best','the most good'],
   vi:'Tôi nghĩ mẹ tôi là người nấu ăn giỏi nhất thế giới.',
   rule:'"good" là tính từ BẤT QUY TẮC: good → better → <span style="color:#00a84f;font-weight:800">the best</span>. Tuyệt đối không dùng "the goodest" hay "the most good".'},
  {id:'e1q5',before:'The Nile is <em>(long)</em>',after:'river in the world.',
   ans:'the longest',opts:['the longest','longest','the most long'],
   vi:'Sông Nile là con sông dài nhất thế giới.',
   rule:'"long" 1 âm tiết → "longest". Thêm "the" → <span style="color:#00a84f;font-weight:800">the longest</span>.'},
  {id:'e1q6',before:'The Mariana Trench is <em>(deep)</em>',after:"part of the world's oceans.",
   ans:'the deepest',opts:['the deepest','deepest','the most deep'],
   vi:'Rãnh Mariana là phần sâu nhất của các đại dương trên thế giới.',
   rule:'"deep" 1 âm tiết → "deepest". Thêm "the" → <span style="color:#00a84f;font-weight:800">the deepest</span>.'},
  {id:'e1q7',before:'That mountain is <em>(high)</em>',after:'in Viet Nam.',
   ans:'the highest',opts:['the highest','highest','the most high'],
   vi:'Ngọn núi đó là ngọn núi cao nhất ở Việt Nam.',
   rule:'"high" 1 âm tiết → "highest". Thêm "the" → <span style="color:#00a84f;font-weight:800">the highest</span>.'},
  {id:'e1q8',before:'Elephants in Africa have <em>(large)</em>',after:'ears of all animals.',
   ans:'the largest',opts:['the largest','largest','the most large'],
   vi:'Voi ở Châu Phi có đôi tai lớn nhất trong tất cả các loài động vật.',
   rule:'"large" tận cùng "e" → bỏ "e" + "st" = "largest". Thêm "the" → <span style="color:#00a84f;font-weight:800">the largest</span>.'},
  {id:'e1q9',before:'Ho Chi Minh City is <em>(big)</em>',after:'city in Viet Nam.',
   ans:'the biggest',opts:['the biggest','bigest','the most big'],
   vi:'Thành phố Hồ Chí Minh là thành phố lớn nhất ở Việt Nam.',
   rule:'"big" dạng CVC → gấp đôi "g" + "est" = "biggest". Thêm "the" → <span style="color:#00a84f;font-weight:800">the biggest</span>. ❌ "bigest" (sai chính tả, thiếu "g").'},
  {id:'e1q10',before:'Butterflies are <em>(light)</em>',after:'insect.',
   ans:'the lightest',opts:['the lightest','lightest','the most light'],
   vi:'Bướm là loài côn trùng nhẹ nhất.',
   rule:'"light" 1 âm tiết → "lightest". Thêm "the" → <span style="color:#00a84f;font-weight:800">the lightest</span>.'},
  {id:'e1q11',before:'Which planet is <em>(close)</em>',after:'to the Sun?',
   ans:'the closest',opts:['the closest','closest','the most close'],
   vi:'Hành tinh nào gần Mặt Trời nhất?',
   rule:'"close" tận cùng "e" → bỏ "e" + "st" = "closest". Thêm "the" → <span style="color:#00a84f;font-weight:800">the closest</span>.'},
  {id:'e1q12',before:'Is he <em>(clever)</em>',after:'student in your group?',
   ans:'the cleverest',opts:['the cleverest','cleverest','the most clever'],
   vi:'Anh ấy có phải là học sinh thông minh nhất trong nhóm của bạn không?',
   rule:'"clever" 2 âm tiết tận cùng "-er" → có thể dùng "-est": "cleverest". Thêm "the" → <span style="color:#00a84f;font-weight:800">the cleverest</span>.'},
  {id:'e1q13',before:'I am <em>(happy)</em>',after:'in the world.',
   ans:'the happiest',opts:['the happiest','happiest','the most happy'],
   vi:'Tôi là người hạnh phúc nhất trên thế giới.',
   rule:'"happy" tận cùng "y" sau phụ âm → đổi "y" → "i" + "est" = "happiest". Thêm "the" → <span style="color:#00a84f;font-weight:800">the happiest</span>.'},
  {id:'e1q14',before:'February is <em>(short)</em>',after:'month of the year.',
   ans:'the shortest',opts:['the shortest','shortest','the most short'],
   vi:'Tháng 2 là tháng ngắn nhất trong năm.',
   rule:'"short" 1 âm tiết → "shortest". Thêm "the" → <span style="color:#00a84f;font-weight:800">the shortest</span>.'},
  {id:'e1q15',before:'This is <em>(good)</em>',after:"chocolate I've got.",
   ans:'the best',opts:['the goodest','the best','the most good'],
   vi:"Đây là thanh sô-cô-la ngon nhất mà tôi có.",
   rule:'"good" bất quy tắc: good → better → <span style="color:#00a84f;font-weight:800">the best</span>. Ghi nhớ: good/well → better → the best.'},
];

const E2=[
  {id:'p1',num:1,

/* ====== GAP STORE ====== */
const gapStore={};
let gapCur=null;

/* ====== RENDER ====== */
function renderAll(){
  const c=document.getElementById('qc');c.innerHTML='';
  c.appendChild(buildE1());
  c.appendChild(buildE2());
  c.appendChild(buildE3());
  c.appendChild(buildE4());
}

function makeSec(title,sub){
  const d=document.createElement('div');d.className='sec';
  d.innerHTML=`<div class="sec-title">${title}</div><div class="sec-sub">${sub}</div>`;
  return d;
}

/* --- E1 --- */
function buildE1(){
  const sec=makeSec('📝 Exercise 1','Complete the sentences with superlative form. (Hoàn thành câu với dạng so sánh nhất.)');
  E1.forEach((q,i)=>{
    const card=document.createElement('div');card.className='qcard';
    const opts=sh(q.opts);
    gapStore[q.id]=opts;
    const blankId=q.id+'_bl';
    card.innerHTML=`
      <div class="qtxt"><span class="qnum">${i+1}</span>${q.before}&nbsp;
        <span class="blank" id="${blankId}">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
      &nbsp;${q.after}</div>
      <div class="exp" id="${q.id}_exp">
        <div class="etitle">💡 Giải thích chi tiết</div>
        <div><b>🇻🇳 Dịch:</b> ${q.vi}</div>
        <div style="margin-top:5px">${q.rule}</div>
      </div>`;
    const bl=card.querySelector('#'+blankId);
    bl.addEventListener('click',()=>openGap(q.id));
    sec.appendChild(card);
  });
  return sec;
}

function openGap(id){
  if(done.has(id))return;
  gapCur=id;
  const opts=gapStore[id];
  const po=document.getElementById('po');
  po.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');b.className='popt';b.textContent=o;
    b.addEventListener('click',()=>pickGap(id,o));
    po.appendChild(b);
  });
  document.getElementById('gpop').classList.add('show');
}

function pickGap(id,sel){
  document.getElementById('gpop').classList.remove('show');
  const q=E1.find(x=>x.id===id);
  const bl=document.getElementById(id+'_bl');
  bl.textContent=sel;done.add(id);
  const ok=sel.trim().toLowerCase()===q.ans.toLowerCase();
  bl.classList.add(ok?'cor':'wrg');
  if(ok){playDing();launchCF();score++;answered++;}
  else{
    bl.classList.add('shake');playBuzz();answered++;
    const h=document.createElement('span');
    h.className='cor-hint';h.textContent=' → '+q.ans;
    bl.insertAdjacentElement('afterend',h);
  }
  document.getElementById(id+'_exp').classList.add('show');
  upd();
}

/* --- E2 --- */
const binDone={};
function buildE2(){
  const sec=makeSec('🔵 Exercise 2','Circle the correct answer. (Khoanh tròn đáp án đúng.)');
  E2.forEach((pair,i)=>{
    const card=document.createElement('div');card.className='qcard';
    let html=`<div style="display:flex;align-items:center;margin-bottom:8px"><span class="qnum">${i+1}</span><b style="color:#8854C0;font-size:.9rem">Cặp câu ${i+1}</b></div>`;
    [pair.s1,pair.s2].forEach((s,si)=>{
      const sid=pair.id+'_s'+si;
      const shuffled=sh([0,1]);
      html+=`<div style="margin-bottom:6px" id="${sid}_row"><span class="bsen">${s.bf} </span>`;
      shuffled.forEach(oi=>{
        html+=`<span class="bopt" data-pid="${pair.id}" data-si="${si}" data-oi="${oi}" data-cor="${s.cor}">${s.opts[oi]}</span> `;
      });
      html+=`<span class="bsen">${s.af}</span></div>`;
    });
    html+=`<div class="exp" id="${pair.id}_exp"><div class="etitle">💡 Giải thích chi tiết</div><div><b>🇻🇳 Dịch:</b> ${pair.vi}</div><div style="margin-top:5px">${pair.exp}</div></div>`;
    card.innerHTML=html;
    card.querySelectorAll('.bopt').forEach(b=>{
      b.addEventListener('click',()=>{
        const pid=b.dataset.pid,si=parseInt(b.dataset.si),oi=parseInt(b.dataset.oi),cor=parseInt(b.dataset.cor);
        clickBin(pid,si,oi,cor,b);
      });
    });
    sec.appendChild(card);
  });
  return sec;
}

function clickBin(pid,si,oi,cor,btn){
  const k=pid+'_s'+si;
  if(binDone[k])return;
  binDone[k]=true;
  const isOk=(oi===cor);
  // disable all opts in this sentence row
  const row=document.getElementById(k+'_row');
  if(row){
    row.querySelectorAll('.bopt').forEach(b=>{
      const boi=parseInt(b.dataset.oi);
      b.classList.add('dim');
      if(boi===cor)b.classList.add('rev');
    });
  }
  btn.classList.remove('dim');
  btn.classList.add(isOk?'cor':'wrg');
  if(!isOk)btn.classList.add('shake');
  if(isOk){playDing();launchCF();score++;answered++;}
  else{playBuzz();answered++;}
  document.getElementById(pid+'_exp').classList.add('show');
  upd();
}

/* --- E3 --- */
const mcShuffle={};
function buildE3(){
  const sec=makeSec('✅ Exercise 3','Choose the best answer. (Chọn đáp án đúng.)');
  E3.forEach((q,i)=>{
    const card=document.createElement('div');card.className='qcard';
    // shuffle and map orig→new index
    const idxs=sh([0,1,2,3]);
    mcShuffle[q.id]=idxs;
    let html=`<div class="qtxt"><span class="qnum">${i+1}</span>${q.q}</div><div class="ogrid" id="${q.id}_og"></div>
      <div class="exp" id="${q.id}_exp"><div class="etitle">💡 Giải thích chi tiết</div><div><b>🇻🇳 Dịch:</b> ${q.vi}</div><div style="margin-top:5px">${q.exp}</div></div>`;
    card.innerHTML=html;
    const og=card.querySelector('#'+q.id+'_og');
    idxs.forEach(origIdx=>{
      const txt=q.opts[origIdx];
      const btn=document.createElement('button');btn.className='obtn';
      btn.dataset.origIdx=origIdx;
      btn.innerHTML=`<span class="olbl">${txt.split('.')[0]}.</span>${txt.split('.').slice(1).join('.').trim()}`;
      btn.addEventListener('click',()=>clickMC(q.id,origIdx));
      og.appendChild(btn);
    });
    sec.appendChild(card);
  });
  return sec;
}

function clickMC(qid,selIdx){
  if(done.has(qid))return;done.add(qid);
  const q=E3.find(x=>x.id===qid);
  const og=document.getElementById(qid+'_og');
  og.querySelectorAll('.obtn').forEach(b=>{
    const oi=parseInt(b.dataset.origIdx);
    b.classList.add('done');
    if(oi===q.cor)b.classList.add('cor');
    else if(oi===selIdx)b.classList.add('wrg','shake');
  });
  if(selIdx===q.cor){playDing();launchCF();score++;answered++;}
  else{playBuzz();answered++;}
  document.getElementById(qid+'_exp').classList.add('show');
  upd();
}

/* --- E4 --- */
function buildE4(){
  const sec=makeSec('✍️ Exercise 4','Write complete superlative sentences with given words/phrases. (Viết câu hoàn chỉnh dạng so sánh nhất dựa vào từ/cụm từ gợi ý.)');
  E4.forEach((q,i)=>{
    const card=document.createElement('div');card.className='qcard';
    card.innerHTML=`
      <div class="qtxt" style="margin-bottom:7px"><span class="qnum">${i+1}</span>${q.p}</div>
      <div class="wprompt">✏️ Viết câu hoàn chỉnh dạng so sánh nhất:</div>
      <div class="wrow">
        <input class="winp" id="${q.id}_in" type="text" placeholder="Nhập câu của bạn tại đây..." />
        <button class="chkbtn" id="${q.id}_btn" onclick="checkW('${q.id}')">Kiểm tra ✔</button>
      </div>
      <div class="exp" id="${q.id}_exp">
        <div class="etitle">💡 Giải thích chi tiết</div>
        <div><b>🇻🇳 Dịch:</b> ${q.vi}</div>
        <div style="margin-top:5px">${q.exp}</div>
      </div>`;
    sec.appendChild(card);
  });
  return sec;
}

function norm(s){return s.toLowerCase().trim().replace(/[.?!,;]/g,'').replace(/\s+/g,' ');}

function checkW(qid){
  if(done.has(qid))return;
  const q=E4.find(x=>x.id===qid);
  const inp=document.getElementById(qid+'_in');
  const v=inp.value.trim();
  if(!v){alert('Vui lòng nhập câu trả lời!');return;}
  done.add(qid);
  document.getElementById(qid+'_btn').disabled=true;
  inp.readOnly=true;
  const u=norm(v);
  const ok=u===q.ans||(q.altans&&u===q.altans);
  inp.classList.add(ok?'cor':'wrg');
  if(ok){playDing();launchCF();score++;answered++;}
  else{
    playBuzz();answered++;
    const h=document.createElement('div');
    h.className='cor-hint';
    h.innerHTML='✅ Đáp án đúng: <span style="color:#007a3d">'+q.show+'</span>';
    inp.closest('.wrow').insertAdjacentElement('afterend',h);
  }
  document.getElementById(qid+'_exp').classList.add('show');
  upd();
}

/* ====== SUBMIT ====== */
function submitQ(){
  const total=E1.length+E2.length*2+E3.length+E4.length;
  const pct=total?Math.round(score/total*100):0;
  let msg='';
  if(pct===100)msg='🏆 Hoàn hảo! Em thật xuất sắc! Điểm tuyệt đối! 🎉🌟';
  else if(pct>=90)msg='🌟 Tuyệt vời! Em làm rất tốt! Tiếp tục cố gắng nhé! 💪';
  else if(pct>=75)msg='😊 Khá giỏi! Em nắm vững phần lớn ngữ pháp rồi! Ôn lại câu sai nhé! 📚';
  else if(pct>=50)msg='📖 Cố gắng lên! Em đã hiểu được một nửa rồi! Ôn kỹ thêm nhé! 💡';
  else msg='🌈 Đừng nản lòng! Học lại superlatives và thử lại em nhé! Cô tin em làm được! 💝';
  document.getElementById('ms').textContent=`${score}/${total}`;
  document.getElementById('mm').innerHTML=`<div style="font-size:1.2rem;margin-bottom:3px">${pct}%</div>${msg}`;
  document.getElementById('rmod').classList.add('show');
  launchCF();
}

/* ====== INIT ====== */
renderAll();

document.getElementById('gpop').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
document.getElementById('rmod').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
</script>
