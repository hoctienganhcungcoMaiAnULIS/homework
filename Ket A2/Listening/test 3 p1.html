<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Practice - Giáo viên tạo: Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #8854C0; /* Hồng nhạt / Tím Pastel */
            --secondary: #00C9A7; /* Xanh ngọc */
            --correct: #00D26A; /* Xanh lá nhạt */
            --incorrect: #FF4757; /* Đỏ cam */
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-dark: #2d3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            /* Dynamic Theme: SVG Background with Floating Emojis and Radial Gradients */
            background-color: var(--primary);
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(0, 201, 167, 0.6) 0%, transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(136, 84, 192, 0.6) 0%, transparent 40%),
                url("data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='20' y='40' font-size='24' opacity='0.6'%3E📺%3C/text%3E%3Ctext x='150' y='80' font-size='28' opacity='0.6'%3E📱%3C/text%3E%3Ctext x='60' y='160' font-size='26' opacity='0.6'%3E⌚%3C/text%3E%3Ctext x='180' y='180' font-size='22' opacity='0.6'%3E🚶‍♀️%3C/text%3E%3Ctext x='110' y='30' font-size='25' opacity='0.6'%3E☀️%3C/text%3E%3C/svg%3E");
            background-size: cover, cover, 300px 300px;
            background-attachment: fixed;
            animation: bgFloat 30s linear infinite;
            color: var(--text-dark);
            min-height: 100vh;
            padding: 30px 15px;
        }

        @keyframes bgFloat {
            0% { background-position: 0 0, 0 0, 0 0; }
            100% { background-position: 0 0, 0 0, 300px 300px; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        .header h3 {
            color: #f1c40f;
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        audio {
            width: 100%;
            max-width: 500px;
            border-radius: 30px;
            outline: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .question-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .question-card:hover {
            transform: translateY(-5px);
        }

        .question-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .image-container {
            text-align: center;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.8);
            border-radius: 15px;
            padding: 10px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 3px solid var(--primary);
        }

        .options-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .option-btn {
            flex: 1;
            min-width: 120px;
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(145deg, var(--secondary), #00a88c);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0 #00876f, 0 10px 15px rgba(0,0,0,0.2);
            transition: all 0.2s;
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 0 #00876f, 0 12px 20px rgba(0,0,0,0.3);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #00876f, 0 5px 10px rgba(0,0,0,0.2);
        }

        .option-btn.correct {
            background: linear-gradient(145deg, var(--correct), #00b35a);
            box-shadow: 0 6px 0 #008c46;
        }

        .option-btn.incorrect {
            background: linear-gradient(145deg, var(--incorrect), #e03e4d);
            box-shadow: 0 6px 0 #b3323d;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .explanation {
            display: none;
            margin-top: 25px;
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            border-left: 8px solid var(--secondary);
            font-size: 1.05rem;
            line-height: 1.6;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exp-step {
            margin-bottom: 12px;
        }

        .exp-title {
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .keyword {
            color: var(--incorrect);
            font-weight: 800;
        }

        .submit-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(145deg, #FF9A9E, #FECFEF);
            background: var(--primary);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 #5b3882, 0 15px 25px rgba(0,0,0,0.3);
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 11px 0 #5b3882, 0 20px 30px rgba(0,0,0,0.4);
        }

        .submit-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #5b3882, 0 5px 10px rgba(0,0,0,0.2);
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content h2 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .modal-content .score {
            font-size: 4rem;
            font-weight: 900;
            color: var(--secondary);
            margin-bottom: 20px;
        }

        .modal-content img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .reload-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎧 Listening Practice Test</h1>
        <h3>Giáo viên tạo: Ms Mai An ULIS</h3>
        <audio controls>
            <source src="https://englishpracticetest.net/wp-content/uploads/2021/11/ket-practice-listening-test-03-part-1.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ thẻ audio.
        </audio>
    </div>

    <div id="quiz-container">
        </div>

    <button class="submit-btn" onclick="submitQuiz()">Nộp Bài Xem Kết Quả</button>
</div>

<div class="modal-overlay" id="resultModal">
    <div class="modal-content">
        <h2>KẾT QUẢ CỦA EM!</h2>
        <div class="score" id="scoreDisplay">0/5</div>
        <img id="memeImg" src="" alt="Reaction Meme">
        <p id="feedbackText" style="font-size: 1.2rem; margin-bottom: 20px; font-weight: bold;"></p>
        <button class="reload-btn" onclick="location.reload()">Làm Lại Bài</button>
    </div>
</div>

<script>
    // --- WEB AUDIO API CHO ÂM THANH (KHÔNG CẦN FILE NGOÀI) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playDing() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime); // Note A5
        osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1); // Note A6
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    function playWrong() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sawtooth';
        // Téo tèo tèo tèo effect (descending pitch)
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + 0.2);
        osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.4);
        osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.6);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.6);
    }

    // --- DỮ LIỆU BÀI THI ---
    const quizData = [
        {
            id: 1,
            question: "1. What time does the nature programme start?",
            img: "https://i.postimg.cc/BQDv4DtZ/1.jpg",
            options: [
                { id: 'A', text: '7:30', isCorrect: false },
                { id: 'B', text: '7:10', isCorrect: true },
                { id: 'C', text: '6:30', isCorrect: false }
            ],
            explanation: `
                <div class="exp-step"><span class="exp-title">Bước 1: Dịch câu hỏi</span><br>Chương trình thế giới động vật bắt đầu lúc mấy giờ? (A. 7:30 | B. 7:10 | C. 6:30)</div>
                <div class="exp-step"><span class="exp-title">Bước 2: Audio Script & Dịch</span><br>
                Dad: Are you going to watch the nature programme after dinner tonight, Catherine? <i>(Con có định xem chương trình thế giới động vật sau bữa tối nay không, Catherine?)</i><br>
                Catherine: Yes, I think it begins at seven thirty, doesn’t it, Dad? <i>(Có ạ, con nghĩ nó bắt đầu lúc 7 giờ 30, đúng không bố?)</i><br>
                Dad: Let me check … Oh, it’s on just after the six-thirty sports programme, so <strong class="keyword">ten past seven actually</strong>. We can have dinner earlier than usual if you like. <i>(Để bố kiểm tra... Ồ, nó chiếu ngay sau chương trình thể thao lúc 6:30, nên thực tế là <strong class="keyword">7 giờ 10 phút</strong>. Chúng ta có thể ăn tối sớm hơn bình thường nếu con muốn.)</i></div>
                <div class="exp-step"><span class="exp-title">Bước 3: Tại sao đúng?</span><br>Bố đã xác nhận lại lịch chiếu chính xác là "ten past seven" (7:10). Do đó đáp án B đúng.</div>
                <div class="exp-step"><span class="exp-title">Bước 4: Chỉ ra bẫy (Distractors)</span><br>
                - <b>7:30</b>: Là thời gian Catherine <i>nhớ nhầm</i> lúc đầu.<br>
                - <b>6:30</b>: Là thời gian chiếu của chương trình <i>thể thao (sports programme)</i>, không phải thế giới động vật.</div>
            `
        },
        {
            id: 2,
            question: "2. Who is Diana talking to on her mobile?",
            img: "https://i.postimg.cc/yY9Ns9WN/2.jpg",
            options: [
                { id: 'A', text: 'Aunt Christine', isCorrect: false },
                { id: 'B', text: 'David', isCorrect: false },
                { id: 'C', text: 'Sarah', isCorrect: true }
            ],
            explanation: `
                <div class="exp-step"><span class="exp-title">Bước 1: Dịch câu hỏi</span><br>Diana đang nói chuyện điện thoại với ai?</div>
                <div class="exp-step"><span class="exp-title">Bước 2: Audio Script & Dịch</span><br>
                Boy: Mum, who’s Diana phoning? Is she calling Aunt Christine about borrowing her bike? <i>(Mẹ ơi, Diana đang gọi cho ai thế? Có phải chị ấy gọi cho Dì Christine để mượn xe đạp không?)</i><br>
                Mum: She’s asking her friend <strong class="keyword">Sarah</strong>, you know, our neighbour’s daughter, about some maths homework. <i>(Chị con đang hỏi bạn của nó là <strong class="keyword">Sarah</strong>, con biết đấy, con gái nhà hàng xóm, về bài tập Toán.)</i><br>
                Boy: I’m doing a project with David, remember? He’s coming a bit later so that we can work here. <i>(Con đang làm dự án với David, mẹ nhớ không? Cậu ấy sẽ đến muộn một chút để chúng con làm ở đây.)</i></div>
                <div class="exp-step"><span class="exp-title">Bước 3: Tại sao đúng?</span><br>Người mẹ xác nhận rõ ràng rằng Diana đang gọi cho bạn là Sarah để hỏi về bài tập. Đáp án là Sarah (Tranh C có hình cô gái trẻ).</div>
                <div class="exp-step"><span class="exp-title">Bước 4: Chỉ ra bẫy (Distractors)</span><br>
                - <b>Aunt Christine</b>: Là người cậu bé <i>đoán</i> (mượn xe đạp) nhưng bị mẹ phủ nhận ngay.<br>
                - <b>David</b>: Là bạn của cậu bé, người sẽ đến nhà làm chung dự án, không liên quan đến cuộc gọi của Diana.</div>
            `
        },
        {
            id: 3,
            question: "3. Where will Henry put his mum’s watch?",
            img: "https://i.postimg.cc/5Nvtbvj2/3.jpg",
            options: [
                { id: 'A', text: 'Table next to bed', isCorrect: true },
                { id: 'B', text: 'Next to cooker', isCorrect: false },
                { id: 'C', text: 'On the sofa', isCorrect: false }
            ],
            explanation: `
                <div class="exp-step"><span class="exp-title">Bước 1: Dịch câu hỏi</span><br>Henry sẽ cất đồng hồ của mẹ ở đâu?</div>
                <div class="exp-step"><span class="exp-title">Bước 2: Audio Script & Dịch</span><br>
                Henry: Mum, is this your watch here next to the cooker? <i>(Mẹ ơi, có phải đồng hồ của mẹ ở cạnh bếp lò đây không?)</i><br>
                Mum: Oh, yes! Thank you, Henry, I was looking for it a minute ago in the sitting room. I thought it was on the sofa. <i>(Ôi đúng rồi! Cảm ơn con, Henry, lúc nãy mẹ tìm nó trong phòng khách. Mẹ tưởng nó ở trên ghế sofa.)</i><br>
                Henry: Shall I leave it in the kitchen or put it in your bedroom? <i>(Con để nó ở bếp hay mang vào phòng ngủ cho mẹ nhé?)</i><br>
                Mum: <strong class="keyword">On that little table next to my bed</strong> would be great. <i>(Để <strong class="keyword">trên cái bàn nhỏ cạnh giường ngủ</strong> của mẹ là tuyệt nhất.)</i></div>
                <div class="exp-step"><span class="exp-title">Bước 3: Tại sao đúng?</span><br>Mẹ yêu cầu Henry đặt đồng hồ lên bàn cạnh giường ngủ (Tranh A).</div>
                <div class="exp-step"><span class="exp-title">Bước 4: Chỉ ra bẫy (Distractors)</span><br>
                - <b>Next to cooker (Bếp)</b>: Đây là vị trí Henry <i>hiện đang tìm thấy</i> chiếc đồng hồ.<br>
                - <b>Sofa (Ghế sô pha)</b>: Đây là nơi người mẹ <i>tưởng</i> là bà đã để quên và tìm lúc nãy.</div>
            `
        },
        {
            id: 4,
            question: "4. Why is the girl tired?",
            img: "https://i.postimg.cc/TYmPfmhY/4.jpg",
            options: [
                { id: 'A', text: 'Played tennis', isCorrect: false },
                { id: 'B', text: 'Bus was late', isCorrect: false },
                { id: 'C', text: 'Walked home', isCorrect: true }
            ],
            explanation: `
                <div class="exp-step"><span class="exp-title">Bước 1: Dịch câu hỏi</span><br>Tại sao cô gái lại mệt mỏi?</div>
                <div class="exp-step"><span class="exp-title">Bước 2: Audio Script & Dịch</span><br>
                Boy: Yeah, you look tired. Did you play tennis with Jane after school? <i>(Ừ, trông bạn mệt mỏi quá. Bạn đã chơi tennis với Jane sau giờ học à?)</i><br>
                Girl: She played with someone else. <strong class="keyword">I walked all the way home</strong> because the bus was late. It took an hour! <i>(Cậu ấy chơi với người khác rồi. <strong class="keyword">Tớ đã đi bộ suốt quãng đường về nhà</strong> vì xe buýt đến muộn. Mất tận một tiếng đồng hồ!)</i></div>
                <div class="exp-step"><span class="exp-title">Bước 3: Tại sao đúng?</span><br>Lý do trực tiếp khiến cô gái mệt là do "walked all the way home" (đi bộ cả quãng đường). Tranh C vẽ cảnh đi bộ.</div>
                <div class="exp-step"><span class="exp-title">Bước 4: Chỉ ra bẫy (Distractors)</span><br>
                - <b>Play tennis (Tranh A)</b>: Cậu bé đoán vậy nhưng cô gái phủ nhận vì Jane đã chơi với người khác.<br>
                - <b>Bus (Tranh B)</b>: Xe buýt đến muộn là <i>nguyên nhân</i> khiến cô phải đi bộ, chứ cô ấy không hề leo lên xe buýt. Việc làm cô mệt là hành động "đi bộ".</div>
            `
        },
        {
            id: 5,
            question: "5. What will the weather be like on Sunday?",
            img: "https://i.postimg.cc/8kxC2wkT/5.jpg",
            options: [
                { id: 'A', text: 'Sunny/Warm (25°C)', isCorrect: true },
                { id: 'B', text: 'Cloudy', isCorrect: false },
                { id: 'C', text: 'Raining', isCorrect: false }
            ],
            explanation: `
                <div class="exp-step"><span class="exp-title">Bước 1: Dịch câu hỏi</span><br>Thời tiết Chủ nhật sẽ như thế nào?</div>
                <div class="exp-step"><span class="exp-title">Bước 2: Audio Script & Dịch</span><br>
                Boy 2: Isn’t it going to be cloudy on Sunday? <i>(Không phải Chủ nhật trời sẽ nhiều mây sao?)</i><br>
                Boy 1: That doesn’t matter because <strong class="keyword">it’ll be about 25 degrees</strong>. Mum checked the temperature. <i>(Không sao cả vì <strong class="keyword">trời sẽ khoảng 25 độ</strong>. Mẹ tớ đã kiểm tra nhiệt độ rồi.)</i><br>
                Boy 2: Oh, OK then. I went swimming when it was raining on holiday. It was really funny! <i>(Ồ, được thôi. Tớ từng đi bơi lúc trời mưa vào kỳ nghỉ. Rất là vui!)</i></div>
                <div class="exp-step"><span class="exp-title">Bước 3: Tại sao đúng?</span><br>Nhiệt độ được mẹ kiểm tra là khoảng 25 độ C (thời tiết nắng ráo/ấm áp). Phù hợp với Tranh A.</div>
                <div class="exp-step"><span class="exp-title">Bước 4: Chỉ ra bẫy (Distractors)</span><br>
                - <b>Cloudy (Nhiều mây)</b>: Chỉ là câu hỏi nghi vấn của cậu bé thứ 2 lúc đầu.<br>
                - <b>Raining (Trời mưa)</b>: Cậu bé thứ 2 kể lại kỷ niệm đi bơi dưới mưa trong <i>kỳ nghỉ trước đây (on holiday)</i>, không phải dự báo cho Chủ nhật này.</div>
            `
        }
    ];

    let userScore = 0;
    let answeredQuestions = 0;

    // Shuffle Array Function
    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // Render Quiz
    const quizContainer = document.getElementById('quiz-container');

    quizData.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        
        // Shuffle options for this question
        const shuffledOptions = shuffleArray([...q.options]);
        
        let optionsHtml = '';
        shuffledOptions.forEach(opt => {
            optionsHtml += `<button class="option-btn" onclick="checkAnswer(this, ${q.id}, ${opt.isCorrect})">Option ${opt.id}</button>`;
        });

        card.innerHTML = `
            <div class="question-title">${q.question}</div>
            <div class="image-container">
                <img src="${q.img}" alt="Question Image">
            </div>
            <div class="options-container" id="options-${q.id}">
                ${optionsHtml}
            </div>
            <div class="explanation" id="exp-${q.id}">
                ${q.explanation}
            </div>
        `;
        quizContainer.appendChild(card);
    });

    // Check Answer Logic
    function checkAnswer(btn, questionId, isCorrect) {
        const container = document.getElementById(`options-${questionId}`);
        const buttons = container.querySelectorAll('.option-btn');
        const explanation = document.getElementById(`exp-${questionId}`);

        // Disable all buttons in this question
        buttons.forEach(b => {
            b.disabled = true;
            if(b === btn) {
                if(isCorrect) {
                    b.classList.add('correct');
                    playDing();
                    userScore++;
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#00D26A', '#00C9A7', '#f1c40f']
                    });
                } else {
                    b.classList.add('incorrect');
                    playWrong();
                    // Hiển thị nút đúng cho học sinh biết
                    buttons.forEach(correctBtn => {
                        // Chúng ta tìm nút đúng bằng cách lấy dữ liệu ban đầu
                        const originalQuestion = quizData.find(q => q.id === questionId);
                        const correctOptionId = originalQuestion.options.find(o => o.isCorrect).id;
                        if(correctBtn.innerText.includes(`Option ${correctOptionId}`)) {
                            correctBtn.style.background = "#00D26A";
                            correctBtn.style.color = "#fff";
                        }
                    });
                }
            }
        });

        // Show Explanation immediately
        explanation.style.display = 'block';
        answeredQuestions++;
    }

    // Submit Quiz Logic
    function submitQuiz() {
        if(answeredQuestions < quizData.length) {
            alert("Em hãy trả lời hết các câu hỏi trước khi nộp bài nhé!");
            return;
        }

        const modal = document.getElementById('resultModal');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const memeImg = document.getElementById('memeImg');
        const feedbackText = document.getElementById('feedbackText');

        scoreDisplay.innerText = `${userScore}/${quizData.length}`;
        
        const percentage = userScore / quizData.length;

        if (percentage === 1) {
            memeImg.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif";
            feedbackText.innerText = "Xuất sắc! Em đạt điểm tuyệt đối luôn. Quá đỉnh!";
            feedbackText.style.color = "var(--correct)";
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.3 } });
        } else if (percentage >= 0.6) {
            memeImg.src = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif";
            feedbackText.innerText = "Làm tốt lắm! Gật đầu tán thưởng nè. Cố lên xíu nữa là 100% rồi!";
            feedbackText.style.color = "var(--secondary)";
        } else {
            memeImg.src = "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif";
            feedbackText.innerText = "Huhu sai hơi nhiều rùi, đọc kỹ phần giải thích chi tiết bên dưới để phục thù nha em!";
            feedbackText.style.color = "var(--incorrect)";
        }

        modal.style.display = 'flex';
    }

    // Close modal if clicked outside
    window.onclick = function(event) {
        const modal = document.getElementById('resultModal');
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>
