<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập Viết: Energy - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #8854C0;
            --secondary: #00C9A7;
            --accent: #FDCB6E;
            --correct: #00D26A;
            --wrong: #FF4757;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            min-height: 100vh;
            color: #2d3436;
            overflow-x: hidden;
        }

        /* Animated Gradient Background */
        .bg-animated {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(-45deg, #8854C0, #FDCB6E, #00C9A7, #ff9ff3);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -2;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* SVG Pattern Overlay (Hoa và Mèo con dễ thương) */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='20' y='40' font-size='24' opacity='0.4'%3E%F0%9F%90%B1%3C/text%3E%3Ctext x='80' y='90' font-size='24' opacity='0.4'%3E%F0%9F%8C%B8%3C/text%3E%3C/svg%3E");
            animation: floatPattern 40s linear infinite;
            z-index: -1;
        }

        @keyframes floatPattern {
            0% { background-position: 0 0; }
            100% { background-position: 240px 240px; }
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        .header-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.8);
        }

        /* Question & Text Styles */
        .q-text { font-size: 1.15rem; font-weight: 800; color: #2d3436; font-family: 'Quicksand', sans-serif; line-height: 1.6;}
        .ans-text { font-size: 1.08rem; font-weight: 700; }
        .exp-text { font-size: 1rem; }

        /* 3D Cards / Buttons */
        .btn-card {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #e2e8f0;
            border-bottom: 8px solid #cbd5e1;
            border-radius: 20px;
            padding: 16px 20px;
            text-align: left;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            width: 100%;
            color: #475569;
            display: flex;
            align-items: center;
        }

        .btn-card:hover:not(:disabled) {
            transform: scale(1.02) translateY(-4px);
            border-bottom-width: 10px;
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-card:active:not(:disabled) {
            transform: scale(0.98) translateY(4px);
            border-bottom-width: 2px;
            margin-top: 6px;
        }

        .btn-card.correct {
            background: var(--correct);
            border-color: #00ab55;
            border-bottom-color: #007b3e;
            color: white;
            transform: scale(1.02);
        }

        .btn-card.wrong {
            background: var(--wrong);
            border-color: #e02334;
            border-bottom-color: #a31422;
            color: white;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* Explanation Box & Colors */
        .explanation-box {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            border: 2px dashed var(--primary);
            border-radius: 20px;
            padding: 24px;
            margin-top: 24px;
            animation: slideDown 0.4s ease-out forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* TONE MÀU GIẢI THÍCH CHUẨN */
        .p-word { color: #0984e3; font-weight: 800; } 
        .p-phonetic { background-color: #e8dbfa; color: #6c5ce7; padding: 2px 6px; border-radius: 6px; font-weight: 700;} 
        .p-mean { color: #d35400; font-weight: 600; } 
        .p-grammar { text-decoration: underline; text-decoration-color: #e84118; text-decoration-thickness: 3px; font-weight: 800; color: #2f3640;} 
        .hl-green { color: #00b894; font-weight: 900; } 
        .hl-red { color: #d63031; text-decoration: line-through; text-decoration-thickness: 2px; font-weight: 700;} 

        .exp-step { margin-bottom: 16px; line-height: 1.6; }
        .exp-title { color: var(--primary); font-weight: 900; text-transform: uppercase; font-size: 0.95rem; letter-spacing: 0.5px;}

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; border-radius: 30px; padding: 40px; width: 90%; max-width: 500px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2); border-bottom: 10px solid #e2e8f0;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        input[type="text"] {
            width: 100%; padding: 15px; border: 3px solid #e2e8f0; border-radius: 15px;
            font-size: 1.1rem; font-family: 'Nunito', sans-serif; font-weight: 700; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(136, 84, 192, 0.2); }
        .input-error { border-color: var(--wrong) !important; animation: shake 0.4s; }

        .btn-action {
            background: var(--primary); color: white; border: none; border-bottom: 6px solid #5e3a8a;
            border-radius: 15px; padding: 15px 30px; font-size: 1.2rem; font-weight: 800; cursor: pointer;
            transition: 0.2s; width: 100%; margin-top: 20px;
        }
        .btn-action:active { transform: translateY(4px); border-bottom-width: 2px; }

        #result-gif { width: 100%; max-height: 250px; object-fit: cover; border-radius: 20px; margin: 20px 0; border: 4px solid #f1f5f9;}

    </style>
</head>
<body>
    <div class="bg-animated"></div>
    <div class="pattern-overlay"></div>

    <header class="header-glass sticky top-0 z-50 p-3 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="bg-white/90 px-4 py-2 rounded-full shadow-sm border border-white">
                <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">Giáo viên tạo:</span>
                <span class="text-sm font-black text-purple-600 ml-1">Ms Mai An ULIS</span>
            </div>
            <div class="text-right glass-panel px-5 py-2 rounded-full flex items-center gap-2">
                <span class="text-sm font-bold text-gray-500">ĐIỂM:</span>
                <span class="text-2xl font-black text-teal-600" id="score-display">0</span>
                <span class="text-gray-400 font-bold">/ 16</span>
            </div>
        </div>
    </header>

    <main id="quiz-container" class="max-w-4xl mx-auto p-4 mt-6 space-y-8 pb-32">
        </main>

    <div class="fixed bottom-0 left-0 w-full p-4 header-glass flex justify-center z-40">
        <button onclick="openNameModal()" class="bg-gradient-to-r from-purple-500 to-pink-500 text-white font-black py-4 px-12 text-xl rounded-full shadow-xl border-b-4 border-purple-800 hover:translate-y(-2px) active:translate-y(2px) active:border-b-0 transition-all">
            🎯 NỘP BÀI & XEM KẾT QUẢ
        </button>
    </div>

    <div id="name-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-3xl font-black text-purple-600 mb-2">Bạn tên là gì nhỉ? 🤔</h2>
            <p class="text-gray-500 font-bold mb-6">Nhập tên để cô Mai An lưu điểm nhé!</p>
            <input type="text" id="student-name" placeholder="Ví dụ: Nguyễn Văn A..." onkeypress="handleEnter(event)">
            <p id="name-error" class="text-red-500 font-bold text-sm mt-2 hidden">Bạn quên nhập tên kìa!</p>
            <button onclick="submitQuiz()" class="btn-action">XEM ĐIỂM NGAY 🚀</button>
        </div>
    </div>

    <div id="result-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="result-greeting" class="text-2xl font-black text-purple-600 mb-2">🌟 THIÊN TÀI!</h2>
            <div class="bg-gray-100 rounded-2xl p-4 my-4 border-2 border-gray-200">
                <p class="text-gray-500 font-bold text-sm uppercase">Điểm số của bạn</p>
                <p class="text-6xl font-black text-teal-500"><span id="final-score">0</span><span class="text-3xl text-gray-400">/16</span></p>
            </div>
            <img id="result-gif" src="" alt="Result Reaction">
            <p id="result-feedback" class="text-lg font-bold text-gray-700 mb-6"></p>
            <button onclick="closeModal()" class="btn-action !bg-teal-500 !border-teal-700">XEM LẠI BÀI LÀM 🧐</button>
        </div>
    </div>

    <script>
        // --- WEB AUDIO API (Tạo âm thanh tự sinh) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playDing() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        function playBuzz() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3); 
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        // --- DỮ LIỆU ĐỀ BÀI (Dịch chi tiết TỪNG ĐÁP ÁN) ---
        const rawData = [
            {
                q: "Arrange the words: run out/ non-renewable energy/ comes/ that/ from/ sources/ will/ some day.",
                options: [
                    { text: "Non-renewable energy comes from sources that will run out some day.", trans: "Năng lượng không tái tạo đến từ các nguồn sẽ cạn kiệt vào một ngày nào đó.", correct: true },
                    { text: "Sources comes from non-renewable energy that will run out some day.", trans: "Các nguồn đến từ năng lượng không tái tạo sẽ cạn kiệt vào một ngày nào đó. (Sai logic)", correct: false },
                    { text: "Non-renewable energy comes from that sources will run out some day.", trans: "Năng lượng không tái tạo đến từ điều mà các nguồn sẽ cạn kiệt vào một ngày nào đó. (Sai ngữ pháp)", correct: false },
                    { text: "Some day non-renewable energy will run out that comes from sources.", trans: "Một ngày nào đó năng lượng không tái tạo sẽ cạn kiệt thứ đến từ các nguồn. (Sai nghĩa)", correct: false }
                ],
                translateQ: "Sắp xếp các từ thành câu hoàn chỉnh.",
                whyCorrect: "<span class='hl-green'>Đúng trật tự từ: Chủ ngữ + Động từ + Tân ngữ + Mệnh đề quan hệ.</span>",
                grammar: "<span class='p-grammar'>Mệnh đề quan hệ (Relative Clause) bắt đầu bằng 'that' bổ nghĩa trực tiếp cho danh từ 'sources'.</span>",
                whyWrong: "<span class='hl-red'>Các câu khác sai về mặt logic ngữ nghĩa (nguồn đến từ năng lượng) hoặc đặt sai vị trí của đại từ quan hệ 'that'.</span>"
            },
            {
                q: "Arrange the words: fossil fuels/ to/ are/ they/ limited/ harmful/ the environment/ and/ are.",
                options: [
                    { text: "Fossil fuels are limited and they are harmful to the environment.", trans: "Nhiên liệu hóa thạch có hạn và chúng gây hại cho môi trường.", correct: true },
                    { text: "Fossil fuels are harmful to the environment and they are limited.", trans: "Nhiên liệu hóa thạch gây hại cho môi trường và chúng có hạn. (Chưa tối ưu trật tự logic)", correct: false },
                    { text: "They are limited and fossil fuels are harmful to the environment.", trans: "Chúng có hạn và nhiên liệu hóa thạch gây hại cho môi trường. (Lỗi tham chiếu đại từ)", correct: false },
                    { text: "Fossil fuels are limited to the environment and they are harmful.", trans: "Nhiên liệu hóa thạch bị giới hạn bởi môi trường và chúng gây hại. (Sai nghĩa cụm từ)", correct: false }
                ],
                translateQ: "Sắp xếp các từ thành câu hoàn chỉnh.",
                whyCorrect: "<span class='hl-green'>Mạch logic tự nhiên và đúng cấu trúc cụm từ cố định.</span>",
                grammar: "<span class='p-grammar'>Cấu trúc câu ghép đẳng lập dùng 'and'. Cụm cố định: be harmful to (gây hại cho).</span>",
                whyWrong: "<span class='hl-red'>Lỗi dùng đại từ 'They' trước danh từ chính (lỗi tham chiếu) hoặc ghép sai giới từ 'limited to the environment' (vô nghĩa).</span>"
            },
            {
                q: "Arrange the words: are/ energy-efficient techniques/ mining companies/ to reduce/ adopting/ carbon footprint/ their",
                options: [
                    { text: "Mining companies are adopting energy-efficient techniques to reduce their carbon footprint.", trans: "Các công ty khai thác mỏ đang áp dụng các kỹ thuật tiết kiệm năng lượng để giảm lượng khí thải carbon của họ.", correct: true },
                    { text: "Energy-efficient techniques are adopting mining companies to reduce their carbon footprint.", trans: "Các kỹ thuật tiết kiệm năng lượng đang áp dụng các công ty khai thác mỏ để giảm lượng khí thải carbon của họ. (Sai chủ ngữ thực hiện hành động)", correct: false },
                    { text: "Mining companies to reduce their carbon footprint are adopting energy-efficient techniques.", trans: "Các công ty khai thác mỏ để giảm lượng khí thải carbon của họ đang áp dụng các kỹ thuật tiết kiệm năng lượng. (Trật tự từ gượng gạo)", correct: false },
                    { text: "Their carbon footprint are adopting energy-efficient techniques to reduce mining companies.", trans: "Lượng khí thải carbon của họ đang áp dụng các kỹ thuật tiết kiệm năng lượng để giảm các công ty khai thác mỏ. (Sai logic hoàn toàn)", correct: false }
                ],
                translateQ: "Sắp xếp các từ thành câu hoàn chỉnh.",
                whyCorrect: "<span class='hl-green'>Đúng chủ thể thực hiện hành động và vị trí cụm từ chỉ mục đích.</span>",
                grammar: "<span class='p-grammar'>Cấu trúc: S + V + O + to V (chỉ mục đích đứng cuối câu).</span>",
                whyWrong: "<span class='hl-red'>Sai chủ ngữ thực hiện hành động (kỹ thuật không thể 'áp dụng' công ty) hoặc đảo sai vị trí cụm từ chỉ mục đích.</span>"
            },
            {
                q: "Arrange the words: cheap/ but/ releases/ a lot of/ when/ coal/ is/ burned/ it/ pollutants.",
                options: [
                    { text: "Coal is cheap but it releases a lot of pollutants when burned.", trans: "Than đá thì rẻ nhưng nó thải ra nhiều chất ô nhiễm khi bị đốt cháy.", correct: true },
                    { text: "It is cheap but coal releases a lot of pollutants when burned.", trans: "Nó thì rẻ nhưng than đá thải ra nhiều chất ô nhiễm khi bị đốt cháy. (Lỗi đại từ đi trước danh từ)", correct: false },
                    { text: "Coal releases a lot of pollutants but it is cheap when burned.", trans: "Than đá thải ra nhiều chất ô nhiễm nhưng nó thì rẻ khi bị đốt cháy. (Sai logic thực tế)", correct: false },
                    { text: "When burned coal is cheap but it releases a lot of pollutants.", trans: "Khi bị đốt cháy than đá thì rẻ nhưng nó thải ra nhiều chất ô nhiễm. (Sai logic thực tế)", correct: false }
                ],
                translateQ: "Sắp xếp các từ thành câu hoàn chỉnh.",
                whyCorrect: "<span class='hl-green'>Logic tương phản đúng: Ưu điểm TRƯỚC, Nhược điểm SAU. Rút gọn mệnh đề trạng ngữ chính xác.</span>",
                grammar: "<span class='p-grammar'>Cấu trúc: Mệnh đề 1 + BUT + Mệnh đề 2. 'when burned' là dạng rút gọn của 'when it is burned'.</span>",
                whyWrong: "<span class='hl-red'>Sai vị trí đại từ 'It' (đứng trước danh từ chính) hoặc sai logic thực tế (than chỉ rẻ khi bị đốt là sai).</span>"
            },
            {
                q: "Arrange the words: Vietnam/ its/ heavily/ currently/ relies/ fuels/ for/ on/ fossil/ energy.",
                options: [
                    { text: "Vietnam currently relies heavily on fossil fuels for its energy.", trans: "Việt Nam hiện nay phụ thuộc rất nhiều vào nhiên liệu hóa thạch cho năng lượng của mình.", correct: true },
                    { text: "Vietnam relies heavily on its energy for currently fossil fuels.", trans: "Việt Nam phụ thuộc rất nhiều vào năng lượng của mình cho nhiên liệu hóa thạch hiện nay. (Sai ngữ nghĩa)", correct: false },
                    { text: "Currently fossil fuels relies heavily on Vietnam for its energy.", trans: "Hiện nay nhiên liệu hóa thạch phụ thuộc rất nhiều vào Việt Nam cho năng lượng của nó. (Sai chủ ngữ)", correct: false },
                    { text: "Vietnam currently relies on fossil fuels for its heavily energy.", trans: "Việt Nam hiện nay phụ thuộc vào nhiên liệu hóa thạch cho năng lượng rất nhiều của mình. (Sai vị trí trạng từ)", correct: false }
                ],
                translateQ: "Sắp xếp các từ thành câu hoàn chỉnh.",
                whyCorrect: "<span class='hl-green'>Đúng trật tự trạng từ và cụm giới từ.</span>",
                grammar: "<span class='p-grammar'>Cụm động từ: rely heavily on sth (phụ thuộc nặng nề vào cái gì). Trạng từ 'currently' bổ nghĩa cho 'relies'.</span>",
                whyWrong: "<span class='hl-red'>Sai chủ ngữ (nhiên liệu phụ thuộc VN) hoặc dùng sai loại từ ('heavily' là trạng từ không bổ nghĩa cho danh từ 'energy').</span>"
            },
            {
                q: "Arrange the words: solar energy/ renewable/ the/ is/ cleanest/ source/ abundant/ and/ most/ energy.",
                options: [
                    { text: "Solar energy is the cleanest and most abundant renewable energy source.", trans: "Năng lượng mặt trời là nguồn năng lượng tái tạo sạch nhất và dồi dào nhất.", correct: true },
                    { text: "Solar energy is the most abundant and cleanest renewable energy source.", trans: "Năng lượng mặt trời là nguồn năng lượng tái tạo dồi dào nhất và sạch nhất. (Chưa ưu tiên tính từ ngắn trước)", correct: false },
                    { text: "The cleanest solar energy is renewable and most abundant energy source.", trans: "Năng lượng mặt trời sạch nhất là nguồn năng lượng tái tạo và dồi dào nhất. (Sai cấu trúc so sánh nhất)", correct: false },
                    { text: "Renewable energy source is the cleanest and most abundant solar energy.", trans: "Nguồn năng lượng tái tạo là năng lượng mặt trời sạch nhất và dồi dào nhất. (Sai logic tập hợp)", correct: false }
                ],

        // --- GAME STATE ---
        let questions = [];
        let userAnswers = {};
        let currentScore = 0;

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function initQuiz() {
            questions = rawData.map((item, index) => {
                let options = item.options.map(opt => ({ ...opt, originalText: opt.text }));
                return {
                    id: index + 1,
                    q: item.q,
                    options: shuffle(options), 
                    exp: {
                        trans: item.translateQ,
                        whyC: item.whyCorrect,
                        gram: item.grammar,
                        whyW: item.whyWrong
                    }
                };
            });
            renderQuiz();
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            questions.forEach((q, qIndex) => {
                const card = document.createElement('div');
                card.className = 'glass-panel p-6 mb-12 relative';
                
                let html = `
                    <div class="absolute -top-4 left-6 bg-gradient-to-r from-purple-500 to-indigo-500 text-white font-black px-4 py-1 rounded-full shadow-md">
                        CÂU ${q.id}
                    </div>
                    <div class="q-text mt-4 mb-6">${q.q}</div>
                    <div class="space-y-4" id="opts-${q.id}">
                `;

                q.options.forEach((opt, optIndex) => {
                    html += `
                        <button id="btn-${q.id}-${optIndex}" 
                                class="btn-card ans-text" 
                                onclick="handleAnswer(${q.id}, ${optIndex}, ${opt.correct})">
                            <span class="flex-1">${opt.text}</span>
                        </button>
                    `;
                });

                html += `</div>`;

                let expHTML = `
                    <div id="exp-${q.id}" class="explanation-box">
                        <div class="flex items-center gap-2 mb-6 border-b-2 border-purple-100 pb-3">
                            <span class="text-3xl">💡</span>
                            <h3 class="font-black text-purple-700 text-lg uppercase tracking-wide">Giải thích chi tiết từ Cô Mai An</h3>
                        </div>
                        <div class="exp-text">
                            <div class="exp-step bg-blue-50 p-4 rounded-xl border border-blue-100">
                                <span class="exp-title block mb-2">1. Dịch đề bài:</span> 
                                <span class="p-mean text-blue-900">${q.exp.trans}</span>
                            </div>
                            <div class="exp-step bg-white p-4 rounded-xl border border-gray-200">
                                <span class="exp-title block mb-3">2. Dịch nghĩa & Phân tích 4 đáp án:</span>
                                <ul class="list-disc pl-5 space-y-4">
                                    ${q.options.map(opt => `
                                        <li>
                                            <span class="p-word ${opt.correct ? 'hl-green' : 'text-gray-700'}">${opt.originalText}</span><br>
                                            <span class="p-mean text-sm text-gray-600 mt-1 block">👉 ${opt.trans}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                            <div class="exp-step bg-green-50 p-4 rounded-xl border border-green-100">
                                <span class="exp-title block mb-2 text-green-700">3. Tại sao chọn câu này?</span>
                                ${q.exp.whyC} <br> ${q.exp.gram}
                            </div>
                            <div class="exp-step bg-red-50 p-4 rounded-xl border border-red-100 mb-0">
                                <span class="exp-title block mb-2 text-red-700">4. Tại sao các câu khác sai?</span>
                                ${q.exp.whyW}
                            </div>
                        </div>
                    </div>

        function handleAnswer(qId, optIndex, isCorrect) {
            if (userAnswers[qId]) return;

            userAnswers[qId] = true;
            const container = document.getElementById(`opts-${qId}`);
            const buttons = container.querySelectorAll('.btn-card');
            const clickedBtn = document.getElementById(`btn-${qId}-${optIndex}`);
            const expBox = document.getElementById(`exp-${qId}`);

            buttons.forEach(btn => {
                btn.disabled = true;
                btn.style.cursor = 'default';
                btn.style.opacity = '0.6';
            });
            clickedBtn.style.opacity = '1';

            if (isCorrect) {
                clickedBtn.classList.add('correct');
                playDing();
                confetti({ particleCount: 60, spread: 60, origin: { y: 0.8 }, colors: ['#00D26A', '#FDCB6E', '#8854C0'] });
                currentScore++;
                document.getElementById('score-display').innerText = currentScore;
            } else {
                clickedBtn.classList.add('wrong');
                playBuzz();
                const qData = questions.find(q => q.id === qId);
                const correctIdx = qData.options.findIndex(o => o.correct);
                const correctBtn = document.getElementById(`btn-${qId}-${correctIdx}`);
                correctBtn.classList.add('correct');
                correctBtn.style.opacity = '1';
            }

            expBox.style.display = 'block';
        }

        function openNameModal() {
            document.getElementById('name-modal').style.display = 'flex';
            document.getElementById('student-name').focus();
        }

        function handleEnter(e) {
            if(e.key === 'Enter') submitQuiz();
        }

        function submitQuiz() {
            const nameInput = document.getElementById('student-name');
            const errorMsg = document.getElementById('name-error');
            const name = nameInput.value.trim();

            if (!name) {
                nameInput.classList.add('input-error');
                errorMsg.classList.remove('hidden');
                setTimeout(() => nameInput.classList.remove('input-error'), 400);
                return;
            }

            document.getElementById('name-modal').style.display = 'none';
            showResult(name);
        }

        function showResult(name) {
            const modal = document.getElementById('result-modal');
            const greeting = document.getElementById('result-greeting');
            const scoreDisp = document.getElementById('final-score');
            const feedback = document.getElementById('result-feedback');
            const gif = document.getElementById('result-gif');

            scoreDisp.innerText = currentScore;
            const percent = currentScore / 16;

            if (percent === 1) {
                greeting.innerText = `🌟 THIÊN TÀI! ${name} xuất sắc tuyệt đối!`;
                feedback.innerText = "Cô Mai An cực kỳ tự hào về em luôn!";
                gif.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif"; 
                confetti({ particleCount: 300, spread: 100, origin: { y: 0.6 } });
            } else if (percent >= 0.6) {
                greeting.innerText = `👍 LÀM TỐT LẮM, ${name}!`;
                feedback.innerText = "Chỉ cần cẩn thận hơn một chút xíu nữa thôi!";
                gif.src = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif"; 
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else {
                greeting.innerText = `💪 CỐ LÊN NHÉ, ${name}!`;
                feedback.innerText = "Sai ở đâu mình học ở đó. Nhớ đọc kỹ phần giải thích nhé!";
                gif.src = "https://media.giphy.com/media/d2lcHJTG5Tscg/giphy.gif"; 
            }

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('result-modal').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
