<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra Tiếng Anh - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Caveat:wght@700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        /* RESET & BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            background: linear-gradient(45deg, #8854C0, #FDCB6E, #00C9A7, #FF7675);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #333;
            overflow-x: hidden;
            position: relative;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* BACKGROUND PATTERN & FLOATING ELEMENTS */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: radial-gradient(rgba(255, 255, 255, 0.2) 2px, transparent 2px);
            background-size: 30px 30px;
            overflow: hidden;
        }
        .float-shape {
            position: absolute; background: rgba(255, 255, 255, 0.15); border-radius: 5px;
            animation: float 10s linear infinite; opacity: 0.8; backdrop-filter: blur(2px);
        }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0.8; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        
        /* HEADER */
        header {
            text-align: center; padding: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            color: white; font-weight: 800; font-size: 1.1rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            position: sticky; top: 0; z-index: 100;
        }

        /* MAIN CONTAINER */
        #mainContent { display: none; max-width: 800px; margin: 30px auto; padding: 0 15px; padding-bottom: 80px; }

        /* QUESTION CARD (GLASSMORPHISM) */
        .q-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 25px; margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .q-card:hover { transform: translateY(-3px); }
        .q-text { font-size: 1.15rem; font-weight: 700; margin-bottom: 20px; color: #2d3436; line-height: 1.5; }
        
        /* SPECIFIC IMAGE RECREATIONS */
        .sign-box {
            border: 3px solid #2d3436; border-radius: 10px; padding: 20px; text-align: center;
            max-width: 350px; margin: 15px auto; background: #dfe6e9; color: #2d3436; font-weight: 800; font-size: 1.2rem;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }
        .note-box {
            background: #fdf5e6; padding: 20px; font-family: 'Caveat', cursive; font-size: 1.5rem;
            color: #333; transform: rotate(-2deg); box-shadow: 3px 3px 15px rgba(0,0,0,0.2);
            max-width: 350px; margin: 15px auto; border-radius: 5px;
        }

        /* OPTIONS BUTTONS (3D) */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media(max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
        
        .opt-btn {
            background: white; border: 2px solid #e0e0e0; border-radius: 18px; padding: 18px;
            font-family: 'Nunito', sans-serif; font-size: 1.08rem; font-weight: 700; color: #444;
            cursor: pointer; transition: all 0.2s ease;
            box-shadow: 0 7px 0 #e0e0e0; text-align: center; word-break: break-word;
        }
        .opt-btn:hover:not(.disabled) { transform: translateY(-4px) scale(1.02); box-shadow: 0 11px 0 #d1d1d1; }
        .opt-btn:active:not(.disabled) { transform: translateY(4px); box-shadow: 0 3px 0 #e0e0e0; }
        
        /* Correct/Wrong Highlighting (More Vibrant) */
        .opt-btn.correct { background: #00E676; border-color: #00C853; color: white; box-shadow: 0 7px 0 #009624; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .opt-btn.wrong { background: #FF1744; border-color: #D50000; color: white; box-shadow: 0 7px 0 #9b0000; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .opt-btn.disabled { pointer-events: none; opacity: 0.8; }

        /* EXPLANATION BOX */
        .exp-box {
            margin-top: 25px; padding: 20px; border-radius: 18px; background: #fdfcfa;
            border-left: 6px solid #0984e3; display: none; font-size: 1rem; line-height: 1.6; color: #2d3436;
            animation: slideDown 0.4s ease; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .exp-box h4 { margin-bottom: 12px; color: #0984e3; font-weight: 800; font-size: 1.1rem; }
        .exp-step { margin-bottom: 14px; }

        /* EXPLANATION HIGHLIGHT CLASSES */
        .p-word { color: #0984e3; font-weight: bold; }
        .p-phonetic { background: #e0d4f7; color: #6c5ce7; padding: 0 5px; border-radius: 4px; font-family: monospace; }
        .p-mean { color: #d35400; font-style: italic; }
        .p-grammar { text-decoration: underline; text-decoration-color: #e74c3c; text-decoration-thickness: 2px; font-weight: bold; }
        .hl-green { color: #00b894; font-weight: 800; }
        .hl-red { color: #d63031; text-decoration: line-through; font-weight: bold; }
        
        /* NEW: Highlight Translation (Cam Vàng nổi bật) */
        .hl-translation { color: #F0932B; font-weight: 700; background-color: rgba(240, 147, 43, 0.08); padding: 2px 4px; border-radius: 4px; }

        /* SHAKE ANIMATION */
        @keyframes shakeOpt { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
        .shake-active { animation: shakeOpt 0.4s ease; }

        /* SUBMIT BUTTON */
        .submit-btn {
            display: block; width: 100%; max-width: 400px; margin: 0 auto;
            background: linear-gradient(135deg, #0984e3, #6c5ce7); border: none; border-radius: 20px;
            padding: 18px; color: white; font-size: 1.3rem; font-weight: 800; font-family: 'Nunito', sans-serif;
            cursor: pointer; box-shadow: 0 8px 0 #4a3f9e; transition: all 0.2s; text-transform: uppercase;
        }
        .submit-btn:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 12px 0 #4a3f9e; }
        .submit-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #4a3f9e; }

        /* MODALS (NAME & RESULT) */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 40px 30px; border-radius: 25px; width: 90%; max-width: 450px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative;
        }
        .modal-title { font-size: 1.8rem; font-weight: 800; color: #2d3436; margin-bottom: 15px; }
        .name-input {
            width: 100%; padding: 15px; border: 2px solid #dfe6e9; border-radius: 12px;
            font-size: 1.1rem; font-family: 'Nunito'; margin-bottom: 20px; text-align: center;
        }
        .name-input.error { border-color: #ff4757; background: #ffefef; animation: shakeOpt 0.4s ease; }
        .score-text { font-size: 3rem; font-weight: 800; color: #00b894; margin: 15px 0; }
        .result-gif { width: 100%; max-height: 250px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; }
        
        /* CONFETTI CANVAS */
        #confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

        /* GIAO DIỆN MÀN HÌNH KHÓA (DO NGƯỜI DÙNG CUNG CẤP - CẤM SỬA) */
        #passwordModal {
          position:fixed; inset:0; z-index:9999;
          display:flex; align-items:center; justify-content:center;
          background:rgba(5,2,15,0.92); backdrop-filter:blur(20px);
        }
        .pw-card {
          background:linear-gradient(160deg, rgba(40,10,70,0.95) 0%, rgba(15,5,30,0.98) 100%);
          border:1.5px solid rgba(240,192,64,0.4); border-radius:24px; padding:48px 40px 40px; 
          max-width:440px; width:93%; text-align:center; position:relative; overflow:hidden;
          box-shadow:0 0 60px rgba(106,5,114,0.6), 0 0 120px rgba(240,192,64,0.1), inset 0 1px 0 rgba(240,192,64,0.15);
        }
        .pw-card::before {
          content:''; position:absolute; top:0; left:0; right:0; height:3px;
          background:linear-gradient(90deg, #6A0572, #F0C040, #6A0572);
        }
        .pw-crest { font-size:4rem; margin-bottom:8px; display:block; }
        .pw-title { font-family:'Cinzel', serif; font-size:1.4rem; font-weight:700; color:#F0C040; margin-bottom:6px; letter-spacing:1px; }
        .pw-sub   { font-size:.87rem; color:rgba(200,200,212,0.6); margin-bottom:24px; }
        .pw-input {
          width:100%; padding:13px 20px; border-radius:12px;
          border:1.5px solid rgba(240,192,64,0.3); background:rgba(255,255,255,0.05);
          color:#FFE082; font-size:1rem; font-family:'Nunito', sans-serif;
          outline:none; letter-spacing:3px; text-align:center; transition:all .3s;
        }
        .pw-input:focus { border-color:#F0C040; box-shadow:0 0 0 3px rgba(240,192,64,0.15); }
        .pw-input.error { border-color:#FF4757; box-shadow:0 0 0 3px rgba(255,71,87,0.25); animation:shake .4s ease; }
        .pw-input::placeholder { color:rgba(200,200,212,0.3); letter-spacing:1px; }
        .pw-btn {
          width:100%; padding:14px; margin-top:14px; border-radius:12px; border:none;
          background:linear-gradient(135deg, #6A0572 0%, #9B1FA8 40%, #F0C040 100%);
          color:#fff; font-size:1rem; font-weight:700; font-family:'Cinzel', serif;
          cursor:pointer; letter-spacing:.5px; transition:transform .2s;
        }
        .pw-btn:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(106,5,114,0.7); }
        .pw-err { color:#ff8a9a; font-size:.84rem; margin-top:10px; display:none; font-weight:700; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 15%,45%,75%{transform:translateX(-6px)} 30%,60%,90%{transform:translateX(6px)} }
    </style>
</head>
<body>

<div id="passwordModal">
  <div class="pw-card">
    <span class="pw-crest">🔒</span>
    <div class="pw-title">BẢO MẬT</div>
    <div class="pw-sub">Vui lòng nhập mật khẩu để làm bài</div>
    <input type="password" class="pw-input" id="pwInput" placeholder="Nhập mật khẩu..." autocomplete="off" />
    <button class="pw-btn" onclick="checkPassword()">XÁC NHẬN</button>
    <div class="pw-err" id="pwErr">Mật khẩu không đúng! Vui lòng thử lại.</div>
  </div>
</div>

<div class="bg-container" id="bgContainer"></div>
<canvas id="confettiCanvas"></canvas>

<div id="mainContent">
    <header>Giáo viên tạo: Ms Mai An ULIS header nhỏ</header>
    <div id="quizContainer" style="margin-top: 20px;"></div>
    <button class="submit-btn" onclick="openNameModal()">🎯 Nộp Bài & Xem Kết Quả</button>
</div>

<div class="modal-overlay" id="nameModal">
    <div class="modal-content">
        <div class="modal-title">Bạn tên là gì nhỉ? 🤔</div>
        <input type="text" id="studentName" class="name-input" placeholder="Ví dụ: Nguyễn Văn A..." onkeyup="if(event.key==='Enter') showResult()">
        <button class="submit-btn" onclick="showResult()">Xác nhận</button>
    </div>
</div>

<div class="modal-overlay" id="resultModal">
    <div class="modal-content">
        <div class="modal-title" id="resultGreeting">🌟 THIÊN TÀI!</div>
        <img id="resultGif" class="result-gif" src="" alt="Meme">
        <div style="font-size: 1.2rem; color: #636e72;">Điểm số của bạn:</div>
        <div class="score-text" id="resultScore">0/20</div>
        <button class="submit-btn" onclick="location.reload()">Làm lại bài</button>
    </div>
</div>

<script>
/* SCRIPT KHÓA BẢO MẬT (DO NGƯỜI DÙNG CUNG CẤP - CẤM SỬA) */
const _k  = [49, 54, 49, 49]; 
const _pw = _k.map(c => String.fromCharCode(c)).join('');

function checkPassword() {
  const inp = document.getElementById('pwInput');
  const err = document.getElementById('pwErr');
  if (inp.value === _pw) {
    document.getElementById('passwordModal').style.display = 'none';
    const main = document.getElementById('mainContent');
    if(main) main.style.display = 'block';
  } else {
    inp.classList.remove('error'); void inp.offsetWidth; inp.classList.add('error');
    err.style.display = 'block'; setTimeout(() => inp.classList.remove('error'), 500);
  }
}
document.addEventListener('DOMContentLoaded', () => {
  const pwInput = document.getElementById('pwInput');
  if(pwInput) pwInput.addEventListener('keydown', e => { if (e.key==='Enter') checkPassword(); });
  spawnFloats(); // Kích hoạt hiệu ứng bồng bềnh
});

// TẠO HIỆU ỨNG BỒNG BỀNH
function spawnFloats() {
    const container = document.getElementById('bgContainer');
    for(let i=0; i<10; i++) {
        const shape = document.createElement('div');
        shape.className = 'float-shape';
        
        // Random size, position, animation delay
        const size = Math.random()*50 + 20 + 'px';
        shape.style.width = size; shape.style.height = size;
        shape.style.left = Math.random()*100 + 'vw';
        shape.style.animationDelay = Math.random()*10 + 's';
        shape.style.animationDuration = Math.random()*15 + 10 + 's'; // 10-25s
        
        // Random shape
        const type = Math.floor(Math.random()*3);
        if(type===0) shape.style.borderRadius = '50%'; // Circle
        if(type===1) shape.style.clipPath = 'polygon(50% 0%, 0% 100%, 100% 100%)'; // Triangle
        
        container.appendChild(shape);
    }
}

/* DỮ LIỆU BÀI TẬP (20 CÂU) - Đã cập nhật tô màu câu dịch và cấu trúc 4 bước */
const quizData = [
    {
        id: 1,
        text: "Question 1: Mark the letter whose underlined part differs from the other three in pronunciation.",
        options: ["nak<u>ed</u>", "start<u>ed</u>", "intend<u>ed</u>", "watch<u>ed</u>"],
        answer: "watch<u>ed</u>",
        explanation: `
            <div class='exp-step'><strong>1. Phân tích 4 đáp án:</strong><br>
                - <span class='p-word'>naked</span> <span class='p-phonetic'>/ˈneɪkɪd/</span>: (<span class='p-mean'>trần truồng</span>)<br>
                - <span class='p-word'>started</span> <span class='p-phonetic'>/ˈstɑːrtɪd/</span>: (<span class='p-mean'>bắt đầu</span>)<br>
                - <span class='p-word'>intended</span> <span class='p-phonetic'>/ɪnˈtendɪd/</span>: (<span class='p-mean'>có ý định</span>)<br>
                - <span class='p-word'>watched</span> <span class='p-phonetic'>/wɒtʃt/</span>: (<span class='p-mean'>đã xem</span>)
            </div>
            <div class='exp-step'><strong>2. Dịch nghĩa toàn câu/đề:</strong> <span class='hl-translation'>Chọn từ có phần gạch chân đuôi -ed phát âm khác.</span></div>
            <div class='exp-step'><strong>3. Tại sao đúng?</strong> <span class='hl-green'>watched</span> tận cùng là /tʃ/ (âm vô thanh) nên đuôi -ed phát âm là /t/.</div>
            <div class='exp-step'><strong>4. Tại sao sai?</strong> <span class='hl-red'>naked</span> (trường hợp đặc biệt), <span class='hl-red'>started</span> (tận cùng /t/) và <span class='hl-red'>intended</span> (tận cùng /d/) đều phát âm đuôi -ed là /ɪd/.</div>`
    },
    {
        id: 2,
        text: "Question 2: Word whose underlined part differs from the other three in pronunciation.",
        options: ["structur<u>es</u>", "embroider<u>s</u>", "preserv<u>es</u>", "embarrass<u>es</u>"],
        answer: "embarrass<u>es</u>",
        explanation: `
            <div class='exp-step'><strong>1. Phân tích 4 đáp án:</strong><br>
                - <span class='p-word'>structures</span> (<span class='p-mean'>cấu trúc</span>)<br>
                - <span class='p-word'>embroiders</span> (<span class='p-mean'>thêu dệt</span>)<br>
                - <span class='p-word'>preserves</span> (<span class='p-mean'>bảo tồn</span>)<br>
                - <span class='p-word'>embarrasses</span> (<span class='p-mean'>làm xấu hổ</span>)
            </div>
            <div class='exp-step'><strong>2. Dịch nghĩa toàn câu/đề:</strong> <span class='hl-translation'>Chọn từ có phần gạch chân đuôi -s/-es phát âm khác.</span></div>
            <div class='exp-step'><strong>3. Tại sao đúng?</strong> <span class='hl-green'>embarrasses</span> tận cùng là /s/ nên đuôi -es phát âm là /ɪz/.</div>
            <div class='exp-step'><strong>4. Tại sao sai?</strong> <span class='hl-red'>structures</span>, <span class='hl-red'>embroiders</span>, <span class='hl-red'>preserves</span> tận cùng là âm hữu thanh nên đuôi -s phát âm là /z/.</div>`
    },
    {
        id: 3,
        text: "Question 3: Word that differs from the other three in the position of primary stress.",
        options: ["manage", "shortage", "village", "correct"],
        answer: "correct",
        explanation: `
            <div class='exp-step'><strong>1. Phân tích 4 đáp án:</strong><br>
                - <span class='p-word'>manage</span> <span class='p-phonetic'>/ˈmænɪdʒ/</span> (<span class='p-mean'>quản lý</span>): Trọng âm 1<br>
                - <span class='p-word'>shortage</span> <span class='p-phonetic'>/ˈʃɔːrtɪdʒ/</span> (<span class='p-mean'>thiếu hụt</span>): Trọng âm 1<br>
                - <span class='p-word'>village</span> <span class='p-phonetic'>/ˈvɪlɪdʒ/</span> (<span class='p-mean'>ngôi làng</span>): Trọng âm 1<br>
                - <span class='p-word'>correct</span> <span class='p-phonetic'>/kəˈrekt/</span> (<span class='p-mean'>chính xác</span>): Trọng âm 2
            </div>
            <div class='exp-step'><strong>2. Dịch nghĩa toàn câu/đề:</strong> <span class='hl-translation'>Chọn từ có vị trí trọng âm chính khác với các từ còn lại.</span></div>
            <div class='exp-step'><strong>3. Tại sao đúng?</strong> <span class='hl-green'>correct</span> là đáp án duy nhất có trọng âm rơi vào âm tiết thứ hai.</div>
            <div class='exp-step'><strong>4. Tại sao sai?</strong> <span class='hl-red'>manage, shortage, village</span> đều có <span class='p-grammar'>quy tắc danh/động từ 2 âm tiết</span> thường rơi vào âm 1.</div>`
    },
    {
        id: 4,
        text: "Question 4: Word that differs from the other three in the position of primary stress.",
        options: ["spaciousness", "solicitor", "consequences", "separately"],
        answer: "solicitor",
        explanation: `
            <div class='exp-step'><strong>1. Phân tích 4 đáp án:</strong><br>
                - <span class='p-word'>spaciousness</span> <span class='p-phonetic'>/ˈspeɪʃəsnəs/</span>: Trọng âm 1<br>
                - <span class='p-word'>solicitor</span> <span class='p-phonetic'>/səˈlɪsɪtər/</span>: Trọng âm 2<br>
                - <span class='p-word'>consequences</span> <span class='p-phonetic'>/ˈkɒnsɪkwensɪz/</span>: Trọng âm 1<br>
                - <span class='p-word'>separately</span> <span class='p-phonetic'>/ˈsepərətli/</span>: Trọng âm 1
            </div>
            <div class='exp-step'><strong>2. Dịch nghĩa toàn câu/đề:</strong> <span class='hl-translation'>Chọn từ có vị trí trọng âm chính khác.</span></div>
            <div class='exp-step'><strong>3. Tại sao đúng?</strong> <span class='hl-green'>solicitor</span> trọng âm rơi vào âm tiết thứ hai.</div>
            <div class='exp-step'><strong>4. Tại sao sai?</strong> Các từ <span class='hl-red'>spaciousness, consequences, separately</span> đều trọng âm 1.</div>`
    },
    {
        id: 5,
        text: "Question 5: Olivia is _______ dancer in our school’s festival team and often leads the final performance.",
        options: ["more talented", "the most talented", "the more talented", "as talented"],
        answer: "the most talented",
        explanation: `
            <div class='exp-step'><strong>1. Phân tích đáp án:</strong> Gồm các dạng so sánh của "talented" (tài năng).</div>
            <div class='exp-step'><strong>2. Dịch nghĩa toàn câu:</strong> <span class='hl-translation'>"Olivia là vũ công tài năng nhất trong đội văn nghệ lễ hội của trường và thường dẫn dắt tiết mục biểu diễn cuối cùng."</span></div>

            <div class='exp-step'><strong>2. Dịch nghĩa mẩu giấy/câu hỏi:</strong> <span class='hl-translation'>Jake nhắn Jennie trả sách. Hỏi sách bây giờ đang ở đâu?</span></div>
            <div class='exp-step'><strong>3. Tại sao đúng?</strong> Dựa vào câu <span class='hl-green'>Text me when you're going to return it</span> (nhắn tớ khi CẬU định trả nó), chứng tỏ Jennie vẫn đang giữ sách và chưa đi trả.</div>
            <div class='exp-step'><strong>4. Tại sao sai?</strong> Không có thông tin ở lớp học (<span class='hl-red'>A</span>). Sách chưa được trả nên không ở thư viện (<span class='hl-red'>C</span>). Jake đang đợi Jennie trả chứ chưa giữ sách (<span class='hl-red'>B</span>).</div>`
    }
];

// Trạng thái Game
let score = 0;
let answeredQuestions = 0;
const totalQuestions = quizData.length;

// AUDIO API (Tạo âm thanh Web Audio tự sinh)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); // A5
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }
}

// XÁO TRỘN MẢNG
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// RENDER GIAO DIỆN
function initQuiz() {
    const container = document.getElementById('quizContainer');
    container.innerHTML = '';
    
    quizData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.id = `qcard_${index}`;
        
        // Trộn đáp án cho câu này
        const shuffledOptions = shuffleArray([...item.options]);
        
        let optionsHTML = shuffledOptions.map(opt => 
            `<button class="opt-btn" onclick="checkAnswer(this, ${index}, '${escapeQuotes(opt)}', '${escapeQuotes(item.answer)}')">${opt}</button>`
        ).join('');

        card.innerHTML = `
            <div class="q-text">${item.text}</div>
            <div class="options-grid">${optionsHTML}</div>
            <div class="exp-box" id="exp_${index}">
                <h4>💡 GIẢI THÍCH CHI TIẾT:</h4>
                ${item.explanation}
            </div>
        `;
        container.appendChild(card);
    });
}

function escapeQuotes(str) {
    return str.replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

// XỬ LÝ CHỌN ĐÁP ÁN
function checkAnswer(btnElement, qIndex, selectedStr, correctStr) {
    const card = document.getElementById(`qcard_${qIndex}`);
    const buttons = card.querySelectorAll('.opt-btn');
    buttons.forEach(b => b.classList.add('disabled'));

    if (selectedStr === correctStr) {
        btnElement.classList.add('correct');
        playSound('correct');
        fireConfetti();
        score++;
    } else {
        btnElement.classList.add('wrong');
        btnElement.classList.add('shake-active');
        playSound('wrong');
        
        // Hiện đáp án đúng
        buttons.forEach(b => {
            if (b.innerHTML === correctStr) {
                b.style.background = '#00E676';
                b.style.color = 'white';
                b.style.borderColor = '#00C853';
                b.style.boxShadow = '0 7px 0 #009624';
            }
        });
    }

    // Hiện giải thích ngay bên dưới
    document.getElementById(`exp_${qIndex}`).style.display = 'block';
    answeredQuestions++;
}

// CONFETTI EFFECT (PHÁO GIẤY)
function fireConfetti() {
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    
    let particles = [];
    for(let i=0; i<100; i++) {
        particles.push({
            x: canvas.width/2, y: canvas.height/2,
            r: Math.random()*6+2,
            dx: Math.random()*10-5, dy: Math.random()*-10-5,
            color: ['#00E676', '#FF1744', '#FDCB6E', '#0984e3'][Math.floor(Math.random()*4)]
        });
    }

    function animate() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
            p.x += p.dx; p.y += p.dy; p.dy += 0.2; // gravity
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fillStyle = p.color; ctx.fill();
            if(p.y > canvas.height) particles.splice(i, 1);
        });
        if(particles.length > 0) requestAnimationFrame(animate);
    }
    animate();
}

// XỬ LÝ LUỒNG NỘP BÀI
function openNameModal() {
    if(answeredQuestions < totalQuestions) {
        if(!confirm("Bạn chưa làm xong tất cả các câu. Vẫn muốn nộp bài chứ?")) return;
    }
    document.getElementById('nameModal').style.display = 'flex';
    document.getElementById('studentName').focus();
}

function showResult() {
    const nameInput = document.getElementById('studentName');
    const nameVal = nameInput.value.trim();
    if (!nameVal) {
        nameInput.classList.add('error');
        setTimeout(() => nameInput.classList.remove('error'), 500);
        return;
    }

    document.getElementById('nameModal').style.display = 'none';
    
    // Tính điểm số và GIF
    const percent = score / totalQuestions;
    const greetingEl = document.getElementById('resultGreeting');
    const gifEl = document.getElementById('resultGif');
    
    document.getElementById('resultScore').innerText = `${score} / ${totalQuestions}`;

    if (percent === 1) {
        greetingEl.innerText = `🌟 THIÊN TÀI! ${nameVal} xuất sắc tuyệt đối!`;
        gifEl.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif"; // Smart/Happy cat
    } else if (percent >= 0.6) {
        greetingEl.innerText = `👏 Rất Tốt, ${nameVal}! Cố chút nữa nhé.`;
        gifEl.src = "https://media.giphy.com/media/3oz8xAFtjouKAfOUOQ/giphy.gif"; // Thumbs up
    } else {
        greetingEl.innerText = `😅 Ồ no, ${nameVal}! Ôn bài kỹ lại nha!`;
        gifEl.src = "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif"; // Crying
    }

    document.getElementById('resultModal').style.display = 'flex';
    if(percent === 1) {
        for(let i=0; i<5; i++) setTimeout(fireConfetti, i*300);
    }
}

// Khởi chạy
window.onload = initQuiz;

</script>
