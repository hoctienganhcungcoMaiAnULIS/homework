<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Exercises - English Grammar</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #FDCB6E;
            --tertiary: #00C9A7;
            --correct: #00D26A;
            --wrong: #FF4757;
            --text-dark: #2D3436;
            --white: #FFFFFF;
            --bg-card: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            /* Animated Gradient Background */
            background: linear-gradient(-45deg, #8854C0, #FDCB6E, #00C9A7, #FF9A9E);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* SVG Pattern Overlay floating independently */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5l3.5 10h10.5l-8.5 6.5 3 10.5-9-6.5-9 6.5 3-10.5-8.5-6.5h10.5z' fill='%23ffffff' fill-opacity='0.2' fill-rule='evenodd'/%3E%3C/svg%3E");
            animation: floatPattern 40s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatPattern {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(-500px) translateX(200px); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header-title {
            text-align: center;
            color: var(--white);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            margin-bottom: 5px;
            font-size: 2.5rem;
            font-weight: 900;
        }

        .header-subtitle {
            text-align: center;
            color: #FFF;
            font-size: 1.1rem;
            font-weight: 600;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            margin: 0 auto 30px auto;
            display: block;
            width: fit-content;
        }

        .section-title {
            background: var(--white);
            color: var(--primary);
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
            text-align: left;
            border: 4px solid var(--primary);
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
            transition: transform 0.2s;
            border: 3px solid transparent;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        /* Gap Fill Styles */
        .blank-space {
            display: inline-block;
            min-width: 80px;
            height: 40px;
            border-bottom: 3px dashed var(--primary);
            margin: 0 10px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            color: var(--primary);
            position: relative;
            vertical-align: middle;
            transition: all 0.2s;
        }
        
        .blank-space:hover {
            background: rgba(136, 84, 192, 0.1);
            border-radius: 10px;
        }

        .blank-space.filled-correct {
            border: none; background: var(--correct); color: white; border-radius: 10px; padding: 0 10px; line-height: 40px; box-shadow: 0 4px 0 #00A355; pointer-events: none;
        }
        .blank-space.filled-wrong {
            border: none; background: var(--wrong); color: white; border-radius: 10px; padding: 0 10px; line-height: 40px; box-shadow: 0 4px 0 #D63031; pointer-events: none;
        }

        .popup-options {
            display: none;
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 3px solid var(--primary);
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 100;
            white-space: nowrap;
        }
        .popup-options.active { display: flex; gap: 10px; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .popup-btn {
            background: #F0F0F0; border: none; padding: 10px 20px; font-size: 1.1rem; font-weight: 700; border-radius: 10px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 #CCC; color: var(--text-dark);
        }
        .popup-btn:hover { background: var(--secondary); box-shadow: 0 4px 0 #D4A85A; transform: translateY(-2px); }

        /* MCQ Styles */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: var(--white);
            border: 3px solid #E2E8F0;
            border-radius: 15px;
            padding: 15px 20px;
            font-size: 1.08rem;
            font-weight: 700;
            color: var(--text-dark);
            cursor: pointer;
            text-align: left;
            box-shadow: 0 6px 0 #E2E8F0;
            transition: all 0.2s;
            position: relative;
        }

        .option-btn:hover:not(.disabled) {
            transform: translateY(-3px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 9px 0 var(--primary);
        }

        .option-btn.correct {
            background: var(--correct); color: white; border-color: #00A355; box-shadow: 0 6px 0 #00A355; pointer-events: none;
        }
        .option-btn.wrong {
            background: var(--wrong); color: white; border-color: #D63031; box-shadow: 0 6px 0 #D63031; animation: shake 0.4s; pointer-events: none;
        }
        .option-btn.disabled { pointer-events: none; opacity: 0.7; }

        /* Explanation Box */
        .explanation {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #F8F9FA;
            border-left: 6px solid var(--secondary);
            border-radius: 10px;
            font-size: 1rem;
            line-height: 1.7;
            animation: fadeIn 0.5s ease;
        }
        .explanation.active { display: block; }
        .explanation h4 { color: var(--primary); margin-bottom: 10px; font-size: 1.1rem; }
        .explanation b { color: #333; }

        /* Submit Area */
        .submit-area { text-align: center; margin: 40px 0; }
        .submit-btn {
            background: var(--tertiary); color: white; font-size: 1.5rem; font-weight: 900; padding: 15px 40px; border: none; border-radius: 20px; box-shadow: 0 8px 0 #009A80; cursor: pointer; transition: 0.2s;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 11px 0 #009A80; }

        /* Result Modal */
        #resultModal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 30px; text-align: center; max-width: 500px; width: 90%; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-content h2 { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
        .modal-content p { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; }
        .modal-btn {
            background: var(--secondary); color: var(--text-dark); border: none; padding: 10px 30px; font-size: 1.2rem; font-weight: 800; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 #D4A85A;
        }

        /* Confetti Container */
        #confetti-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 999; }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }
        @keyframes popIn { 0% { opacity: 0; transform: translateX(-50%) scale(0.5); } 100% { opacity: 1; transform: translateX(-50%) scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; }
            .header-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="pattern-overlay"></div>
    <div id="confetti-container"></div>

    <div class="container">
        <h1 class="header-title">English Basic Exercises</h1>
        <div class="header-subtitle">Giáo viên tạo: Ms Mai An ULIS</div>

        <div id="quiz-container"></div>

        <div class="submit-area">
            <button class="submit-btn" onclick="showResults()">NỘP BÀI 🎉</button>
        </div>
    </div>

    <div id="resultModal">
        <div class="modal-content">
            <h2 id="modal-title">Tuyệt vời!</h2>
            <p>Số câu đúng: <span id="score-text">0</span> / <span id="total-text">0</span></p>
            <p id="feedback-text" style="color: var(--tertiary); font-size: 1.2rem;"></p>
            <button class="modal-btn" onclick="closeModal()">Xem lại bài</button>
        </div>
    </div>

    <script>
        // --- DATA LAYER ---
        const quizData = [
            // ================= EXERCISE 1 =================
            {
                section: "1. Fill in each blank with \"a\" or \"an\".",
                type: "gap", qNum: "1.1", text: "1. {blank} person", options: ["a", "an"], correct: "a",
                expl: `<b>1. Dịch nghĩa:</b> Một người.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "a"?</b> Từ "person" bắt đầu bằng phụ âm /p/.<br><b>4. Tại sao sai:</b> Không dùng "an" vì từ không bắt đầu bằng nguyên âm (u, e, o, a, i).`
            },
            { type: "gap", qNum: "1.2", text: "2. {blank} cinema", options: ["a", "an"], correct: "a", expl: `<b>1. Dịch nghĩa:</b> Một rạp chiếu phim.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "a"?</b> "cinema" bắt đầu bằng phụ âm /s/ (chữ c phát âm là /s/).<br><b>4. Tại sao sai:</b> Không dùng "an" trước phụ âm.` },
            { type: "gap", qNum: "1.3", text: "3. {blank} accident", options: ["a", "an"], correct: "an", expl: `<b>1. Dịch nghĩa:</b> Một vụ tai nạn.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "an"?</b> "accident" bắt đầu bằng nguyên âm /æ/.<br><b>4. Tại sao sai:</b> Không dùng "a" trước nguyên âm.` },
            { type: "gap", qNum: "1.4", text: "4. {blank} exhibition", options: ["a", "an"], correct: "an", expl: `<b>1. Dịch nghĩa:</b> Một cuộc triển lãm.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "an"?</b> "exhibition" bắt đầu bằng nguyên âm /e/.<br><b>4. Tại sao sai:</b> Không dùng "a" trước nguyên âm.` },
            { type: "gap", qNum: "1.5", text: "5. {blank} impression", options: ["a", "an"], correct: "an", expl: `<b>1. Dịch nghĩa:</b> Một ấn tượng.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "an"?</b> "impression" bắt đầu bằng nguyên âm /ɪ/.<br><b>4. Tại sao sai:</b> Không dùng "a" trước nguyên âm.` },
            { type: "gap", qNum: "1.6", text: "6. {blank} computer", options: ["a", "an"], correct: "a", expl: `<b>1. Dịch nghĩa:</b> Một máy tính.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "a"?</b> "computer" bắt đầu bằng phụ âm /k/.<br><b>4. Tại sao sai:</b> Không dùng "an" trước phụ âm.` },
            { type: "gap", qNum: "1.7", text: "7. {blank} stilt house", options: ["a", "an"], correct: "a", expl: `<b>1. Dịch nghĩa:</b> Một ngôi nhà sàn.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "a"?</b> "stilt" bắt đầu bằng phụ âm /s/.<br><b>4. Tại sao sai:</b> Không dùng "an" trước phụ âm.` },
            { type: "gap", qNum: "1.8", text: "8. {blank} hour", options: ["a", "an"], correct: "an", expl: `<b>1. Dịch nghĩa:</b> Một giờ đồng hồ.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "an"?</b> Đây là một bẫy! Chữ 'h' trong "hour" là âm câm, từ này bắt đầu bằng âm /aʊ/ (nguyên âm) nên phải dùng "an".<br><b>4. Tại sao sai:</b> Không dùng "a" vì âm phát ra đầu tiên là nguyên âm.` },
            { type: "gap", qNum: "1.9", text: "9. {blank} ethnic group", options: ["a", "an"], correct: "an", expl: `<b>1. Dịch nghĩa:</b> Một nhóm dân tộc.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "an"?</b> "ethnic" bắt đầu bằng nguyên âm /e/.<br><b>4. Tại sao sai:</b> Không dùng "a" trước nguyên âm.` },
            { type: "gap", qNum: "1.10", text: "10. {blank} finger", options: ["a", "an"], correct: "a", expl: `<b>1. Dịch nghĩa:</b> Một ngón tay.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "a"?</b> "finger" bắt đầu bằng phụ âm /f/.<br><b>4. Tại sao sai:</b> Không dùng "an" trước phụ âm.` },
            { type: "gap", qNum: "1.11", text: "11. {blank} aunt", options: ["a", "an"], correct: "an", expl: `<b>1. Dịch nghĩa:</b> Một người dì/cô.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "an"?</b> "aunt" bắt đầu bằng nguyên âm /æ/ hoặc /ɑː/.<br><b>4. Tại sao sai:</b> Không dùng "a" trước nguyên âm.` },
            { type: "gap", qNum: "1.12", text: "12. {blank} honor", options: ["a", "an"], correct: "an", expl: `<b>1. Dịch nghĩa:</b> Một niềm vinh dự.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "an"?</b> Giống câu 8, chữ 'h' trong "honor" là âm câm. Từ bắt đầu bằng âm /ɒ/ (nguyên âm).<br><b>4. Tại sao sai:</b> Không dùng "a" do phát âm bắt đầu bằng nguyên âm.` },
            { type: "gap", qNum: "1.13", text: "13. {blank} uniform", options: ["a", "an"], correct: "a", expl: `<b>1. Dịch nghĩa:</b> Một bộ đồng phục.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "a"?</b> Bẫy kinh điển! Dù viết là 'u' nhưng phát âm là /juː/ (âm 'y' là bán phụ âm). Do đó phải dùng "a".<br><b>4. Tại sao sai:</b> Dùng "an" sẽ sai vì từ không phát âm là nguyên âm ngay đầu.` },
            { type: "gap", qNum: "1.14", text: "14. {blank} university", options: ["a", "an"], correct: "a", expl: `<b>1. Dịch nghĩa:</b> Một trường đại học.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "a"?</b> Tương tự câu 13, "university" phát âm bắt đầu bằng /juː/, là một bán phụ âm.<br><b>4. Tại sao sai:</b> Không dùng "an" vì phát âm không bắt đầu bằng nguyên âm.` },
            { type: "gap", qNum: "1.15", text: "15. {blank} student", options: ["a", "an"], correct: "a", expl: `<b>1. Dịch nghĩa:</b> Một học sinh.<br><b>2. Các đáp án:</b> A. a; B. an.<br><b>3. Tại sao chọn "a"?</b> "student" bắt đầu bằng phụ âm /s/.<br><b>4. Tại sao sai:</b> Không dùng "an" trước phụ âm.` },

            // ================= EXERCISE 2 =================
            {
                section: "2. Fill in each blank with \"the\" or \"Ø\".",
                type: "gap", qNum: "2.1", text: "1. {blank} Earth orbits around {blank} Sun.", options: ["The - the", "Ø - Ø", "The - Ø", "Ø - the"], correct: "The - the",
                expl: `<b>1. Dịch nghĩa:</b> Trái đất quay quanh Mặt trời.<br><b>2. Các đáp án:</b> Xét các cặp mạo từ.<br><b>3. Tại sao chọn "The - the"?</b> Earth (Trái đất) và Sun (Mặt trời) là những vật thể duy nhất trong vũ trụ, quy tắc ngữ pháp bắt buộc dùng "The" trước danh từ chỉ vật duy nhất.<br><b>4. Tại sao sai:</b> Rỗng (Ø) không được phép dùng với các thực thể thiên văn duy nhất.`
            },
            { type: "gap", qNum: "2.2", text: "2. {blank} dogs are our best friends.", options: ["The", "Ø"], correct: "Ø", expl: `<b>1. Dịch nghĩa:</b> Chó là người bạn tốt nhất của chúng ta.<br><b>2. Các đáp án:</b> "the" hoặc Rỗng (Ø).<br><b>3. Tại sao chọn "Ø"?</b> Khi nói về một loài động vật nói chung (danh từ số nhiều "dogs"), ta không dùng mạo từ.<br><b>4. Tại sao sai:</b> Nếu dùng "The dogs", nó sẽ mang nghĩa chỉ "những con chó cụ thể nào đó", không phù hợp với câu nói chung.` },
            { type: "gap", qNum: "2.3", text: "3. My foreign friend took me on sightseeing tour around {blank} town.", options: ["the", "Ø"], correct: "the", expl: `<b>1. Dịch nghĩa:</b> Người bạn ngoại quốc đưa tôi đi ngắm cảnh quanh thị trấn.<br><b>2. Các đáp án:</b> "the" hoặc "Ø".<br><b>3. Tại sao chọn "the"?</b> "town" ở đây ám chỉ thị trấn mà người nói đang sống/đang ở, đã được xác định trong ngữ cảnh.<br><b>4. Tại sao sai:</b> "around town" có thể dùng Ø trong một số cụm cố định, nhưng theo đáp án chuẩn của sách và ngữ cảnh ngắm cảnh cụ thể, "the town" là đáp án chính xác nhất.` },
            { type: "gap", qNum: "2.4", text: "4. Last year, a terrible storm reached {blank} Viet Nam.", options: ["the", "Ø"], correct: "Ø", expl: `<b>1. Dịch nghĩa:</b> Năm ngoái, một cơn bão khủng khiếp đã đổ bộ vào Việt Nam.<br><b>2. Các đáp án:</b> "the" hoặc "Ø".<br><b>3. Tại sao chọn "Ø"?</b> Tên quốc gia (như Viet Nam, Japan, France) KHÔNG đi kèm mạo từ (trừ một số nước có từ Republic, Kingdom, States...).<br><b>4. Tại sao sai:</b> Dùng "the Viet Nam" là sai quy tắc cơ bản.` },
            { type: "gap", qNum: "2.5", text: "5. They will move to {blank} mansion next month.", options: ["a", "the", "Ø"], correct: "a", expl: `<b>1. Dịch nghĩa:</b> Họ sẽ chuyển đến một căn biệt thự vào tháng tới.<br><b>2. Các đáp án:</b> a, the, Ø.<br><b>3. Tại sao chọn "a"?</b> Theo đáp án chuẩn của sách là "a". "mansion" là danh từ đếm được số ít, được nhắc đến lần đầu tiên chưa xác định cụ thể với người nghe.<br><b>4. Tại sao sai:</b> "the" sai vì chưa rõ biệt thự nào. "Ø" sai vì danh từ đếm được số ít không được đứng một mình.` },
            { type: "gap", qNum: "2.6", text: "6. Many people migrate to {blank} US in the hope of material success.", options: ["the", "Ø"], correct: "the", expl: `<b>1. Dịch nghĩa:</b> Nhiều người di cư đến Mỹ với hy vọng thành công về vật chất.<br><b>2. Các đáp án:</b> "the" hoặc "Ø".<br><b>3. Tại sao chọn "the"?</b> "US" (United States) là quốc gia có chứa từ "States", luôn phải có "the" đi trước (the USA, the US).<br><b>4. Tại sao sai:</b> Bỏ trống (Ø) trước US là sai ngữ pháp.` },
            { type: "gap", qNum: "2.7", text: "7. Do you have any ideas about {blank} British Isles?", options: ["the", "Ø"], correct: "the", expl: `<b>1. Dịch nghĩa:</b> Bạn có biết gì về Quần đảo Anh không?<br><b>2. Các đáp án:</b> "the" hoặc "Ø".<br><b>3. Tại sao chọn "the"?</b> Tên các quần đảo (isles, islands số nhiều) luôn đi kèm với "the" (ví dụ: the Philippines, the British Isles).<br><b>4. Tại sao sai:</b> Dùng Ø chỉ dành cho tên một hòn đảo đơn lẻ.` },
            { type: "gap", qNum: "2.8", text: "8. Watch out! Do not use {blank} that table. It has been broken recently.", options: ["the", "Ø"], correct: "Ø", expl: `<b>1. Dịch nghĩa:</b> Cẩn thận! Đừng dùng cái bàn đó. Nó mới bị gãy.<br><b>2. Các đáp án:</b> "the" hoặc "Ø".<br><b>3. Tại sao chọn "Ø"?</b> Đã có đại từ chỉ định "that" đứng trước danh từ "table", không được dùng thêm mạo từ.<br><b>4. Tại sao sai:</b> Không ai nói "the that table" trong tiếng Anh.` },
            { type: "gap", qNum: "2.9", text: "9. Although I had worked in {blank} France for 3 years, I could hardly speak French.", options: ["the", "Ø"], correct: "Ø", expl: `<b>1. Dịch nghĩa:</b> Mặc dù tôi đã làm việc ở Pháp 3 năm, tôi hầu như không nói được tiếng Pháp.<br><b>2. Các đáp án:</b> "the" hoặc "Ø".<br><b>3. Tại sao chọn "Ø"?</b> France là tên một quốc gia đơn lẻ, không dùng mạo từ.<br><b>4. Tại sao sai:</b> "the France" là sai quy tắc mạo từ với tên quốc gia.` },
            { type: "gap", qNum: "2.10", text: "10. Many people think that {blank} lead is the heaviest metal.", options: ["the", "Ø"], correct: "the", expl: `<b>1. Dịch nghĩa:</b> Nhiều người nghĩ rằng chì là kim loại nặng nhất.<br><b>2. Các đáp án:</b> "the" hoặc "Ø".<br><b>3. Tại sao chọn "the"?</b> (Lưu ý: Theo ngữ pháp chuẩn, vật chất nói chung thường dùng Ø. Tuy nhiên, theo ĐÁP ÁN CHUẨN CỦA ĐỀ BÀI LÀ 'the'. Đây có thể là do người viết ngụ ý "the element lead"). Ta tuân theo key của bài.<br><b>4. Tại sao sai:</b> Trong ngữ cảnh bài này bắt buộc chọn theo key của sách.` },
            { type: "gap", qNum: "2.11", text: "11. Do you know that {blank} Alps are the most extensive mountain range system?", options: ["the", "Ø"], correct: "the", expl: `<b>1. Dịch nghĩa:</b> Bạn có biết dãy Alps là hệ thống dãy núi rộng lớn nhất không?<br><b>2. Các đáp án:</b> "the" hoặc "Ø".<br><b>3. Tại sao chọn "the"?</b> Tên của một dãy núi (mountain range) luôn đi với "the" (the Alps, the Himalayas).<br><b>4. Tại sao sai:</b> Ø chỉ dùng cho tên một ngọn núi đơn lẻ (Mount Everest).` },

            // ================= EXERCISE 3 =================
            {
                section: "3. Fill in each blank with \"a\", \"an\" or \"Ø\".",
                type: "gap", qNum: "3.1", text: "1. They are {blank} brave girls.", options: ["a", "an", "Ø"], correct: "Ø",
                expl: `<b>1. Dịch nghĩa:</b> Họ là những cô gái dũng cảm.<br><b>2. Các đáp án:</b> a, an, Ø.<br><b>3. Tại sao chọn "Ø"?</b> "girls" là danh từ số nhiều đếm được, nói chung chung nên không dùng a/an.<br><b>4. Tại sao sai:</b> "a/an" chỉ dùng cho danh từ số ít.`
            },
            { type: "gap", qNum: "3.2", text: "2. It was {blank} long way to go.", options: ["a", "an", "Ø"], correct: "a", expl: `<b>1. Dịch nghĩa:</b> Đó là một chặng đường dài để đi.<br><b>2. Các đáp án:</b> a, an, Ø.<br><b>3. Tại sao chọn "a"?</b> "way" là danh từ đếm được số ít, "long" bắt đầu bằng phụ âm /l/ nên dùng "a". Cấu trúc: It is + a/an + adj + N.<br><b>4. Tại sao sai:</b> "an" sai vì long bắt đầu bằng phụ âm. "Ø" sai vì thiếu mạo từ cho danh từ đếm được số ít.` },
            { type: "gap", qNum: "3.3", text: "3. I've bought {blank} umbrella for my sister.", options: ["a", "an", "Ø"], correct: "an", expl: `<b>1. Dịch nghĩa:</b> Tôi vừa mua một chiếc ô cho em gái tôi.<br><b>2. Các đáp án:</b> a, an, Ø.<br><b>3. Tại sao chọn "an"?</b> "umbrella" là danh từ đếm được số ít, bắt đầu bằng nguyên âm /ʌ/.<br><b>4. Tại sao sai:</b> Dùng "a" trước nguyên âm là sai.` },
            { type: "gap", qNum: "3.4", text: "4. {blank} Lunar January is the time for important festivals in the whole country.", options: ["a", "an", "Ø"], correct: "Ø", expl: `<b>1. Dịch nghĩa:</b> Tháng Giêng âm lịch là thời gian cho các lễ hội quan trọng trên cả nước.<br><b>2. Các đáp án:</b> a, an, Ø.<br><b>3. Tại sao chọn "Ø"?</b> Tên các tháng trong năm (January) không dùng mạo từ.<br><b>4. Tại sao sai:</b> Dùng mạo từ trước tên tháng là sai ngữ pháp.` },
            { type: "gap", qNum: "3.5", text: "5. They will move to {blank} mansion next month.", options: ["a", "an", "Ø"], correct: "a", expl: `<b>1. Dịch nghĩa:</b> Họ sẽ chuyển đến một căn biệt thự tháng tới.<br><b>2. Các đáp án:</b> a, an, Ø.<br><b>3. Tại sao chọn "a"?</b> "mansion" bắt đầu bằng phụ âm /m/, đếm được, số ít, nhắc đến lần đầu.<br><b>4. Tại sao sai:</b> "an" sai vì bắt đầu bằng phụ âm. "Ø" sai vì danh từ số ít cần mạo từ.` },
            { type: "gap", qNum: "3.6", text: "6. Would you please pass me {blank} salt?", options: ["a", "an", "the", "Ø"], correct: "the", expl: `<b>1. Dịch nghĩa:</b> Bạn làm ơn đưa cho tôi lọ muối được không?<br><b>2. Các đáp án:</b> a, an, the, Ø. (Theo key của đề bài là "the").<br><b>3. Tại sao chọn "the"?</b> Lọ muối trên bàn ăn là vật mà cả người nói và người nghe đều nhìn thấy và ngầm hiểu (đã xác định).<br><b>4. Tại sao sai:</b> Salt không đếm được nên không dùng a/an. Ø sai vì ở đây là muối cụ thể trên bàn, không phải muối nói chung.` },
            { type: "gap", qNum: "3.7", text: "7. I gave her {blank} information about the festival.", options: ["a", "an", "Ø"], correct: "Ø", expl: `<b>1. Dịch nghĩa:</b> Tôi đã cho cô ấy thông tin về lễ hội.<br><b>2. Các đáp án:</b> a, an, Ø.<br><b>3. Tại sao chọn "Ø"?</b> "information" (thông tin) là danh từ KHÔNG đếm được trong tiếng Anh. Không dùng mạo từ không xác định.<br><b>4. Tại sao sai:</b> Không bao giờ dùng "an information".` },
            { type: "gap", qNum: "3.8", text: "8. We often have {blank} bread for breakfast.", options: ["a", "an", "Ø"], correct: "Ø", expl: `<b>1. Dịch nghĩa:</b> Chúng tôi thường ăn bánh mì vào bữa sáng.<br><b>2. Các đáp án:</b> a, an, Ø.<br><b>3. Tại sao chọn "Ø"?</b> "bread" là danh từ không đếm được. Bữa ăn nói chung cũng không cần mạo từ.<br><b>4. Tại sao sai:</b> "a bread" là sai. Phải dùng "a loaf of bread" mới đếm được.` },
            { type: "gap", qNum: "3.9", text: "9. Is there {blank} pharmacy near here?", options: ["a", "an", "Ø"], correct: "a", expl: `<b>1. Dịch nghĩa:</b> Có một hiệu thuốc nào gần đây không?<br><b>2. Các đáp án:</b> a, an, Ø.<br><b>3. Tại sao chọn "a"?</b> Cấu trúc "Is there a/an + N đếm được số ít". "pharmacy" bắt đầu bằng phụ âm /f/.<br><b>4. Tại sao sai:</b> "an" sai vì bắt đầu bằng phụ âm. Ø sai vì cấu trúc yêu cầu mạo từ.` },
            { type: "gap", qNum: "3.10", text: "10. It took me {blank} hours to finish my homework.", options: ["a", "an", "Ø"], correct: "Ø", expl: `<b>1. Dịch nghĩa:</b> Tôi mất hàng giờ để hoàn thành bài tập về nhà.<br><b>2. Các đáp án:</b> a, an, Ø.<br><b>3. Tại sao chọn "Ø"?</b> "hours" (nhiều giờ) là danh từ số nhiều đếm được, không thể dùng "a" hay "an".<br><b>4. Tại sao sai:</b> a/an chỉ đi với số ít.` },
            { type: "gap", qNum: "3.11", text: "11. The elephant is {blank} unique cultural symbol of Tay Nguyen and Dak Lak.", options: ["a", "an", "Ø"], correct: "a", expl: `<b>1. Dịch nghĩa:</b> Voi là một biểu tượng văn hóa độc đáo của Tây Nguyên và Đắk Lắk.<br><b>2. Các đáp án:</b> a, an, Ø.<br><b>3. Tại sao chọn "a"?</b> BẪY KINH ĐIỂN! Từ "unique" bắt đầu bằng chữ 'u' nhưng phát âm là /juː/ (bán phụ âm), do đó phải dùng "a" chứ không phải "an".<br><b>4. Tại sao sai:</b> Dùng "an" sẽ bị dính bẫy phát âm.` },
            { type: "gap", qNum: "3.12", text: "12. What would you like to drink? - I would like {blank} cup of tea.", options: ["a", "an", "Ø"], correct: "a", expl: `<b>1. Dịch nghĩa:</b> Bạn muốn uống gì? - Tôi muốn một tách trà.<br><b>2. Các đáp án:</b> a, an, Ø.<br><b>3. Tại sao chọn "a"?</b> "cup" là danh từ đếm được số ít, bắt đầu bằng phụ âm /k/.<br><b>4. Tại sao sai:</b> Dùng "an" trước phụ âm là sai.` },
            { type: "gap", qNum: "3.13", text: "13. {blank} author is coming to our school today.", options: ["A", "An", "Ø"], correct: "An", expl: `<b>1. Dịch nghĩa:</b> Một tác giả sẽ đến trường chúng ta hôm nay.<br><b>2. Các đáp án:</b> A, An, Ø.<br><b>3. Tại sao chọn "An"?</b> "author" bắt đầu bằng nguyên âm /ɔː/ nên phải dùng "An". Viết hoa vì đứng đầu câu.<br><b>4. Tại sao sai:</b> Dùng "A" sai vì đứng trước nguyên âm.` },
            { type: "gap", qNum: "3.14", text: "14. At the zoo, we watched {blank} octopus swim slowly.", options: ["a", "an", "Ø"], correct: "an", expl: `<b>1. Dịch nghĩa:</b> Ở sở thú, chúng tôi đã xem một con bạch tuộc bơi chậm rãi.<br><b>2. Các đáp án:</b> a, an, Ø.<br><b>3. Tại sao chọn "an"?</b> "octopus" bắt đầu bằng nguyên âm /ɒ/ nên phải dùng "an".<br><b>4. Tại sao sai:</b> Không dùng "a" trước nguyên âm.` },
            { type: "gap", qNum: "3.15", text: "15. Comb your hair with {blank} brush to make it shine.", options: ["a", "an", "Ø"], correct: "a", expl: `<b>1. Dịch nghĩa:</b> Chải tóc của bạn bằng một chiếc lược để làm nó bóng mượt.<br><b>2. Các đáp án:</b> a, an, Ø.<br><b>3. Tại sao chọn "a"?</b> "brush" là danh từ đếm được số ít, bắt đầu bằng phụ âm /b/.<br><b>4. Tại sao sai:</b> Dùng "an" trước phụ âm là sai.` },

            // ================= EXERCISE 4 =================
            {
                section: "4. Choose the correct answer.",
                type: "mcq", qNum: "4.1", text: "1. Can you show me _____ way to _____ nearest drugstore?",
                options: [ {id: "A", text: "the - the"}, {id: "B", text: "a - the"}, {id: "C", text: "a - a"}, {id: "D", text: "the - a"} ],
                correctId: "A", expl: `<b>1. Phân tích đáp án:</b> A. the-the; B. a-the; C. a-a; D. the-a.<br><b>2. Dịch nghĩa:</b> Bạn có thể chỉ cho tôi con đường đến hiệu thuốc gần nhất không?<br><b>3. Tại sao chọn A?</b> "way" đã được xác định bằng cụm phía sau (đường đến hiệu thuốc). "nearest" là so sánh nhất, bắt buộc dùng "the". Nên cả hai chỗ trống đều là "the".<br><b>4. Tại sao sai:</b> Các đáp án khác dùng "a" cho so sánh nhất hoặc danh từ đã xác định là sai ngữ pháp.`
            },
            {
                type: "mcq", qNum: "4.2", text: "2. Mr. Smith is _____ old customer of my store and he is also _____ doctor.",
                options: [ {id: "A", text: "the - the"}, {id: "B", text: "a - an"}, {id: "C", text: "an - a"}, {id: "D", text: "the - a"} ],
                correctId: "C", expl: `<b>1. Phân tích đáp án:</b> A. the-the; B. a-an; C. an-a; D. the-a.<br><b>2. Dịch nghĩa:</b> Ông Smith là một khách hàng cũ của cửa hàng tôi và ông ấy cũng là một bác sĩ.<br><b>3. Tại sao chọn C?</b> "old" bắt đầu bằng nguyên âm /oʊ/ -> dùng "an". Nghề nghiệp "doctor" nói chung dùng "a".<br><b>4. Tại sao sai:</b> Dùng sai a/an cho vị trí nguyên/phụ âm, hoặc dùng "the" khi chưa xác định cụ thể.`
            },
            {
                type: "mcq", qNum: "4.3", text: "3. My boyfriend gave me _____ bunch of _____ flowers on my 25th birthday.",
                options: [ {id: "A", text: "a - Ø"}, {id: "B", text: "a - the"}, {id: "C", text: "a - an"}, {id: "D", text: "the - Ø"} ],
                correctId: "A", expl: `<b>1. Phân tích đáp án:</b> A. a-Ø; B. a-the; C. a-an; D. the-Ø.<br><b>2. Dịch nghĩa:</b> Bạn trai tôi tặng tôi một bó hoa vào sinh nhật lần thứ 25.<br><b>3. Tại sao chọn A?</b> Ta có cụm từ "a bunch of" (một bó). "flowers" là danh từ số nhiều chỉ chung chung, không cần mạo từ (Ø).<br><b>4. Tại sao sai:</b> Dùng "the" cho hoa là sai vì không ám chỉ cụ thể bông hoa nào đã biết trước.`
            },
            {
                type: "mcq", qNum: "4.4", text: "4. I'm sure you will have an _____ time when you attend Hoa Ban festival.",
                options: [ {id: "A", text: "forget"}, {id: "B", text: "unforget"}, {id: "C", text: "forgettable"}, {id: "D", text: "unforgettable"} ],
                correctId: "D", expl: `<b>1. Phân tích từ loại:</b> A. động từ; B. sai từ; C. tính từ (dễ quên); D. tính từ (khó quên/đáng nhớ).<br><b>2. Dịch nghĩa:</b> Tôi chắc chắn bạn sẽ có một khoảng thời gian khó quên khi tham dự lễ hội Hoa Ban.<br><b>3. Tại sao chọn D?</b> Chỗ trống cần một tính từ bổ nghĩa cho "time", và nghĩa phải tích cực. Hơn nữa có mạo từ "an" phía trước, nên từ phải bắt đầu bằng nguyên âm (unforgettable).<br><b>4. Tại sao sai:</b> A, B sai từ loại/cấu tạo từ. C mang nghĩa tiêu cực không phù hợp ngữ cảnh.`
            },
            {
                type: "mcq", qNum: "4.5", text: "5. We like the traditional songs of the Muong in _____ Hoa Binh.",
                options: [ {id: "A", text: "a"}, {id: "B", text: "an"}, {id: "C", text: "Ø"}, {id: "D", text: "the"} ],
                correctId: "C", expl: `<b>1. Phân tích đáp án:</b> Các mạo từ.<br><b>2. Dịch nghĩa:</b> Chúng tôi thích những bài hát truyền thống của người Mường ở Hòa Bình.<br><b>3. Tại sao chọn C?</b> "Hoa Binh" là tên riêng của một tỉnh. Tỉnh/thành phố không sử dụng mạo từ (Ø).<br><b>4. Tại sao sai:</b> Dùng a/an/the trước tên riêng một tỉnh là sai quy tắc cơ bản.`
            },
            {
                type: "mcq", qNum: "4.6", text: "6. My brother has bought me _____ beautiful dress as a birthday present.",
                options: [ {id: "A", text: "the"}, {id: "B", text: "a"}, {id: "C", text: "an"}, {id: "D", text: "Ø"} ],
                correctId: "B", expl: `<b>1. Phân tích đáp án:</b> Các mạo từ.<br><b>2. Dịch nghĩa:</b> Anh trai tôi vừa mua cho tôi một chiếc váy đẹp làm quà sinh nhật.<br><b>3. Tại sao chọn B?</b> "dress" là danh từ số ít đếm được, được nhắc tới lần đầu (một chiếc váy). "beautiful" bắt đầu bằng phụ âm /b/ nên dùng "a".<br><b>4. Tại sao sai:</b> "the" sai vì váy chưa xác định. "an" sai vì beautiful bắt đầu bằng phụ âm.`
            },
            {
                type: "mcq", qNum: "4.7", text: "7. I'm on duty tonight. When you go to _____ bed, I go to _____ work.",
                options: [ {id: "A", text: "a - Ø"}, {id: "B", text: "a - the"}, {id: "C", text: "Ø - Ø"}, {id: "D", text: "the - the"} ],
                correctId: "C", expl: `<b>1. Phân tích đáp án:</b> Các cặp mạo từ.<br><b>2. Dịch nghĩa:</b> Tối nay tôi có ca trực. Khi bạn đi ngủ, tôi đi làm.<br><b>3. Tại sao chọn C?</b> Ta có các cụm từ cố định: "go to bed" (đi ngủ) và "go to work" (đi làm). Cả hai cụm này đều không dùng mạo từ (Ø).<br><b>4. Tại sao sai:</b> Thêm "the" (go to the bed) nghĩa là đi đến cái giường (có thể để lấy đồ) chứ không phải đi ngủ.`
            },
            {
                type: "mcq", qNum: "4.8", text: "8. My birthday is on _____ Sunday afternoon.",
                options: [ {id: "A", text: "a"}, {id: "B", text: "an"}, {id: "C", text: "Ø"}, {id: "D", text: "the"} ],
                correctId: "C", expl: `<b>1. Phân tích đáp án:</b> Các mạo từ.<br><b>2. Dịch nghĩa:</b> Sinh nhật của tôi vào chiều Chủ Nhật.<br><b>3. Tại sao chọn C?</b> Trước các thứ trong tuần (Monday, Sunday...) hoặc cụm "Thứ + Buổi" (Sunday afternoon), chúng ta KHÔNG dùng mạo từ (Ø).<br><b>4. Tại sao sai:</b> Thêm mạo từ vào trước thứ trong tuần trong ngữ cảnh nói về thời gian thông thường là sai.`
            },
            {
                type: "mcq", qNum: "4.9", text: "9. Like many women, she likes going to _____ parties and receiving _____ gifts.",
                options: [ {id: "A", text: "the - a"}, {id: "B", text: "a - the"}, {id: "C", text: "a - a"}, {id: "D", text: "Ø - Ø"} ],
                correctId: "D", expl: `<b>1. Phân tích đáp án:</b> Các cặp mạo từ.<br><b>2. Dịch nghĩa:</b> Giống như nhiều phụ nữ, cô ấy thích đi dự các bữa tiệc và nhận những món quà.<br><b>3. Tại sao chọn D?</b> "parties" và "gifts" đều là danh từ đếm được số nhiều mang nghĩa chung chung. Quy tắc: Danh từ số nhiều nói chung không dùng mạo từ (Ø).<br><b>4. Tại sao sai:</b> Không dùng a/an cho số nhiều. "the" làm câu bị biến nghĩa thành những bữa tiệc/món quà cụ thể nào đó.`
            },
            {
                type: "mcq", qNum: "4.10", text: "10. She works six days _____ week.",
                options: [ {id: "A", text: "a"}, {id: "B", text: "the"}, {id: "C", text: "an"}, {id: "D", text: "Ø"} ],
                correctId: "A", expl: `<b>1. Phân tích đáp án:</b> Các mạo từ.<br><b>2. Dịch nghĩa:</b> Cô ấy làm việc 6 ngày một tuần.<br><b>3. Tại sao chọn A?</b> "a week" ở đây mang nghĩa "per week" (mỗi tuần). Khi chỉ tần suất, ta dùng "a" hoặc "an".<br><b>4. Tại sao sai:</b> Dùng the hay Ø đều không tạo thành cấu trúc chỉ tần suất chính xác trong tiếng Anh.`
            },
            {
                type: "mcq", qNum: "4.11", text: "11. Thomas is _____ doctor. His parents were _____ doctors, too.",
                options: [ {id: "A", text: "a - an"}, {id: "B", text: "a - the"}, {id: "C", text: "a - Ø"}, {id: "D", text: "the - the"} ],
                correctId: "C", expl: `<b>1. Phân tích đáp án:</b> Các cặp mạo từ.<br><b>2. Dịch nghĩa:</b> Thomas là một bác sĩ. Bố mẹ anh ấy cũng từng là những bác sĩ.<br><b>3. Tại sao chọn C?</b> Chỉ nghề nghiệp số ít dùng "a/an" -> a doctor. Chỉ nghề nghiệp số nhiều dùng Ø -> doctors.<br><b>4. Tại sao sai:</b> Không dùng a/an cho số nhiều (bố mẹ). Không dùng "the" cho nghề nghiệp nói chung.`
            },
            {
                type: "mcq", qNum: "4.12", text: "12. When we reached _____ city center, most of _____ shops were already closed.",
                options: [ {id: "A", text: "the - a"}, {id: "B", text: "the - the"}, {id: "C", text: "a - a"}, {id: "D", text: "Ø - Ø"} ],
                correctId: "B", expl: `<b>1. Phân tích đáp án:</b> Các cặp mạo từ.<br><b>2. Dịch nghĩa:</b> Khi chúng tôi đến trung tâm thành phố, hầu hết các cửa hàng đều đã đóng cửa.<br><b>3. Tại sao chọn B?</b> "city center" (trung tâm thành phố) là duy nhất ở một thành phố, ngầm định ai cũng biết -> dùng "the". "shops" đã xác định bởi "most of" (hầu hết các cửa hàng ở trung tâm đó) -> dùng "the".<br><b>4. Tại sao sai:</b> Thiếu mạo từ xác định sẽ làm mất đi ý nghĩa cụ thể của địa điểm và đối tượng trong câu.`
            },
            {
                type: "mcq", qNum: "4.13", text: "13. It is typical of the cultural life of _____ H'mong people.",
                options: [ {id: "A", text: "some"}, {id: "B", text: "a"}, {id: "C", text: "the"}, {id: "D", text: "Ø"} ],
                correctId: "C", expl: `<b>1. Phân tích đáp án:</b> Từ hạn định / Mạo từ.<br><b>2. Dịch nghĩa:</b> Đó là nét điển hình trong đời sống văn hóa của người dân tộc H'mông.<br><b>3. Tại sao chọn C?</b> Tên của một dân tộc cụ thể đi kèm chữ "people" luôn cần mạo từ "the" (the H'mong people, the Kinh people...).<br><b>4. Tại sao sai:</b> Bỏ trống hoặc dùng a/some làm mất tính xác định của một nhóm dân tộc cụ thể.`
            },
            {
                type: "mcq", qNum: "4.14", text: "14. Jim is _____ youngest boy of the family and this year he will go to _____ school.",
                options: [ {id: "A", text: "the - Ø"}, {id: "B", text: "a - a"}, {id: "C", text: "a - the"}, {id: "D", text: "the - a"} ],
                correctId: "A", expl: `<b>1. Phân tích đáp án:</b> Các cặp mạo từ.<br><b>2. Dịch nghĩa:</b> Jim là cậu bé nhỏ tuổi nhất gia đình và năm nay cậu ấy sẽ đi học.<br><b>3. Tại sao chọn A?</b> "youngest" là so sánh nhất, bắt buộc dùng "the". "go to school" là cụm từ cố định chỉ việc đi học với tư cách học sinh, không dùng mạo từ (Ø).<br><b>4. Tại sao sai:</b> "go to the school" nghĩa là đến tham quan/có việc ở trường chứ không phải đi học.`
            },
            {
                type: "mcq", qNum: "4.15", text: "15. Job hunters always seek for people with _____ experience.",
                options: [ {id: "A", text: "the"}, {id: "B", text: "a"}, {id: "C", text: "an"}, {id: "D", text: "Ø"} ],
                correctId: "D", expl: `<b>1. Phân tích đáp án:</b> Các mạo từ.<br><b>2. Dịch nghĩa:</b> Những nhà tuyển dụng luôn tìm kiếm người có kinh nghiệm.<br><b>3. Tại sao chọn D?</b> "experience" trong ngữ cảnh này mang nghĩa "kinh nghiệm làm việc", là danh từ KHÔNG đếm được và đang nói chung chung, nên dùng Ø.<br><b>4. Tại sao sai:</b> Không dùng a/an cho danh từ không đếm được. Dùng "the" là ám chỉ một kinh nghiệm cụ thể nào đó (sai ngữ cảnh).`
            }
        ];

        // --- AUDIO MODULE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
        }

        function playTone(freq, type, duration, vol=1) {
            if (!audioCtx) initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = type;
            oscillator.frequency.value = freq;
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function playCorrect() { playTone(600, 'sine', 0.1); setTimeout(() => playTone(800, 'sine', 0.3), 100); }
        function playWrong() { playTone(200, 'sawtooth', 0.3, 0.5); setTimeout(() => playTone(150, 'sawtooth', 0.4, 0.5), 150); }

        // --- CONFETTI MODULE ---
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#00D26A', '#FDCB6E', '#8854C0', '#00C9A7', '#FF9A9E'];
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'absolute';
                conf.style.width = Math.random() * 10 + 5 + 'px';
                conf.style.height = conf.style.width;
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-10px';
                conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                conf.style.zIndex = '999';
                
                const animDuration = Math.random() * 2 + 1;
                conf.style.transition = `top ${animDuration}s ease-in, transform ${animDuration}s linear`;
                
                container.appendChild(conf);
                
                setTimeout(() => {
                    conf.style.top = '100vh';
                    conf.style.transform = `rotate(${Math.random() * 360}deg) translateX(${Math.random() * 100 - 50}px)`;
                }, 10);
                
                setTimeout(() => { conf.remove(); }, animDuration * 1000);
            }
        }

        // --- APP LOGIC ---
        let currentSection = "";
        const quizContainer = document.getElementById("quiz-container");
        let score = 0;
        let answeredQuestions = new Set();
        let popupActive = null;

        // Shuffle arrays (for MCQ options)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function renderQuiz() {
            quizData.forEach((q, index) => {
                // Handle Section Headers
                if (q.section && q.section !== currentSection) {
                    const sec = document.createElement('div');
                    sec.className = 'section-title';
                    sec.innerText = q.section;
                    quizContainer.appendChild(sec);
                    currentSection = q.section;
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${index}`;

                // --- GAP FILL RENDER ---
                if (q.type === 'gap') {
                    const parts = q.text.split("{blank}");
                    const qTextDiv = document.createElement('div');
                    qTextDiv.className = 'question-text';
                    
                    qTextDiv.appendChild(document.createTextNode(parts[0]));
                    
                    const blankContainer = document.createElement('div');
                    blankContainer.style.display = 'inline-block';
                    blankContainer.style.position = 'relative';

                    const blank = document.createElement('div');
                    blank.className = 'blank-space';
                    blank.innerText = "...";
                    
                    const popup = document.createElement('div');
                    popup.className = 'popup-options';
                    
                    q.options.forEach(opt => {
                        const btn = document.createElement('button');
                        btn.className = 'popup-btn';
                        btn.innerText = opt;
                        btn.onclick = (e) => {
                            e.stopPropagation();
                            handleGapAnswer(blank, popup, opt, q.correct, index, card);
                        };
                        popup.appendChild(btn);
                    });

                    blank.onclick = () => {
                        if(blank.classList.contains('filled-correct') || blank.classList.contains('filled-wrong')) return;
                        if(popupActive && popupActive !== popup) popupActive.classList.remove('active');
                        popup.classList.toggle('active');
                        popupActive = popup.classList.contains('active') ? popup : null;
                    };

                    blankContainer.appendChild(blank);
                    blankContainer.appendChild(popup);
                    qTextDiv.appendChild(blankContainer);
                    qTextDiv.appendChild(document.createTextNode(parts[1]));

                    card.appendChild(qTextDiv);
                } 
                // --- MCQ RENDER ---
                else if (q.type === 'mcq') {
                    const qText = document.createElement('div');
                    qText.className = 'question-text';
                    qText.innerText = q.text;
                    card.appendChild(qText);

                    const grid = document.createElement('div');
                    grid.className = 'options-grid';
                    
                    let shuffledOptions = shuffleArray([...q.options]);
                    
                    shuffledOptions.forEach(opt => {
                        const btn = document.createElement('button');
                        btn.className = 'option-btn';
                        btn.innerHTML = `<b>${opt.id}.</b> ${opt.text}`;
                        btn.onclick = () => handleMcqAnswer(btn, opt.id, q.correctId, index, grid, card);
                        grid.appendChild(btn);
                    });
                    card.appendChild(grid);
                }

                // --- EXPLANATION BOX ---
                const explDiv = document.createElement('div');
                explDiv.className = 'explanation';
                explDiv.id = `expl-${index}`;
                explDiv.innerHTML = `<h4>💡 Giải thích chi tiết:</h4>${q.expl}`;
                card.appendChild(explDiv);

                quizContainer.appendChild(card);
            });
        }

        // Close popup when clicking outside
        document.addEventListener('click', (e) => {
            if (popupActive && !e.target.closest('.blank-space') && !e.target.closest('.popup-options')) {
                popupActive.classList.remove('active');
                popupActive = null;
            }
        });

        function showExplanation(index) {
            document.getElementById(`expl-${index}`).classList.add('active');
        }

        function handleGapAnswer(blank, popup, selectedOpt, correctOpt, index, card) {
            initAudio();
            popup.classList.remove('active');
            blank.innerText = selectedOpt;
            
            if (!answeredQuestions.has(index)) {
                answeredQuestions.add(index);
                if (selectedOpt === correctOpt) {
                    score++;
                    playCorrect();
                    createConfetti();
                    blank.className = 'blank-space filled-correct';
                    card.style.borderColor = varColor('--correct');
                } else {
                    playWrong();
                    blank.className = 'blank-space filled-wrong';
                    card.style.animation = 'shake 0.4s';
                    card.style.borderColor = varColor('--wrong');
                }
                showExplanation(index);
            }
        }

        function handleMcqAnswer(btn, selectedId, correctId, index, grid, card) {
            initAudio();
            if (answeredQuestions.has(index)) return;
            answeredQuestions.add(index);

            // Disable all buttons
            Array.from(grid.children).forEach(b => b.classList.add('disabled'));

            if (selectedId === correctId) {
                score++;
                btn.classList.add('correct');
                btn.classList.remove('disabled');
                playCorrect();
                createConfetti();
                card.style.borderColor = varColor('--correct');
            } else {
                btn.classList.add('wrong');
                btn.classList.remove('disabled');
                playWrong();
                card.style.borderColor = varColor('--wrong');
                
                // Highlight correct answer
                Array.from(grid.children).forEach(b => {
                    if (b.innerHTML.includes(`<b>${correctId}.</b>`)) {
                        b.classList.add('correct');
                        b.classList.remove('disabled');
                    }
                });
            }
            showExplanation(index);
        }

        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        function showResults() {
            initAudio();
            const modal = document.getElementById('resultModal');
            document.getElementById('score-text').innerText = score;
            document.getElementById('total-text').innerText = quizData.length;
            
            const feedback = document.getElementById('feedback-text');
            const ratio = score / quizData.length;
            if (ratio === 1) { feedback.innerText = "Tuyệt đỉnh! Bạn là Master tiếng Anh! 🏆"; playCorrect(); createConfetti(); setTimeout(createConfetti, 500); }
            else if (ratio >= 0.8) { feedback.innerText = "Giỏi quá! Chỉ một chút xíu nữa thôi! 🌟"; playCorrect(); createConfetti(); }
            else if (ratio >= 0.5) { feedback.innerText = "Làm tốt lắm! Hãy cố gắng hơn nhé! 👍"; }
            else { feedback.innerText = "Đừng buồn, đọc kỹ giải thích và thử lại nha! 💪"; playWrong(); }
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }

        // Initialize user interaction for Audio
        document.body.addEventListener('click', initAudio, { once: true });

        // Build Quiz
        window.onload = renderQuiz;

    </script>
