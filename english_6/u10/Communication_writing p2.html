<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Houses & Cities Quiz | Ms Mai An – ULIS</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes floatA{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-22px) rotate(12deg)}}
@keyframes floatB{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-18px) rotate(-10deg)}}
@keyframes floatC{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-26px) rotate(8deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}15%,45%,75%{transform:translateX(-9px)}30%,60%,90%{transform:translateX(9px)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(800deg);opacity:0}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 12px rgba(136,84,192,.35)}50%{box-shadow:0 0 28px rgba(136,84,192,.7)}}
@keyframes slideDown{from{opacity:0;transform:scaleY(0);transform-origin:top}to{opacity:1;transform:scaleY(1);transform-origin:top}}

body{font-family:'Nunito',sans-serif;min-height:100vh;background:linear-gradient(-45deg,#ee7752,#e73c7e,#23a6d5,#23d5ab,#8854C0,#FDCB6E);background-size:500% 500%;animation:gradientShift 12s ease infinite;position:relative;overflow-x:hidden;padding-bottom:60px}

.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.floater{position:absolute;font-size:28px;user-select:none;opacity:.55}
.floater:nth-child(odd){animation:floatA ease-in-out infinite}
.floater:nth-child(even){animation:floatB ease-in-out infinite}
.floater:nth-child(3n){animation:floatC ease-in-out infinite}

.wrap{max-width:870px;margin:0 auto;padding:16px;position:relative;z-index:1}

/* HEADER */
.hdr{background:rgba(255,255,255,.96);border-radius:22px;padding:14px 22px 12px;margin-bottom:18px;box-shadow:0 8px 30px rgba(0,0,0,.14);text-align:center;border:3px solid rgba(255,255,255,.8)}
.hdr h1{font-size:clamp(1.2em,4vw,1.6em);font-weight:900;background:linear-gradient(135deg,#8854C0,#e73c7e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr p{color:#888;font-size:.85em;font-weight:700;margin-top:2px}

/* SCORE TRACKER */
.tracker{background:rgba(255,255,255,.95);border-radius:16px;padding:10px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 18px rgba(0,0,0,.11);flex-wrap:wrap}
.tracker-score{font-weight:900;color:#8854C0;font-size:1.05em;white-space:nowrap}
.progress-wrap{flex:1;min-width:80px;background:#e8e0f5;border-radius:20px;height:11px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#00D26A,#FDCB6E,#e73c7e);border-radius:20px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}
.tracker-ans{font-weight:700;color:#aaa;font-size:.85em;white-space:nowrap}

/* EXERCISE TITLE */
.ex-title{background:linear-gradient(135deg,#8854C0,#e73c7e);color:#fff;padding:12px 20px;border-radius:16px;margin:22px 0 12px;font-weight:900;font-size:1.05em;box-shadow:0 5px 18px rgba(136,84,192,.38);display:flex;align-items:center;gap:8px}
.ex-instr{background:rgba(255,255,255,.92);border-radius:12px;padding:11px 16px;margin-bottom:14px;color:#666;font-size:.88em;font-weight:700;border-left:4px solid #FDCB6E;line-height:1.6}

/* QUESTION CARD */
.qcard{background:rgba(255,255,255,.97);border-radius:22px;padding:20px 22px;margin-bottom:16px;box-shadow:0 8px 28px rgba(0,0,0,.11);animation:fadeInUp .45s ease;transition:transform .2s}
.qcard:hover{transform:translateY(-2px)}
.qhead{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.qnum{background:linear-gradient(135deg,#8854C0,#e73c7e);color:#fff;min-width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.88em;flex-shrink:0;box-shadow:0 3px 10px rgba(136,84,192,.35)}
.qbody{flex:1}
.orig-box{background:#f8f4ff;border-radius:11px;padding:9px 14px;margin-bottom:8px;border-left:3px solid #8854C0}
.orig-box .lbl{font-size:.73em;color:#8854C0;font-weight:900;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.orig-box p{color:#444;font-weight:700;font-size:.93em;line-height:1.6}
.trans-box{background:#fff9f0;border-radius:11px;padding:9px 14px;margin-bottom:10px;border-left:3px solid #FDCB6E}
.trans-box .lbl{font-size:.73em;color:#e67e22;font-weight:900;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.trans-box p{color:#444;font-weight:700;font-size:.93em;line-height:1.6}
.kw-badge{display:inline-block;background:linear-gradient(135deg,#FDCB6E,#e67e22);color:#fff;padding:1px 10px;border-radius:20px;font-size:.75em;font-weight:900;margin-left:6px;vertical-align:middle}

/* OPTION BUTTONS */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
@media(max-width:560px){.opts{grid-template-columns:1fr}}
.opt{background:#fff;border:3px solid #e0d0ff;border-radius:16px;padding:12px 14px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.88em;font-weight:700;color:#444;transition:all .18s;text-align:left;box-shadow:0 4px 0 #c9b3f5,0 5px 15px rgba(136,84,192,.1);display:flex;align-items:center;gap:8px;line-height:1.5}
.opt:hover:not(:disabled){transform:scale(1.04) translateY(-2px);border-color:#8854C0;background:#f8f4ff;box-shadow:0 7px 0 #a07fe0,0 8px 22px rgba(136,84,192,.22)}
.opt:disabled{cursor:not-allowed}
.opt.correct{background:#d4fae9;border-color:#00D26A;color:#00562b;box-shadow:0 4px 0 #00a854,0 5px 20px rgba(0,210,106,.25);animation:pop .4s ease}
.opt.wrong{background:#ffe0e0;border-color:#FF4757;color:#9b0000;box-shadow:0 4px 0 #cc3344,0 5px 20px rgba(255,71,87,.25);animation:shake .5s ease}
.opt.dimmed{opacity:.45;cursor:not-allowed}
.olbl{background:#8854C0;color:#fff;min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78em;font-weight:900;flex-shrink:0}
.opt.correct .olbl{background:#00D26A}
.opt.wrong .olbl{background:#FF4757}
.opt .otxt{flex:1}

/* EXPLANATION BOX */
.expbox{display:none;background:linear-gradient(135deg,#f0f8ff,#f8f4ff);border:2.5px solid #8854C0;border-radius:16px;padding:15px 18px;margin-top:14px;font-size:.87em;line-height:1.75;color:#333;transform-origin:top;animation:slideDown .3s ease}
.expbox.show{display:block}
.exp-hdr{font-weight:900;color:#8854C0;font-size:.98em;margin-bottom:9px;display:flex;align-items:center;gap:5px}
.ans-line{background:#d4fae9;border-radius:10px;padding:7px 13px;margin-bottom:9px;font-weight:800;color:#006633;border-left:4px solid #00D26A;font-size:.9em}
.expbox strong{color:#8854C0}
.expbox em{color:#e73c7e;font-style:normal;font-weight:800}
.expbox ul{padding-left:18px;margin:5px 0}
.expbox li{margin-bottom:3px}
.exp-section{margin-bottom:7px}
.exp-section .sec-title{font-weight:900;color:#e73c7e;margin-bottom:3px}

/* LETTER BLOCK for Ex 20-21 */
.letter-block{background:#f4f0ff;border-radius:12px;padding:10px 14px;margin-bottom:10px}
.letter-block .letter-row{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px solid #e0d0ff;font-size:.88em;color:#444;font-weight:700;line-height:1.5}
.letter-block .letter-row:last-child{border-bottom:none}
.letter-block .letter-row span.ll{background:#8854C0;color:#fff;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78em;font-weight:900;flex-shrink:0;margin-top:1px}
.salutation{color:#666;font-style:italic;font-size:.88em;margin-bottom:6px;font-weight:700}
.sign-off{color:#666;font-style:italic;font-size:.88em;margin-top:6px;font-weight:700}

/* SUBMIT */
.submit-btn{display:block;width:100%;max-width:420px;margin:28px auto 10px;padding:17px 28px;background:linear-gradient(135deg,#8854C0,#e73c7e);color:#fff;border:none;border-radius:22px;font-family:'Nunito',sans-serif;font-size:1.15em;font-weight:900;cursor:pointer;box-shadow:0 6px 0 #5a3490,0 9px 25px rgba(136,84,192,.45);transition:all .2s;letter-spacing:.5px;animation:glowPulse 2.5s ease infinite}
.submit-btn:hover{transform:translateY(-3px);box-shadow:0 9px 0 #5a3490,0 14px 30px rgba(136,84,192,.55)}
.submit-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #5a3490}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;align-items:center;justify-content:center}
.overlay.show{display:flex}
.score-popup{background:#fff;border-radius:28px;padding:38px 32px;text-align:center;max-width:430px;width:92%;box-shadow:0 24px 70px rgba(0,0,0,.32);animation:fadeInUp .4s ease}
.s-emoji{font-size:4em;margin-bottom:8px;display:block}
.s-title{font-size:1.7em;font-weight:900;background:linear-gradient(135deg,#8854C0,#e73c7e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.s-num{font-size:3.2em;font-weight:900;color:#e73c7e;margin-bottom:8px}
.s-pct{font-size:1em;color:#aaa;font-weight:700;margin-bottom:10px}
.s-msg{font-size:1.05em;color:#555;margin-bottom:22px;font-weight:700;line-height:1.6}
.close-btn{padding:14px 38px;background:linear-gradient(135deg,#8854C0,#e73c7e);color:#fff;border:none;border-radius:16px;font-family:'Nunito',sans-serif;font-size:1em;font-weight:900;cursor:pointer;box-shadow:0 4px 0 #5a3490;transition:transform .15s}
.close-btn:hover{transform:scale(1.06)}
#confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.cpfetti{position:fixed;border-radius:3px;pointer-events:none;animation:confettiFall linear forwards}
</style>
</head>
<body>
<div class="bg-layer" id="bgLayer"></div>
<div id="confetti-wrap"></div>
<div class="wrap">
  <div class="hdr">
    <h1>🏠 Future Houses &amp; Cities Quiz</h1>
    <p>Giáo viên tạo: <strong>Ms Mai An – ULIS</strong></p>
  </div>
  <div class="tracker">
    <div class="tracker-score">⭐ Điểm: <span id="liveScore">0</span> / <span id="totalQs">26</span></div>
    <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
    <div class="tracker-ans">Đã trả lời: <span id="answeredCnt">0</span></div>
  </div>
  <div id="quizRoot"></div>
  <button class="submit-btn" onclick="submitQuiz()">🎯 Nộp bài &amp; Xem kết quả</button>
</div>
<div class="overlay" id="scoreOverlay">
  <div class="score-popup">
    <span class="s-emoji" id="sEmoji">🎉</span>
    <div class="s-title">Kết quả bài thi</div>
    <div class="s-num" id="sNum">0/0</div>
    <div class="s-pct" id="sPct"></div>
    <div class="s-msg" id="sMsg"></div>
    <button class="close-btn" onclick="document.getElementById('scoreOverlay').classList.remove('show')">✨ Xem lại bài làm</button>
  </div>
</div>

<script>
/* ===== FLOATING EMOJIS ===== */
const EMOJIS = ['🌟','🌸','🍎','🌈','🏠','🤖','🚀','🌙','🌺','☁️','⭐','🍓','🌻','🎈','🐱','🌍','🏡','✨','🍀','🎉','🌟','💫','🌼','🍇'];
const bg = document.getElementById('bgLayer');
EMOJIS.forEach((e, i) => {
  const el = document.createElement('div');
  el.className = 'floater';
  el.textContent = e;
  el.style.cssText = `left:${(i * 4.2) % 95}%;top:${(i * 7.3 + 5) % 90}%;animation-duration:${3.5 + (i % 4)}s;animation-delay:-${(i * 1.3) % 4}s;font-size:${22 + (i % 3) * 8}px`;
  bg.appendChild(el);
});

/* ===== AUDIO ===== */
let audioCtx = null;
function getCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function playCorrect() {
  try {
    const ctx = getCtx(); const t = ctx.currentTime;
    [[880,.2],[1100,.1],[1320,.1]].forEach(([f,d],i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=f;
      const s=t+i*0.12;
      g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(.25,s+.02);g.gain.exponentialRampToValueAtTime(.001,s+d+.2);
      o.start(s);o.stop(s+d+.25);
    });
  } catch(e){}
}
function playWrong() {
  try {
    const ctx = getCtx(); const t = ctx.currentTime;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(280,t);o.frequency.linearRampToValueAtTime(180,t+.35);
    g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.001,t+.45);
    o.start(t);o.stop(t+.5);
  } catch(e){}
}

/* ===== CONFETTI ===== */
function launchConfetti() {
  const c = document.getElementById('confetti-wrap');
  const colors = ['#ff4757','#ffd32a','#00D26A','#3742fa','#e73c7e','#FDCB6E','#00C9A7','#8854C0'];
  for (let i = 0; i < 55; i++) {
    const el = document.createElement('div');
    el.className = 'cpfetti';
    const size = 8 + Math.random() * 10;
    el.style.cssText = `width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}vw;top:0;border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${1.8+Math.random()*2}s;animation-delay:${Math.random()*.8}s`;
    c.appendChild(el);
    setTimeout(()=>el.remove(), 4000);
  }
}

/* ===== SHUFFLE ===== */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

/* ===== STATE ===== */
let answered = 0, correct = 0;
const TOTAL = 26;

function updateTracker() {
  document.getElementById('liveScore').textContent = correct;
  document.getElementById('answeredCnt').textContent = answered;
  document.getElementById('progressFill').style.width = (answered / TOTAL * 100) + '%';
}

/* ===== QUESTION DATA ===== */
const questions = [
  // =========== EXERCISE 18 ===========
  {
    id: 1, ex: 18,
    orig: 'My future house will have ten rooms.',
    trans: 'There _________________________________ my future house.',
    kw: 'WILL',
    opts: shuffle([
      { t: 'will be ten rooms in', c: true },
      { t: 'will ten rooms be in', c: false },
      { t: 'are ten rooms in', c: false },
      { t: 'will have ten rooms in', c: false },
    ]),
    exp: `<div class="ans-line">✅ Đáp án đúng: <strong>will be ten rooms in</strong> → There will be ten rooms in my future house.</div>
<div class="exp-section"><span class="sec-title">📌 Cấu trúc dùng:</span> <strong>There will be + danh từ + địa điểm</strong> (câu dự đoán tương lai với "there will be").<br>Câu gốc: My future house will <em>have</em> ten rooms → Chuyển thành: There will <em>be</em> ten rooms <em>in</em> my future house.</div>
<div class="exp-section"><span class="sec-title">❌ Tại sao các đáp án khác sai:</span><ul>
<li><strong>"will ten rooms be in"</strong>: Sai cấu trúc – đây là dạng câu hỏi, không phải câu khẳng định.</li>
<li><strong>"are ten rooms in"</strong>: Thiếu "will" – đây là thì hiện tại, không phải tương lai.</li>
<li><strong>"will have ten rooms in"</strong>: Sau "There" phải dùng "be", không dùng "have".</li>
</ul></div>`
  },
  {
    id: 2, ex: 18,
    orig: 'Perhaps robots will help us with homework.',
    trans: 'Robots _________________________________ with homework.',
    kw: 'MIGHT',
    opts: shuffle([
      { t: 'might help us', c: true },
      { t: 'might helping us', c: false },
      { t: 'might to help us', c: false },
      { t: 'might helped us', c: false },
    ]),
    exp: `<div class="ans-line">✅ Đáp án đúng: <strong>might help us</strong> → Robots might help us with homework.</div>
<div class="exp-section"><span class="sec-title">📌 Cấu trúc dùng:</span> <strong>might + V (nguyên thể)</strong> = có thể (diễn tả khả năng không chắc chắn).<br>"Perhaps" (Có lẽ) = <em>might</em> (có thể). Từ khóa bắt buộc là MIGHT.</div>
<div class="exp-section"><span class="sec-title">❌ Tại sao các đáp án khác sai:</span><ul>
<li><strong>"might helping"</strong>: Sau modal verb (might/can/will…) PHẢI là V nguyên thể, không thêm -ing.</li>
<li><strong>"might to help"</strong>: Sau modal verb KHÔNG dùng "to". Sai cấu trúc cơ bản.</li>
<li><strong>"might helped"</strong>: Sau modal verb KHÔNG dùng V quá khứ (helped).</li>
</ul></div>`
  },
  {
    id: 3, ex: 18,
    orig: 'Our house won\'t be in the city center.',
    trans: 'Our house _________________________________ near the city center.',
    kw: 'NOT',
    opts: shuffle([
      { t: 'will not be', c: true },
      { t: 'is not be', c: false },
      { t: 'not will be', c: false },
      { t: 'will be not', c: false },
    ]),
    exp: `<div class="ans-line">✅ Đáp án đúng: <strong>will not be</strong> → Our house will not be near the city center.</div>
<div class="exp-section"><span class="sec-title">📌 Cấu trúc dùng:</span> <strong>S + will not + V</strong> (phủ định tương lai đơn). "Won't" = "will not" (dạng đầy đủ).<br>Từ khóa NOT bắt buộc phải xuất hiện trong câu trả lời.</div>
<div class="exp-section"><span class="sec-title">❌ Tại sao các đáp án khác sai:</span><ul>
<li><strong>"is not be"</strong>: Sai hoàn toàn – không thể dùng "is not" với V nguyên thể "be".</li>
<li><strong>"not will be"</strong>: Sai vị trí – "not" phải đứng sau "will", không đứng trước.</li>
<li><strong>"will be not"</strong>: Sai vị trí – "not" phải đứng ngay sau "will" (will not be), không đứng sau "be".</li>
</ul></div>`
  },
  {
    id: 4, ex: 18,
    orig: 'Is your dream house going to be near the beach?',
    trans: '_________________________________ near the beach?',
    kw: 'WILL',
    opts: shuffle([
      { t: 'Will your dream house be', c: true },
      { t: 'Will your dream house', c: false },
      { t: 'Your dream house will be', c: false },
      { t: 'Will be your dream house', c: false },
    ]),
    exp: `<div class="ans-line">✅ Đáp án đúng: <strong>Will your dream house be</strong> → Will your dream house be near the beach?</div>
<div class="exp-section"><span class="sec-title">📌 Cấu trúc dùng:</span> <strong>Will + S + V (nguyên thể)?</strong> (câu hỏi tương lai đơn).<br>"Be going to" (kế hoạch) ↔ "will" (dự đoán/tương lai). Câu hỏi phải đảo trợ động từ "will" lên đầu.</div>
<div class="exp-section"><span class="sec-title">❌ Tại sao các đáp án khác sai:</span><ul>
<li><strong>"Will your dream house"</strong>: Thiếu động từ chính "be" – câu không hoàn chỉnh.</li>
<li><strong>"Your dream house will be"</strong>: Đây là cấu trúc câu khẳng định, không phải câu hỏi (thiếu đảo ngữ).</li>
<li><strong>"Will be your dream house"</strong>: Sai thứ tự – trong câu hỏi phải là Will + S + V, không phải Will + V + S.</li>
</ul></div>`
  },
  {
    id: 5, ex: 18,
    orig: 'Maybe we\'ll travel to school by flying car.',
    trans: 'We _________________________________ to school by flying car.',
    kw: 'MIGHT',
    opts: shuffle([
      { t: 'might travel', c: true },
      { t: 'might traveling', c: false },
      { t: 'might to travel', c: false },
      { t: 'might traveled', c: false },
    ]),
    exp: `<div class="ans-line">✅ Đáp án đúng: <strong>might travel</strong> → We might travel to school by flying car.</div>
<div class="exp-section"><span class="sec-title">📌 Cấu trúc dùng:</span> <strong>might + V nguyên thể</strong>. "Maybe" = <em>might</em>. Hai từ này mang cùng nghĩa "có lẽ", nhưng "maybe" đứng đầu câu còn "might" đứng sau chủ ngữ.</div>

Trật tự: <em>Mở đầu</em> → <em>Vị trí nhà</em> → <em>Năng lượng</em> → <em>Robot</em> → <em>Khu vườn (kết thúc)</em></div>`
  },

<div class="exp-section"><span class="sec-title">📌 Phân tích logic đoạn văn:</span><ul>
<li><strong>b</strong>: Mở đầu thư – chào hỏi và giới thiệu chủ đề (thành phố 2050).</li>
<li><strong>d</strong>: Ý đầu tiên về thành phố – nhà thông minh (smart homes). Không có từ nối "Also/And" nên đây là ý đầu tiên.</li>
<li><strong>a</strong>: Ý tiếp theo – xe bay, không tắc đường. Câu này không có "Also" ở đầu, nhưng theo logic chủ đề tiếp nối.</li>
<li><strong>e</strong>: Bắt đầu bằng "<em>Also</em>" (Ngoài ra) → nối thêm ý về robot trong cửa hàng.</li>

  },
  // =========== EXERCISE 21 ===========
  {
    id: 23, ex: 21, subtype: 'order',

      { ll: 'a', txt: 'These robots will cook meals, clean rooms, and even help children with their homework.' },

    exp: `<div class="ans-line">✅ Đáp án đúng: <strong>A. b – a – c</strong></div>
<div class="exp-section"><span class="sec-title">📌 Phân tích:</span><ul>
<li><strong>b</strong>: Bắt đầu bằng "<em>First</em>" (Thứ nhất) → giới thiệu ý đầu tiên: nhà nào cũng có robot.</li>
<li><strong>a</strong>: "These robots" → đại từ "these" chỉ về "robots" vừa nhắc ở câu b → câu a mô tả chi tiết hơn về những robot đó (nấu ăn, dọn dẹp, giúp bài tập).</li>

Trật tự: <em>First (b) → Chi tiết hóa (a) → Finally (c)</em></div>`
  },
  {

    opts: shuffle([
      { t: 'A. However, some people think future houses will be too expensive for everyone.', c: false },

    exp: `<div class="ans-line">✅ Đáp án đúng: <strong>B. With all these amazing features, living in future houses will be comfortable and easy.</strong></div>
<div class="exp-section"><span class="sec-title">📌 Phân tích:</span><ul>

</ul></div>`

    id: 25, ex: 21, subtype: 'order',

    sentences: [
      { ll: 'a', txt: 'Next, all buildings will have gardens on their roofs to grow food and create fresh air.' },
      { ll: 'b', txt: 'First, there will be no cars on the ground – only flying vehicles in the sky and electric buses.' },

    opts: shuffle([
      { t: 'A. a – b – c', c: false },

<div class="exp-section"><span class="sec-title">📌 Phân tích từ nối (Discourse Markers):</span><ul>
<li><strong>b</strong>: "<em>First</em>" (Thứ nhất) → luôn là câu đầu tiên của chuỗi.</li>

</ul>
Quy tắc vàng: <strong>First → Next → Finally</strong> (Thứ nhất → Tiếp theo → Cuối cùng) là trật tự cố định của các từ nối liệt kê.</div>`
  },
  {
    id: 26, ex: 21, subtype: 'ending',
    question: 'Choose the sentence that can END the text most appropriately (Exercise 21, Question 2):',
    context: '"I often imagine what my city will look like in the future... First, there will be no cars... Next, all buildings will have gardens... Finally, every house will use solar energy..."',
    opts: shuffle([
      { t: 'A. However, living in the countryside is always better than living in any city.', c: false },

<li><strong>C sai</strong>: "Unfortunately, will destroy forests" → tone tiêu cực, mâu thuẫn với nội dung mô tả thành phố xanh và sạch.</li>
<li><strong>D sai</strong>: Nói về quá khứ (In the past) – lạc chủ đề, đoạn văn nói về tương lai.</li>

  },
];

/* ===== RENDER ===== */
const root = document.getElementById('quizRoot');
let exShown = {};

questions.forEach((q, idx) => {
  // Exercise title
  if (!exShown[q.ex]) {
    exShown[q.ex] = true;
    const titleDiv = document.createElement('div');
    titleDiv.className = 'ex-title';
    const titles = {
      18: '📝 Exercise 18: Sentence Transformation (Using given words)',
      19: '✏️ Exercise 19: Complete the second sentence with the same meaning',
      20: '🔤 Exercise 20: Arrange sentences to make a meaningful letter',
      21: '🧩 Exercise 21: Arrange sentences & choose the best ending'
    };
    titleDiv.innerHTML = titles[q.ex] || ('Exercise ' + q.ex);
    root.appendChild(titleDiv);
    if (q.ex <= 19) {
      const instr = document.createElement('div');
      instr.className = 'ex-instr';
      if (q.ex === 18) instr.innerHTML = 'Using the words given (in brackets), complete the second sentence so that it has a similar meaning to the first sentence. <strong>Do not change the given words.</strong>';
      else instr.innerHTML = 'Complete the second sentence so that it has the <strong>same meaning</strong> as the first one.';
      root.appendChild(instr);
    }
    if (q.ex === 20) {
      const instr = document.createElement('div');
      instr.className = 'ex-instr';
      instr.innerHTML = 'Mark the letter <strong>A, B, C or D</strong> to indicate the correct arrangement of the sentences to make a meaningful letter.';
      root.appendChild(instr);
    }
    if (q.ex === 21) {
      const instr = document.createElement('div');
      instr.className = 'ex-instr';
      instr.innerHTML = 'Mark the letter <strong>A, B, C or D</strong> for the correct order, then choose the best ending sentence for each text.';
      root.appendChild(instr);
    }
  }

  const card = document.createElement('div');
  card.className = 'qcard';
  card.id = 'card-' + q.id;

  let html = '<div class="qhead">';
  html += `<div class="qnum">${q.id}</div>`;
  html += '<div class="qbody">';

  // Question content by type
  if (q.ex <= 19) {
    html += `<div class="orig-box"><div class="lbl">Câu gốc</div><p>${q.orig}</p></div>`;
    html += `<div class="trans-box"><div class="lbl">Chuyển đổi${q.kw ? ' &nbsp;<span class="kw-badge">' + q.kw + '</span>' : ''}</div><p>${q.trans}</p></div>`;
  } else if (q.ex === 20) {
    html += `<p style="font-weight:800;color:#333;margin-bottom:10px;font-size:.95em;">Sắp xếp các câu (a–e) thành đoạn thư có nghĩa:</p>`;
    html += `<div class="letter-block">`;
    html += `<div class="salutation">${q.salutation}</div>`;
    q.sentences.forEach(s => { html += `<div class="letter-row"><span class="ll">${s.ll}</span><span>${s.txt}</span></div>`; });
    html += `<div class="sign-off">${q.signoff}</div>`;
    html += `</div>`;
  } else if (q.subtype === 'order') {
    html += `<p style="font-weight:700;color:#555;margin-bottom:10px;font-size:.9em;line-height:1.65;">${q.intro}</p>`;
    html += `<div class="letter-block">`;
    q.sentences.forEach(s => { html += `<div class="letter-row"><span class="ll">${s.ll}</span><span>${s.txt}</span></div>`; });
    html += `</div><p style="font-weight:800;color:#8854C0;margin-bottom:8px;font-size:.88em;">Sắp xếp đúng các câu a, b, c:</p>`;
  } else if (q.subtype === 'ending') {
    html += `<p style="font-weight:800;color:#333;margin-bottom:8px;font-size:.9em;">${q.question}</p>`;
    html += `<div class="orig-box"><div class="lbl">Đoạn văn</div><p style="font-style:italic;font-size:.88em;">${q.context}</p></div>`;
  }

  html += '</div></div>';

  // Options
  html += '<div class="opts" id="opts-' + q.id + '">';
  q.opts.forEach((opt, oi) => {
    const labels = ['A','B','C','D'];
    const assignedLabel = labels[oi];
    html += `<button class="opt" onclick="checkAnswer(${q.id}, ${opt.c}, this)">
      <span class="olbl">${assignedLabel}</span>
      <span class="otxt">${opt.t}</span>
    </button>`;
  });
  html += '</div>';

  // Explanation
  html += `<div class="expbox" id="exp-${q.id}">
    <div class="exp-hdr">💡 Giải thích chi tiết:</div>
    ${q.exp}
  </div>`;

  card.innerHTML = html;
  root.appendChild(card);
});

/* ===== CHECK ANSWER ===== */
function checkAnswer(qid, isCorrect, btn) {
  const optsDiv = document.getElementById('opts-' + qid);
  const btns = optsDiv.querySelectorAll('.opt');
  
  // Prevent re-answering
  let alreadyAnswered = false;
  btns.forEach(b => { if (b.classList.contains('correct') || b.classList.contains('wrong')) alreadyAnswered = true; });
  if (alreadyAnswered) return;

  answered++;
  if (isCorrect) {
    correct++;
    btn.classList.add('correct');
    playCorrect();
    launchConfetti();
  } else {
    btn.classList.add('wrong');
    playWrong();
    // Show correct answer
    btns.forEach(b => {
      const txt = b.querySelector('.otxt').textContent;
      const qData = questions.find(q => q.id === qid);
      qData.opts.forEach(opt => { if (opt.c && b.querySelector('.otxt').textContent.trim() === opt.t.trim()) b.classList.add('correct'); });
    });
  }

  // Dim other buttons
  btns.forEach(b => {
    if (!b.classList.contains('correct') && !b.classList.contains('wrong')) b.classList.add('dimmed');
    b.disabled = true;
  });

  // Show explanation
  const expDiv = document.getElementById('exp-' + qid);
  expDiv.classList.add('show');

  updateTracker();
}

/* ===== SUBMIT ===== */
function submitQuiz() {
  const pct = Math.round(correct / TOTAL * 100);
  document.getElementById('sNum').textContent = correct + ' / ' + TOTAL;
  document.getElementById('sPct').textContent = 'Tỉ lệ đúng: ' + pct + '%';
  
  const msgs = [
    [100, '🏆', 'TUYỆT VỜI! Bạn đạt điểm tuyệt đối! Bạn thật xuất sắc!'],
    [85, '🌟', 'GIỎI LẮM! Bạn làm rất tốt! Cố gắng phấn đấu thêm nhé!'],
    [70, '😊', 'KHÁ TỐT! Ôn lại những câu sai và bạn sẽ giỏi hơn!'],
    [50, '💪', 'CỐ LÊN! Ôn tập thêm nhé, bạn sẽ tiến bộ thôi!'],
    [0, '📚', 'ĐỪNG NẢN LÒNG! Học lại và thử lần nữa nhé! Cố lên bạn ơi!'],
  ];
  
  for (const [min, emoji, msg] of msgs) {
    if (pct >= min) {
      document.getElementById('sEmoji').textContent = emoji;
      document.getElementById('sMsg').textContent = msg;
      break;
    }
  }

  document.getElementById('scoreOverlay').classList.add('show');
  if (pct >= 70) launchConfetti();
}

updateTracker();
document.getElementById('totalQs').textContent = TOTAL;
</script>
