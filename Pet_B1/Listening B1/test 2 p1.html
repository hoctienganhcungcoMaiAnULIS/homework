<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Practice - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #00C9A7;
            --accent: #FDCB6E;
            --correct: #00D26A;
            --wrong: #FF4757;
            --bg-color: #fce4ec;
            --text-dark: #2d3436;
        }

        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; }

        body {
            margin: 0; padding: 20px;
            background-color: var(--bg-color);
            /* Dynamic Background with SVG Emojis and Gradient */
            background-image: 
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" opacity="0.1"><text x="20" y="50" font-size="30">🎧</text><text x="120" y="100" font-size="30">🌟</text><text x="40" y="150" font-size="30">📚</text><text x="150" y="40" font-size="30">✍️</text></svg>'),
                radial-gradient(circle at top left, #8854c033, transparent),
                radial-gradient(circle at bottom right, #00c9a733, transparent);
            background-attachment: fixed;
            color: var(--text-dark);
        }

        .header {
            text-align: center; margin-bottom: 30px;
        }
        
        .header h4 {
            color: var(--primary); margin: 0; font-size: 1.2rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .header h1 {
            color: var(--text-dark); margin: 10px 0; font-size: 2.2rem;
            text-shadow: 2px 2px 0px white;
        }

        .audio-container {
            background: white; padding: 15px 30px; border-radius: 50px;
            display: inline-flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 30px;
            border: 4px solid var(--accent);
        }
        
        audio { outline: none; border-radius: 30px; height: 40px;}

        .quiz-container { max-width: 900px; margin: 0 auto; }

        .question-card {
            background: white; border-radius: 25px; padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 15px 35px rgba(136, 84, 192, 0.15);
            border: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .question-text {
            font-size: 1.4rem; font-weight: 800; color: var(--primary);
            margin-bottom: 25px; border-bottom: 2px dashed #eee; padding-bottom: 15px;
        }

        .options-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
        }

        .option-btn {
            background: #f8f9fa; border: 3px solid #e9ecef; border-radius: 20px;
            padding: 20px; cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 0 #e9ecef;
            display: flex; flex-direction: column; align-items: center;
            position: relative;
        }

        .option-btn:hover:not(.locked) {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--secondary);
            box-shadow: 0 13px 0 var(--secondary);
        }

        .option-btn:active:not(.locked) {
            transform: translateY(3px);
            box-shadow: 0 0 0 var(--secondary);
        }

        .option-svg { width: 120px; height: 120px; margin-bottom: 15px; }

        .option-label { font-size: 1.5rem; font-weight: bold; color: #555; }

        /* States */
        .option-btn.locked { cursor: not-allowed; opacity: 0.6; }
        .option-btn.correct {
            background: #e6fff0; border-color: var(--correct);
            box-shadow: 0 8px 0 var(--correct); opacity: 1; transform: scale(1.05); z-index: 2;
        }
        .option-btn.wrong {
            background: #ffebee; border-color: var(--wrong);
            box-shadow: 0 8px 0 var(--wrong); opacity: 1;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }

        /* Explanation Box */
        .explanation-box {
            margin-top: 25px; padding: 25px; background: #f0f4f8;
            border-radius: 15px; border-left: 6px solid var(--secondary);
            display: none; font-size: 1.05rem; line-height: 1.6;
            animation: slideDown 0.4s ease-out;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exp-step { margin-bottom: 15px; }
        .exp-title { font-weight: 800; color: var(--primary); font-size: 1.15rem; margin-bottom: 8px;}
        .keyword { color: var(--wrong); font-weight: bold; background: #ffebee; padding: 2px 5px; border-radius: 4px;}
        .highlight { color: var(--correct); font-weight: bold; }
        .table-kw { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);}
        .table-kw th, .table-kw td { padding: 10px; border: 1px solid #ddd; text-align: left;}
        .table-kw th { background: var(--accent); color: #333; }

        /* Submit Area */
        .submit-area { text-align: center; margin: 40px 0; }
        .btn-submit {
            background: var(--primary); color: white; border: none;
            padding: 15px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 30px;
            box-shadow: 0 8px 0 #5f3a8c; cursor: pointer; transition: 0.2s;
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 11px 0 #5f3a8c; }
        .btn-submit:active { transform: translateY(5px); box-shadow: 0 0 0 #5f3a8c; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 30px; text-align: center;
            max-width: 500px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 5px solid var(--accent); position: relative;
        }
        .modal-content h2 { font-size: 2.5rem; margin: 0 0 10px; color: var(--primary); }
        .score-text { font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; }
        .meme-img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);}
        .btn-restart {
            background: var(--secondary); color: white; border: none; padding: 12px 30px;
            font-size: 1.2rem; font-weight: bold; border-radius: 20px; cursor: pointer;
            box-shadow: 0 5px 0 #00997f;
        }

        /* Confetti Canvas */
        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; }
            .option-svg { width: 80px; height: 80px; }
            .option-btn { flex-direction: row; justify-content: center; gap: 20px; }
            .option-label { margin-left: 20px; }
        }
    </style>
</head>
<body>

    <canvas id="confetti"></canvas>

    <div class="header">
        <h4>Giáo viên tạo: Ms Mai An ULIS</h4>
        <h1>🎧 B1 PET Listening Practice 🎧</h1>
        <div class="audio-container">
            <audio controls>
                <source src="https://englishpracticetest.net/wp-content/uploads/2022/11/b1-test-2-1.mp3" type="audio/mpeg">
                Trình duyệt của bạn không hỗ trợ thẻ audio.
            </audio>
        </div>
    </div>

    <div class="quiz-container" id="quiz-container">
        </div>

    <div class="submit-area">
        <button class="btn-submit" onclick="submitQuiz()">🏆 NỘP BÀI TỔNG KẾT 🏆</button>
    </div>

    <div class="modal-overlay" id="result-modal">
        <div class="modal-content">
            <h2 id="modal-title">Hoàn thành!</h2>
            <div class="score-text">Đúng: <span id="score-display" style="color:var(--correct)">0</span>/7</div>
            <img id="meme-image" class="meme-img" src="" alt="Meme cảm xúc">
            <p id="modal-message" style="font-size:1.1rem; color:#666; margin-bottom:20px;"></p>
            <button class="btn-restart" onclick="location.reload()">Làm lại bài nhé! 🔄</button>
        </div>
    </div>

<script>
    // --- BỘ DỮ LIỆU CÂU HỎI, SVG SIÊU ĐẸP VÀ GIẢI THÍCH CHI TIẾT ---
    const quizData = [
        {
            id: 1,
            question: "1. What can't the woman find?",
            correct: "B",
            options: [
                { id: "A", label: "A", svg: `<svg viewBox="0 0 100 100"><path d="M20,80 L80,20 L85,25 L25,85 Z" fill="#b2bec3"/><path d="M15,85 L30,70 L40,80 L25,95 Z" fill="#2d3436"/><circle cx="28" cy="82" r="2" fill="white"/></svg>`, desc: "Knife" },
                { id: "B", label: "B", svg: `<svg viewBox="0 0 100 100"><rect x="40" y="40" width="20" height="50" rx="5" fill="#e17055"/><path d="M30,20 L70,20 L65,40 L35,40 Z" fill="#0984e3"/><path d="M30,20 Q50,0 70,20" fill="#74b9ff"/></svg>`, desc: "Paintbrush" },
                { id: "C", label: "C", svg: `<svg viewBox="0 0 100 100"><path d="M30,70 L70,30 L75,35 L35,75 Z" fill="#e17055"/><path d="M60,20 L90,20 L90,40 L65,40 Z" fill="#636e72"/><path d="M60,25 Q50,20 60,35" fill="#b2bec3"/></svg>`, desc: "Hammer" }
            ],
            explanation: `
                <div class="exp-step"><div class="exp-title">📸 Bước 1: Phân tích hình ảnh</div>
                A. Knife (Con dao) | B. Paintbrush (Cây cọ sơn) | C. Hammer (Cái búa)</div>
                
                <div class="exp-step"><div class="exp-title">🎧 Bước 2: Transcript & Dịch nghĩa</div>
                <b>Mum:</b> Yes, can you go to the shop and get me a new <span class="keyword">hammer</span> – this one’s broken. But before you do that, ask your dad what he’s done with the <span class="keyword">paintbrush</span> – <span class="highlight">I’ve looked everywhere for it.</span> There weren’t any in the garage; all I could find was this <span class="keyword">knife</span> which I lost months ago!<br><br>
                <i>(Mẹ: Con có thể ra cửa hàng mua cho mẹ cái <b>búa</b> mới được không - cái này hỏng rồi. Nhưng trước khi đi, hãy hỏi bố xem bố để <b>cây cọ sơn</b> ở đâu - <span style="color:green">mẹ đã tìm nó khắp nơi rồi.</span> Không có cái nào trong gara cả; tất cả những gì mẹ có thể tìm thấy là <b>con dao</b> mẹ làm mất mấy tháng trước!)</i></div>
                
                <div class="exp-step"><div class="exp-title">🎯 Bước 3: Tại sao đúng? (Đáp án B)</div>
                Câu hỏi là "Người phụ nữ <b>KHÔNG THỂ TÌM THẤY</b> thứ gì?". Người mẹ nói rõ: "what he's done with the <b>paintbrush - I've looked everywhere for it</b>" (Bố để cây cọ sơn đâu rồi, mẹ tìm khắp nơi mà không thấy). Nghĩa là bà ấy đang bị mất/không tìm thấy cây cọ sơn.</div>
                
                <div class="exp-step"><div class="exp-title">🚫 Bước 4: Phân tích bẫy (Distractors)</div>
                - <b>A (Knife) sai vì:</b> Mẹ bảo "all I could find was this knife" -> Tức là ĐÃ TÌM THẤY con dao chứ không phải không tìm thấy.<br>
                - <b>C (Hammer) sai vì:</b> Búa là thứ bà ấy nhờ con gái đi mua mới ("get me a new hammer") vì cái cũ bị hỏng, chứ không phải do bà ấy không tìm thấy.</div>
            `
        },
        {
            id: 2,
            question: "2. What is the weather forecast for tomorrow?",
            correct: "C",
            options: [
                { id: "A", label: "A", svg: `<svg viewBox="0 0 100 100"><path d="M20,50 Q40,30 60,40 Q80,30 90,50 Q100,70 80,70 L20,70 Q0,70 20,50" fill="#636e72"/><path d="M30,75 L20,95 M50,75 L40,95 M70,75 L60,95 M90,75 L80,95" stroke="#0984e3" stroke-width="3"/></svg>`, desc: "Heavy Rain" },
                { id: "B", label: "B", svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="25" fill="#fdcb6e"/><path d="M50,10 L50,20 M50,80 L50,90 M10,50 L20,50 M80,50 L90,50 M20,20 L30,30 M70,70 L80,80 M20,80 L30,70 M70,30 L80,20" stroke="#fdcb6e" stroke-width="4"/></svg>`, desc: "Sunny" },
                { id: "C", label: "C", svg: `<svg viewBox="0 0 100 100"><circle cx="30" cy="40" r="15" fill="#fdcb6e"/><path d="M30,50 Q50,35 70,45 Q90,35 95,55 Q100,70 80,70 L40,70 Q20,70 30,50" fill="#dfe6e9"/><path d="M50,75 L45,85 M70,75 L65,85 M85,75 L80,85" stroke="#74b9ff" stroke-width="2"/></svg>`, desc: "Sun & Showers" }
            ],
            explanation: `
                <div class="exp-step"><div class="exp-title">📸 Bước 1: Phân tích hình ảnh</div>
                A. Heavy rain (Mưa to toàn mây đen) | B. Sunshine (Nắng ráo) | C. Sunshine and light showers (Trời nắng có mây và mưa nhỏ)</div>
                
                <div class="exp-step"><div class="exp-title">🎧 Bước 2: Transcript & Dịch nghĩa</div>
                <b>Man:</b> As we go through <span class="keyword">today</span>, the <span class="keyword">heavy rain</span> will gradually disappear... <span class="highlight">Tomorrow we can expect some sunshine with just a few light showers</span>, and then some very <span class="keyword">hot and dry</span> weather is likely by the <span class="keyword">weekend</span>.<br><br>
                <i>(Người đàn ông: Vào <b>hôm nay</b>, <b>mưa lớn</b> sẽ dần tạnh... <span style="color:green">Vào ngày mai, chúng ta có thể đón nắng kèm theo vài cơn mưa rào nhẹ</span>, và thời tiết <b>rất nóng và khô</b> có thể sẽ đến vào <b>cuối tuần</b>.)</i></div>
                
                <div class="exp-step"><div class="exp-title">🎯 Bước 3: Tại sao đúng? (Đáp án C)</div>
                Câu hỏi hỏi dự báo thời tiết cho <b>TOMORROW (ngày mai)</b>. Người nói nói rõ: "Tomorrow we can expect some sunshine with just a few light showers" (Ngày mai có nắng kèm mưa rào nhẹ). Hình C thể hiện chính xác mặt trời (sunshine) thò ra sau đám mây có vài hạt mưa (light showers).</div>
                
                <div class="exp-step"><div class="exp-title">🚫 Bước 4: Phân tích bẫy (Distractors)</div>
                - <b>A (Heavy rain) sai vì:</b> Mưa to là thời tiết của "today" (hôm nay) và nó sắp tạnh.<br>
                - <b>B (Hot and dry/Sunny) sai vì:</b> Trời nóng, nắng khô ran không mưa là thời tiết dự báo cho "the weekend" (cuối tuần), không phải ngày mai.</div>
            `
        },
        {
            id: 3,
            question: "3. What did the boy buy?",
            correct: "A",
            options: [
                { id: "A", label: "A", svg: `<svg viewBox="0 0 100 100"><rect x="20" y="20" width="25" height="40" fill="#fab1a0"/><text x="22" y="45" font-size="12">Juice</text><path d="M20,80 Q50,60 80,80 Q50,100 20,80" fill="#e17055"/><path d="M30,75 L35,85 M50,70 L55,80 M70,75 L65,85" stroke="#d63031" stroke-width="2"/></svg>`, desc: "Bread & Juice" },
                { id: "B", label: "B", svg: `<svg viewBox="0 0 100 100"><rect x="10" y="20" width="20" height="40" fill="#fab1a0"/><path d="M10,80 Q40,60 70,80 Q40,100 10,80" fill="#e17055"/><circle cx="70" cy="40" r="10" fill="#d63031"/><circle cx="85" cy="50" r="10" fill="#d63031"/></svg>`, desc: "Bread, Juice, Tomatoes" },
                { id: "C", label: "C", svg: `<svg viewBox="0 0 100 100"><rect x="50" y="20" width="25" height="40" fill="#fab1a0"/><path d="M10,80 Q40,60 70,80 Q40,100 10,80" fill="#e17055"/><rect x="10" y="20" width="30" height="40" fill="#b2bec3" transform="rotate(-15 10 20)"/><text x="15" y="40" font-size="8" transform="rotate(-15 10 20)">NEWS</text></svg>`, desc: "Bread, Juice, Newspaper" }
            ],
            explanation: `
                <div class="exp-step"><div class="exp-title">📸 Bước 1: Phân tích hình ảnh</div>
                A. Nước cam + Bánh mì dài | B. Nước cam + Bánh mì + Cà chua | C. Nước cam + Bánh mì + Tờ báo</div>
                
                <div class="exp-step"><div class="exp-title">🎧 Bước 2: Transcript & Dịch nghĩa</div>
                <b>Son:</b> <span class="highlight">I got the last of the bread and some orange juice</span> but sorry, <span class="keyword">there weren't any newspapers left.</span><br>
                <b>Mum:</b> But what about the <span class="keyword">tomatoes</span> for the salad?<br>
                <b>Son:</b> Ah … <span class="keyword">I forgot</span>.<br><br>
                <i>(Con trai: <span style="color:green">Con đã mua ổ bánh mì cuối cùng và một ít nước cam</span> nhưng xin lỗi mẹ, <b>không còn tờ báo nào cả</b>.<br>Mẹ: Thế còn <b>cà chua</b> cho món salad thì sao?<br>Con trai: Á... <b>con quên mất rồi</b>.)</i></div>
                
                <div class="exp-step"><div class="exp-title">🎯 Bước 3: Tại sao đúng? (Đáp án A)</div>
                Bạn nam xác nhận rõ ràng mình đã mua ("I got"): "bread" (bánh mì) và "orange juice" (nước cam). Hình A chỉ có đúng 2 món này.</div>
                
                <div class="exp-step"><div class="exp-title">🚫 Bước 4: Phân tích bẫy (Distractors)</div>
                - <b>C (Có tờ báo) sai vì:</b> Cậu bé nói "there weren't any newspapers left" (người ta bán hết sạch báo rồi), nên cậu không mua được.<br>
                - <b>B (Có cà chua) sai vì:</b> Mẹ nhắc đến cà chua nhưng cậu bé thú nhận "Ah... I forgot" (Con quên béng mất), nên trong giỏ hàng cậu mang về không hề có cà chua.</div>
            `
        },
        {
            id: 4,
            question: "4. Which present has the girl bought her mother?",
            correct: "C",
            options: [
                { id: "A", label: "A", svg: `<svg viewBox="0 0 100 100"><rect x="20" y="40" width="60" height="40" rx="5" fill="#dfe6e9"/><circle cx="40" cy="60" r="8" fill="#fdcb6e" stroke="#e17055" stroke-width="2"/><circle cx="60" cy="60" r="8" fill="#fdcb6e" stroke="#e17055" stroke-width="2"/></svg>`, desc: "Earrings" },
                { id: "B", label: "B", svg: `<svg viewBox="0 0 100 100"><rect x="20" y="20" width="60" height="60" fill="#6c5ce7"/><circle cx="50" cy="50" r="25" fill="#a29bfe"/><circle cx="50" cy="50" r="5" fill="white"/></svg>`, desc: "A CD" },
                { id: "C", label: "C", svg: `<svg viewBox="0 0 100 100"><rect x="15" y="30" width="70" height="40" rx="5" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="3"/><path d="M25,50 L75,50" stroke="#2d3436" stroke-width="4" stroke-linecap="round"/><path d="M75,50 L80,48 L80,52 Z" fill="#2d3436"/></svg>`, desc: "A Pen" }
            ],
            explanation: `
                <div class="exp-step"><div class="exp-title">📸 Bước 1: Phân tích hình ảnh</div>
                A. A pair of earrings (Đôi khuyên tai) | B. A CD (Đĩa nhạc) | C. A pen (Cái bút)</div>
                
                <div class="exp-step"><div class="exp-title">🎧 Bước 2: Transcript & Dịch nghĩa</div>
                <b>Jane:</b> I’ve got Mum’s birthday present... a gold-coloured one. <span class="highlight">She’s always writing letters, so she’ll find it useful</span>… Mmm. I thought about a <span class="keyword">CD</span> but I’m never really sure what music she likes, and Dad’s bought her a new <span class="keyword">pair of earrings</span>...<br><br>
                <i>(Jane: Con đã có quà sinh nhật cho mẹ... một cái màu vàng. <span style="color:green">Mẹ rất hay viết thư, nên mẹ sẽ thấy nó hữu ích...</span> Hừm. Con đã nghĩ đến việc mua <b>đĩa CD</b> nhưng con không chắc mẹ thích nhạc gì, và dù sao thì bố cũng mua cho mẹ một <b>đôi khuyên tai</b> mới rồi...)</i></div>
                
                <div class="exp-step"><div class="exp-title">🎯 Bước 3: Tại sao đúng? (Đáp án C)</div>
                Cô gái không nói thẳng từ "Pen", nhưng dùng kỹ thuật Paraphrase (diễn đạt vòng): "a gold-coloured one" (một cái đồ vật màu vàng) và mấu chốt là <b>"She's always writing letters, so she'll find it useful"</b> (Mẹ hay viết thư nên nó sẽ hữu ích). Để viết thư thì chắc chắn món quà đó là cái bút (Hình C).</div>
                
                <div class="exp-step"><div class="exp-title">🚫 Bước 4: Phân tích bẫy (Distractors)</div>

    // --- WEB AUDIO API CHO HIỆU ỨNG ÂM THANH ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'correct') {
            // Tiếng "Ding" trong trẻo
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
            osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1); // Vuốt lên A6
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        } else if (type === 'wrong') {
            // Tiếng "Buzz/Error" téo tèo
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.3); // Vuốt âm xuống
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    // --- THUẬT TOÁN SHUFFLE (Xáo trộn ngẫu nhiên) ---
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // --- RENDER BÀI TẬP ---
    const container = document.getElementById('quiz-container');
    let score = 0;
    let answeredQuestions = 0;

    quizData.forEach((q, index) => {
        // Tạo HTML cho mỗi câu hỏi
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q-card-${q.id}`;
        
        let questionHTML = `<div class="question-text">${q.question}</div><div class="options-grid">`;
        
        // Clone và xáo trộn options nhưng VẪN GIỮ LOGIC LABEL (A,B,C hiển thị đổi vị trí)
        let shuffledOptions = [...q.options];
        shuffleArray(shuffledOptions);

        shuffledOptions.forEach(opt => {
            questionHTML += `
                <div class="option-btn" id="opt-${q.id}-${opt.id}" onclick="selectAnswer(${q.id}, '${opt.id}', '${q.correct}')">
                    <div class="option-svg">${opt.svg}</div>
                    <div class="option-label">${opt.label}</div>
                </div>
            `;
        });
        
        questionHTML += `</div>
            <div class="explanation-box" id="exp-${q.id}">
                ${q.explanation}
            </div>
        `;
        
        card.innerHTML = questionHTML;
        container.appendChild(card);
    });

    // --- XỬ LÝ KHI CHỌN ĐÁP ÁN ---
    function selectAnswer(questionId, selectedOptId, correctOptId) {
        const card = document.getElementById(`q-card-${questionId}`);
        // Nếu đã trả lời rồi thì bỏ qua
        if(card.getAttribute('data-answered') === 'true') return;
        
        card.setAttribute('data-answered', 'true');
        answeredQuestions++;

        const isCorrect = selectedOptId === correctOptId;
        
        // Disable tất cả options trong câu này
        const allOpts = card.querySelectorAll('.option-btn');
        allOpts.forEach(btn => {
            btn.classList.add('locked');
            // Nếu là đáp án đúng thực sự, dù học sinh không chọn cũng bôi xanh mờ cho học sinh biết
            if(btn.id === `opt-${questionId}-${correctOptId}` && !isCorrect) {
                 btn.style.borderColor = "var(--correct)";
                 btn.style.borderWidth = "4px";
            }
        });

        // Đánh dấu nút được chọn
        const selectedBtn = document.getElementById(`opt-${questionId}-${selectedOptId}`);
        if (isCorrect) {
            selectedBtn.classList.add('correct');
            playSound('correct');
            fireConfetti();
            score++;
        } else {
            selectedBtn.classList.add('wrong');
            selectedBtn.classList.add('shake');
            playSound('wrong');
            // Gỡ class shake sau khi animation chạy xong
            setTimeout(() => selectedBtn.classList.remove('shake'), 400);
        }

        // TỰ ĐỘNG HIỆN GIẢI THÍCH
        const expBox = document.getElementById(`exp-${questionId}`);
        expBox.style.display = 'block';
    }

    // --- XỬ LÝ NỘP BÀI & POPUP KẾT QUẢ ---
    function submitQuiz() {
        if (answeredQuestions < quizData.length) {
            alert(`Bạn mới làm ${answeredQuestions}/${quizData.length} câu. Hãy làm hết trước khi nộp nhé! Ms Mai An đang đợi nè!`);
            return;
        }

        const percentage = (score / quizData.length) * 100;
        document.getElementById('score-display').innerText = score;
        
        const modal = document.getElementById('result-modal');
        const memeImg = document.getElementById('meme-image');
        const message = document.getElementById('modal-message');
        const title = document.getElementById('modal-title');

        if (percentage === 100) {
            title.innerText = "Tuyệt Vời Quá Đỉnh! 👑";
            title.style.color = "var(--correct)";
            message.innerText = "Ms Mai An tự hào về bạn! Bạn đã nghe ra toàn bộ các bẫy khó nhất!";
            memeImg.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif";
            fireConfetti(100); // Bắn pháo bông mạnh hơn
        } else if (percentage >= 60) {
            title.innerText = "Làm Tốt Lắm! 👍";
            title.style.color = "#0984e3";
            message.innerText = "Rất đáng khen! Hãy đọc kỹ phần Giải Thích Bẫy để gỡ nốt các câu sai nhé!";
            memeImg.src = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif";
        } else {
            title.innerText = "Ui da... Cố gắng lên! 😢";
            title.style.color = "var(--wrong)";
            message.innerText = "Bài nghe này nhiều bẫy lừa quá đúng không? Không sao, mở phần Giải thích ra đọc lại Transcript là giỏi ngay!";
            memeImg.src = "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif";
        }

        modal.style.display = 'flex';
    }

    // --- HIỆU ỨNG PHÁO GIẤY CONFETTI (Lightweight custom implementation) ---
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = [];

    function fireConfetti(amount = 40) {
        for (let i = 0; i < amount; i++) {
            particles.push({
                x: canvas.width / 2, y: canvas.height / 2 + 100,
                r: Math.random() * 6 + 4,
                dx: Math.random() * 20 - 10, dy: Math.random() * -15 - 5,
                color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                tilt: Math.floor(Math.random() * 10) - 10,
                tiltAngle: 0, tiltAngleInc: (Math.random() * 0.07) + 0.05
            });
        }
        if (particles.length === amount) requestAnimationFrame(drawConfetti);
    }

    function drawConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let active = false;
        particles.forEach((p, index) => {
            p.tiltAngle += p.tiltAngleInc;
            p.y += (Math.cos(p.tiltAngle) + 1 + p.r / 2) / 2;
            p.x += Math.sin(p.tiltAngle) * 2;
            p.dy += 0.2; // Gravity
            p.x += p.dx; p.y += p.dy;
            
            ctx.beginPath();
            ctx.lineWidth = p.r; ctx.strokeStyle = p.color;
            ctx.moveTo(p.x + p.tilt + p.r, p.y);
            ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
            ctx.stroke();

            if (p.y <= canvas.height) active = true;
        });
        
        if (active) { requestAnimationFrame(drawConfetti); } 
        else { particles = []; ctx.clearRect(0, 0, canvas.width, canvas.height); }
    }

    // Handle resize
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

</script>
