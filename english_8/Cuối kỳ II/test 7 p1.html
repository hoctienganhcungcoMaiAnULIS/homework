<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ĐỀ 07 - ĐỀ THI CUỐI HỌC KỲ 2 LỚP 8 | Ms Mai An ULIS</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #FF6B9D; --purple: #8854C0; --yellow: #FDCB6E; --teal: #00C9A7;
  --blue: #4ECDC4; --orange: #FF9F43; --correct: #00D26A; --wrong: #FF4757;
  --card-bg: rgba(255,255,255,0.95); --shadow: 0 8px 32px rgba(136,84,192,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; min-height: 100vh; overflow-x: hidden; background: #f0e6ff; }

/* ===== ANIMATED GRADIENT BACKGROUND ===== */
.bg-gradient {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffecd2, #a1c4fd, #c2e9fb, #d4fc79, #96e6a1, #a18cd1, #fbc2eb);
  background-size: 400% 400%; animation: gradientMove 15s ease infinite;
}
@keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

/* ===== SVG PATTERN OVERLAY (FLOWERS & CATS) ===== */
.bg-pattern { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.float-icon { position: absolute; font-size: 2.5rem; animation: floatUp linear infinite; opacity: 0.25; user-select: none; }
@keyframes floatUp { 0% { transform: translateY(110vh) rotate(0deg); opacity: 0.15; } 50% { opacity: 0.35; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0.1; } }

/* ===== MAIN WRAPPER ===== */
.wrapper { position: relative; z-index: 2; max-width: 820px; margin: 0 auto; padding: 16px 12px 60px; }

/* ===== HEADER ===== */
.quiz-header {
  background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px);
  border: 2px solid rgba(255,255,255,0.6); border-radius: 20px;
  padding: 16px 24px 14px; text-align: center; margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(136,84,192,0.2); color: #4a2382;
}
.quiz-header h1 { font-size: 1.5rem; font-weight: 900; letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(255,255,255,0.8); }
.quiz-header p { font-size: 0.9rem; font-weight: 800; margin-top: 5px; color: #6A0572; }

/* ===== SCORE BAR ===== */
.score-bar {
  background: rgba(255,255,255,0.88); border-radius: 50px; padding: 8px 20px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; box-shadow: var(--shadow); font-size: 1rem; font-weight: 800;
}
.score-bar .score-val { color: var(--purple); font-size: 1.1rem; }
.progress-wrap { flex: 1; margin: 0 14px; height: 10px; background: #e0d4f7; border-radius: 99px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--teal), var(--purple)); border-radius: 99px; transition: width 0.5s ease; }

/* ===== QUESTION CARD (GLASSMORPHISM) ===== */
.q-card {
  background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.8); border-radius: 20px;
  padding: 24px 22px; margin-bottom: 20px; box-shadow: var(--shadow);
  transition: transform 0.2s;
}
.q-num {
  display: inline-block; background: linear-gradient(135deg, var(--purple), var(--pink));
  color: white; font-weight: 900; font-size: 0.9rem; border-radius: 50px;
  padding: 5px 14px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(136,84,192,0.3);
}
.q-text { font-size: 1.15rem; font-weight: 800; color: #2d1b6e; line-height: 1.6; margin-bottom: 16px; }

/* ===== OPTIONS GRID ===== */
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 8px; }
@media(max-width:550px) { .options { grid-template-columns: 1fr; } }

.opt-btn {
  background: rgba(255, 255, 255, 0.9); border: none; border-radius: 18px;
  padding: 14px 18px; font-size: 1.08rem; font-weight: 800; color: #3d1a78;
  cursor: pointer; text-align: center; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 6px 0 #d4b8ff, 0 8px 16px rgba(136,84,192,0.15);
  display: flex; align-items: center; justify-content: center; line-height: 1.4;
}
.opt-btn:hover:not(:disabled) {
  transform: scale(1.03) translateY(-4px); box-shadow: 0 10px 0 #c4a0f0, 0 12px 20px rgba(136,84,192,0.25);
  background: linear-gradient(135deg, #f8f0ff, #ffe0f0);
}
.opt-btn:active:not(:disabled) { transform: scale(0.98) translateY(2px); box-shadow: 0 2px 0 #c4a0f0; }

.opt-btn.correct {
  background: linear-gradient(135deg, #d4fff0, #b8ffe0) !important;
  color: #00873e !important; box-shadow: 0 6px 0 #00a854, 0 8px 16px rgba(0,210,106,0.2) !important;
  transform: scale(1.03) !important; border: 2px solid var(--correct);
}
.opt-btn.wrong {
  background: linear-gradient(135deg, #ffe0e3, #ffd0d4) !important;
  color: #c0002a !important; box-shadow: 0 6px 0 #ff2244, 0 8px 16px rgba(255,71,87,0.2) !important;
  border: 2px solid var(--wrong); animation: shakeOption 0.4s ease;
}
@keyframes shakeOption { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
.opt-btn:disabled { cursor: default; }

/* ===== EXPLANATION BOX (STRICT FORMATTING) ===== */
.explanation {
  display: none; margin-top: 18px; background: rgba(255,255,255,0.95);
  border-radius: 16px; padding: 18px; font-size: 1rem; line-height: 1.7;
  box-shadow: inset 0 0 0 2px var(--yellow), 0 8px 24px rgba(0,0,0,0.08);
  animation: fadeInDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.explanation.show { display: block; }
@keyframes fadeInDown { from{opacity:0;transform:translateY(-15px)} to{opacity:1;transform:none} }

.trans-box { background: #fff3e0; border-left: 5px solid #ff9800; padding: 10px 14px; font-weight: 800; color: #d35400; border-radius: 8px; margin-bottom: 12px; }
.expl-title { font-weight: 900; color: var(--purple); font-size: 1.15rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
.expl-row { margin: 6px 0; color: #2c3e50; }
.p-word { color: #0984e3; font-weight: 800; background: #eaf2f8; padding: 2px 6px; border-radius: 4px; }
.p-phonetic { color: #8e44ad; font-family: 'Courier New', monospace; font-weight: bold; background: #f4ecf7; padding: 2px 6px; border-radius: 4px; }
.p-mean { color: #d35400; font-weight: 700; }
.p-grammar { text-decoration: underline; text-decoration-color: #e74c3c; text-decoration-thickness: 2px; font-weight: 800; color: #c0392b; }
.hl-green { color: #00b894; font-weight: 900; }
.hl-red { color: #d63031; font-weight: 700; text-decoration: line-through; }

/* ===== SUBMIT BUTTON ===== */
.submit-wrap { text-align: center; margin-top: 35px; }
.submit-btn {
  background: linear-gradient(135deg, #f9ca24, #f0932b); color: white; border: none;
  border-radius: 50px; padding: 16px 48px; font-size: 1.3rem; font-weight: 900;
  cursor: pointer; font-family: 'Nunito', sans-serif;
  box-shadow: 0 8px 0 #c87000, 0 15px 30px rgba(249,202,36,0.4);
  transition: all 0.2s; letter-spacing: 1px; text-transform: uppercase;
}
.submit-btn:hover { transform: scale(1.05) translateY(-4px); box-shadow: 0 12px 0 #c87000, 0 20px 40px rgba(249,202,36,0.5); }
.submit-btn:active { transform: scale(0.98) translateY(2px); box-shadow: 0 2px 0 #c87000; }

/* ===== MODALS (PASSWORD, NAME, RESULT) ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(5,2,15,0.85); backdrop-filter: blur(10px);
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.pw-card {
  background: linear-gradient(160deg, rgba(255,255,255,0.95) 0%, rgba(240,240,255,0.98) 100%);
  border: 3px solid #d4b8ff; border-radius: 28px; padding: 40px 30px;
  max-width: 440px; width: 90%; text-align: center; position: relative;
  box-shadow: 0 20px 60px rgba(136,84,192,0.4); animation: popIn 0.4s cubic-bezier(.18,1.5,.5,1);
}
@keyframes popIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
.pw-crest { font-size: 4rem; margin-bottom: 8px; display: block; animation: floatUp 3s ease-in-out infinite alternate; }
.pw-title { font-size: 1.6rem; font-weight: 900; color: var(--purple); margin-bottom: 6px; text-transform: uppercase; }
.pw-sub { font-size: 1rem; color: #5a3a8a; font-weight: 700; margin-bottom: 24px; }
.pw-input {
  width: 100%; padding: 15px 20px; border-radius: 16px;
  border: 2px solid #d4b8ff; background: #fff; color: #3d1a78;
  font-size: 1.1rem; font-family: 'Nunito', sans-serif; font-weight: 800;
  outline: none; text-align: center; transition: all .3s; box-shadow: inset 0 3px 6px rgba(0,0,0,0.05);
}
.pw-input:focus { border-color: var(--purple); box-shadow: 0 0 0 4px rgba(136,84,192,0.2); }
.pw-input.error { border-color: var(--wrong); box-shadow: 0 0 0 4px rgba(255,71,87,0.2); animation: shakeOption .4s ease; }
.pw-btn {
  width: 100%; padding: 15px; margin-top: 18px; border-radius: 16px; border: none;
  background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
  color: #fff; font-size: 1.15rem; font-weight: 900; font-family: 'Nunito', sans-serif;
  cursor: pointer; transition: transform .2s, box-shadow .2s; box-shadow: 0 6px 0 #6A0572;
}
.pw-btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #6A0572, 0 10px 20px rgba(136,84,192,0.4); }
.pw-btn:active { transform: translateY(3px); box-shadow: 0 0px 0 #6A0572; }
.pw-err { color: var(--wrong); font-size: 0.95rem; margin-top: 12px; display: none; font-weight: 800; }

/* Result Specific */
.result-gif { width: 100%; max-width: 250px; border-radius: 16px; margin: 15px auto; display: block; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
.result-score { font-size: 3rem; font-weight: 900; color: var(--teal); margin-bottom: 5px; text-shadow: 2px 2px 0px rgba(0,201,167,0.2); }

/* Confetti */
.confetti-piece { position: fixed; width: 12px; height: 12px; border-radius: 4px; pointer-events: none; z-index: 9999; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; } }

/* Custom elements for signs */
.sign-board { border-radius: 12px; padding: 15px; margin: 10px auto; text-align: center; max-width: 250px; }
.sign-wifi { background: #2ecc71; color: white; border: 4px solid #27ae60; font-weight: 900; font-size: 1.5rem; letter-spacing: 1px; }
.sign-notice { background: white; color: black; border: 3px solid #333; font-family: 'Times New Roman', serif; font-size: 1.1rem; font-weight: bold; }
</style>
</head>
<body>

<div class="modal-overlay show" id="passwordModal">
  <div class="pw-card">
    <span class="pw-crest">🔒</span>
    <div class="pw-title">BẢO MẬT</div>
    <div class="pw-sub">Vui lòng nhập mật khẩu để làm bài</div>
    <input type="password" class="pw-input" id="pwInput" placeholder="Nhập mật khẩu..." autocomplete="off" />
    <button class="pw-btn" onclick="checkPassword()">XÁC NHẬN</button>
    <div class="pw-err" id="pwErr">Mật khẩu không đúng! Vui lòng thử lại.</div>
  </div>
</div>

<div class="modal-overlay" id="nameModal">
  <div class="pw-card">
    <span class="pw-crest">📝</span>
    <div class="pw-title">NHẬP TÊN CỦA BẠN</div>
    <div class="pw-sub">Hãy cho cô biết ai đang làm bài nhé!</div>
    <input type="text" class="pw-input" id="nameInput" placeholder="VD: Nguyễn Văn A..." autocomplete="off" />
    <button class="pw-btn" onclick="submitName()">HOÀN THÀNH</button>
    <div class="pw-err" id="nameErr">Vui lòng nhập tên của bạn!</div>
  </div>
</div>

<div class="modal-overlay" id="resultModal">
  <div class="pw-card">
    <div class="pw-title" id="resTitle" style="font-size: 1.4rem;">🌟 THIÊN TÀI!</div>
    <img id="resGif" class="result-gif" src="" alt="Result Meme">
    <div class="result-score" id="resScore">0/0</div>
    <div class="pw-sub" id="resMsg" style="font-size: 1.1rem; color: #2d1b6e;"></div>
    <button class="pw-btn" onclick="location.reload()">LÀM LẠI BÀI</button>
  </div>
</div>


<div class="bg-gradient"></div>
<div class="bg-pattern" id="bgPattern"></div>

<div class="wrapper" id="mainContent" style="display:none;">
  <div class="quiz-header">
    <h1>ĐỀ 07 - ĐỀ THI CUỐI HỌC KỲ 2 LỚP 8</h1>
    <p>Môn: Tiếng Anh &nbsp;|&nbsp; Giáo viên tạo: <strong>Ms Mai An ULIS</strong></p>
  </div>

  <div class="score-bar">
    <span>🌟 Điểm:</span>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <span class="score-val" id="scoreDisplay">0 / 0</span>
  </div>

  <div id="quizContainer"></div>

  <div class="submit-wrap">
    <button class="submit-btn" onclick="showNameModal()">🎯 NỘP BÀI &amp; XEM KẾT QUẢ</button>
  </div>
</div>

<script>
// ===== SECURITY =====
const _k = [49, 54, 49, 49]; 
const _pw = _k.map(c => String.fromCharCode(c)).join('');

function checkPassword() {
  const inp = document.getElementById('pwInput');
  const err = document.getElementById('pwErr');
  if (inp.value === _pw) {
    document.getElementById('passwordModal').classList.remove('show');
    document.getElementById('mainContent').style.display = 'block';
  } else {
    inp.classList.remove('error'); void inp.offsetWidth; inp.classList.add('error');
    err.style.display = 'block'; setTimeout(() => inp.classList.remove('error'), 500);
  }
}
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key==='Enter') checkPassword(); });

// ===== BACKGROUND ICONS =====
const icons = ['🌸','🐱','🌺','🐈','🌼','🌻','😻','🌷','✨','💫','🌿'];
const bp = document.getElementById('bgPattern');
for(let i=0;i<25;i++){
  const el = document.createElement('div');
  el.className = 'float-icon';
  el.textContent = icons[Math.floor(Math.random()*icons.length)];
  el.style.left = Math.random()*100+'%';
  el.style.animationDuration = (15+Math.random()*25)+'s';
  el.style.animationDelay = (Math.random()*20)+'s';
  el.style.fontSize = (2+Math.random()*2)+'rem';
  bp.appendChild(el);
}

// ===== AUDIO (WEB AUDIO API) =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getACtx(){ if(!actx) actx = new AudioCtx(); return actx; }

function playDing(){
  const ctx = getACtx(); const o = ctx.createOscillator(), g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'sine'; o.frequency.setValueAtTime(880, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime+0.1);
  g.gain.setValueAtTime(0.5, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.5);
  o.start(); o.stop(ctx.currentTime+0.5);
}
function playBuzz(){
  const ctx = getACtx();
  [300,200].forEach((freq,i)=>{
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sawtooth'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.2, ctx.currentTime+i*0.15); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+i*0.15+0.15);
    o.start(ctx.currentTime+i*0.15); o.stop(ctx.currentTime+i*0.15+0.15);
  });
}

// ===== CONFETTI =====
function spawnConfetti(x,y){
  const colors=['#FF6B9D','#FDCB6E','#00C9A7','#8854C0','#4ECDC4','#FF9F43','#00D26A'];
  for(let i=0;i<40;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.left=(x-50+Math.random()*100)+'px'; el.style.top=(y-50+Math.random()*50)+'px';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.width=(8+Math.random()*8)+'px'; el.style.height=(8+Math.random()*8)+'px';
    el.style.borderRadius=Math.random()>0.5?'50%':'3px';
    el.style.animationDuration=(1+Math.random()*1.5)+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(), 2500);
  }
}

// ===== DATA =====
const quizData = [
  {
    num: 1,
    question: 'Choose the word whose underlined part differs from the other three in pronunciation:<br><br>A. m<u>u</u>ch<br>B. teach<u>er</u><br>C. b<u>ea</u>ch<br>D. broch<u>ure</u><br><i>(Note: Assume the underlined sound is the consonant sound /tʃ/ vs /ʃ/)</i>',
    options: [
      { text: 'much', correct: false },
      { text: 'teacher', correct: false },
      { text: 'beach', correct: false },
      { text: 'brochure', correct: true }
    ],
    explanation: `
      <div class="trans-box">Chọn từ có phần phụ âm gạch chân (ch) phát âm khác với các từ còn lại.</div>
      <div class="expl-row">💡 <strong>Phân tích phát âm:</strong></div>
      <div class="expl-row"><span class="hl-red">A. much</span> <span class="p-phonetic">/mʌtʃ/</span>: <span class="p-mean">nhiều</span>. (Âm /tʃ/ - chờ)</div>
      <div class="expl-row"><span class="hl-red">B. teacher</span> <span class="p-phonetic">/ˈtiːtʃər/</span>: <span class="p-mean">giáo viên</span>. (Âm /tʃ/)</div>
      <div class="expl-row"><span class="hl-red">C. beach</span> <span class="p-phonetic">/biːtʃ/</span>: <span class="p-mean">bãi biển</span>. (Âm /tʃ/)</div>
      <div class="expl-row"><span class="hl-green">D. brochure</span> <span class="p-phonetic">/ˈbrəʊʃər/</span>: <span class="p-mean">tờ rơi quảng cáo</span>. (Âm /ʃ/ - sờ nặng)</div>
      <div class="expl-row">✅ <strong>Tại sao chọn D?</strong> Từ <em>brochure</em> có nguồn gốc tiếng Pháp nên "ch" được phát âm là /ʃ/, trong khi các từ còn lại phát âm là /tʃ/.</div>
    `
  },
  {
    num: 2,
    question: 'Choose the word whose underlined part differs from the other three in pronunciation:<br><br>A. c<u>o</u>nference<br>B. c<u>o</u>mputer<br>C. c<u>o</u>nnection<br>D. c<u>o</u>mmunicate',
    options: [
      { text: 'conference', correct: true },
      { text: 'computer', correct: false },
      { text: 'connection', correct: false },
      { text: 'communicate', correct: false }
    ],
    explanation: `
      <div class="trans-box">Chọn từ có chữ "o" phát âm khác với các từ còn lại.</div>
      <div class="expl-row">💡 <strong>Phân tích phát âm:</strong></div>
      <div class="expl-row"><span class="hl-green">A. conference</span> <span class="p-phonetic">/ˈkɒnfərəns/</span>: <span class="p-mean">hội nghị</span>. (Âm /ɒ/ - o ngắn)</div>
      <div class="expl-row"><span class="hl-red">B. computer</span> <span class="p-phonetic">/kəmˈpjuːtər/</span>: <span class="p-mean">máy tính</span>. (Âm /ə/ - ơ ngắn)</div>
      <div class="expl-row"><span class="hl-red">C. connection</span> <span class="p-phonetic">/kəˈnekʃn/</span>: <span class="p-mean">sự kết nối</span>. (Âm /ə/)</div>
      <div class="expl-row"><span class="hl-red">D. communicate</span> <span class="p-phonetic">/kəˈmjuːnɪkeɪt/</span>: <span class="p-mean">giao tiếp</span>. (Âm /ə/)</div>
      <div class="expl-row">✅ <strong>Tại sao chọn A?</strong> Trong đáp án A, trọng âm rơi vào âm tiết đầu tiên nên chữ "o" phát âm rõ là /ɒ/. Các từ còn lại trọng âm rơi vào âm tiết thứ 2, nên chữ "o" ở đầu bị yếu đi và đọc thành âm schwa /ə/.</div>
    `
  },
  {
    num: 4,
    question: 'Choose the word that differs from the other three in the position of primary stress:<br><br>A. Portuguese<br>B. Chinese<br>C. Vietnamese<br>D. Japanese',
    options: [
      { text: 'Portuguese', correct: false },
      { text: 'Chinese', correct: true },
      { text: 'Vietnamese', correct: false },
      { text: 'Japanese', correct: false }
    ],
    explanation: `

      <div class="expl-row">✅ <strong>Tại sao chọn A?</strong> Câu A dùng đúng giới từ "with" sau communicate, "by" chỉ phương thức, và "in" chỉ năm.</div>
    `
  },
  {
    num: 17,
    question: 'Make a correct sentence from the given cues:<br><br>He / ask / how / robots / help / humans / future.',
    options: [
      { text: 'He asked how robots will help humans in the future.', correct: false },

      <div class="expl-row">2. <span class="p-grammar">Cấu trúc: Từ để hỏi + S + V</span> (Không đảo ngữ trợ động từ lên trước chủ ngữ). -> Loại D (đảo would lên trước robots).</div>
      <div class="expl-row">✅ <strong>Tại sao chọn C?</strong> Câu C giữ đúng trật tự "how + robots + would help" và đã lùi thì đúng quy tắc câu gián tiếp.</div>
    `
  },
  {
    num: 18,
    question: 'What does the sign say?<br><br><div class="sign-board sign-wifi">FREE<br>WIFI</div>',
    options: [
      { text: 'Wi-Fi is available but not free.', correct: false },
      { text: 'You must pay to use the Wi-Fi here.', correct: false },

    ],
    explanation: `
      <div class="trans-box">Dịch biển báo: WIFI MIỄN PHÍ. Hỏi biển báo này có nghĩa là gì?</div>

      <div class="expl-row"><span class="hl-red">A. Wi-Fi có sẵn nhưng không miễn phí.</span> -> Sai.</div>
      <div class="expl-row"><span class="hl-red">B. Bạn phải trả tiền để dùng Wi-Fi.</span> -> Sai.</div>
      <div class="expl-row"><span class="hl-green">C. Bạn có thể truy cập Wi-Fi ở đây mà không tốn phí (without any charge).</span> -> Đúng! "Without any charge" = "Free".</div>
      <div class="expl-row"><span class="hl-red">D. Chỉ hội viên mới được dùng.</span> -> Biển báo không nhắc đến điều kiện này.</div>
      <div class="expl-row">✅ <strong>Tại sao chọn C?</strong> <span class="p-word">Free</span> đồng nghĩa với cụm <span class="p-grammar">without any charge</span> (không mất phí).</div>

      <div class="expl-row"><span class="hl-red">C. Chỉ cần tắt điện thoại.</span> -> Sai vì biển báo ghi "all electronic devices" (tất cả thiết bị điện tử).</div>

      <div class="expl-row">✅ <strong>Tại sao chọn B?</strong> Nó là câu diễn giải chính xác và bao quát nhất nội dung của biển báo trên máy bay này.</div>

// ===== SHUFFLE =====
function shuffleArray(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== RENDER QUIZ =====
let totalQ = quizData.length;
let answered = 0;
let correctCount = 0;

function updateScore() {
  document.getElementById('scoreDisplay').textContent = correctCount + ' / ' + answered;
  const pct = answered > 0 ? (answered / totalQ * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  quizData.forEach((data, idx) => {
    // Shuffle options while keeping track of correctness
    const shuffledOpts = shuffleArray(data.options);
    
    const card = document.createElement('div');
    card.className = 'q-card';
    
    let optHTML = shuffledOpts.map((o, i) => `
      <button class="opt-btn" data-correct="${o.correct}" onclick="checkMCQ(this, event, ${idx})">
        ${o.text}
      </button>
    `).join('');

    card.innerHTML = `
      <div class="q-num">Câu ${data.num}</div>
      <div class="q-text">${data.question}</div>
      <div class="options">${optHTML}</div>
      <div class="explanation" id="expl_${idx}">
        <div class="expl-title">💡 Giải thích chi tiết</div>
        ${data.explanation}
      </div>
    `;
    container.appendChild(card);
  });
}

// ===== INTERACTION LOGIC =====
function checkMCQ(btn, evt, idx) {
  const card = btn.closest('.q-card');
  const allBtns = card.querySelectorAll('.opt-btn');
  if(allBtns[0].disabled) return; // Prevent double clicking
  
  allBtns.forEach(b => b.disabled = true);
  
  const isCorrect = btn.dataset.correct === 'true';
  if (isCorrect) {
    btn.classList.add('correct');
    playDing();
    correctCount++;
    spawnConfetti(evt.clientX, evt.clientY);
  } else {
    btn.classList.add('wrong');
    playBuzz();
    // Highlight correct answer
    allBtns.forEach(b => {
      if (b.dataset.correct === 'true') {
        b.classList.add('correct');
        b.style.opacity = '0.7'; // slightly dim to show user didn't pick it
      }
    });
  }
  
  answered++;
  updateScore();
  
  // Show explanation automatically
  const expl = document.getElementById('expl_' + idx);
  expl.classList.add('show');
}

// ===== MODAL & RESULTS =====
function showNameModal() {
  if (answered < totalQ) {
    if(!confirm('Bạn chưa làm xong tất cả các câu. Bạn có chắc chắn muốn nộp bài?')) return;
  }
  document.getElementById('nameModal').classList.add('show');
}

function submitName() {
  const name = document.getElementById('nameInput').value.trim();
  if(!name) {
    const err = document.getElementById('nameErr');
    const inp = document.getElementById('nameInput');
    inp.classList.remove('error'); void inp.offsetWidth; inp.classList.add('error');
    err.style.display = 'block'; setTimeout(() => inp.classList.remove('error'), 500);
    return;
  }
  
  document.getElementById('nameModal').classList.remove('show');
  
  // Setup Result Modal
  const pct = totalQ > 0 ? (correctCount / totalQ) : 0;
  let title, msg, gifUrl;
  
  if (pct === 1) {
    title = `🌟 THIÊN TÀI! ${name} xuất sắc!`;
    msg = "Điểm tuyệt đối! Bạn đích thực là cao thủ Tiếng Anh! 👑";
    gifUrl = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif"; // Minions cheering
  } else if (pct >= 0.8) {
    title = `🎉 GIỎI QUÁ ${name} ơi!`;
    msg = "Thành tích rất ấn tượng! Cố thêm chút nữa là hoàn hảo! ✨";
    gifUrl = "https://media.giphy.com/media/nXXU1DVGVAD60/giphy.gif"; // Leonardo DiCaprio clapping
  } else if (pct >= 0.5) {
    title = `💪 KHÁ LẮM ${name}!`;
    msg = "Bạn đã qua môn! Hãy xem kỹ phần giải thích để rút kinh nghiệm nhé! 💡";
    gifUrl = "https://media.giphy.com/media/1xVbZRmHjFMWy9x8Xq/giphy.gif"; // Minion thumbs up
  } else {
    title = `📚 CẦN CỐ GẮNG HƠN ${name} nhé!`;
    msg = "Đừng nản chí! Học kỹ lỗi sai từ phần giải thích là sẽ tiến bộ ngay! 🌈";
    gifUrl = "https://media.giphy.com/media/qQdL532nCG9ko/giphy.gif"; // Crying face / funny sad
  }
  
  document.getElementById('resTitle').textContent = title;
  document.getElementById('resScore').textContent = `${correctCount} / ${totalQ}`;
  document.getElementById('resMsg').textContent = msg;
  document.getElementById('resGif').src = gifUrl;
  
  document.getElementById('resultModal').classList.add('show');
  
  // Grand Finale Confetti
  if(pct >= 0.5) {
    let shots = 0;
    let burst = setInterval(() => {
      spawnConfetti(Math.random() * window.innerWidth, window.innerHeight / 3);
      shots++;
      if(shots > 6) clearInterval(burst);
    }, 400);
  }
}

// Name input enter key support
document.getElementById('nameInput').addEventListener('keydown', e => { if(e.key==='Enter') submitName(); });

// Initialize
buildQuiz();
</script>
