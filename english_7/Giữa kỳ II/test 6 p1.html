<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Quiz - Ms Mai An ULIS</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #e040fb;
  --yellow: #FDCB6E;
  --teal: #00C9A7;
  --purple: #8854C0;
  --green: #00D26A;
  --red: #FF4757;
  --bg1: #f8a5c2;
  --bg2: #a29bfe;
  --bg3: #55efc4;
  --bg4: #fdcb6e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  background: linear-gradient(135deg, #f8a5c2, #a29bfe, #55efc4, #fdcb6e, #fd79a8, #74b9ff);
  background-size: 400% 400%;
  animation: gradientShift 8s ease infinite;
  position: relative;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.bg-pattern {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.bg-pattern svg {
  width: 100%; height: 100%;
  opacity: 0.18;
}

.floating-icon {
  position: absolute;
  animation: floatAround linear infinite;
  font-size: 1.6rem;
  user-select: none;
}

@keyframes floatAround {
  0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
  50% { transform: translateY(-30px) rotate(180deg); opacity: 1; }
  100% { transform: translateY(0) rotate(360deg); opacity: 0.7; }
}

.container {
  position: relative;
  z-index: 1;
  max-width: 860px;
  margin: 0 auto;
  padding: 16px;
}

header {
  text-align: center;
  background: rgba(255,255,255,0.92);
  border-radius: 20px;
  padding: 14px 20px;
  margin-bottom: 18px;
  box-shadow: 0 8px 32px rgba(136,84,192,0.18);
  backdrop-filter: blur(8px);
}

header h1 {
  font-size: 1.4rem;
  font-weight: 900;
  background: linear-gradient(90deg, #8854C0, #e040fb, #00C9A7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
}

header p {
  font-size: 0.82rem;
  color: #888;
  margin-top: 2px;
}

.score-bar {
  background: rgba(255,255,255,0.88);
  border-radius: 16px;
  padding: 10px 18px;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.10);
  font-size: 1rem;
  font-weight: 700;
}

.score-bar .score-val {
  color: #8854C0;
  font-size: 1.1rem;
}

.progress-wrap {
  flex: 1;
  background: #e0e0e0;
  border-radius: 99px;
  height: 12px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #8854C0, #00C9A7);
  border-radius: 99px;
  transition: width 0.5s;
}

.question-card {
  background: rgba(255,255,255,0.96);
  border-radius: 22px;
  padding: 22px 24px;
  margin-bottom: 20px;
  box-shadow: 0 8px 32px rgba(136,84,192,0.13);
  animation: fadeIn 0.5s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

.q-number {
  display: inline-block;
  background: linear-gradient(135deg, #8854C0, #e040fb);
  color: #fff;
  font-weight: 900;
  font-size: 0.85rem;
  border-radius: 10px;
  padding: 3px 12px;
  margin-bottom: 8px;
}

.q-text {
  font-size: 1.15rem;
  font-weight: 700;
  color: #333;
  margin-bottom: 14px;
  line-height: 1.6;
}

.q-instruction {
  font-size: 0.88rem;
  color: #8854C0;
  font-weight: 600;
  margin-bottom: 10px;
  font-style: italic;
}

.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

@media (max-width: 540px) {
  .options-grid { grid-template-columns: 1fr; }
}

.option-btn {
  background: linear-gradient(135deg, #f3e7ff, #e8f8f5);
  border: 2.5px solid #d0b3f0;
  border-radius: 16px;
  padding: 12px 16px;
  font-size: 1.08rem;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  color: #333;
  cursor: pointer;
  text-align: left;
  box-shadow: 0 4px 12px rgba(136,84,192,0.10), 0 2px 0 #c9a6e8;
  transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
  position: relative;
  overflow: hidden;
}

.option-btn:hover:not(:disabled) {
  transform: scale(1.04);
  box-shadow: 0 8px 24px rgba(136,84,192,0.18), 0 3px 0 #b388e8;
  background: linear-gradient(135deg, #e8d5ff, #d5f5ef);
}

.option-btn.correct {
  background: linear-gradient(135deg, #00D26A, #00f08a) !important;
  border-color: #00D26A !important;
  color: #fff !important;
  box-shadow: 0 4px 18px rgba(0,210,106,0.30), 0 3px 0 #00a854 !important;
}

.option-btn.wrong {
  background: linear-gradient(135deg, #FF4757, #ff6b6b) !important;
  border-color: #FF4757 !important;
  color: #fff !important;
  box-shadow: 0 4px 18px rgba(255,71,87,0.25), 0 3px 0 #cc2233 !important;
  animation: shake 0.5s;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

.option-btn:disabled { cursor: default; }

.explanation-box {
  display: none;
  background: linear-gradient(135deg, #fffbe7, #e8f8f5);
  border-left: 5px solid #8854C0;
  border-radius: 14px;
  padding: 14px 16px;
  margin-top: 12px;
  font-size: 1rem;
  color: #333;
  line-height: 1.75;
  animation: fadeIn 0.4s;
}

.explanation-box.show { display: block; }

.explanation-box .exp-title {
  font-weight: 900;
  color: #8854C0;
  font-size: 1rem;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.exp-answer {
  font-weight: 800;
  color: #00D26A;
  font-size: 1.05rem;
  margin-bottom: 8px;
}

/* Sign visual Q29 */
.sign-visual {
  display: flex;
  justify-content: center;
  margin-bottom: 14px;
}

.road-sign {
  background: white;
  border: 5px solid #222;
  border-radius: 14px;
  width: 120px;
  height: 130px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  position: relative;
}

.road-sign .arrow-right {
  font-size: 3rem;
  color: #111;
  line-height: 1;
}

.road-sign .only-text {
  font-size: 1.1rem;
  font-weight: 900;
  color: #111;
  letter-spacing: 2px;
  border-top: 3px solid #111;
  padding-top: 4px;
  width: 90%;
  text-align: center;
}

/* Phone visual Q30 */
.phone-visual {
  display: flex;
  justify-content: center;
  margin-bottom: 14px;
}

.phone-frame {
  background: #1a1a2e;
  border-radius: 22px;
  padding: 12px 10px 14px;
  width: 200px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  position: relative;
}

.phone-notch {
  width: 60px;
  height: 8px;
  background: #333;
  border-radius: 4px;
  margin: 0 auto 10px;
}

.phone-message {
  background: #e8e8e8;
  border-radius: 14px 14px 14px 4px;
  padding: 10px 12px;
  font-size: 0.78rem;
  color: #222;
  line-height: 1.55;
  font-family: 'Nunito', sans-serif;
}

.phone-home {
  width: 40px;
  height: 5px;
  background: #444;
  border-radius: 3px;
  margin: 10px auto 0;
}

/* Submit btn */
.submit-section {
  text-align: center;
  margin: 24px 0 40px;
}

.submit-btn {
  background: linear-gradient(135deg, #8854C0, #e040fb);
  color: white;
  border: none;
  border-radius: 18px;
  padding: 16px 48px;
  font-size: 1.15rem;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 6px 0 #5b2e8a, 0 10px 30px rgba(136,84,192,0.30);
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 1px;
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 0 #5b2e8a, 0 14px 36px rgba(136,84,192,0.35);
}

.submit-btn:active {
  transform: translateY(3px);
  box-shadow: 0 3px 0 #5b2e8a;
}

/* Popup */
.popup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.popup-overlay.show { display: flex; }

.popup-box {
  background: white;
  border-radius: 28px;
  padding: 36px 32px 28px;
  max-width: 420px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  animation: popIn 0.4s cubic-bezier(.17,.67,.35,1.3);
  position: relative;
}

@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.popup-emoji { font-size: 4rem; margin-bottom: 10px; }
.popup-score { font-size: 2.2rem; font-weight: 900; color: #8854C0; margin-bottom: 8px; }
.popup-msg { font-size: 1.1rem; color: #555; margin-bottom: 20px; font-weight: 600; }

.popup-close {
  background: linear-gradient(135deg, #8854C0, #00C9A7);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 12px 36px;
  font-size: 1rem;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 0 #5b2e8a;
}

/* Confetti */
.confetti-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}

.confetti-piece {
  position: absolute;
  width: 10px;
  height: 10px;
  top: -20px;
  border-radius: 2px;
  animation: confettiFall 1.2s ease-in forwards;
}

@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

u { text-decoration-color: #e040fb; text-decoration-thickness: 2px; }

.options-single { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
</style>

<body>

<!-- Animated background pattern -->
<div class="bg-pattern">
  <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <defs>
      <pattern id="fun-pattern" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
        <!-- Star -->
        <text x="10" y="30" font-size="22">⭐</text>

<div class="container">

<script>
// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playCorrect() {
  try {
    const ctx = getAudioCtx();
    const notes = [523.25, 659.25, 783.99];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t = ctx.currentTime + i * 0.13;
      gain.gain.setValueAtTime(0.28, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.35);
    });
  } catch(e) {}
}

function playWrong() {
  try {
    const ctx = getAudioCtx();
    [[220, 0], [180, 0.18], [200, 0.36]].forEach(([freq, delay]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sawtooth';
      const t = ctx.currentTime + delay;
      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      osc.start(t); osc.stop(t + 0.25);
    });
  } catch(e) {}
}

// ===== CONFETTI =====
function spawnConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#8854C0','#FDCB6E','#00C9A7','#e040fb','#FF4757','#55efc4','#fdcb6e'];
  for (let i = 0; i < 36; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (8 + Math.random() * 10) + 'px';
    el.style.height = (8 + Math.random() * 10) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (0.9 + Math.random() * 0.7) + 's';
    el.style.animationDelay = Math.random() * 0.4 + 's';
    container.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

// ===== QUIZ DATA =====
const questions = [
  {
    id: 1,
    type: 'mcq',
    instruction: 'Mark the letter A, B, C or D to indicate the word whose underlined part differs from the other three in pronunciation.',
    text: 'Question 1. Chọn từ có phần gạch chân được phát âm khác:',
    options: [
      { label: 'A', text: '<u>ch</u>urch', correct: true },
      { label: 'B', text: '<u>Ch</u>ristmas', correct: false },
      { label: 'C', text: '<u>ch</u>aos', correct: false },
      { label: 'D', text: '<u>ch</u>ord', correct: false }
    ],
    explanation: `<div class="exp-answer">✅ Đáp án đúng: A. church</div>
<strong>1. Phân tích phát âm âm "ch" trong mỗi đáp án:</strong><br>
• A. <b>ch</b>urch → phát âm là /tʃ/ (âm "ch" như trong tiếng Anh thông thường) ← <b>KHÁC</b><br>
• B. <b>Ch</b>ristmas → phát âm là /k/ (Christmas = /ˈkrɪsməs/) → âm /k/<br>
• C. <b>ch</b>aos → phát âm là /k/ (chaos = /ˈkeɪɒs/) → âm /k/<br>
• D. <b>ch</b>ord → phát âm là /k/ (chord = /kɔːrd/) → âm /k/<br><br>
<strong>2. Lý do chọn A:</strong><br>
Trong khi B, C, D đều có "ch" phát âm là /k/ (âm nguyên âm gốc Hy Lạp/Latin), thì A. "church" có "ch" phát âm là /tʃ/ — âm đặc trưng của tiếng Anh thông dụng.<br><br>
<strong>🇻🇳 Dịch nghĩa:</strong> church = nhà thờ | Christmas = Lễ Giáng Sinh | chaos = sự hỗn loạn | chord = hợp âm (âm nhạc)`
  },
  {
    id: 2,
    type: 'mcq',
    instruction: 'Mark the letter A, B, C or D to indicate the word whose underlined part differs from the other three in pronunciation.',
    text: 'Question 2. Chọn từ có phần gạch chân được phát âm khác:',
    options: [
      { label: 'A', text: 'al<u>o</u>ne', correct: false },
      { label: 'B', text: 'ph<u>o</u>ne', correct: false },
      { label: 'C', text: 't<u>o</u>ld', correct: false },
      { label: 'D', text: 'am<u>o</u>ng', correct: true }
    ],
    explanation: `<div class="exp-answer">✅ Đáp án đúng: D. among</div>
<strong>1. Phân tích phát âm chữ "o" trong mỗi đáp án:</strong><br>
• A. al<u>o</u>ne → /əˈloʊn/ → âm "o" đọc là /oʊ/ (âm ô dài)<br>
• B. ph<u>o</u>ne → /foʊn/ → âm "o" đọc là /oʊ/ (âm ô dài)<br>
• C. t<u>o</u>ld → /toʊld/ → âm "o" đọc là /oʊ/ (âm ô dài)<br>
• D. am<u>o</u>ng → /əˈmʌŋ/ → âm "o" đọc là /ʌ/ (âm ă ngắn) ← <b>KHÁC</b><br><br>
<strong>2. Lý do chọn D:</strong><br>
Trong khi A, B, C đều có "o" phát âm là /oʊ/ (dài), thì D. "among" có "o" phát âm là /ʌ/ (ngắn, giống âm "ă").<br><br>
<strong>🇻🇳 Dịch nghĩa:</strong> alone = một mình | phone = điện thoại | told = đã nói (quá khứ của "tell") | among = trong số, ở giữa`
  },
  {
    id: 3,
    type: 'mcq',
    instruction: 'Mark the letter A, B, C or D to indicate the word that differs from the other three in the position of primary stress.',
    text: 'Question 3. Chọn từ có trọng âm chính khác với ba từ còn lại:',
    options: [
      { label: 'A', text: 'describe', correct: true },
      { label: 'B', text: 'violence', correct: false },
      { label: 'C', text: 'skyscraper', correct: false },
      { label: 'D', text: 'homeless', correct: false }
    ],
    explanation: `<div class="exp-answer">✅ Đáp án đúng: A. describe</div>
<strong>1. Phân tích vị trí trọng âm:</strong><br>
• A. de<b>SCRIBE</b> → /dɪˈskraɪb/ → trọng âm âm tiết thứ <b>2</b> ← KHÁC<br>
• B. <b>VI</b>o·lence → /ˈvaɪələns/ → trọng âm âm tiết thứ <b>1</b><br>
• C. <b>SKY</b>·scra·per → /ˈskaɪˌskreɪpər/ → trọng âm âm tiết thứ <b>1</b><br>
• D. <b>HOME</b>·less → /ˈhoʊmləs/ → trọng âm âm tiết thứ <b>1</b><br><br>
<strong>2. Lý do chọn A:</strong><br>
B, C, D đều có trọng âm rơi vào âm tiết đầu tiên. Riêng A. "describe" là động từ 2 âm tiết, trọng âm rơi vào âm tiết thứ 2.<br><br>
<strong>🇻🇳 Dịch nghĩa:</strong> describe = mô tả | violence = bạo lực | skyscraper = nhà chọc trời | homeless = vô gia cư`
  },
  {
    id: 4,
    type: 'mcq',
    instruction: 'Mark the letter A, B, C or D to indicate the word that differs from the other three in the position of primary stress.',
    text: 'Question 4. Chọn từ có trọng âm chính khác với ba từ còn lại:',
    options: [
      { label: 'A', text: 'better', correct: false },
      { label: 'B', text: 'active', correct: false },
      { label: 'C', text: 'invest', correct: true },
      { label: 'D', text: 'easy', correct: false }
    ],
    explanation: `<div class="exp-answer">✅ Đáp án đúng: C. invest</div>

// ===== STATE =====
let answered = {};
let correctCount = 0;

// ===== RENDER =====
function renderQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + q.id;

    let html = `<div class="q-number">Câu ${q.id}</div>`;
    html += `<div class="q-instruction">${q.instruction}</div>`;

    // Special visuals
    if (q.type === 'sign') {
      html += `<div class="sign-visual">
        <div class="road-sign">
          <div class="arrow-right">↱</div>
          <div class="only-text">ONLY</div>
        </div>
      </div>`;
    }
    if (q.type === 'phone') {
      const lines = q.phoneMsg.replace(/\n/g, '<br>');
      html += `<div class="phone-visual">
        <div class="phone-frame">
          <div class="phone-notch"></div>
          <div class="phone-message">${lines}</div>
          <div class="phone-home"></div>
        </div>
      </div>`;
    }

    html += `<div class="q-text">${q.text}</div>`;

    // Shuffle options
    let opts = q.options.filter(o => !o.hidden);
    opts = shuffleArray([...opts]);

    html += `<div class="options-grid" id="opts-${q.id}">`;
    opts.forEach((opt, oi) => {
      html += `<button class="option-btn" id="opt-${q.id}-${oi}" onclick="selectAnswer(${q.id}, ${oi}, this, ${opt.correct})">${opt.label}. ${opt.text}</button>`;
    });
    html += `</div>`;

    html += `<div class="explanation-box" id="exp-${q.id}">
      <div class="exp-title">📚 Giải thích chi tiết</div>
      ${q.explanation}
    </div>`;

    card.innerHTML = html;
    container.appendChild(card);
  });
  updateScoreBar();
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function selectAnswer(qId, optIdx, btn, isCorrect) {
  if (answered[qId]) return;
  answered[qId] = true;

  const optContainer = document.getElementById('opts-' + qId);
  const allBtns = optContainer.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  if (isCorrect) {
    btn.classList.add('correct');
    correctCount++;
    playCorrect();
    spawnConfetti();
  } else {
    btn.classList.add('wrong');
    // Show correct
    allBtns.forEach(b => {
      if (b.id !== btn.id) {
        // check if this button corresponds to correct option by checking onclick
        const onclickStr = b.getAttribute('onclick');
        if (onclickStr && onclickStr.includes(', true)')) {
          b.classList.add('correct');
        }
      }
    });
    playWrong();
  }

  // Show explanation
  const expBox = document.getElementById('exp-' + qId);
  expBox.classList.add('show');
  updateScoreBar();
}

function updateScoreBar() {
  const total = questions.length;
  const answeredCount = Object.keys(answered).length;
  document.getElementById('scoreDisplay').textContent = correctCount + ' / ' + answeredCount;
  document.getElementById('answeredCount').textContent = answeredCount + '/' + total;
  const pct = (answeredCount / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function submitQuiz() {
  const total = questions.length;
  const answeredCount = Object.keys(answered).length;
  const pct = Math.round((correctCount / total) * 100);

  const msgs = [
    [90, '🏆 Xuất sắc! Bạn thật giỏi!', '🌟'],
    [70, '😊 Tốt lắm! Tiếp tục cố gắng nhé!', '🎉'],
    [50, '💪 Khá ổn! Ôn lại những câu sai nhé!', '📚'],
    [0, '🤔 Cố gắng hơn lần sau nhé! Bạn làm được!', '💡']
  ];

  let emoji = '📚', msg = 'Cố gắng hơn nhé!';
  for (let [threshold, m, e] of msgs) {
    if (pct >= threshold) { msg = m; emoji = e; break; }
  }

  document.getElementById('popupEmoji').textContent = emoji;
  document.getElementById('popupScore').textContent = `${correctCount} / ${total} câu đúng (${pct}%)`;
  document.getElementById('popupMsg').textContent = msg;
  document.getElementById('resultPopup').classList.add('show');

  if (pct >= 70) spawnConfetti();
}

renderQuiz();
</script>
