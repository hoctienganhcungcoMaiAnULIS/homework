<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Practice - Giáo viên tạo: Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #00C9A7;
            --correct: #00D26A;
            --wrong: #FF4757;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #2d3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            /* Dynamic Theme & 3D Perspective */
            background-color: var(--primary);
            background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10%25' y='20%25' font-size='60' opacity='0.2'%3E✈️%3C/text%3E%3Ctext x='85%25' y='15%25' font-size='70' opacity='0.25'%3E🏥%3C/text%3E%3Ctext x='15%25' y='85%25' font-size='55' opacity='0.2'%3E🎭%3C/text%3E%3Ctext x='80%25' y='85%25' font-size='65' opacity='0.25'%3E🔧%3C/text%3E%3Ctext x='50%25' y='50%25' font-size='80' opacity='0.15'%3E📝%3C/text%3E%3Ctext x='30%25' y='40%25' font-size='50' opacity='0.2'%3E🦷%3C/text%3E%3Ctext x='70%25' y='60%25' font-size='60' opacity='0.2'%3E🗺️%3C/text%3E%3C/svg%3E"), 
                              radial-gradient(circle at top left, #8854C0, #00C9A7, #5f2c82);
            background-attachment: fixed;
            background-size: cover;
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            perspective: 1200px; /* Tạo chiều sâu không gian 3D */
        }

        h1, h2, h3 {
            font-family: 'Quicksand', sans-serif;
        }

        .header-title {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .subtitle {
            text-align: center;
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            display: inline-block;
            z-index: 10;
        }

        /* Glassmorphism Container with 3D Floating */
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 900px;
            padding: 30px;
            margin-bottom: 30px;
            
            /* Thêm Animation bồng bềnh 3D */
            transform-style: preserve-3d;
            animation: floatContainer 8s ease-in-out infinite;
        }

        @keyframes floatContainer {
            0%, 100% { 
                transform: translateY(0) rotateX(0deg); 
                box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); 
            }
            50% { 
                transform: translateY(-15px) rotateX(1deg); 
                box-shadow: 0 35px 60px rgba(0, 0, 0, 0.15); 
            }
        }

        /* Audio Player Customization */
        .audio-wrapper {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        
        audio {
            width: 100%;
            outline: none;
        }

        /* Question Cards with Independent 3D Floating */
        .question-card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid transparent;
            
            /* Animation 3D cho từng thẻ */
            transform-style: preserve-3d;
            animation: floatCard 6s ease-in-out infinite;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border 0.3s ease;
        }

        /* Tạo độ trễ ngẫu nhiên để các thẻ bay so le lượn sóng */
        .question-card:nth-child(odd) { animation-delay: 0s; }
        .question-card:nth-child(even) { animation-delay: 1.5s; }
        .question-card:nth-child(3n) { animation-delay: 3s; }

        @keyframes floatCard {
            0%, 100% { 
                transform: translateY(0) rotateY(0deg) rotateX(0deg); 
                box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            }
            50% { 
                transform: translateY(-8px) rotateY(1deg) rotateX(0.5deg); 
                box-shadow: 0 18px 30px rgba(0, 0, 0, 0.08);
            }
        }

        /* Ghi đè hiệu ứng Hover để mượt hơn khi đang có animation lơ lửng */
        .question-card:hover {
            animation-play-state: paused; 
            transform: translateY(-12px) scale(1.02) rotateX(0deg) rotateY(0deg) !important;
            box-shadow: 0 25px 40px rgba(136, 84, 192, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.9);
            z-index: 5;
        }

        .question-title {
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 15px;
            border-bottom: 2px dashed var(--secondary);
            padding-bottom: 10px;
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: #fff;
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 15px 10px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            box-shadow: 0 6px 0 #d1d8e0;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 9px 0 #d1d8e0;
            border-color: var(--secondary);
            color: var(--primary);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #d1d8e0;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Correct/Wrong States */
        .option-btn.correct {
            background-color: var(--correct);
            color: white;
            box-shadow: 0 6px 0 #00a854;
            border-color: #00a854;
        }

        .option-btn.wrong {
            background-color: var(--wrong);
            color: white;
            box-shadow: 0 6px 0 #d63031;
            border-color: #d63031;
        }

        /* Shake Animation for Wrong Answer */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px) rotate(-2deg); }
            40%, 80% { transform: translateX(8px) rotate(2deg); }
        }
        .shake {
            animation: shake 0.5s ease-in-out;
        }

        /* Explanation Box */
        .explanation-box {
            display: none;
            background: #f8f9fa;
            border-left: 6px solid var(--secondary);
            border-radius: 0 15px 15px 0;
            padding: 20px;
            margin-top: 20px;
            font-size: 1rem;
            line-height: 1.6;
            animation: fadeIn 0.5s ease-in-out;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .explanation-step {
            margin-bottom: 12px;
        }
        .step-title {
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: inline-block;
            background: rgba(136, 84, 192, 0.1);
            padding: 3px 8px;
            border-radius: 5px;
        }

        .keyword {
            color: #d63031;
            font-weight: bold;
            background: rgba(214, 48, 49, 0.1);
            padding: 0 4px;
            border-radius: 3px;
        }

        /* Submit Button */
        .submit-wrapper {
            text-align: center;
            margin-top: 20px;
        }

        #submit-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.5rem;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 192, 169, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #submit-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 35px rgba(0, 192, 169, 0.6);
        }

        /* Modal Overlay */
        #result-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-score {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
            margin: 15px 0;
            font-family: 'Quicksand', sans-serif;
        }

        .modal-gif {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .close-btn {
            background: var(--text-dark);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background: #000;
        }

        /* Confetti Container */
        #confetti-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 20px;
            background: #f00;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <h1 class="header-title">Listening Practice</h1>
    <div class="subtitle">Giáo viên tạo: Ms Mai An ULIS</div>

    <div class="glass-container">
        <div class="audio-wrapper">
            <audio controls>
                <source src="https://englishpracticetest.net/wp-content/uploads/2021/11/ket-practice-listening-test-01-part-5.mp3" type="audio/mpeg">
                Trình duyệt của bạn không hỗ trợ thẻ audio.
            </audio>
        </div>

        <div style="background: rgba(255,255,255,0.8); padding: 15px; border-radius: 15px; margin-bottom: 25px; text-align: center; font-weight: bold; color: var(--primary);">
            <p>You will hear Lucas talking to his mum about the jobs his friends want to do.</p>
            <p>What job does each friend want to do?</p>
            <p style="font-size: 0.9rem; color: #555; margin-top: 5px;">(Example: 0 - Lucas wants to be a Pilot)</p>
        </div>

        <div id="quiz-container"></div>

        <div class="submit-wrapper">
            <button id="submit-btn" onclick="submitQuiz()">NỘP BÀI</button>
        </div>
    </div>

    <div id="result-modal">
        <div class="modal-content">
            <h2 style="font-size: 2rem; color: #2d3436;">Kết Quả Của Bạn!</h2>
            <div class="modal-score" id="score-text">0/5</div>
            <img id="result-gif" class="modal-gif" src="" alt="Result Emotion">
            <p id="result-message" style="font-size: 1.2rem; margin-bottom: 20px;"></p>
            <button class="close-btn" onclick="closeModal()">Đóng & Xem Lại Lỗi Sai</button>
        </div>
    </div>

    <div id="confetti-container"></div>

    <script>
        // Data for Options to reuse
        const jobOptions = [
            { id: 'A', text: '🎭 Actor' },
            { id: 'B', text: '🏃 Coach' },
            { id: 'C', text: '🦷 Dentist' },
            { id: 'D', text: '📰 Journalist' },
            { id: 'E', text: '🔧 Mechanic' },
            { id: 'F', text: '✈️ Pilot' },
            { id: 'G', text: '🛎️ Receptionist' },
            { id: 'H', text: '🗺️ Tour guide' }
        ];

        // Quiz Data with Hyper-Detailed Explanations
        const quizData = [
            {
                qNum: 21,
                friend: "Tyler",
                correctId: 'C',
                explanation: `
                    <div class="explanation-step">
                        <span class="step-title">Bước 1: Dịch câu hỏi & Đáp án</span><br>
                        Tyler muốn làm nghề gì? (A. Diễn viên, B. Huấn luyện viên, C. Nha sĩ, D. Nhà báo, E. Thợ máy, F. Phi công, G. Lễ tân, H. Hướng dẫn viên)
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 2: Audio Script & Dịch nghĩa</span><br>
                        "He wants to work at the hospital. His mum’s a receptionist there, but <span class="keyword">he wants to take care of people’s teeth!</span>"<br>
                        <i>(Cậu ấy muốn làm việc ở bệnh viện. Mẹ cậu ấy là lễ tân ở đó, nhưng cậu ấy muốn chăm sóc răng cho mọi người!)</i>
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 3: Tại sao ĐÚNG?</span><br>
                        Hành động "take care of people's teeth" (chăm sóc răng) chính là định nghĩa chuẩn xác nhất của nghề <strong>Nha sĩ (Dentist - Đáp án C)</strong>.
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 4: Phân tích Bẫy (Distractors)</span><br>
                        Người nói có nhắc đến từ <strong>"receptionist" (Lễ tân - Đáp án G)</strong>, nhưng đây là cái bẫy vì đó là nghề của MẸ Tyler ("His mum's a receptionist"), không phải của Tyler. Ngoài ra, từ "hospital" dễ khiến người nghe nghĩ đến bác sĩ nói chung, nhưng vế sau đã chốt hạ là làm về "răng".
                    </div>
                `
            },
            {
                qNum: 22,
                friend: "Ava",
                correctId: 'H',
                explanation: `
                    <div class="explanation-step">
                        <span class="step-title">Bước 1: Dịch câu hỏi & Đáp án</span><br>
                        Ava muốn làm nghề gì?
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 2: Audio Script & Dịch nghĩa</span><br>
                        Mum: "Ava wants to be a sports coach, doesn’t she?"<br>
                        Lucas: "Not now, <span class="keyword">she wants to show tourists round different towns.</span>"<br>
                        <i>(Mẹ: Ava muốn làm huấn luyện viên thể thao phải không?<br>
                        Lucas: Bây giờ thì không ạ, bạn ấy muốn dẫn khách du lịch đi tham quan các thị trấn khác nhau.)</i>
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 3: Tại sao ĐÚNG?</span><br>
                        Hành động "show tourists round" (dẫn khách du lịch đi vòng quanh) chính là công việc của một <strong>Hướng dẫn viên du lịch (Tour guide - Đáp án H)</strong>.
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 4: Phân tích Bẫy (Distractors)</span><br>
                        Bẫy cực kỳ nguy hiểm nằm ở cụm từ <strong>"sports coach" (Huấn luyện viên - Đáp án B)</strong>. Người mẹ đã đoán đây là nghề Ava thích, nhưng Lucas ngay lập tức phủ định bằng cụm từ "Not now" (Bây giờ thì không). Học sinh nếu nghe không kỹ hoặc vội vàng chọn ngay khi nghe từ khóa đầu tiên sẽ bị mắc bẫy này.
                    </div>
                `
            },
            {
                qNum: 23,
                friend: "Mark",
                correctId: 'E',
                explanation: `
                    <div class="explanation-step">
                        <span class="step-title">Bước 1: Dịch câu hỏi & Đáp án</span><br>
                        Mark muốn làm nghề gì?
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 2: Audio Script & Dịch nghĩa</span><br>
                        "He’s always helping his dad <span class="keyword">repair cars</span>. Remember, his dad’s got a <span class="keyword">garage</span>? And that’s what he wants to do."<br>
                        <i>(Cậu ấy luôn giúp bố sửa xe hơi. Mẹ nhớ không, bố cậu ấy có một cái ga-ra ô tô? Và đó chính là điều cậu ấy muốn làm.)</i>
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 3: Tại sao ĐÚNG?</span><br>
                        Các từ khóa "repair cars" (sửa xe hơi) và "garage" (xưởng xe) ám chỉ trực tiếp đến công việc của <strong>Thợ máy (Mechanic - Đáp án E)</strong>. Câu chốt "that's what he wants to do" khẳng định chắc chắn nguyện vọng của Mark.
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 4: Phân tích Bẫy (Distractors)</span><br>
                        Câu này không có bẫy lừa rõ ràng chuyển hướng ý định như các câu khác, nhưng đòi hỏi học sinh phải có vốn từ vựng đồng nghĩa (Paraphrasing): Hiểu được "repair cars" = "mechanic".
                    </div>
                `
            },
            {
                qNum: 24,
                friend: "Victoria",
                correctId: 'D',
                explanation: `
                    <div class="explanation-step">
                        <span class="step-title">Bước 1: Dịch câu hỏi & Đáp án</span><br>
                        Victoria muốn làm nghề gì?
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 2: Audio Script & Dịch nghĩa</span><br>
                        "Yes, to <span class="keyword">write articles for a newspaper</span>. She wrote a good story about an actor for English last week."<br>
                        <i>(Vâng, là viết bài cho một tờ báo. Tuần trước bạn ấy đã viết một câu chuyện rất hay về một diễn viên cho môn Tiếng Anh.)</i>
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 3: Tại sao ĐÚNG?</span><br>
                        Cụm từ "write articles for a newspaper" (viết bài cho báo chí) mô tả chính xác nghề nghiệp của một <strong>Nhà báo (Journalist - Đáp án D)</strong>.
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 4: Phân tích Bẫy (Distractors)</span><br>
                        Audio có cố tình nhắc đến từ <strong>"actor" (Diễn viên - Đáp án A)</strong>. Tuy nhiên, nội dung câu là "wrote a story ABOUT an actor" (viết một câu chuyện VỀ một diễn viên) chứ không phải Victoria muốn trở thành diễn viên. Bẫy này đánh lừa những thí sinh chỉ bắt từ khóa (word-catching) mà không hiểu cấu trúc câu.
                    </div>
                `
            },
            {
                qNum: 25,
                friend: "Bobby",
                correctId: 'A',
                explanation: `
                    <div class="explanation-step">
                        <span class="step-title">Bước 1: Dịch câu hỏi & Đáp án</span><br>
                        Bobby muốn làm nghề gì?
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 2: Audio Script & Dịch nghĩa</span><br>
                        Lucas: "He wants to be <span class="keyword">in plays</span> and <span class="keyword">work in theatres</span> all over the world."<br>
                        Mum: "He was good in the school play about a hospital."<br>
                        <i>(Lucas: Cậu ấy muốn tham gia vào các vở kịch và làm việc ở các nhà hát trên toàn thế giới.<br>
                        Mẹ: Cậu ấy diễn rất đạt trong vở kịch của trường về chủ đề một bệnh viện.)</i>
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 3: Tại sao ĐÚNG?</span><br>
                        Các từ khóa "in plays" (trong các vở kịch) và "theatres" (nhà hát) liên quan mật thiết đến công việc của một <strong>Diễn viên (Actor - Đáp án A)</strong>.
                    </div>
                    <div class="explanation-step">
                        <span class="step-title">Bước 4: Phân tích Bẫy (Distractors)</span><br>
                        Người mẹ có nhắc tới từ <strong>"hospital" (Bệnh viện)</strong>. Cảnh báo bẫy: Cậu ấy đóng kịch VỀ một bệnh viện ("play about a hospital"), chứ không phải cậu ấy muốn làm bác sĩ hay làm việc tại bệnh viện thực tế.
                    </div>
                `
            }
        ];

        let score = 0;
        let answeredQuestions = 0;
        
        // Audio Context setup for Synthesized Sounds (No external files needed)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playDing() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playWrongSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const notes = [350, 300, 250, 200]; // téo tèo tèo tèo
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
                
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.15);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.14);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + i * 0.15);
                osc.stop(audioCtx.currentTime + i * 0.15 + 0.15);
            });
        }

        // Shuffle Function
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Confetti Generator
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#8854C0', '#00C9A7', '#00D26A', '#FF4757', '#FFD700', '#FF9A9E'];
            
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti-piece');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                // Randomize fall duration and delay
                const duration = Math.random() * 2 + 1;
                confetti.style.animationDuration = duration + 's';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                
                container.appendChild(confetti);
                
                // Clean up
                setTimeout(() => {
                    confetti.remove();
                }, (duration + 0.5) * 1000);
            }
        }

        // Initialize Quiz
        function initQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            quizData.forEach((q, index) => {
                const shuffledOptions = shuffleArray(jobOptions);
                
                let html = `
                    <div class="question-card" id="card-${q.qNum}">
                        <h3 class="question-title">Câu ${q.qNum}: ${q.friend} wants to be a... ?</h3>
                        <div class="options-grid">
                `;

                shuffledOptions.forEach(opt => {
                    html += `
                        <button class="option-btn" 
                                id="btn-${q.qNum}-${opt.id}" 
                                onclick="handleAnswer(${index}, '${opt.id}', this)">
                            ${opt.text}
                        </button>
                    `;
                });

                html += `
                        </div>
                        <div class="explanation-box" id="exp-${q.qNum}">
                            ${q.explanation}
                        </div>
                    </div>
                `;

                container.innerHTML += html;
            });
        }

        // Handle User Answer
        function handleAnswer(questionIndex, selectedId, btnElement) {
            const q = quizData[questionIndex];
            const isCorrect = (selectedId === q.correctId);
            
            // Get all buttons for this question
            const card = document.getElementById(`card-${q.qNum}`);
            const buttons = card.querySelectorAll('.option-btn');
            
            // Disable all buttons in this question to prevent changing answer
            buttons.forEach(b => b.disabled = true);
            
            if (isCorrect) {
                btnElement.classList.add('correct');
                playDing();
                createConfetti();
                score++;
            } else {
                btnElement.classList.add('wrong');
                btnElement.classList.add('shake');
                playWrongSound();
                
                // Highlight the correct answer as well
                const correctBtn = document.getElementById(`btn-${q.qNum}-${q.correctId}`);
                if(correctBtn) {
                    correctBtn.classList.add('correct');
                    correctBtn.style.opacity = '0.6';
                }
            }

            // Show hyper-detailed explanation immediately
            const expBox = document.getElementById(`exp-${q.qNum}`);
            expBox.style.display = 'block';

            answeredQuestions++;
        }

        // Submit Quiz Logic
        function submitQuiz() {
            if (answeredQuestions < quizData.length) {
                alert("Bạn vui lòng hoàn thành tất cả các câu hỏi trước khi nộp bài nhé!");
                return;
            }

            const modal = document.getElementById('result-modal');
            const scoreText = document.getElementById('score-text');
            const resultGif = document.getElementById('result-gif');
            const resultMessage = document.getElementById('result-message');

            const percentage = (score / quizData.length) * 100;
            scoreText.innerText = `${score} / ${quizData.length}`;

            // Determine GIF and Message based on Score
            if (percentage === 100) {
                resultGif.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif";
                resultMessage.innerHTML = "Xuất sắc! Điểm tuyệt đối!<br>Kỹ năng nghe của bạn đã đạt cảnh giới thượng thừa!";
                resultMessage.style.color = "#00D26A";
            } else if (percentage >= 60) {
                resultGif.src = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif";
                resultMessage.innerHTML = "Làm tốt lắm!<br>Bạn hiểu bài khá tốt, hãy xem lại các bẫy để đạt 100% nhé!";
                resultMessage.style.color = "#8854C0";
            } else {
                resultGif.src = "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif";
                resultMessage.innerHTML = "Đừng buồn nha!<br>Bài Listening luôn có bẫy. Hãy đọc kỹ phần Giải Thích bên dưới để rút kinh nghiệm nhé!";
                resultMessage.style.color = "#FF4757";
            }

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('result-modal').style.display = 'none';
        }

        // Initialize on load
        window.onload = initQuiz;
    </script>
</body>
</html>
