<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra Tiếng Anh Siêu Thú Vị - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #FDCB6E;
            --tertiary: #00C9A7;
            --correct: #00D26A;
            --wrong: #FF4757;
            --text-dark: #2D3436;
            --text-light: #FFFFFF;
            --glass-bg: rgba(255, 255, 255, 0.35);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            color: var(--text-dark);
            /* Dynamic animated gradient background */
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--tertiary), #FF9A9E);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* SVG Floating Pattern Background */
        .pattern-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
            pointer-events: none;
            /* Encoded SVG with Emojis: Earth, Recycle, Ocean, Book */
            background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='20' y='40' font-size='24' opacity='0.4'%3E🌍%3C/text%3E%3Ctext x='120' y='80' font-size='30' opacity='0.3'%3E♻️%3C/text%3E%3Ctext x='40' y='150' font-size='26' opacity='0.4'%3E🌊%3C/text%3E%3Ctext x='150' y='180' font-size='22' opacity='0.5'%3E📚%3C/text%3E%3C/svg%3E");
            animation: floatPattern 40s linear infinite;
        }

        @keyframes floatPattern {
            0% { background-position: 0px 0px; }
            100% { background-position: 400px 400px; }
        }

        /* Header / Control Bar */
        .top-bar {
            position: relative;
            z-index: 10;
            height: 70px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            box-shadow: var(--glass-shadow);
        }

        .author-tag {
            font-size: 1.1rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .timer-display {
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 20px;
            border-radius: 30px;
            letter-spacing: 2px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-action {
            background: var(--text-light);
            color: var(--primary);
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 0px rgba(0,0,0,0.15);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0px rgba(0,0,0,0.2);
        }

        .btn-action:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.15);
        }

        /* Split Layout */
        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            height: calc(100vh - 70px);
            padding: 20px;
            gap: 20px;
        }

        .panel {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            border-radius: 25px;
            box-shadow: var(--glass-shadow);
            padding: 25px;
            overflow-y: auto;
            position: relative;
        }

        /* Scrollbar styling */
        .panel::-webkit-scrollbar {
            width: 10px;
        }
        .panel::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        .panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
        }

        /* Reading Section Styles */
        .reading-title {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            text-align: center;
        }

        .paragraph-box {
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-size: 1.15rem;
            line-height: 1.6;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-translate {
            background: linear-gradient(to right, #74b9ff, #0984e3);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.95rem;
            box-shadow: 0 4px 0px #076aba;
            transition: 0.2s;
        }
        
        .btn-translate:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #076aba;
        }

        .translation-box {
            display: none;
            background: rgba(253, 203, 110, 0.3);
            border-left: 4px solid #fdcb6e;
            padding: 10px 15px;
            margin-top: 10px;
            border-radius: 0 10px 10px 0;
            font-size: 1.05rem;
            font-style: italic;
            color: #2d3436;
        }

        /* Glossary Table */
        .glossary-container {
            margin-top: 40px;
            background: rgba(255,255,255,0.7);
            border-radius: 15px;
            padding: 20px;
        }
        .glossary-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #6c5ce7;
            text-align: center;
            margin-bottom: 15px;
        }
        .glossary-table {
            width: 100%;
            border-collapse: collapse;
        }
        .glossary-table th, .glossary-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            text-align: left;
            font-size: 1rem;
        }
        .glossary-table th {
            background: rgba(108, 92, 231, 0.2);
            font-weight: 800;
        }

        /* Question Section Styles */
        .question-card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: #2d3436;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 2px solid #dfe6e9;
            padding: 12px 15px;
            border-radius: 15px;
            font-size: 1.08rem;
            font-weight: 700;
            color: #2d3436;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 4px 0px #dfe6e9;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.02);
            border-color: var(--primary);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(4px) scale(1);
            box-shadow: 0 0px 0px transparent;
        }

        .option-btn.correct {
            background: var(--correct);
            border-color: #00b894;
            color: white;
            box-shadow: 0 4px 0px #00b894;
        }

        .option-btn.wrong {
            background: var(--wrong);
            border-color: #d63031;
            color: white;
            box-shadow: 0 4px 0px #d63031;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }
        .shake-anim {
            animation: shake 0.4s ease-in-out;
        }

        /* Explanation Box */
        .explanation-box {
            display: none;
            margin-top: 15px;
            background: #f1f2f6;
            border-left: 5px solid var(--primary);
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            line-height: 1.5;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .explanation-box h4 {
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 1.1rem;
            font-weight: 800;
        }

        /* Submit Area */
        .submit-area {
            text-align: center;
            margin-top: 30px;
            padding-bottom: 20px;
        }
        .btn-submit {
            background: linear-gradient(45deg, #fd79a8, #e84393);
            color: white;
            font-size: 1.5rem;
            font-weight: 900;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 0px #b71540;
            transition: 0.2s;
        }
        .btn-submit:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px #b71540;
        }

        /* Modal Score */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .score-circle {
            width: 150px;
            height: 150px;
            background: conic-gradient(var(--correct) 0%, #eee 0%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            position: relative;
        }
        .score-circle::after {
            content: "";
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            position: absolute;
        }
        .score-text {
            position: relative;
            z-index: 2;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--text-dark);
        }
        .modal-message {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 20px;
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
                overflow-y: auto;
                height: auto;
            }
            body { overflow-y: auto; }
            .panel { overflow-y: visible; }
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<script>
// --- AUDIO SYSTEM (Web Audio API) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playCorrectSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); // Jump to A5
    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
}

function playWrongSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
}

// --- CONFETTI SYSTEM ---
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let particles = [];

function createConfetti() {
    for (let i = 0; i < 100; i++) {
        particles.push({
            x: canvas.width / 2,
            y: canvas.height / 2,
            r: Math.random() * 6 + 4,
            dx: Math.random() * 20 - 10,
            dy: Math.random() * -20 - 5,
            color: `hsl(${Math.random() * 360}, 100%, 50%)`,
            tilt: Math.random() * 10
        });
    }
}

function animateConfetti() {
    requestAnimationFrame(animateConfetti);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, index) => {
        p.dy += 0.5; // gravity
        p.x += p.dx;
        p.y += p.dy;
        p.tilt += 0.1;
        ctx.beginPath();
        ctx.lineWidth = p.r;
        ctx.strokeStyle = p.color;
        ctx.moveTo(p.x + p.tilt + p.r, p.y);
        ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
        ctx.stroke();
        if (p.y > canvas.height) particles.splice(index, 1);
    });
}
animateConfetti();

        ],
        questions: [
            { id: 13, type: 'mcq', text: "Question 13: Help us protect (13)........... environment by recycling!", options: [{text:"the", correct:true}, {text:"a", correct:false}, {text:"an", correct:false}, {text:"no article", correct:false}], explanation: "<b>Đáp án: the</b><br><b>Giải thích:</b> 'the environment' là một cụm từ cố định chỉ môi trường tự nhiên xung quanh chúng ta (được coi là duy nhất trong ngữ cảnh này nên dùng mạo từ xác định 'the').<br>Dịch: Hãy giúp chúng tôi bảo vệ môi trường..." },
            { id: 14, type: 'mcq', text: "Question 14: Avoid (14)...........: Food waste and dirty items go in the trash.", options: [{text:"to recycle", correct:false}, {text:"recycling", correct:true}, {text:"recycle", correct:false}, {text:"recycled", correct:false}], explanation: "<b>Đáp án: recycling</b><br><b>Giải thích:</b> Cấu trúc ngữ pháp: <b>Avoid + V-ing</b> (Tránh làm việc gì đó).<br>Dịch: Tránh việc tái chế rác thải thực phẩm..." },

            { id: 16, type: 'mcq', text: "Question 16: Thank you for helping protect (16)........... planet!", options: [{text:"his", correct:false}, {text:"its", correct:false}, {text:"their", correct:false}, {text:"our", correct:true}], explanation: "<b>Đáp án: our</b><br><b>Giải thích:</b> Cần một tính từ sở hữu phù hợp về nghĩa. 'Our planet' mang nghĩa 'hành tinh của chúng ta', kêu gọi sự chung tay của tất cả mọi người.<br>Dịch: Cảm ơn bạn đã giúp bảo vệ hành tinh của chúng ta!" }

            },

let totalQuestions = 0;

// Shuffle Array Algorithm
function shuffleArray(array) {
    let curId = array.length;
    while (0 !== curId) {
        let randId = Math.floor(Math.random() * curId);
        curId -= 1;
        let tmp = array[curId];
        array[curId] = array[randId];
        array[randId] = tmp;
    }
    return array;
}

function initData() {
    const readCont = document.getElementById('reading-content');
    const quesCont = document.getElementById('questions-content');
    
    data.forEach((part, partIndex) => {
        // Render Reading
        let partHtml = `<h2 style="color:var(--primary); margin: 30px 0 15px; font-weight:900;">${part.title}</h2>`;
        part.paragraphs.forEach((p, pIndex) => {
            let pid = `trans-${partIndex}-${pIndex}`;
            partHtml += `
                <div class="paragraph-box">
                    <div id="eng-${pid}">${p.eng}</div>
                    <button class="btn-translate" onclick="toggleTrans('${pid}')">Mở dịch đoạn này 🌟</button>
                    <div class="translation-box" id="${pid}">${p.vie}</div>
                </div>
            `;
        });
        readCont.innerHTML += partHtml;

        // Render Questions
        part.questions.forEach((q) => {
            totalQuestions++;
            let shuffledOptions = shuffleArray([...q.options]);
            
            let qHtml = `
                <div class="question-card" id="card-${q.id}">
                    <div class="question-text">${q.text.replace('...........', `<span id="blank-${q.id}" style="color:var(--primary); border-bottom: 2px dashed var(--primary); padding: 0 10px; transition:0.3s;">...........</span>`)}</div>
                    <div class="options-grid">
            `;
            
            shuffledOptions.forEach((opt, optIdx) => {
                let isCorr = opt.correct ? 'true' : 'false';
                qHtml += `
                    <button class="option-btn" id="btn-${q.id}-${optIdx}" 
                        onclick="handleAnswer(${q.id}, '${optIdx}', ${isCorr}, '${opt.text.replace(/'/g, "\\'")}')">
                        <span style="font-weight:900; margin-right:8px; color:#b2bec3;">${String.fromCharCode(65 + optIdx)}.</span> ${opt.text}
                    </button>
                `;
            });

            qHtml += `
                    </div>
                    <div class="explanation-box" id="exp-${q.id}">
                        <h4>SIÊU CHI TIẾT 💡</h4>
                        <div>${q.explanation}</div>
                    </div>
                </div>
            `;
            quesCont.innerHTML += qHtml;
        });
    });

    // Render Glossary
    const glossBody = document.getElementById('glossary-body');
    glossaryList.forEach(item => {
        glossBody.innerHTML += `
            <tr>
                <td style="font-weight:800; color:var(--primary);">${item.word}</td>
                <td style="font-style:italic;">${item.pos}</td>
                <td>${item.vie}</td>
            </tr>
        `;
    });
}

function toggleTrans(id) {
    const box = document.getElementById(id);
    const btn = box.previousElementSibling;
    if (box.style.display === 'block') {
        box.style.display = 'none';
        btn.innerHTML = 'Mở dịch đoạn này 🌟';
    } else {
        box.style.display = 'block';
        btn.innerHTML = 'Đóng bản dịch 🙈';
    }
}

function handleAnswer(qId, optIdx, isCorrect, textStr) {
    if (isSubmitted || userAnswers[qId]) return; // Disable if already answered this card
    userAnswers[qId] = true;

    const btn = document.getElementById(`btn-${qId}-${optIdx}`);
    const card = document.getElementById(`card-${qId}`);
    const blank = document.getElementById(`blank-${qId}`);
    const exp = document.getElementById(`exp-${qId}`);

    // Update blank with chosen word
    if (blank) {
        blank.innerText = textStr;
        blank.style.color = isCorrect ? 'var(--correct)' : 'var(--wrong)';
        blank.style.borderColor = isCorrect ? 'var(--correct)' : 'var(--wrong)';
    }

    if (isCorrect) {
        btn.classList.add('correct');
        card.style.borderColor = 'var(--correct)';
        playCorrectSound();
        createConfetti();
        correctAnswers++;
    } else {
        btn.classList.add('wrong');
        card.classList.add('shake-anim');
        card.style.borderColor = 'var(--wrong)';
        playWrongSound();
        
        // Find and highlight correct answer automatically
        const allBtns = card.querySelectorAll('.option-btn');
        allBtns.forEach(b => {
            if (b.getAttribute('onclick').includes('true')) {
                b.classList.add('correct');
                b.style.opacity = '0.7';
            }
        });
        
        setTimeout(() => { card.classList.remove('shake-anim'); }, 400);
    }

    // Disable all options in this question
    const allBtns = card.querySelectorAll('.option-btn');
    allBtns.forEach(b => b.disabled = true);

    // Show Explanation
    exp.style.display = 'block';
}

function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = sec % 60;
    return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}

function updateTimerDisplay() {
    document.getElementById('timer').innerText = formatTime(timeRemaining);
}

function toggleTimer() {
    const btn = document.getElementById('btn-timer-control');
    if (isTimerRunning) {
        clearInterval(timerInterval);
        isTimerRunning = false;
        btn.innerText = "TIẾP TỤC BÀI";
        btn.style.background = "#fdcb6e";
    } else {
        if (timeRemaining <= 0) return;
        isTimerRunning = true;
        btn.innerText = "TẠM DỪNG";
        btn.style.background = "#ff7675";
        
        // Ensure Audio Context is active
        if (audioCtx.state === 'suspended') audioCtx.resume();

        timerInterval = setInterval(() => {
            timeRemaining--;
            updateTimerDisplay();
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                isTimerRunning = false;
                btn.innerText = "HẾT GIỜ";
                btn.disabled = true;
                alert("⏰ Đã hết giờ làm bài! Bạn vẫn có thể tiếp tục làm, nhưng nhớ là trong phòng thi thật, bạn chỉ nên làm một bài như thế này trong 10 phút thôi nha.");
            }
        }, 1000);
    }
}

function submitQuiz() {
    isSubmitted = true;
    clearInterval(timerInterval);
    const modal = document.getElementById('result-modal');
    const scoreText = document.getElementById('score-text');
    const msg = document.getElementById('modal-message');
    const circle = document.getElementById('score-circle');

    // Auto-reveal unanswered questions
    for (let i = 1; i <= totalQuestions; i++) {
        // Find the qId, since our IDs are not 1-N (they are 13,14..31..40)
        // We'll just loop through DOM elements with class 'question-card'
    }
    
    const cards = document.querySelectorAll('.question-card');
    cards.forEach(card => {
        let qId = card.id.split('-')[1];
        if (!userAnswers[qId]) {
            // Give wrong styling to card, reveal explanation and correct btn
            card.style.borderColor = 'var(--wrong)';
            const allBtns = card.querySelectorAll('.option-btn');
            allBtns.forEach(b => {
                b.disabled = true;
                if (b.getAttribute('onclick').includes('true')) {
                    b.classList.add('correct');
                    b.style.opacity = '0.7';
                }
            });
            document.getElementById(`exp-${qId}`).style.display = 'block';
        }
    });

    // Display Result
    let percent = Math.round((correctAnswers / totalQuestions) * 100);
    scoreText.innerText = `${correctAnswers}/${totalQuestions}`;
    circle.style.background = `conic-gradient(var(--correct) ${percent}%, #eee 0%)`;

    if (percent === 100) {
        msg.innerText = "Tuyệt đỉnh! Cậu là Thiên Tài Tiếng Anh! 🏆";
        playCorrectSound();
        for(let i=0; i<3; i++) setTimeout(createConfetti, i*300);
    } else if (percent >= 70) {
        msg.innerText = "Làm tốt lắm! Bạn giỏi thật sự đó! 🌟";
        playCorrectSound();
        createConfetti();
    } else if (percent >= 50) {
        msg.innerText = "Cố lên nhé! Bạn đã đi được một nửa chặng đường rồi! 👍";
    } else {
        msg.innerText = "Đừng buồn, hãy đọc kỹ lại phần giải thích để tiến bộ hơn nha! 💪";
        playWrongSound();
    }

    modal.style.display = 'flex';
}

function closeModal() {
    document.getElementById('result-modal').style.display = 'none';
}

// Initialize
window.onload = () => {
    initData();
    updateTimerDisplay();
};

</script>
