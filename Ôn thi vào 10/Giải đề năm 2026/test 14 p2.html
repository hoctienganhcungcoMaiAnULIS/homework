<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* === DYNAMIC THEME & BASE STYLES === */
        :root {
            --primary-color: #8854C0; 
            --secondary-color: #FDCB6E; 
            --accent-color: #00C9A7; 
            --correct-color: #00D26A;
            --wrong-color: #FF4757;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #2D3436;
        }

        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; user-select: none; }

        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; color: var(--text-dark);
            background: 
                url('data:image/svg+xml;utf8,<svg width="300" height="300" xmlns="http://www.w3.org/2000/svg"><text x="20" y="50" font-size="40" opacity="0.6">📚</text><text x="150" y="120" font-size="50" opacity="0.5">✨</text><text x="80" y="250" font-size="45" opacity="0.6">🎓</text><text x="220" y="200" font-size="40" opacity="0.5">💡</text></svg>'),
                linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 300px 300px, 400% 400%;
            animation: gradientBG 15s ease infinite, floatPattern 20s linear infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 0%, 0% 50%; }
            50% { background-position: 100% 100%, 100% 50%; }
            100% { background-position: 0% 0%, 0% 50%; }
        }
        @keyframes floatPattern {
            from { background-position: 0 0, 0% 50%; }
            to { background-position: 300px 300px, 100% 50%; }
        }

        /* === MODALS === */
        #auth-modal, #name-modal, #result-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85); padding: 40px; border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center; border: 2px solid white;
            max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto;
        }

        .glass-card h2 { margin-top: 0; color: var(--primary-color); font-size: 1.8rem; }
        .glass-input {
            width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 15px;
            font-size: 1.2rem; text-align: center; transition: 0.3s; outline: none;
        }
        .glass-input:focus { border-color: var(--primary-color); box-shadow: 0 0 15px rgba(136, 84, 192, 0.3); }
        .glass-input.error { border-color: var(--wrong-color); background: #ffeaa7; }

        .btn {
            background: linear-gradient(135deg, var(--primary-color), #a29bfe); color: white;
            border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 15px;
            cursor: pointer; transition: 0.2s; box-shadow: 0 6px 0 #6c5ce7;
        }
        .btn:active { transform: translateY(6px); box-shadow: none; }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* === MAIN LAYOUT === */
        #main-container { display: none; flex-direction: column; height: 100%; }
        .top-bar {
            height: 70px; background: var(--glass-bg); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--glass-border); display: flex;
            justify-content: space-between; align-items: center; padding: 0 30px; z-index: 10;
        }
        .header-info h1 { margin: 0; font-size: 1.5rem; color: var(--primary-color); }
        .header-info p { margin: 0; font-size: 0.9rem; font-weight: bold; color: #636e72; }
        .timer-container { display: flex; align-items: center; gap: 15px; }
        #timer-display { font-size: 1.8rem; font-weight: 800; color: var(--wrong-color); min-width: 90px; }
        .btn-timer { background: var(--secondary-color); color: #2d3436; box-shadow: 0 4px 0 #e1b12c; padding: 10px 20px; font-size: 1rem; }

        .split-layout { display: flex; flex: 1; overflow: hidden; gap: 20px; padding: 20px; }
        .pane {
            flex: 1; background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border); border-radius: 25px; padding: 25px;
            overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .pane::-webkit-scrollbar { width: 8px; }
        .pane::-webkit-scrollbar-thumb { background: rgba(136,84,192,0.4); border-radius: 10px; }

        /* READING PANE */
        .reading-title { color: var(--primary-color); font-size: 1.6rem; border-bottom: 2px dashed #a29bfe; padding-bottom: 10px; }
        .para-container {
            background: rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 15px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid white;
        }
        .eng-text { font-size: 1.2rem; line-height: 1.7; font-weight: 600; }
        .vie-text {
            font-size: 1.1rem; line-height: 1.6; color: #2c3e50; background: #e8f4f8; padding: 15px;
            border-radius: 10px; border-left: 5px solid var(--accent-color); margin-top: 15px;
            display: none; animation: fadeIn 0.3s ease;
        }
        .btn-trans {
            background: #74b9ff; box-shadow: 0 4px 0 #0984e3; color: white; border: none;
            padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        .btn-trans:active { transform: translateY(4px); box-shadow: none; }
        
        .glossary-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 15px; overflow: hidden; }
        .glossary-table th { background: var(--primary-color); color: white; padding: 15px; }
        .glossary-table td { padding: 12px 15px; border-bottom: 1px solid #eee; }

        /* EXERCISES PANE */
        .question-card { background: white; padding: 25px; border-radius: 20px; margin-bottom: 25px; border: 2px solid #eee; }
        .q-text { font-size: 1.15rem; font-weight: 800; margin-bottom: 20px; color: #2d3436; line-height: 1.6;}
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background: #f8f9fa; border: 2px solid #dfe6e9; padding: 15px 20px; border-radius: 15px;
            font-size: 1.08rem; font-weight: 700; color: #2d3436; text-align: left; cursor: pointer; transition: 0.2s;
        }
        .option-btn:hover { background: #ffeaa7; border-color: var(--secondary-color); transform: scale(1.02); }
        .option-btn.correct { background: #d4edda; border-color: var(--correct-color); color: #155724; pointer-events: none; }
        .option-btn.wrong { background: #f8d7da; border-color: var(--wrong-color); color: #721c24; pointer-events: none; }
        .option-btn.disabled { pointer-events: none; opacity: 0.6; }

        .explanation-box {
            background: #f1f2f6; border-left: 6px solid var(--primary-color); padding: 20px; border-radius: 10px;
            margin-top: 20px; font-size: 1rem; display: none; line-height: 1.6; animation: fadeIn 0.4s ease;
        }
        .explanation-box .keyword { color: red; font-weight: bold; }
        
        #confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10000; }
        .confetti { position: absolute; width: 10px; height: 10px; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-submit-container { text-align: center; margin: 30px 0; }
        .btn-submit { font-size: 1.5rem; padding: 20px 50px; border-radius: 20px; background: linear-gradient(135deg, #00b894, #00cec9); box-shadow: 0 8px 0 #019074; }
        
        .meme-img { width: 100%; max-width: 350px; border-radius: 15px; margin: 20px auto; display: block; }
        .result-text { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); }
        .score-text { font-size: 3rem; font-weight: 900; color: var(--wrong-color); margin: 10px 0; }
    </style>
</head>
<body>

    <div id="auth-modal">
        <div class="glass-card">
            <h2>🔒 Nhập Mật Khẩu Để Làm Bài</h2>
            <input type="password" id="pwd-input" class="glass-input" placeholder="Nhập mật khẩu vào đây...">
            <button class="btn" onclick="checkAuth()">🚀 MỞ KHÓA NGAY</button>
        </div>
    </div>

    <div id="name-modal" style="display: none;">
        <div class="glass-card">
            <h2>🎉 Đã Hoàn Thành Bài Tập!</h2>
            <input type="text" id="name-input" class="glass-input" placeholder="Ví dụ: Nguyễn Văn A...">
            <p id="name-error" style="color: var(--wrong-color); display: none; font-weight: bold;">⚠️ Vui lòng nhập tên trước khi xem điểm nhé!</p>
            <button class="btn" onclick="showResults()">🎯 XEM KẾT QUẢ</button>
        </div>
    </div>

    <div id="result-modal" style="display: none;">
        <div class="glass-card">
            <h2 id="final-greeting"></h2>
            <div class="score-text" id="final-score"></div>
            <img id="meme-gif" class="meme-img" src="" alt="Meme Reaction">
            <p id="final-comment" class="result-text"></p>
            <button class="btn" onclick="location.reload()">🔄 LÀM LẠI TỪ ĐẦU</button>
        </div>
    </div>

    <div id="confetti-container"></div>

    <div id="main-container">
        <div class="top-bar">
            <div class="header-info">
                <h1>PRACTICE TEST 14</h1>
                <p>Giáo viên tạo: Ms Mai An ULIS</p>
            </div>
            <div class="timer-container">
                <div id="timer-display">10:00</div>
                <button id="btn-timer-toggle" class="btn btn-timer" onclick="toggleTimer()">BẮT ĐẦU TÍNH GIỜ LÀM BÀI</button>
            </div>
        </div>

        <div class="split-layout">
            <div class="pane" id="left-pane">
                <h2 class="reading-title">📖 Reading Passages</h2>
                <div id="passages-container"></div>
                <h2 class="reading-title" style="margin-top:40px;">📚 Glossary (Từ Vựng Khó)</h2>
                <table class="glossary-table">
                    <thead><tr><th>Từ Vựng</th><th>Loại Từ</th><th>Nghĩa Tiếng Việt</th></tr></thead>

                </table>
            </div>

                </div>
            </div>
        </div>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) {
                if(audioCtx && audioCtx.state === 'running') playWrong();
                return false;
            }
        };

        const _0x1a2b = [106, 118, 116, 104, 112, 104, 117, 124, 115, 112, 122]; 
        function checkAuth() {
            const inputEl = document.getElementById('pwd-input');
            const hashedInput = Array.from(inputEl.value).map(char => char.charCodeAt(0) + 7);
            const isMatch = hashedInput.length === _0x1a2b.length && hashedInput.every((val, i) => val === _0x1a2b[i]);
            if (isMatch) {
                document.getElementById('auth-modal').style.display = 'none';
                document.getElementById('main-container').style.display = 'flex';
                initApp();
            } else {
                inputEl.classList.add('error', 'shake');
                setTimeout(() => inputEl.classList.remove('shake'), 500);
            }
        }
        document.getElementById('pwd-input').addEventListener('keypress', e => { if(e.key === 'Enter') checkAuth(); });

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        function playDing() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
        function playWrong() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            [300, 250, 200].forEach((f, i) => {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = 'sawtooth'; osc.frequency.value = f;
                gain.gain.setValueAtTime(0.3, now + i*0.15); gain.gain.exponentialRampToValueAtTime(0.01, now + i*0.15 + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now + i*0.15); osc.stop(now + i*0.15 + 0.15);
            });
        }

        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#00D26A', '#FDCB6E', '#8854C0', '#00C9A7', '#FF4757'];
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div'); conf.classList.add('confetti');
                conf.style.left = Math.random() * 100 + 'vw'; conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 2 + 1) + 's'; conf.style.animationDelay = Math.random() * 0.5 + 's';
                container.appendChild(conf); setTimeout(() => conf.remove(), 3000);
            }
        }

        let timerInterval, timeLeft = 600, isRunning = false;
        function toggleTimer() {
            const btn = document.getElementById('btn-timer-toggle');
            if (!isRunning) {
                if (timeLeft === 600) alert("⏳ Bắt đầu tính giờ! Chúc bạn làm bài thật tốt nhé!");
                btn.innerText = "TẠM DỪNG"; isRunning = true;
                timerInterval = setInterval(() => {
                    timeLeft--; updateTimerDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval); btn.innerText = "ĐÃ HẾT GIỜ"; btn.disabled = true;
                        alert("⏰ Đã hết giờ làm bài. Bạn vẫn có thể tiếp tục làm, nhưng nhớ là trong phòng thi thật, bạn chỉ nên làm một bài như thế này trong 10 phút thôi nha.");
                    }
                }, 1000);
            } else { clearInterval(timerInterval); btn.innerText = "TIẾP TỤC"; isRunning = false; }
        }
        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        const passages = [
            {
                eng: "<b>PART-TIME POSITION AVAILABLE: SHOP ASSISTANT</b><br>The campus convenience store (13) ________ a part-time shop assistant. Applicants should be third-year students or above, with intermediate-level English, and must be honest, flexible, and reliable. Responsibilities include helping customers, arranging goods, and keeping the store clean and organised. Work hours will be arranged based on your class schedule. This is a great opportunity to gain work experience in (14) ________ friendly environment. (15) ________, please visit the store counter or contact the store manager directly. We look forward to welcoming a new member (16) ________ our team!",
                vie: "<b>VỊ TRÍ BÁN THỜI GIAN: NHÂN VIÊN BÁN HÀNG</b><br>Cửa hàng tiện lợi trong khuôn viên trường (13) hiện đang tuyển một nhân viên bán hàng bán thời gian. Ứng viên phải là sinh viên năm thứ ba trở lên, có trình độ tiếng Anh trung cấp, và phải trung thực, linh hoạt, đáng tin cậy. Trách nhiệm bao gồm giúp đỡ khách hàng, sắp xếp hàng hóa, giữ cửa hàng sạch sẽ và ngăn nắp. Giờ làm việc sẽ được sắp xếp dựa trên lịch học của bạn. Đây là cơ hội tuyệt vời để có được kinh nghiệm làm việc trong (14) một môi trường thân thiện. (15) Để ứng tuyển, vui lòng đến quầy cửa hàng hoặc liên hệ trực tiếp với quản lý. Chúng tôi mong chờ được chào đón một thành viên mới (16) vào đội ngũ của chúng tôi!"
            },
            {
                eng: "Light plays an essential role in our daily lives. It supports natural life, powers technology, and even affects our health. That's why International Day of Light was created – to help people understand how light science can improve the world.",
                vie: "Ánh sáng đóng vai trò thiết yếu trong cuộc sống hàng ngày của chúng ta. Nó hỗ trợ đời sống tự nhiên, cung cấp năng lượng cho công nghệ và thậm chí ảnh hưởng đến sức khỏe của chúng ta. Đó là lý do tại sao Ngày Quốc tế Ánh sáng được tạo ra – nhằm giúp mọi người hiểu cách khoa học ánh sáng có thể cải thiện thế giới."
            },
            {
                eng: "(19) _________ we use light wisely, it can support health, reduce energy use, and promote sustainability. The sun helps regulate sleep and supports (20) _________, while too much artificial light can affect natural rhythms. Learning how to (21) _________ this balance is important for long-term well-being.",
                vie: "(19) Khi chúng ta sử dụng ánh sáng một cách khôn ngoan, nó có thể hỗ trợ sức khỏe, giảm thiểu sử dụng năng lượng và thúc đẩy sự bền vững. Mặt trời giúp điều chỉnh giấc ngủ và hỗ trợ (20) việc sản xuất vitamin D, trong khi quá nhiều ánh sáng nhân tạo có thể ảnh hưởng đến nhịp sinh học tự nhiên. Việc học cách (21) quản lý sự cân bằng này là rất quan trọng cho sức khỏe lâu dài."
            },
            {
                eng: "Today, scientists develop light-based tools that help us communicate and save energy. Fiber-optic cables allow information to travel across oceans in (22) _________ way possible, and solar panels change sunlight into clean electricity. These are just (23) _________ of the technologies changing our lives.",
                vie: "Ngày nay, các nhà khoa học phát triển các công cụ dựa trên ánh sáng giúp chúng ta giao tiếp và tiết kiệm năng lượng. Cáp quang cho phép thông tin truyền qua các đại dương bằng cách (22) nhanh nhất có thể, và các tấm pin mặt trời biến ánh sáng mặt trời thành điện sạch. Đây chỉ là (23) một vài trong số những công nghệ đang thay đổi cuộc sống của chúng ta."
            },
            {
                eng: "International Day of Light also aims to inspire young people. Education programs and science fairs introduce students to exciting discoveries in light science. (24) _________ is a way to value progress and prepare for our planet's future.",
                vie: "Ngày Quốc tế Ánh sáng cũng nhằm mục đích truyền cảm hứng cho những người trẻ tuổi. Các chương trình giáo dục và hội chợ khoa học giới thiệu cho học sinh những khám phá thú vị về khoa học ánh sáng. (24) Việc kỷ niệm ngày này là một cách để đánh giá cao sự tiến bộ và chuẩn bị cho tương lai của hành tinh chúng ta."
            },
            {
                eng: "Many people think older workers are paid more because of their seniority, not because they work harder. So, when companies need to save money, they often ask older employees to retire early. However, some companies are finding new ways to keep older workers. In Belgium, IBM started a company called Skill Team. It allowed people aged 55 to 60 to keep working part-time. They worked more than half the time, but earned most of their old salary. This helped IBM keep their skills and experience.",
                vie: "Nhiều người cho rằng người lao động lớn tuổi được trả lương cao hơn vì thâm niên của họ, chứ không phải vì họ làm việc chăm chỉ hơn. Vì vậy, khi các công ty cần tiết kiệm tiền, họ thường yêu cầu nhân viên lớn tuổi nghỉ hưu sớm. Tuy nhiên, một số công ty đang tìm ra những cách mới để giữ lại lao động lớn tuổi. Ở Bỉ, IBM đã thành lập một công ty tên là Skill Team. Nó cho phép những người từ 55 đến 60 tuổi tiếp tục làm việc bán thời gian. Họ làm việc hơn một nửa thời gian, nhưng kiếm được phần lớn mức lương cũ. Điều này giúp IBM giữ lại được kỹ năng và kinh nghiệm của họ."
            },
            {

            },
            {
                eng: "Many Vietnamese people believe that traditional art and music are essential values that should be preserved for future generations. (37) ________. When students learn about traditional music and art, they gain a deeper understanding of the past and where they come from. Visiting museums or watching traditional performances, for instance, (38) ________. For example, history lessons in schools often include songs or paintings from the past, which helps students feel more connected to their culture.",

            {
                eng: "Appreciating these traditional values helps young people cultivate national pride. This understanding (39) ________. It also enables them to share these unique customs with others around the world, making their culture stronger and more well-known. Finally, engaging with traditional art can greatly inspire new creative ideas. Young people may use the techniques and motifs they learn to create new music, paintings, or designs. (40) ________. In short, preserving traditional music and art not only helps future generations understand their roots and feel proud of their culture but also inspires them to create new values based on old ideas.",
                vie: "Việc trân trọng những giá trị truyền thống này giúp người trẻ nuôi dưỡng lòng tự hào dân tộc. Sự thấu hiểu này (39) giúp các em tôn trọng các thế hệ đi trước và cảm thấy tự hào về di sản của mình. Nó cũng cho phép các em chia sẻ những phong tục độc đáo này với những người khác trên thế giới, làm cho văn hóa của mình trở nên mạnh mẽ và được biết đến nhiều hơn. Cuối cùng, việc tham gia vào nghệ thuật truyền thống có thể truyền cảm hứng rất lớn cho những ý tưởng sáng tạo mới. Những người trẻ có thể sử dụng các kỹ thuật và họa tiết họ học được để tạo ra âm nhạc, tranh vẽ hoặc thiết kế mới. (40) Sự sáng tạo của họ có thể mang lại sức sống mới cho những truyền thống cũ và đảm bảo chúng vẫn luôn rực rỡ và tồn tại. Tóm lại, việc bảo tồn âm nhạc và nghệ thuật truyền thống không chỉ giúp thế hệ tương lai hiểu cội nguồn và tự hào về văn hóa mà còn truyền cảm hứng tạo ra những giá trị mới dựa trên những ý tưởng cũ."

        let score = 0; let answeredQuestions = 0;
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initApp() { renderPassages(); renderGlossary(); renderQuestions(); }

        function renderPassages() {
            const container = document.getElementById('passages-container');
            passages.forEach((p, index) => {
                container.innerHTML += `
                    <div class="para-container">
                        <p class="eng-text">${p.eng}</p>
                        <button class="btn-trans" onclick="toggleTranslation(${index})">Mở dịch đoạn này 🌟</button>
                        <div class="vie-text" id="vie-${index}">${p.vie}</div>
                    </div>`;
            });
        }

        function toggleTranslation(index) {
            const el = document.getElementById(`vie-${index}`);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function renderGlossary() {
            const tbody = document.getElementById('glossary-body');
            glossary.forEach(item => {
                tbody.innerHTML += `<tr><td><strong>${item.w}</strong></td><td><em>${item.p}</em></td><td>${item.v}</td></tr>`;
            });
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            questions.forEach((q, qIndex) => {
                let optionsCopy = [...q.options]; shuffleArray(optionsCopy);
                let optionsHtml = '';
                optionsCopy.forEach((opt, oIndex) => {
                    optionsHtml += `<button class="option-btn" id="btn-${qIndex}-${oIndex}" onclick="checkAnswer(${qIndex}, ${oIndex}, ${opt.c})">${opt.t}</button>`;
                });
                container.innerHTML += `
                    <div class="question-card">
                        <div class="q-text">Câu ${q.id}: Dịch câu hỏi: ${q.text}</div>
                        <div class="options-grid">${optionsHtml}</div>
                        <div class="explanation-box" id="exp-${qIndex}">
                            <p><strong>Dịch câu hỏi & Phân tích 4 đáp án:</strong></p>
                            ${q.options.map(o => `<p>${o.t} ${o.e}</p>`).join('')}
                            <hr style="border:0; border-top:1px dashed #ccc; margin:15px 0;">
                            <p>🔍 <strong>Dẫn chứng trong bài:</strong> "${q.quote}"</p>
                            <p>👉 <strong>Dịch:</strong> "${q.quoteVie}"</p>
                        </div>
                    </div>`;
            });
        }

        window.checkAnswer = function(qIndex, oIndex, isCorrect) {
            const expBox = document.getElementById(`exp-${qIndex}`);
            const btn = document.getElementById(`btn-${qIndex}-${oIndex}`);
            const allBtns = document.querySelectorAll(`[id^='btn-${qIndex}-']`);

            if (expBox.style.display === 'block') return;
            answeredQuestions++; allBtns.forEach(b => b.classList.add('disabled'));

            if (isCorrect) {
                btn.classList.add('correct'); playDing(); createConfetti(); score++;
            } else {
                btn.classList.add('wrong', 'shake'); playWrong();
                allBtns.forEach(b => { if(b.onclick.toString().includes('true')) { b.classList.remove('disabled'); b.classList.add('correct'); } });
            }
            expBox.style.display = 'block';
        };

        window.promptName = function() {
            if (answeredQuestions < questions.length) {
                if(!confirm("Bạn chưa làm xong tất cả các câu hỏi! Bạn có chắc chắn muốn nộp bài không?")) return;
            }
            document.getElementById('name-modal').style.display = 'flex';
        }

        window.showResults = function() {
            const nameInput = document.getElementById('name-input'), nameError = document.getElementById('name-error');
            const studentName = nameInput.value.trim();
            if (!studentName) {
                nameInput.classList.add('error', 'shake'); nameError.style.display = 'block';
                setTimeout(() => nameInput.classList.remove('shake'), 500); return;
            }
            document.getElementById('name-modal').style.display = 'none'; clearInterval(timerInterval);

            const resultModal = document.getElementById('result-modal');
            const finalGreeting = document.getElementById('final-greeting'), finalScore = document.getElementById('final-score');
            const memeGif = document.getElementById('meme-gif'), finalComment = document.getElementById('final-comment');

            const percent = score / questions.length;
            finalScore.innerText = `${score} / ${questions.length}`;

            if (percent === 1) {
                finalGreeting.innerText = `🌟 THIÊN TÀI! ${studentName} xuất sắc tuyệt đối!`;
                memeGif.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif"; 
                finalComment.innerText = "Không thể tin được! Bạn thực sự là một cao thủ tiếng Anh!";
            } else if (percent >= 0.6) {
                finalGreeting.innerText = `👏 LÀM TỐT LẮM, ${studentName}!`;
                memeGif.src = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif"; 
                finalComment.innerText = "Điểm số rất khá! Hãy cố gắng thêm một chút nữa nhé!";
            } else {
                finalGreeting.innerText = `💪 CỐ LÊN NHÉ, ${studentName}!`;
                memeGif.src = "https://media.giphy.com/media/2rtQMJvhzOnRe/giphy.gif"; 
                finalComment.innerText = "Đừng buồn, đọc lại phần giải thích chi tiết để rút kinh nghiệm nào!";
            }
            resultModal.style.display = 'flex';
        }
    </script>
