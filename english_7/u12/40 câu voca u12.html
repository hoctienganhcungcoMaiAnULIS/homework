<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập Tiếng Anh 7 - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --correct: #00D26A;
            --wrong: #FF4757;
            --bg-btn: #ffffff;
            --text-main: #2d3436;
            --shadow: rgba(0,0,0,0.15);
        }

        * {
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(-45deg, #FF9A9E, #FECFEF, #FDCB6E, #00C9A7, #A1C4FD);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px 10px;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Summer Patterns */
        .pattern-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-icon {
            position: absolute;
            font-size: 2.5rem;
            animation: floatUp linear infinite;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg) scale(0.8); }
            100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); }
        }

        .header {
            text-align: center;
            position: relative;
            z-index: 10;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.9);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 20px var(--shadow);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .header h2 {
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: #ff6b81;
            text-transform: uppercase;
        }

        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .option-btn {
            background: var(--bg-btn);
            border: 2px solid #dfe6e9;
            border-radius: 15px;
            padding: 15px;
            font-size: 1.08rem;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 #dfe6e9;
            text-align: left;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 0 #dfe6e9;
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #dfe6e9;
        }

        .option-btn.correct {
            background: var(--correct);
            border-color: #00b894;
            color: white;
            box-shadow: 0 6px 0 #00b894;
        }

        .option-btn.wrong {
            background: var(--wrong);
            border-color: #d63031;
            color: white;
            box-shadow: 0 6px 0 #d63031;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .explanation {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #fff3e0;
            border-left: 6px solid #ff9f43;
            border-radius: 10px;
            font-size: 1rem;
            line-height: 1.6;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exp-step { margin-bottom: 10px; }
        .exp-title { font-weight: 800; color: #d35400; }
        .vocab-list { margin-left: 20px; list-style-type: disc; }

        .submit-container {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 50px;
        }

        .submit-btn {
            background: #FF4757;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 #d63031;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 10px 0 #d63031;
        }

        .submit-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #d63031;
        }

        /* Score Popup */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .score-popup {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .score-text { font-size: 3rem; font-weight: 900; color: var(--correct); margin: 20px 0; }
        .praise-text { font-size: 1.5rem; color: #ff9f43; font-weight: 700; margin-bottom: 20px; }
        
        /* Confetti */
        .confetti-piece {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 999;
            animation: fall 2s linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media(max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="pattern-container" id="patternBox"></div>

    <div class="header">
        <h2>Giáo viên: Ms Mai An ULIS</h2>
        <h1>Exercise 7 - Summer Quiz 🌴</h1>
        <p>Choose the word or phrase that best fits the blank space.</p>
    </div>

    <div class="quiz-container" id="quizContainer">
        </div>

    <div class="submit-container">
        <button class="submit-btn" onclick="submitQuiz()">Nộp Bài 🎉</button>
    </div>

    <div class="overlay" id="scoreOverlay">
        <div class="score-popup">
            <h2>Kết Quả Của Bạn!</h2>
            <div class="score-text"><span id="correctCount">0</span>/40</div>
            <div class="praise-text" id="praiseText">Tuyệt vời!</div>
            <button class="submit-btn" style="font-size: 1.2rem; padding: 12px 30px; background: #00D26A; box-shadow: 0 6px 0 #00b894;" onclick="location.reload()">Chơi Lại 🔄</button>
        </div>
    </div>

<script>
    // --- 1. DỮ LIỆU CÂU HỎI VÀ GIẢI THÍCH CHI TIẾT ---
    const rawData = [
        { q: "Each person’s genetic code is _______ except in the case of identical twins.", o: [["normal", "bình thường"], ["unique", "độc nhất"], ["general", "chung chung"], ["long", "dài"]], a: 1, trans: "Mã di truyền của mỗi người là độc nhất ngoại trừ trường hợp sinh đôi cùng trứng.", wc: "Cụm 'except... identical twins' (ngoại trừ sinh đôi cùng trứng) ám chỉ mỗi người đều có mã di truyền không ai giống ai, tức là 'unique' (độc nhất).", ww: "Mã di truyền không thể là 'bình thường', 'chung chung' hay 'dài' khi dùng để phân biệt sự khác nhau giữa các cá thể." },
        { q: "Kangaroos are considered the _______ of Australia.", o: [["coastline", "đường bờ biển"], ["symbol", "biểu tượng"], ["tower", "tòa tháp"], ["capital", "thủ đô"]], a: 1, trans: "Chuột túi (Kangaroo) được coi là biểu tượng của nước Úc.", wc: "Kangaroo là loài vật đặc trưng nổi tiếng nhất, đại diện cho hình ảnh nước Úc, nên nó là 'symbol' (biểu tượng).", ww: "Kangaroo là động vật, không thể là đường bờ biển, tòa tháp hay thủ đô được." },
        { q: "She has a ________ of a rose on her shoulder.", o: [["tattoo", "hình xăm"], ["head", "cái đầu"], ["river", "con sông"], ["castle", "lâu đài"]], a: 0, trans: "Cô ấy có một hình xăm hoa hồng trên vai.", wc: "Trên cơ thể (vai) người ta thường xăm hình để trang trí, 'tattoo' ghép với 'of a rose' tạo thành 'hình xăm hoa hồng' là hoàn toàn hợp lý về ngữ cảnh.", ww: "Không ai có thể có một 'cái đầu', 'con sông' hay 'lâu đài' mọc trên vai cả." },
        { q: "Indonesia is the largest ________ country in the world.", o: [["island", "đảo/quốc đảo"], ["coastline", "bờ biển"], ["capital", "thủ đô"], ["sunrise", "bình minh"]], a: 0, trans: "Indonesia là quốc đảo lớn nhất trên thế giới.", wc: "Về mặt địa lý, Indonesia được tạo thành từ hàng ngàn hòn đảo, do đó 'island country' (quốc đảo) là cụm danh từ chính xác nhất.", ww: "Không có khái niệm 'quốc gia bờ biển', 'quốc gia thủ đô' hay 'quốc gia bình minh' trong ngữ cảnh này." },
        { q: "Justin Bieber comes from Canada. He is a_______.", o: [["Vietnamese", "người Việt Nam"], ["Australian", "người Úc"], ["American", "người Mỹ"], ["Canadian", "người Canada"]], a: 3, trans: "Justin Bieber đến từ Canada. Anh ấy là người Canada.", wc: "Dựa vào câu trước 'comes from Canada', quốc tịch tương ứng phải là 'Canadian'.", ww: "Các quốc tịch còn lại (Việt Nam, Úc, Mỹ) không khớp với tên quốc gia 'Canada' đã cho." },
        { q: "Scotland is famous for its long history and_______ castles.", o: [["local", "địa phương"], ["modern", "hiện đại"], ["ancient", "cổ kính"], ["historical", "thuộc lịch sử"]], a: 2, trans: "Scotland nổi tiếng với lịch sử lâu đời và những lâu đài cổ kính.", wc: "Collocation thường gặp: 'ancient castles' (những lâu đài cổ kính). Từ 'ancient' rất phù hợp với cụm 'long history' (lịch sử lâu đời) phía trước.", ww: "Lâu đài đi với 'long history' thì không thể 'hiện đại' (modern). 'Local' (địa phương) không nêu bật được đặc trưng. 'Historical' thường dùng cho sự kiện (historical event) hơn là miêu tả tuổi đời của công trình." },
        { q: "Madrid is the capital of _______.", o: [["The UK", "Vương quốc Anh"], ["The USA", "Hoa Kỳ"], ["Spain", "Tây Ban Nha"], ["France", "Pháp"]], a: 2, trans: "Madrid là thủ đô của Tây Ban Nha.", wc: "Đây là kiến thức địa lý cơ bản: Madrid là thủ đô của quốc gia Tây Ban Nha (Spain).", ww: "Thủ đô của UK là London, của USA là Washington D.C., của France là Paris." },
        { q: "They took a ______ ride to the islands at the eastern end of Lake Ontario.", o: [["car", "ô tô"], ["train", "tàu hỏa"], ["plane", "máy bay"], ["boat", "thuyền"]], a: 3, trans: "Họ đã đi thuyền đến những hòn đảo ở đầu phía đông của Hồ Ontario.", wc: "Để đi ra 'islands' (các hòn đảo) nằm trên 'Lake' (hồ), phương tiện phù hợp và phổ biến nhất trong các từ ghép với 'ride' ở đây là 'boat ride' (chuyến đi bằng thuyền).", ww: "Ô tô và tàu hỏa không đi trên mặt nước được. Máy bay có thể bay đến đảo nhưng người ta dùng cụm 'flight' chứ ít dùng 'plane ride' cho khoảng cách trên hồ." },
        { q: "Niagara Falls is one of the most spectacular_______ in the world.", o: [["waterfalls", "thác nước"], ["forests", "khu rừng"], ["mountains", "ngọn núi"], ["beaches", "bãi biển"]], a: 0, trans: "Thác Niagara là một trong những thác nước ngoạn mục nhất thế giới.", wc: "Ngay trong tên riêng 'Niagara Falls' đã có từ 'Falls' nghĩa là thác nước, nên danh từ chung để phân loại nó bắt buộc phải là 'waterfalls'.", ww: "Nó không phải là rừng, núi, hay bãi biển." },
        { q: "Scottish men always wear _______ at their traditional festivals.", o: [["shirts", "áo sơ mi"], ["kilts", "váy sọc caro nam"], ["pants", "quần dài"], ["shorts", "quần đùi"]], a: 1, trans: "Đàn ông Scotland luôn mặc váy sọc ca-rô truyền thống (kilts) tại các lễ hội truyền thống của họ.", wc: "Trang phục truyền thống nổi tiếng thế giới của đàn ông Scotland là 'kilts' (một loại váy xếp ly kẻ sọc).", ww: "Áo sơ mi, quần dài, hay quần đùi là trang phục bình thường, không phải đặc trưng văn hóa lễ hội riêng biệt của đàn ông Scotland." },
        { q: "A (n) __________ is a body of land surrounded by water.", o: [["mountain", "ngọn núi"], ["island", "hòn đảo"], ["cave", "hang động"], ["beach", "bãi biển"]], a: 1, trans: "Đảo là một vùng đất được bao quanh bởi nước.", wc: "Định nghĩa địa lý cơ bản: vùng đất (body of land) nằm giữa và bao quanh bởi nước (surrounded by water) chính là hòn đảo (island).", ww: "Núi (nhô cao), hang động (nằm trong lòng đất/núi), bãi biển (nằm ven nước) đều không khớp với định nghĩa 'bao quanh bởi nước'." },
        { q: "The tranquil beauty of the village scenery is __________.", o: [["high", "cao"], ["clear", "trong trẻo/rõ ràng"], ["unique", "độc đáo"], ["friendly", "thân thiện"]], a: 2, trans: "Vẻ đẹp thanh bình của phong cảnh ngôi làng thật độc đáo.", wc: "Tính từ 'unique' (độc đáo, có một không hai) dùng để miêu tả vẻ đẹp đặc sắc (beauty) của phong cảnh rất hợp lý.", ww: "Vẻ đẹp không thể 'cao' (high). 'Clear' thường tả thời tiết/nước. 'Friendly' dùng tả con người chứ không tả phong cảnh." },
        { q: "Most __________ live in cities along the coast, such as Sydney, Melbourne, and Brisbane.", o: [["Austria", "Nước Áo"], ["Australia", "Nước Úc"], ["Australian", "Người Úc (số ít) / Tính từ"], ["Australians", "Người Úc (số nhiều)"]], a: 3, trans: "Hầu hết người Úc sống ở các thành phố dọc theo bờ biển, chẳng hạn như Sydney, Melbourne và Brisbane.", wc: "LƯU Ý CỦA GIÁO VIÊN: Mặc dù trong hình ảnh có thể gạch chân nhầm đáp án C, nhưng chuẩn ngữ pháp tuyệt đối phải là D (Australians - danh từ số nhiều) vì động từ 'live' chia số nhiều và 'Most + N(s/es)' mang nghĩa hầu hết ai đó.", ww: "A và B là tên quốc gia (không thể 'sống'). C là tính từ hoặc danh từ số ít, không phù hợp sau 'Most' để đi với động từ số nhiều 'live'." },
        { q: "Singapore is famous for its _______ and green trees.", o: [["cleanliness", "sự sạch sẽ"], ["cleanly", "một cách sạch sẽ (trạng từ)"], ["cleaning", "việc dọn dẹp"], ["clean", "sạch sẽ (tính từ)"]], a: 0, trans: "Singapore nổi tiếng với sự sạch sẽ và cây xanh.", wc: "Sau giới từ 'for' và tính từ sở hữu 'its' cần một danh từ. 'Cleanliness' là danh từ chỉ sự sạch sẽ, kết hợp song song với danh từ 'green trees' phía sau bằng chữ 'and'.", ww: "'Cleanly' là trạng từ, 'clean' là tính từ. 'Cleaning' là động từ dạng V-ing mang nghĩa hành động dọn dẹp, không phải danh từ trừu tượng chỉ trạng thái như 'cleanliness'." },
        { q: "On Christmas Eve, most big cities, especially London are _______ with colored lights across the streets and enormous Christmas Trees.", o: [["decorated", "được trang trí"], ["hand", "cầm/trao tay"], ["put", "đặt/để"], ["made", "được làm"]], a: 0, trans: "Vào đêm Giáng sinh, hầu hết các thành phố lớn, đặc biệt là London, đều được trang trí bằng đèn màu khắp các con phố và những cây thông Noel khổng lồ.", wc: "Cấu trúc bị động 'are decorated with' (được trang trí với cái gì) rất phổ biến và hợp ngữ cảnh dùng đèn và cây thông để làm đẹp thành phố.", ww: "Không thể dùng 'are hand/put/made with colored lights' trong ngữ cảnh làm đẹp dịp lễ hội này." },
        { q: "In the United States, there are 50 _______ and six different time zones across the country.", o: [["states", "tiểu bang"], ["nations", "quốc gia"], ["towns", "thị trấn"], ["countries", "đất nước"]], a: 0, trans: "Ở Hoa Kỳ, có 50 tiểu bang và sáu múi giờ khác nhau trên khắp đất nước.", wc: "Kiến thức thực tế: Hoa Kỳ (United States) được cấu thành từ 50 tiểu bang (states).", ww: "Mỹ là một quốc gia (nation/country) nên không thể chứa 50 quốc gia bên trong. Mỹ cũng có hàng ngàn thị trấn (towns) chứ không chỉ 50." },
        { q: "I once tried to _______ an apple pie when I was in London. It was really delicious.", o: [["do", "làm (nói chung)"], ["cook", "nấu ăn"], ["make", "làm ra/tạo ra"], ["show", "chỉ ra"]], a: 2, trans: "Tôi đã từng thử làm một chiếc bánh táo khi ở London. Nó thực sự rất ngon.", wc: "Collocation bắt buộc: 'make a pie / make a cake' (làm bánh). 'Make' dùng cho việc tạo ra một sản phẩm từ các nguyên liệu.", ww: "'Do' không dùng với các món bánh cụ thể. 'Cook' thường dùng cho bữa ăn nói chung (cook a meal) hoặc nấu món mặn. 'Show' sai nghĩa hoàn toàn." },
        { q: "You should go to Canada in the summer because it is the most popular time for visitors to _______Niagara Falls and see the beautiful sights there.", o: [["stay", "ở lại"], ["look", "nhìn"], ["tour", "đi theo tour"], ["visit", "thăm quan"]], a: 3, trans: "Bạn nên đến Canada vào mùa hè vì đây là thời điểm phổ biến nhất để du khách đến thăm thác Niagara và ngắm nhìn những cảnh đẹp nơi đây.", wc: "Động từ 'visit' (đến thăm) đi trực tiếp với danh từ chỉ địa điểm (Niagara Falls) mà không cần giới từ. 'visit somewhere'.", ww: "'stay' phải đi với 'at/in'. 'look' phải đi với 'at'. 'tour' thường đóng vai trò danh từ, nếu làm động từ thì ít đi trực tiếp hoặc nghe không tự nhiên bằng 'visit'." },

    let score = 0;
    let answeredCount = 0;

    // --- 2. HỆ THỐNG ÂM THANH (Web Audio API) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
    }

    function playSound(type) {
        if (!audioCtx) initAudio();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
            osc.frequency.exponentialRampToValueAtTime(1108.73, audioCtx.currentTime + 0.1); // C#6
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    // --- 3. HIỆU ỨNG PHÁO GIẤY (Confetti) ---
    function shootConfetti() {
        const emojis = ['🎉', '✨', '🌟', '🍍', '🍉', '☀️'];
        for(let i=0; i<30; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti-piece';
            conf.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.top = '-50px';
            conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 3000);
        }
    }

    // --- 4. THÊM HỌA TIẾT NỀN SUMMER TỰ ĐỘNG ---
    function createBackgroundPatterns() {
        const patterns = ['🌴', '☀️', '🍍', '🥥', '🌊', '🍉', '🍦', '🏖️'];
        const container = document.getElementById('patternBox');
        for(let i=0; i<25; i++) {
            const icon = document.createElement('div');
            icon.className = 'floating-icon';
            icon.innerText = patterns[Math.floor(Math.random() * patterns.length)];
            icon.style.left = Math.random() * 100 + 'vw';
            icon.style.animationDuration = (Math.random() * 15 + 10) + 's';
            icon.style.animationDelay = (Math.random() * 10) + 's';
            icon.style.fontSize = (Math.random() * 2 + 1.5) + 'rem';
            container.appendChild(icon);
        }
    }

    // --- 5. RENDER CÂU HỎI & XỬ LÝ LỘ TRÌNH ---
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function renderQuiz() {
        const container = document.getElementById('quizContainer');
        
        rawData.forEach((item, index) => {
            const correctText = item.o[item.a][0]; // Lấy chữ tiếng Anh của đáp án đúng để đối chiếu sau khi trộn
            
            // Clone và trộn đáp án
            let shuffledOptions = [...item.o];
            shuffle(shuffledOptions);

            const card = document.createElement('div');
            card.className = 'question-card';
            
            // Chèn câu hỏi
            const qText = `<div class="question-text">Question ${index + 1}: ${item.q.replace('_______', '<b>_______</b>')}</div>`;
            
            // Tạo grid nút bấm
            let btnsHtml = `<div class="options-grid" id="opts_${index}">`;
            shuffledOptions.forEach((opt, optIndex) => {
                const isCorrect = opt[0] === correctText;
                btnsHtml += `<button class="option-btn" onclick="checkAnswer(this, ${index}, ${isCorrect})">
                                ${String.fromCharCode(65 + optIndex)}. ${opt[0]}
                             </button>`;
            });
            btnsHtml += `</div>`;

            // Tạo khung giải thích (ẩn ban đầu)
            let vocabHtml = item.o.map((opt, i) => `<li><b>${String.fromCharCode(65 + i)}. ${opt[0]}:</b> ${opt[1]}</li>`).join('');
            
            const expHtml = `
                <div class="explanation" id="exp_${index}">
                    <div class="exp-step"><span class="exp-title">1. Phân tích từ vựng:</span><br><ul class="vocab-list">${vocabHtml}</ul></div>
                    <div class="exp-step"><span class="exp-title">2. Dịch nghĩa toàn câu:</span><br>${item.trans}</div>
                    <div class="exp-step"><span class="exp-title">3. Tại sao đáp án này ĐÚNG?</span><br>${item.wc}</div>
                    <div class="exp-step"><span class="exp-title">4. Tại sao các đáp án khác SAI?</span><br>${item.ww}</div>
                </div>
            `;

            card.innerHTML = qText + btnsHtml + expHtml;
            container.appendChild(card);
        });
    }

    // Xử lý khi click vào đáp án
    function checkAnswer(btn, qIndex, isCorrect) {
        initAudio(); // Initialize audio context on first user interaction
        
        const grid = document.getElementById(`opts_${qIndex}`);
        const expBox = document.getElementById(`exp_${qIndex}`);
        
        // Khóa tất cả các nút trong câu này
        const allBtns = grid.querySelectorAll('button');
        allBtns.forEach(b => b.disabled = true);

        // Hiển thị kết quả
        if (isCorrect) {
            btn.classList.add('correct');
            playSound('correct');
            shootConfetti();
            score++;
        } else {
            btn.classList.add('wrong');
            playSound('wrong');
            // Tìm và bôi xanh đáp án đúng
            allBtns.forEach(b => {
                if(b.getAttribute('onclick').includes('true')) {
                    b.classList.add('correct');
                }
            });
        }

        // Hiện khung giải thích siêu chi tiết
        expBox.style.display = 'block';
        answeredCount++;
    }

    // Nộp bài và tính điểm
    function submitQuiz() {
        const overlay = document.getElementById('scoreOverlay');
        const scoreSpan = document.getElementById('correctCount');
        const praiseSpan = document.getElementById('praiseText');
        
        scoreSpan.innerText = score;
        
        let praise = "";
        if(score === 40) praise = "🏆 Xuất sắc! Em là Master Tiếng Anh!";
        else if(score >= 35) praise = "🌟 Quá đỉnh! Em làm rất tốt!";
        else if(score >= 25) praise = "🔥 Cố lên xíu nữa nha, bài làm khá lắm!";
        else praise = "💪 Đọc kỹ phần giải thích để tiến bộ hơn nhé!";
        
        praiseSpan.innerText = praise;
        overlay.style.display = 'flex';
        
        if(score >= 20) shootConfetti();
    }

    // Khởi tạo
    window.onload = () => {
        createBackgroundPatterns();
        renderQuiz();
    };
</script>

</body>
</html>
