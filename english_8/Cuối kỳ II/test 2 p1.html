<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Success 8 - End of Term 2 (Gamified)</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;900&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS VARIABLES - PASTEL & NEON PALETTE */
        :root {
            --bg-grad-1: #A18CD1; /* Pastel Purple */
            --bg-grad-2: #FBC2EB; /* Pastel Pink */
            --bg-grad-3: #84FAB0; /* Pastel Green */
            --bg-grad-4: #8FD3F4; /* Pastel Blue */
            
            --btn-correct: #00D26A;
            --btn-correct-shadow: #00A653;
            --btn-wrong: #FF4757;
            --btn-wrong-shadow: #D63031;
            
            --glass-bg: rgba(255, 255, 255, 0.35);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            
            --text-main: #2D3436;
            --text-heading: #6C5CE7;
        }

        /* GLOBAL STYLES */
        * {
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* Dynamic Looping Gradient Background */
            background: linear-gradient(-45deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3), var(--bg-grad-4));
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            color: var(--text-main);
            overflow-x: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FLOATING BACKGROUND PATTERN (STARS & CLOUDS) */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M60 10 L65 45 L100 50 L65 55 L60 90 L55 55 L20 50 L55 45 Z' fill='rgba(255,255,255,0.2)'/%3E%3Ccircle cx='30' cy='90' r='5' fill='rgba(255,255,255,0.3)'/%3E%3Ccircle cx='90' cy='20' r='8' fill='rgba(255,255,255,0.15)'/%3E%3C/svg%3E");
            background-size: 180px 180px;
            animation: floatPattern 40s linear infinite;
        }

        @keyframes floatPattern {
            from { background-position: 0 0; }
            to { background-position: 360px 360px; }
        }

        /* GLASSMORPHISM UTILITY CLASS */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
        }

        /* MODALS */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-card {
            padding: 35px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .shake {
            animation: shakeAnim 0.4s ease-in-out;
        }

        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-12px); }
            40%, 80% { transform: translateX(12px); }
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            font-size: 1.15rem;
            margin: 15px 0;
            outline: none;
            color: var(--text-main);
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--text-heading);
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6C5CE7, #A29BFE);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.25rem;
            font-weight: 900;
            border-radius: 18px;
            cursor: pointer;
            box-shadow: 0 8px 0 #4834D4;
            transition: all 0.2s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 transparent;
        }

        /* MAIN APP CONTAINER */
        #app {
            display: none;
            position: relative;
            z-index: 10;
            max-width: 950px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            padding: 25px 30px;
            text-align: center;
            margin-bottom: 25px;
        }

        .header h3 { margin: 0; color: #444; font-size: 1.15rem; }
        .header h1 { margin: 10px 0 5px 0; color: var(--text-heading); font-size: 2.2rem; font-weight: 900; text-shadow: 2px 2px 4px rgba(255,255,255,0.5);}

        .instruction-text {
            padding: 18px 25px;
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 25px;
            border-left: 8px solid var(--text-heading);
            color: #2D3436;
        }

        .question-card {
            padding: 30px;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* Q29 & Q30 Images rendered by CSS */
        .css-image-container {
            display: flex;
            justify-content: center;
            margin-top: 15px;
            margin-bottom: 25px;
        }

        .sign-no-exit {
            background: #d32f2f;
            color: white;
            padding: 12px;
            border-radius: 12px;
            width: 180px;
            text-align: center;
            border: 5px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2), 0 0 0 3px #d32f2f;
        }
        .sign-no-exit .line1 { font-size: 26px; font-weight: 900; margin-bottom: 6px; font-family: 'Arial', sans-serif;}
        .sign-no-exit .circle { 
            background: white; border-radius: 50%; width: 55px; height: 55px; 
            margin: 0 auto 8px; position: relative; border: 5px solid #d32f2f;
        }
        .sign-no-exit .circle::after {
            content: ''; position: absolute; top: 50%; left: 10%; width: 80%; 
            height: 7px; background: #d32f2f; transform: translateY(-50%);
        }
        .sign-no-exit .line2 { font-size: 16px; font-weight: bold; line-height: 1.2; font-family: 'Arial', sans-serif;}

        .notice-bookshop {
            background: #FFF9C4;
            border: 5px solid #1E88E5;
            border-radius: 0 30px 0 0;
            padding: 20px 30px;
            text-align: center;
            color: #333;
            font-weight: 900;
            font-size: 20px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.15);
        }

        /* OPTIONS */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 18px;
            padding: 18px 22px;
            font-size: 1.15rem;
            font-weight: 800;
            color: #2D3436;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 rgba(255, 255, 255, 0.4);
            text-align: left;
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.03) translateY(-4px);
            background: rgba(255, 255, 255, 0.8);
            border-color: var(--text-heading);
            box-shadow: 0 10px 0 var(--text-heading);
            color: var(--text-heading);
        }

        .option-btn:active:not(:disabled) {
            transform: scale(1) translateY(6px);
            box-shadow: 0 0 0 transparent;
        }

        .option-btn.correct {
            background: var(--btn-correct) !important;
            border-color: white !important;
            color: white !important;
            box-shadow: 0 6px 0 var(--btn-correct-shadow) !important;
            transform: scale(1.02);
        }

        .option-btn.wrong {
            background: var(--btn-wrong) !important;
            border-color: white !important;
            color: white !important;
            box-shadow: 0 6px 0 var(--btn-wrong-shadow) !important;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.85;
        }

        /* EXPLANATION BOX & HIGHLIGHTS */
        .explanation-box {
            display: none;
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.85);
            border-left: 8px solid var(--text-heading);
            border-radius: 15px;
            padding: 22px;
            animation: slideDown 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 1.1rem;
            line-height: 1.7;
            color: #2D3436;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .exp-step { margin-bottom: 12px; }
        .exp-title { font-weight: 900; color: var(--text-heading); margin-bottom: 12px; font-size: 1.2rem; text-transform: uppercase;}
        
        /* CÁC CLASS HIGHLIGHT SIÊU DỄ HIỂU */
        .hl-red { color: #D63031; font-weight: 900; }
        .hl-green { color: #00A653; font-weight: 900; }
        .p-word { color: #0984E3; font-weight: 800; } /* Highlight từ vựng */
        .p-phonetic { color: #6C5CE7; font-weight: 900; background: rgba(108, 92, 231, 0.1); padding: 2px 8px; border-radius: 8px; font-family: 'Arial', sans-serif; display: inline-block; margin: 0 3px;} /* Highlight phiên âm */
        .p-mean { color: #E17055; font-weight: 800; } /* Highlight nghĩa tiếng việt */
        .p-grammar { color: #D63031; font-weight: bold; border-bottom: 2px dashed #D63031; padding-bottom: 2px;} /* Highlight ngữ pháp */

        /* SCORE SUBMIT */
        .submit-container {
            text-align: center;
            margin: 50px 0;
        }

        .btn-submit {
            background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            font-size: 1.6rem;
            padding: 22px 55px;
            border-radius: 35px;
            color: white;
            border: 4px solid rgba(255,255,255,0.5);
            cursor: pointer;
            box-shadow: 0 10px 0 #D63031, 0 15px 25px rgba(0,0,0,0.2);
            font-weight: 900;
            transition: all 0.2s;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn-submit:hover {
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: scale(1) translateY(10px);
            box-shadow: 0 0 0 transparent;
            animation: none;
        }

        /* MEME IMAGE */
        .meme-img {
            width: 100%;
            border-radius: 18px;
            margin-top: 20px;
            object-fit: cover;
            max-height: 280px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 4px solid white;
        }

        .error-msg {
            color: #D63031;
            font-weight: 900;
            display: none;
            margin-top: 10px;
            background: rgba(255,255,255,0.8);
            padding: 8px;
            border-radius: 8px;
        }

        /* CONFETTI CANVAS */
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="pattern-overlay"></div>
    <canvas id="confetti-canvas"></canvas>

    <div id="password-modal" class="modal-overlay">
        <div class="modal-card glass-panel">
            <h2 style="color: var(--text-heading); font-size: 2rem; margin-top:0;">🔒 Lớp Học Bí Mật</h2>
            <p style="font-weight: 800; font-size: 1.1rem; color: #444;">Nhập mật mã để bắt đầu làm bài nhé!</p>
            <input type="password" id="pass-input" placeholder="Nhập mật khẩu...">
            <div id="pass-error" class="error-msg">⚠️ Sai mật khẩu rồi! Thử lại nha.</div>
            <button class="btn-primary" onclick="checkPassword()" style="margin-top: 20px;">🚀 BẮT ĐẦU</button>
        </div>
    </div>

    <div id="name-modal" class="modal-overlay" style="display: none;">
        <div class="modal-card glass-panel">
            <h2 style="color: #FF6B6B; font-size: 2rem; margin-top:0;">🎯 Hoàn Thành!</h2>
            <p style="font-weight: 800; font-size: 1.1rem; color: #444;">Nhập tên của em để xem điểm nhé:</p>
            <input type="text" id="name-input" placeholder="Ví dụ: Nguyễn Văn A...">
            <div id="name-error" class="error-msg">⚠️ Vui lòng nhập tên trước khi xem điểm nhé!</div>
            <button class="btn-primary" onclick="submitName()" style="margin-top: 20px;">🏆 XEM KẾT QUẢ</button>
        </div>
    </div>

    <div id="result-modal" class="modal-overlay" style="display: none;">
        <div class="modal-card glass-panel" style="max-width: 500px;">
            <h2 id="result-title" style="font-size: 1.8rem; margin-top:0;"></h2>
            <p id="result-score" style="font-size: 1.8rem; font-weight: 900; color: var(--text-heading); background: rgba(255,255,255,0.7); padding: 10px; border-radius: 12px;"></p>
            <img id="result-meme" class="meme-img" src="" alt="Meme">
            <button class="btn-primary" onclick="location.reload()" style="margin-top: 25px;">🔄 LÀM LẠI TỪ ĐẦU</button>
        </div>
    </div>

    <div id="app">
        <div class="header glass-panel">
            <h3>Giáo viên tạo: Ms Mai An ULIS</h3>
            <h1>🌟 BÀI KIỂM TRA CUỐI KỲ 2 🌟</h1>
            <h3 style="color: #555; margin-top: 8px; font-weight: 800;">Môn: Tiếng Anh - Global Success 8</h3>
        </div>

        <div id="quiz-container">
            </div>

        <div class="submit-container">
            <button class="btn-submit" onclick="showNameModal()">🎯 NỘP BÀI & XEM KẾT QUẢ 🎯</button>
        </div>
    </div>

<script>
/* ================= AUDIO SYSTEM ================= */
let audioCtx;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playDing() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
}

function playBuzz() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
}

/* ================= CONFETTI SYSTEM ================= */
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let confettis = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function shootConfetti() {
    for (let i = 0; i < 120; i++) {
        confettis.push({
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            r: Math.random() * 8 + 4,
            dx: Math.random() * 24 - 12,
            dy: Math.random() * -25 - 5,
            color: `hsl(${Math.random() * 360}, 100%, 60%)`
        });
    }
    animateConfetti();
}

function animateConfetti() {
    requestAnimationFrame(animateConfetti);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    confettis.forEach((c, index) => {
        c.x += c.dx;
        c.y += c.dy;
        c.dy += 0.6; // gravity
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fillStyle = c.color;
        ctx.fill();
        if (c.y > canvas.height) confettis.splice(index, 1);
    });
}

/* ================= ANTI-F12 / SECURITY ================= */
document.addEventListener('contextmenu', event => event.preventDefault());
document.onkeydown = function(e) {
    if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) {
        return false;
    }
};

const _0x1a2b = [99, 111, 109, 97, 105, 97, 110, 117, 108, 105, 115];

function checkPassword() {
    initAudio(); 
    const input = document.getElementById('pass-input');
    const errorMsg = document.getElementById('pass-error');
    const inputAscii = Array.from(input.value).map(char => char.charCodeAt(0));
    
    let isCorrect = true;
    if (inputAscii.length !== _0x1a2b.length) isCorrect = false;
    else {
        for(let i=0; i<_0x1a2b.length; i++) {
            if(inputAscii[i] !== _0x1a2b[i]) isCorrect = false;
        }
    }

    if(isCorrect) {
        document.getElementById('password-modal').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        playDing();
    } else {
        input.classList.add('shake');
        input.style.borderColor = '#FF4757';
        errorMsg.style.display = 'block';
        playBuzz();
        setTimeout(() => input.classList.remove('shake'), 400);
    }
}
document.getElementById('pass-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') checkPassword();
});

/* ================= QUIZ DATA & EXPLANATIONS ================= */
const instructions = {
    part1: "Mark the letter A, B, C or D on your answer sheet to indicate the word whose underlined part differs from the other three in pronunciation.",
    part2: "Mark the letter A, B, C, or D on your answer sheet to indicate the word that differs from the other three in the position of primary stress.",
    part3: "Mark the letter A, B, C, or D on your answer sheet to indicate the correct answer to each of the following questions.",
    part4: "Put the sentences (a-c) in the correct order, then fill in the blank to make a logical text.",
    part5: "Choose the sentence that can end the text most appropriately.",
    part6: "Mark the letter A, B, C or D on your answer sheet to indicate the sentence that is closest in meaning to the original sentence.",
    part7: "Mark the letter A, B, C or D on your answer sheet to indicate the sentence that is made from the given cues.",
    part8: "Read the following sign or notice and indicate the correct answer."
};

const quizData = [
    {
        id: "Q1", instruction: instructions.part1,
        question: "Question 1.",
        options: [
            { text: "<u>a</u>partment", correct: false },
            { text: "sep<u>a</u>rate", correct: false },
            { text: "<u>a</u>tom", correct: true },
            { text: "expl<u>a</u>nation", correct: false }
        ],
        exp: {
            step1: "Tìm từ có phần gạch chân chữ <span class='p-word'>'A'</span> phát âm khác các từ còn lại.",
            step2: "A. <span class='p-word'>apartment</span> <span class='p-phonetic'>/ə/</span>: <span class='p-mean'>Căn hộ</span><br>B. <span class='p-word'>separate</span> <span class='p-phonetic'>/ə/</span>: <span class='p-mean'>Tách biệt</span><br>C. <span class='p-word'>atom</span> <span class='p-phonetic'>/æ/</span>: <span class='p-mean'>Nguyên tử</span><br>D. <span class='p-word'>explanation</span> <span class='p-phonetic'>/ə/</span>: <span class='p-mean'>Lời giải thích</span>",
            step3: "Chọn <span class='hl-green'>atom</span> vì chữ 'a' ở đây được phát âm là <span class='p-phonetic'>/æ/</span> (a bẹt).",
            step4: "Các đáp án còn lại sai vì phần gạch chân đều được phát âm là âm ơ ngắn <span class='p-phonetic'>/ə/</span>."
        }
    },
    {
        id: "Q2", instruction: instructions.part1,
        question: "Question 2.",
        options: [
            { text: "spo<u>ng</u>e", correct: true },
            { text: "kiddi<u>ng</u>", correct: false },
            { text: "mouldi<u>ng</u>", correct: false },
            { text: "bondi<u>ng</u>", correct: false }
        ],
        exp: {
            step1: "Tìm từ có phần gạch chân <span class='p-word'>'NG'</span> phát âm khác các từ còn lại.",

/* ================= QUIZ LOGIC ================= */
let score = 0;
let answeredCount = 0;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';
    let currentInstruction = '';

    quizData.forEach((item, index) => {
        if (item.instruction !== currentInstruction) {
            currentInstruction = item.instruction;
            const instDiv = document.createElement('div');
            instDiv.className = 'instruction-text glass-panel';
            instDiv.innerText = currentInstruction;
            container.appendChild(instDiv);
        }

        const card = document.createElement('div');
        card.className = 'question-card glass-panel';
        card.id = `card-${index}`;

        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.innerHTML = item.question;
        card.appendChild(qText);

        const optionsGrid = document.createElement('div');
        optionsGrid.className = 'options-grid';
        
        let shuffledOptions = [...item.options];
        shuffleArray(shuffledOptions);

        shuffledOptions.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = opt.text;
            btn.onclick = () => handleAnswer(btn, opt.correct, index, optionsGrid);
            optionsGrid.appendChild(btn);
        });
        card.appendChild(optionsGrid);

        const expBox = document.createElement('div');
        expBox.className = 'explanation-box';
        expBox.id = `exp-${index}`;
        expBox.innerHTML = `
            <div class="exp-title">📚 GIẢI THÍCH CHI TIẾT:</div>
            <div class="exp-step"><b>1. Dịch / Phân tích:</b> ${item.exp.step1}</div>
            <div class="exp-step"><b>2. Ý nghĩa các đáp án:</b><br>${item.exp.step2}</div>
            <div class="exp-step"><b>3. Tại sao đúng?</b><br>${item.exp.step3}</div>
            <div class="exp-step"><b>4. Tại sao sai?</b><br><span class="hl-red">${item.exp.step4}</span></div>
        `;
        card.appendChild(expBox);

        container.appendChild(card);
    });
}

function handleAnswer(btn, isCorrect, qIndex, grid) {
    const buttons = grid.querySelectorAll('.option-btn');
    buttons.forEach(b => b.disabled = true);

    if (isCorrect) {
        btn.classList.add('correct');
        score++;
        playDing();
        shootConfetti();
    } else {
        btn.classList.add('wrong');
        btn.classList.add('shake');
        playBuzz();
        buttons.forEach(b => {
            let originalOpt = quizData[qIndex].options.find(o => o.text === b.innerHTML);
            if(originalOpt && originalOpt.correct) {
                b.style.border = "4px solid var(--btn-correct)";
                b.style.color = "var(--btn-correct)";
                b.style.background = "rgba(255,255,255,0.9)";
            }
        });
    }

    document.getElementById(`exp-${qIndex}`).style.display = 'block';
    answeredCount++;
}

/* ================= RESULT & MEME LOGIC ================= */
function showNameModal() {
    if(answeredCount < quizData.length) {
        if(!confirm("⚠️ Em chưa làm hết các câu hỏi. Em có chắc chắn muốn nộp bài sớm không?")) return;
    }
    document.getElementById('name-modal').style.display = 'flex';
}

function submitName() {
    const nameInput = document.getElementById('name-input');
    const nameError = document.getElementById('name-error');
    if(nameInput.value.trim() === '') {
        nameInput.style.borderColor = '#FF4757';
        nameInput.classList.add('shake');
        nameError.style.display = 'block';
        setTimeout(() => nameInput.classList.remove('shake'), 400);
        return;
    }

    document.getElementById('name-modal').style.display = 'none';
    showResult(nameInput.value.trim());
}
document.getElementById('name-input').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') submitName();
});

function showResult(studentName) {
    const total = quizData.length;
    const percent = Math.round((score / total) * 100);
    const resultModal = document.getElementById('result-modal');
    const title = document.getElementById('result-title');
    const scoreText = document.getElementById('result-score');
    const memeImg = document.getElementById('result-meme');

    resultModal.style.display = 'flex';
    scoreText.innerText = `Điểm số: ${score} / ${total} (${percent}%)`;

    if (percent === 100) {
        title.innerText = `🌟 THIÊN TÀI! ${studentName} xuất sắc tuyệt đối!`;
        title.style.color = '#00A653';
        memeImg.src = 'https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif'; 
        shootConfetti();
        setInterval(shootConfetti, 1500); 
        playDing();
    } else if (percent >= 60) {
        title.innerText = `👏 RẤT TỐT! ${studentName} đã rất cố gắng!`;
        title.style.color = '#6C5CE7';
        memeImg.src = 'https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif'; 
        playDing();
    } else {
        title.innerText = `💪 CỐ LÊN NHÉ! ${studentName} cần luyện tập thêm!`;
        title.style.color = '#FF4757';
        memeImg.src = 'https://media.giphy.com/media/OPU6wzx8JlNyc/giphy.gif'; 
        playBuzz();
    }
}

window.onload = () => {
    renderQuiz();
}
</script>
