<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ĐỀ 08 – Tiếng Anh HK2 – Global Success 8</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #f06292;
  --purple: #8854C0;
  --yellow: #FDCB6E;
  --teal: #00C9A7;
  --blue: #4A90E2;
  --green-ok: #00D26A;
  --red-err: #FF4757;
  --glass: rgba(255,255,255,0.18);
  --glass-border: rgba(255,255,255,0.35);
  --shadow: 0 8px 32px rgba(80,40,120,0.18);
  --radius: 18px;
  --font-main: 'Nunito', 'Quicksand', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family: var(--font-main);
  min-height: 100vh;
  overflow-x: hidden;
  background: #a18cd1;
  position: relative;
}

/* === ANIMATED GRADIENT BG === */
.bg-gradient {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: linear-gradient(135deg, #f8a4c8, #8854C0, #FDCB6E, #00C9A7, #4A90E2, #f06292, #a18cd1);
  background-size: 400% 400%;
  animation: bgMove 14s ease infinite;
}
@keyframes bgMove {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* === SVG PATTERN OVERLAY === */
.bg-pattern {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.bg-pattern svg {
  width: 100%; height: 100%;
  opacity: 0.13;
  animation: patternFloat 20s ease-in-out infinite alternate;
}
@keyframes patternFloat {
  0%{transform:translateY(0) rotate(0deg);}
  100%{transform:translateY(-30px) rotate(3deg);}
}

/* === MAIN CONTENT === */
.container {
  position: relative;
  z-index: 2;
  max-width: 820px;
  margin: 0 auto;
  padding: 18px 14px 60px;
}

/* === HEADER === */
.header {
  text-align: center;
  margin-bottom: 22px;
  background: rgba(255,255,255,0.22);
  backdrop-filter: blur(14px);
  border: 1.5px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 14px 18px 10px;
  box-shadow: var(--shadow);
}
.header h1 {
  font-size: 1.45rem;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 2px 8px rgba(100,0,120,0.25);
  letter-spacing: 0.5px;
}
.header .subtitle {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.88);
  margin-top: 3px;
  font-weight: 600;
}
.header .teacher {
  font-size: 0.78rem;
  color: #FDCB6E;
  font-weight: 700;
  margin-top: 2px;
  letter-spacing: 0.3px;
}

/* === SECTION LABEL === */
.section-label {
  font-size: 0.82rem;
  font-weight: 800;
  color: #fff;
  background: rgba(136,84,192,0.55);
  border-radius: 10px;
  padding: 5px 14px;
  margin: 18px 0 10px;
  display: inline-block;
  letter-spacing: 0.2px;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.3);
}

/* === QUESTION CARD === */
.q-card {
  background: var(--glass);
  backdrop-filter: blur(16px);
  border: 1.5px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 20px 20px 16px;
  margin-bottom: 18px;
  box-shadow: var(--shadow);
}
.q-num {
  font-size: 0.72rem;
  font-weight: 800;
  color: var(--yellow);
  background: rgba(100,50,180,0.4);
  border-radius: 8px;
  padding: 2px 10px;
  display: inline-block;
  margin-bottom: 7px;
  letter-spacing: 0.5px;
}
.q-text {
  font-size: 1.15rem;
  font-weight: 700;
  color: #fff;
  line-height: 1.55;
  margin-bottom: 14px;
  text-shadow: 0 1px 4px rgba(60,0,100,0.18);
}
.q-text u { text-decoration: underline; text-underline-offset: 3px; color: #FDCB6E; }

/* === SIGN DRAWING === */
.sign-no-dogs {
  display: flex;
  align-items: center;
  justify-content: center;
  background: white;
  border-radius: 10px;
  padding: 12px 18px;
  margin: 10px auto 14px;
  max-width: 200px;
  border: 3px solid #ccc;
  flex-direction: column;
  gap: 6px;
}
.sign-circle-crossed {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 6px solid #e53935;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  background: #fff;
}
.sign-circle-crossed::after {
  content: '';
  position: absolute;
  width: 100%; height: 6px;
  background: #e53935;
  transform: rotate(-45deg);
  top: 50%; margin-top: -3px;
}
.dog-icon { font-size: 2.2rem; position: relative; z-index: 1; }
.sign-text { font-weight: 900; font-size: 1rem; color: #222; text-align: center; letter-spacing: 0.5px; }

/* Note card for Max */
.note-card {
  background: #f0f0f0;
  border-left: 6px solid #aaa;
  border-radius: 10px;
  padding: 14px 16px;
  margin: 8px auto 14px;
  max-width: 360px;
  font-family: Georgia, serif;
  font-style: italic;
  color: #333;
  font-size: 1rem;
  line-height: 1.65;
}
.note-card .note-sig { text-align: right; font-weight: bold; margin-top: 6px; font-style: normal; }

/* === ANSWER CARDS === */
.answers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media(max-width:520px){ .answers{grid-template-columns:1fr;} }

.ans-btn {
  background: rgba(255,255,255,0.28);
  border: 2px solid rgba(255,255,255,0.45);
  border-radius: 15px;
  padding: 13px 15px;
  font-family: var(--font-main);
  font-size: 1.08rem;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  text-align: left;
  transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
  box-shadow: 0 5px 16px rgba(80,40,120,0.18), 0 2px 0 rgba(0,0,0,0.08);
  position: relative;
  overflow: hidden;
  line-height: 1.4;
  text-shadow: 0 1px 3px rgba(0,0,0,0.18);
}
.ans-btn:hover:not(:disabled) {
  transform: scale(1.045) translateY(-2px);
  box-shadow: 0 10px 28px rgba(80,40,120,0.28), 0 3px 0 rgba(0,0,0,0.1);
  background: rgba(255,255,255,0.38);
}
.ans-btn.correct {
  background: var(--green-ok) !important;
  border-color: #00b359 !important;
  color: #fff !important;
  box-shadow: 0 6px 20px rgba(0,210,106,0.4) !important;
  transform: scale(1.04);
}
.ans-btn.wrong {
  background: var(--red-err) !important;
  border-color: #cc1a2a !important;
  color: #fff !important;
  box-shadow: 0 6px 20px rgba(255,71,87,0.4) !important;
}
.ans-btn.disabled-plain {
  background: rgba(255,255,255,0.12) !important;
  color: rgba(255,255,255,0.5) !important;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}
.ans-btn:disabled { cursor: not-allowed; }

@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-7px)}
  40%{transform:translateX(7px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
.shake { animation: shake 0.45s ease; }

/* === EXPLANATION BOX === */
.explanation {
  margin-top: 14px;
  background: rgba(255,255,255,0.92);
  border-radius: 13px;
  padding: 16px 18px;
  font-size: 1rem;
  color: #333;
  line-height: 1.7;
  display: none;
  box-shadow: 0 4px 16px rgba(80,40,120,0.12);
  border-left: 5px solid var(--purple);
}
.explanation.show { display: block; animation: fadeIn 0.35s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.explanation h4 {
  font-size: 0.9rem;
  font-weight: 800;
  color: var(--purple);
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}

/* Color classes for explanation */
span.p-word { color: #1a73e8; font-weight: 700; }
span.p-phonetic { color: #7c4dff; background: #ede7f6; border-radius: 4px; padding: 0 4px; font-style: italic; }
span.p-mean { color: #bf360c; font-weight: 600; }
span.p-grammar { color: #c62828; text-decoration: underline; text-decoration-color: #c62828; font-weight: 600; }
span.hl-green { color: #1b5e20; font-weight: 800; }
span.hl-red { color: #b71c1c; font-weight: 700; text-decoration: line-through; }

/* Vietnamese translation highlight */
.vn-trans {
  background: #fff3e0;
  border-left: 4px solid #ff9800;
  border-radius: 6px;
  padding: 6px 12px;
  margin: 6px 0;
  font-weight: 700;
  color: #6d3200;
  font-size: 0.97rem;
}

/* === SUBMIT BUTTON === */
.submit-area {
  text-align: center;
  margin-top: 32px;
}
.submit-btn {
  background: linear-gradient(135deg, #FDCB6E, #f06292, #8854C0);
  border: none;
  border-radius: 18px;
  padding: 16px 44px;
  font-family: var(--font-main);
  font-size: 1.25rem;
  font-weight: 900;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 8px 28px rgba(136,84,192,0.38), 0 4px 0 rgba(100,40,140,0.3);
  transition: transform 0.18s, box-shadow 0.18s;
  letter-spacing: 0.5px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.submit-btn:hover {
  transform: scale(1.06) translateY(-3px);
  box-shadow: 0 14px 36px rgba(136,84,192,0.5), 0 5px 0 rgba(100,40,140,0.3);
}

/* === MODALS === */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(40,10,80,0.65);
  backdrop-filter: blur(6px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  display: none;
}
.modal-overlay.open { display: flex; animation: fadeIn 0.3s ease; }

.modal-box {
  background: rgba(255,255,255,0.97);
  border-radius: 22px;
  padding: 32px 28px;
  max-width: 420px;
  width: 92%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(80,40,120,0.35);
  position: relative;
}
.modal-box h2 {
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--purple);
  margin-bottom: 10px;
}
.modal-box p { color: #555; font-size: 0.97rem; margin-bottom: 16px; }

.name-input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid #ddd;
  border-radius: 12px;
  font-family: var(--font-main);
  font-size: 1rem;
  font-weight: 600;
  color: #333;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 10px;
}
.name-input:focus { border-color: var(--purple); }
.name-input.error { border-color: var(--red-err); }
.name-error { color: var(--red-err); font-size: 0.85rem; font-weight: 700; display: none; margin-bottom: 8px; }
.name-error.show { display: block; }

.modal-btn {
  background: linear-gradient(135deg, #8854C0, #f06292);
  border: none;
  border-radius: 14px;
  padding: 12px 36px;
  font-family: var(--font-main);
  font-size: 1.05rem;
  font-weight: 800;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(136,84,192,0.35);
  transition: transform 0.15s;
  margin-top: 6px;
}
.modal-btn:hover { transform: scale(1.05); }

/* Result modal */
.result-greeting {
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--purple);
  margin-bottom: 12px;
  line-height: 1.4;
}
.result-score {
  font-size: 3rem;
  font-weight: 900;
  background: linear-gradient(135deg, #8854C0, #f06292, #FDCB6E);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin: 10px 0;
}
.result-gif {
  width: 200px;
  height: 160px;
  border-radius: 14px;
  margin: 14px auto;
  object-fit: cover;
  display: block;
}
.retry-btn {
  background: linear-gradient(135deg, #00C9A7, #4A90E2);
  border: none;
  border-radius: 14px;
  padding: 11px 30px;
  font-family: var(--font-main);
  font-size: 1rem;
  font-weight: 800;
  color: #fff;
  cursor: pointer;
  margin-top: 10px;
  box-shadow: 0 5px 16px rgba(0,180,150,0.3);
}
.retry-btn:hover { transform: scale(1.05); }

/* === CONFETTI === */
.confetti-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 200;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 10px; height: 10px;
  opacity: 0;
  animation: confettiFall 1.6s ease-out forwards;
}
@keyframes confettiFall {
  0%{opacity:1;transform:translateY(-40px) rotate(0deg);}
  100%{opacity:0;transform:translateY(400px) rotate(720deg);}
}

/* Score progress bar */
.score-bar-wrap { background: #eee; border-radius: 10px; height: 12px; margin: 10px 0; overflow: hidden; }
.score-bar { height: 100%; border-radius: 10px; background: linear-gradient(90deg,#00C9A7,#8854C0); transition: width 1s ease; }

/* GIAO DIỆN MÀN HÌNH KHÓA */
#passwordModal {
  position:fixed; inset:0; z-index:9999;
  display:flex; align-items:center; justify-content:center;
  background:rgba(5,2,15,0.92); backdrop-filter:blur(20px);
}
.pw-card {
  background:linear-gradient(160deg, rgba(40,10,70,0.95) 0%, rgba(15,5,30,0.98) 100%);
  border:1.5px solid rgba(240,192,64,0.4); border-radius:24px; padding:48px 40px 40px; 
  max-width:440px; width:93%; text-align:center; position:relative; overflow:hidden;
  box-shadow:0 0 60px rgba(106,5,114,0.6), 0 0 120px rgba(240,192,64,0.1), inset 0 1px 0 rgba(240,192,64,0.15);
}
.pw-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, #6A0572, #F0C040, #6A0572);
}
.pw-crest { font-size:4rem; margin-bottom:8px; display:block; }
.pw-title { font-family:'Cinzel', serif; font-size:1.4rem; font-weight:700; color:#F0C040; margin-bottom:6px; letter-spacing:1px; }
.pw-sub   { font-size:.87rem; color:rgba(200,200,212,0.6); margin-bottom:24px; }
.pw-input {
  width:100%; padding:13px 20px; border-radius:12px;
  border:1.5px solid rgba(240,192,64,0.3); background:rgba(255,255,255,0.05);
  color:#FFE082; font-size:1rem; font-family:'Nunito', sans-serif;
  outline:none; letter-spacing:3px; text-align:center; transition:all .3s;
}
.pw-input:focus { border-color:#F0C040; box-shadow:0 0 0 3px rgba(240,192,64,0.15); }
.pw-input.error { border-color:#FF4757; box-shadow:0 0 0 3px rgba(255,71,87,0.25); animation:shake .4s ease; }
.pw-input::placeholder { color:rgba(200,200,212,0.3); letter-spacing:1px; }
.pw-btn {
  width:100%; padding:14px; margin-top:14px; border-radius:12px; border:none;
  background:linear-gradient(135deg, #6A0572 0%, #9B1FA8 40%, #F0C040 100%);
  color:#fff; font-size:1rem; font-weight:700; font-family:'Cinzel', serif;
  cursor:pointer; letter-spacing:.5px; transition:transform .2s;
}
.pw-btn:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(106,5,114,0.7); }
.pw-err { color:#ff8a9a; font-size:.84rem; margin-top:10px; display:none; font-weight:700; }
@keyframes shake { 0%,100%{transform:translateX(0)} 15%,45%,75%{transform:translateX(-6px)} 30%,60%,90%{transform:translateX(6px)} }
</style>
</head>
<body>

<div id="passwordModal">
  <div class="pw-card">
    <span class="pw-crest">🔒</span>
    <div class="pw-title">BẢO MẬT</div>
    <div class="pw-sub">Vui lòng nhập mật khẩu để làm bài</div>
    <input type="password" class="pw-input" id="pwInput" placeholder="Nhập mật khẩu..." autocomplete="off" />
    <button class="pw-btn" onclick="checkPassword()">XÁC NHẬN</button>
    <div class="pw-err" id="pwErr">Mật khẩu không đúng! Vui lòng thử lại.</div>
  </div>
</div>

<div class="bg-gradient"></div>
<div class="bg-pattern">
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <text x="40" y="80" font-size="48" fill="#fff">🚀</text>
  <text x="200" y="50" font-size="36" fill="#FDCB6E">⭐</text>
  <text x="380" y="90" font-size="44" fill="#fff">📚</text>
  <text x="560" y="60" font-size="38" fill="#00C9A7">🌍</text>
  <text x="700" y="100" font-size="42" fill="#f06292">✏️</text>
  <text x="80" y="200" font-size="36" fill="#FDCB6E">🎓</text>
  <text x="650" y="220" font-size="44" fill="#fff">🌟</text>
  <text x="300" y="300" font-size="50" fill="rgba(255,255,255,0.5)">🎉</text>
  <text x="500" y="350" font-size="36" fill="#FDCB6E">🔬</text>
  <text x="100" y="400" font-size="42" fill="#00C9A7">🎯</text>
  <text x="720" y="400" font-size="40" fill="#f06292">🏆</text>
  <text x="250" y="500" font-size="38" fill="#fff">💡</text>
  <text x="600" y="520" font-size="44" fill="#FDCB6E">📱</text>
  <text x="50" y="560" font-size="36" fill="#8854C0">🌙</text>
  <text x="430" y="570" font-size="40" fill="#00C9A7">🎵</text>
  <circle cx="150" cy="300" r="60" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <circle cx="650" cy="150" r="45" fill="none" stroke="rgba(253,203,110,0.4)" stroke-width="2"/>
  <circle cx="400" cy="450" r="80" fill="none" stroke="rgba(0,201,167,0.25)" stroke-width="2"/>
</svg>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<div class="container">
  <div class="header">
    <h1>📝 ĐỀ 08 – THI CUỐI KỲ 2</h1>
    <div class="subtitle">Môn: Tiếng Anh · Global Success 8</div>
    <div class="teacher">👩‍🏫 Giáo viên tạo: Ms Mai An – ULIS</div>
  </div>

  <div id="quizContainer"></div>

  <div class="submit-area">
    <button class="submit-btn" onclick="openSubmitModal()">🎯 NỘP BÀI &amp; XEM KẾT QUẢ</button>
  </div>
</div>

<div class="modal-overlay" id="submitModal">
  <div class="modal-box">
    <h2>✍️ Nhập tên của bạn</h2>
    <p>Điền tên để xem kết quả cá nhân hoá nhé!</p>
    <input type="text" class="name-input" id="nameInput" placeholder="Ví dụ: Nguyễn Văn A..." onkeydown="if(event.key==='Enter')doSubmit()">
    <div class="name-error" id="nameError">⚠️ Bạn chưa nhập tên! Điền tên vào nhé.</div>
    <br>
    <button class="modal-btn" onclick="doSubmit()">🚀 XEM KẾT QUẢ!</button>
  </div>
</div>

<div class="modal-overlay" id="resultModal">
  <div class="modal-box">
    <div class="result-greeting" id="resultGreeting"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="score-bar-wrap"><div class="score-bar" id="scoreBar" style="width:0%"></div></div>
    <img class="result-gif" id="resultGif" src="" alt="result">
    <div id="resultMsg" style="font-size:1rem;color:#555;margin-top:8px;font-weight:600;"></div>
    <br>
    <button class="retry-btn" onclick="reloadQuiz()">🔄 Làm lại bài</button>
  </div>
</div>

<script>
const _k  = [49, 54, 49, 49]; 
const _pw = _k.map(c => String.fromCharCode(c)).join('');

function checkPassword() {
  const inp = document.getElementById('pwInput');
  const err = document.getElementById('pwErr');
  if (inp.value === _pw) {
    document.getElementById('passwordModal').style.display = 'none';
    const main = document.getElementById('mainContent');
    if(main) main.style.display = 'block';
    
    // Kích hoạt hiệu ứng nếu có
    if(typeof buildStarfield === 'function') buildStarfield();
    if(typeof spawnFloats === 'function') spawnFloats();
    
    // Gắn link file nghe nếu có mã hóa _s
    const audio = document.getElementById('audioPlayer');
    if(audio && typeof _s !== 'undefined') audio.src = atob(_s);
  } else {
    inp.classList.remove('error'); void inp.offsetWidth; inp.classList.add('error');
    err.style.display = 'block'; setTimeout(() => inp.classList.remove('error'), 500);
  }
}
document.addEventListener('DOMContentLoaded', () => {
  const pwInput = document.getElementById('pwInput');
  if(pwInput) pwInput.addEventListener('keydown', e => { if (e.key==='Enter') checkPassword(); });
});

// ============================================================
// QUIZ DATA
// ============================================================
const questions = [
  // ---------- SECTION 1: PRONUNCIATION ----------

// ============================================================
// STATE
// ============================================================
const state = {
  answers: {}, // { qIndex: selectedVal }
  shuffled: {} // { qIndex: shuffled answers array }
};

// ============================================================
// SHUFFLE
// ============================================================
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
// AUDIO
// ============================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playCorrect() {
  const ctx = getAudioCtx();
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.22, ctx.currentTime + i * 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.3);
    osc.start(ctx.currentTime + i * 0.1);
    osc.stop(ctx.currentTime + i * 0.1 + 0.35);
  });
}

function playWrong() {
  const ctx = getAudioCtx();
  [200, 160, 130].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.18, ctx.currentTime + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.2);
    osc.start(ctx.currentTime + i * 0.12);
    osc.stop(ctx.currentTime + i * 0.12 + 0.22);
  });
}

// ============================================================
// CONFETTI
// ============================================================
function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#FF6B9D','#FDCB6E','#00C9A7','#8854C0','#4A90E2','#FF4757','#00D26A'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.top = '-20px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.width = (8 + Math.random() * 8) + 'px';
    piece.style.height = (8 + Math.random() * 8) + 'px';
    piece.style.animationDelay = (Math.random() * 0.6) + 's';
    piece.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 2200);
  }
}

// ============================================================
// RENDER QUIZ
// ============================================================
function renderQuiz() {
  const container = document.getElementById('quizContainer');
  let html = '';
  let currentSection = '';

  questions.forEach((q, idx) => {
    if (q.section && q.section !== currentSection) {
      currentSection = q.section;
      html += `<div class="section-label">${q.section}</div>`;
    }

    // Shuffle answers
    if (!state.shuffled[idx]) {
      state.shuffled[idx] = shuffleArray(q.answers);
    }
    const shuffledAnswers = state.shuffled[idx];

    html += `<div class="q-card" id="qcard-${idx}">
      <div class="q-num">Câu ${q.num}</div>
      <div class="q-text">${q.text}</div>
      <div class="answers" id="answers-${idx}">`;

    shuffledAnswers.forEach(ans => {
      html += `<button class="ans-btn" id="btn-${idx}-${ans.val}" onclick="selectAnswer(${idx}, '${ans.val}')">
        ${ans.label}
      </button>`;
    });

    html += `</div>
      <div class="explanation" id="exp-${idx}">${q.explanation}</div>
    </div>`;
  });

  container.innerHTML = html;
}

// ============================================================
// SELECT ANSWER
// ============================================================
function selectAnswer(qIdx, val) {
  if (state.answers[qIdx] !== undefined) return; // Already answered
  state.answers[qIdx] = val;

  const q = questions[qIdx];
  const isCorrect = val === q.correct;

  // Disable all buttons for this question
  const shuffledAnswers = state.shuffled[qIdx];
  shuffledAnswers.forEach(ans => {
    const btn = document.getElementById(`btn-${qIdx}-${ans.val}`);
    if (!btn) return;
    btn.disabled = true;
    if (ans.val === q.correct) {
      btn.classList.add('correct');
    } else if (ans.val === val) {
      btn.classList.add('wrong');
    } else {
      btn.classList.add('disabled-plain');
    }
  });

  if (isCorrect) {
    playCorrect();
    launchConfetti();
  } else {
    playWrong();
    const wrongBtn = document.getElementById(`btn-${qIdx}-${val}`);
    if (wrongBtn) {
      wrongBtn.classList.add('shake');
      setTimeout(() => wrongBtn.classList.remove('shake'), 500);
    }
  }

  // Show explanation
  const exp = document.getElementById(`exp-${qIdx}`);
  if (exp) exp.classList.add('show');
}

// ============================================================
// SUBMIT
// ============================================================
function openSubmitModal() {
  document.getElementById('submitModal').classList.add('open');
}

function doSubmit() {
  const nameInput = document.getElementById('nameInput');
  const nameError = document.getElementById('nameError');
  const name = nameInput.value.trim();

  if (!name) {
    nameInput.classList.add('error');
    nameError.classList.add('show');
    return;
  }
  nameInput.classList.remove('error');
  nameError.classList.remove('show');

  // Calculate score
  let correct = 0;
  questions.forEach((q, idx) => {
    if (state.answers[idx] === q.correct) correct++;
  });
  const total = questions.length;
  const pct = Math.round((correct / total) * 100);

  // Close submit modal
  document.getElementById('submitModal').classList.remove('open');

  // Build result
  let greeting, gifSrc, msg;
  if (pct === 100) {
    greeting = `🌟 THIÊN TÀI! ${name} xuất sắc tuyệt đối!`;
    gifSrc = 'https://media.giphy.com/media/26u4cqiYI30juCOGY/giphy.gif';
    msg = '🏆 Perfect score! Em giỏi lắm!';
  } else if (pct >= 60) {
    greeting = `👏 TUYỆT VỜI! ${name} làm rất tốt!`;
    gifSrc = 'https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif';
    msg = '💪 Cố gắng thêm để đạt điểm tối đa nhé!';
  } else {
    greeting = `😊 Cố lên ${name}! Lần sau sẽ tốt hơn!`;
    gifSrc = 'https://media.giphy.com/media/26BRuo6sLetdllPAQ/giphy.gif';
    msg = '📚 Ôn lại bài và thử lại nhé!';
  }

  document.getElementById('resultGreeting').innerHTML = greeting;
  document.getElementById('resultScore').innerHTML = `${correct} / ${total} <span style="font-size:1.2rem;color:#888;">(${pct}%)</span>`;
  document.getElementById('resultGif').src = gifSrc;
  document.getElementById('resultMsg').innerHTML = msg;
  document.getElementById('resultModal').classList.add('open');

  setTimeout(() => {
    document.getElementById('scoreBar').style.width = pct + '%';
  }, 300);

  launchConfetti();
}

function reloadQuiz() {
  location.reload();
}

// ============================================================
// INIT
// ============================================================
renderQuiz();
</script>
