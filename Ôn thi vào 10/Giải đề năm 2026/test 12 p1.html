<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Test 12 – Ms Mai An ULIS</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden}

/* ANIMATED GRADIENT */
.bg-gradient{position:fixed;inset:0;z-index:0;background:linear-gradient(-45deg,#8854C0,#FDCB6E,#00C9A7,#FF6B9D,#6C5CE7,#FDCB6E,#00C9A7,#8854C0);background-size:400% 400%;animation:gradMove 12s ease infinite}
@keyframes gradMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* FLOATERS */
.bg-pattern{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.floater{position:absolute;animation:floatUp linear infinite;opacity:0.5}
@keyframes floatUp{0%{transform:translateY(110vh) rotate(0deg);opacity:0.3}100%{transform:translateY(-10vh) rotate(360deg);opacity:0.7}}

/* PASSWORD MODAL */
#pwOverlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(80,40,120,0.85);backdrop-filter:blur(8px)}
.pw-box{background:#fff;border-radius:24px;padding:40px 36px;max-width:380px;width:90%;box-shadow:0 8px 40px rgba(136,84,192,0.45);text-align:center}
.pw-box h2{font-size:1.5rem;color:#8854C0;margin-bottom:6px;font-weight:900}
.pw-box p{color:#888;font-size:0.95rem;margin-bottom:20px}
.pw-box input{width:100%;padding:12px 16px;border:2.5px solid #ccc;border-radius:12px;font-size:1.1rem;font-family:'Nunito',sans-serif;outline:none;transition:.2s}
.pw-box input:focus{border-color:#8854C0}
.pw-err{color:#FF4757;font-size:0.9rem;margin-top:8px;min-height:20px}
.pw-btn{margin-top:16px;width:100%;padding:13px;border:none;border-radius:14px;background:linear-gradient(135deg,#8854C0,#6C5CE7);color:#fff;font-size:1.1rem;font-weight:800;cursor:pointer;box-shadow:0 5px 0 #5a3a9a;transition:.15s;font-family:'Nunito',sans-serif}
.pw-btn:hover{transform:translateY(-2px)}
.pw-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #5a3a9a}

/* MAIN */
#mainContent{display:none;position:relative;z-index:2;padding:20px 16px 60px;max-width:780px;margin:0 auto}

/* HEADER */
.header{text-align:center;padding:16px 24px 12px;background:rgba(255,255,255,0.18);border-radius:20px;margin-bottom:18px;backdrop-filter:blur(6px);border:2px solid rgba(255,255,255,0.4)}
.header h1{font-size:1.3rem;color:#fff;font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,0.2)}
.header .sub{font-size:0.85rem;color:rgba(255,255,255,0.88);margin-top:3px}

/* PROGRESS */
.progress-wrap{background:rgba(255,255,255,0.25);border-radius:20px;height:16px;margin-bottom:6px;overflow:hidden;border:2px solid rgba(255,255,255,0.4)}
.progress-bar{height:100%;background:linear-gradient(90deg,#00D26A,#FDCB6E);border-radius:20px;transition:width .5s ease;width:0%}
.progress-label{text-align:right;color:#fff;font-size:0.82rem;margin-bottom:14px;font-weight:700}

/* SECTION */
.section-title{background:rgba(255,255,255,0.22);color:#fff;border-radius:14px;padding:10px 18px;margin:20px 0 10px;font-size:0.95rem;font-weight:800;border-left:5px solid #FDCB6E;backdrop-filter:blur(4px)}

/* CARD */
.q-card{background:rgba(255,255,255,0.97);border-radius:20px;padding:22px 22px 18px;margin-bottom:18px;box-shadow:0 6px 24px rgba(136,84,192,0.18);border:2px solid rgba(255,255,255,0.7)}
.q-num{font-size:0.82rem;font-weight:800;color:#8854C0;background:#F0E8FF;display:inline-block;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.q-text{font-size:1.15rem;color:#2d3436;font-weight:700;line-height:1.6;margin-bottom:14px}

/* VISUALS */
.notice-box{border:3px solid #2d3436;border-radius:10px;padding:18px 20px;background:#f9f9f9;margin-bottom:16px;max-width:380px}
.notice-box p{font-size:1.1rem;font-weight:900;color:#1a1a1a;line-height:1.6;margin-bottom:4px}
.phone-msg{background:#e8f4fd;border-radius:16px 16px 16px 4px;padding:16px 18px;border:2px solid #bdd5ea;max-width:380px;margin-bottom:16px;font-size:0.95rem;line-height:1.7;color:#2d3436}
.phone-msg .msg-header{font-weight:900;color:#0984e3;margin-bottom:8px;font-size:0.9rem}
.passage-box{background:#FFF9E6;border:2px solid #FDCB6E;border-radius:14px;padding:14px 18px;margin-bottom:14px;font-size:0.97rem;color:#2d3436;line-height:1.75}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{padding:13px 16px;border:2.5px solid #e0d0f5;border-radius:16px;background:#fff;font-size:1.08rem;font-family:'Nunito',sans-serif;font-weight:700;color:#2d3436;cursor:pointer;text-align:left;transition:.18s;box-shadow:0 4px 0 #d0bef0;line-height:1.5}
.opt-btn:hover:not(:disabled){transform:translateY(-2px) scale(1.01);border-color:#8854C0;box-shadow:0 6px 0 #8854C0;background:#f8f0ff}
.opt-btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 #d0bef0}
.opt-btn.correct{background:#00D26A !important;border-color:#00D26A !important;color:#fff !important;box-shadow:0 4px 0 #00a854 !important}
.opt-btn.wrong{background:#FF4757 !important;border-color:#FF4757 !important;color:#fff !important;box-shadow:0 4px 0 #cc1a28 !important;animation:shake .4s ease}
.opt-btn.reveal{background:#c8f5df !important;border-color:#00D26A !important;color:#006b30 !important}
.opt-btn:disabled{cursor:default}

/* EXPLANATION */
.explanation{margin-top:14px;background:linear-gradient(135deg,#f8f0ff,#e8f8ff);border-radius:14px;padding:16px 18px;border-left:5px solid #8854C0;display:none;font-size:1rem;line-height:1.75;color:#2d3436;animation:slideIn .35s ease}
.explanation.show{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.ex-title{font-weight:900;color:#8854C0;font-size:1.05rem;margin-bottom:12px}
.hl-green{color:#00a854;font-weight:800}
.hl-red{color:#e84393;font-weight:800}
.explanation p{margin-bottom:8px}
.explanation ul{margin-left:18px;margin-bottom:8px}
.explanation li{margin-bottom:5px}

/* SUBMIT */
.submit-wrap{text-align:center;margin:30px 0 10px}
.submit-btn{padding:16px 40px;font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,#FF6B9D,#8854C0);color:#fff;border:none;border-radius:20px;cursor:pointer;box-shadow:0 6px 0 #5a3a9a;font-family:'Nunito',sans-serif;transition:.15s}
.submit-btn:hover{transform:translateY(-2px)}
.submit-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #5a3a9a}

/* NAME MODAL */
#nameModal{position:fixed;inset:0;z-index:9000;display:none;align-items:center;justify-content:center;background:rgba(80,40,120,0.78);backdrop-filter:blur(6px)}
#nameModal.show{display:flex}
.name-box{background:#fff;border-radius:24px;padding:36px 32px;max-width:400px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(136,84,192,0.4)}
.name-box h3{font-size:1.4rem;color:#8854C0;margin-bottom:8px;font-weight:900}
.name-box p{color:#888;font-size:0.93rem;margin-bottom:18px}
.name-box input{width:100%;padding:12px 16px;border:2.5px solid #ccc;border-radius:12px;font-size:1.05rem;font-family:'Nunito',sans-serif;outline:none;transition:.2s}
.name-box input:focus{border-color:#8854C0}
.name-box input.err{border-color:#FF4757}
.name-err{color:#FF4757;font-size:0.88rem;margin-top:6px;min-height:18px}
.name-btn{margin-top:14px;width:100%;padding:13px;border:none;border-radius:14px;background:linear-gradient(135deg,#8854C0,#6C5CE7);color:#fff;font-size:1.1rem;font-weight:800;cursor:pointer;box-shadow:0 5px 0 #5a3a9a;font-family:'Nunito',sans-serif}

/* RESULT MODAL */
#resultModal{position:fixed;inset:0;z-index:9000;display:none;align-items:center;justify-content:center;background:rgba(80,40,120,0.85);backdrop-filter:blur(8px);overflow-y:auto;padding:20px}
#resultModal.show{display:flex}
.result-box{background:#fff;border-radius:28px;padding:36px 30px;max-width:440px;width:100%;text-align:center;box-shadow:0 10px 50px rgba(136,84,192,0.5)}
.result-box h2{font-size:1.55rem;color:#8854C0;font-weight:900;margin-bottom:6px;line-height:1.4}
.score-big{font-size:3rem;font-weight:900;color:#FDCB6E;text-shadow:0 3px 10px rgba(0,0,0,0.12);margin:10px 0}
.result-comment{font-size:1rem;color:#636e72;margin-bottom:16px}
.result-meme{width:100%;max-width:280px;border-radius:16px;margin:12px auto;display:block;object-fit:contain}
.close-btn{margin-top:18px;padding:13px 36px;border:none;border-radius:14px;background:linear-gradient(135deg,#00C9A7,#8854C0);color:#fff;font-size:1.1rem;font-weight:800;cursor:pointer;box-shadow:0 5px 0 #5a3a9a;font-family:'Nunito',sans-serif}

/* CONFETTI */
.confetti-piece{position:fixed;z-index:9999;pointer-events:none;border-radius:2px;animation:confettiFall 1.3s ease-out forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(85vh) rotate(720deg) scale(0.4)}}

/* ANIMATIONS */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

@media(max-width:600px){.q-text{font-size:1.05rem}.opt-btn{font-size:1rem}}
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="bg-pattern" id="bgPattern"></div>

<!-- PASSWORD MODAL -->
<div id="pwOverlay">
  <div class="pw-box">
    <div style="font-size:2.8rem;margin-bottom:10px">🔐</div>
    <h2>Practice Test 12</h2>
    <p>Nhập mật khẩu để bắt đầu làm bài nhé!</p>
    <input type="password" id="pwInput" placeholder="Mật khẩu..." autocomplete="off">
    <div class="pw-err" id="pwErr"></div>
    <button class="pw-btn" onclick="checkPw()">🚀 Vào làm bài!</button>
  </div>
</div>

<!-- NAME MODAL -->
<div id="nameModal">
  <div class="name-box">
    <div style="font-size:2.2rem;margin-bottom:8px">✏️</div>
    <h3>Nhập tên của bạn</h3>
    <p>Để kết quả được cá nhân hóa nhé!</p>
    <input type="text" id="nameInput" placeholder="Ví dụ: Nguyễn Văn A..." maxlength="60">
    <div class="name-err" id="nameErr"></div>
    <button class="name-btn" onclick="confirmName()">✅ Xem kết quả!</button>
  </div>
</div>

<!-- RESULT MODAL -->
<div id="resultModal">
  <div class="result-box">
    <h2 id="resultTitle"></h2>
    <div class="score-big" id="resultScore"></div>
    <div class="result-comment" id="resultComment"></div>
    <img class="result-meme" id="resultMeme" src="" alt="meme result">
    <div style="font-size:0.88rem;color:#aaa;margin-top:8px" id="resultDetail"></div>
    <button class="close-btn" onclick="closeResult()">🎉 Đóng</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">
  <div class="header">
    <h1>📚 PRACTICE TEST 12</h1>
    <div class="sub">👩‍🏫 Giáo viên: Ms Mai An – ULIS &nbsp;|&nbsp; ⏱ 60 phút &nbsp;|&nbsp; 20 câu hỏi</div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="progress-label" id="progressLabel">0 / 20 câu đã trả lời</div>
  <div id="quizContainer"></div>
  <div class="submit-wrap">
    <button class="submit-btn" onclick="openNameModal()">🎯 NỘP BÀI &amp; XEM KẾT QUẢ</button>
  </div>
</div>

<script>
// ===== PASSWORD =====
const PW=[115,97,109,116,111,109,98,101,111];
function checkPw(){
  const v=document.getElementById('pwInput').value;
  const ok=PW.map(c=>String.fromCharCode(c)).join('');
  if(v===ok){
    document.getElementById('pwOverlay').style.display='none';
    document.getElementById('mainContent').style.display='block';
    spawnFloaters();
    renderQuiz();
  } else {
    const inp=document.getElementById('pwInput');
    document.getElementById('pwErr').textContent='❌ Sai mật khẩu! Thử lại nhé.';
    inp.style.animation='none';
    inp.offsetHeight;
    inp.style.animation='shake .4s ease';
    inp.style.borderColor='#FF4757';
    setTimeout(()=>{inp.style.borderColor='#ccc';inp.style.animation=''},500);
  }
}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw()});

// ===== FLOATERS =====
function spawnFloaters(){
  const emojis=['⭐','🌸','☁️','🌟','🍭','✨','🦋','🌺','💫','🍀','🎈','🌻','🐱','🎵','🌈','🍎','🎯','💎','🌙','🎪','🍓','🌷','🐝','🎀','🍋','🦄','🌴','🐠'];
  const pat=document.getElementById('bgPattern');
  for(let i=0;i<30;i++){
    const el=document.createElement('div');
    el.className='floater';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=Math.random()*100+'vw';
    el.style.fontSize=(1+Math.random()*1.8)+'rem';
    el.style.animationDuration=(9+Math.random()*15)+'s';
    el.style.animationDelay=(-Math.random()*20)+'s';
    pat.appendChild(el);
  }
}

// ===== UTILS =====
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}
function playDing(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[880,0],[1100,0.12],[1320,0.24]].forEach(([f,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0.3,ctx.currentTime+d);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d+0.65);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+0.7);
    });
  }catch(e){}
}
function playBuzz(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sawtooth';o.frequency.value=150;
    g.gain.setValueAtTime(0.28,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
    o.start();o.stop(ctx.currentTime+0.55);
  }catch(e){}
}
function launchConfetti(){
  const colors=['#FF6B9D','#FDCB6E','#00C9A7','#8854C0','#00D26A','#FF4757','#74b9ff','#fd79a8','#ffeaa7'];
  for(let i=0;i<42;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=(10+Math.random()*80)+'vw';
    el.style.top=(5+Math.random()*25)+'vh';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.width=(6+Math.random()*9)+'px';
    el.style.height=(6+Math.random()*9)+'px';
    el.style.transform=`translateX(${(Math.random()-0.5)*220}px)`;
    el.style.animationDuration=(0.8+Math.random()*0.9)+'s';
    el.style.animationDelay=(Math.random()*0.3)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1600);
  }
}

// ===== QUESTIONS DATA =====
const QUESTIONS=[
  {
    num:1,section:'🔤 PHẦN 1: PHÁT ÂM (Pronunciation)',
    text:'Mark the letter A, B, C, or D to indicate the word whose <u>underlined part</u> differs from the other three in pronunciation.',
    extra:'A.&nbsp;r<u>u</u>bber &nbsp;&nbsp; B.&nbsp;s<u>u</u>ck &nbsp;&nbsp; C.&nbsp;camp<u>u</u>s &nbsp;&nbsp; D.&nbsp;str<u>u</u>cture',
    options:[
      {html:'A. r<u>u</u>bber',correct:false},
      {html:'B. s<u>u</u>ck',correct:false},
      {html:'C. camp<u>u</u>s',correct:true},
      {html:'D. str<u>u</u>cture',correct:false},
    ],
    exp:`<div class="ex-title">📖 Giải thích chi tiết – Câu 1</div>
<p><strong>Phân tích phiên âm từng từ:</strong></p>
<ul>
<li>A. r<u>u</u>bber /ˈrʌbər/ → âm "u" đọc là <span class="hl-green">/ʌ/</span> (ngắn, mạnh)</li>
<li>B. s<u>u</u>ck /sʌk/ → âm "u" đọc là <span class="hl-green">/ʌ/</span></li>
<li><span class="hl-red">C. camp<u>u</u>s /ˈkæmpəs/ → âm "u" đọc là /ə/ (schwa – âm trung tính, nhẹ) ← KHÁC BIỆT</span></li>
<li>D. str<u>u</u>cture /ˈstrʌktʃər/ → âm "u" đọc là <span class="hl-green">/ʌ/</span></li>
</ul>
<p><span class="hl-red">⚡ Quy tắc cần nhớ:</span> Trong <em>campus</em>, âm "u" nằm ở âm tiết KHÔNG được nhấn (unstressed), nên đọc thành âm schwa <strong>/ə/</strong> – nhẹ và ngắn. Còn lại, "u" nằm ở âm tiết được nhấn nên đọc là <strong>/ʌ/</strong> – rõ và mạnh hơn.</p>
<p><span class="hl-green">✅ Đáp án đúng: C. campus /ˈkæmpəs/</span></p>`
  },
  {
    num:2,section:null,
    text:'Mark the letter A, B, C, or D to indicate the word whose <u>underlined part</u> differs from the other three in pronunciation.',
    extra:'A.&nbsp;w<u>ei</u>ght &nbsp;&nbsp; B.&nbsp;l<u>ei</u>sure &nbsp;&nbsp; C.&nbsp;n<u>ei</u>ghbour &nbsp;&nbsp; D.&nbsp;r<u>ei</u>ndeer',
    options:[
      {html:'A. w<u>ei</u>ght',correct:false},
      {html:'B. l<u>ei</u>sure',correct:true},
      {html:'C. n<u>ei</u>ghbour',correct:false},
      {html:'D. r<u>ei</u>ndeer',correct:false},
    ],
    exp:`<div class="ex-title">📖 Giải thích chi tiết – Câu 2</div>
<p><strong>Phân tích phiên âm từng từ:</strong></p>
<ul>
<li>A. w<u>ei</u>ght /weɪt/ → "ei" đọc là <span class="hl-green">/eɪ/</span></li>
<li><span class="hl-red">B. l<u>ei</u>sure /ˈleʒər/ (Anh) hoặc /ˈliːʒər/ (Mỹ) → "ei" KHÔNG đọc /eɪ/ ← KHÁC BIỆT</span></li>
<li>C. n<u>ei</u>ghbour /ˈneɪbər/ → "ei" đọc là <span class="hl-green">/eɪ/</span></li>
<li>D. r<u>ei</u>ndeer /ˈreɪndɪər/ → "ei" đọc là <span class="hl-green">/eɪ/</span></li>
</ul>
<p><span class="hl-red">⚡ Bẫy từ vựng:</span> <em>leisure</em> là từ ngoại lệ phổ biến – "ei" KHÔNG đọc là /eɪ/ như các từ còn lại. Đây là từ rất hay xuất hiện trong đề thi phát âm!</p>
<p><span class="hl-green">✅ Đáp án đúng: B. leisure</span></p>`
  },
  {
    num:3,section:'💬 PHẦN 2: TRỌNG ÂM (Word Stress)',
    text:'Mark the letter A, B, C, or D to indicate the word that differs from the other three in the position of <strong>primary stress</strong>.',
    extra:'A.&nbsp;delivery &nbsp;&nbsp; B.&nbsp;amenity &nbsp;&nbsp; C.&nbsp;optimistic &nbsp;&nbsp; D.&nbsp;experience',
    options:[
      {html:'A. delivery',correct:false},
      {html:'B. amenity',correct:false},
      {html:'C. optimistic',correct:true},
      {html:'D. experience',correct:false},
    ],
    exp:`<div class="ex-title">📖 Giải thích chi tiết – Câu 3</div>
<p><strong>Phân tích trọng âm:</strong></p>
<ul>
<li>A. de-<span class="hl-green">LIV</span>-er-y /dɪˈlɪvəri/ → Nhấn âm tiết <strong>thứ 2</strong></li>
<li>B. a-<span class="hl-green">MEN</span>-i-ty /əˈmenɪti/ → Nhấn âm tiết <strong>thứ 2</strong></li>
<li><span class="hl-red">C. op-ti-<strong>MIS</strong>-tic /ˌɒptɪˈmɪstɪk/ → Nhấn âm tiết <strong>thứ 3</strong> ← KHÁC BIỆT</span></li>
<li>D. ex-<span class="hl-green">PE</span>-ri-ence /ɪkˈspɪəriəns/ → Nhấn âm tiết <strong>thứ 2</strong></li>
</ul>

// ===== STATE =====
const TOTAL=QUESTIONS.length;
let score=0;
const answered=new Array(TOTAL).fill(false);
// Store shuffled options per question
const shuffledOpts=[];

// ===== RENDER =====
function renderQuiz(){
  const container=document.getElementById('quizContainer');
  let prevSection='';
  QUESTIONS.forEach((q,qi)=>{
    if(q.section && q.section!==prevSection){
      prevSection=q.section;
      const st=document.createElement('div');
      st.className='section-title';
      st.textContent=q.section;
      container.appendChild(st);
    }
    // Shuffle
    const opts=shuffle(q.options);
    shuffledOpts[qi]=opts;
    // Card HTML
    const card=document.createElement('div');
    card.className='q-card';
    let html=`<div class="q-num">📌 Câu ${q.num}</div>`;
    if(q.passageHtml) html+=q.passageHtml;
    html+=`<div class="q-text">${q.text}</div>`;
    if(q.extra) html+=`<div style="background:#f5f0ff;padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:1.05rem;font-weight:700;color:#2d3436">${q.extra}</div>`;
    html+=`<div class="options" id="opts-${qi}">`;
    opts.forEach((opt,oi)=>{
      html+=`<button class="opt-btn" data-qi="${qi}" data-oi="${oi}" data-correct="${opt.correct}">${opt.html}</button>`;
    });
    html+=`</div>`;
    html+=`<div class="explanation" id="exp-${qi}">${q.exp}</div>`;
    card.innerHTML=html;
    container.appendChild(card);
    // Attach events
    card.querySelectorAll('.opt-btn').forEach(btn=>{
      btn.addEventListener('click',()=>handleAnswer(btn));
    });
  });
}

function handleAnswer(btn){
  if(btn.disabled) return;
  const qi=parseInt(btn.dataset.qi);
  const isCorrect=btn.dataset.correct==='true';
  // Disable all options in this question
  const allBtns=document.querySelectorAll(`#opts-${qi} .opt-btn`);
  allBtns.forEach(b=>b.disabled=true);
  // Color
  if(isCorrect){
    btn.classList.add('correct');
    if(!answered[qi]){score++;answered[qi]=true;}
    playDing();
    launchConfetti();
  } else {
    btn.classList.add('wrong');
    if(!answered[qi]) answered[qi]=true;
    playBuzz();
    // Reveal correct
    allBtns.forEach(b=>{if(b.dataset.correct==='true') b.classList.add('reveal')});
  }
  // Progress
  const done=answered.filter(Boolean).length;
  document.getElementById('progressBar').style.width=(done/TOTAL*100)+'%';
  document.getElementById('progressLabel').textContent=done+' / '+TOTAL+' câu đã trả lời';
  // Show explanation
  const exp=document.getElementById('exp-'+qi);
  exp.classList.add('show');
  setTimeout(()=>exp.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

// ===== SUBMIT =====
function openNameModal(){
  document.getElementById('nameModal').classList.add('show');
  setTimeout(()=>document.getElementById('nameInput').focus(),100);
}
document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmName()});

function confirmName(){
  const v=document.getElementById('nameInput').value.trim();
  const err=document.getElementById('nameErr');
  const inp=document.getElementById('nameInput');
  if(!v){
    err.textContent='⚠️ Vui lòng nhập tên trước khi xem điểm nhé!';
    inp.classList.add('err');
    return;
  }
  document.getElementById('nameModal').classList.remove('show');
  showResult(v);
}

function showResult(name){
  const pct=Math.round(score/TOTAL*100);
  let title,comment,meme;
  if(pct===100){
    title=`🌟 THIÊN TÀI! ${name} xuất sắc tuyệt đối!`;
    comment='Đúng hết 100%! Bạn thực sự phi thường! Tiếp tục phát huy nhé! 🎉🎊🏆';
    meme='https://media.giphy.com/media/26gsjCZpPolPr3sBy/giphy.gif';
  } else if(pct>=80){
    title=`👏 TUYỆT VỜI! ${name} làm rất tốt!`;
    comment='Kết quả rất ấn tượng! Ôn lại một chút nữa là hoàn hảo rồi! 💪✨';
    meme='https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif';
  } else if(pct>=60){
    title=`😊 KHÁ TỐT! ${name} cần cố gắng thêm!`;
    comment='Kết quả khá ổn! Xem lại phần giải thích các câu sai nhé! 📚💡';
    meme='https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif';
  } else {
    title=`💪 CỐ LÊN nhé, ${name}!`;
    comment='Lần này chưa tốt lắm, nhưng không sao! Đọc giải thích kỹ và thử lại! 🔥';
    meme='https://media.giphy.com/media/d2lcHJTG5Tscg/giphy.gif';
  }
  document.getElementById('resultTitle').innerHTML=title;
  document.getElementById('resultScore').textContent=score+' / '+TOTAL+' ('+pct+'%)';
  document.getElementById('resultComment').textContent=comment;
  document.getElementById('resultMeme').src=meme;
  document.getElementById('resultDetail').textContent='✅ Đúng: '+score+' câu  |  ❌ Sai: '+(TOTAL-score)+' câu';
  document.getElementById('resultModal').classList.add('show');
  if(pct>=70) setTimeout(launchConfetti,350);
}

function closeResult(){
  document.getElementById('resultModal').classList.remove('show');
}
