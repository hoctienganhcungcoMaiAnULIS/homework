<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Practice - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* CSS VARIABLES & RESET */
        :root {
            --primary-bg-1: #8854C0;
            --primary-bg-2: #FDCB6E;
            --primary-bg-3: #00C9A7;
            --correct-color: #00D26A;
            --correct-shadow: #00A050;
            --incorrect-color: #FF4757;
            --incorrect-shadow: #D83A46;
            --btn-bg: #FFFFFF;
            --btn-text: #333333;
            --btn-shadow: #E5E5E5;
            --btn-hover: #F8F8F8;
            --text-color: #2C3E50;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        /* BACKGROUND ANIMATION & PATTERN */
        body {
            background: linear-gradient(-45deg, var(--primary-bg-1), var(--primary-bg-2), var(--primary-bg-3));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        /* HEADER */
        .header {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 0 auto 30px auto;
        }
        .header h5 {
            font-size: 1rem;
            color: #8854C0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            font-weight: 800;
        }
        .header h1 {
            font-size: 1.8rem;
            color: #333;
            font-weight: 900;
        }
        
        /* AUDIO PLAYER */
        .audio-container {
            max-width: 800px;
            margin: 0 auto 30px auto;
            background: #fff;
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .audio-container p {
            font-weight: 700;
            color: #8854C0;
        }
        audio {
            width: 100%;
            max-width: 500px;
            outline: none;
        }

        /* APP CONTAINER */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* QUESTION CARDS */
        .question-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .question-card:hover {
            transform: translateY(-5px);
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: #333;
        }

        /* OPTIONS */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .option-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: 2px solid #E5E5E5;
            border-radius: 15px;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 var(--btn-shadow);
            text-align: left;
            position: relative;
            display: flex;
            align-items: center;
        }
        .option-btn:hover:not(.locked) {
            transform: scale(1.02) translateY(-2px);
            background: var(--btn-hover);
        }
        .option-btn:active:not(.locked) {
            transform: scale(0.98) translateY(4px);
            box-shadow: 0 2px 0 var(--btn-shadow);
        }
        
        /* STATES */
        .option-btn.correct {
            background: var(--correct-color);
            color: white;
            border-color: var(--correct-shadow);
            box-shadow: 0 6px 0 var(--correct-shadow);
        }
        .option-btn.incorrect {
            background: var(--incorrect-color);
            color: white;
            border-color: var(--incorrect-shadow);
            box-shadow: 0 6px 0 var(--incorrect-shadow);
        }
        .option-btn.locked {
            cursor: not-allowed;
            opacity: 0.7;
        }
        .option-btn.correct.locked, .option-btn.incorrect.locked {
            opacity: 1; /* Keep selected visible */
        }

        /* SHAKE ANIMATION */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake {
            animation: shake 0.5s ease-in-out;
        }

        /* EXPLANATION BOX */
        .explanation-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #F8F9FA;
            border-left: 5px solid #8854C0;
            border-radius: 10px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: fadeInDown 0.4s ease forwards;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .explanation-box h4 {
            color: #8854C0;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: 800;
        }
        .explanation-box h5 {
            color: #333;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: 800;
            font-size: 1rem;
        }
        .explanation-box p {
            margin-bottom: 10px;
        }
        .explanation-box .highlight {
            color: #FF4757;
            font-weight: bold;
        }
        .explanation-box table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .explanation-box th, .explanation-box td {
            border: 1px solid #E5E5E5;
            padding: 8px 12px;
            text-align: left;
        }
        .explanation-box th {
            background: #8854C0;
            color: white;
        }
        .distractor-list {
            list-style: none;
        }
        .distractor-list li {
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }
        .distractor-list li::before {
            content: "❌";
            position: absolute;
            left: 0;
            top: 2px;
            font-size: 0.8rem;
        }

        /* SUBMIT BUTTON */
        .submit-container {
            text-align: center;
            margin-top: 40px;
        }
        .submit-btn {
            background: #00C9A7;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 15px 40px;
            font-size: 1.4rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #00967D;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 11px 0 #00967D;
        }
        .submit-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #00967D;
        }

        /* MODAL (RESULT POPUP) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes scaleIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-content h2 {
            font-size: 2rem;
            color: #8854C0;
            margin-bottom: 10px;
            font-weight: 900;
        }
        .modal-content p {
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }
        .modal-content img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .close-btn {
            background: #FDCB6E;
            color: #333;
            border: none;
            border-radius: 15px;
            padding: 10px 30px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 0 #DCA743;
            transition: all 0.2s ease;
        }
        .close-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #DCA743;
        }

        /* CONFETTI CANVAS */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="header">
        <h5>Listening Practice - Giáo viên tạo: Ms Mai An ULIS</h5>
        <h1>B1 Test - Part 2: Krispy Band</h1>
    </div>

    <div class="audio-container">
        <p>🎧 Bấm để nghe Audio Transcript:</p>
        <audio controls>
            <source src="https://englishpracticetest.net/wp-content/uploads/2022/11/b1-test-1-2.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ thẻ audio.
        </audio>
    </div>

    <div class="container" id="quiz-container">
        </div>

    <div class="submit-container">
        <button class="submit-btn" onclick="submitQuiz()">Nộp Bài</button>
    </div>

    <div class="modal-overlay" id="result-modal">
        <div class="modal-content">
            <h2 id="result-title">Hoàn Thành!</h2>
            <p>Bạn đã làm đúng <span id="score-text" style="color:#00C9A7; font-size: 1.5rem;">0/6</span> câu.</p>
            <img id="result-gif" src="" alt="Result GIF">
            <br>
            <button class="close-btn" onclick="closeModal()">Xem Lại Bài</button>
        </div>
    </div>

    <script>
        // --- 1. DỮ LIỆU BÀI TẬP VÀ GIẢI THÍCH SIÊU CHI TIẾT ---
        const quizData = [
            {
                id: 8,
                question: "8. When Nick and Mel were younger,",
                options: [
                    { text: "A. they studied music at school.", isCorrect: false, label: "A" },
                    { text: "B. their father took them to live concerts.", isCorrect: true, label: "B" },
                    { text: "C. their mother encouraged them to play music.", isCorrect: false, label: "C" }
                ],
                explanation: {
                    correctLabel: "B",
                    keywords: [
                        { q: "younger", a: "eight, nine" },
                        { q: "father took them to live concerts", a: "Dad... took us to hear the great bands playing live" }
                    ],
                    evidence: "Dad is a guitarist and <span class='highlight'>took us to hear the great bands playing live</span>.",
                    distractors: [
                        "<strong>A sai vì:</strong> Bài nghe nhắc đến việc họ tự tổ chức diễn văn nghệ ở trường (\"put on shows at school\") chứ không phải họ học chuyên ngành âm nhạc tại trường (\"studied music\").",
                        "<strong>C sai vì:</strong> Người mẹ tuy nghĩ họ chơi hay nhưng lại <strong>KHÔNG</strong> muốn họ theo đuổi nghiêm túc (\"didn't want us to get too serious\") do sợ nghề nhạc sĩ vất vả. Ngược hoàn toàn với từ \"encouraged\" (khuyến khích)."
                    ],
                    translation: "Bố tôi là một tay guitar và đã đưa chúng tôi đi nghe những ban nhạc tuyệt vời biểu diễn trực tiếp. Mel và tôi đã tổ chức các buổi biểu diễn ở trường, điều đó rất vui. Mẹ nghĩ chúng tôi chơi tốt, nhưng bà không muốn chúng tôi quá nghiêm túc với âm nhạc vì cuộc sống vất vả của các nhạc sĩ chuyên nghiệp."
                }
            },
            {
                id: 9,
                question: "9. When Nick and Mel started writing music together, they",
                options: [
                    { text: "A. disagreed about the style they should have.", isCorrect: false, label: "A" },
                    { text: "B. didn’t want to be the same as other bands.", isCorrect: false, label: "B" },
                    { text: "C. were influenced by different kinds of music.", isCorrect: true, label: "C" }
                ],
                explanation: {
                    correctLabel: "C",
                    keywords: [
                        { q: "influenced by different kinds of music", a: "didn't have the same influences / mixing the styles" }
                    ],
                    evidence: "We <span class='highlight'>didn’t have the same influences</span> – I liked rock music and she loved world music... But we found good ways of <span class='highlight'>mixing the styles</span>.",
                    distractors: [
                        "<strong>A sai vì:</strong> Dù họ có gu âm nhạc khác nhau, nhưng họ KHÔNG hề cãi vã hay bất đồng (disagree) về phong cách chung. Ngược lại, họ tìm ra cách kết hợp rất tốt (\"found good ways of mixing\").",
                        "<strong>B sai vì:</strong> Bài nghe không hề đề cập đến việc họ muốn khác biệt so với các ban nhạc khác."
                    ],
                    translation: "Chúng tôi không có cùng chung sự ảnh hưởng (gu âm nhạc) - tôi thích nhạc rock còn cô ấy yêu dòng nhạc world music, đặc biệt là các ban nhạc từ châu Phi. Nhưng chúng tôi đã tìm ra những cách tuyệt vời để kết hợp các phong cách đó lại."
                }
            },
            {
                id: 10,
                question: "10. The band Krispy was started after",
                options: [
                    { text: "A. Nick began studying at music school.", isCorrect: false, label: "A" },
                    { text: "B. two other musicians heard Nick and Mel playing.", isCorrect: true, label: "B" },
                    { text: "C. Nick and Mel advertised for the band members.", isCorrect: false, label: "C" }
                ],
                explanation: {
                    correctLabel: "B",
                    keywords: [
                        { q: "two other musicians", a: "two students from music school" },
                        { q: "heard... playing", a: "in the audience / came to see us" }
                    ],
                    evidence: "Mel and I were playing in a concert... and there were <span class='highlight'>two students from music school in the audience</span>. They came to see us after the show and <span class='highlight'>asked if we’d like to form a band</span> with them.",
                    distractors: [
                        "<strong>A sai vì:</strong> Nick và Mel chơi nhạc tại trường cao đẳng của họ (\"at our college\"), hai sinh viên kia mới là người học ở trường âm nhạc (\"music school\").",
                        "<strong>C sai vì:</strong> Họ được mời lập nhóm trực tiếp sau buổi diễn, chứ không hề đăng tin quảng cáo tìm thành viên (advertised)."
                    ],
                    translation: "Mel và tôi đang chơi trong một buổi hòa nhạc tại trường cao đẳng của chúng tôi và có hai sinh viên từ trường âm nhạc ở dưới khán đài. Họ đến gặp chúng tôi sau buổi diễn và hỏi liệu chúng tôi có muốn thành lập một ban nhạc cùng họ không."
                }
            },
            {
                id: 11,
                question: "11. In the band’s first year together,",
                options: [
                    { text: "A. concert audiences liked their music.", isCorrect: true, label: "A" },
                    { text: "B. they signed a recording contract.", isCorrect: false, label: "B" },
                    { text: "C. their national tour was very successful.", isCorrect: false, label: "C" }
                ],
                explanation: {
                    correctLabel: "A",
                    keywords: [
                        { q: "concert audiences liked their music", a: "played in local concerts, and the audiences enjoyed what we did" }
                    ],
                    evidence: "We played in local concerts, and the <span class='highlight'>audiences enjoyed what we did</span>.",
                    distractors: [
                        "<strong>B sai vì:</strong> Mặc dù họ được công ty thu âm mời ký hợp đồng (\"offered us a contract\"), nhưng bố mẹ họ bắt học xong cao đẳng trước, nên năm đầu tiên họ CHƯA ký hợp đồng.",
                        "<strong>C sai vì:</strong> Trong năm đầu, họ chỉ diễn ở các buổi biểu diễn địa phương (\"local concerts\"), chưa hề có chuyến lưu diễn quốc gia (\"national tour\")."
                    ],
                    translation: "Chúng tôi đã dành năm đầu tiên để luyện tập và viết nhạc... Chúng tôi đã chơi ở các buổi hòa nhạc địa phương, và khán giả đã rất thích những gì chúng tôi làm. Sau đó... một công ty âm nhạc mời chúng tôi ký hợp đồng, nhưng bố mẹ bảo chúng tôi phải học xong cao đẳng đã."
                }
            },
            {
                id: 12,
                question: "12. What does Nick say about life in the band today?",
                options: [
                    { text: "A. The other members look after him and Mel.", isCorrect: true, label: "A" },
                    { text: "B. He’s pleased to have the chance to travel.", isCorrect: false, label: "B" },
                    { text: "C. There’s no opportunity for them to relax together.", isCorrect: false, label: "C" }
                ],
                explanation: {
                    correctLabel: "A",
                    keywords: [
                        { q: "look after him and Mel", a: "like an older brother and sister / help us relax / make sure we eat well" }
                    ],
                    evidence: "The others are like an older brother and sister to me and Mel... They <span class='highlight'>help us relax</span> on our days off, and <span class='highlight'>make sure we eat well</span>.",
                    distractors: [
                        "<strong>B sai vì:</strong> Nick miêu tả việc đi lưu diễn liên tục khắp thế giới là một công việc vất vả (\"Hard work\"), anh ấy không nói là mình vui mừng (pleased) về cơ hội du lịch đó.",
                        "<strong>C sai vì:</strong> Họ vẫn có ngày nghỉ và các thành viên lớn hơn giúp họ thư giãn (\"help us relax on our days off\")."
                    ],
                    translation: "Công việc vất vả. Chúng tôi di chuyển đến các buổi biểu diễn trên toàn thế giới... Các thành viên khác giống như anh chị lớn của tôi và Mel, điều đó thật tốt. Họ giúp chúng tôi thư giãn vào những ngày nghỉ, và đảm bảo chúng tôi ăn uống đầy đủ."
                }
            },
            {
                id: 13,
                question: "13. What disappointment has the band had?",
                options: [
                    { text: "A. They haven’t yet had a number one single.", isCorrect: false, label: "A" },
                    { text: "B. Their first album sold under a million copies.", isCorrect: false, label: "B" },
                    { text: "C. A health problem delayed their album recording.", isCorrect: true, label: "C" }
                ],
                explanation: {
                    correctLabel: "C",
                    keywords: [
                        { q: "health problem", a: "been ill recently" },
                        { q: "delayed", a: "started recording late" }
                    ],
                    evidence: "Our second album was due out this winter, but <span class='highlight'>I’ve been ill recently so we’ve started recording late</span>, which is a pity.",
                    distractors: [
                        "<strong>A sai vì:</strong> Họ ĐÃ CÓ tới 3 đĩa đơn lọt top 1 (\"Three singles have gone to number one\").",
                        "<strong>B sai vì:</strong> Album đầu tay của họ bán được HƠN một triệu bản (\"sold over a million copies\"), không phải dưới (under)."
                    ],
                    translation: "Mọi thứ chúng tôi thu âm đều thành công... Album thứ hai dự kiến ra mắt vào mùa đông này, nhưng gần đây tôi bị ốm nên chúng tôi đã bắt đầu thu âm muộn, điều này thật đáng tiếc."
                }
            }
        ];

        // --- 2. THUẬT TOÁN SHUFFLE (XÁO TRỘN) ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- 3. WEB AUDIO API (TỰ ĐỘNG SINH ÂM THANH) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playDing() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
            osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1); // Trượt lên A6
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playBuzz() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            // Âm thanh "téo tèo tèo tèo"
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.setValueAtTime(250, audioCtx.currentTime + 0.15);
            osc.frequency.setValueAtTime(200, audioCtx.currentTime + 0.3);
            osc.frequency.setValueAtTime(150, audioCtx.currentTime + 0.45);
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.7);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.7);
        }

        // --- 4. HIỆU ỨNG PHÁO GIẤY (CONFETTI) ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        function createConfetti() {
            for(let i=0; i<50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 10 + 5,
                    h: Math.random() * 10 + 5,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    vy: Math.random() * 3 + 2,
                    vx: Math.random() * 2 - 1,
                    rot: Math.random() * 360,
                    rotSpeed: Math.random() * 10 - 5
                });
            }
        }

        function drawConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.y += p.vy;
                p.x += p.vx;
                p.rot += p.rotSpeed;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
                ctx.restore();
                if(p.y > canvas.height) particles.splice(index, 1);
            });
            requestAnimationFrame(drawConfetti);
        }
        drawConfetti(); // Start loop

        // Resize canvas
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- 5. RENDER GIAO DIỆN & LOGIC ---
        let score = 0;
        let answeredQuestions = 0;
        const totalQuestions = quizData.length;

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            quizData.forEach((qData, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `question-card-${index}`;
                
                // Question Text
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerHTML = qData.question;
                card.appendChild(qText);

                // Options Container
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                // Shuffle options explicitly
                const shuffledOptions = shuffleArray([...qData.options]);

                shuffledOptions.forEach((opt, optIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerHTML = opt.text;
                    btn.onclick = () => handleAnswer(btn, opt, qData, card, optionsGrid);
                    optionsGrid.appendChild(btn);
                });

                card.appendChild(optionsGrid);

                // Explanation Box (Hidden initially)
                const expBox = document.createElement('div');
                expBox.className = 'explanation-box';
                expBox.id = `exp-${index}`;
                
                // Construct Explanation HTML
                let keywordRows = qData.explanation.keywords.map(kw => 
                    `<tr><td>${kw.q}</td><td>${kw.a}</td></tr>`
                ).join('');

                let distractorsList = qData.explanation.distractors.map(d => 
                    `<li>${d}</li>`
                ).join('');

                expBox.innerHTML = `
                    <h4>🎯 Đáp án đúng: ${qData.explanation.correctLabel}</h4>
                    <h5>1. Key Word & Paraphrasing:</h5>
                    <table>
                        <tr><th>Từ khóa trong câu hỏi</th><th>Từ khóa trong bài nghe</th></tr>
                        ${keywordRows}
                    </table>
                    <h5>2. Dẫn chứng (Evidence):</h5>
                    <p><em>"${qData.explanation.evidence}"</em></p>
                    <h5>3. Phân tích bẫy (Distractors):</h5>
                    <ul class="distractor-list">
                        ${distractorsList}
                    </ul>
                    <h5>4. Dịch nghĩa:</h5>
                    <p>${qData.explanation.translation}</p>
                `;

                card.appendChild(expBox);
                container.appendChild(card);
            });
        }

        function handleAnswer(btn, opt, qData, card, optionsGrid) {
            // Lock all buttons in this question
            const buttons = optionsGrid.querySelectorAll('.option-btn');
            if(buttons[0].classList.contains('locked')) return; // Already answered

            buttons.forEach(b => b.classList.add('locked'));

            answeredQuestions++;

            if (opt.isCorrect) {
                btn.classList.add('correct');
                playDing();
                createConfetti();
                score++;
            } else {
                btn.classList.add('incorrect');
                btn.classList.add('shake');
                playBuzz();
                
                // Highlight correct answer
                buttons.forEach(b => {
                    if (b.innerHTML === qData.options.find(o => o.isCorrect).text) {
                        b.classList.add('correct');
                    }
                });
            }

            // Show explanation immediately
            const expBox = card.querySelector('.explanation-box');
            expBox.style.display = 'block';
        }

        // --- 6. LOGIC NỘP BÀI TỔNG KẾT ---
        function submitQuiz() {
            if(answeredQuestions < totalQuestions) {
                alert("Bạn vui lòng trả lời hết các câu hỏi trước khi nộp bài nhé!");
                return;
            }

            const percent = (score / totalQuestions) * 100;
            let gifUrl = "";
            let title = "";

            if (percent === 100) {
                gifUrl = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif";
                title = "Xuất Sắc! Điểm Tuyệt Đối! 🎉";
            } else if (percent >= 60) {
                gifUrl = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif";
                title = "Làm Tốt Lắm! 👍";
            } else {
                gifUrl = "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif";
                title = "Cố Gắng Lên Nào! 💪";
            }

            document.getElementById('result-title').innerText = title;
            document.getElementById('score-text').innerText = `${score}/${totalQuestions}`;
            document.getElementById('result-gif').src = gifUrl;
            
            document.getElementById('result-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('result-modal').style.display = 'none';
        }

        // Initialize App
        window.onload = renderQuiz;

    </script>
</body>
</html>
