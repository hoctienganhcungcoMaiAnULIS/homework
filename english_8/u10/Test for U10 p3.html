<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Quiz - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #FDCB6E;
            --accent: #00C9A7;
            --correct: #00D26A;
            --wrong: #FF4757;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #2D3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            /* Animated Pastel Neon Gradient */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #8854C0, #00C9A7, #FDCB6E);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Pattern Background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            /* SVG Pattern of cute cats, stars and flowers */
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20 Q 25 15 30 20 Q 35 25 30 30 Q 25 35 20 30 Q 15 25 20 20 Z' fill='rgba(255,255,255,0.2)'/%3E%3Cpath d='M70 70 L 75 60 L 80 70 L 90 75 L 80 80 L 75 90 L 70 80 L 60 75 Z' fill='rgba(255,255,255,0.3)'/%3E%3Ccircle cx='80' cy='20' r='5' fill='rgba(255,255,255,0.2)'/%3E%3Ccircle cx='20' cy='80' r='8' fill='rgba(255,255,255,0.1)'/%3E%3C/svg%3E");
            background-size: 150px 150px;
            z-index: -1;
            animation: floatPattern 40s linear infinite;
        }

        @keyframes floatPattern {
            0% { background-position: 0 0; }
            100% { background-position: 500px 500px; }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h3 {
            font-size: 1.1rem;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
            font-weight: 800;
            background: rgba(0, 0, 0, 0.2);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .header h1 {
            font-size: 2.5rem;
            color: white;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            margin-top: 10px;
            font-weight: 900;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Glassmorphism Cards */
        .question-card {
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.3s ease;
        }

        .question-card:hover {
            transform: translateY(-5px);
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 800;
            margin-bottom: 25px;
            color: #2c3e50;
            text-align: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }

        .option-btn {
            background: white;
            border: 3px solid #e0e6ed;
            border-radius: 18px;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #34495e;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 0 #e0e6ed;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            word-break: break-word;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 8px 0 #d1d8e0;
            border-color: var(--primary);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #e0e6ed;
        }

        .option-btn.correct {
            background: var(--correct);
            border-color: #00b35a;
            color: white;
            box-shadow: 0 6px 0 #00b35a;
            animation: bounce 0.5s ease;
        }

        .option-btn.wrong {
            background: var(--wrong);
            border-color: #e03c4a;
            color: white;
            box-shadow: 0 6px 0 #e03c4a;
            animation: shake 0.4s ease;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Explanation Box */
        .explanation-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            border-left: 6px solid var(--primary);
            font-size: 1rem;
            line-height: 1.6;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            animation: slideDown 0.4s ease forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .explanation-box h4 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .explanation-box p {
            margin-bottom: 8px;
        }

        /* Highlighting Classes */
        .p-word { color: #0984e3; font-weight: bold; }
        .p-phonetic { background: #e84393; color: white; padding: 2px 6px; border-radius: 5px; font-family: monospace; }
        .p-mean { color: #d35400; font-style: italic; font-weight: 600; }
        .p-grammar { color: #c0392b; text-decoration: underline; font-weight: bold; }
        .hl-green { color: #00b894; font-weight: bold; text-transform: uppercase; }
        .hl-red { color: #d63031; font-weight: bold; text-decoration: line-through; }

        /* Submit Button */
        .submit-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 40px auto;
            background: linear-gradient(135deg, #00C9A7, #00D26A);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #009e53, 0 15px 20px rgba(0,0,0,0.2);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 11px 0 #009e53, 0 15px 20px rgba(0,0,0,0.3);
        }

        .submit-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #009e53;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content h2 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .name-input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 3px solid #e0e6ed;
            border-radius: 15px;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        .name-input:focus { border-color: var(--primary); }
        .name-input.error { border-color: var(--wrong); background: #ffeaa7; }
        
        .error-msg { color: var(--wrong); font-weight: bold; margin-bottom: 20px; display: none; }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 0 #5f3a88;
        }
        .btn-action:active { transform: translateY(5px); box-shadow: none; }

        .result-score { font-size: 3rem; font-weight: 900; color: var(--correct); margin: 20px 0; }
        .result-gif { width: 100%; max-height: 250px; object-fit: cover; border-radius: 15px; margin: 15px 0; border: 4px solid var(--secondary); }
        .result-message { font-size: 1.3rem; font-weight: 800; color: #2d3436; }

        /* Confetti Container */
        #confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        .confetti-piece { position: absolute; width: 10px; height: 10px; background: red; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="confetti-container"></div>

    <div class="header">
        <h3>Giáo viên tạo: Ms Mai An ULIS 🎓</h3>
        <h1>UNIT 10: COMMUNICATION IN THE FUTURE 🚀</h1>
    </div>

    <div class="container" id="quiz-container">
        </div>

    <button class="submit-btn" onclick="openNameModal()">🎯 Nộp bài & Xem Kết Quả</button>

    <div class="modal-overlay" id="name-modal">
        <div class="modal-content">
            <h2>🎉 Bạn tên là gì nhỉ?</h2>
            <input type="text" id="student-name" class="name-input" placeholder="Ví dụ: Nguyễn Văn A..." onkeypress="handleEnter(event)">
            <p class="error-msg" id="name-error">⚠️ Vui lòng nhập tên trước khi xem điểm nhé!</p>
            <button class="btn-action" onclick="submitName()">Xác nhận</button>
        </div>
    </div>

    <div class="modal-overlay" id="result-modal">
        <div class="modal-content">
            <h2 id="result-title">🌟 KẾT QUẢ CỦA...</h2>
            <div class="result-score" id="result-score-text">0/0</div>
            <img id="result-img" class="result-gif" src="" alt="Meme Reaction">
            <p class="result-message" id="result-msg">Tuyệt vời!</p>
            <button class="btn-action" style="margin-top: 20px;" onclick="location.reload()">🔄 Chơi Lại</button>
        </div>
    </div>

<script>
    // --- QUIZ DATA WITH SUPER DETAILED EXPLANATIONS ---
    const quizData = [
        // PART VIII: MATCHING (Converted to multiple choice matching for gamification)
        {
            type: "Matching",
            question: "1. What means of communication uses thoughts?",
            options: [
                { text: "It's telepathy.", isCorrect: true },
                { text: "Yes, it's mine.", isCorrect: false },
                { text: "At the conference hall.", isCorrect: false },
                { text: "They are fun and cute.", isCorrect: false }
            ],
            explanation: `
                1. Dịch câu hỏi: "Phương tiện giao tiếp nào sử dụng suy nghĩ?"<br>
                2. Phân tích các đáp án:<br>
                - <span class='p-word'>It's telepathy.</span>: <span class='p-mean'>Đó là thần giao cách cảm.</span><br>
                - <span class='p-word'>Yes, it's mine.</span>: <span class='p-mean'>Vâng, nó là của tôi.</span><br>
                - <span class='p-word'>At the conference hall.</span>: <span class='p-mean'>Tại phòng hội nghị.</span><br>
                - <span class='p-word'>They are fun and cute.</span>: <span class='p-mean'>Chúng rất vui nhộn và dễ thương.</span><br>
                3. Tại sao chọn <span class='hl-green'>It's telepathy</span>?<br>
                Dựa vào từ khóa <span class='p-word'>thoughts</span> (<span class='p-mean'>suy nghĩ</span>), <span class='hl-green'>telepathy</span> là khả năng giao tiếp trực tiếp bằng suy nghĩ từ người này sang người khác.<br>
                4. Tại sao các đáp án còn lại sai?<br>
                Các đáp án khác bị sai <span class='hl-red'>ngữ cảnh</span> và không cung cấp một "phương tiện giao tiếp" đúng với câu hỏi <span class='p-grammar'>What means...</span>.
            `
        },
        {
            type: "Matching",
            question: "2. Is this your new laptop?",
            options: [
                { text: "Yes, it's mine.", isCorrect: true },
                { text: "Businesses use it a lot.", isCorrect: false },
                { text: "No, he isn't.", isCorrect: false },
                { text: "Once a month.", isCorrect: false }
            ],
            explanation: `
                1. Dịch câu hỏi: "Đây có phải là máy tính xách tay mới của bạn không?"<br>
                2. Phân tích các đáp án:<br>
                - <span class='p-word'>Yes, it's mine.</span>: <span class='p-mean'>Vâng, nó là của tôi.</span><br>
                - <span class='p-word'>Businesses use it a lot.</span>: <span class='p-mean'>Các doanh nghiệp sử dụng nó rất nhiều.</span><br>
                - <span class='p-word'>No, he isn't.</span>: <span class='p-mean'>Không, anh ấy không phải.</span><br>
                - <span class='p-word'>Once a month.</span>: <span class='p-mean'>Một tháng một lần.</span><br>
                3. Tại sao chọn <span class='hl-green'>Yes, it's mine</span>?<br>
                Câu hỏi Yes/No bắt đầu bằng <span class='p-grammar'>Is this...</span> hỏi về sở hữu (<span class='p-word'>your laptop</span>). Phản hồi <span class='hl-green'>Yes, it's mine</span> (đại từ sở hữu thay thế cho my laptop) là hoàn toàn chính xác.<br>
                4. Tại sao các đáp án còn lại sai?<br>
                Đáp án "No, he isn't" sai <span class='hl-red'>chủ ngữ (he)</span> vì đang hỏi đồ vật (laptop). Các đáp án khác sai mục đích giao tiếp.
            `
        },
        {
            type: "Matching",
            question: "3. What is the webcam for?",
            options: [
                { text: "It's for video call or video conference.", isCorrect: true },
                { text: "Maybe in 20 years.", isCorrect: false },
                { text: "They are fun and cute.", isCorrect: false },
                { text: "We usually chat on Zalo.", isCorrect: false }
            ],
            explanation: `
                1. Dịch câu hỏi: "Webcam dùng để làm gì?"<br>
                2. Phân tích các đáp án:<br>
                - <span class='p-word'>It's for video call or video conference.</span>: <span class='p-mean'>Nó dùng để gọi video hoặc họp trực tuyến.</span><br>
                - <span class='p-word'>Maybe in 20 years.</span>: <span class='p-mean'>Có thể trong 20 năm nữa.</span><br>
                - <span class='p-word'>They are fun and cute.</span>: <span class='p-mean'>Chúng rất vui và dễ thương.</span><br>
                - <span class='p-word'>We usually chat on Zalo.</span>: <span class='p-mean'>Chúng tôi thường trò chuyện trên Zalo.</span><br>
                3. Tại sao chọn <span class='hl-green'>It's for video call...</span>?<br>
                Cấu trúc <span class='p-grammar'>What... for?</span> dùng để hỏi mục đích/công dụng. Đáp án bắt đầu bằng <span class='p-grammar'>It's for + Noun/V-ing</span> trả lời đúng công năng của webcam.<br>
                4. Tại sao sai?<br>
                Các câu khác trả lời cho câu hỏi <span class='hl-red'>When</span> (khi nào), <span class='hl-red'>Why</span> (tại sao) hoặc <span class='hl-red'>How</span> (như thế nào), không nói về mục đích của đồ vật.
            `
        },
        {
            type: "Matching",
            question: "4. When will holography become more common?",
            options: [
                { text: "Maybe in 20 years.", isCorrect: true },
                { text: "Once a month.", isCorrect: false },
                { text: "At the conference hall.", isCorrect: false },
                { text: "Businesses use it a lot.", isCorrect: false }
            ],
            explanation: `
                1. Dịch câu hỏi: "Khi nào công nghệ hình ảnh ba chiều (holography) sẽ trở nên phổ biến hơn?"<br>
                2. Phân tích các đáp án:<br>
                - <span class='p-word'>Maybe in 20 years.</span>: <span class='p-mean'>Có thể trong 20 năm nữa.</span><br>
                - <span class='p-word'>Once a month.</span>: <span class='p-mean'>Một tháng một lần.</span><br>
                - <span class='p-word'>At the conference hall.</span>: <span class='p-mean'>Tại phòng hội nghị.</span><br>
                - <span class='p-word'>Businesses use it a lot.</span>: <span class='p-mean'>Các doanh nghiệp dùng nó nhiều.</span><br>
                3. Tại sao chọn <span class='hl-green'>Maybe in 20 years</span>?<br>
                Từ để hỏi là <span class='p-grammar'>When</span> (khi nào) kết hợp với thì tương lai <span class='p-grammar'>will... become</span>. Trả lời bằng một cụm từ chỉ thời gian trong tương lai (in 20 years) là chính xác.<br>
                4. Tại sao sai?<br>
                "Once a month" trả lời cho <span class='hl-red'>How often</span>. "At the conference hall" trả lời cho <span class='hl-red'>Where</span>.
            `
        },
        {
            type: "Matching",
            question: "5. Who often uses video conference?",
            options: [
                { text: "Businesses use it a lot.", isCorrect: true },
                { text: "It's telepathy.", isCorrect: false },
                { text: "No, he isn't.", isCorrect: false },
                { text: "We usually chat on Zalo.", isCorrect: false }
            ],
            explanation: `
                1. Dịch câu hỏi: "Ai thường xuyên sử dụng hội nghị truyền hình?"<br>
                2. Phân tích các đáp án:<br>
                - <span class='p-word'>Businesses use it a lot.</span>: <span class='p-mean'>Các doanh nghiệp sử dụng nó rất nhiều.</span><br>
                - <span class='p-word'>It's telepathy.</span>: <span class='p-mean'>Đó là thần giao cách cảm.</span><br>
                - <span class='p-word'>No, he isn't.</span>: <span class='p-mean'>Không, anh ấy không phải.</span><br>
                - <span class='p-word'>We usually chat on Zalo.</span>: <span class='p-mean'>Chúng tôi thường chat qua Zalo.</span><br>
                3. Tại sao chọn <span class='hl-green'>Businesses use it a lot</span>?<br>
                Câu hỏi bắt đầu bằng <span class='p-grammar'>Who</span> (Ai), cần một danh từ chỉ người hoặc tổ chức. <span class='p-word'>Businesses</span> (Các doanh nghiệp) là đối tượng phù hợp nhất.<br>
                4. Tại sao sai?<br>
                Các đáp án còn lại không chứa danh từ chỉ đối tượng người/tổ chức, hoặc bị sai hoàn toàn về ngữ cảnh.
            `
        },
        {
            type: "Matching",
            question: "6. Why are emojis popular among teens?",
            options: [
                { text: "They are fun and cute.", isCorrect: true },
                { text: "Once a month.", isCorrect: false },
                { text: "Yes, it's mine.", isCorrect: false },
                { text: "At the conference hall.", isCorrect: false }
            ],
            explanation: `
                1. Dịch câu hỏi: "Tại sao biểu tượng cảm xúc (emojis) lại phổ biến trong giới trẻ?"<br>
                2. Phân tích các đáp án:<br>
                - <span class='p-word'>They are fun and cute.</span>: <span class='p-mean'>Chúng rất vui nhộn và dễ thương.</span><br>
                - <span class='p-word'>Once a month.</span>: <span class='p-mean'>Một tháng một lần.</span><br>
                - <span class='p-word'>Yes, it's mine.</span>: <span class='p-mean'>Vâng, nó là của tôi.</span><br>
                - <span class='p-word'>At the conference hall.</span>: <span class='p-mean'>Tại phòng hội nghị.</span><br>
                3. Tại sao chọn <span class='hl-green'>They are fun and cute</span>?<br>
                Câu hỏi <span class='p-grammar'>Why</span> yêu cầu một lý do. Miêu tả tính chất "fun and cute" chính là lý do khiến emojis được yêu thích.<br>
                4. Tại sao sai?<br>
                Các câu khác cung cấp thông tin về <span class='hl-red'>tần suất (How often)</span>, <span class='hl-red'>sở hữu</span>, hoặc <span class='hl-red'>địa điểm (Where)</span>, hoàn toàn không giải thích lý do (Why).
            `
        },
        {
            type: "Matching",
            question: "7. How do you keep in contact with friends?",
            options: [

    // AUDIO CONTEXT GENERATOR (No external files needed)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'correct') { // Ding
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
        } else { // Buzz
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
            oscillator.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        }
    }

    // CONFETTI ANIMATION
    function createConfetti() {
        const container = document.getElementById('confetti-container');
        const colors = ['#00D26A', '#FDCB6E', '#8854C0', '#00C9A7', '#FF4757'];
        
        for (let i = 0; i < 40; i++) {
            const conf = document.createElement('div');
            conf.classList.add('confetti-piece');
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
            conf.style.transform = `rotate(${Math.random() * 360}deg)`;
            // Randomize shape (circle or square)
            if(Math.random() > 0.5) conf.style.borderRadius = '50%';
            
            container.appendChild(conf);
            
            // Cleanup
            setTimeout(() => {
                conf.remove();
            }, 3000);
        }
    }

    // ARRAY SHUFFLER
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // RENDER QUIZ
    function initQuiz() {
        const container = document.getElementById('quiz-container');
        
        quizData.forEach((q, index) => {
            // Shuffle options
            let shuffledOptions = shuffleArray([...q.options]);

            const card = document.createElement('div');
            card.className = 'question-card';
            
            let html = `<div class="question-text">Câu ${index + 1}: ${q.question}</div>`;
            html += `<div class="options-grid" id="options-${index}">`;
            
            shuffledOptions.forEach((opt, optIndex) => {
                // Remove A,B,C,D completely
                html += `<button class="option-btn" onclick="checkAnswer(${index}, this, ${opt.isCorrect})">${opt.text}</button>`;
            });
            
            html += `</div>`;
            html += `<div class="explanation-box" id="exp-${index}">
                        <h4>📚 Giải thích chi tiết:</h4>
                        <p>${q.explanation}</p>
                     </div>`;
            
            card.innerHTML = html;
            container.appendChild(card);
        });
    }

    // HANDLE ANSWER CLICK
    function checkAnswer(qIndex, btnElement, isCorrect) {
        // Prevent double clicking
        const parent = document.getElementById(`options-${qIndex}`);
        const buttons = parent.querySelectorAll('.option-btn');
        if(buttons[0].disabled) return;

        buttons.forEach(btn => btn.disabled = true);
        answeredQuestions++;

        if (isCorrect) {
            btnElement.classList.add('correct');
            playSound('correct');
            createConfetti();
            correctCount++;
        } else {
            btnElement.classList.add('wrong');
            playSound('wrong');
            // Show correct answer visually too
            buttons.forEach(btn => {
                if (btn.onclick.toString().includes('true')) {
                    btn.style.border = '3px solid #00D26A';
                    btn.style.boxShadow = '0 0 15px rgba(0,210,106,0.5)';
                }
            });
        }

        // Show Explanation instantly
        const expBox = document.getElementById(`exp-${qIndex}`);
        expBox.style.display = 'block';
    }

    // MODAL AND SUBMISSION LOGIC
    function openNameModal() {
        if (answeredQuestions < totalQuestions) {
            if(!confirm(`Bạn mới làm ${answeredQuestions}/${totalQuestions} câu. Bạn có chắc chắn muốn nộp bài không?`)) {
                return;
            }
        }
        document.getElementById('name-modal').style.display = 'flex';
        document.getElementById('student-name').focus();
    }

    function handleEnter(e) {
        if (e.key === 'Enter') submitName();
    }

    function submitName() {
        const nameInput = document.getElementById('student-name');
        const errorMsg = document.getElementById('name-error');
        const name = nameInput.value.trim();

        if (!name) {
            nameInput.classList.add('error');
            errorMsg.style.display = 'block';
            return;
        }

        nameInput.classList.remove('error');
        errorMsg.style.display = 'none';
        
        document.getElementById('name-modal').style.display = 'none';
        showResults(name);
    }

    function showResults(name) {
        const modal = document.getElementById('result-modal');
        const title = document.getElementById('result-title');
        const scoreText = document.getElementById('result-score-text');
        const msg = document.getElementById('result-msg');
        const img = document.getElementById('result-img');

        const percent = (correctCount / totalQuestions) * 100;
        
        scoreText.innerText = `${correctCount} / ${totalQuestions}`;

        if (percent === 100) {
            title.innerText = `🌟 THIÊN TÀI!`;
            msg.innerText = `${name} xuất sắc đạt điểm tuyệt đối! Cô Mai An rất tự hào về bạn!`;
            img.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif"; // Minions cheering
        } else if (percent >= 60) {
            title.innerText = `👍 RẤT TỐT!`;
            msg.innerText = `Làm tốt lắm ${name}! Hãy xem lại các câu sai ở phần giải thích nhé!`;
            img.src = "https://media.giphy.com/media/3o7abGQa0aRJUurpII/giphy.gif"; // Thumbs up
        } else {
            title.innerText = `💪 CỐ GẮNG LÊN!`;
            msg.innerText = `Không sao đâu ${name}, thất bại là mẹ thành công! Học kỹ giải thích và làm lại nhé!`;
            img.src = "https://media.giphy.com/media/d2lcHJTG5Tscg/giphy.gif"; // Crying/sad
        }

        modal.style.display = 'flex';
        if(percent >= 60) createConfetti();
    }

    // Init
    window.onload = initQuiz;

</script>
</body>
</html>
