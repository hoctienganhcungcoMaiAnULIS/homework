<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra Tiếng Anh - Gamification</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #FDCB6E;
            --tertiary: #00C9A7;
            --correct: #00D26A;
            --incorrect: #FF4757;
            --text: #2D3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            color: var(--text);
            overflow: hidden; 
            background: linear-gradient(-45deg, #FF9A9E, #FECFEF, #a18cd1, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><text x='20' y='40' font-size='30'>🎬</text><text x='150' y='80' font-size='30'>🍔</text><text x='50' y='160' font-size='30'>🐱</text><text x='120' y='190' font-size='30'>⭐</text></svg>");
            background-repeat: repeat;
            opacity: 0.3;
            animation: floatPattern 40s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatPattern {
            from { background-position: 0 0; }
            to { background-position: 400px 400px; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        #top-bar {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            margin: 15px;
            z-index: 10;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 1px 1px 2px #fff;
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #timer-display {
            font-size: 1.5rem;
            font-weight: 900;
            background: white;
            padding: 5px 20px;
            border-radius: 15px;
            color: var(--primary);
            box-shadow: 0 4px 0 #d1d1d1;
        }

        .btn {
            cursor: pointer;
            border: none;
            font-weight: 800;
            transition: all 0.2s;
            text-align: center;
            outline: none;
        }

        .btn-start {
            background: var(--tertiary);
            color: white;
            padding: 10px 25px;
            border-radius: 15px;
            font-size: 1.1rem;
            box-shadow: 0 5px 0 #00997f;
        }
        .btn-start:active { transform: translateY(5px); box-shadow: 0 0 0 #00997f; }

        #main-container {
            display: flex;
            height: calc(100vh - 100px);
            gap: 20px;
            padding: 0 15px 15px 15px;
        }

        .pane {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            border-radius: 25px;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(136, 84, 192, 0.5); border-radius: 10px; }

        .passage-card { margin-bottom: 40px; }
        .passage-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 15px;
            text-align: center;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 0 #e0e0e0;
        }
        .paragraph {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.6);
            padding: 15px;
            border-radius: 15px;
        }
        .btn-translate {
            background: #FFEAA7;
            color: #D35400;
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 0.95rem;
            box-shadow: 0 4px 0 #F1C40F;
            margin-bottom: 15px;
            display: inline-block;
        }
        .btn-translate:active { transform: translateY(4px); box-shadow: 0 0 0 #F1C40F; }
        .translation-text {
            display: none;
            font-size: 1.05rem;
            color: #4a4a4a;
            background: #fff;
            padding: 15px;
            border-radius: 15px;
            border-left: 5px solid var(--secondary);
            margin-bottom: 20px;
            font-style: italic;
        }

        .glossary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .glossary-table th {
            background: var(--primary);
            color: white;
            padding: 12px;
            text-align: left;
        }
        .glossary-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.75);
            margin-bottom: 25px;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid white;
            box-shadow: 0 6px 0 rgba(0,0,0,0.05);
        }
        .question-text {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: #2D3436;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .option-btn {
            background: white;
            border: 2px solid #e0e0e0;
            padding: 12px;
            border-radius: 15px;
            font-size: 1.08rem;
            text-align: left;
            color: #2D3436;
            box-shadow: 0 4px 0 #e0e0e0;
            display: flex;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            transform: scale(1.02);
            border-color: var(--primary);
        }
        .option-btn:active:not(:disabled) {
            transform: translateY(4px) scale(1.02);
            box-shadow: 0 0 0 #e0e0e0;
        }
        
        .option-btn.correct {
            background: var(--correct);
            color: white;
            border-color: var(--correct);
            box-shadow: 0 4px 0 #00a854;
        }
        .option-btn.wrong {
            background: var(--incorrect);
            color: white;
            border-color: var(--incorrect);
            box-shadow: 0 4px 0 #d63031;
        }

        .explanation-box {
            display: none;
            margin-top: 15px;
            background: #fdfbf7;
            padding: 15px;
            border-radius: 15px;
            border-left: 5px solid var(--primary);
            font-size: 1rem;
            line-height: 1.6;
            animation: fadeIn 0.5s;
        }
        .explanation-box h4 { color: var(--primary); margin-bottom: 8px; }
        .explanation-box p { margin-bottom: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .shake {
            animation: shakeAnim 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .btn-submit {
            display: block;
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 20px;
            font-size: 1.3rem;
            box-shadow: 0 6px 0 #6c4298;
            margin-top: 20px;
        }
        .btn-submit:active { transform: translateY(6px); box-shadow: 0 0 0 #6c4298; }

        #result-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-score { font-size: 4rem; font-weight: 900; color: var(--primary); margin: 20px 0; }
        .modal-message { font-size: 1.5rem; color: #2D3436; margin-bottom: 20px; }
        .btn-reload {
            background: var(--tertiary); padding: 12px 30px; font-size: 1.2rem;
            color: white; border-radius: 15px; box-shadow: 0 5px 0 #00997f;
        }

        #confetti-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999;
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div id="top-bar" class="glass">
        <div class="header-title">🎓 Ms Mai An ULIS - English Masterclass</div>
        <div class="timer-container">
            <div id="timer-display">10:00</div>
            <button class="btn btn-start" id="btn-timer" onclick="toggleTimer()">BẮT ĐẦU</button>
        </div>
    </div>

    <div id="main-container">
        <div class="pane glass" id="left-pane">
            </div>

        <div class="pane glass" id="right-pane">
            <div id="questions-container"></div>
            <button class="btn btn-submit" onclick="submitTest()">🎉 NỘP BÀI 🎉</button>
        </div>
    </div>

    <div id="result-modal">
        <div class="modal-content">
            <h2 style="font-size: 2rem; color: #FF9A9E;">KẾT QUẢ CỦA BẠN</h2>
            <div class="modal-score" id="final-score">0/0</div>
            <div class="modal-message" id="final-message">Tuyệt vời!</div>
            <button class="btn btn-reload" onclick="location.reload()">Làm Lại Nhé 🌟</button>
        </div>
    </div>

<script>
    // --- DỮ LIỆU ĐỀ BÀI ---
    const passagesData = [
        {
            title: "🎬 PASSAGE 1: MOVIE SCREENING ANNOUNCEMENT",
            paragraphs: [
                {
                    text: "The city’s Community Center is excited to announce (13) ___ a special movie screening this weekend. Details include:<br>• The screening will take place (14) ___ the main auditorium.<br>• The film to be shown is (15) ___ a critically acclaimed family-friendly movie.<br>• Tickets are free but must be reserved (16) ___ in advance.",
                    trans: "Trung tâm Cộng đồng của thành phố rất vui mừng thông báo về một buổi chiếu phim đặc biệt vào cuối tuần này. Chi tiết bao gồm:<br>• Buổi chiếu sẽ diễn ra trong khán phòng chính.<br>• Bộ phim được chiếu được mô tả là một bộ phim thân thiện với gia đình được giới phê bình đánh giá cao.<br>• Vé miễn phí nhưng phải được đặt trước qua mạng."
                }
            ],
            glossary: [
                { word: "Community Center", type: "n", mean: "Trung tâm cộng đồng" },
                { word: "Announce", type: "v", mean: "Thông báo" },
                { word: "Screening", type: "n", mean: "Buổi công chiếu (phim)" },
                { word: "Auditorium", type: "n", mean: "Khán phòng, hội trường" },
                { word: "Critically acclaimed", type: "adj", mean: "Được giới phê bình đánh giá cao" },
                { word: "Family-friendly", type: "adj", mean: "Phù hợp với gia đình/trẻ em" },
                { word: "Reserve in advance", type: "v. phrase", mean: "Đặt chỗ trước" }
            ]
        },
        {
            title: "🍔 PASSAGE 2: FAST FOOD RESTAURANTS",
            paragraphs: [
                {
                    text: "Today, you can find restaurants in almost every big city. In some places, you can (19) ___ in a line and get a hamburger or a hot dog in a paper box; in others you can pick up a tray of fish, chicken, pizza or even Mexican and Chinese food; and in some fast food places you can even park your car up to a window and place your order. A (20) ___ minutes later, a worker passes you your food through the window and you can drive away and eat (21) ___ in your car.",
                    trans: "Ngày nay, bạn có thể tìm thấy nhà hàng ở hầu hết mọi thành phố lớn. Ở một số nơi, bạn có thể xếp hàng và nhận một chiếc bánh hamburger hoặc xúc xích trong hộp giấy; ở những nơi khác, bạn có thể lấy một khay cá, gà, pizza hoặc thậm chí là thức ăn Mexico và Trung Quốc; và ở một số quán thức ăn nhanh, bạn thậm chí có thể đỗ xe sát cửa sổ và gọi món. Một vài phút sau, một nhân viên đưa thức ăn cho bạn qua cửa sổ và bạn có thể lái xe đi và ăn nó trong xe của mình."
                },
                {
                    text: "In New York, Paris, Tokyo, Singapore and (22) ___ big cities around the world, new fast food restaurants (23) ___ every day. But why do people prefer fast food restaurants (24) ___ more comfortable restaurants where they can sit quietly at a table and watch the world go by?",
                    trans: "Ở New York, Paris, Tokyo, Singapore và hàng ngàn thành phố lớn trên khắp thế giới, các nhà hàng thức ăn nhanh mới mở cửa mỗi ngày. Nhưng tại sao mọi người lại thích các nhà hàng thức ăn nhanh hơn là những nhà hàng thoải mái hơn, nơi họ có thể ngồi lặng lẽ ở một cái bàn và ngắm nhìn thế giới trôi qua?"
                }
            ],
            glossary: [
                { word: "Tray", type: "n", mean: "Cái khay" },
                { word: "Place an order", type: "v. phrase", mean: "Đặt món, gọi món" },
                { word: "Drive away", type: "v", mean: "Lái xe rời đi" },
                { word: "Prefer A to B", type: "v", mean: "Thích A hơn B" },
                { word: "Comfortable", type: "adj", mean: "Thoải mái, dễ chịu" },
                { word: "Quietly", type: "adv", mean: "Một cách yên tĩnh, lặng lẽ" }
            ]
        },
        {
            title: "🎩 PASSAGE 3: CHARLIE CHAPLIN",
            paragraphs: [
                {
                    text: "Charlie Chaplin was an English actor, director, producer, and composer. He is known as the most creative person of the silent-film era. Charlie Chaplin's portrayal of the tramp won the hearts of people all over the world.",
                    trans: "Charlie Chaplin là một diễn viên, đạo diễn, nhà sản xuất và nhà soạn nhạc người Anh. Ông được biết đến là người sáng tạo nhất của kỷ nguyên phim câm. Sự thể hiện vai diễn gã lang thang của Charlie Chaplin đã chiếm được trái tim của khán giả trên toàn thế giới."
                },
                {
                    text: "Chaplin was born in London on the 16th of April, 1889. He spent his childhood in poverty and hardship. In 1910 he began to perform pantomime in the United States. He first appeared on screen in 1914. He created his world-famous character, the Tramp, and he played this classic role in more than 70 films during his career. He also composed background music for most of his films. In 1972 Chaplin received an Honorary Academy Award for 'the incalculable effect he has had in making motion pictures the art form of this century.' Chaplin died on the 25th of December, 1977, at his home in Switzerland.",
                    trans: "Chaplin sinh ngày 16 tháng 4 năm 1889 tại London. Ông trải qua tuổi thơ trong nghèo khó và gian khổ. Năm 1910, ông bắt đầu biểu diễn kịch câm tại Hoa Kỳ. Ông xuất hiện lần đầu trên màn ảnh vào năm 1914. Ông đã tạo ra nhân vật nổi tiếng thế giới của mình, Gã Lang Thang, và ông đã thể hiện vai diễn kinh điển này trong hơn 70 bộ phim trong suốt sự nghiệp của mình. Ông cũng sáng tác nhạc nền cho hầu hết các bộ phim của mình. Năm 1972, Chaplin được trao Giải thưởng Viện Hàn lâm Danh dự vì 'những đóng góp to lớn không thể đong đếm của ông trong việc đưa điện ảnh trở thành hình thức nghệ thuật của thế kỷ này'. Chaplin qua đời vào ngày 25 tháng 12 năm 1977 tại nhà riêng ở Thụy Sĩ."
                }
            ],
            glossary: [
                { word: "Composer", type: "n", mean: "Nhà soạn nhạc" },
                { word: "Silent-film era", type: "n", mean: "Kỷ nguyên phim câm" },
                { word: "Portrayal", type: "n", mean: "Sự miêu tả, thể hiện vai diễn" },
                { word: "Poverty", type: "n", mean: "Sự nghèo đói" },
                { word: "Hardship", type: "n", mean: "Sự gian khổ, khó khăn" },
                { word: "Pantomime", type: "n", mean: "Kịch câm" },
                { word: "Honorary", type: "adj", mean: "Danh dự" },
                { word: "Incalculable", type: "adj", mean: "Không thể đếm xuể, to lớn" }
            ]
        },
        {
            title: "🐱 PASSAGE 4: DORAEMON",
            paragraphs: [
                {
                    text: "Hi, I’m Henry. My favorite film is Doraemon. It is a cartoon film that I like best of all the films I have seen. (37) ___, who travels back in time from the 22nd century to help a schoolboy, Nobita Nobi. (38) ___. The main characters are Doraemon and Nobita. (39) ___. However, Nobita is a clumsy student. Shizuka, Gian and Suneo are also the characters in the film. Shizuka is a pretty girl, Suneo is a rich kid and Gian is selfish and violent. (40) ___. I like it very much.",
                    trans: "Xin chào, tôi là Henry. Bộ phim yêu thích của tôi là Doraemon. Đây là bộ phim hoạt hình mà tôi thích nhất trong số tất cả những bộ phim tôi đã xem. Phim kể về một chú mèo máy tên là Doraemon, người du hành ngược thời gian từ thế kỷ 22 để giúp đỡ một cậu học sinh tên là Nobita Nobi. Bộ phim được sản xuất tại Nhật Bản. Nhân vật chính là Doraemon và Nobita. Phim hài hước và thú vị. Tuy nhiên, Nobita là một cậu học sinh vụng về. Shizuka, Gian và Suneo cũng là những nhân vật trong phim. Shizuka là một cô gái xinh đẹp, Suneo là một cậu ấm nhà giàu, còn Gian thì ích kỷ và bạo lực. Doraemon là một chú mèo máy thông minh. Tôi rất thích bộ phim này."
                }
            ],
            glossary: [
                { word: "Cartoon", type: "n", mean: "Phim hoạt hình" },
                { word: "Robotic cat", type: "n. phrase", mean: "Mèo máy" },
                { word: "Travel back in time", type: "v. phrase", mean: "Du hành ngược thời gian" },
                { word: "Clumsy", type: "adj", mean: "Vụng về, hậu đậu" },
                { word: "Selfish", type: "adj", mean: "Ích kỷ" },
                { word: "Violent", type: "adj", mean: "Bạo lực, hung hăng" },
                { word: "Intelligent", type: "adj", mean: "Thông minh" }
            ]
        }
    ];

    const questionsData = [
        // Passage 1
        { id: 13, text: "Question 13: The city’s Community Center is excited to announce ___ a special movie screening...", options: ["of", "for", "holding", "about"], answer: "about",
          explain: "<b>Cấu trúc:</b> <code>announce about + something</code> (thông báo về việc gì đó). Do đó đáp án D là chính xác nhất." },
        { id: 14, text: "Question 14: The screening will take place ___ the main auditorium.", options: ["at", "on", "in", "near"], answer: "in",
          explain: "<b>Giải thích:</b> Dùng giới từ <code>in</code> khi sự kiện diễn ra bên trong một địa điểm có không gian khép kín như phòng, tòa nhà, hội trường... <code>in the main auditorium</code> = trong khán phòng chính." },
        { id: 15, text: "Question 15: The film to be shown is ___ a critically acclaimed family-friendly movie.", options: ["known as", "considered as", "reviewed as", "described as"], answer: "described as",
          explain: "<b>Giải thích:</b> <code>described as</code> = được mô tả là... phù hợp nhất về mặt ngữ nghĩa.<br>- known as = được biết đến như là (thường dùng cho tên gọi/danh tiếng).<br>- considered KHÔNG cần 'as' phía sau.<br>- reviewed as nghe không tự nhiên." },
        { id: 16, text: "Question 16: Tickets are free but must be reserved ___ in advance.", options: ["online", "later", "after", "through"], answer: "online",
          explain: "<b>Giải thích:</b> Cụm từ <code>reserved online in advance</code> là cách nói phổ biến mang nghĩa 'đặt vé qua mạng trước'." },
        
        // Passage 2
        { id: 19, text: "Question 19: In some places, you can ___ in a line...", options: ["stand", "to stand", "to sit", "sits"], answer: "stand",
          explain: "<b>Ngữ pháp:</b> Sau Modal Verb <code>can</code> phải là động từ nguyên thể không 'to' (V-inf). Do đó chọn 'stand'." },
        { id: 20, text: "Question 20: A ___ minutes later, a worker passes you your food...", options: ["lot", "some", "few", "little"], answer: "few",

        { id: 21, text: "Question 21: ...you can drive away and eat ___ in your car.", options: ["it", "them", "many", "much"], answer: "it",

        { id: 23, text: "Question 23: ...new fast food restaurants ___ every day.", options: ["opens", "close", "open", "closes"], answer: "open",

        { id: 24, text: "Question 24: But why do people prefer fast food restaurants ___ more comfortable restaurants...", options: ["on", "to", "than", "in"], answer: "to",

        { id: 32, text: "Question 32: Which word is the OPPOSITE of 'poverty' in the passage?", options: ["Wealth", "Hardship", "Success", "Honor"], answer: "Wealth",

        { id: 33, text: "Question 33: Which word is CLOSEST in meaning to 'portrayal' in the passage?", options: ["Performance", "Creation", "Direction", "Composition"], answer: "Performance",

          explain: "<b>Mạch logic:</b> Chỗ trống đứng trước đại từ quan hệ 'who travels back in time...'. 'Who' ở đây thay thế cho nhân vật được nhắc đến trước đó -> <i>'It is about a robotic cat named Doraemon, who...'</i> là hoàn toàn khớp." },

        { id: 40, text: "Question 40: Fill in blank (40)", options: ["The film is made in Japan.", "It is about a robotic cat named Doraemon", "Doraemon is an intelligent robotic cat.", "The film is funny and interesting"], answer: "Doraemon is an intelligent robotic cat.",
          explain: "<b>Logic kết bài:</b> Sau khi chê Nobita vụng về, Gian bạo lực... bài đọc kết lại bằng một điểm sáng: 'Doraemon là một chú mèo máy thông minh'. Sau đó chốt 'I like it very much'." }

    // --- AUDIO GENERATOR (Web Audio API) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'correct') {
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); 
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'wrong') {
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.3);
        }
    }

    function shuffleArray(array) {
        let curId = array.length;
        while (0 !== curId) {
            let randId = Math.floor(Math.random() * curId);
            curId -= 1;
            let tmp = array[curId];
            array[curId] = array[randId];
            array[randId] = tmp;
        }
        return array;
    }

    function toggleTranslation(id) {
        const el = document.getElementById(`trans-${id}`);
        if (el.style.display === "block") {
            el.style.display = "none";
        } else {
            el.style.display = "block";
        }
    }

    let score = 0;
    const answeredQuestions = new Set();

    function renderPassages() {
        const leftPane = document.getElementById("left-pane");
        let html = "";
        
        passagesData.forEach((p, pIndex) => {
            html += `<div class="passage-card">
                        <div class="passage-title">${p.title}</div>`;
            
            p.paragraphs.forEach((para, paraIndex) => {
                const uniqueId = `p${pIndex}-para${paraIndex}`;
                html += `<div class="paragraph">${para.text}</div>
                         <button class="btn btn-translate" onclick="toggleTranslation('${uniqueId}')">🌟 Mở dịch đoạn này</button>
                         <div class="translation-text" id="trans-${uniqueId}">${para.trans}</div>`;
            });

            html += `<table class="glossary-table">
                        <tr><th>Từ vựng (Vocabulary)</th><th>Loại từ</th><th>Nghĩa tiếng Việt</th></tr>`;
            p.glossary.forEach(g => {
                html += `<tr><td><strong>${g.word}</strong></td><td>${g.type}</td><td>${g.mean}</td></tr>`;
            });
            html += `</table></div><hr style="border:1px dashed var(--primary); margin: 30px 0;">`;
        });
        leftPane.innerHTML = html;
    }

    function renderQuestions() {
        const container = document.getElementById("questions-container");
        let html = "";

        questionsData.forEach((q, qIndex) => {
            let shuffledOptions = shuffleArray([...q.options]);
            let optionsHtml = "";
            shuffledOptions.forEach((opt, optIndex) => {
                const isCorrect = (opt === q.answer);
                optionsHtml += `<button class="btn option-btn" id="btn-q${qIndex}-o${optIndex}" 
                                onclick="handleAnswer(${qIndex}, ${optIndex}, ${isCorrect})">
                                    <strong style="margin-right:10px; color:var(--primary)">${String.fromCharCode(65 + optIndex)}.</strong> ${opt}
                                </button>`;
            });

            html += `
                <div class="question-card" id="qcard-${qIndex}">
                    <div class="question-text">${q.text}</div>
                    <div class="options-grid" id="qgrid-${qIndex}">
                        ${optionsHtml}
                    </div>
                    <div class="explanation-box" id="expl-${qIndex}">
                        <h4>💡 Giải thích chi tiết từ Cô Mai An:</h4>
                        <p>${q.explain}</p>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function handleAnswer(qIndex, optIndex, isCorrect) {
        if (answeredQuestions.has(qIndex)) return; 
        answeredQuestions.add(qIndex);

        const grid = document.getElementById(`qgrid-${qIndex}`);
        const buttons = grid.querySelectorAll(".option-btn");
        const clickedBtn = document.getElementById(`btn-q${qIndex}-o${optIndex}`);
        const qCard = document.getElementById(`qcard-${qIndex}`);

        buttons.forEach(btn => btn.disabled = true);

        if (isCorrect) {
            clickedBtn.classList.add("correct");
            score++;
            playSound("correct");
            createConfetti(clickedBtn);
        } else {
            clickedBtn.classList.add("wrong");
            qCard.classList.add("shake");
            playSound("wrong");
            setTimeout(() => qCard.classList.remove("shake"), 500);
            
            const correctOptStr = questionsData[qIndex].answer;
            buttons.forEach(btn => {
                if (btn.innerText.includes(correctOptStr)) {
                    btn.classList.add("correct");
                    btn.style.boxShadow = "0 0 15px #00D26A";
                }
            });
        }

        document.getElementById(`expl-${qIndex}`).style.display = "block";
    }

    let timerInterval;
    let timeLeft = 600; 
    let isTimerRunning = false;

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function toggleTimer() {
        const btn = document.getElementById("btn-timer");
        if (!isTimerRunning) {
            isTimerRunning = true;
            btn.innerText = "TẠM DỪNG";
            btn.style.background = "#FF4757";
            btn.style.boxShadow = "0 5px 0 #d63031";
            
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    document.getElementById("timer-display").innerText = formatTime(timeLeft);
                } else {
                    clearInterval(timerInterval);
                    isTimerRunning = false;
                    alert("⏰ Đã hết giờ làm bài! Bạn vẫn có thể tiếp tục làm, nhưng nhớ là trong phòng thi thật, bạn chỉ nên làm một bài như thế này trong 10 phút thôi nha.");
                    btn.innerText = "HẾT GIỜ";
                    btn.disabled = true;
                    btn.style.background = "#b2bec3";
                    btn.style.boxShadow = "0 5px 0 #636e72";
                }
            }, 1000);
        } else {
            isTimerRunning = false;
            clearInterval(timerInterval);
            btn.innerText = "TIẾP TỤC";
            btn.style.background = "var(--tertiary)";
            btn.style.boxShadow = "0 5px 0 #00997f";
        }
    }

    function submitTest() {
        clearInterval(timerInterval);
        const modal = document.getElementById("result-modal");
        const scoreDisplay = document.getElementById("final-score");
        const msgDisplay = document.getElementById("final-message");
        
        const total = questionsData.length;
        scoreDisplay.innerText = `${score}/${total}`;
        
        let msg = "";
        const percentage = score / total;
        if (percentage === 1) msg = "🏆 THIÊN TÀI XUẤT CHÚNG! 100% chính xác!";
        else if (percentage >= 0.8) msg = "🌟 Rất Xuất Sắc! Làm tốt lắm nha!";
        else if (percentage >= 0.5) msg = "👍 Khá lắm! Hãy xem lại các câu sai ở phần giải thích nhé.";
        else msg = "💪 Cố lên nhé! Luyện tập nhiều hơn nữa để Master tiếng Anh nha!";
        
        msgDisplay.innerText = msg;
        modal.style.display = "flex";
        
        for(let i=0; i<5; i++){
            setTimeout(() => createConfetti(document.body, true), i*200);
        }
        playSound("correct");
    }

    function createConfetti(element, isHuge = false) {
        const colors = ['#00D26A', '#FDCB6E', '#FF4757', '#8854C0', '#00C9A7'];
        const amount = isHuge ? 100 : 30;
        const rect = element.getBoundingClientRect();
        const startX = isHuge ? window.innerWidth / 2 : rect.left + rect.width / 2;
        const startY = isHuge ? window.innerHeight / 2 : rect.top + rect.height / 2;

        for (let i = 0; i < amount; i++) {
            const confetti = document.createElement('div');
            confetti.style.position = 'fixed';
            confetti.style.width = '10px';
            confetti.style.height = '10px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = startX + 'px';
            confetti.style.top = startY + 'px';
            confetti.style.zIndex = 9999;
            confetti.style.pointerEvents = 'none';
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            document.body.appendChild(confetti);

            const angle = Math.random() * Math.PI * 2;
            const velocity = (Math.random() * 15) + 5;
            let vx = Math.cos(angle) * velocity;
            let vy = Math.sin(angle) * velocity - 5; 

            let opacity = 1;
            
            const animate = () => {
                if (opacity <= 0) {
                    confetti.remove();
                    return;
                }
                vy += 0.5; 
                const currentLeft = parseFloat(confetti.style.left);
                const currentTop = parseFloat(confetti.style.top);
                confetti.style.left = (currentLeft + vx) + 'px';
                confetti.style.top = (currentTop + vy) + 'px';
                confetti.style.transform = `rotate(${currentLeft}deg)`;
                
                opacity -= 0.02;
                confetti.style.opacity = opacity;
                
                requestAnimationFrame(animate);
            };
            requestAnimationFrame(animate);
        }
    }

    window.onload = () => {
        renderPassages();
        renderQuestions();
    };

</script>
