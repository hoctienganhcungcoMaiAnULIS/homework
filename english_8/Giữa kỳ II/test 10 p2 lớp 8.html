<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamified English Quiz - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Eco-friendly Theme Colors */
            --primary: #00b894; /* Mint Green */
            --secondary: #0984e3; /* Ocean Blue */
            --tertiary: #fdcb6e; /* Sun Yellow */
            --success: #00D26A;
            --danger: #FF4757;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --border-glass: rgba(255, 255, 255, 0.6);
            --text-main: #2d3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text-main);
            background: linear-gradient(45deg, var(--primary), var(--secondary), #81ecec, var(--tertiary));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            /* SVG Pattern with Environment & Shopping Emojis */
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 600'><text x='50' y='100' font-size='35' opacity='0.4'>🌍</text><text x='700' y='80' font-size='40' opacity='0.3'>♻️</text><text x='150' y='500' font-size='35' opacity='0.4'>📱</text><text x='400' y='300' font-size='30' opacity='0.3'>🌳</text><text x='600' y='450' font-size='35' opacity='0.4'>💧</text><text x='300' y='150' font-size='40' opacity='0.3'>🛒</text></svg>");
            background-size: cover;
            opacity: 0.8;
            animation: floatSVG 25s linear infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatSVG {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(-40px) scale(1.05); }
        }

        .top-bar {
            height: 70px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #006266;
            background: rgba(255,255,255,0.7);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .timer-display {
            font-size: 1.5rem;
            font-weight: 700;
            color: #d63031;
            background: #fff;
            padding: 5px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            min-width: 110px;
            text-align: center;
        }

        .btn-timer {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 0 #009432;
            transition: all 0.2s;
        }

        .btn-timer:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #009432;
        }

        .split-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 70px);
            z-index: 10;
            gap: 20px;
            padding: 20px;
        }

        .pane {
            flex: 1;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--border-glass);
            border-radius: 24px;
            padding: 25px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 184, 148, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 184, 148, 0.8); }

        .passage-block {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .paragraph {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 15px;
            text-align: justify;
            color: #2d3436;
        }

        .btn-translate {
            background: #ffeaa7;
            color: #d35400;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #f39c12;
            margin-bottom: 15px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-translate:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #f39c12;
        }

        .translation-box {
            display: none;
            background: #e0f7fa;
            border-left: 5px solid #00bcd4;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.05rem;
            color: #006064;
            margin-bottom: 20px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        .glossary-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 15px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .glossary-table th {
            background: var(--primary);
            color: white;
            padding: 12px;
            font-size: 1rem;
        }
        .glossary-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }
        .glossary-table tr:last-child td { border-bottom: none; }
        .glossary-table tr:hover { background-color: #f1f8e9; }

        .question-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.05);
            border: 2px solid #f1f2f6;
            transition: transform 0.2s;
        }
        .question-card:hover { transform: translateY(-2px); }

        .question-text {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: #f1f2f6;
            border: 2px solid #dfe4ea;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #2f3542;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 5px 0 #dfe4ea;
            transition: all 0.2s;
            position: relative;
        }

        .option-btn:hover:not(.disabled) {
            transform: translateY(-3px) scale(1.02);
            background: #eccc68;
            border-color: #ffa502;
            box-shadow: 0 8px 0 #ffa502;
        }

        .option-btn:active:not(.disabled) {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #ffa502;
        }

        .option-btn.correct {
            background: var(--success) !important;
            color: white;
            border-color: #00b85c !important;
            box-shadow: 0 5px 0 #00b85c !important;
        }

        .option-btn.wrong {
            background: var(--danger) !important;
            color: white;
            border-color: #ff3838 !important;
            box-shadow: 0 5px 0 #ff3838 !important;
        }

        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .explanation-box {
            display: none;
            margin-top: 20px;
            background: #f8f9fa;
            border: 2px dashed #0984e3;
            border-radius: 12px;
            padding: 15px;
            font-size: 1.05rem;
            line-height: 1.7;
            color: #2d3436;
            animation: fadeIn 0.4s ease;
        }

        .explanation-box.show { display: block; }

        .explain-title {
            color: var(--secondary);
            font-weight: 800;
            margin-bottom: 10px;
            font-size: 1.15rem;
            text-transform: uppercase;
        }

        .submit-container {
            text-align: center;
            margin-top: 30px;
            padding-bottom: 20px;
        }

        .btn-submit {
            background: linear-gradient(45deg, #0984e3, #00b894);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 0 #027a62;
            transition: all 0.2s;
        }

        .btn-submit:hover { transform: scale(1.05) translateY(-3px); }
        .btn-submit:active { transform: scale(1) translateY(5px); box-shadow: 0 3px 0 #027a62; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-title { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
        .modal-score { font-size: 4rem; font-weight: 800; color: var(--success); margin: 20px 0; }
        .modal-message { font-size: 1.2rem; color: #576574; margin-bottom: 30px; }
        .btn-restart {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 0 #075eab;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        .shake { animation: shakeAnim 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        #confetti-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;
        }
        .confetti {
            position: absolute; width: 10px; height: 10px; background-color: #f00; animation: fall 2s linear forwards;
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="header-title">✨ Ms Mai An ULIS ✨</div>
        <div class="timer-container">
            <button class="btn-timer" id="startTimerBtn" onclick="startTimer()">🚀 BẮT ĐẦU TÍNH GIỜ LÀM BÀI</button>
            <div class="timer-display" id="timerDisplay">10:00</div>
        </div>
    </div>

    <div class="split-container">
        <div class="pane" id="readingPane"></div>
        <div class="pane" id="exercisePane">
            <div id="questionsContainer"></div>
            <div class="submit-container">
                <button class="btn-submit" onclick="submitQuiz()">🏆 NỘP BÀI</button>
            </div>
        </div>
    </div>

    <div id="confetti-container"></div>

    <div class="modal-overlay" id="resultModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Hoàn Thành! 🎉</h2>
            <div class="modal-score" id="modalScore">0/0</div>
            <p class="modal-message" id="modalMessage">Tuyệt vời!</p>
            <button class="btn-restart" onclick="location.reload()">Làm Lại Bài 🔄</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                passageId: 1,
                instruction: "Read the following announcement and mark the letter A, B, C or D on your answer sheet to indicate the correct option that best fits each of the numbered blanks from 13 to 16.",
                paragraphs: [
                    {
                        text: "FUTURE ENGLISH TUITION<br>Do you want to (13) ........... your English?<br>Do you enjoy speaking with foreigners?<br>So you fancy getting (14) ........... at school?<br>Come here and get your great (15) ........... .<br>(16) ........... 0989,08.14.65 (Mr. Glory) or visit our campus at 50 Highway 80, Ha Noi.",
                        translation: "GIA SƯ TIẾNG ANH TƯƠNG LAI<br>Bạn có muốn cải thiện (13) tiếng Anh của mình không?<br>Bạn có thích giao tiếp với người nước ngoài không?<br>Bạn có mong muốn đạt được điểm số cao hơn (14) ở trường không?<br>Hãy đến đây và nhận được sự hài lòng (15) tuyệt vời của bạn.<br>Liên hệ với chúng tôi qua số (16) 0989,08.14.65 (Thầy Glory) hoặc ghé thăm cơ sở của chúng tôi tại số 50 Quốc lộ 80, Hà Nội."
                    }
                ],
                glossary: [
                    { word: "Tuition", type: "n.", meaning: "Sự giảng dạy, tiền học phí" },
                    { word: "Foreigner", type: "n.", meaning: "Người nước ngoài" },
                    { word: "Fancy", type: "v.", meaning: "Mong muốn, thích thú" },
                    { word: "Campus", type: "n.", meaning: "Khuôn viên, cơ sở trường" },
                    { word: "Highway", type: "n.", meaning: "Quốc lộ, đường cao tốc" },
                    { word: "Satisfaction", type: "n.", meaning: "Sự hài lòng, thỏa mãn" },
                    { word: "Contact", type: "v.", meaning: "Liên hệ, liên lạc" },
                    { word: "Improve", type: "v.", meaning: "Cải thiện, làm cho tốt hơn" },
                    { word: "Master", type: "v.", meaning: "Nắm vững, làm chủ" },
                    { word: "Better", type: "v.", meaning: "Làm cho tốt hơn (động từ)" }
                ],
                questions: [
                    {
                        qNum: 13,
                        text: "Question 13: Do you want to (13) ........... your English?",
                        options: [
                            { id: "A", text: "better", isCorrect: true },
                            { id: "B", text: "improving", isCorrect: false },
                            { id: "C", text: "mastering", isCorrect: false },
                            { id: "D", text: "increase", isCorrect: false }
                        ],
                        explanation: "<b>Phân tích cấu trúc ngữ pháp và từ vựng:</b><br><br>Cấu trúc của câu hỏi là <b>'want to + Động từ nguyên thể'</b> (muốn làm việc gì đó). Do vậy, ô trống bắt buộc phải là một động từ ở dạng nguyên thể không chia.<br><br><b>B. improving</b> và <b>C. mastering:</b> Đang chia ở dạng V-ing, vi phạm ngay quy tắc ngữ pháp đứng sau 'to'. Loại ngay lập tức.<br><b>D. increase:</b> Là động từ nguyên thể mang ý nghĩa 'làm gia tăng (về số lượng hoặc kích cỡ)'. Chúng ta không dùng từ này để nói về việc gia tăng ngôn ngữ ('increase your English' là sai hoàn toàn về ngữ cảnh).<br><b>A. better:</b> Đa số học sinh chỉ biết 'better' là tính từ so sánh hơn của 'good'. Tuy nhiên, trong tiếng Anh cao cấp, <b>'better' còn đóng vai trò là một ĐỘNG TỪ nguyên thể</b>, mang ý nghĩa là 'cải thiện, làm cho cái gì đó trở nên tốt hơn' (to make something better). Cụm 'to better your English' hoàn toàn đồng nghĩa với 'to improve your English'.<br><br>👉 Do đó, chọn đáp án A là phương án đúng nhất về cả ngữ pháp lẫn ngữ nghĩa."
                    },
                    {
                        qNum: 14,
                        text: "Question 14: So you fancy getting (14) ........... at school?",
                        options: [
                            { id: "A", text: "higher games", isCorrect: false },
                            { id: "B", text: "higher marks", isCorrect: true },
                            { id: "C", text: "higher presents", isCorrect: false },
                            { id: "D", text: "higher friends", isCorrect: false }
                        ],
                        explanation: "<b>Phân tích ngữ cảnh đoạn quảng cáo học tập:</b><br><br>Câu này hỏi về những mong muốn của học sinh khi đi học tại trường học ('at school'). Động từ 'get' đi kèm với tính từ 'higher' (cao hơn) đòi hỏi một danh từ phù hợp với thành tích học tập.<br><br><b>A. higher games:</b> Trò chơi cao hơn. (Vô nghĩa).<br><b>C. higher presents:</b> Những món quà cao hơn. (Sai logic thực tế).<br><b>D. higher friends:</b> Những người bạn cao hơn. (Không liên quan đến mục đích của việc đi học thêm tiếng Anh).<br><b>B. higher marks:</b> Điểm số cao hơn. Cụm từ 'getting higher marks at school' (đạt điểm số cao hơn ở trường) là một mục tiêu hoàn toàn thực tế và chính xác với ngữ cảnh của một tờ rơi quảng cáo lớp học gia sư.<br><br>👉 Chúng ta chọn đáp án B."
                    },
                    {
                        qNum: 15,
                        text: "Question 15: Come here and get your great (15) ........... .",
                        options: [
                            { id: "A", text: "satisfied", isCorrect: false },
                            { id: "B", text: "satisfy", isCorrect: false },
                            { id: "C", text: "satisfaction", isCorrect: true },
                            { id: "D", text: "satifying", isCorrect: false }
                        ],
                        explanation: "<b>Xét về loại từ (Parts of Speech) cần điền vào ô trống:</b><br><br>Nhìn vào cụm từ 'your great _______'. Chúng ta có 'your' là tính từ sở hữu, 'great' là tính từ miêu tả (tuyệt vời). Theo quy tắc ngữ pháp tiếng Anh cơ bản, sau tính từ sở hữu và tính từ miêu tả bắt buộc phải là một <b>Danh từ (Noun)</b> để tạo thành một Cụm danh từ hoàn chỉnh.<br><br><b>A. satisfied:</b> Tính từ (cảm thấy hài lòng) hoặc Động từ đuôi -ed. Bị loại.<br><b>B. satisfy:</b> Động từ nguyên thể (làm hài lòng). Bị loại.<br><b>D. satifying:</b> Tính từ đuôi -ing (gây ra sự hài lòng) - bị viết sai chính tả gốc là satisfying. Bị loại.<br><b>C. satisfaction:</b> Đây là Danh từ duy nhất trong 4 đáp án, mang ý nghĩa là 'sự hài lòng, sự thỏa mãn'.<br><br>👉 Ghép vào câu ta được: <b>'Come here and get your great satisfaction.'</b> (Hãy đến đây và nhận được sự hài lòng tuyệt vời của bạn). Chọn đáp án C."
                    },
                    {
                        qNum: 16,
                        text: "Question 16: (16) ........... 0989,08.14.65 (Mr. Glory) or visit our campus...",
                        options: [
                            { id: "A", text: "call us", isCorrect: false },
                            { id: "B", text: "Phone us", isCorrect: false },
                            { id: "C", text: "Visit us", isCorrect: false },
                            { id: "D", text: "Contact us at", isCorrect: true }
                        ],

            const transBox = btn.nextElementSibling;
            if (transBox.style.display === "block") {
                transBox.style.display = "none";
                btn.innerHTML = "Mở dịch đoạn này 🌟";
            } else {
                transBox.style.display = "block";
                btn.innerHTML = "Đóng bản dịch 🙈";
            }
        }

        function renderQuiz() {
            const readPane = document.getElementById("readingPane");
            const exerPane = document.getElementById("questionsContainer");
            readPane.innerHTML = "";
            exerPane.innerHTML = "";

            quizData.forEach((passage, pIndex) => {
                let readHtml = `<div class="passage-block">`;
                if(passage.instruction) {
                    readHtml += `<p style="font-style: italic; color: #008080; margin-bottom: 15px;">${passage.instruction}</p>`;
                }
                
                passage.paragraphs.forEach((para, i) => {
                    readHtml += `
                        <div class="paragraph">${para.text}</div>
                        <button class="btn-translate" onclick="toggleTranslate(this)">Mở dịch đoạn này 🌟</button>
                        <div class="translation-box">${para.translation}</div>
                    `;
                });

                if(passage.glossary && passage.glossary.length > 0) {
                    readHtml += `
                        <h3 style="color: var(--primary); margin-top: 20px; font-size: 1.2rem;">📚 Bảng Từ Vựng Khó (Glossary)</h3>
                        <table class="glossary-table">
                            <tr><th>Từ vựng</th><th>Loại từ</th><th>Nghĩa tiếng Việt</th></tr>
                    `;
                    passage.glossary.forEach(item => {
                        readHtml += `<tr><td><strong>${item.word}</strong></td><td><i>${item.type}</i></td><td>${item.meaning}</td></tr>`;
                    });
                    readHtml += `</table>`;
                }
                readHtml += `</div>`;
                readPane.innerHTML += readHtml;

                passage.questions.forEach((q) => {
                    totalQuestions++;
                    let shuffledOptions = shuffleArray([...q.options]); 
                    
                    let optionsHtml = `<div class="options-grid">`;
                    shuffledOptions.forEach((opt) => {
                        optionsHtml += `
                            <div class="option-btn" id="opt_${q.qNum}_${opt.id}" 
                                 data-correct="${opt.isCorrect}"
                                 onclick="handleAnswer(${q.qNum}, '${opt.id}')">
                                 ${opt.text}
                            </div>
                        `;
                    });
                    optionsHtml += `</div>`;

                    let qHtml = `
                        <div class="question-card" id="card_${q.qNum}">
                            <div class="question-text">${q.text}</div>
                            ${optionsHtml}
                            <div class="explanation-box" id="exp_${q.qNum}">
                                <div class="explain-title">💡 Phân tích đáp án cùng Ms Mai An:</div>
                                ${q.explanation}
                            </div>
                        </div>
                    `;
                    exerPane.innerHTML += qHtml;
                });
            });
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if(type === 'correct') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            } else {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }

        function createConfetti() {
            const colors = ['#00b894', '#0984e3', '#fdcb6e', '#00cec9', '#ffeaa7'];
            const container = document.getElementById('confetti-container');
            for(let i=0; i<35; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 1 + 1.5) + 's';
                container.appendChild(conf);
                setTimeout(() => conf.remove(), 2500);
            }
        }

        function handleAnswer(qNum, optId) {
            if(hasAnswered[qNum]) return; 
            hasAnswered[qNum] = true;

            const clickedBtn = document.getElementById(`opt_${qNum}_${optId}`);
            const isCorrect = clickedBtn.getAttribute('data-correct') === 'true';
            
            const allBtns = document.querySelectorAll(`[id^="opt_${qNum}_"]`);
            allBtns.forEach(btn => btn.classList.add('disabled'));

            if(isCorrect) {
                clickedBtn.classList.add('correct');
                playSound('correct');
                createConfetti();
                answeredCorrectly++;
            } else {
                clickedBtn.classList.add('wrong');
                clickedBtn.classList.add('shake');
                playSound('wrong');
                
                allBtns.forEach(btn => {
                    if(btn.getAttribute('data-correct') === 'true') {
                        btn.classList.add('correct');
                    }
                });
            }

            setTimeout(() => {
                document.getElementById(`exp_${qNum}`).classList.add('show');
            }, 600);
        }

        let timeRemaining = 600; 
        let timerInterval;
        let isTimerRunning = false;

        function updateTimerDisplay() {
            let m = Math.floor(timeRemaining / 60);
            let s = timeRemaining % 60;
            document.getElementById("timerDisplay").innerText = 
                (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
        }

        function startTimer() {
            const btn = document.getElementById("startTimerBtn");
            if(!isTimerRunning) {
                isTimerRunning = true;
                btn.innerHTML = "⏸ TẠM DỪNG";
                btn.style.background = "#e17055";
                btn.style.boxShadow = "0 5px 0 #d63031";
                
                timerInterval = setInterval(() => {
                    timeRemaining--;
                    updateTimerDisplay();
                    if(timeRemaining <= 0) {
                        clearInterval(timerInterval);
                        alert("⏰ Đã hết giờ làm bài! Bạn vẫn có thể tiếp tục làm, nhưng nhớ là trong phòng thi thật, bạn chỉ nên làm một bài như thế này trong 10 phút thôi nha.");
                    }
                }, 1000);
            } else {
                isTimerRunning = false;
                clearInterval(timerInterval);
                btn.innerHTML = "▶ TIẾP TỤC";
                btn.style.background = "var(--primary)"; 
                btn.style.boxShadow = "0 5px 0 #009432";
            }
        }

        function submitQuiz() {
            clearInterval(timerInterval);
            let scoreText = `${answeredCorrectly}/${totalQuestions}`;
            document.getElementById("modalScore").innerText = scoreText;
            
            let message = "";
            let percent = answeredCorrectly / totalQuestions;
            if(percent === 1) message = "Trí tuệ Thiên Tài! Bạn đã xuất sắc hoàn thành 100% bài thi. Trái Đất tự hào về bạn! 🌍💚";
            else if(percent >= 0.8) message = "Làm tốt lắm! Bạn có kỹ năng đọc hiểu rất đáng nể. 👏🐬";
            else if(percent >= 0.5) message = "Khá lắm! Cố gắng ôn thêm từ vựng là điểm sẽ cao vút. Lên nào! 🌱";
            else message = "Không sao đâu! Học tiếng Anh là một hành trình dài. Làm lại lần nữa để nhớ lâu hơn nhé! 💪";
            
            document.getElementById("modalMessage").innerText = message;
            document.getElementById("resultModal").style.display = "flex";
            createConfetti();
        }

        window.onload = () => {
            renderQuiz();
        };
    </script>
</body>
</html>
