<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Quiz - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #8854C0;
            --secondary-bg: #FDCB6E;
            --tertiary-bg: #00C9A7;
            --quaternary-bg: #FF9A9E;
            --correct-color: #00D26A;
            --correct-shadow: #00994d;
            --wrong-color: #FF4757;
            --wrong-shadow: #cc0000;
            --btn-bg: #ffffff;
            --btn-shadow: #d1d8e0;
            --text-main: #2f3640;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0.8; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(-45deg, var(--primary-bg), var(--secondary-bg), var(--tertiary-bg), var(--quaternary-bg));
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .floating-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-icon {
            position: absolute;
            font-size: 2rem;
            animation: floatUp linear infinite;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        header {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 2rem; color: #ff6b81; text-transform: uppercase; letter-spacing: 2px;}
        .teacher-name { font-size: 1rem; color: #7bed9f; font-weight: bold; background: #2f3542; display: inline-block; padding: 5px 15px; border-radius: 15px; margin-top: 10px;}

        .score-board {
            display: flex;
            justify-content: space-between;
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 5px 0 var(--btn-shadow);
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 0 var(--btn-shadow);
            margin-bottom: 40px;
            transition: all 0.3s ease;
        }

        .question-title {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: #3742fa;
            line-height: 1.5;
            border-bottom: 2px dashed #f1f2f6;
            padding-bottom: 15px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .option-btn {
            background: var(--btn-bg);
            border: 3px solid #dfe4ea;
            border-radius: 15px;
            padding: 15px 20px;
            font-size: 1.08rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            box-shadow: 0 6px 0 #dfe4ea;
            transition: all 0.1s ease-in-out;
            text-align: left;
            position: relative;
        }

        .option-btn:hover {
            transform: scale(1.02);
            border-color: #a4b0be;
            box-shadow: 0 6px 0 #a4b0be;
        }

        .option-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 transparent;
        }

        .option-btn.correct {
            background: var(--correct-color);
            color: white;
            border-color: var(--correct-shadow);
            box-shadow: 0 6px 0 var(--correct-shadow);
            transform: translateY(0);
        }

        .option-btn.wrong {
            background: var(--wrong-color);
            color: white;
            border-color: var(--wrong-shadow);
            box-shadow: 0 6px 0 var(--wrong-shadow);
            animation: shake 0.4s;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            pointer-events: none;
        }

        .explanation {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f1f2f6;
            border-left: 6px solid #3742fa;
            border-radius: 10px;
            font-size: 1rem;
            line-height: 1.6;
            animation: fadeIn 0.5s ease-in-out;
        }

        .explanation h4 {
            margin-top: 0;
            color: #ff4757;
            font-size: 1.1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .submit-btn {
            display: block;
            width: 100%;
            background: #ffa502;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 20px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 8px 0 #eccc68;
            cursor: pointer;
            margin-bottom: 50px;
            font-family: 'Nunito', sans-serif;
        }

        .submit-btn:hover { transform: scale(1.02); }
        .submit-btn:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            z-index: 1000;
            pointer-events: none;
        }

        #popup {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .popup-content h2 { color: #ff4757; font-size: 2.5rem; margin-top: 0;}
        .popup-content p { font-size: 1.5rem; font-weight: bold; color: #2ed573; }
        .popup-btn {
            background: #3742fa; color: white; border: none; padding: 15px 30px;
            font-size: 1.2rem; border-radius: 15px; font-weight: bold; margin-top: 20px;
            cursor: pointer; box-shadow: 0 5px 0 #5352ed;
        }
        
        .part-title {
            background: #ff7f50; color: white; padding: 10px 20px; border-radius: 15px;
            display: inline-block; margin-bottom: 20px; font-weight: bold; box-shadow: 0 4px 0 #ff6348;
        }
    </style>
</head>
<body>

    <div class="floating-bg" id="floatingBg"></div>

    <div class="container">

            <h1>English Grammar Quiz</h1>

        <div class="score-board">
            <span>Câu hỏi: <span id="current-q">0</span>/30</span>
            <span>Điểm: <span id="score">0</span></span>

        <button class="submit-btn" onclick="showResults()">NỘP BÀI 🎉</button>

            <p>Điểm của bạn: <span id="final-score"></span>/30</p>
            <div id="feedback-msg" style="font-size: 1.2rem; margin: 15px 0; color: #ffa502; font-weight: bold;"></div>
            <button class="popup-btn" onclick="location.reload()">Làm Lại Lần Nữa!</button>
        </div>
    </div>

<script>
// --- AUDIO SYSTEM (Web Audio API) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playDing() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
}

function playBuzz() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
}

// --- CONFETTI SYSTEM ---
function createConfetti() {
    const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#ff69b4'];
    for(let i=0; i<30; i++) {
        const conf = document.createElement('div');
        conf.classList.add('confetti');
        conf.style.left = Math.random() * 100 + 'vw';
        conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        conf.style.top = '-10px';
        document.body.appendChild(conf);
        
        let x = (Math.random() - 0.5) * 10;
        let y = Math.random() * 5 + 2;
        let rot = Math.random() * 360;
        
        const anim = setInterval(() => {
            let currentTop = parseFloat(conf.style.top);
            let currentLeft = parseFloat(conf.style.left);
            conf.style.top = (currentTop + y) + 'px';
            conf.style.left = (currentLeft + x) + 'px';
            conf.style.transform = `rotate(${rot}deg)`;
            rot += 5;
            if(currentTop > window.innerHeight) {
                clearInterval(anim);
                conf.remove();
            }
        }, 20);
    }
}

// --- FLOATING BG SYSTEM ---
const bgIcons = ['🌟', '🍎', '☁️', '🚀', '🎈', '🐱', '🎵', '🍉'];
const bgContainer = document.getElementById('floatingBg');
for(let i=0; i<20; i++) {
    const icon = document.createElement('div');
    icon.classList.add('floating-icon');
    icon.innerText = bgIcons[Math.floor(Math.random() * bgIcons.length)];
    icon.style.left = Math.random() * 100 + 'vw';
    icon.style.animationDuration = (Math.random() * 20 + 15) + 's';
    icon.style.animationDelay = (Math.random() * -30) + 's';
    icon.style.fontSize = (Math.random() * 2 + 1) + 'rem';
    bgContainer.appendChild(icon);
}

// --- SHUFFLE FUNCTION ---
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// --- DATA SYSTEM (100% Nguyên vẹn dữ liệu) ---
const quizData = [
    // BÀI 1: GAP FILL
    {
        part: "BASIC EXERCISES - 1: Complete the sentences with 'will' or 'won't' and verbs in brackets.",
        q: "1. It (not rain) _______ tomorrow morning.",
        opts: [
            { text: "won't rain", isCorrect: true },
            { text: "will not raining", isCorrect: false },
            { text: "doesn't rain", isCorrect: false },
            { text: "won't to rain", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Trời sẽ không mưa vào sáng mai.<br>
        <b>2. Phân tích các đáp án:</b><br>
        - A. won't rain (v): sẽ không mưa (Cấu trúc tương lai đơn phủ định chuẩn).<br>
        - B. will not raining (v): Sai ngữ pháp (sau will/won't phải là V nguyên thể, không phải V-ing).<br>
        - C. doesn't rain (v): Sai thì (Hiện tại đơn không dùng cho 'tomorrow').<br>
        - D. won't to rain (v): Sai ngữ pháp (thừa giới từ 'to').<br>
        <b>3. Tại sao chọn đáp án đúng:</b> Có dấu hiệu "tomorrow morning" (sáng mai) -> Tương lai đơn. Yêu cầu thể phủ định "not rain" -> dùng "won't + V(nguyên thể)".<br>
        <b>4. Tại sao các đáp án khác sai:</b> B, C, D đều vi phạm quy tắc chia thì hoặc sai cấu trúc cơ bản của trợ động từ khuyết thiếu.`
    },
    {
        q: "2. Jim (not arrive) _______ here tomorrow.",
        opts: [
            { text: "won't arrive", isCorrect: true },
            { text: "isn't arriving", isCorrect: false },
            { text: "won't arrives", isCorrect: false },
            { text: "will not arrived", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Jim sẽ không đến đây vào ngày mai.<br>
        <b>2. Phân tích các đáp án:</b><br>
        - A. won't arrive (v): sẽ không đến.<br>
        - B. isn't arriving (v): không đến (hiện tại tiếp diễn, có thể dùng cho tương lai có kế hoạch nhưng ở đây đề bài yêu cầu dùng will/won't).<br>
        - C. won't arrives (v): sai cấu trúc (thừa 's').<br>
        - D. will not arrived (v): sai cấu trúc (V-ed ở quá khứ).<br>
        <b>3. Tại sao chọn A:</b> Dấu hiệu "tomorrow" -> Tương lai đơn. Thể phủ định của động từ thường với "will" là "won't + V-inf".<br>
        <b>4. Tại sao sai:</b> Các đáp án còn lại chia sai dạng động từ nguyên thể sau 'will/won't'.`
    },
    {
        q: "3. We (not go) _______ to the concert without you.",
        opts: [
            { text: "won't go", isCorrect: true },
            { text: "don't go", isCorrect: false },
            { text: "won't going", isCorrect: false },
            { text: "will not to go", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Chúng tôi sẽ không đi đến buổi hòa nhạc nếu không có bạn.<br>
        <b>2. Phân tích các đáp án:</b><br>
        - A. won't go: sẽ không đi.<br>
        - B. don't go: không đi (hiện tại đơn).<br>
        - C. won't going: sai ngữ pháp (dùng V-ing).<br>
        - D. will not to go: sai ngữ pháp (thừa 'to').<br>
        <b>3. Tại sao chọn A:</b> Sự việc diễn tả một lời hứa/quyết định ở tương lai. Đề bài yêu cầu will/won't -> won't go.<br>
        <b>4. Tại sao sai:</b> B sai thì. C, D bẫy ngữ pháp (thêm đuôi ing, thêm to) sau trợ động từ khuyết thiếu.`
    },
    {
        q: "4. What (you/cook) _______ for dinner tonight?",
        opts: [
            { text: "will you cook", isCorrect: true },
            { text: "do you cook", isCorrect: false },
            { text: "you will cook", isCorrect: false },
            { text: "will you cooking", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Tối nay bạn sẽ nấu món gì cho bữa tối?<br>
        <b>2. Phân tích các đáp án:</b><br>
        - A. will you cook: bạn sẽ nấu (Câu hỏi thì TLĐ chuẩn).<br>
        - B. do you cook: bạn nấu (Câu hỏi thì HTĐ).<br>
        - C. you will cook: sai trật tự câu hỏi.<br>
        - D. will you cooking: sai ngữ pháp động từ.<br>
        <b>3. Tại sao chọn A:</b> "tonight" chỉ một sự việc sắp diễn ra. Cấu trúc câu hỏi thì tương lai đơn (Wh-question): Wh-word + will + S + V-inf? -> What + will + you + cook?<br>
        <b>4. Tại sao sai:</b> B sai thì, C sai vì chưa đảo 'will' lên trước chủ ngữ, D sai dạng V-ing.`
    },
    {
        q: "5. (Maria/travel) _______ to Berlin on the metro?",
        opts: [
            { text: "Will Maria travel", isCorrect: true },
            { text: "Does Maria travel", isCorrect: false },
            { text: "Maria will travel", isCorrect: false },
            { text: "Will Maria travels", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Maria sẽ đi tàu điện ngầm tới Berlin chứ?<br>
        <b>2. Phân tích các đáp án:</b><br>
        - A. Will Maria travel: Cấu trúc nghi vấn tương lai đơn chuẩn.<br>
        - B. Does Maria travel: Cấu trúc hiện tại đơn.<br>
        - C. Maria will travel: Cấu trúc khẳng định, không phải câu hỏi.<br>
        - D. Will Maria travels: Sai do động từ thêm 's'.<br>
        <b>3. Tại sao chọn A:</b> Câu hỏi Yes/No thì Tương lai đơn: Will + S + V-inf? -> Will + Maria + travel?<br>
        <b>4. Tại sao sai:</b> Các đáp án kia chia sai loại câu (C) hoặc sai dạng động từ nguyên thể sau 'will' (D).`
    },
    {
        q: "6. I'm very busy, I (have) _______ no time to help you with your work later though.",
        opts: [
            { text: "will have", isCorrect: true },
            { text: "have", isCorrect: false },
            { text: "won't have", isCorrect: false },
            { text: "will has", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Dù vậy, tôi đang rất bận, lát nữa tôi sẽ không có thời gian giúp bạn làm việc đâu.<br>
        <b>2. Phân tích:</b><br>
        - A. will have: sẽ có.<br>
        - B. have: có (HTĐ).<br>
        - C. won't have: sẽ không có (Sai nghĩa vì đằng sau đã có chữ "no time" (không có thời gian), won't + no time thành phủ định kép).<br>
        - D. will has: sai ngữ pháp ('has' không phải nguyên thể).<br>
        <b>3. Chọn A:</b> Trạng từ "later" (lát nữa) chỉ tương lai. Câu khẳng định: S + will + V-inf. Chữ "no" đã mang nghĩa phủ định rồi nên ta chỉ dùng "will have".<br>
        <b>4. Bẫy:</b> Đáp án C (won't have) rất dễ nhầm do học sinh thấy tiếng Việt "sẽ không có", nhưng "have no time" đã đủ nghĩa phủ định.`
    },
    {
        q: "7. Mr. Brown (teach) _______ your class English this semester.",
        opts: [
            { text: "will teach", isCorrect: true },
            { text: "teaches", isCorrect: false },
            { text: "will teaches", isCorrect: false },
            { text: "won't to teach", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Thầy Brown sẽ dạy tiếng Anh cho lớp bạn trong học kỳ này.<br>
        <b>2. Phân tích:</b><br>
        - A. will teach: sẽ dạy.<br>
        - B. teaches: dạy (HTĐ).<br>
        - C. will teaches: sai ngữ pháp.<br>
        - D. won't to teach: sai ngữ pháp.<br>
        <b>3. Chọn A:</b> "this semester" (kỳ học này - dự báo sự việc xảy ra trong kỳ học). Khẳng định thì tương lai: will + teach.<br>
        <b>4. Bẫy:</b> Thêm 's' sau động từ khi có 'will' (C) là lỗi rất phổ biến ở học sinh.`
    },
    {
        q: "8. High-speed trains (be) _______ very popular in the next years.",
        opts: [
            { text: "will be", isCorrect: true },
            { text: "are", isCorrect: false },
            { text: "will are", isCorrect: false },
            { text: "won't be", isCorrect: false }
        ],
        exp: `<b>1. Dịch câu hỏi:</b> Tàu cao tốc sẽ trở nên rất phổ biến trong những năm tới.<br>
        <b>2. Phân tích:</b><br>
        - A. will be: sẽ là/sẽ trở nên.<br>
        - B. are: là (hiện tại).<br>
        - C. will are: sai bét ngữ pháp (are không phải nguyên thể).<br>
        - D. won't be: sẽ không là (sai nghĩa logic so với bối cảnh tương lai).<br>
        <b>3. Chọn A:</b> Dấu hiệu "in the next years" -> Tương lai. Động từ "be" ở dạng nguyên thể là "be". -> will be.<br>
        <b>4. Bẫy:</b> Nhiều bạn dùng "will are" hoặc "will is" vì thói quen chia động từ tobe ở hiện tại.`
    },
    {
        q: "9. There (not be) _______ gridlock between 5:30 and 7:00 in our country.",
        opts: [
            { text: "won't be", isCorrect: true },
            { text: "isn't", isCorrect: false },
            { text: "will not is", isCorrect: false },

        <b>2. Phân tích:</b><br>

        - C. Sai vì 'speaks' thêm s.<br>
        - D. Sai vì chưa đảo ngữ trợ động từ.<br>
        <b>3. Chọn A:</b> Chủ ngữ là cụm dài "People all over the world". Cấu trúc: Will + S + V-inf + O?<br>
        <b>4. Bẫy:</b> Chủ ngữ quá dài khiến học sinh bối rối không biết đặt Will ở đâu.`
    },
    {

        opts: [

        <b>4. Bẫy:</b> Không biết dùng giới từ "by" chỉ phương tiện.`
    }
];

// --- QUIZ LOGIC ---
let currentScore = 0;
let answeredQuestions = new Set();
const quizContainer = document.getElementById('quiz-container');

function renderQuiz() {
    let currentPart = "";
    
    quizData.forEach((item, index) => {
        // Group header rendering
        if (item.part && item.part !== currentPart) {
            const partEl = document.createElement('div');
            partEl.className = 'part-title';
            partEl.innerText = item.part;
            quizContainer.appendChild(partEl);
            currentPart = item.part;
        }

        const card = document.createElement('div');
        card.className = 'card';
        card.id = `q-card-${index}`;

        const qTitle = document.createElement('div');
        qTitle.className = 'question-title';
        qTitle.innerText = item.q;
        card.appendChild(qTitle);

        const optionsGrid = document.createElement('div');
        optionsGrid.className = 'options-grid';

        // Shuffle options strictly according to prompt
        const shuffledOpts = shuffleArray([...item.opts]);
        const letters = ['A', 'B', 'C', 'D'];

        shuffledOpts.forEach((opt, oIndex) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${letters[oIndex]}.</strong> ${opt.text}`;
            btn.onclick = () => handleAnswer(index, opt.isCorrect, btn, optionsGrid, item.exp);
            optionsGrid.appendChild(btn);
        });

        card.appendChild(optionsGrid);

        const expDiv = document.createElement('div');
        expDiv.className = 'explanation';
        expDiv.id = `exp-${index}`;
        expDiv.innerHTML = `<h4>💡 GIẢI THÍCH CHI TIẾT:</h4><p>${item.exp}</p>`;
        card.appendChild(expDiv);

        quizContainer.appendChild(card);
    });
}

function handleAnswer(qIndex, isCorrect, btnElement, gridElement, explanationHtml) {
    if (answeredQuestions.has(qIndex)) return; // Prevent multi-clicks

    answeredQuestions.add(qIndex);
    document.getElementById('current-q').innerText = answeredQuestions.size;

    const allBtns = gridElement.querySelectorAll('.option-btn');
    allBtns.forEach(b => b.disabled = true); // Lock options

    if (isCorrect) {
        btnElement.classList.add('correct');
        playDing();
        createConfetti();
        currentScore++;
        document.getElementById('score').innerText = currentScore;
    } else {
        btnElement.classList.add('wrong');
        playBuzz();
        // Highlight correct answer
        allBtns.forEach(b => {
            const btnText = b.innerText.substring(3).trim();
            const correctOpt = quizData[qIndex].opts.find(o => o.isCorrect).text;
            if (btnText === correctOpt) {
                b.style.border = "3px dashed var(--correct-color)";
                b.style.color = "var(--correct-color)";
            }
        });
    }

    // Auto show explanation immediately (Must do according to prompt)
    const expDiv = document.getElementById(`exp-${qIndex}`);
    expDiv.style.display = 'block';
}

function showResults() {
    if (answeredQuestions.size < quizData.length) {
        alert("Ôi! Bạn vẫn chưa hoàn thành hết các câu hỏi kìa! Cố lên nhé! 💪");
        return;
    }
    document.getElementById('popup').style.display = 'flex';
    document.getElementById('final-score').innerText = currentScore;
    
    let msg = "";
    if (currentScore === 30) msg = "Quá đỉnh! Chức vô địch thuộc về bạn! 🌟🌟🌟";
    else if (currentScore >= 20) msg = "Giỏi lắm! Bạn đã rất cố gắng! 👍";
    else msg = "Đừng buồn, hãy đọc kỹ phần giải thích và thử lại nhé! ❤️";
    document.getElementById('feedback-msg').innerText = msg;
    createConfetti();
}

// Khởi tạo
renderQuiz();
</script>
