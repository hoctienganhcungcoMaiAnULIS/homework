<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>English Blast! | Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Nunito:wght@400;500;600;700;800;900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
    /* GIAO DIỆN MÀN HÌNH KHÓA */
    #passwordModal {
      position:fixed; inset:0; z-index:9999;
      display:flex; align-items:center; justify-content:center;
      background:rgba(5,2,15,0.92); backdrop-filter:blur(20px);
    }
    .pw-card {
      background:linear-gradient(160deg, rgba(40,10,70,0.95) 0%, rgba(15,5,30,0.98) 100%);
      border:1.5px solid rgba(240,192,64,0.4); border-radius:24px; padding:48px 40px 40px; 
      max-width:440px; width:93%; text-align:center; position:relative; overflow:hidden;
      box-shadow:0 0 60px rgba(106,5,114,0.6), 0 0 120px rgba(240,192,64,0.1), inset 0 1px 0 rgba(240,192,64,0.15);
    }
    .pw-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg, #6A0572, #F0C040, #6A0572);
    }
    .pw-crest { font-size:4rem; margin-bottom:8px; display:block; }
    .pw-title { font-family:'Cinzel', serif; font-size:1.4rem; font-weight:700; color:#F0C040; margin-bottom:6px; letter-spacing:1px; }
    .pw-sub   { font-size:.87rem; color:rgba(200,200,212,0.6); margin-bottom:24px; }
    .pw-input {
      width:100%; padding:13px 20px; border-radius:12px;
      border:1.5px solid rgba(240,192,64,0.3); background:rgba(255,255,255,0.05);
      color:#FFE082; font-size:1rem; font-family:'Nunito', sans-serif;
      outline:none; letter-spacing:3px; text-align:center; transition:all .3s;
    }
    .pw-input:focus { border-color:#F0C040; box-shadow:0 0 0 3px rgba(240,192,64,0.15); }
    .pw-input.error { border-color:#FF4757; box-shadow:0 0 0 3px rgba(255,71,87,0.25); animation:shake .4s ease; }
    .pw-input::placeholder { color:rgba(200,200,212,0.3); letter-spacing:1px; }
    .pw-btn {
      width:100%; padding:14px; margin-top:14px; border-radius:12px; border:none;
      background:linear-gradient(135deg, #6A0572 0%, #9B1FA8 40%, #F0C040 100%);
      color:#fff; font-size:1rem; font-weight:700; font-family:'Cinzel', serif;
      cursor:pointer; letter-spacing:.5px; transition:transform .2s;
    }
    .pw-btn:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(106,5,114,0.7); }
    .pw-err { color:#ff8a9a; font-size:.84rem; margin-top:10px; display:none; font-weight:700; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 15%,45%,75%{transform:translateX(-6px)} 30%,60%,90%{transform:translateX(6px)} }
    </style>
    <style>
        /* === MAIN THEME STYLE === */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Nunito', sans-serif;
            color: #2d3436;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #8854C0;
        }

        /* Animated Gradient Background */
        .animated-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #8854C0, #FDCB6E, #00C9A7, #ff9a9e);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            z-index: -2;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Pattern Mèo & Hoa */
        .pattern-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='90' height='90' viewBox='0 0 90 90' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='15' y='40' font-size='22' opacity='0.15'%3E🌸%3C/text%3E%3Ctext x='60' y='80' font-size='22' opacity='0.15'%3E🐱%3C/text%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px 15px 80px; }

        /* Headers */
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 10px; }
        h1 {
            font-size: 2.2rem; font-weight: 900;
            color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-family: 'Quicksand', sans-serif;
        }
        .teacher-badge {
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(10px);
            padding: 6px 16px; border-radius: 30px;
            font-size: 0.9rem; font-weight: 700; color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.4);
        }

        .reset-btn {
            background: rgba(255, 255, 255, 0.9); color: #8854C0;
            border: none; padding: 10px 24px; border-radius: 40px;
            font-weight: 800; font-size: 1rem; cursor: pointer;
            box-shadow: 0 6px 0 #d1c4e9; transition: 0.2s;
            margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px;
        }
        .reset-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #d1c4e9; }

        /* Question Cards */
        .question-card {
            background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 28px; padding: 25px; margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .question-text {
            font-size: 1.15rem; font-weight: 800; color: #2d3436;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 20px; border-radius: 20px; margin-bottom: 20px;
            line-height: 1.5; box-shadow: inset 0 2px 5px rgba(255,255,255,0.5);
        }
        .question-text em {
            display: block; margin-top: 10px; color: #4b4b4b; font-weight: 600;
            background: rgba(255,255,255,0.5); padding: 10px 15px; border-radius: 12px;
            border-left: 4px solid #8854C0; font-style: normal;
        }

        /* Option Buttons */
        .options-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;
        }
        .option-btn {
            background: #ffffff; color: #4b4b4b;
            border: 2px solid transparent; padding: 16px 20px;
            border-radius: 20px; font-family: 'Nunito', sans-serif;
            font-size: 1.08rem; font-weight: 700; text-align: left;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 8px 0 rgba(0,0,0,0.08);
            line-height: 1.4;
        }
        .option-btn:hover {
            transform: scale(1.02) translateY(-4px);
            box-shadow: 0 12px 0 rgba(0,0,0,0.12);
            border-color: #FDCB6E;
        }
        .option-btn:active { transform: scale(0.98) translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.08); }

        .option-btn.correct-highlight {
            background: #00D26A; color: white; border-color: #00b35a;
            box-shadow: 0 8px 0 #00994d; transform: translateY(2px);
        }
        .option-btn.wrong-highlight {
            background: #FF4757; color: white; border-color: #e03e4d;
            box-shadow: 0 8px 0 #cc3945; transform: translateY(2px);
            text-decoration: line-through; opacity: 0.9;
        }
        .option-btn.disabled-opt { pointer-events: none; }

        /* Explanation Box */
        .explanation-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px; padding: 20px; margin-top: 20px;
            font-size: 1rem; line-height: 1.6; color: #2d3436;
            border-left: 8px solid #8854C0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: none; animation: slideDown 0.4s ease forwards;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Highlight Tiếng Việt Box */
        .vi-trans {
            background: #fff3e0;
            color: #d35400;
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: 700;
            display: block;
            margin: 8px 0 14px 0;
            border-left: 5px solid #ff9f43;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
            font-size: 1.05rem;
        }

        .p-word { color: #0984e3; font-weight: 800; }
        .p-phonetic { color: #6c5ce7; background: #e8e6f8; padding: 2px 8px; border-radius: 12px; font-family: monospace; font-weight: 700; }
        .p-grammar { color: #d63031; text-decoration: underline; text-decoration-thickness: 2px; font-weight: 800; }
        .hl-green { color: #00b894; font-weight: 900; background: #e0f8f1; padding: 2px 6px; border-radius: 8px; }
        .hl-red { color: #d63031; text-decoration: line-through; font-weight: 700; background: #fcebeb; padding: 2px 6px; border-radius: 8px; }

        @keyframes shakeWrong {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .shake { animation: shakeWrong 0.4s ease; }

        /* Submit Area */
        .submit-area { text-align: center; margin-top: 40px; }
        .submit-final {
            background: linear-gradient(135deg, #00C9A7, #00b894);
            border: none; padding: 18px 45px; border-radius: 50px;
            font-size: 1.4rem; font-weight: 900; color: white;
            box-shadow: 0 10px 0 #008f73; cursor: pointer; transition: 0.1s;
            font-family: 'Quicksand', sans-serif; text-transform: uppercase; letter-spacing: 1px;
        }
        .submit-final:active { transform: translateY(10px); box-shadow: 0 0px 0 #008f73; }

        /* Modals */
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-card {
            background: #fff; border-radius: 35px; max-width: 450px; width: 90%;
            padding: 40px 30px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .modal-card h2 { font-size: 1.8rem; color: #8854C0; margin-bottom: 20px; font-weight: 900; }
        .modal-card input {
            width: 100%; padding: 16px 20px; margin-bottom: 10px; border-radius: 20px;
            border: 3px solid #e0e0e0; font-size: 1.1rem; font-family: 'Nunito', sans-serif;
            outline: none; transition: 0.2s; font-weight: 700; text-align: center;
        }
        .modal-card input:focus { border-color: #FDCB6E; }
        .modal-card input.error { border-color: #FF4757; background: #fff0f1; }
        .modal-card button {
            background: #FDCB6E; border: none; padding: 15px 35px;
            border-radius: 30px; font-weight: 900; font-size: 1.2rem;
            color: #d35400; cursor: pointer; box-shadow: 0 6px 0 #e1b156; margin-top: 15px;
        }
        .modal-card button:active { transform: translateY(6px); box-shadow: 0 0 0 #e1b156; }
        .result-gif { width: 100%; border-radius: 20px; margin: 20px 0; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="passwordModal">
  <div class="pw-card">
    <span class="pw-crest">🔒</span>
    <div class="pw-title">BẢO MẬT</div>
    <div class="pw-sub">Vui lòng nhập mật khẩu để làm bài</div>
    <input type="password" class="pw-input" id="pwInput" placeholder="Nhập mật khẩu..." autocomplete="off" />
    <button class="pw-btn" onclick="checkPassword()">XÁC NHẬN</button>
    <div class="pw-err" id="pwErr">Mật khẩu không đúng! Vui lòng thử lại.</div>
  </div>
</div>

<div id="mainContent" style="display: none;">
    <div class="animated-bg"></div>
    <div class="pattern-overlay"></div>
    
    <div class="container">
        <div class="header-top">
            <h1>🚀 English Blast!</h1>
            <div class="teacher-badge">👩‍🏫 Giáo viên tạo: Ms Mai An ULIS</div>
        </div>
        
        <button class="reset-btn" id="fullResetBtn">🔄 Làm lại & Xáo trộn đề</button>
        
        <div id="questionsContainer"></div>
        
        <div class="submit-area">
            <button class="submit-final" id="submitTestBtn">🎯 NỘP BÀI & XEM KẾT QUẢ</button>
        </div>
    </div>
</div>

<div id="nameModal" class="modal">
    <div class="modal-card">
        <h2>✨ Tên của bạn là gì? ✨</h2>
        <input type="text" id="studentName" placeholder="Ví dụ: Nguyễn Văn A..." autocomplete="off">
        <div id="nameError" style="color: #FF4757; font-weight: 700; font-size: 0.9rem; height: 20px;"></div>
        <button id="confirmNameBtn">Khám phá kết quả 🚀</button>
    </div>
</div>

<div id="resultModal" class="modal">
    <div class="modal-card">
        <h2 id="resultGreeting" style="font-size: 1.5rem;"></h2>
        <div id="scoreDisplay" style="font-size: 2.2rem; font-weight: 900; color: #00C9A7; margin: 10px 0;"></div>
        <img id="resultGif" class="result-gif" alt="Result Meme">
        <button id="closeResultBtn" style="background: #e0e0e0; color: #4b4b4b; box-shadow: 0 6px 0 #bdbdbd;">Làm lại bài nhé</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
    const _k  = [49, 54, 49, 49]; 
    const _pw = _k.map(c => String.fromCharCode(c)).join('');

    function checkPassword() {
      const inp = document.getElementById('pwInput');
      const err = document.getElementById('pwErr');
      if (inp.value === _pw) {
        document.getElementById('passwordModal').style.display = 'none';
        const main = document.getElementById('mainContent');
        if(main) main.style.display = 'block';
        initTest(); 
      } else {
        inp.classList.remove('error'); void inp.offsetWidth; inp.classList.add('error');
        err.style.display = 'block'; setTimeout(() => inp.classList.remove('error'), 500);
      }
    }
    document.addEventListener('DOMContentLoaded', () => {
      const pwInput = document.getElementById('pwInput');
      if(pwInput) pwInput.addEventListener('keydown', e => { if (e.key==='Enter') checkPassword(); });
    });

    const questionsRaw = [];
    function addQ(id, text, choices, correctIdx, explanationHtml) {
        questionsRaw.push({ id, text, choices, correctIdx, explanationHtml, userSelected: null, currentShuffledChoices: [], currentCorrectMapIdx: -1 });
    }

    addQ(41, "Lan and Hoa ______ ice cream at the moment.", 
        ["was eating", "is eating", "eating", "are eating"], 3,
        `<div>1. <span class='vi-trans'>📖 Dịch nghĩa: "Lan và Hoa đang ăn kem vào lúc này."</span>
        2. <span class='p-word'>Phân tích 4 đáp án:</span><br>
        - was eating: thì quá khứ tiếp diễn (dùng cho chủ ngữ số ít).<br>
        - is eating: thì hiện tại tiếp diễn (dùng cho chủ ngữ số ít).<br>
        - eating: V-ing (thiếu động từ to-be).<br>
        - are eating: thì hiện tại tiếp diễn (dùng cho chủ ngữ số nhiều).<br>
        3. <span class='hl-green'>Tại sao chọn "are eating"?</span> Vì chủ ngữ "Lan and Hoa" là số nhiều (2 người), và có dấu hiệu "at the moment" -> <span class='p-grammar'>Thì hiện tại tiếp diễn</span>.<br>
        4. <span class='hl-red'>Các đáp án còn lại sai</span> vì chia sai ngôi hoặc thiếu to-be.</div>`
    );
    addQ(42, `Huong: “We will have 2 days off, so what shall we do this weekend?” Hoa: “______”`,
        ["Let’s visit the art gallery.", "Thank you.", "I will go out.", "I don’t like it"], 0,
        `<div>1. <span class='vi-trans'>📖 Dịch nghĩa: Huong: “Chúng ta sẽ nghỉ 2 ngày, vậy cuối tuần này làm gì nhỉ?” Hoa: “______”</span>
        2. <span class='p-word'>Phân tích đáp án:</span><br>
        - Let’s visit the art gallery: Hãy đến thăm phòng tranh nhé.<br>
        - Thank you: Cảm ơn.<br>
        - I will go out: Tôi sẽ ra ngoài.<br>
        - I don’t like it: Tôi không thích nó.<br>
        3. <span class='hl-green'>Tại sao chọn "Let’s visit..."?</span> Vì đây là lời đáp lại tự nhiên và lịch sự nhất cho một <span class='p-grammar'>lời đề nghị rủ đi chơi (what shall we do)</span>.<br>
        4. <span class='hl-red'>Các đáp án còn lại sai</span> vì không ăn khớp với ngữ cảnh giao tiếp.</div>`
    );
    addQ(43, "You can see ______ moon clearly in the Mid-Autumn festival.", 
        ["the", "an", "a", "φ (no article)"], 0,
        `<div>1. <span class='vi-trans'>📖 Dịch nghĩa: "Bạn có thể thấy mặt trăng rất rõ vào dịp Tết Trung thu."</span>
        2. <span class='p-word'>Phân tích đáp án:</span> Cần điền mạo từ thích hợp trước danh từ "moon".<br>
        3. <span class='hl-green'>Tại sao chọn "the"?</span> <span class='p-grammar'>Quy tắc Mạo từ:</span> "moon" (mặt trăng) là danh từ chỉ vật thể độc nhất trong tự nhiên, nên bắt buộc phải đi kèm mạo từ xác định "the".<br>
        4. <span class='hl-red'>Các đáp án a/an/rỗng sai</span> vì không được dùng cho vật thể duy nhất.</div>`
    );
    addQ(44, "Mai speaks English well ______ her native language is Vietnamese.",
        ["so", "because", "However", "although"], 3,
        `<div>1. <span class='vi-trans'>📖 Dịch nghĩa: "Mai nói tiếng Anh rất tốt ______ tiếng mẹ đẻ của cô ấy là tiếng Việt."</span>
        2. <span class='p-word'>Phân tích từ vựng:</span> so (vì vậy), because (bởi vì), However (tuy nhiên - thường cần dấu câu đặc thù), although (mặc dù).<br>
        3. <span class='hl-green'>Tại sao chọn "although"?</span> Vì câu thể hiện sự tương phản rõ rệt giữa 2 vế: Mặc dù tiếng mẹ đẻ là tiếng Việt nhưng bạn ấy nói tiếng Anh lại rất chuẩn.<br>
        4. <span class='hl-red'>Các từ khác sai</span> vì làm sai lệch logic nguyên nhân - kết quả của câu.</div>`
    );
    addQ(45, "There are many available ______ power sources in Vietnam including sun, wind, water, etc.",
        ["nuclear", "hydro", "renewable", "solar"], 2,
        `<div>1. <span class='vi-trans'>📖 Dịch nghĩa: "Có rất nhiều nguồn năng lượng ______ có sẵn ở Việt Nam bao gồm mặt trời, gió, nước, v.v."</span>
        2. <span class='p-word'>Phân tích từ vựng:</span><br>
        - nuclear: hạt nhân.<br>
        - hydro: thủy điện.<br>
        - renewable: có thể tái tạo.<br>
        - solar: thuộc về mặt trời.<br>
        3. <span class='hl-green'>Tại sao chọn "renewable"?</span> Vì vế sau liệt kê "sun, wind, water" - đây đều là các ví dụ tiêu biểu của nhóm năng lượng tái tạo.<br>
        4. <span class='hl-red'>Các từ khác sai</span> vì nó chỉ đích danh một loại cụ thể, không đóng vai trò danh từ bao quát cho cả nhóm.</div>`
    );
    addQ(46, "Scientists ______ for a new energy source to replace coal nowadays.",
        ["looks", "is looking", "are looking", "will look"], 2,
        `<div>1. <span class='vi-trans'>📖 Dịch nghĩa: "Các nhà khoa học ______ một nguồn năng lượng mới để thay thế than đá hiện nay."</span>
        2. <span class='p-word'>Phân tích đáp án:</span> Câu yêu cầu chọn dạng đúng của động từ "look".<br>
        3. <span class='hl-green'>Tại sao chọn "are looking"?</span> Có dấu hiệu <span class='p-word'>nowadays</span> (hiện nay, ngày nay) -> <span class='p-grammar'>Thì hiện tại tiếp diễn</span>. Chủ ngữ "Scientists" (số nhiều) -> dùng to-be là "are".<br>
        4. <span class='hl-red'>A, B sai</span> vì chia ngôi số ít. <span class='hl-red'>D sai</span> vì chia thì tương lai.</div>`
    );
    addQ(47, "We want to visit ______ attraction in Sydney.",
        ["a", "an", "the", "x (no article)"], 1,
        `<div>1. <span class='vi-trans'>📖 Dịch nghĩa: "Chúng tôi muốn đến thăm một điểm tham quan ở Sydney."</span>
        2. <span class='p-word'>Phân tích:</span> Chỗ trống cần một mạo từ không xác định vì đây là lần đầu nhắc đến một địa điểm chung chung.<br>

    addQ(69, `My family joined the spring flower festival last weekend. We were excited to see the beautiful flowers. ______<br><em>a. Because the festival was more crowded than we expected.<br>b. However, it was difficult to find a parking spot.<br>c. Fortunately, we finally got to see the flowers and enjoyed taking pictures.</em><br>Which is the correct order to complete the paragraph?`,

    addQ(71, `Traveling in the future will be much faster and easier. With new technology, people will have more ways to travel. ______<br><em>a. Finally, space tourism will become possible for everyone to explore the universe.<br>b. First, high-speed trains will help us travel between cities in just a few minutes.<br>c. Additionally, there might be flying cars to avoid traffic jams on the streets.</em><br>Which is the correct order to complete the paragraph?`,

    addQ(76, `Choose the sentence that most appropriately ends the text in Question 75.`,
        ["I spent my days playing video games and going out with friends.", "With my mother’s support, I knew I could achieve my goals.", "I decided to give up on studying from then.", "When the next exam came, I was even less prepared and failed miserably."], 1,
        `<div>1. <span class='vi-trans'>📖 Dịch nghĩa câu chọn: "Với sự ủng hộ vô giá của mẹ, tôi biết mình có thể đạt được những mục tiêu đã đề ra."</span>
        2. <span class='hl-green'>Tại sao chọn "With my mother’s support..."?</span> Ở câu (a) trước đó, nhân vật đã hứa sẽ "study harder" (học chăm chỉ hơn). Do đó, câu kết bài thể hiện sự quyết tâm và thái độ trân trọng sự ủng hộ của mẹ là chính xác nhất.<br>
        3. <span class='hl-red'>Các đáp án khác sai</span> vì đều phác họa một học sinh buông thả (từ bỏ học hành, đi chơi game, tiếp tục thi trượt), phá hỏng hoàn toàn ý nghĩa nhân văn của đoạn văn.</div>`
    );

    let questionsData = [];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;
        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, now);
            osc.frequency.exponentialRampToValueAtTime(1046, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.3);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        }
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initTest() {
        questionsData = questionsRaw.map(q => {
            let shuffled = [...q.choices];
            shuffleArray(shuffled);
            let corIdx = shuffled.indexOf(q.choices[q.correctIdx]);
            return { ...q, currentShuffledChoices: shuffled, currentCorrectMapIdx: corIdx, userSelected: null };
        });
        renderUI();
    }

    function renderUI() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        
        questionsData.forEach((q, qIndex) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `qcard-${qIndex}`;
            
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerHTML = `🌟 <strong>Câu ${q.id}:</strong> ${q.text}`;
            card.appendChild(qText);
            
            const grid = document.createElement('div');
            grid.className = 'options-grid';
            
            q.currentShuffledChoices.forEach((choiceText, optIdx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = choiceText;
                
                if (q.userSelected !== null) {
                    btn.classList.add('disabled-opt');
                    if (optIdx === q.userSelected.selectedIdx) {
                        btn.classList.add(q.userSelected.isCorrect ? 'correct-highlight' : 'wrong-highlight');
                    }
                    if (optIdx === q.currentCorrectMapIdx && !q.userSelected.isCorrect) {
                        btn.classList.add('correct-highlight');
                    }
                } else {
                    btn.onclick = () => handleChoice(qIndex, optIdx);
                }
                grid.appendChild(btn);
            });
            card.appendChild(grid);
            
            const expDiv = document.createElement('div');
            expDiv.className = 'explanation-box';
            expDiv.id = `exp-${qIndex}`;
            expDiv.innerHTML = q.explanationHtml;
            if (q.userSelected !== null) expDiv.style.display = 'block';
            card.appendChild(expDiv);
            
            container.appendChild(card);
        });
    }

    function handleChoice(qIndex, optIdx) {
        const q = questionsData[qIndex];
        const isCorrect = (optIdx === q.currentCorrectMapIdx);
        q.userSelected = { selectedIdx: optIdx, isCorrect: isCorrect };
        
        if (isCorrect) {
            playSound('correct');
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, zIndex: 9999 });
        } else {
            playSound('wrong');
            const card = document.getElementById(`qcard-${qIndex}`);
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);
        }
        
        renderUI();
    }

    document.getElementById('fullResetBtn').onclick = initTest;

    document.getElementById('submitTestBtn').onclick = () => {
        document.getElementById('nameModal').style.display = 'flex';
        document.getElementById('studentName').value = '';
        document.getElementById('studentName').focus();
    };

    document.getElementById('confirmNameBtn').onclick = () => {
        const name = document.getElementById('studentName').value.trim();
        const err = document.getElementById('nameError');
        const inp = document.getElementById('studentName');
        
        if (!name) {
            err.innerText = "⚠️ Oops! Bạn chưa nhập tên kìa!";
            inp.classList.add('error');
            return;
        }
        inp.classList.remove('error');
        err.innerText = "";
        
        let correctCount = questionsData.filter(q => q.userSelected?.isCorrect).length;
        let total = questionsData.length;
        let percent = (correctCount / total) * 100;
        
        let greeting = "";
        let gif = "";
        
        if (percent === 100) {
            greeting = `🌟 THIÊN TÀI! ${name} xuất sắc tuyệt đối! 🌟`;
            gif = "https://media.tenor.com/GfSX-u7aMJQAAAAi/cat-dance.gif";
        } else if (percent >= 60) {
            greeting = `👍 GIỎI LẮM! ${name} làm rất tốt! 👍`;
            gif = "https://media.tenor.com/uHBlY8VhIjIAAAAi/high-five.gif";
        } else {
            greeting = `😢 ÔI KHÔNG! ${name} cần cố gắng hơn nhé! 😢`;
            gif = "https://media.tenor.com/GfHx6hFv6sMAAAAi/sad-cat.gif";
        }
        
        document.getElementById('nameModal').style.display = 'none';
        
        document.getElementById('resultGreeting').innerText = greeting;
        document.getElementById('scoreDisplay').innerText = `${correctCount} / ${total} CÂU (${Math.round(percent)}%)`;
        document.getElementById('resultGif').src = gif;
        document.getElementById('resultModal').style.display = 'flex';
        
        if (percent >= 60) {
            let duration = 3 * 1000;
            let end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, zIndex: 9999 });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, zIndex: 9999 });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    };

    document.getElementById('closeResultBtn').onclick = () => {
        document.getElementById('resultModal').style.display = 'none';
        initTest();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

</script>
</body>
</html>
