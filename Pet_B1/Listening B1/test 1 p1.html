<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Practice - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #8854C0;
            --yellow: #FDCB6E;
            --teal: #00C9A7;
            --correct: #00D26A;
            --correct-shadow: #00a051;
            --incorrect: #FF4757;
            --incorrect-shadow: #c8323f;
            --white: #ffffff;
            --text-main: #2d3436;
            --bg-card: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, var(--pink), var(--yellow), var(--teal));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* SVG Pattern Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M54.627 0l.83.83-54.627 54.627-.83-.83L54.627 0zM29.627 0l.83.83-29.627 29.627-.83-.83L29.627 0zM59.627 30l.83.83-29.627 29.627-.83-.83L59.627 30z' fill='%23ffffff' fill-opacity='0.2' fill-rule='evenodd'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        header {
            text-align: center;
            background: var(--bg-card);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        h1 {
            color: var(--pink);
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            font-weight: 900;
        }

        h2.subtitle {
            font-size: 1.1rem;
            color: #636e72;
            margin: 0 0 20px 0;
        }

        .audio-player {
            width: 100%;
            max-width: 400px;
            border-radius: 50px;
            outline: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .question-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .option-btn {
            background: #f1f2f6;
            border: 3px solid #dfe4ea;
            border-radius: 20px;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 0 #dfe4ea;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .option-btn:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--teal);
            box-shadow: 0 13px 0 #00b894;
        }

        .option-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 transparent;
        }

        .emoji-art {
            font-size: 4rem;
            margin-bottom: 15px;
            pointer-events: none;
            filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.15));
        }

        .option-desc {
            font-size: 1rem;
            font-weight: 700;
            color: #636e72;
            margin-bottom: 10px;
            pointer-events: none;
        }

        .option-btn .label {
            font-size: 1.5rem;
            font-weight: 900;
            color: #2f3542;
            pointer-events: none;
            background: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        /* States */
        .option-btn.correct {
            background: #e8fcf1;
            border-color: var(--correct);
            box-shadow: 0 8px 0 var(--correct-shadow);
            color: var(--correct);
            transform: translateY(0);
        }

        .option-btn.wrong {
            background: #ffeef0;
            border-color: var(--incorrect);
            box-shadow: 0 8px 0 var(--incorrect-shadow);
            color: var(--incorrect);
            transform: translateY(0);
        }

        .option-btn.disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        .option-btn.correct.disabled {
            opacity: 1;
        }

        /* Shake Animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.5s ease-in-out; }

        /* Explanation Box */
        .explanation {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-left: 6px solid var(--teal);
            border-radius: 10px;
            line-height: 1.6;
            animation: fadeInDown 0.4s ease-out;
        }

        .explanation.show { display: block; }

        .explanation h3 {
            color: var(--pink);
            margin-top: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .exp-step { margin-bottom: 15px; }
        .exp-step-title {
            font-weight: 800;
            color: #0984e3;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .transcript-box {
            background: #ffffff;
            border: 1px dashed #b2bec3;
            padding: 15px;
            border-radius: 10px;
            font-style: italic;
        }

        .keyword {
            color: #d63031;
            font-weight: 900;
            background: #ffeaa7;
            padding: 0 4px;
            border-radius: 4px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Submit Button */
        .submit-btn {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 40px auto;
            background: var(--pink);
            color: white;
            font-size: 1.5rem;
            font-weight: 900;
            padding: 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 10px 0 #5f27cd;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 0 #5f27cd;
        }
        .submit-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 transparent;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.active {
            transform: scale(1);
        }

        .modal h2 { font-size: 2.5rem; color: var(--pink); margin-top: 0; }
        .modal p { font-size: 1.5rem; font-weight: 700; color: #636e72; }
        .score-display { font-size: 4rem; font-weight: 900; color: var(--teal); margin: 10px 0; }
        
        .meme-img {
            width: 100%;
            max-width: 300px;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .close-btn {
            background: var(--teal);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0 #00a051;
        }
        .close-btn:active { transform: translateY(6px); box-shadow: none; }

        canvas#confetti {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <canvas id="confetti"></canvas>

    <div class="container">
        <header>
            <h2 class="subtitle">Listening Practice - Giáo viên tạo: Ms Mai An ULIS</h2>
            <h1>PET/B1 Listening Part 1</h1>
            <p>Nghe Audio và chọn đáp án đúng nhất. Khám phá giải thích siêu chi tiết bên dưới mỗi câu nhé!</p>
            <audio controls class="audio-player">
                <source src="https://englishpracticetest.net/wp-content/uploads/2022/11/b1-test-1-1.mp3" type="audio/mpeg">
                Trình duyệt của bạn không hỗ trợ thẻ audio.
            </audio>
        </header>

        <main id="quiz-container">
            </main>

        <button class="submit-btn" onclick="submitQuiz()">NỘP BÀI!</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="resultModal">
            <h2>Kết Quả Của Bạn!</h2>
            <p>Số câu đúng:</p>
            <div class="score-display"><span id="scoreText">0</span>/7</div>
            <img id="memeImage" class="meme-img" src="" alt="Result Meme">
            <br>
            <button class="close-btn" onclick="closeModal()">Làm Lại</button>
        </div>
    </div>

<script>
    // --- AUDIO SYNTHESIZER ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
    }

    function playSound(type) {
        initAudio();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (type === 'correct') {
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
            triggerConfetti();
        } else {
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
            oscillator.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        }
    }

    // --- CONFETTI GENERATOR ---
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let isAnimating = false;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createParticles() {
        const colors = ['#8854C0', '#FDCB6E', '#00C9A7', '#FF4757', '#00D26A'];
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height * 0.5 - 50,
                r: Math.random() * 6 + 4,
                dx: Math.random() * 4 - 2,
                dy: Math.random() * 4 + 2,
                color: colors[Math.floor(Math.random() * colors.length)],
                tilt: Math.random() * 10
            });
        }
    }

    function animateConfetti() {
        requestAnimationFrame(animateConfetti);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let i = 0; i < particles.length; i++) {
            let p = particles[i];
            ctx.beginPath();
            ctx.lineWidth = p.r;
            ctx.strokeStyle = p.color;
            ctx.moveTo(p.x + p.tilt + p.r, p.y);
            ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
            ctx.stroke();
            
            p.y += p.dy;
            p.x += p.dx;
            p.tilt += 0.1;
            
            if (p.y > canvas.height) {
                particles.splice(i, 1);
                i--;
            }
        }
    }

    function triggerConfetti() {
        createParticles();
        if (!isAnimating) {
            isAnimating = true;
            animateConfetti();
        }
    }

    // --- QUIZ DATA (DUOLINGO STYLE EMOJI ARTS) ---
    const quizData = [
        {
            id: 1,
            question: "1. Which dish did Mark cook in the competition?",
            options: [
                { letter: 'A', emoji: "🐟🍚", desc: "Cá và Cơm", isCorrect: false },
                { letter: 'B', emoji: "🥩🥩", desc: "Thịt bít tết", isCorrect: false },
                { letter: 'C', emoji: "🥗🍚", desc: "Rau và Cơm", isCorrect: true }
            ],
            explanation: `
                <div class="exp-step">
                    <div class="exp-step-title">Bước 1: Phân tích hình ảnh</div>
                    A. Fish and rice (Cá và cơm)<br>
                    B. Meat/Steak (Thịt bít tết)<br>
                    C. Vegetarian dish (Món chay/Rau)
                </div>
                <div class="exp-step">
                    <div class="exp-step-title">Bước 2: Audio Script & Dịch</div>
                    <div class="transcript-box">
                        <strong>Mark:</strong> ...I couldn't decide between fish and vegetables – I've never been brilliant at meat dishes. Then I found the judge was an expert in cooking fish, which worried me, so I went for my <span class="keyword">other choice</span> – and won!
                    </div>
                    <em>Dịch: ...Em đã phân vân giữa cá và rau. Sau đó em phát hiện ra giám khảo là chuyên gia nấu cá, điều này làm em lo lắng, vì vậy em đã chọn <span class="keyword">lựa chọn còn lại</span> - và em đã thắng!</em>
                </div>
                <div class="exp-step">
                    <div class="exp-step-title">Bước 3: Tại sao đúng?</div>
                    Phân vân giữa "cá" và "rau". Sợ giám khảo nấu cá quá giỏi nên chọn "other choice" -> Món Rau (C). 
                </div>`
        },
        {
            id: 2,
            question: "2. Where is the girl's book now?",
            options: [
                { letter: 'A', emoji: "📥🥤", desc: "Trên khay", isCorrect: false },
                { letter: 'B', emoji: "🗄️📚", desc: "Trong ngăn kéo", isCorrect: true },
                { letter: 'C', emoji: "☕📚", desc: "Trên bàn cafe", isCorrect: false }
            ],
            explanation: `
                <div class="exp-step">
                    <div class="exp-step-title">Bước 1: Phân tích hình ảnh</div>
                    A. On a tray (Trên khay)<br>
                    B. In a desk drawer (Trong ngăn kéo)<br>
                    C. On a café table (Trên bàn quán)
                </div>
                <div class="exp-step">
                    <div class="exp-step-title">Bước 2: Audio Script & Dịch</div>
                    <div class="transcript-box">
                        <strong>Man:</strong> Oh yes. I took it inside... I gave it to the manager... He keeps it all in the <span class="keyword">drawer of his desk</span>.
                    </div>
                    <em>Dịch: Ồ có. Chú đã mang nó vào trong... Chú đưa cho quản lý... Ông ấy cất tất cả vào trong <span class="keyword">ngăn kéo bàn làm việc</span>.</em>
                </div>
                <div class="exp-step">
                    <div class="exp-step-title">Bước 3: Tại sao đúng?</div>
                    Vị trí cuối cùng ("now") của cuốn sách là "drawer of his desk" -> Ngăn kéo (B).
                </div>`
        },
        {
            id: 3,
            question: "3. Who lives with Josh in his house?",
            options: [
                { letter: 'A', emoji: "👨👩👦👵", desc: "Bố Mẹ + Josh + Bà", isCorrect: true },
                { letter: 'B', emoji: "👨👩👧👦👵", desc: "Cả nhà + Chị gái", isCorrect: false },
                { letter: 'C', emoji: "👨👩👧👦", desc: "Bố Mẹ + Josh + Chị gái", isCorrect: false }
            ],
            explanation: `
                <div class="exp-step">
                    <div class="exp-step-title">Bước 1: Phân tích hình ảnh</div>
                    Phân biệt các thành viên: Bố, Mẹ, Bà, Chị gái.
                </div>
                <div class="exp-step">
                    <div class="exp-step-title">Bước 2: Audio Script & Dịch</div>
                    <div class="transcript-box">
                        <strong>Girl:</strong> Does your house seem empty now your <span class="keyword">sister's left home</span>?<br>
                        <strong>Josh:</strong> Not really. My <span class="keyword">grandmother's moved into her room</span>... my dad... my mum...
                    </div>
                    <em>Dịch: Nhà bạn có vẻ trống từ khi <span class="keyword">chị gái bạn chuyển đi</span> không? - Không hẳn. <span class="keyword">Bà tớ đã chuyển vào phòng chị ấy</span>... bố tớ... mẹ tớ...</em>
                </div>
                <div class="exp-step">
                    <div class="exp-step-title">Bước 3: Tại sao đúng?</div>
                    Chị gái đã rời đi (sister's left home), Bà chuyển đến (grandmother's moved in). Vậy nhà có: Bố, Mẹ, Bà và Josh -> (A).
                </div>`
        },
        {
            id: 4,
            question: "4. What will the girl take with her on holiday?",
            options: [
                { letter: 'A', emoji: "🧳", desc: "Vali kéo", isCorrect: false },
                { letter: 'B', emoji: "🎒🛞", desc: "Túi thể thao kéo", isCorrect: true },
                { letter: 'C', emoji: "🎒", desc: "Balo", isCorrect: false }
            ],
            explanation: `
                <div class="exp-step">
                    <div class="exp-step-title">Bước 1: Phân tích hình ảnh</div>
                    A. Suitcase (Vali)<br>
                    B. Sports bag with wheels (Túi kéo thể thao)<br>
                    C. Backpack (Balo)
                </div>
                <div class="exp-step">
                    <div class="exp-step-title">Bước 2: Audio Script & Dịch</div>
                    <div class="transcript-box">
                        <strong>Girl:</strong> I'll get one of those <span class="keyword">big sports bags</span>. You know, <span class="keyword">one you can pull along</span>.
                    </div>
                    <em>Dịch: Tớ sẽ mua một chiếc <span class="keyword">túi thể thao lớn</span>. Cậu biết đấy, <span class="keyword">loại có thể kéo đi ấy</span>.</em>
                </div>
                <div class="exp-step">
                    <div class="exp-step-title">Bước 3: Tại sao đúng?</div>
                    Túi thể thao (sports bag) và có thể kéo đi (pull along) -> Hình B.
                </div>`
        },
        {
            id: 5,
            question: "5. What time will the train to Manchester leave?",
            options: [
                { letter: 'A', emoji: "🕚", desc: "11:30", isCorrect: false },
                { letter: 'B', emoji: "🕚", desc: "11:45", isCorrect: false },
                { letter: 'C', emoji: "🕛", desc: "11:50", isCorrect: true }
            ],
            explanation: `
                <div class="exp-step">
                    <div class="exp-step-title">Bước 1: Phân tích các mốc giờ</div>
                    11:30, 11:45, 11:50.
                </div>
                <div class="exp-step">
                    <div class="exp-step-title">Bước 2: Audio Script & Dịch</div>
                    <div class="transcript-box">
                        <strong>Man:</strong> ...the delayed 11.30 train to Manchester. The train will now depart at <span class="keyword">11.50</span> and travel non-stop.
                    </div>
                    <em>Dịch: ...chuyến tàu 11:30 đi Manchester bị hoãn. Chuyến tàu này bây giờ sẽ khởi hành lúc <span class="keyword">11.50</span>.</em>
                </div>
                <div class="exp-step">
                    <div class="exp-step-title">Bước 3: Tại sao đúng?</div>
                    Giờ khởi hành mới được thông báo chốt là 11.50 -> Đáp án C.
                </div>`
        },
        {
            id: 6,
            question: "6. Where will the friends meet?",
            options: [
                { letter: 'A', emoji: "🍔🍟", desc: "Quán Burger", isCorrect: true },
                { letter: 'B', emoji: "🍿🎥", desc: "Rạp chiếu phim", isCorrect: false },
                { letter: 'C', emoji: "🚌🛑", desc: "Trạm xe buýt", isCorrect: false }
            ],
            explanation: `
                <div class="exp-step">
                    <div class="exp-step-title">Bước 1: Phân tích hình ảnh</div>
                    A. Burger bar (Quán đồ ăn nhanh)<br>
                    B. Cinema (Rạp chiếu phim)<br>
                    C. Bus station (Trạm xe)
                </div>
                <div class="exp-step">
                    <div class="exp-step-title">Bước 2: Audio Script & Dịch</div>
                    <div class="transcript-box">
                        <strong>Girl:</strong> ...at the <span class="keyword">burger bar</span> on the corner...<br>
                        <strong>Kimberley:</strong> ...<span class="keyword">something to eat first is a good idea</span>.
                    </div>
                    <em>Dịch: Bạn nữ: ...ở <span class="keyword">quán burger</span> ở góc phố đi. - Kimberley: ...<span class="keyword">ăn cái gì đó trước là một ý kiến hay đấy</span>.</em>
                </div>
                <div class="exp-step">
                    <div class="exp-step-title">Bước 3: Tại sao đúng?</div>
                    Bạn bè đồng ý với việc "đi ăn trước" (something to eat first) tại quán Burger -> Hình A.
                </div>`
        },
        {
            id: 7,
            question: "7. Which sport will the boy do soon at the centre?",
            options: [
                { letter: 'A', emoji: "🏄‍♂️", desc: "Lướt ván nước", isCorrect: false },
                { letter: 'B', emoji: "🤿", desc: "Lặn", isCorrect: false },
                { letter: 'C', emoji: "⛵", desc: "Chèo thuyền buồm", isCorrect: true }
            ],
            explanation: `
                <div class="exp-step">
                    <div class="exp-step-title">Bước 1: Phân tích hình ảnh</div>
                    A. Waterskiing (Lướt ván)<br>
                    B. Diving (Lặn)<br>
                    C. Sailing (Chèo thuyền)
                </div>
                <div class="exp-step">
                    <div class="exp-step-title">Bước 2: Audio Script & Dịch</div>
                    <div class="transcript-box">
                        <strong>Girl:</strong> ...you can also have <span class="keyword">sailing lessons</span> on the lake.<br>
                        <strong>Boy:</strong> <span class="keyword">That's what I'm doing there next weekend</span>, actually.
                    </div>
                    <em>Dịch: Cô gái: ...cậu cũng có thể học <span class="keyword">chèo thuyền buồm</span>. - Chàng trai: <span class="keyword">Đó chính là thứ tớ định làm vào cuối tuần tới đấy</span>.</em>
                </div>
                <div class="exp-step">
                    <div class="exp-step-title">Bước 3: Tại sao đúng?</div>
                    Cậu bạn xác nhận ngay môn "sailing" (chèo thuyền buồm) là thứ cậu sẽ làm cuối tuần tới -> Hình C.
                </div>`
        }
    ];

    let userAnswers = {}; 
    let totalScore = 0;

    // Shuffle Array
    function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    // Render Quiz
    const container = document.getElementById('quiz-container');

    quizData.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.innerHTML = `<div class="question-text">${q.question}</div>`;

        const grid = document.createElement('div');
        grid.className = 'options-grid';

        const shuffledOptions = shuffleArray(q.options);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = `
                <div class="emoji-art">${opt.emoji}</div>
                <div class="option-desc">${opt.desc}</div>
                <div class="label">${opt.letter}</div>
            `;
            
            btn.onclick = () => handleAnswer(btn, opt, q.id, shuffledOptions, grid);
            grid.appendChild(btn);
        });

        card.appendChild(grid);

        const expBox = document.createElement('div');
        expBox.className = 'explanation';
        expBox.id = `exp-${q.id}`;
        expBox.innerHTML = `
            <h3>🌟 Cô Mai An Giải Thích Chi Tiết 🌟</h3>
            ${q.explanation}
        `;
        card.appendChild(expBox);

        container.appendChild(card);
    });

    function handleAnswer(selectedBtn, optionData, questionId, allOptionsData, gridElement) {
        if (userAnswers[questionId] !== undefined) return;

        const isCorrect = optionData.isCorrect;
        userAnswers[questionId] = isCorrect;

        Array.from(gridElement.children).forEach((btn, index) => {
            btn.classList.add('disabled');
            if (allOptionsData[index].isCorrect) {
                btn.classList.add('correct');
            }
        });

        if (isCorrect) {
            playSound('correct');
            totalScore++;
        } else {
            playSound('wrong');
            selectedBtn.classList.remove('correct'); 
            selectedBtn.classList.add('wrong');
            selectedBtn.classList.add('shake');
        }

        const expBox = document.getElementById(`exp-${questionId}`);
        expBox.classList.add('show');
        
        setTimeout(() => {
            expBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }

    function submitQuiz() {
        const modal = document.getElementById('modalOverlay');
        const modalBox = document.getElementById('resultModal');
        const scoreText = document.getElementById('scoreText');
        const memeImg = document.getElementById('memeImage');

        let answeredCount = Object.keys(userAnswers).length;
        if (answeredCount < quizData.length) {
            alert("Cô Mai An nhắc: Em hãy hoàn thành tất cả các câu hỏi trước khi nộp bài nhé! Cố lên!");
            return;
        }

        scoreText.innerText = totalScore;
        let percentage = (totalScore / quizData.length) * 100;

        if (percentage === 100) {
            memeImg.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif"; 
        } else if (percentage >= 60) {
            memeImg.src = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif"; 
        } else {
            memeImg.src = "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif"; 
        }

        modal.style.display = 'flex';
        setTimeout(() => {
            modalBox.classList.add('active');
            if (percentage >= 60) triggerConfetti();
        }, 50);
    }

    function closeModal() {
        window.location.reload(); 
    }
</script>
