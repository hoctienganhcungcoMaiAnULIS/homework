<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Practice - Giáo viên tạo: Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Theme Green Plants: Pastel Green & Earthy Tones */
            --primary: #2e8b57; /* Sea Green */
            --secondary: #43a047; /* Leaf Green */
            --accent: #81c784; /* Pastel Green */
            --correct: #00d26a; 
            --wrong: #ff4757; 
            --text-dark: #1b5e20;
            --text-light: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.75); 
            --glass-border: rgba(129, 199, 132, 0.5);
            --glass-shadow: 0 8px 32px 0 rgba(46, 139, 87, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            /* Dynamic Theme: Green Plants with floating emojis */
            background: 
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" opacity="0.4"><text x="30" y="50" font-size="35" opacity="0.6">🌿</text><text x="250" y="100" font-size="40" opacity="0.5">🪴</text><text x="100" y="240" font-size="30" opacity="0.4">🌵</text><text x="300" y="320" font-size="35" opacity="0.7">🌸</text><text x="60" y="350" font-size="30" opacity="0.5">🍃</text></svg>'),
                radial-gradient(circle at top left, #e8f5e9 0%, #c8e6c9 100%);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
        }

        /* --- MODAL BẢO MẬT & NAME POPUP --- */
        #password-modal, #name-modal, #result-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(27, 94, 32, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 4px solid var(--accent);
        }

        .modal-content h2 {
            color: var(--primary);
            margin-bottom: 20px;
            font-weight: 800;
        }

        .modal-content input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--primary);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            text-align: center;
            font-weight: 700;
            color: var(--primary);
            background: #fdfdfd;
        }

        .modal-content input:focus {
            box-shadow: 0 0 15px rgba(67, 160, 71, 0.4);
            border-color: var(--secondary);
        }

        .modal-content button {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #1b5e20;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .modal-content button:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            border-color: var(--wrong) !important;
            color: var(--wrong) !important;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* --- GIAO DIỆN CHÍNH --- */
        #main-app {
            display: none;
            width: 100%;
            max-width: 850px;
            margin: 20px auto;
        }

        .header {
            text-align: center;
            padding: 30px;
            margin-bottom: 25px;
            color: var(--primary);
            border-bottom: 5px solid var(--accent);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 16px;
            font-weight: 700;
            color: #333;
        }

        .audio-container {
            text-align: center;
            padding: 20px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--accent);
            border-radius: 20px;
        }

        audio {
            width: 100%;
            max-width: 400px;
            outline: none;
            border-radius: 30px;
        }

        /* --- CARD CÂU HỎI HÌNH ẢNH --- */
        .question-card {
            padding: 25px 30px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
            border-left: 8px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .question-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(46, 139, 87, 0.15);
        }

        .question-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .question-image {
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            margin: 0 auto 20px auto;
            display: block;
            border: 2px solid #e0e0e0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .options-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .option-btn {
            background: white;
            border: 2px solid var(--accent);
            padding: 12px 30px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            box-shadow: 0 4px 0 var(--accent);
            min-width: 120px;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            background: #f1f8e9;
            box-shadow: 0 6px 0 var(--accent);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: none;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .option-btn.correct {
            background: var(--correct);
            color: white;
            border-color: var(--correct);
            box-shadow: 0 4px 0 #00997A;
        }

        .option-btn.wrong {
            background: var(--wrong);
            color: white;
            border-color: var(--wrong);
            box-shadow: 0 4px 0 #b33939;
        }

        /* --- KHUNG GIẢI THÍCH (SIÊU CHI TIẾT) --- */
        .explanation-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #f1f8e9;
            border-left: 5px solid var(--primary);
            border-radius: 0 15px 15px 0;
            font-size: 15px;
            line-height: 1.6;
            animation: fadeIn 0.5s ease;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exp-section { margin-bottom: 15px; }
        .exp-title { font-weight: 800; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; font-size: 13px;}
        .transcript { background: #ffffff; padding: 12px; border-radius: 8px; font-style: italic; color: #333; margin-bottom: 8px; border: 1px solid #c8e6c9;}
        .highlight { color: #d32f2f; font-weight: bold; background: #ffebee; padding: 2px 4px; border-radius: 4px;}
        .reason-true { color: #2e7d32; font-weight: bold; }
        .reason-false { color: #c62828; font-weight: bold; }

        /* --- NÚT NỘP BÀI --- */
        .submit-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 22px;
            font-weight: 900;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 #1b5e20;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #1b5e20;
        }

        .submit-btn:active {
            transform: translateY(8px);
            box-shadow: none;
        }

        /* --- RESULT MODAL --- */
        .meme-img {
            width: 100%;
            max-width: 300px;
            border-radius: 15px;
            margin: 15px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            object-fit: contain;
            border: 3px solid var(--accent);
        }

        #error-msg {
            color: var(--wrong);
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 10000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="password-modal">
        <div class="modal-content">
            <h2>🔒 Lớp Học Trồng Cây</h2>
            <p style="margin-bottom: 15px; color: #555;">Vui lòng nhập mật khẩu để tưới nước</p>
            <input type="password" id="pass-input" placeholder="Nhập mật khẩu của cô Mai An...">
            <button onclick="checkPassword()">MỞ KHÓA BÀI THI</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header glass">
            <h3>Listening Practice - Giáo viên tạo: Ms Mai An ULIS</h3>
            <h1>🌿 PICTURE MULTIPLE CHOICE 🌿</h1>
            <p>For each question, choose the correct picture (A, B, or C).</p>
        </div>

        <div class="audio-container glass">
            <audio id="exam-audio" controls controlsList="nodownload"></audio>
        </div>

        <div id="quiz-container">
            </div>

        <button class="submit-btn" onclick="openNamePrompt()">🎯 Nộp Bài & Xem Điểm</button>
    </div>

    <div id="name-modal" style="display:none;">
        <div class="modal-content">
            <h2>📝 Nhập tên của bạn</h2>
            <input type="text" id="student-name" placeholder="Ví dụ: Nguyễn Văn A..." onkeypress="handleNameEnter(event)">
            <p id="error-msg">⚠️ Vui lòng xưng danh trước khi nhận điểm nhé!</p>
            <button onclick="submitQuiz()">XÁC NHẬN NỘP BÀI</button>
        </div>
    </div>

    <div id="result-modal" style="display:none;">
        <div class="modal-content" style="max-width: 500px;">
            <h2 id="result-title">🌟 KẾT QUẢ 🌟</h2>
            <h1 id="result-score" style="color: var(--primary); font-size: 40px; margin: 10px 0;">0/5</h1>
            <img id="result-meme" class="meme-img" src="" alt="Result Meme">
            <p id="result-feedback" style="font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #333;"></p>
            <button onclick="location.reload()">LÀM LẠI BÀI</button>
        </div>
    </div>

    <script>
        // --- 1. BẢO MẬT & MÃ HÓA (NO COMMENTS REVEALING PW) ---
        const codes = [99, 111, 109, 97, 105, 97, 110, 117, 108, 105, 115];
        const audioSrcBase = "aHR0cHM6Ly9lbmdsaXNocHJhY3RpY2V0ZXN0Lm5ldC93cC1jb250ZW50L3VwbG9hZHMvMjAyMS8xMS9rZXQtcHJhY3RpY2UtbGlzdGVuaW5nLXRlc3QtMDUtcGFydC0xLm1wMw==";

        function checkPassword() {
            const input = document.getElementById('pass-input');
            const target = codes.map(c => String.fromCharCode(c)).join('');
            
            if(input.value === target) {
                document.getElementById('password-modal').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('exam-audio').src = atob(audioSrcBase);
            } else {
                input.classList.add('shake');
                input.value = '';
                input.placeholder = 'Sai mật khẩu rồi bạn ơi!';
                setTimeout(() => input.classList.remove('shake'), 400);
            }
        }

        document.getElementById('pass-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });


        // --- 2. DỮ LIỆU BÀI TẬP HÌNH ẢNH (SIÊU CHI TIẾT) ---
        const quizData = [
            {
                id: 1,
                question: "1. How will Luciana invite her friends to her birthday party?",
                image: "https://hoctienganhcungcomaianulis.github.io/homework/%E1%BA%A2nh_File%20nghe/%E1%BA%A2nh%20Ket%20A2/test%205%201.jpg",
                options: [
                    { label: "A", isCorrect: false },
                    { label: "B", isCorrect: false },
                    { label: "C", isCorrect: true }
                ],
                explanation: {
                    translation: "Luciana sẽ mời bạn bè đến tiệc sinh nhật bằng cách nào?\n- Hình A: Gọi điện thoại (Phone)\n- Hình B: Gửi thư bưu điện (Post)\n- Hình C: Gửi Email",
                    transcript: "Astrid: Luciana, are you going to <span class='highlight'>email</span> your friends...<br>Luciana: Or do you think I should <span class='highlight'>phone</span> them?...<br>Astrid: Your sister sent her friends invitations by <span class='highlight'>post</span>...<br>Luciana: <span class='highlight'>Your first idea’s best</span>. I’ll do that.",
                    viTranscript: "Astrid: Luciana, cậu định <span class='highlight'>gửi email</span> cho bạn bè...<br>Luciana: Hay cậu nghĩ tớ nên <span class='highlight'>gọi điện</span> cho họ?...<br>Astrid: Chị gái cậu đã gửi thiệp mời qua <span class='highlight'>đường bưu điện</span>...<br>Luciana: <span class='highlight'>Ý kiến đầu tiên của cậu là tốt nhất</span>. Tớ sẽ làm vậy.",
                    whyTrue: "Cụm chốt hạ: 'Your first idea's best. I'll do that' (Ý kiến ĐẦU TIÊN của cậu là tốt nhất). Mà ý kiến đầu tiên Astrid đưa ra chính là 'email' -> Trùng khớp với Hình C.",
                    whyFalse: "Bẫy (Distractors): Cả 'phone' (Hình A) và 'post' (Hình B) đều được nhắc đến. Tuy nhiên, Luciana chỉ đang phân vân có nên gọi điện không, còn việc gửi thư bưu điện là việc của CHỊ GÁI (your sister), không phải Luciana."
                }
            },
            {
                id: 2,
                question: "2. What does Charlie want to borrow from his brother, James?",
                image: "https://hoctienganhcungcomaianulis.github.io/homework/%E1%BA%A2nh_File%20nghe/%E1%BA%A2nh%20Ket%20A2/test%205%202.jpg",
                options: [
                    { label: "A", isCorrect: false },
                    { label: "B", isCorrect: true },
                    { label: "C", isCorrect: false }
                ],
                explanation: {
                    translation: "Charlie muốn mượn anh trai James cái gì?\n- Hình A: Quần Jeans\n- Hình B: Kính râm (Sunglasses)\n- Hình C: Giày thể thao (Trainers)",
                    transcript: "Charlie: I’m going to wear my new <span class='highlight'>jeans</span>.<br>James: Cool. Do you want to borrow my <span class='highlight'>trainers</span>...?<br>Charlie: Actually, I need some <span class='highlight'>sunglasses</span> … and you’ve got two pairs.<br>James: OK...",
                    viTranscript: "Charlie: Em định mặc cái <span class='highlight'>quần jeans</span> mới.<br>James: Tuyệt. Em có muốn mượn <span class='highlight'>giày thể thao</span> của anh không...?<br>Charlie: Thật ra, em cần vài chiếc <span class='highlight'>kính râm</span> ... và anh có tới 2 chiếc.<br>James: OK...",
                    whyTrue: "Câu chốt: 'Actually, I need some sunglasses' (Thật ra em cần kính râm). Anh trai đồng ý 'OK' -> Trùng khớp Hình B.",
                    whyFalse: "Bẫy: Cậu bé nhắc đến 'jeans' (Hình A) nhưng là đồ CỦA MÌNH đang mặc (my new jeans). Người anh có gợi ý cho mượn 'trainers' (Hình C) nhưng Charlie đã từ chối khéo bằng từ 'Actually' (Thật ra thì...)."
                }
            },
            {
                id: 3,
                question: "3. How will Carol get to her dance class?",
                image: "https://hoctienganhcungcomaianulis.github.io/homework/%E1%BA%A2nh_File%20nghe/%E1%BA%A2nh%20Ket%20A2/test%205%203.jpg",
                options: [
                    { label: "A", isCorrect: true },
                    { label: "B", isCorrect: false },
                    { label: "C", isCorrect: false }
                ],
                explanation: {
                    translation: "Carol sẽ đến lớp học nhảy bằng phương tiện gì?\n- Hình A: Đi bộ (Walk)\n- Hình B: Xe buýt (Bus)\n- Hình C: Ô tô (Drive/Car)",
                    transcript: "Carol: Dad, can you <span class='highlight'>drive</span> me...<br>Dad: Oh, I won’t be back from work...<br>Carol: OK, I’ll <span class='highlight'>walk</span> there with Tessa.<br>Dad: … or take the <span class='highlight'>bus</span>?<br>Carol: That’s <span class='highlight'>not so good</span> for Tessa.",
                    viTranscript: "Carol: Bố ơi, bố <span class='highlight'>lái xe</span> chở con được không...<br>Bố: Ồ, bố sẽ không đi làm về kịp...<br>Carol: Vâng, con sẽ <span class='highlight'>đi bộ</span> đến đó với Tessa.<br>Bố: ...hay là đi <span class='highlight'>xe buýt</span>?<br>Carol: Việc đó <span class='highlight'>không tiện lắm</span> cho Tessa đâu.",
                    whyTrue: "Carol đề xuất 'I'll walk there with Tessa' (Con sẽ đi bộ với Tessa) và giữ nguyên quyết định này đến cuối -> Hình A.",
                    whyFalse: "Bẫy: Bố KHÔNG THỂ chở bằng ô tô (Hình C) vì đi làm về muộn. Bố gợi ý đi xe buýt (Hình B) nhưng Carol gạt đi vì không tiện cho bạn Tessa (That's not so good)."
                }
            },
            {
                id: 4,
                question: "4. Which film do they decide to watch first?",
                image: "https://hoctienganhcungcomaianulis.github.io/homework/%E1%BA%A2nh_File%20nghe/%E1%BA%A2nh%20Ket%20A2/test%205%204.jpg",
                options: [
                    { label: "A", isCorrect: true },
                    { label: "B", isCorrect: false },
                    { label: "C", isCorrect: false }
                ],
                explanation: {
                    translation: "Họ quyết định xem bộ phim nào TRƯỚC TIÊN?\n- Hình A: Thi nhảy (Dance competition)\n- Hình B: Leo núi Everest (Climb Mount Everest)\n- Hình C: Cuộc sống tương lai (Life in the future/Zuta)",
                    transcript: "Aidan: ...a man who <span class='highlight'>climbs Mount Everest</span>.<br>Holly: ...another new one about a <span class='highlight'>dance competition</span>.<br>Aidan: ...Or what about <span class='highlight'>Zuta</span>? It’s about life in the future.<br>Holly: Let’s watch that <span class='highlight'>next weekend</span>... And the <span class='highlight'>competition one now</span>?<br>Aidan: Yeah...",
                    viTranscript: "Aidan: ...một người đàn ông <span class='highlight'>leo núi Everest</span>.<br>Holly: ...một phim mới về <span class='highlight'>cuộc thi nhảy</span>.<br>Aidan: ...Hay xem <span class='highlight'>Zuta</span>? Về cuộc sống tương lai.<br>Holly: Hãy xem phim đó vào <span class='highlight'>cuối tuần sau</span>... Và phim về <span class='highlight'>cuộc thi nhảy thì xem bây giờ</span> nhé?<br>Aidan: Ừ...",
                    whyTrue: "Câu hỏi nhấn mạnh từ 'FIRST' (trước tiên) = 'NOW' (bây giờ). Cô gái chốt: 'And the competition one now?' (Xem phim thi nhảy bây giờ nhé) và cậu bé đồng ý -> Hình A.",
                    whyFalse: "Bẫy: Leo núi Everest (Hình B) chỉ là gợi ý ban đầu. Phim khoa học viễn tưởng Zuta (Hình C) thì họ quyết định để dành đến 'next weekend' (cuối tuần sau) mới xem."
                }
            },
            {
                id: 5,
                question: "5. Which T-shirt does the girl like best?",
                image: "https://hoctienganhcungcomaianulis.github.io/homework/%E1%BA%A2nh_File%20nghe/%E1%BA%A2nh%20Ket%20A2/test%205%205.jpg",
                options: [
                    { label: "A", isCorrect: false },
                    { label: "B", isCorrect: false },
                    { label: "C", isCorrect: true }
                ],
                explanation: {
                    translation: "Cô gái thích chiếc áo thun nào NHẤT?\n- Hình A: Áo có ván lướt sóng (Surfboard)\n- Hình B: Áo có hòn đảo (Island)\n- Hình C: Áo có cá heo (Dolphin)",
                    transcript: "Boy: Are you going to get that T-shirt with a picture of a <span class='highlight'>surfboard</span>...<br>Girl: I liked that one... but I’ve just seen one with a <span class='highlight'>dolphin</span>...<br>Boy: ...The T-shirt with a picture of an <span class='highlight'>island’s</span> fantastic!<br>Girl: Yes, but the one in the magazine’s <span class='highlight'>my favourite</span>.",
                    viTranscript: "Nam: Cậu định mua cái áo có hình <span class='highlight'>ván lướt sóng</span> à...<br>Nữ: Tớ đã từng thích nó... nhưng tớ vừa thấy 1 cái có hình <span class='highlight'>cá heo</span>...<br>Nam: ...Cái áo có hình <span class='highlight'>hòn đảo</span> tuyệt quá!<br>Nữ: Ừ, nhưng cái trên tạp chí (hình cá heo) mới là <span class='highlight'>món tớ thích nhất</span>.",
                    whyTrue: "Chiếc áo trên tạp chí mà cô gái nhắc đến là áo có hình cá heo (one with a dolphin... in this magazine). Cô gái khẳng định lại ở cuối: 'the one in the magazine's my favourite' -> Hình C.",
                    whyFalse: "Bẫy: Áo ván lướt sóng (Hình A) là cái cô bé TỪNG thích (liked - quá khứ). Áo hình hòn đảo (Hình B) là do cậu bé khen (fantastic) nhưng cô gái vẫn trung thành với lựa chọn của mình."
                }
            }
        ];

        let score = 0;
        let answeredQuestions = 0;

        // Hàm xáo trộn mảng (Shuffle Options) - Xáo trộn nhãn A, B, C nhưng vẫn giữ nguyên logic đáp án
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playDing() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playTeoTeo() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.4);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        // Plants Confetti (Green & Flowers)
        function createConfetti(x, y) {
            for (let i = 0; i < 35; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.left = x + 'px';
                conf.style.top = y + 'px';
                conf.style.backgroundColor = ['#2e8b57', '#43a047', '#81c784', '#ff8a65', '#f48fb1'][Math.floor(Math.random() * 5)];
                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 120;
                conf.style.transition = 'all 1s cubic-bezier(.37,0,.63,1)';
                conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px'; // Lá hoặc hoa
                document.body.appendChild(conf);
                setTimeout(() => {
                    conf.style.transform = `translate(${Math.cos(angle)*velocity}px, ${Math.sin(angle)*velocity + 250}px) rotate(720deg)`;
                    conf.style.opacity = '0';
                }, 10);
                setTimeout(() => conf.remove(), 1000);
            }
        }

        // Render UI
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            
            quizData.forEach((q, index) => {
                const card = document.createElement('div');
                card.classList.add('question-card', 'glass');
                
                let html = `
                    <div class="question-title">${q.question}</div>
                    <img class="question-image" src="${q.image}" alt="Question Image">
                    <div class="options-grid" id="options-${index}">
                `;
                
                // Shuffle nút A B C
                const shuffledOptions = shuffleArray([...q.options]);
                
                shuffledOptions.forEach((opt) => {
                    html += `<button class="option-btn" onclick="checkAnswer(this, ${index}, ${opt.isCorrect}, event)">
                                ${opt.label}
                             </button>`;
                });
                
                html += `</div>`;
                
                // Khung Giải Thích
                html += `
                <div class="explanation-box" id="exp-${index}">
                    <div class="exp-section">
                        <div class="exp-title">📝 Phân tích hình ảnh:</div>
                        <div>${q.explanation.translation.replace(/\n/g, '<br>')}</div>
                    </div>
                    <div class="exp-section">
                        <div class="exp-title">🎧 Audio Script (Trích đoạn chứa đáp án):</div>
                        <div class="transcript">${q.explanation.transcript}</div>
                        <div class="transcript" style="background: #fff; border: 1px solid #c8e6c9;">${q.explanation.viTranscript}</div>
                    </div>
                    <div class="exp-section">
                        <div class="exp-title">✅ Tại sao ĐÚNG?</div>
                        <div class="reason-true">${q.explanation.whyTrue}</div>
                    </div>
                    <div class="exp-section">
                        <div class="exp-title">⚠️ Bẫy (Distractors):</div>
                        <div class="reason-false">${q.explanation.whyFalse}</div>
                    </div>
                </div>`;
                
                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        // Logic Check Answer (Part 1 - Images)
        function checkAnswer(btn, qIndex, isCorrect, event) {
            const container = document.getElementById(`options-${qIndex}`);
            const buttons = container.querySelectorAll('.option-btn');
            
            buttons.forEach(b => b.disabled = true);
            
            if (isCorrect) {
                btn.classList.add('correct');
                score++;
                playDing();
                createConfetti(event.clientX, event.clientY);
            } else {
                btn.classList.add('wrong');
                btn.classList.add('shake');
                playTeoTeo();
                
                // Bật xanh đáp án đúng
                const correctBtn = Array.from(buttons).find(b => b.onclick.toString().includes('true'));
                if(correctBtn) correctBtn.classList.add('correct');
            }
            
            answeredQuestions++;
            document.getElementById(`exp-${qIndex}`).style.display = 'block';
        }

        // --- 4. TÍNH NĂNG NỘP BÀI & KẾT QUẢ ---
        function openNamePrompt() {
            if (answeredQuestions < quizData.length) {
                if(!confirm("Em chưa làm xong tất cả các câu. Em có chắc chắn muốn nộp bài?")) return;
            }
            document.getElementById('name-modal').style.display = 'flex';
            document.getElementById('student-name').focus();
        }

        function handleNameEnter(e) {
            if (e.key === 'Enter') submitQuiz();
        }

        function submitQuiz() {
            const nameInput = document.getElementById('student-name');
            const errorMsg = document.getElementById('error-msg');
            const name = nameInput.value.trim();

            if (!name) {
                nameInput.classList.add('shake');
                errorMsg.style.display = 'block';
                setTimeout(() => nameInput.classList.remove('shake'), 400);
                return;
            }

            document.getElementById('name-modal').style.display = 'none';
            showResultModal(name);
        }

        function showResultModal(name) {
            const modal = document.getElementById('result-modal');
            const title = document.getElementById('result-title');
            const scoreDisplay = document.getElementById('result-score');
            const meme = document.getElementById('result-meme');
            const feedback = document.getElementById('result-feedback');

            const percentage = (score / quizData.length) * 100;
            scoreDisplay.innerText = `${score} / ${quizData.length}`;

            modal.style.display = 'flex';

            if (percentage === 100) {
                title.innerText = `🌟 XUẤT SẮC! ${name.toUpperCase()} ĐỈNH QUÁ! 🌟`;
                meme.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif"; 
                feedback.innerText = "Cô Mai An siêu tự hào về em! Bài nghe hình ảnh hay lừa lắm mà em không sập bẫy câu nào!";
                feedback.style.color = "var(--correct)";
            } else if (percentage >= 60) {
                title.innerText = `👍 KHÁ LẮM ${name.toUpperCase()}! 👍`;
                meme.src = "https://media.giphy.com/media/xT0xezQGU5xCDJuCPe/giphy.gif"; 
                feedback.innerText = "Điểm số rất ổn! Lần tới nhớ nhìn kỹ cả 3 hình để nhận diện Distractors (bẫy) nha!";
                feedback.style.color = "var(--primary)";
            } else {
                title.innerText = `😅 CẦN CỐ GẮNG HƠN ${name.toUpperCase()} ƠI! 😅`;
                meme.src = "https://media.giphy.com/media/ISOckXUydVj2g/giphy.gif"; 
                feedback.innerText = "Đừng buồn nhé! Dạng bài này nhắc đến cả 3 hình nên rất dễ nhầm. Hãy đọc kỹ Lời Giải Siêu Chi Tiết của cô nhé!";
                feedback.style.color = "var(--wrong)";
            }
        }

        // Khởi tạo
        renderQuiz();

    </script>
</body>
</html>
