<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Practice - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cập nhật hệ màu Xanh lá (Green Theme) */
            --primary-color: #2e7d32; /* Xanh lá đậm */
            --secondary-color: #66bb6a; /* Xanh lá sáng */
            --correct-color: #00D26A;
            --wrong-color: #FF4757;
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            /* Nền loang màu xanh lá cây */
            background: radial-gradient(circle at 50% 50%, #a8e063 0%, #2e7d32 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* SVG Emoji chuyển động trôi nổi */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><text x='50' y='50' font-size='30'>🏫</text><text x='300' y='120' font-size='40'>🚲</text><text x='150' y='250' font-size='35'>🎬</text><text x='350' y='350' font-size='45'>🎾</text><text x='80' y='380' font-size='30'>☔</text></svg>");
            background-size: 400px 400px;
            opacity: 0.35;
            z-index: -1;
            /* Hiệu ứng chuyển động */
            animation: floatBg 25s linear infinite;
        }

        @keyframes floatBg {
            0% { background-position: 0 0; }
            50% { background-position: 200px 200px; }
            100% { background-position: 400px 400px; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header-small {
            text-align: center;
            font-size: 14px;
            font-weight: 900;
            color: #e8f5e9;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            background: rgba(0,0,0,0.2);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            margin-left: auto;
            margin-right: auto;
            display: block;
            width: fit-content;
        }

        .main-title {
            text-align: center;
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        /* Glassmorphism Audio Player */
        .audio-container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        audio {
            width: 100%;
            height: 40px;
            outline: none;
            border-radius: 20px;
        }

        /* Question Cards */
        .question-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease;
        }

        .question-card:hover {
            transform: translateY(-5px);
        }

        .question-text {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 2px dashed rgba(255,255,255,0.4);
            padding-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid transparent;
            border-radius: 15px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .option-btn:hover:not(.locked) {
            transform: scale(1.05);
            box-shadow: 0 10px 0 rgba(0,0,0,0.15);
        }

        .option-btn img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .option-btn.locked {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .option-btn.correct {
            border-color: var(--correct-color);
            background: #e8fcf1;
            box-shadow: 0 0 20px rgba(0, 210, 106, 0.5);
            opacity: 1;
            transform: scale(1.05);
        }

        .option-btn.wrong {
            border-color: var(--wrong-color);
            background: #ffebeb;
            animation: shake 0.5s;
            opacity: 1;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-2deg); }
            50% { transform: translateX(8px) rotate(2deg); }
            75% { transform: translateX(-8px) rotate(-2deg); }
            100% { transform: translateX(0); }
        }

        /* Explanation Box */
        .explanation-box {
            display: none;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-left: 5px solid var(--secondary-color);
            border-radius: 0 15px 15px 0;
            padding: 20px;
            animation: slideDown 0.4s ease-out;
            font-size: 16px;
            line-height: 1.6;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exp-step { margin-bottom: 15px; }
        .exp-title { font-weight: 900; color: #FFD700; margin-bottom: 5px; text-transform: uppercase; font-size: 14px;}
        .keyword { color: #FF4757; font-weight: 900; background: rgba(255,255,255,0.9); padding: 0 4px; border-radius: 3px; }
        
        /* Nút Submit đổi màu theo tone xanh */
        .submit-btn {
            display: block;
            width: 250px;
            margin: 40px auto;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(45deg, #4caf50, #81c784);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 0 #2e7d32;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 6px 0 #2e7d32;
        }
        
        .submit-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #2e7d32;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            color: #333;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-score {
            font-size: 48px;
            font-weight: 900;
            color: var(--primary-color);
            margin: 15px 0;
        }

        .modal-gif {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-close {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
        }

        /* Confetti Container */
        #confetti-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; }
            .option-btn img { height: 150px; }
        }
    </style>
</head>

<script>
// --- AUDIO SYNTHESIZER ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    } else {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.3);
        osc.frequency.setValueAtTime(150, audioCtx.currentTime + 0.3);
        osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.6);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.6);
    }
}

function getBase64SVG(svgString) {
    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgString)));
}

// --- HỆ THỐNG LOGIC & GIAO DIỆN ---
let score = 0;
let answeredQuestions = 0;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function createConfetti() {
    const container = document.getElementById('confetti-container');
    container.innerHTML = '';
    const colors = ['#FFD700', '#FF4757', '#00D26A', '#00C9A7', '#8854C0'];
    
    for (let i = 0; i < 50; i++) {
        const conf = document.createElement('div');
        conf.classList.add('confetti');
        conf.style.left = Math.random() * 100 + 'vw';
        conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
        conf.style.opacity = Math.random();
        container.appendChild(conf);
    }
    setTimeout(() => { container.innerHTML = ''; }, 3000);
}

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';

    quizData.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `question-${q.id}`;

        const questionText = document.createElement('div');
        questionText.className = 'question-text';
        questionText.innerText = q.question;
        card.appendChild(questionText);

        const optionsGrid = document.createElement('div');
        optionsGrid.className = 'options-grid';
        
        const shuffledOptions = shuffleArray([...q.options]);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<img src="${opt.img}" alt="Option"><span style="font-weight: bold; color: #333">${opt.text}</span>`;
            
            btn.onclick = () => handleAnswer(q.id, opt.isCorrect, btn, optionsGrid);
            optionsGrid.appendChild(btn);
        });

        card.appendChild(optionsGrid);

        const expBox = document.createElement('div');
        expBox.className = 'explanation-box';
        expBox.id = `exp-${q.id}`;
        expBox.innerHTML = `
            <div class="exp-step"><div class="exp-title">Bước 1: Dịch nghĩa & Đáp án</div>${q.explanation.trans}</div>
            <div class="exp-step"><div class="exp-title">Bước 2: Audio Script</div>${q.explanation.script}</div>
            <div class="exp-step"><div class="exp-title">Bước 3: Tại sao đúng?</div>${q.explanation.correct}</div>
            <div class="exp-step"><div class="exp-title">Bước 4: Tại sao sai (Distractors)?</div>${q.explanation.distractors}</div>
        `;
        card.appendChild(expBox);

        container.appendChild(card);
    });
}

function handleAnswer(questionId, isCorrect, selectedBtn, gridElement) {
    const buttons = gridElement.querySelectorAll('.option-btn');
    buttons.forEach(btn => {
        btn.classList.add('locked');
        btn.onclick = null;
    });

    if (isCorrect) {
        selectedBtn.classList.add('correct');
        playSound('correct');
        createConfetti();
        score++;
    } else {
        selectedBtn.classList.add('wrong');
        playSound('wrong');
        
        const correctData = quizData.find(q => q.id === questionId).options.find(o => o.isCorrect);
        buttons.forEach(btn => {
            if(btn.innerHTML.includes(correctData.text)) {
                btn.style.border = "4px solid var(--correct-color)";
                btn.style.boxShadow = "0 0 10px var(--correct-color)";
            }
        });
    }

    document.getElementById(`exp-${questionId}`).style.display = 'block';
    answeredQuestions++;
}

function submitQuiz() {
    if (answeredQuestions < quizData.length) {
        alert("Bạn vui lòng hoàn thành tất cả các câu hỏi trước khi nộp bài nhé!");
        return;
    }

    const modal = document.getElementById('result-modal');
    const scoreText = document.getElementById('score-text');
    const gif = document.getElementById('score-gif');
    const msg = document.getElementById('score-message');

    scoreText.innerText = `${score} / ${quizData.length}`;

    const percentage = (score / quizData.length) * 100;

    if (percentage === 100) {
        gif.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif";
        msg.innerText = "Xuất sắc! Bạn đúng chuẩn Master Listening rồi!";
        msg.style.color = "#00D26A";
    } else if (percentage >= 60) {
        gif.src = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif";
        msg.innerText = "Làm tốt lắm! Chút nữa là hoàn hảo!";
        msg.style.color = "#FF9800";
    } else {
        gif.src = "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif";
        msg.innerText = "Úi, hơi tiếc! Hãy đọc kỹ Script và làm lại nhé!";
        msg.style.color = "#FF4757";
    }

    modal.style.display = "flex";
}

function closeModal() {
    document.getElementById('result-modal').style.display = "none";
    score = 0;
    answeredQuestions = 0;
    renderQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.onload = renderQuiz;
</script>
