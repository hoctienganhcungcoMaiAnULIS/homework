<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập Tiếng Anh - Ms Mai An ULIS - Fat Cat Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Hệ màu Pastel ngập tràn rực rỡ */
            --primary-bg: #e0c3fc; /* Tím pastel */
            --secondary-bg: #ffb8d1; /* Hồng pastel */
            --tertiary-bg: #fffe94; /* Vàng pastel */
            --quaternary-bg: #8fd3f4; /* Xanh dương pastel */
            
            --correct: rgba(0, 210, 106, 0.9);
            --wrong: rgba(255, 71, 87, 0.9);
            --text-main: #2c3e50;
            
            /* Thông số Kính mờ (Glassmorphism) */
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.35);
            --glass-shadow: rgba(31, 38, 135, 0.15);
            --glass-blur: blur(15px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            /* Dải nền loang màu rực rỡ chuyển động liên tục */
            background: linear-gradient(-45deg, var(--primary-bg), var(--secondary-bg), var(--tertiary-bg), var(--quaternary-bg));
            background-size: 400% 400%;
            animation: gradientLoang 20s ease infinite;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientLoang {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Họa tiết Fat Cat lơ lửng và paw prints */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm-2.5 5.5h-1v-1h1v1zm2.5 0h-1v-1h1v1zm2.5 0h-1v-1h1v1z' fill='rgba(255,255,255,0.25)'/%3E%3C/svg%3E"),
                url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 2c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zM4 12c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 .9 2 2 2zm16 0c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 .9 2 2 2zm-8 8c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm-6-8c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 .9 2 2 2zm12 0c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 .9 2 2 2zm-6 0c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 .9 2 2 2zm0-6c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2z' fill='rgba(255,255,255,0.2)'/%3E%3C/svg%3E");
            background-position: 0 0, 50px 50px;
            background-size: 200px 200px, 150px 150px;
            animation: floatingCatPattern 25s linear infinite;
        }

        @keyframes floatingCatPattern {
            0% { background-position: 0 0, 50px 50px; }
            100% { background-position: 400px 400px, 450px 450px; }
        }

        canvas#confetti {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 {
            font-size: 1.3rem;
            color: #fff;
            font-weight: 900;
            background: rgba(255, 255, 255, 0.2);
            display: inline-block;
            padding: 12px 25px;
            border-radius: 25px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px var(--glass-shadow);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .score-bar {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px var(--glass-shadow);
            font-weight: 900;
            font-size: 1.3rem;
            color: #4a235a;
        }

        .instruction-block {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            margin: 30px 0 15px 0;
            font-weight: 800;
            font-size: 1.15rem;
            color: #2c3e50;
            border: 1px solid var(--glass-border);
            border-left: 6px solid #a29bfe;
            box-shadow: 0 4px 15px var(--glass-shadow);
        }

        .question-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px var(--glass-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .question-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(31, 38, 135, 0.25);
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.6;
            color: #2d3436;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 800;
            color: #2c3e50;
            cursor: pointer;
            box-shadow: 0 6px 0px rgba(255, 255, 255, 0.3);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.02) translateY(-3px);
            background: rgba(255, 255, 255, 0.55);
            box-shadow: 0 9px 0px rgba(255, 255, 255, 0.4);
        }

        .option-btn:active:not(:disabled) {
            transform: scale(0.98) translateY(4px);
            box-shadow: 0 2px 0px rgba(255, 255, 255, 0.2);
        }

        .option-btn.correct {
            background: var(--correct) !important;
            color: white !important;
            border-color: #00b359 !important;
            box-shadow: 0 6px 0px #00994d, 0 0 15px rgba(0, 210, 106, 0.5) !important;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .option-btn.wrong {
            background: var(--wrong) !important;
            color: white !important;
            border-color: #e63946 !important;
            box-shadow: 0 6px 0px #cc0000, 0 0 15px rgba(255, 71, 87, 0.5) !important;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .shake-anim {
            animation: shake 0.4s ease-in-out;
        }

        .explanation-box {
            display: none;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            border-left: 6px solid #fdcb6e;
            font-size: 1.05rem;
            line-height: 1.7;
            box-shadow: 0 8px 32px var(--glass-shadow);
            animation: slideDown 0.4s ease forwards;
            color: #2c3e50;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .explanation-box h4 {
            color: #6c5ce7;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }

        .exp-step { margin-bottom: 10px; }
        .exp-step strong { color: #d63031; }

        .submit-container { text-align: center; margin-top: 40px; }

        .submit-btn {
            background: linear-gradient(135deg, rgba(0, 201, 167, 0.8), rgba(0, 153, 77, 0.8));
            backdrop-filter: blur(10px);
            color: white; font-size: 1.5rem; font-weight: 900;
            padding: 15px 50px; border: 2px solid rgba(255,255,255,0.4);
            border-radius: 25px; cursor: pointer;
            box-shadow: 0 8px 0px #007a3d, 0 15px 30px var(--glass-shadow);
            transition: all 0.2s; text-transform: uppercase; letter-spacing: 2px;
        }

        .submit-btn:hover {
            transform: translateY(-4px); box-shadow: 0 12px 0px #007a3d, 0 20px 40px var(--glass-shadow);
        }
        .submit-btn:active { transform: translateY(6px); box-shadow: 0 2px 0px #007a3d; }

        .css-sign-quiet {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(5px);
            padding: 15px; border-radius: 15px; width: fit-content; margin: 15px auto;
            border: 2px solid rgba(255,255,255,0.6); box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .sign-circle {
            position: relative; width: 60px; height: 60px;
            border: 5px solid #d63031; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
        }
        .sign-circle::after {
            content: ''; position: absolute; width: 100%; height: 5px;
            background: #d63031; transform: rotate(-45deg);
        }
        .sign-phone {
            width: 24px; height: 40px; border: 2px solid #2d3436; border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            font-size: 12px; font-weight: bold; color: #2d3436;
        }
        .sign-text-red {
            background: rgba(142, 21, 21, 0.85); color: white;
            padding: 8px 15px; border-radius: 8px; font-weight: 900; font-size: 1.2rem;
            text-align: center; line-height: 1.1;
        }

        .css-sign-fire {
            background: rgba(251, 240, 200, 0.6); backdrop-filter: blur(8px);
            border: 4px solid rgba(9, 132, 227, 0.8); padding: 20px; border-radius: 15px;
            text-align: center; width: fit-content; margin: 15px auto;
            font-family: 'Times New Roman', serif; font-size: 1.4rem; font-weight: bold;
            color: #2d3436; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            z-index: 10000; justify-content: center; align-items: center;
        }
        .popup {
            background: rgba(255, 255, 255, 0.35); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); padding: 40px; border-radius: 30px;
            text-align: center; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .popup h2 { font-size: 2.5rem; color: #6c5ce7; margin-bottom: 10px; text-shadow: 1px 1px 0 rgba(255,255,255,0.6); }
        .popup p { font-size: 1.3rem; font-weight: 800; color: #2d3436; margin-bottom: 20px;}
        .popup-btn {
            background: rgba(253, 203, 110, 0.9); color: #2d3436; border: 2px solid rgba(255,255,255,0.5);
            padding: 12px 35px; font-size: 1.2rem; font-weight: 900;
            border-radius: 20px; cursor: pointer; box-shadow: 0 6px 0 rgba(225, 177, 44, 0.8); transition: all 0.2s;
        }
        .popup-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 rgba(225, 177, 44, 0.8); }
        .popup-btn:active { transform: translateY(6px); box-shadow: none; }
    </style>
</head>
<body>

    <div class="pattern-overlay"></div>
    <canvas id="confetti"></canvas>

    <div class="container">
        <div class="header">
            <h2>Giáo viên tạo: Ms Mai An ULIS - Fat Cat Theme</h2>
        </div>

        <div class="score-bar">
            <span>🌟 Điểm của bạn:</span>
            <span id="score-display">0 / 20</span>
        </div>

        <div id="quiz-container">
            </div>

        <div class="submit-container">
            <button class="submit-btn" onclick="submitQuiz()">Nộp Bài 🎉</button>
        </div>
    </div>

    <div class="overlay" id="result-overlay">
        <div class="popup">
            <h2>Tuyệt Vời! 🏆</h2>
            <p id="final-score-text">Bạn đã trả lời đúng X/Y câu.</p>
            <p id="praise-text" style="color: #e84393; font-size: 1.2rem; margin-bottom: 25px; text-shadow: 1px 1px 0 rgba(255,255,255,0.5);">Lời khen ngẫu nhiên!</p>
            <button class="popup-btn" onclick="closePopup()">Làm lại</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        function createConfetti() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height / 2 + 100,
                    r: Math.random() * 6 + 4, dx: Math.random() * 20 - 10, dy: Math.random() * -15 - 5,
                    color: `hsl(${Math.random() * 360}, 100%, 60%)`,
                    tilt: Math.floor(Math.random() * 10) - 10, tiltAngleInc: (Math.random() * 0.07) + 0.05, tiltAngle: 0
                });
            }
        }
        function animateConfetti() {
            requestAnimationFrame(animateConfetti);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.tiltAngle += p.tiltAngleInc; p.y += (Math.cos(p.tiltAngle) + 1 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle) * 2; p.dy += 0.2; p.x += p.dx; p.y += p.dy;
                ctx.beginPath(); ctx.lineWidth = p.r; ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r, p.y); ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r); ctx.stroke();
                if (p.y > canvas.height) particles.splice(index, 1);
            });
        }
        animateConfetti();

        // 🌟 GIẢI THÍCH ĐÃ ĐƯỢC CẬP NHẬT: GỌI THẲNG TÊN ĐÁP ÁN ĐỂ KHÔNG BỊ LỆCH KHI XÁO TRỘN 🌟
        const quizData = [
            {
                instruction: "Mark the letter A, B, C or D to indicate the word whose underlined part differs from the other three in pronunciation.",
                id: 1, text: "Question 1.",
                options: [
                    {text: "g<u>i</u>ve", isCorrect: false},
                    {text: "g<u>i</u>ft", isCorrect: false},
                    {text: "d<u>i</u>splay", isCorrect: false},
                    {text: "f<u>i</u>rework", isCorrect: true}
                ],
                explanation: `
                    <div class='exp-step'><strong>1. Dịch câu hỏi:</strong> Chọn từ có phần gạch chân phát âm khác với 3 từ còn lại.</div>
                    <div class='exp-step'><strong>2. Phân tích các đáp án:</strong><br>
                    - <b>give</b> /gɪv/ (v): cho, tặng.<br>
                    - <b>gift</b> /gɪft/ (n): món quà.<br>
                    - <b>display</b> /dɪˈspleɪ/ (v/n): trưng bày.<br>
                    - <b>firework</b> /ˈfaɪəwɜːk/ (n): pháo hoa.</div>
                    <div class='exp-step'><strong>3. Tại sao chọn "firework"?</strong> Phần gạch chân ở từ <b>firework</b> được phát âm là nguyên âm đôi <b>/aɪ/</b>. Các từ còn lại đều phát âm là âm <b>/ɪ/</b> ngắn.</div>
                `
            },
            {
                instruction: null,
                id: 2, text: "Question 2.",
                options: [
                    {text: "d<u>a</u>nce", isCorrect: true},
                    {text: "decor<u>a</u>te", isCorrect: false},
                    {text: "gr<u>a</u>y", isCorrect: false},
                    {text: "par<u>a</u>de", isCorrect: false}
                ],
                explanation: `
                    <div class='exp-step'><strong>1. Dịch câu hỏi:</strong> Chọn từ có phần gạch chân phát âm khác.</div>
                    <div class='exp-step'><strong>2. Phân tích các đáp án:</strong><br>
                    - <b>dance</b> /dɑːns/ hoặc /dæns/ (v/n): nhảy múa.<br>
                    - <b>decorate</b> /ˈdekəreɪt/ (v): trang trí.<br>
                    - <b>gray</b> /greɪ/ (adj): màu xám.<br>
                    - <b>parade</b> /pəˈreɪd/ (n): cuộc diễu hành.</div>
                    <div class='exp-step'><strong>3. Tại sao chọn "dance"?</strong> Chữ "a" trong từ <b>dance</b> phát âm là âm <b>/ɑː/</b> hoặc <b>/æ/</b>. Trong khi đó, các từ còn lại chữ "a" đều được phát âm là nguyên âm đôi <b>/eɪ/</b>.</div>
                `
            },
            {
                instruction: "Mark the letter A, B, C or D to indicate the word that differs from the other three in the position of primary stress.",
                id: 3, text: "Question 3.",
                options: [
                    {text: "criminal", isCorrect: false},
                    {text: "physician", isCorrect: true},
                    {text: "skyscraper", isCorrect: false},
                    {text: "average", isCorrect: false}
                ],
                explanation: `
                    <div class='exp-step'><strong>1. Dịch câu hỏi:</strong> Chọn từ có trọng âm chính rơi vào vị trí khác.</div>
                    <div class='exp-step'><strong>2. Phân tích trọng âm:</strong><br>
                    - <b>criminal</b> /ˈkrɪm.ɪ.nəl/ (Trọng âm 1).<br>
                    - <b>physician</b> /fɪˈzɪʃ.ən/ (Trọng âm 2).<br>
                    - <b>skyscraper</b> /ˈskaɪˌskreɪ.pər/ (Trọng âm 1).<br>
                    - <b>average</b> /ˈæv.ər.ɪdʒ/ (Trọng âm 1).</div>
                    <div class='exp-step'><strong>3. Tại sao chọn "physician"?</strong> Từ <b>physician</b> có đuôi "-cian", quy tắc đánh trọng âm luôn rơi vào âm tiết ngay trước nó (âm 2). Các từ còn lại trọng âm rơi vào âm tiết 1.</div>
                `
            },
            {
                instruction: null,
                id: 4, text: "Question 4.",
                options: [
                    {text: "decrease", isCorrect: false},
                    {text: "estate", isCorrect: false},
                    {text: "happen", isCorrect: true},
                    {text: "today", isCorrect: false}
                ],
                explanation: `
                    <div class='exp-step'><strong>1. Dịch câu hỏi:</strong> Chọn từ có vị trí trọng âm khác.</div>
                    <div class='exp-step'><strong>2. Phân tích trọng âm:</strong><br>
                    - <b>decrease</b> /dɪˈkriːs/ (Trọng âm 2).<br>
                    - <b>estate</b> /ɪˈsteɪt/ (Trọng âm 2).<br>
                    - <b>happen</b> /ˈhæp.ən/ (Trọng âm 1).<br>

        // TÍNH NĂNG SHUFFLE (XÁO TRỘN ĐÁP ÁN MỖI LẦN MỞ TRANG)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        let score = 0;
        let answeredQuestions = new Set();
        const totalQuestions = quizData.length;

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            
            quizData.forEach((q) => {
                if (q.instruction) {
                    const instDiv = document.createElement('div');
                    instDiv.className = 'instruction-block';
                    instDiv.innerHTML = q.instruction;
                    container.appendChild(instDiv);
                }

                // Sao chép mảng đáp án và kích hoạt SHUFFLE
                let shuffledOptions = [...q.options];
                shuffleArray(shuffledOptions);

                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-card-${q.id}`;

                // Render đáp án (Hiển thị ngẫu nhiên nhưng gán Label tĩnh A, B, C, D)
                let optionsHTML = shuffledOptions.map((opt, i) => {
                    const displayLabel = String.fromCharCode(65 + i);
                    return `
                        <button class="option-btn" 
                                data-is-correct="${opt.isCorrect}"
                                onclick="checkAnswer(${q.id}, this)">
                            <b>${displayLabel}.</b> &nbsp; ${opt.text}
                        </button>
                    `;
                }).join('');

                card.innerHTML = `
                    <div class="question-text">${q.text}</div>
                    <div class="options-grid" id="options-${q.id}">
                        ${optionsHTML}
                    </div>
                    <div class="explanation-box" id="exp-${q.id}">
                        <h4><span style="font-size:1.5rem">💡</span> GIẢI THÍCH CHI TIẾT:</h4>
                        ${q.explanation}
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('score-display').innerText = `0 / ${totalQuestions}`;
        }

        function checkAnswer(questionId, clickedBtn) {
            if (answeredQuestions.has(questionId)) return;

            const buttons = document.querySelectorAll(`#options-${questionId} .option-btn`);
            const expBox = document.getElementById(`exp-${questionId}`);
            
            const isCorrect = clickedBtn.getAttribute('data-is-correct') === 'true';

            buttons.forEach(btn => btn.disabled = true);

            if (isCorrect) {
                clickedBtn.classList.add('correct');
                playSound('correct');
                createConfetti();
                score++;
                document.getElementById('score-display').innerText = `${score} / ${totalQuestions}`;
            } else {
                clickedBtn.classList.add('wrong');
                clickedBtn.classList.add('shake-anim');
                playSound('wrong');
                
                // TỰ ĐỘNG QUÉT VÀ HIỆN MÀU XANH CHO ĐÁP ÁN ĐÚNG (Kể cả khi bị xáo trộn vị trí)
                buttons.forEach(btn => {
                    if (btn.getAttribute('data-is-correct') === 'true') {
                        btn.classList.add('correct');
                    }
                });
            }

            expBox.style.display = 'block';
            answeredQuestions.add(questionId);
        }

        function submitQuiz() {
            const praises = [
                "Bạn là một Fat Cat thiên tài ngôn ngữ! 🌟",
                "Quá xuất sắc! Fat Cat vỗ tay khen bạn! 🔥",
                "Tuyệt vời! Kiến thức Fat Cat của bạn rất vững! 📚"
            ];
            const randomPraise = praises[Math.floor(Math.random() * praises.length)];
            
            document.getElementById('final-score-text').innerText = `Bạn đã trả lời đúng ${score}/${totalQuestions} câu.`;
            document.getElementById('praise-text').innerText = randomPraise;
            document.getElementById('result-overlay').style.display = 'flex';
            
            if(score === totalQuestions) {
                createConfetti();
                playSound('correct');
            }
        }

        function closePopup() {
            document.getElementById('result-overlay').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = renderQuiz;
    </script>
</body>
</html>
