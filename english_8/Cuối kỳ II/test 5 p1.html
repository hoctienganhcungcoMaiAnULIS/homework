<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đề 05 – ĐỀ THI CUỐI KỲ HK2 – GLOBAL SUCCESS 8</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #e879f9;
  --purple: #8854C0;
  --yellow: #FDCB6E;
  --teal: #00C9A7;
  --green: #00D26A;
  --red: #FF4757;
  --orange: #FF6B35;
  --blue: #4ECDC4;
  --card-bg: rgba(255,255,255,0.92);
  --shadow: 0 8px 32px rgba(136,84,192,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  background:#0f0c29;
  position:relative;
}

/* ===== ANIMATED GRADIENT BG ===== */
.bg-gradient{
  position:fixed;inset:0;z-index:0;
  background: linear-gradient(270deg, #8854C0, #e879f9, #FDCB6E, #00C9A7, #4ECDC4, #8854C0);
  background-size: 600% 600%;
  animation: gradientShift 12s ease infinite;
}
@keyframes gradientShift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
/* ===== FLOATING SVG PATTERN ===== */
.bg-pattern{
  position:fixed;inset:0;z-index:1;
  overflow:hidden;pointer-events:none;
}
.bg-pattern svg{
  position:absolute;
  animation: floatUp linear infinite;
  opacity:0.55;
}
@keyframes floatUp{
  0%{transform:translateY(110vh) rotate(0deg);opacity:0;}
  10%{opacity:0.55;}
  90%{opacity:0.55;}
  100%{transform:translateY(-20vh) rotate(360deg);opacity:0;}
}

/* ===== PASSWORD MODAL ===== */
#pw-overlay{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background: rgba(15,12,41,0.82);
  backdrop-filter:blur(8px);
}
.pw-box{
  background:white;border-radius:28px;
  padding:40px 36px;max-width:420px;width:93%;
  text-align:center;
  box-shadow:0 20px 60px rgba(136,84,192,0.4);
  animation:popIn 0.4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(0.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.pw-box .lock-icon{font-size:3.2rem;margin-bottom:10px;}
.pw-box h2{color:#8854C0;font-size:1.4rem;font-weight:900;margin-bottom:6px;}
.pw-box p{color:#666;font-size:0.95rem;margin-bottom:18px;}
.pw-box input{
  width:100%;padding:13px 18px;border-radius:14px;
  border:2.5px solid #ddd;font-family:'Nunito',sans-serif;
  font-size:1.1rem;outline:none;transition:border 0.2s;
  text-align:center;letter-spacing:2px;
}
.pw-box input:focus{border-color:#8854C0;}
.pw-box input.error-border{border-color:#FF4757;}
.pw-box .pw-btn{
  margin-top:14px;width:100%;padding:13px;border:none;
  border-radius:14px;background:linear-gradient(135deg,#8854C0,#e879f9);
  color:white;font-family:'Nunito',sans-serif;font-size:1.1rem;
  font-weight:800;cursor:pointer;
  box-shadow:0 4px 15px rgba(136,84,192,0.4);
  transition:transform 0.15s;
}
.pw-box .pw-btn:hover{transform:translateY(-2px);}
.pw-error{color:#FF4757;font-size:0.9rem;font-weight:700;margin-top:8px;min-height:20px;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-10px);}40%{transform:translateX(10px);}60%{transform:translateX(-8px);}80%{transform:translateX(8px);}}
.shake{animation:shake 0.5s ease;}

/* ===== MAIN QUIZ WRAPPER ===== */
#quiz-wrapper{display:none;position:relative;z-index:2;padding:10px 12px 60px;}

/* ===== HEADER ===== */
.quiz-header{
  text-align:center;padding:14px 16px 10px;
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(10px);
  border-radius:20px;
  border:1.5px solid rgba(255,255,255,0.35);
  margin-bottom:16px;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
}
.quiz-header .test-name{
  font-size:0.82rem;font-weight:700;
  color:rgba(255,255,255,0.85);letter-spacing:1px;text-transform:uppercase;
}
.quiz-header h1{
  font-size:1.1rem;font-weight:900;color:white;
  text-shadow:0 2px 8px rgba(0,0,0,0.25);line-height:1.35;
}
.quiz-header .teacher{font-size:0.8rem;color:rgba(255,255,255,0.75);font-style:italic;margin-top:2px;}

/* ===== SCORE BAR ===== */
.score-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,0.18);backdrop-filter:blur(10px);
  border-radius:16px;padding:10px 20px;margin-bottom:16px;
  border:1.5px solid rgba(255,255,255,0.3);
  color:white;font-weight:800;font-size:1.05rem;
}
.score-bar .score-num{
  background:rgba(255,255,255,0.22);border-radius:10px;
  padding:4px 14px;font-size:1.1rem;
}
.progress-wrap{flex:1;margin:0 14px;background:rgba(255,255,255,0.2);border-radius:10px;height:12px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#00D26A,#FDCB6E);border-radius:10px;transition:width 0.5s ease;}

/* ===== SECTION TITLE ===== */
.section-title{
  background:linear-gradient(135deg,#FDCB6E,#FF6B35);
  border-radius:14px;padding:10px 18px;margin-bottom:12px;
  font-size:0.88rem;font-weight:800;color:white;
  box-shadow:0 4px 12px rgba(253,203,110,0.35);
  letter-spacing:0.3px;
}

/* ===== QUESTION CARD ===== */
.q-card{
  background:var(--card-bg);border-radius:22px;
  padding:20px 20px 16px;margin-bottom:18px;
  box-shadow:var(--shadow);
  border:2px solid rgba(136,84,192,0.12);
  transition:box-shadow 0.3s;
}
.q-card:hover{box-shadow:0 12px 40px rgba(136,84,192,0.22);}
.q-num{
  display:inline-block;background:linear-gradient(135deg,#8854C0,#e879f9);
  color:white;border-radius:10px;padding:3px 12px;
  font-size:0.82rem;font-weight:800;margin-bottom:8px;
  letter-spacing:0.5px;
}
.q-text{
  font-size:1.08rem;font-weight:700;color:#2d2d2d;
  line-height:1.55;margin-bottom:14px;
}
.q-text u{text-decoration-color:#FF4757;text-decoration-thickness:2px;}

/* ===== VISUAL BLOCKS (Q29, Q30) ===== */
.sign-box{
  border:3px solid #333;border-radius:12px;padding:18px;
  background:#fff;display:flex;align-items:center;gap:16px;
  margin-bottom:14px;
}
.no-selfie-circle{
  width:90px;height:90px;border-radius:50%;
  border:6px solid #e00;position:relative;flex-shrink:0;
  background:#fff;overflow:hidden;
}
.no-selfie-circle::after{
  content:'';position:absolute;
  top:50%;left:-6px;right:-6px;height:6px;background:#e00;
  transform:rotate(-45deg);transform-origin:center;
}
.selfie-figure{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
}
.kayak-notice{
  border:3px solid #e00;border-radius:10px;padding:14px 16px;
  background:#fff5f5;text-align:center;margin-bottom:14px;
  font-weight:800;color:#e00;font-size:0.95rem;line-height:1.6;
}

/* ===== ANSWER BUTTONS ===== */
.options-grid{display:grid;gap:10px;}
.opt-btn{
  width:100%;padding:12px 16px;border:2.5px solid #e0d5f5;
  border-radius:16px;background:white;font-family:'Nunito',sans-serif;
  font-size:1.0rem;font-weight:700;color:#333;cursor:pointer;text-align:left;
  transition:transform 0.15s,box-shadow 0.15s,background 0.2s,border-color 0.2s;
  box-shadow:0 4px 10px rgba(136,84,192,0.1);line-height:1.45;
}
.opt-btn:hover:not(:disabled){
  transform:scale(1.025) translateY(-2px);
  box-shadow:0 8px 20px rgba(136,84,192,0.2);
  border-color:#8854C0;background:#f9f4ff;
}
.opt-btn.correct{
  background:linear-gradient(135deg,#00D26A22,#00D26A11);
  border-color:#00D26A;color:#006633;
}
.opt-btn.wrong{
  background:linear-gradient(135deg,#FF475722,#FF475711);
  border-color:#FF4757;color:#cc0000;
}
.opt-btn:disabled{cursor:default;}
@keyframes btnShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
.btn-shake{animation:btnShake 0.45s ease;}

/* ===== EXPLANATION BOX ===== */
.explanation{
  display:none;margin-top:14px;padding:14px 16px;
  background:linear-gradient(135deg,#f0e8ff,#e8f8ff);
  border-radius:16px;border-left:5px solid #8854C0;
  font-size:0.97rem;line-height:1.7;color:#333;
  animation:slideDown 0.35s ease;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.explanation.show{display:block;}
.exp-title{font-weight:900;color:#8854C0;font-size:1rem;margin-bottom:8px;}
.p-word{color:#2563eb;font-weight:700;}

.p-mean{color:#b45309;font-weight:700;}

.hl-red{color:#dc2626;font-weight:700;}

/* ===== SUBMIT BUTTON ===== */
.submit-wrap{text-align:center;margin:28px 0 16px;}
.submit-btn{
  padding:16px 48px;border:none;border-radius:20px;

/* ===== NAME MODAL ===== */
#name-modal{

}

  background:white;border-radius:24px;padding:36px;

}
.name-box h2{color:#8854C0;font-size:1.35rem;font-weight:900;margin-bottom:6px;}
.name-box p{color:#666;font-size:0.95rem;margin-bottom:18px;}
.name-box input{
  width:100%;padding:12px 16px;border-radius:14px;
  border:2.5px solid #ddd;font-family:'Nunito',sans-serif;

}
.name-box input:focus{border-color:#8854C0;}
.name-box input.error-border{border-color:#FF4757;}
.name-box .name-btn{
  margin-top:12px;width:100%;padding:13px;border:none;
  border-radius:14px;background:linear-gradient(135deg,#8854C0,#e879f9);
  color:white;font-family:'Nunito',sans-serif;font-size:1.1rem;
  font-weight:800;cursor:pointer;
  box-shadow:0 4px 15px rgba(136,84,192,0.4);transition:transform 0.15s;
}
.name-box .name-btn:hover{transform:translateY(-2px);}
.name-error{color:#FF4757;font-size:0.88rem;font-weight:700;margin-top:7px;min-height:20px;}

/* ===== RESULT MODAL ===== */
#result-modal{
  position:fixed;inset:0;z-index:9000;
  display:none;align-items:center;justify-content:center;
  background:rgba(15,12,41,0.85);backdrop-filter:blur(8px);
  overflow-y:auto;
}
#result-modal.show{display:flex;}
.result-box{
  background:white;border-radius:28px;padding:36px 28px;
  max-width:500px;width:93%;text-align:center;
  box-shadow:0 20px 60px rgba(136,84,192,0.5);
  animation:popIn 0.5s cubic-bezier(.34,1.56,.64,1);
  margin:20px auto;
}
.result-box .result-title{
  font-size:1.5rem;font-weight:900;margin-bottom:6px;
  background:linear-gradient(135deg,#8854C0,#e879f9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.result-box .score-display{
  font-size:3rem;font-weight:900;
  background:linear-gradient(135deg,#FDCB6E,#FF6B35);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin:8px 0;
}
.result-box .comment{color:#555;font-size:1rem;font-weight:700;margin-bottom:14px;}
.result-box img.meme{
  width:100%;max-width:300px;border-radius:16px;
  margin:10px auto 16px;display:block;
  box-shadow:0 6px 20px rgba(0,0,0,0.15);
}
.result-box .close-btn{
  padding:12px 36px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#8854C0,#e879f9);
  color:white;font-family:'Nunito',sans-serif;font-size:1rem;
  font-weight:800;cursor:pointer;margin-top:8px;
  box-shadow:0 4px 15px rgba(136,84,192,0.35);
  transition:transform 0.15s;
}
.result-box .close-btn:hover{transform:translateY(-2px);}

/* ===== CONFETTI CANVAS ===== */
#confetti-canvas{
  position:fixed;inset:0;z-index:8000;
  pointer-events:none;
}

/* ===== RESPONSIVE ===== */
@media(max-width:520px){
  .q-text{font-size:1.0rem;}
  .opt-btn{font-size:0.95rem;}
}
</style>
</head>
<body>

<!-- BG Layers -->
<div class="bg-gradient"></div>
<div class="bg-pattern" id="bgPattern"></div>

<!-- Confetti Canvas -->
<canvas id="confetti-canvas"></canvas>

<!-- ===== PASSWORD MODAL ===== -->
<div id="pw-overlay">
  <div class="pw-box">
    <div class="lock-icon">🔒</div>
    <h2>Nhập mật khẩu để vào bài thi</h2>

    <input type="password" id="pw-input" placeholder="••••••••••••" autocomplete="off">

</div>

<!-- ===== NAME MODAL ===== -->
<div id="name-modal">
  <div class="name-box">
    <div style="font-size:2.2rem;margin-bottom:8px;">📝</div>
    <h2>Nhập tên của bạn</h2>
    <p>Để cá nhân hóa kết quả bài thi nhé!</p>
    <input type="text" id="name-input" placeholder="Ví dụ: Nguyễn Văn A..." maxlength="60">
    <div class="name-error" id="name-error"></div>
    <button class="name-btn" onclick="confirmName()">✅ Xem kết quả!</button>
  </div>
</div>

<!-- ===== RESULT MODAL ===== -->
<div id="result-modal">
  <div class="result-box">
    <div class="result-title" id="result-title">🌟 KẾT QUẢ BÀI THI</div>
    <div class="score-display" id="score-display">0/16</div>
    <div class="comment" id="result-comment"></div>
    <img class="meme" id="result-meme" src="" alt="meme" onerror="this.style.display='none'">
    <button class="close-btn" onclick="closeResult()">🔄 Làm lại</button>
  </div>
</div>

<!-- ===== QUIZ WRAPPER ===== -->
<div id="quiz-wrapper">
  <div class="quiz-header">
    <div class="test-name">📚 Đề 05 &nbsp;|&nbsp; Tiếng Anh lớp 8</div>
    <h1>ĐỀ THI CUỐI KỲ HỌC KỲ 2 – GLOBAL SUCCESS 8</h1>
    <div class="teacher">✏️ Giáo viên tạo: <strong>Ms Mai An ULIS</strong></div>
  </div>

  <div class="score-bar">
    <span>⭐ Điểm:</span>
    <div class="progress-wrap"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <span class="score-num"><span id="live-score">0</span>/<span id="total-q">16</span></span>
  </div>

  <div id="quiz-body"></div>

    <button class="submit-btn" onclick="openNameModal()">🎯 NỘP BÀI &amp; XEM KẾT QUẢ</button>
  </div>
</div>

<script>
/* =========================================
   PASSWORD CHECK  (comaianulis = ASCII)
========================================= */
const PW_CODES = [99,111,109,97,105,97,110,117,108,105,115];
function checkPw(){
  const v = document.getElementById('pw-input').value;
  const correct = PW_CODES.map(c=>String.fromCharCode(c)).join('');
  const inp = document.getElementById('pw-input');
  const err = document.getElementById('pw-error');
  if(v === correct){
    document.getElementById('pw-overlay').style.display='none';
    document.getElementById('quiz-wrapper').style.display='block';
    buildQuiz();
    spawnFloaters();
  } else {
    err.textContent = '❌ Mật khẩu sai! Vui lòng thử lại.';
    inp.classList.add('error-border','shake');
    setTimeout(()=>{inp.classList.remove('shake');},600);
  }
}
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});

/* =========================================
   FLOATING SVG EMOJIS
========================================= */
function spawnFloaters(){
  const emojis=['🌟','🚀','🪐','⭐','🌙','🌈','🎉','✨','🌺','🦋','🐬','🎵','💫','🔭','🌊'];
  const p = document.getElementById('bgPattern');
  for(let i=0;i<20;i++){
    const el=document.createElementNS('http://www.w3.org/2000/svg','svg');
    el.setAttribute('width','32');el.setAttribute('height','32');
    el.setAttribute('viewBox','0 0 32 32');
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('y','26');t.setAttribute('font-size','26');
    t.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.appendChild(t);
    const dur=7+Math.random()*12;
    const delay=Math.random()*15;
    el.style.cssText=`left:${Math.random()*95}%;bottom:-60px;animation-duration:${dur}s;animation-delay:${delay}s;`;
    p.appendChild(el);
  }
}

/* =========================================
   WEB AUDIO
========================================= */
const actx = new(window.AudioContext||window.webkitAudioContext)();
function playDing(){
  const o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);
  o.type='sine';o.frequency.setValueAtTime(880,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(1320,actx.currentTime+0.1);
  g.gain.setValueAtTime(0.4,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.6);
  o.start();o.stop(actx.currentTime+0.6);
}
function playWrong(){
  const o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);
  o.type='sawtooth';
  o.frequency.setValueAtTime(250,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(90,actx.currentTime+0.3);
  g.gain.setValueAtTime(0.3,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.4);
  o.start();o.stop(actx.currentTime+0.4);
}

/* =========================================
   CONFETTI
========================================= */
const canvas=document.getElementById('confetti-canvas');
const ctx2=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
let confettiPieces=[];
function launchConfetti(){
  for(let i=0;i<80;i++){
    confettiPieces.push({
      x:Math.random()*canvas.width,y:-10,
      w:8+Math.random()*8,h:4+Math.random()*4,
      color:`hsl(${Math.random()*360},90%,60%)`,
      vx:(Math.random()-0.5)*5,vy:2+Math.random()*4,
      rot:Math.random()*360,vr:(Math.random()-0.5)*8,
      life:1
    });
  }
  animateConfetti();
}
function animateConfetti(){
  ctx2.clearRect(0,0,canvas.width,canvas.height);
  confettiPieces=confettiPieces.filter(p=>p.life>0);
  confettiPieces.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life-=0.012;
    ctx2.save();ctx2.translate(p.x,p.y);ctx2.rotate(p.rot*Math.PI/180);
    ctx2.globalAlpha=p.life;ctx2.fillStyle=p.color;
    ctx2.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx2.restore();
  });
  if(confettiPieces.length>0)requestAnimationFrame(animateConfetti);
  else ctx2.clearRect(0,0,canvas.width,canvas.height);
}

/* =========================================
   SHUFFLE
========================================= */
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

/* =========================================
   QUIZ DATA
========================================= */
const QUESTIONS = [
  // ---- Q1 PRONUNCIATION ----

▪ <span class='p-word'>my</span> = <span class='p-mean'>của tôi</span> (tính từ sở hữu) → phải đi kèm danh từ → <span class='hl-red'>Sai khi đứng một mình</span><br><br>

/* =========================================
   STATE
========================================= */
let answered = {};
let correctCount = 0;
const TOTAL = QUESTIONS.length;

/* =========================================
   BUILD QUIZ
========================================= */
function buildQuiz(){
  document.getElementById('total-q').textContent = TOTAL;
  const body = document.getElementById('quiz-body');
  body.innerHTML='';
  let lastSection = null;

  QUESTIONS.forEach((q,qi)=>{
    if(q.section && q.section !== lastSection){
      const st=document.createElement('div');
      st.className='section-title';
      st.textContent=q.section;
      body.appendChild(st);
      lastSection=q.section;
    }

    const card=document.createElement('div');
    card.className='q-card';
    card.id=`qcard-${q.id}`;

    const numSpan=document.createElement('div');
    numSpan.className='q-num';
    numSpan.textContent=`Câu ${q.id}`;
    card.appendChild(numSpan);

    const qText=document.createElement('div');
    qText.className='q-text';
    qText.innerHTML=q.text;
    card.appendChild(qText);

    // Shuffle options
    const shuffled = shuffle(q.options.map((o,i)=>({...o,origIdx:i})));

    const grid=document.createElement('div');
    grid.className='options-grid';
    grid.id=`grid-${q.id}`;

    shuffled.forEach((opt,oi)=>{
      const btn=document.createElement('button');
      btn.className='opt-btn';
      btn.id=`opt-${q.id}-${oi}`;
      btn.innerHTML=opt.text;
      btn.onclick=()=>selectAnswer(q.id, opt.correct, btn, grid);
      grid.appendChild(btn);
    });
    card.appendChild(grid);

    const expDiv=document.createElement('div');
    expDiv.className='explanation';
    expDiv.id=`exp-${q.id}`;
    expDiv.innerHTML=q.explanation;
    card.appendChild(expDiv);

    body.appendChild(card);
  });
}

/* =========================================
   SELECT ANSWER
========================================= */
function selectAnswer(qId, isCorrect, btn, grid){
  if(answered[qId]) return;
  answered[qId] = isCorrect;

  // Disable all
  const btns = grid.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);

  if(isCorrect){
    btn.classList.add('correct');
    btn.innerHTML='✅ '+btn.innerHTML;
    playDing();
    launchConfetti();
    correctCount++;
  } else {
    btn.classList.add('wrong');
    btn.innerHTML='❌ '+btn.innerHTML;
    btn.classList.add('btn-shake');
    setTimeout(()=>btn.classList.remove('btn-shake'),500);
    // Show correct answer
    btns.forEach(b=>{
      if(!b.disabled) return;
      // find correct btn
    });
    // Mark correct button green
    btns.forEach(b=>{
      if(b!==btn && !b.classList.contains('wrong')){
        // check if this is the correct one
        const text=b.innerHTML;
        // we need to re-find correct: iterate original options
        const orig=QUESTIONS.find(q=>q.id===qId);
        if(orig){
          orig.options.forEach(o=>{
            if(o.correct && b.innerHTML.replace(/^✅\s/,'')===o.text){
              b.classList.add('correct');
              b.innerHTML='✅ '+b.innerHTML;
            }
          });
        }
      }
    });
    playWrong();
  }

  // Show explanation
  document.getElementById(`exp-${qId}`).classList.add('show');

  // Update score
  updateScore();
}

/* =========================================
   UPDATE SCORE BAR
========================================= */
function updateScore(){
  const done=Object.keys(answered).length;
  document.getElementById('live-score').textContent=correctCount;
  const pct=done>0?(correctCount/done*100):0;
  document.getElementById('prog-fill').style.width=(done/TOTAL*100)+'%';
}

/* =========================================
   NAME MODAL
========================================= */
function openNameModal(){
  document.getElementById('name-modal').classList.add('show');
  setTimeout(()=>document.getElementById('name-input').focus(),300);
}
function confirmName(){
  const nm=document.getElementById('name-input').value.trim();
  const err=document.getElementById('name-error');
  const inp=document.getElementById('name-input');
  if(!nm){
    err.textContent='⚠️ Vui lòng nhập tên trước khi xem điểm nhé!';
    inp.classList.add('error-border');
    inp.classList.add('shake');
    setTimeout(()=>inp.classList.remove('shake'),600);
    return;
  }
  err.textContent='';
  inp.classList.remove('error-border');
  document.getElementById('name-modal').classList.remove('show');
  showResult(nm);
}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')confirmName();});

/* =========================================
   RESULT MODAL
========================================= */
const MEMES_GENIUS=['https://media.giphy.com/media/l0MYEqEzwMWFCg8rm/giphy.gif','https://media.giphy.com/media/3oz8xAFtqoOUUrsh7W/giphy.gif','https://media.giphy.com/media/5GoVLqeAOo6PK/giphy.gif'];
const MEMES_GOOD=['https://media.giphy.com/media/26u4cqiYI30juCOGY/giphy.gif','https://media.giphy.com/media/3ohs4qw8hkPShGAMJO/giphy.gif','https://media.giphy.com/media/SDogLD4FOZMM8/giphy.gif'];
const MEMES_LOW=['https://media.giphy.com/media/ISOckXUybVfQ4/giphy.gif','https://media.giphy.com/media/14aUO0Mf7dWDXW/giphy.gif','https://media.giphy.com/media/3oEjI6hkZ8trmYOJXy/giphy.gif'];
const COMMENTS_GENIUS=['🌟 THIÊN TÀI! {name} xuất sắc tuyệt đối! Bái phục! 🏆','⚡ {name} siêu đỉnh! Điểm tuyệt đối! Thầy/cô tự hào lắm! 🎊'];
const COMMENTS_GOOD=['👍 {name} làm rất tốt! Cố gắng thêm chút nữa là hoàn hảo! 💪','😊 {name} khá giỏi! Ôn lại phần sai một tí rồi sẽ đạt điểm cao hơn! ✨'];
const COMMENTS_LOW=['😅 {name} cần cố gắng hơn nhé! Đọc kỹ giải thích và thử lại! 📚','🌱 {name} ơi, thất bại là mẹ thành công! Ôn lại và chiến tiếp nhé! 💖'];

function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}

function showResult(name){
  const pct=correctCount/TOTAL;
  let meme,comment;
  if(pct===1){meme=rand(MEMES_GENIUS);comment=rand(COMMENTS_GENIUS);}
  else if(pct>=0.6){meme=rand(MEMES_GOOD);comment=rand(COMMENTS_GOOD);}
  else{meme=rand(MEMES_LOW);comment=rand(COMMENTS_LOW);}

  document.getElementById('result-title').textContent=pct===1?`🌟 THIÊN TÀI!`:pct>=0.6?`🎉 KẾT QUẢ TỐT!`:`📚 CẦN CỐ GẮNG HƠN!`;
  document.getElementById('score-display').textContent=`${correctCount} / ${TOTAL}`;
  document.getElementById('result-comment').innerHTML=comment.replace('{name}',`<b>${name}</b>`);
  document.getElementById('result-meme').src=meme;
  document.getElementById('result-modal').classList.add('show');
  if(pct>=0.6) launchConfetti();
}
function closeResult(){
  document.getElementById('result-modal').classList.remove('show');
  // Reset
  answered={};correctCount=0;
  buildQuiz();
  updateScore();
  window.scrollTo({top:0,behavior:'smooth'});
}
