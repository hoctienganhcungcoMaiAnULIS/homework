    <style>
        /* CSS Reset & Variables */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        :root {
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --color-word: #0056b3;      
            --color-mean: #cc5500;      
            --color-grammar: #000;      
            --color-correct: #28a745;   
            --color-incorrect: #dc3545; 
        }

        /* Animated Pastel Background */
        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #333;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Emojis */
        .floating-emoji {
            position: absolute; pointer-events: none; opacity: 0.6;
            animation: floatUp linear infinite; z-index: 0; font-size: 2rem;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Header */
        header {
            position: fixed; top: 0; width: 100%; height: 50px; z-index: 100;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
        }
        header h1 { font-size: 1.2rem; font-weight: 800; color: #4a4a4a; letter-spacing: 1px; }

        /* Split Screen Layout */
        #mainContent { display: none; height: 100vh; padding-top: 50px; position: relative; z-index: 10; }
        .split-container { display: flex; height: 100%; width: 100%; }
        .panel { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .panel::-webkit-scrollbar { width: 8px; }
        .panel::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .left-panel { border-right: 2px dashed rgba(255,255,255,0.5); }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            box-shadow: var(--glass-shadow); padding: 25px; margin-bottom: 25px;
        }

        /* Typography & Passage */
        .passage-title { font-family: 'Cinzel', serif; font-size: 1.6rem; color: #2c3e50; margin-bottom: 15px; font-weight: bold; text-align: center; }
        .paragraph-box { margin-bottom: 15px; }
        .eng-text { font-size: 1.15rem; line-height: 1.8; color: #1a1a1a; font-weight: 600; margin-bottom: 10px; }
        .vi-text { font-size: 1.05rem; line-height: 1.6; color: #444; font-style: italic; display: none; background: rgba(255,255,255,0.5); padding: 10px; border-radius: 10px; border-left: 4px solid #f39c12; }
        
        /* Buttons */
        .btn-translate {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            border: none; border-radius: 12px; padding: 6px 15px; font-size: 0.9rem;
            font-weight: 700; color: #fff; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 10px; box-shadow: 0 4px 15px rgba(253, 160, 133, 0.4);
        }
        .btn-translate:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(253, 160, 133, 0.6); }

        /* Glossary Table */
        .glossary-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: rgba(255,255,255,0.3); border-radius: 10px; overflow: hidden; }
        .glossary-table th, .glossary-table td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.5); }
        .glossary-table th { background: rgba(255,255,255,0.5); font-weight: bold; color: #333; }
        
        /* Quiz Styles */
        .question-box { margin-bottom: 30px; }
        .q-text { font-size: 1.2rem; font-weight: 800; margin-bottom: 15px; color: #2c3e50; line-height: 1.5; }
        .options-grid { display: flex; flex-direction: column; gap: 10px; }
        .opt-btn {
            background: rgba(255,255,255,0.7); border: 2px solid rgba(255,255,255,0.9);
            border-radius: 15px; padding: 12px 20px; font-size: 1.1rem; font-weight: 600; color: #333;
            text-align: left; cursor: pointer; transition: all 0.3s;
            white-space: normal; word-wrap: break-word; /* Chống cắt xén chữ */
        }
        .opt-btn:hover { background: #fff; transform: translateX(5px); }
        .opt-btn.correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; pointer-events: none; box-shadow: 0 0 15px rgba(40,167,69,0.5); }
        .opt-btn.wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; pointer-events: none; animation: shakeBtn 0.4s ease; }
        .opt-btn.disabled { pointer-events: none; opacity: 0.7; }

        .explanation-box {
            margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.85);
            border-radius: 12px; border-left: 5px solid #007bff; font-size: 1.05rem; line-height: 1.6;
            display: none; box-shadow: inset 0 0 10px rgba(0,0,0,0.05);

        .explanation-box p { margin-bottom: 8px; }
        .explanation-box ul { margin-left: 20px; margin-bottom: 10px; }
        .explanation-box li { margin-bottom: 5px; }

        .p-mean { color: var(--color-mean); font-style: italic; font-weight: 600; }

        .hl-green { color: var(--color-correct); font-weight: 800; }
        .hl-red { color: var(--color-incorrect); text-decoration: line-through; font-weight: 800; }

        /* Submit Button */

            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            border: 2px solid #fff; border-radius: 20px; font-size: 1.3rem; font-weight: 800;
            color: #d63384; cursor: pointer; text-transform: uppercase; box-shadow: 0 10px 20px rgba(214, 51, 132, 0.3);

        /* Popup Score */

            display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .score-card {
            background: #fff; width: 90%; max-width: 500px; padding: 40px;
            border-radius: 30px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .score-card h2 { font-size: 2rem; color: #2c3e50; margin-bottom: 10px; }
        .score-card input {
            width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #ddd;
            border-radius: 15px; margin-bottom: 20px; text-align: center;
        }
        .score-card img { width: 100%; max-height: 250px; object-fit: contain; border-radius: 15px; margin-top: 15px; }

        /* GIAO DIỆN MÀN HÌNH KHÓA */
        #passwordModal {
            position:fixed; inset:0; z-index:9999;
            display:flex; align-items:center; justify-content:center;
            background:rgba(5,2,15,0.92); backdrop-filter:blur(20px);
        }
        .pw-card {
            background:linear-gradient(160deg, rgba(40,10,70,0.95) 0%, rgba(15,5,30,0.98) 100%);
            border:1.5px solid rgba(240,192,64,0.4); border-radius:24px; padding:48px 40px 40px;

<script>
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

function playTone(frequency, type, duration) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.type = type;
    oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + duration);
}

function playDing() {
    playTone(880, 'sine', 0.1); 
    setTimeout(() => playTone(1108, 'sine', 0.3), 100); 
}

function playError() {
    playTone(150, 'sawtooth', 0.2);
    setTimeout(() => playTone(100, 'sawtooth', 0.3), 150);
}

function spawnConfetti() {
    const colors = ['#ff0', '#f00', '#0f0', '#00f', '#f0f'];
    for(let i=0; i<30; i++){
        let conf = document.createElement('div');
        conf.style.position = 'fixed';
        conf.style.left = Math.random() * 100 + 'vw';
        conf.style.top = '-10px';
        conf.style.width = '10px';
        conf.style.height = '10px';
        conf.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
        conf.style.zIndex = '9999';
        conf.style.transition = 'all 1s cubic-bezier(.37,0,.63,1)';
        document.body.appendChild(conf);
        setTimeout(() => {
            conf.style.top = '100vh';
            conf.style.transform = `rotate(${Math.random()*360}deg) translateX(${Math.random()*100-50}px)`;
        }, 50);
        setTimeout(() => conf.remove(), 1050);
    }
}

function spawnFloats() {
    const emojis = ['🏙️', '🌍', '♻️', '📺', '🏡', '🌟', '📚', '🚀'];
    setInterval(() => {
        let el = document.createElement('div');
        el.className = 'floating-emoji';
        el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 95 + 'vw';
        el.style.animationDuration = (Math.random() * 5 + 10) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 15000);
    }, 2000);
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

let userAnswers = {};

function toggleTranslation(pIndex) {
    const el = document.getElementById(`vi-${pIndex}`);
    el.style.display = (el.style.display === 'block') ? 'none' : 'block';
}

function initApp() {
    const rPanel = document.getElementById('readingPanel');
    const qPanel = document.getElementById('quizPanel');
    
    PASSAGES.forEach((p, pIndex) => {
        let html = `<div class="glass-card">
            <h2 class="passage-title">${p.emoji} ${p.title}</h2>`;
            
        p.paragraphs.forEach((para, idx) => {
            const uId = `p${pIndex}_${idx}`;
            html += `<div class="paragraph-box">
                <p class="eng-text">${para.en}</p>
                <button class="btn-translate" onclick="toggleTranslation('${uId}')">Mở dịch đoạn này 🌟</button>
                <p class="vi-text" id="vi-${uId}">${para.vi}</p>
            </div>`;
        });
        
        html += `<table class="glossary-table">
            <tr><th>Từ vựng (Vocabulary)</th><th>Loại từ (POS)</th><th>Nghĩa tiếng Việt (Meaning)</th></tr>`;
        p.glossary.forEach(g => {
            html += `<tr><td><span class='p-word'>${g.w}</span></td><td><i>${g.p}</i></td><td><span class='p-mean'>${g.m}</span></td></tr>`;
        });
        html += `</table></div>`;
        rPanel.innerHTML += html;
    });

    QUESTIONS.forEach((q, index) => {
        let shuffledOptions = shuffle([...q.options]);
        let optsHtml = '';
        shuffledOptions.forEach((opt, oIdx) => {
            const safeExpl = btoa(unescape(encodeURIComponent(opt.e)));
            optsHtml += `<button class="opt-btn" onclick="handleSelect(${q.id}, ${opt.c}, this, '${safeExpl}')">${opt.t}</button>`;
        });

        const qHtml = `<div class="glass-card question-box" id="qb-${q.id}">
            <div class="q-text">${q.text}</div>
            <div class="options-grid">${optsHtml}</div>
            <div class="explanation-box" id="expl-${q.id}">
                <p style="border-bottom: 1px dashed #ccc; padding-bottom: 10px; margin-bottom: 10px;"><strong>Phân tích chi tiết của Ms Mai An:</strong></p>
                <div id="expl-opts-${q.id}"></div>
                <div style="margin-top:15px; background: #f8f9fa; padding:10px; border-radius: 8px;">${q.expl}</div>
            </div>
        </div>`;
        qPanel.innerHTML += qHtml;
    });
}

function handleSelect(qId, isCorrect, btn, safeExplOpt) {
    if (userAnswers[qId] !== undefined) return; 
    userAnswers[qId] = isCorrect;
    
    const container = document.getElementById(`qb-${qId}`);
    const buttons = container.querySelectorAll('.opt-btn');
    const explBox = document.getElementById(`expl-${qId}`);
    const explOptsBox = document.getElementById(`expl-opts-${qId}`);
    
    buttons.forEach(b => {
        b.classList.add('disabled');
        const bIsCorrect = b.getAttribute('onclick').includes(', true,');
        if(bIsCorrect) b.classList.add('correct');
    });

    if (isCorrect) {
        playDing();
        spawnConfetti();
        btn.classList.add('correct');
        btn.classList.remove('disabled');
    } else {
        playError();
        btn.classList.add('wrong');
        btn.classList.remove('disabled');
    }

    let optsAnalysis = '<ul>';
    buttons.forEach(b => {
        const encodedE = b.getAttribute('onclick').split("'")[1];
        const decodedE = decodeURIComponent(escape(atob(encodedE)));
        optsAnalysis += `<li style="margin-bottom:8px;">${decodedE}</li>`;
    });
    optsAnalysis += '</ul>';
    
    explOptsBox.innerHTML = optsAnalysis;
    explBox.style.display = 'block';
}

function showSubmitPopup() {
    const total = QUESTIONS.length;
    const answered = Object.keys(userAnswers).length;
    if(answered < total) {
        if(!confirm(`Bạn mới làm ${answered}/${total} câu. Bạn có chắc chắn muốn nộp bài không?`)) return;
    }
    document.getElementById('scoreModal').style.display = 'flex';
}

function calculateScore() {
    const name = document.getElementById('studentName').value.trim();
    if (!name) { alert("Vui lòng nhập tên của bạn nhé!"); return; }
    
    let correctCount = Object.values(userAnswers).filter(v => v).length;
    let total = QUESTIONS.length;
    let percentage = (correctCount / total) * 100;
    
    let gifUrl = "";
    let message = "";
    
    if (percentage === 100) {
        gifUrl = "https://media.tenor.com/images/3f74b4fcb53d8b5b7b6c533924fca539/tenor.gif"; 
        message = `Tuyệt đỉnh thiên tài! Cô Mai An rất tự hào về ${name}!`;
    } else if (percentage >= 60) {
        gifUrl = "https://media.tenor.com/images/73b7e71ab47a7550f7f32997bb2baec8/tenor.gif"; 
        message = `Rất tốt ${name}! Bạn đã nắm vững bài học. Cố gắng phát huy nhé!`;
    } else {
        gifUrl = "https://media.tenor.com/images/150eddbf419c991448db5dbbd133a8a3/tenor.gif"; 
        message = `Đừng buồn ${name} nhé, hãy đọc kỹ giải thích của cô và thử lại lần sau! Cố lên!`;
    }

    const card = document.getElementById('scoreCardContent');
    card.innerHTML = `
        <h2 style="color: #2c3e50;">KẾT QUẢ CỦA ${name.toUpperCase()}</h2>
        <div style="font-size: 3rem; font-weight: 900; color: #d63384; margin: 20px 0;">${correctCount} / ${total}</div>
        <p style="font-size: 1.2rem; font-weight: bold; color: #28a745;">${message}</p>
        <img src="${gifUrl}" alt="Result GIF" />
        <button class="btn-submit" onclick="location.reload()" style="font-size: 1rem; padding: 10px;">Làm lại từ đầu</button>
    `;
}

const _k  = [99,111,109,97,105,97,110,117,108,105,115]; 
const _pw = _k.map(c => String.fromCharCode(c)).join('');

function checkPassword() {
    const inp = document.getElementById('pwInput');
    const err = document.getElementById('pwErr');
    if (inp.value === _pw) {
        document.getElementById('passwordModal').style.display = 'none';
        const main = document.getElementById('mainContent');
        if(main) main.style.display = 'block';
        
        spawnFloats();
        initApp(); 
    } else {
        inp.classList.remove('error'); void inp.offsetWidth; inp.classList.add('error');
        err.style.display = 'block'; setTimeout(() => inp.classList.remove('error'), 500);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const pwInput = document.getElementById('pwInput');
    if(pwInput) pwInput.addEventListener('keydown', e => { if (e.key==='Enter') checkPassword(); });
});
