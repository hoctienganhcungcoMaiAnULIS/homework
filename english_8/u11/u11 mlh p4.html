<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập Tiếng Anh - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #FDCB6E;
            --accent: #00C9A7;
            --correct: #00D26A;
            --correct-shadow: #00A352;
            --wrong: #FF4757;
            --wrong-shadow: #D83A46;
            --btn-bg: #ffffff;
            --btn-shadow: #E2E8F0;
            --text: #2D3748;
            --bg-card: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            color: var(--text);
            min-height: 100vh;
            background: linear-gradient(-45deg, #8854C0, #FDCB6E, #00C9A7, #FF9A9E);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Nền chuyển màu loang */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Họa tiết lơ lửng */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 10l7 20h21l-17 13 6 21-17-14-17 14 6-21-17-13h21z' fill='rgba(255,255,255,0.15)' fill-rule='evenodd'/%3E%3C/svg%3E");
            animation: floatPattern 30s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatPattern {
            from { background-position: 0 0; }
            to { background-position: 400px 400px; }
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header h2 {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 700;
            background: rgba(0,0,0,0.2);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 3px solid white;
        }

        .section-title {
            font-size: 1.1rem;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 10px;
            border-bottom: 2px dashed var(--primary);
            padding-bottom: 5px;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .btn-option {
            background: var(--btn-bg);
            border: 2px solid #E2E8F0;
            border-radius: 15px;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            text-align: left;
            box-shadow: 0 6px 0 var(--btn-shadow);
            transition: all 0.1s ease;
            position: relative;
        }

        .btn-option:hover {
            transform: scale(1.02) translateY(-2px);
            border-color: var(--primary);
        }

        .btn-option:active {
            transform: scale(1) translateY(6px);
            box-shadow: 0 0 0 transparent;
        }

        .btn-option.correct {
            background: var(--correct);
            border-color: var(--correct);
            color: white;
            box-shadow: 0 6px 0 var(--correct-shadow);
            pointer-events: none;
        }

        .btn-option.wrong {
            background: var(--wrong);
            border-color: var(--wrong);
            color: white;
            box-shadow: 0 6px 0 var(--wrong-shadow);
            pointer-events: none;
        }

        .btn-option.disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        /* Hiệu ứng rung lắc khi sai */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .shake-anim {
            animation: shake 0.4s ease-in-out;
        }

        /* Khung giải thích */
        .explanation {
            margin-top: 20px;
            background: #F8FAFC;
            border-radius: 15px;
            padding: 20px;
            border-left: 5px solid var(--accent);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exp-step {
            margin-bottom: 12px;
            line-height: 1.6;
            font-size: 1.05rem;
        }

        .exp-step b {
            color: var(--primary);
        }

        /* Nút Nộp Bài */
        .submit-btn {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 40px auto;
            background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 8px 0 #D83A46;
            cursor: pointer;
            transition: all 0.1s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        .submit-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 transparent;
        }

        /* Popup Điểm */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none; z-index: 1000;
            justify-content: center; align-items: center;
        }
        .popup {
            background: white; border-radius: 25px; padding: 40px;
            text-align: center; max-width: 400px; width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .popup h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; }
        .popup p { font-size: 1.2rem; color: #4A5568; margin-bottom: 20px; }
        .popup button {
            background: var(--accent); color: white; border: none;
            padding: 12px 30px; font-size: 1.2rem; font-weight: bold;
            border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 #00A352;
        }
        .popup button:active { transform: translateY(5px); box-shadow: none; }
    </style>
</head>
<body>

    <div class="pattern-overlay"></div>
    <canvas id="confetti-canvas"></canvas>

    <div class="container">
        <header>
            <h2>Giáo viên tạo: Ms Mai An ULIS</h2>
        </header>

        <div id="quiz-container">
            </div>

        <button class="submit-btn" onclick="showScore()">NỘP BÀI!</button>
    </div>

    <div class="overlay" id="score-overlay">
        <div class="popup">
            <h1>Hoàn Thành!</h1>
            <p id="score-text">Bạn đã làm đúng 0/18 câu.</p>
            <p id="motivational-text" style="font-weight: bold; color: var(--secondary); font-size: 1.5rem;"></p>
            <button onclick="location.reload()">Làm Lại</button>
        </div>
    </div>

<script>
    // --- 1. DỮ LIỆU ĐỀ BÀI ---
    const quizData = [
        // PHẦN I: REORDER
        {
            section: "I. Reorder the words to make sentences.",
            question: "1. can/ have/ so that/ In the future/ we/ flying cars/ will/ we/ faster and further/ travel",
            correctAnswer: "In the future, we will have flying cars so that we can travel faster and further.",
            options: [
                "In the future, we will have flying cars so that we can travel faster and further.",
                "In the future, we can have flying cars so that we will travel faster and further.",
                "We will have flying cars in the future so that travel we can faster and further.",
                "So that we can travel faster and further, flying cars we will have in the future."
            ],
            explanation: `
                <div class="exp-step"><b>1. Dịch câu hỏi:</b> Sắp xếp các từ để tạo thành câu hoàn chỉnh.</div>
                <div class="exp-step"><b>2. Phân tích 4 đáp án:</b><br>
                A. In the future, we will have flying cars so that we can travel faster and further. (Trong tương lai, chúng ta sẽ có ô tô bay để chúng ta có thể đi lại nhanh hơn và xa hơn.)<br>
                B. In the future, we can have flying cars so that we will travel... (Trong tương lai, chúng ta CÓ THỂ có ô tô bay để chúng ta SẼ đi lại... - <i>Sai logic ngữ pháp từ khuyết thiếu</i>)<br>
                C. ...so that travel we can... (Sai trật tự từ cơ bản)<br>
                D. So that we can travel..., flying cars we will have... (Đảo ngữ không hợp lý, sai trật tự từ)</div>
                <div class="exp-step"><b>3. Tại sao chọn đáp án đúng:</b> Đáp án đúng tuân thủ cấu trúc chỉ mục đích: Mệnh đề chính (S + will + V) + <b>so that</b> + Mệnh đề chỉ mục đích (S + can/could + V). Trật tự thời gian "In the future" đặt đầu câu hợp lý.</div>
                <div class="exp-step"><b>4. Tại sao các đáp án còn lại sai:</b> B sai vì hoán đổi vị trí của "will" và "can" làm sai lệch ý nghĩa thực tế; C và D sai hoàn toàn về trật tự ngữ pháp trong tiếng Anh.</div>`
        },
        {
            section: "I. Reorder the words to make sentences.",
            question: "2. self-driving cars / be/ Experts/ said/ 2025/ that/ on/ would/ the road/ in",
            correctAnswer: "Experts said that self-driving cars would be on the road in 2025.",
            options: [
                "Experts said that self-driving cars would be on the road in 2025.",
                "Experts said that self-driving cars will be on the road in 2025.",
                "Experts would said that self-driving cars be on the road in 2025.",
                "Self-driving cars said that experts would be on the road in 2025."
            ],
            explanation: `
                <div class="exp-step"><b>1. Dịch câu hỏi:</b> Sắp xếp các từ để tạo thành câu hoàn chỉnh.</div>
                <div class="exp-step"><b>2. Phân tích 4 đáp án:</b><br>
                A. Experts said that self-driving cars would be on the road in 2025. (Các chuyên gia nói rằng xe tự lái sẽ xuất hiện trên đường vào năm 2025.)<br>
                B. ...will be on the road... (Sai vì chưa lùi thì)<br>
                C. Experts would said... (Sai cấu trúc động từ 'would said')<br>
                D. Self-driving cars said that experts... (Xe tự lái nói rằng chuyên gia... - Sai nghĩa hoàn toàn)</div>
                <div class="exp-step"><b>3. Tại sao chọn đáp án đúng:</b> Đây là cấu trúc Câu Tường Thuật (Reported Speech). Động từ tường thuật "said" ở quá khứ, nên mệnh đề sau "that" phải lùi thì từ "will" thành "would".</div>
                <div class="exp-step"><b>4. Tại sao các đáp án còn lại sai:</b> B thiếu lùi thì ("will" thay vì "would"); C sai ngữ pháp cơ bản sau modal verb phải là V nguyên thể (would say chứ không phải would said); D sai logic chủ ngữ thực hiện hành động "nói".</div>`
        },
        {
            section: "I. Reorder the words to make sentences.",
            question: "3. in/ household chores/ handle/ Will/ all/ robots/ the near future?",
            correctAnswer: "Will robots handle all household chores in the near future?",
            options: [
                "Will robots handle all household chores in the near future?",
                "Will handle robots all household chores in the near future?",
                "Will robots household chores handle all in the near future?",
                "Will all household chores handle robots in the near future?"
            ],
            explanation: `
                <div class="exp-step"><b>1. Dịch câu hỏi:</b> Sắp xếp các từ để tạo thành câu nghi vấn hoàn chỉnh.</div>
                <div class="exp-step"><b>2. Phân tích 4 đáp án:</b><br>
                A. Will robots handle all household chores in the near future? (Robot sẽ xử lý tất cả việc nhà trong tương lai gần chứ?)<br>
                B. Will handle robots... (Sai trật tự câu hỏi)<br>
                C. Will robots household chores handle... (Sai vị trí động từ)<br>
                D. Will all household chores handle robots... (Tất cả việc nhà sẽ xử lý robot... - Sai nghĩa chủ động/bị động)</div>
                <div class="exp-step"><b>3. Tại sao chọn đáp án đúng:</b> Đúng cấu trúc câu nghi vấn của thì Tương lai đơn: <b>Will + S + V(nguyên thể) + O + Trạng từ thời gian?</b> (Will + robots + handle + all household chores + in the near future?).</div>
                <div class="exp-step"><b>4. Tại sao các đáp án còn lại sai:</b> B sai trật tự (Will + V thay vì Will + S); C sai vị trí động từ "handle"; D bị ngược vai trò Chủ ngữ - Tân ngữ khiến nghĩa của câu trở nên vô lý (việc nhà xử lý robot).</div>`
        },
        {
            section: "I. Reorder the words to make sentences.",
            question: "4. easy/ nanolearning/ to learn/ The goal/ for people/ of/ to make/ quickly and efficiently/ it/ is",
            correctAnswer: "The goal of nanolearning is to make it easy for people to learn quickly and efficiently.",
            options: [
                "The goal of nanolearning is to make it easy for people to learn quickly and efficiently.",
                "The goal is of nanolearning to make it easy for people to learn quickly and efficiently.",
                "To make it easy for people to learn quickly and efficiently is the goal nanolearning of.",
                "The goal of nanolearning is to make easy it for people to learn quickly and efficiently."
            ],
            explanation: `
                <div class="exp-step"><b>1. Dịch câu hỏi:</b> Sắp xếp các từ để tạo thành câu hoàn chỉnh.</div>
                <div class="exp-step"><b>2. Phân tích 4 đáp án:</b><br>
                A. The goal of nanolearning is to make it easy for people to learn quickly and efficiently. (Mục tiêu của việc học vi mô là làm cho việc học nhanh chóng và hiệu quả trở nên dễ dàng đối với mọi người.)<br>
                B. The goal is of nanolearning... (Sai trật tự cụm danh từ chủ ngữ)<br>
                C. ...is the goal nanolearning of. (Sai trật tự giới từ)<br>
                D. ...to make easy it... (Sai cấu trúc "make it + adj")</div>
                <div class="exp-step"><b>3. Tại sao chọn đáp án đúng:</b> Câu sử dụng đúng cụm chủ ngữ "The goal of nanolearning" và cấu trúc giả định cực hay: <b>make it + adj + for sb + to do sth</b> (làm cho việc gì đó trở nên như thế nào đối với ai đó).</div>
                <div class="exp-step"><b>4. Tại sao các đáp án còn lại sai:</b> B tách rời cụm "The goal of"; C để giới từ "of" lơ lửng cuối câu sai cấu trúc; D sai cấu trúc "make it adj" (đảo lộn thành make easy it).</div>`
        },
        {
            section: "I. Reorder the words to make sentences.",
            question: "5. identification/ biometric technology/ mainly/ attendance/ We/ for/ and checking/ use",
            correctAnswer: "We mainly use biometric technology for identification and checking attendance.",
            options: [
                "We mainly use biometric technology for identification and checking attendance.",
                "We use mainly biometric technology for checking identification and attendance.",
                "For identification and checking attendance we use biometric mainly technology.",
                "We mainly use biometric technology and identification for checking attendance."
            ],
            explanation: `
                <div class="exp-step"><b>1. Dịch câu hỏi:</b> Sắp xếp các từ thành câu hoàn chỉnh.</div>
                <div class="exp-step"><b>2. Phân tích 4 đáp án:</b><br>
                A. We mainly use biometric technology for identification and checking attendance. (Chúng tôi chủ yếu sử dụng công nghệ sinh trắc học để nhận dạng và điểm danh.)<br>
                B. ...use mainly biometric... (Trạng từ 'mainly' đặt chưa chuẩn tự nhiên bằng việc đặt trước động từ chính 'use')<br>
                C. ...biometric mainly technology. (Sai vị trí trạng từ chen giữa tính từ và danh từ)<br>
                D. ...biometric technology and identification for checking attendance. (Sai nghĩa logic: dùng công nghệ VÀ sự nhận dạng để điểm danh)</div>
                <div class="exp-step"><b>3. Tại sao chọn đáp án đúng:</b> Cấu trúc S + adv + V + O + for + V-ing/Noun chỉ mục đích. Trạng từ "mainly" bổ nghĩa cho động từ "use". Sau giới từ "for" là sự nối kết hai danh từ/cụm danh động từ: "identification" (nhận dạng) và "checking attendance" (điểm danh).</div>
                <div class="exp-step"><b>4. Tại sao các đáp án còn lại sai:</b> B sai logic từ vựng (checking identification - không có cụm này ở đề gốc tách rời); C sai vị trí trạng từ "mainly"; D sai cấu trúc song song và ý nghĩa logic.</div>`
        },
        {
            section: "I. Reorder the words to make sentences.",
            question: "6. received/ January 1880/ for/ patent/ Thomas Edison/ light bulb/ his/ a/ in",
            correctAnswer: "Thomas Edison received a patent for his light bulb in January 1880.",
            options: [
                "Thomas Edison received a patent for his light bulb in January 1880.",
                "Thomas Edison received his light bulb for a patent in January 1880.",
                "In January 1880, a patent received Thomas Edison for his light bulb.",
                "Thomas Edison received a patent in January 1880 for his light bulb."
            ],
            explanation: `
                <div class="exp-step"><b>1. Dịch câu hỏi:</b> Sắp xếp từ.</div>
                <div class="exp-step"><b>2. Phân tích 4 đáp án:</b><br>
                A. Thomas Edison received a patent for his light bulb in January 1880. (Thomas Edison đã nhận bằng sáng chế cho bóng đèn của ông vào tháng 1 năm 1880.)<br>
                B. ...received his light bulb for a patent... (Nhận bóng đèn cho bằng sáng chế -> Sai nghĩa)<br>
                C. ...a patent received Thomas Edison... (Bằng sáng chế nhận Thomas Edison -> Sai chủ thể hành động)<br>
                D. ...received a patent in January 1880 for his light bulb. (Sai trật tự trạng từ thời gian, thường đặt cuối câu)</div>
                <div class="exp-step"><b>3. Tại sao chọn đáp án đúng:</b> Cấu trúc câu chuẩn: <b>S (Thomas Edison) + V (received) + O (a patent) + for + Noun (his light bulb) + Trạng từ thời gian (in January 1880)</b>. "Receive a patent for sth": Nhận bằng sáng chế cho cái gì.</div>
                <div class="exp-step"><b>4. Tại sao các đáp án còn lại sai:</b> B sai nghĩa; C đảo lộn chủ ngữ - tân ngữ; D đặt trạng từ thời gian vào giữa câu làm gãy sự liên kết "patent for his light bulb". Đáp án theo đúng đáp án chuẩn của sách.</div>`
        },
        {
            section: "I. Reorder the words to make sentences.",
            question: "7. The director/ scan/ the office/ said/ entering/ that/ before/ all employees/ their finger/ must",
            correctAnswer: "The director said that all employees must scan their finger before entering the office.",
            options: [
                "The director said that all employees must scan their finger before entering the office.",
                "The director said that must all employees scan their finger before entering the office.",
                "All employees said that the director must scan their finger before entering the office.",
                "The director said that all employees scan must their finger before entering the office."
            ],
            explanation: `
                <div class="exp-step"><b>1. Dịch câu hỏi:</b> Sắp xếp thành câu tường thuật.</div>
                <div class="exp-step"><b>2. Phân tích 4 đáp án:</b><br>
                A. The director said that all employees must scan their finger before entering the office. (Giám đốc nói rằng tất cả nhân viên phải quét vân tay trước khi vào văn phòng.)<br>
                B. ...must all employees scan... (Sai trật tự, dạng câu hỏi đảo ngữ)<br>
                C. All employees said that the director... (Nhân viên nói rằng giám đốc phải quét vân tay HỌ -> Vô lý về nghĩa "their finger")<br>

            ctx.fillStyle = p.color;
            ctx.fill();
            p.x += p.dx;
            p.y += p.dy;
            p.dy += 0.2; // Gravity
            if(p.y > canvas.height) {
                particles.splice(i, 1);
                i--;
            }
        }
    }
    animateConfetti();

    // --- 4. LOGIC QUIZ ---
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function renderQuiz() {
        const container = document.getElementById("quiz-container");
        let html = "";
        
        quizData.forEach((item, index) => {
            let shuffledOptions = shuffleArray([...item.options]);
            
            let optionsHtml = shuffledOptions.map(opt => `
                <button class="btn-option" onclick="checkAnswer(this, ${index}, \`${opt.replace(/'/g, "\\'")}\`)">
                    ${opt}
                </button>
            `).join("");

            html += `
                <div class="card" id="q-card-${index}">
                    <div class="section-title">${item.section}</div>
                    <div class="question-text">${item.question}</div>
                    <div class="options-grid" id="options-${index}">
                        ${optionsHtml}
                    </div>
                    <div class="explanation" id="exp-${index}">
                        ${item.explanation}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function checkAnswer(btn, index, selectedStr) {
        initAudio(); // Initialize audio context on first user interaction
        
        const isCorrect = selectedStr === quizData[index].correctAnswer;
        const optionsDiv = document.getElementById(`options-${index}`);
        const expDiv = document.getElementById(`exp-${index}`);
        const card = document.getElementById(`q-card-${index}`);

        // Disable all buttons in this question
        Array.from(optionsDiv.children).forEach(child => {
            child.classList.add("disabled");
            if(child.innerText.trim() === quizData[index].correctAnswer.trim()) {
                child.classList.add("correct"); // Luôn show đáp án đúng
            }
        });

        if(isCorrect) {
            btn.classList.add("correct");
            playDing();
            fireConfetti();
            currentScore++;
        } else {
            btn.classList.add("wrong");
            card.classList.add("shake-anim");
            setTimeout(() => card.classList.remove("shake-anim"), 400);
            playBuzz();
        }

        expDiv.style.display = "block";
        answeredCount++;
    }

    function showScore() {
        document.getElementById('score-overlay').style.display = 'flex';
        document.getElementById('score-text').innerText = `Bạn đã làm đúng ${currentScore} / ${quizData.length} câu.`;
        
        let quote = "";
        let ratio = currentScore / quizData.length;
        if(ratio === 1) quote = "Xuất sắc! Điểm tuyệt đối! 🌟🌟🌟";
        else if(ratio >= 0.8) quote = "Rất Giỏi! Chỉ chút xíu nữa thôi! 🤩";
        else if(ratio >= 0.5) quote = "Làm tốt lắm! Hãy cố gắng hơn nhé! 😊";
        else quote = "Đừng buồn, xem kỹ lại giải thích nha! 💪";
        
        document.getElementById('motivational-text').innerText = quote;
    }

    // Khởi chạy
    renderQuiz();
</script>
