<script>
const _k  = [49, 54, 49, 49]; 
const _pw = _k.map(c => String.fromCharCode(c)).join('');

function checkPassword() {
  const inp = document.getElementById('pwInput');
  const err = document.getElementById('pwErr');
  if (inp.value === _pw) {
    document.getElementById('passwordModal').style.display = 'none';
    const main = document.getElementById('mainContent');
    if(main) main.style.display = 'block';
  } else {
    inp.classList.remove('error'); void inp.offsetWidth; inp.classList.add('error');
    err.style.display = 'block'; setTimeout(() => inp.classList.remove('error'), 500);
  }
}
document.addEventListener('DOMContentLoaded', () => {
  const pwInput = document.getElementById('pwInput');
  if(pwInput) pwInput.addEventListener('keydown', e => { if (e.key==='Enter') checkPassword(); });
});
</script>

<script>
// TÍCH HỢP WEB AUDIO API
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    if(type === 'correct') { 
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
        osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1); 
        gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    } else { 
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }
}

// HIỆU ỨNG CONFETTI
function fireConfetti() {
    const colors = ['#00c6ff', '#0072ff', '#f6d365', '#fda085', '#00f2fe'];
    for (let i = 0; i < 60; i++) {
        const conf = document.createElement('div');
        conf.className = 'confetti';
        conf.style.left = Math.random() * 100 + 'vw';
        conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
        document.body.appendChild(conf);
        setTimeout(() => conf.remove(), 3000);
    }
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

let currentScore = 0;
let answeredCount = 0;
const totalQs = questionsData.length;

function initReading() {
    const rc = document.getElementById('readingContainer');
    let html = '';
    passages.forEach(p => {
        html += `<div class="glass-panel">
            <h2 class="passage-title">${p.title}</h2>`;
        p.paragraphs.forEach((para, idx) => {
            html += `<div class="paragraph-box">
                <div class="eng-text">${para.eng}</div>
                <button class="btn-translate" onclick="toggleTranslate('${p.id}_${idx}')">Mở dịch đoạn này 🌟</button>
                <div class="vie-text" id="trans_${p.id}_${idx}">${para.vie}</div>
            </div>`;
        });
        html += `</div>`;
    });
    
    html += `<div class="glass-panel">
        <h2 class="passage-title">📚 GLOSSARY (TỪ VỰNG B1-C2)</h2>
        <table class="glossary">
            <tr><th>Từ vựng</th><th>Loại từ</th><th>Nghĩa Tiếng Việt</th></tr>`;
    glossary.forEach(g => {
        html += `<tr><td><strong>${g.word}</strong></td><td>${g.pos}</td><td>${g.mean}</td></tr>`;
    });
    html += `</table></div>`;
    
    rc.innerHTML = html;
}

function toggleTranslate(id) {
    const el = document.getElementById('trans_' + id);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function initQuestions() {
    const qc = document.getElementById('questionsContainer');
    let html = '';
    questionsData.forEach((q, idx) => {
        html += `<div class="glass-panel" id="qBox_${idx}">
            <div class="q-number">Question ${q.num}</div>
            <div class="q-text">${q.text}</div>
            <div class="options-grid" id="opts_${idx}">`;
        
        let shuffledOpts = shuffleArray([...q.options]);
        
        // SỬ DỤNG data-attributes THAY VÌ encodeURIComponent ĐỂ FIX LỖI NHÁY ĐƠN
        shuffledOpts.forEach((opt, optIdx) => {
            let isCorr = opt.c ? 'true' : 'false';
            html += `<button class="opt-btn" id="btn_${idx}_${optIdx}" data-correct="${isCorr}" onclick="checkAnswer(${idx}, ${optIdx})">${opt.t}</button>`;
        });
        
        html += `</div><div id="expl_${idx}"></div></div>`;
    });
    qc.innerHTML = html;
}

function checkAnswer(qIdx, optIdx) {
    const optsContainer = document.getElementById(`opts_${qIdx}`);
    const explContainer = document.getElementById(`expl_${qIdx}`);
    const btns = optsContainer.querySelectorAll('.opt-btn');
    
    // Vô hiệu hóa các nút
    btns.forEach(b => b.classList.add('disabled'));
    
    const selectedBtn = document.getElementById(`btn_${qIdx}_${optIdx}`);
    const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
    
    if (isCorrect) {
        selectedBtn.classList.add('correct');
        playSound('correct');
        fireConfetti();
        currentScore++;
    } else {
        selectedBtn.classList.add('wrong');
        selectedBtn.classList.add('shake-anim');
        playSound('wrong');
        
        // Hiện đáp án đúng dựa vào data-correct
        btns.forEach(b => {
            if(b.getAttribute('data-correct') === 'true') {
                b.classList.add('correct');
            }
        });
    }
    
    // Lấy nguyên bản html giải thích từ questionsData gốc
    const realOptData = questionsData[qIdx].options.find(o => o.c === true);
    explContainer.innerHTML = realOptData.html;
    explContainer.querySelector('.explanation').style.display = 'block';
    
    answeredCount++;
}

function showSubmitPopup() {
    if (answeredCount < totalQs) {
        alert(`Con mới làm ${answeredCount}/${totalQs} câu. Hãy làm hết trước khi nộp bài nhé!`);
        return;
    }
    document.getElementById('scoreModal').style.display = 'flex';
}

function processScore() {
    const name = document.getElementById('studentName').value.trim();
    if (!name) { alert("Con quên nhập tên rồi kìa!"); return; }
    
    document.getElementById('nameInputStep').style.display = 'none';
    const finalDiv = document.getElementById('finalResult');
    finalDiv.style.display = 'block';
    
    document.getElementById('resName').innerText = "Học sinh: " + name;
    document.getElementById('resScore').innerText = `Điểm số: ${currentScore} / ${totalQs}`;
    
    const pct = currentScore / totalQs;
    let comment = "";
    let gif = "";
    
    if (pct === 1) {
        comment = "ĐỈNH CỦA CHÓP! Xuất sắc quá con yêu ơi! 💯🏆";
        gif = "https://media.giphy.com/media/l41lZxzroU33typuU/giphy.gif"; 
    } else if (pct >= 0.6) {
        comment = "Rất Tốt! Ms Mai An cực kỳ tự hào về con! 🌟👍";
        gif = "https://media.giphy.com/media/xT0xezQGU5xCDJuCPe/giphy.gif";
    } else {
        comment = "Cố lên con nhé! Đọc kỹ phần giải thích chi tiết của cô là sẽ tiến bộ ngay! 💪❤️";
        gif = "https://media.giphy.com/media/2UIcmK4pn7rYNLRboG/giphy.gif";
    }
    
    document.getElementById('resComment').innerText = comment;
    document.getElementById('resGif').src = gif;
}

initQuestions();
