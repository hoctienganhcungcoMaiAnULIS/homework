<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Teddy Bear English Test - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B5A2B;      /* Nâu caramel gấu bông */
            --secondary: #FFB7B2;    /* Hồng hoa anh đào */
            --accent: #A8E6CF;       /* Xanh lá mầm mùa xuân */
            --correct: #00D26A;      /* Xanh lục bảo (đúng) */
            --wrong: #FF4757;        /* Đỏ (sai) */
            --text-dark: #4A3B32;    /* Nâu sẫm cho chữ */
            --bg-card: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            /* Nền loang màu pastel mùa xuân rực rỡ và chuyển động liên tục */
            background: linear-gradient(-45deg, #A8E6CF, #FFD3B6, #FFAAA5, #FFF3B0, #ff9a9e, #c2e9fb);
            background-size: 600% 600%;
            animation: gradientBG 12s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: var(--text-dark);
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Container cho hiệu ứng gấu bay */
        #flying-elements {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .flying-item {
            position: absolute;
            bottom: -100px;
            animation: flyUpAndSway linear infinite;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            opacity: 0.8;
        }

        @keyframes flyUpAndSway {
            0% { 
                transform: translateY(0) translateX(0) rotate(0deg); 
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { 
                transform: translateY(-120vh) translateX(100px) rotate(360deg); 
                opacity: 0;
            }
        }

        /* Header */
        header {
            z-index: 1;
            text-align: center;
            margin-bottom: 20px;
            background: var(--bg-card);
            padding: 15px 30px;
            border-radius: 25px;
            border: 4px solid var(--primary);
            box-shadow: 0 8px 0 rgba(139, 90, 43, 0.2);
            position: relative;
            margin-top: 20px;
        }

        header::before {
            content: '🐻';
            font-size: 3.5rem;
            position: absolute;
            top: -30px;
            left: -20px;
            transform: rotate(-15deg);
            animation: shake 3s infinite ease-in-out;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--primary);
            font-weight: 900;
        }

        .subtitle {
            font-size: 1rem;
            color: #8c7ae6;
            font-weight: 800;
        }

        .score-bar {
            font-size: 1.2rem;
            font-weight: 900;
            color: #e15f41;
            margin-top: 10px;
            background: #fff3e0;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            border: 2px dashed #e15f41;
        }

        /* Quiz Container */
        #quiz-container {
            width: 100%;
            max-width: 800px;
            z-index: 1;
        }

        .card {
            background: var(--bg-card);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 30px;
            border: 3px solid #f8efd4;
            box-shadow: 0 10px 0 rgba(139, 90, 43, 0.1);
            position: relative;
            transition: transform 0.3s;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.6;
            color: var(--text-dark);
        }

        .question-instruction {
            font-size: 1rem;
            color: #d63031;
            font-weight: 800;
            margin-bottom: 15px;
            text-transform: uppercase;
            display: inline-block;
            background: #ffeaa7;
            padding: 5px 15px;
            border-radius: 12px;
            border: 2px solid #fdcb6e;
        }

        u {
            text-decoration: none;
            border-bottom: 3px dashed var(--primary);
            padding-bottom: 2px;
            font-weight: 900;
            color: var(--primary);
        }

        /* Buttons */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            background: #fff;
            border: 3px solid #eccc68;
            border-radius: 20px;
            padding: 15px 20px;
            font-size: 1.08rem;
            font-weight: 800;
            color: var(--text-dark);
            cursor: pointer;
            box-shadow: 0 6px 0 #eccc68;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 0 #eccc68;
            background: #fffdf7;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 transparent;
        }

        .btn.correct {
            background: var(--correct) !important;
            border-color: #00b894 !important;
            color: white !important;
            box-shadow: 0 6px 0 #00b894 !important;
        }

        .btn.wrong {
            background: var(--wrong) !important;
            border-color: #c0392b !important;
            color: white !important;
            box-shadow: 0 6px 0 #c0392b !important;
        }

        .btn-label {
            background: #ffeaa7;
            color: var(--primary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: 900;
            border: 2px solid #fdcb6e;
            flex-shrink: 0;
        }

        .btn.correct .btn-label, .btn.wrong .btn-label {
            background: rgba(255,255,255,0.3);
            border-color: transparent;
            color: white;
        }

        /* Gap Fill styles */
        .gap-blank {
            display: inline-block;
            min-width: 120px;
            height: 35px;
            border-bottom: 4px dashed var(--primary);
            cursor: pointer;
            background: rgba(139, 90, 43, 0.1);
            border-radius: 8px;
            padding: 0 15px;
            text-align: center;
            font-weight: 900;
            color: var(--primary);
            transition: all 0.3s;
            vertical-align: bottom;
            position: relative;
        }

        .gap-blank:hover {
            background: rgba(139, 90, 43, 0.2);
            transform: scale(1.05);
        }

        .gap-blank.filled.correct {
            background: var(--correct);
            color: white;
            border-bottom: none;
            box-shadow: 0 4px 0 #00b894;
        }

        .gap-blank.filled.wrong {
            background: var(--wrong);
            color: white;
            border-bottom: none;
            box-shadow: 0 4px 0 #c0392b;
        }

        /* Popup Modal for Gap Fill */
        #gap-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(74, 59, 50, 0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 500px;
            border: 5px solid var(--secondary);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        
        .modal-content::before {
            content: '🌸';
            font-size: 2.5rem;
            position: absolute;
            top: -20px;
            right: -10px;
            animation: shake 2s infinite ease-in-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 900;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .modal-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Explanations */
        .explanation {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #fffdf7;
            border-left: 6px solid var(--primary);
            border-radius: 15px;
            font-size: 1rem;
            line-height: 1.6;
            animation: slideDown 0.4s ease;
            box-shadow: inset 0 0 10px rgba(139, 90, 43, 0.05);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exp-title {
            color: var(--primary);
            font-weight: 900;
            margin-bottom: 10px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .exp-step {
            margin-bottom: 10px;
            color: var(--text-dark);
        }
        
        .exp-step strong {
            color: #d35400;
        }

        /* Animations */
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0) rotate(-1deg); }
            20%, 80% { transform: translate3d(4px, 0, 0) rotate(1deg); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0) rotate(-2deg); }
            40%, 60% { transform: translate3d(6px, 0, 0) rotate(2deg); }
        }

        /* Submit Button */
        .submit-btn {
            background: var(--primary);
            color: #fff;
            font-size: 1.5rem;
            font-weight: 900;
            border: 4px solid #6b4321;
            padding: 20px 50px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 0 #6b4321;
            transition: all 0.2s;
            margin: 30px auto;
            display: block;
            text-transform: uppercase;
            z-index: 1;
        }

        .submit-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 13px 0 #6b4321;
            background: #a06b35;
        }

        .submit-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0px 0 #6b4321;
        }

        /* Canvas Confetti */
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* Responsive */
        @media(max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>
    <div id="flying-elements"></div>

    <header>
        <div class="subtitle">Giáo viên tạo: Ms Mai An ULIS</div>
        <h1>🌸 SPRING TEDDY BEAR TEST 🐻</h1>
        <div class="score-bar">Điểm của bạn: <span id="score">0</span> / 30 🍯</div>
    </header>

    <div id="quiz-container"></div>

    <button class="submit-btn" onclick="finishQuiz()">Nộp bài nhận mật ong 🍯</button>

    <div id="gap-modal">
        <div class="modal-content">
            <div class="modal-title">Teddy nhờ bạn chọn cụm từ đúng nhất nhé! 🐾</div>
            <div class="modal-options" id="modal-options-container">
                </div>
        </div>
    </div>

<script>
    // --- HIỆU ỨNG GẤU BÔNG VÀ HOA BAY LƯỢN (FLYING ELEMENTS) ---
    function createFlyingElements() {
        const container = document.getElementById('flying-elements');
        const elements = ['🐻', '🌸', '🌼', '🍯', '🧸'];
        const numElements = 25; // Số lượng vật thể lơ lửng

        for (let i = 0; i < numElements; i++) {
            let el = document.createElement('div');
            el.classList.add('flying-item');
            el.innerText = elements[Math.floor(Math.random() * elements.length)];
            
            // Randomize properties
            const leftPos = Math.random() * 100; // 0 to 100 vw
            const size = Math.random() * 2 + 1.5; // 1.5rem to 3.5rem
            const duration = Math.random() * 20 + 15; // 15s to 35s
            const delay = Math.random() * 20; // 0s to 20s
            
            el.style.left = `${leftPos}vw`;
            el.style.fontSize = `${size}rem`;
            el.style.animationDuration = `${duration}s`;
            el.style.animationDelay = `-${delay}s`; // Âm delay để có sẵn trên màn hình lúc mới load

            container.appendChild(el);
        }
    }
    createFlyingElements();

    // --- AUDIO CONTEXT (GAMIFICATION) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'correct') {
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
            fireConfetti();
        } else {
            // Âm thanh "Téo tèo tèo" báo sai
            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.4);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.4);
        }
    }

    // --- CONFETTI LOGIC (Tone màu mùa xuân) ---
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];

    const springColors = ['#FFB7B2', '#FFFFFF', '#FFE5A4', '#A8E6CF', '#FFDAC1'];

    function fireConfetti() {
        for(let i=0; i<60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: -10,
                r: Math.random() * 6 + 3,
                dx: Math.random() * 5 - 2.5,
                dy: Math.random() * 5 + 3,
                color: springColors[Math.floor(Math.random() * springColors.length)]
            });
        }
    }

    function animateConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for(let i=0; i<particles.length; i++) {
            let p = particles[i];
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            p.x += p.dx;
            p.y += p.dy;
            if(p.y > canvas.height) {
                particles.splice(i, 1);
                i--;
            }
        }
        requestAnimationFrame(animateConfetti);
    }
    animateConfetti();

    // --- QUIZ DATA ---
    const quizData = [
        // PART 8: ERROR IDENTIFICATION
        {
            id: 1, type: "error", instruction: "Find and correct the mistakes in these sentences.",
            question: "1. <u>Of</u> the four <u>skirts</u>, I <u>like</u> <u>so far</u> the blue one best.",
            options: [{text: "Of", correct: false}, {text: "skirts", correct: false}, {text: "like", correct: false}, {text: "so far", correct: true}],
            explanation: `
                <div class="exp-title">💡 Gấu Teddy giải thích:</div>
                <div class="exp-step"><strong>1. Dịch câu:</strong> "Trong số 4 chiếc váy, tôi thích chiếc màu xanh nhất hơn hẳn."</div>
                <div class="exp-step"><strong>2. Phân tích đáp án:</strong> A. Of (giới từ: trong số); B. skirts (danh từ số nhiều: những chiếc váy); C. like (động từ: thích); D. so far (trạng từ: cho đến nay).</div>
                <div class="exp-step"><strong>3. Tại sao chọn D?</strong> Cụm "so far" thường dùng ở thì Hiện tại hoàn thành. Để nhấn mạnh so sánh nhất ("best"), ta dùng cụm "by far" (hơn hẳn). Sửa: so far -> by far.</div>
                <div class="exp-step"><strong>4. Tại sao sai:</strong> A đúng cấu trúc "Of + the + số lượng + N số nhiều". B đúng vì "four" là số nhiều. C đúng thì hiện tại đơn chủ ngữ "I".</div>`
        },
        {
            id: 2, type: "error", instruction: "Find and correct the mistakes in these sentences.",
            question: "2. This <u>is</u> <u>sweeter</u> candy I have <u>eaten</u> for <u>a</u> long time.",
            options: [{text: "is", correct: false}, {text: "sweeter", correct: true}, {text: "eaten", correct: false}, {text: "a", correct: false}],
            explanation: `
                <div class="exp-title">💡 Gấu Teddy giải thích:</div>
                <div class="exp-step"><strong>1. Dịch câu:</strong> "Đây là viên kẹo ngọt nhất mà tôi từng ăn trong một thời gian dài."</div>
                <div class="exp-step"><strong>2. Phân tích:</strong> A. is (động từ tobe); B. sweeter (tính từ so sánh hơn); C. eaten (động từ V3/ed); D. a (mạo từ).</div>
                <div class="exp-step"><strong>3. Tại sao chọn B?</strong> Dấu hiệu "I have eaten" chỉ trải nghiệm từ trước đến nay, yêu cầu dùng dạng So sánh nhất. Sửa: sweeter -> the sweetest.</div>
                <div class="exp-step"><strong>4. Tại sao sai:</strong> A chia đúng theo chủ ngữ "This". C dùng đúng trong cấu trúc Hiện tại hoàn thành (have + V3). D đi theo cụm cố định "for a long time".</div>`
        },
        {
            id: 3, type: "error", instruction: "Find and correct the mistakes in these sentences.",
            question: "3. <u>The</u> Mekong is <u>one</u> of the <u>longer</u> rivers <u>in the</u> world.",
            options: [{text: "The", correct: false}, {text: "one", correct: false}, {text: "longer", correct: true}, {text: "in the", correct: false}],
            explanation: `
                <div class="exp-title">💡 Gấu Teddy giải thích:</div>
                <div class="exp-step"><strong>1. Dịch câu:</strong> "Mekong là một trong những con sông dài nhất thế giới."</div>
                <div class="exp-step"><strong>2. Phân tích:</strong> A. The (mạo từ xác định); B. one (đại từ: một); C. longer (so sánh hơn); D. in the (giới từ + mạo từ).</div>
                <div class="exp-step"><strong>3. Tại sao chọn C?</strong> Cấu trúc "one of the + Tính từ so sánh nhất + Danh từ số nhiều" mang nghĩa "một trong những... nhất". Sửa: longer -> longest.</div>
                <div class="exp-step"><strong>4. Tại sao sai:</strong> A đúng vì tên sông/biển phải có "The". B đúng cấu trúc "one of". D đúng giới từ chỉ nơi chốn "in the world".</div>`
        },
        {
            id: 4, type: "error", instruction: "Find and correct the mistakes in these sentences.",
            question: "4. They <u>asked</u> a lot of questions, <u>checked</u> their figures, and <u>came up</u> with <u>best</u> solution.",
            options: [{text: "asked", correct: false}, {text: "checked", correct: false}, {text: "came up", correct: false}, {text: "best", correct: true}],
            explanation: `
                <div class="exp-title">💡 Gấu Teddy giải thích:</div>
                <div class="exp-step"><strong>1. Dịch câu:</strong> "Họ đã hỏi rất nhiều câu hỏi, kiểm tra các con số và đưa ra giải pháp tốt nhất."</div>
                <div class="exp-step"><strong>2. Phân tích:</strong> A. asked (đã hỏi); B. checked (đã kiểm tra); C. came up (đã đưa ra/nghĩ ra); D. best (tốt nhất).</div>
                <div class="exp-step"><strong>3. Tại sao chọn D?</strong> Tính từ so sánh nhất luôn luôn đi kèm với mạo từ xác định "the" ở phía trước. Sửa: best -> the best.</div>
                <div class="exp-step"><strong>4. Tại sao sai:</strong> A, B, C đều đúng và tuân thủ cấu trúc song song của các động từ chia ở thì Quá khứ đơn (V-ed/V2) được nối bởi từ "and".</div>`
        },
        {
            id: 5, type: "error", instruction: "Find and correct the mistakes in these sentences.",
            question: "5. My <u>grandmother's</u> recipe <u>requires</u> for <u>more much</u> salt than <u>mine</u> does.",
            options: [{text: "grandmother's", correct: false}, {text: "requires", correct: false}, {text: "more much", correct: true}, {text: "mine", correct: false}],
            explanation: `
                <div class="exp-title">💡 Gấu Teddy giải thích:</div>
                <div class="exp-step"><strong>1. Dịch câu:</strong> "Công thức nấu ăn của bà tôi cần nhiều muối hơn hẳn so với công thức của tôi."</div>
                <div class="exp-step"><strong>2. Phân tích:</strong> A. grandmother's (Sở hữu cách); B. requires (động từ: yêu cầu/cần); C. more much (cụm từ sai trật tự); D. mine (đại từ sở hữu: của tôi).</div>

    let currentScore = 0;
    const answeredQuestions = new Set();
    let currentActiveGapId = null;

    // Shuffle options helper
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        let html = '';

        quizData.forEach((q, index) => {
            const shuffledOptions = shuffleArray([...q.options]);
            
            html += `
                <div class="card" id="card-${q.id}">
                    <div class="question-instruction">${q.instruction}</div>
                    <div class="question-text">${q.question}</div>
            `;

            if (q.type === 'error') {
                html += `<div class="options-grid">`;
                shuffledOptions.forEach((opt, idx) => {
                    const letter = String.fromCharCode(65 + idx);
                    // Đánh dấu data-correct="true" để sau này biết nút nào là đúng
                    const isCorrectAttr = opt.correct ? `data-correct="true"` : ``;
                    
                    html += `
                        <button class="btn" id="btn-${q.id}-${idx}" ${isCorrectAttr} onclick="handleOptionClick(${q.id}, ${idx}, ${opt.correct}, '${q.type}')">
                            <span class="btn-label">${letter}</span> ${opt.text}
                        </button>
                    `;
                });
                html += `</div>`;
            }

            html += `
                    <div class="explanation" id="exp-${q.id}">
                        ${q.explanation}
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;

        // Add event listeners for gap fills
        document.querySelectorAll('.gap-blank').forEach(gap => {
            gap.addEventListener('click', function() {
                if (answeredQuestions.has(parseInt(this.dataset.id))) return;
                openGapModal(parseInt(this.dataset.id));
            });
        });
    }

    function handleOptionClick(qId, btnIdx, isCorrect, type) {
        if (answeredQuestions.has(qId)) return;
        answeredQuestions.add(qId);

        const card = document.getElementById(`card-${qId}`);
        const exp = document.getElementById(`exp-${qId}`);

        if (type === 'error') {
            const btn = document.getElementById(`btn-${qId}-${btnIdx}`);
            if (isCorrect) {
                btn.classList.add('correct');
                playSound('correct');
                currentScore++;
                updateScore();
            } else {
                btn.classList.add('wrong');
                card.classList.add('shake');
                playSound('wrong');
                
                // --- MỚI: TỰ ĐỘNG HIGHLIGHT ĐÁP ÁN ĐÚNG ---
                const correctBtn = card.querySelector('button[data-correct="true"]');
                if (correctBtn) {
                    // Delay xíu để học sinh thấy lỗi rồi mới bật xanh
                    setTimeout(() => {
                        correctBtn.classList.add('correct');
                    }, 100);
                }
            }
        }

        // Hiện phần giải thích siêu chi tiết
        exp.style.display = 'block';
    }

    // Modal logic for Gap Fill
    function openGapModal(qId) {
        currentActiveGapId = qId;
        const qData = quizData.find(q => q.id === qId);
        const modal = document.getElementById('gap-modal');
        const optionsContainer = document.getElementById('modal-options-container');
        
        const shuffledOptions = shuffleArray([...qData.options]);
        let html = '';
        shuffledOptions.forEach((opt, idx) => {
            const letter = String.fromCharCode(65 + idx);
            html += `
                <button class="btn" style="width: 100%; justify-content: flex-start" onclick="handleGapSelect(${qId}, '${opt.text.replace(/'/g, "\\'")}', ${opt.correct})">
                    <span class="btn-label">${letter}</span> ${opt.text}
                </button>
            `;
        });
        optionsContainer.innerHTML = html;
        modal.style.display = 'flex';
    }

    function handleGapSelect(qId, selectedText, isCorrect) {
        document.getElementById('gap-modal').style.display = 'none';
        
        if (answeredQuestions.has(qId)) return;
        answeredQuestions.add(qId);

        const gapElement = document.querySelector(`.gap-blank[data-id="${qId}"]`);
        const card = document.getElementById(`card-${qId}`);
        const exp = document.getElementById(`exp-${qId}`);

        if (isCorrect) {
            gapElement.innerText = selectedText;
            gapElement.classList.add('filled', 'correct');
            playSound('correct');
            currentScore++;
            updateScore();
        } else {
            // --- MỚI: ĐIỀN ĐÁP ÁN ĐÚNG VÀO NẾU HỌC SINH CHỌN SAI ---
            const qData = quizData.find(q => q.id === qId);
            const correctText = qData.options.find(o => o.correct).text;
            
            gapElement.innerText = correctText; 
            gapElement.classList.add('filled', 'wrong'); // Vẫn báo đỏ vì làm sai
            card.classList.add('shake');
            playSound('wrong');
            
            // Đổi màu thành đỏ một lúc rồi chuyển qua viền xanh báo đáp án đúng
            setTimeout(() => {
                gapElement.style.background = '#00b894';
                gapElement.style.boxShadow = '0 4px 0 #00997a';
            }, 800);
        }

        exp.style.display = 'block';
    }

    function updateScore() {
        document.getElementById('score').innerText = currentScore;
    }

    function finishQuiz() {
        if (currentScore >= 25) {
            alert(`Giỏi quá ta ơi! Đạt ${currentScore}/30 điểm. Teddy tặng bạn hũ mật ong siêu bự nhé! 🍯🐻`);
            fireConfetti(); fireConfetti();
        } else if (currentScore >= 15) {
            alert(`Làm tốt lắm! Bạn đạt ${currentScore}/30 điểm. Cố gắng thêm xíu nữa để đạt điểm tối đa nha! 🌸`);
            fireConfetti();
        } else {
            alert(`Bạn đạt ${currentScore}/30 điểm. Đọc kỹ lại lời giải thích của Teddy để rút kinh nghiệm nhé! 💪`);
        }
    }

    // Initialize
    window.onload = renderQuiz;

    // Close modal if clicking outside
    window.onclick = function(event) {
        const modal = document.getElementById('gap-modal');
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>
</body>
</html>
