<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 10: Grammar & Vocabulary - Galaxy Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #b388ff;
            --secondary: #00e5ff;
            --tertiary: #ff4081;
            --correct: #00e676;
            --incorrect: #ff5252;
            --text-light: #ffffff;
            --glass-bg: rgba(15, 15, 30, 0.6);
            --glass-border: rgba(0, 229, 255, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
        }

        @keyframes galaxyBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            /* Nền Vũ trụ tĩnh lặng, bí ẩn */
            background: linear-gradient(-45deg, #0b0c10, #1a0b2e, #0b162c, #2a0845);
            background-size: 400% 400%;
            animation: galaxyBg 20s ease infinite;
            color: var(--text-light);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Họa tiết Vũ trụ lơ lửng */
        .bg-patterns {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .pattern-item {
            position: absolute;
            font-size: 2rem;
            opacity: 0.4;
            animation: floatUp linear infinite;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Giao diện Glassmorphism Kính mờ - Dark Mode */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px;
            border-bottom: 3px solid var(--secondary);
        }

        .teacher-info {
            font-size: 1.1rem;
            color: var(--secondary);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        h1 {
            font-size: 2.2rem;
            color: var(--text-light);
            margin: 15px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .section-title {
            background: rgba(179, 136, 255, 0.2);
            backdrop-filter: blur(10px);
            color: var(--primary);
            padding: 15px 25px;
            border-radius: 15px;
            margin: 30px 0 20px 0;
            font-size: 1.4rem;
            font-weight: 900;
            border: 1px solid var(--primary);
            box-shadow: 0 0 15px rgba(179, 136, 255, 0.3);
            display: inline-block;
        }

        .question-card {
            padding: 25px;
            margin-bottom: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .question-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.15);
            border-color: rgba(0, 229, 255, 0.6);
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .question-text u {
            text-decoration-color: var(--tertiary);
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
        }

        /* Input Controls */
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
        }

        .input-box {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--primary);
            color: var(--secondary);
            font-size: 1.2rem;
            padding: 12px 15px;
            border-radius: 12px;
            outline: none;
            font-weight: 900;
            text-align: center;
            width: 150px;
            transition: all 0.3s;
        }

        .input-box::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 500;
        }

        .input-box:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
            background: rgba(0, 0, 0, 0.6);
        }

        .input-label {
            font-weight: 700;
            color: var(--text-light);
            font-size: 1.1rem;
        }

        .btn-check {
            background: transparent;
            border: 2px solid var(--secondary);
            color: var(--secondary);
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-check:hover {
            background: var(--secondary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
        }

        .btn-check:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Trạng thái đúng/sai cho ô input */
        .input-correct {
            border-color: var(--correct) !important;
            color: var(--correct) !important;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.4) !important;
            pointer-events: none;
        }

        .input-incorrect {
            border-color: var(--incorrect) !important;
            color: var(--incorrect) !important;
            animation: shake 0.4s;
            box-shadow: 0 0 15px rgba(255, 82, 82, 0.4) !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        /* Khung giải thích */
        .explanation {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-left: 5px solid var(--secondary);
            border-radius: 10px;
            font-size: 1.1rem;
            line-height: 1.6;
            animation: fadeIn 0.5s;
        }
        
        /* Box dịch câu siêu xịn */
        .translation-box {
            background: rgba(0, 229, 255, 0.1);
            border: 1px dashed var(--secondary);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 1.15rem;
            color: #e0f7fa;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CSS MÀU SẮC GIẢI THÍCH CHO DARK MODE */
        .p-word { color: #00e5ff; font-weight: 900; } /* Cyan */
        .p-phonetic { background: rgba(179, 136, 255, 0.3); color: #b388ff; padding: 2px 8px; border-radius: 8px; font-family: monospace; border: 1px solid #b388ff;}
        .p-mean { color: #ffb74d; font-style: italic; font-weight: 700;} /* Orange */
        .p-grammar { color: #ff4081; text-decoration: underline; font-weight: bold; } /* Pink */
        .hl-green { color: #69f0ae; font-weight: 900; font-size: 1.15rem; text-shadow: 0 0 5px rgba(105, 240, 174, 0.3);}
        .hl-red { color: #ff5252; font-weight: 900; text-decoration: line-through;}

        .submit-area {
            text-align: center;
            margin: 50px 0;
        }

        .btn-submit {
            background: linear-gradient(45deg, #b388ff, #00e5ff);
            border: none;
            color: #000;
            font-size: 1.5rem;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 900;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            text-transform: uppercase;
        }

        .btn-submit:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(179, 136, 255, 0.8);
        }

        /* Modal Popup Glassmorphism */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            border-color: var(--primary);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-content input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--secondary);
            border-radius: 15px;
            font-size: 1.2rem;
            color: white;
            outline: none;
            text-align: center;
        }

        .error-text {
            color: #ff5252;
            font-weight: 900;
            display: none;
            margin-bottom: 15px;
        }

        .gif-container img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid var(--secondary);
        }
    </style>
</head>
<body>

    <div class="bg-patterns" id="bgPatterns"></div>

    <div class="container">
        <header class="glass-panel">
            <div class="teacher-info">🚀 Giáo viên tạo: Ms Mai An ULIS 🛸</div>
            <h1>UNIT 10: GALAXY TEST</h1>
            <div id="scoreDisplay" style="font-size: 1.4rem; font-weight: 900; color: var(--secondary); margin-top: 10px;">
                Điểm năng lượng: <span id="currentScore">0</span> / 30
            </div>
        </header>

        <div id="quizContainer">
            </div>

        <div class="submit-area">
            <button class="btn-submit" onclick="showNamePrompt()">🚀 PHÓNG TÀU & XEM KẾT QUẢ</button>
        </div>
    </div>

    <div class="modal-overlay" id="nameModal">
        <div class="modal-content glass-panel">
            <h2 style="color: var(--secondary); font-size: 1.8rem;">Định danh Phi hành gia 👨‍🚀</h2>
            <input type="text" id="studentName" placeholder="Nhập tên của bạn..." onkeypress="handleEnter(event)">
            <p class="error-text" id="nameError">⚠️ Vui lòng nhập tên để nhận bằng khen vũ trụ!</p>
            <button class="btn-submit" style="font-size: 1.2rem; padding: 10px 30px;" onclick="submitQuiz()">Xác Nhận!</button>
        </div>
    </div>

    <div class="modal-overlay" id="resultModal">
        <div class="modal-content glass-panel">
            <h2 id="resultTitle" style="color: var(--primary); font-size: 2rem; margin-bottom: 10px; text-shadow: 0 0 10px var(--primary);"></h2>
            <p id="resultScore" style="font-size: 1.5rem; font-weight: 900; color: var(--secondary); background: rgba(0,0,0,0.5); display: inline-block; padding: 10px 20px; border-radius: 15px; border: 1px solid var(--secondary);"></p>
            <div class="gif-container">
                <img id="resultGif" src="" alt="Result Meme">
            </div>
            <button class="btn-submit" style="font-size: 1.2rem; padding: 10px 30px; margin-top: 25px;" onclick="location.reload()">Làm lại nhiệm vụ 🔄</button>
        </div>
    </div>

    <script>
        // --- Âm thanh ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
                osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1); // A6
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'incorrect') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // --- Họa tiết nền Vũ trụ ---
        const patterns = ['⭐', '🪐', '🚀', '☄️', '🛸', '🛰️', '✨', '🌌'];
        const bgContainer = document.getElementById('bgPatterns');
        for(let i = 0; i < 30; i++) {
            let el = document.createElement('div');
            el.className = 'pattern-item';
            el.innerText = patterns[Math.floor(Math.random() * patterns.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (Math.random() * 15 + 15) + 's';
            el.style.animationDelay = (Math.random() * 5) + 's';
            el.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
            bgContainer.appendChild(el);
        }

        // --- DATA BÀI TẬP ---
        const quizData = [
            {
                type: "error_correction",
                section: "V. Find and correct the mistake (Tìm từ gạch chân bị sai và sửa lại)",
                questions: [
                    {
                        qText: "1. A friend of <u>my</u> is very good <u>at</u> making <u>three-dimensional</u> <u>images</u>.",
                        wrongWord: "my", correctWord: "mine",
                        explanation: `
                        <div class="translation-box"><b>🌍 Dịch toàn câu:</b> <i>Một người bạn của tôi rất giỏi tạo ra các hình ảnh không gian ba chiều.</i></div>
                        <p><b>Phân tích:</b> Lỗi sai nằm ở chữ <span class='hl-red'>my</span>.</p>
                        <p><span class='p-grammar'>Ngữ pháp Sở hữu cách kép (Double Possessive):</span> Cấu trúc đúng là <b>A/An + Noun + of + Đại từ sở hữu</b>. Ta phải dùng đại từ sở hữu <span class='hl-green'>mine</span> thay vì tính từ sở hữu "my" (vì tính từ sở hữu bắt buộc phải có danh từ theo sau).</p>
                        `
                    },
                    {
                        qText: "2. <u>The</u> computer room, <u>where</u> you take your online test, <u>is</u> in <u>the end</u> of this hall.",
                        wrongWord: "the end", correctWord: "at the end",
                        explanation: `
                        <div class="translation-box"><b>🌍 Dịch toàn câu:</b> <i>Phòng máy tính, nơi bạn làm bài kiểm tra trực tuyến, nằm ở cuối hành lang này.</i></div>
                        <p><b>Phân tích:</b> Lỗi sai nằm ở <span class='hl-red'>the end</span>.</p>
                        <p><span class='p-grammar'>Giới từ chỉ vị trí:</span> Cụm từ cố định để chỉ vị trí "ở cuối của cái gì đó" là <span class='hl-green'>at the end of</span> + Noun. ("In the end" mang nghĩa là "cuối cùng thì/rốt cuộc", không đi với "of").</p>
                        `
                    },
                    {
                        qText: "3. <u>Electronic mail</u> is the popular method <u>of communication</u> these days because it's fast, <u>efficient</u>, and <u>expensive</u>.",
                        wrongWord: "expensive", correctWord: "inexpensive",
                        explanation: `
                        <div class="translation-box"><b>🌍 Dịch toàn câu:</b> <i>Thư điện tử là phương thức giao tiếp phổ biến ngày nay vì nó nhanh chóng, hiệu quả và không hề đắt đỏ.</i></div>
                        <p><b>Phân tích:</b> Lỗi sai nằm ở <span class='hl-red'>expensive</span>.</p>
                        <p><b>Giải thích:</b> Các tính từ liệt kê trước đó là "fast" (nhanh), "efficient" (hiệu quả) đều mang nghĩa tích cực. Do đó tính từ cuối cùng cũng phải tích cực. Thư điện tử (Email) nổi tiếng vì sự tiện lợi và rẻ/miễn phí, nên phải sửa thành <span class='hl-green'>inexpensive</span> (không đắt) hoặc <span class='hl-green'>cheap</span>.</p>
                        `
                    },
                    {
                        qText: "4. <u>Two</u> of <u>theirs</u> employees <u>are</u> presenting new functions of Facebook at the moment.",
                        wrongWord: "theirs", correctWord: "their",
                        explanation: `
                        <div class="translation-box"><b>🌍 Dịch toàn câu:</b> <i>Hai trong số các nhân viên của họ đang thuyết trình về các chức năng mới của Facebook vào lúc này.</i></div>
                        <p><b>Phân tích:</b> Lỗi sai nằm ở <span class='hl-red'>theirs</span>.</p>
                        <p><span class='p-grammar'>Tính từ sở hữu:</span> Đứng trước danh từ "employees" (nhân viên), ta cần một Tính từ sở hữu là <span class='hl-green'>their</span> (của họ). Từ "theirs" có chữ 's' là Đại từ sở hữu, nó đứng một mình và KHÔNG bao giờ có danh từ theo sau.</p>
                        `
                    },
                    {
                        qText: "5. He decided <u>to not apply</u> for that job <u>because</u> he <u>didn't meet</u> all the <u>qualifications</u>.",
                        wrongWord: "to not apply", correctWord: "not to apply",
                        explanation: `
                        <div class="translation-box"><b>🌍 Dịch toàn câu:</b> <i>Anh ấy đã quyết định không nộp đơn cho công việc đó vì anh ấy không đáp ứng đủ tất cả các yêu cầu bằng cấp.</i></div>
                        <p><b>Phân tích:</b> Lỗi sai nằm ở <span class='hl-red'>to not apply</span>.</p>
                        <p><span class='p-grammar'>Cấu trúc động từ nguyên thể:</span> Cấu trúc phủ định của động từ theo sau "decide" là <b>decide + NOT + TO V</b> (quyết định không làm gì). Do đó phải sửa thành <span class='hl-green'>not to apply</span>.</p>
                        `
                    },
                    {
                        qText: "6. <u>While</u> overseas, I <u>use</u> iMessage and FaceTime to <u>keep on</u> touch <u>with</u> family and friends.",
                        wrongWord: "keep on", correctWord: "keep in",
                        explanation: `
                        <div class="translation-box"><b>🌍 Dịch toàn câu:</b> <i>Trong khi ở nước ngoài, tôi sử dụng iMessage và FaceTime để giữ liên lạc với gia đình và bạn bè.</i></div>
                        <p><b>Phân tích:</b> Lỗi sai nằm ở <span class='hl-red'>keep on</span>.</p>
                        <p><span class='p-grammar'>Collocation (Cụm từ cố định):</span> Cụm từ "giữ liên lạc với ai đó" trong tiếng Anh là <span class='hl-green'>keep in touch with sb</span>. Không dùng giới từ "on" trong cụm này.</p>
                        `
                    },
                    {
                        qText: "7. <u>Most teenagers</u> say they'd rather <u>to talk</u> to their friends online <u>than see</u> them <u>in person</u>.",
                        wrongWord: "to talk", correctWord: "talk",
                        explanation: `
                        <div class="translation-box"><b>🌍 Dịch toàn câu:</b> <i>Hầu hết thanh thiếu niên nói rằng họ thà nói chuyện với bạn bè trực tuyến còn hơn là gặp mặt họ trực tiếp.</i></div>
                        <p><b>Phân tích:</b> Lỗi sai nằm ở <span class='hl-red'>to talk</span>.</p>
                        <p><span class='p-grammar'>Cấu trúc Would rather:</span> Điểm ngữ pháp bắt buộc là <b>S + would rather + V(nguyên thể không to) + than + V(nguyên thể không to)</b> (Thích làm gì hơn làm gì). Sửa "to talk" thành <span class='hl-green'>talk</span>.</p>
                        `
                    },
                    {
                        qText: "8. <u>Because</u> social media networks, we <u>are now able</u> to <u>interact with</u> thousands of people <u>all over</u> the world.",
                        wrongWord: "Because", correctWord: "Because of",
                        explanation: `
                        <div class="translation-box"><b>🌍 Dịch toàn câu:</b> <i>Nhờ có các mạng xã hội, chúng ta hiện có thể tương tác với hàng ngàn người trên khắp thế giới.</i></div>
                        <p><b>Phân tích:</b> Lỗi sai nằm ở chữ <span class='hl-red'>Because</span>.</p>
                        <p><span class='p-grammar'>Ngữ pháp Mệnh đề chỉ nguyên nhân:</span> Sau "Because" phải là một mệnh đề hoàn chỉnh (S + V). Ở đây "social media networks" (các mạng xã hội) chỉ là một Cụm danh từ. Đứng trước Cụm danh từ, ta phải dùng giới từ <span class='hl-green'>Because of</span>.</p>
                        `
                    },

        // --- Logic App ---
        const quizContainer = document.getElementById('quizContainer');
        const currentScoreEl = document.getElementById('currentScore');
        let score = 0;
        const totalQuestions = 30; // 10 + 10 + 10
        let qCount = 0;

        function normalizeString(str) {
            // Chuẩn hóa chuỗi: xóa khoảng trắng dư, chuyển chữ thường (hỗ trợ nhập cả 'cheap' và 'inexpensive')
            return str.trim().toLowerCase().replace(/\s+/g, ' ');
        }

        function renderQuiz() {
            quizData.forEach((sectionBlock) => {
                const sectionTitle = document.createElement('div');
                sectionTitle.className = 'section-title glass-panel';
                sectionTitle.innerHTML = sectionBlock.section;
                quizContainer.appendChild(sectionTitle);

                sectionBlock.questions.forEach((q) => {
                    qCount++;
                    const card = document.createElement('div');
                    card.className = 'question-card glass-panel';
                    
                    const qText = document.createElement('div');
                    qText.className = 'question-text';

                    // Khung giải thích
                    const explanationBox = document.createElement('div');
                    explanationBox.className = 'explanation';
                    explanationBox.innerHTML = q.explanation;

                    if (sectionBlock.type === "error_correction") {
                        // Render dạng tìm lỗi sai & sửa
                        qText.innerHTML = q.qText;
                        card.appendChild(qText);

                        const inputGroup = document.createElement('div');
                        inputGroup.className = 'input-group';
                        
                        inputGroup.innerHTML = `
                            <span class="input-label">❌ Từ sai:</span>
                            <input type="text" class="input-box err-input" placeholder="Gõ từ sai...">
                            <span class="input-label">✅ Sửa thành:</span>
                            <input type="text" class="input-box fix-input" placeholder="Gõ từ đúng...">
                        `;
                        
                        const btn = document.createElement('button');
                        btn.className = 'btn-check';
                        btn.innerText = 'Kiểm tra';
                        
                        btn.onclick = () => {
                            const errInput = inputGroup.querySelector('.err-input');
                            const fixInput = inputGroup.querySelector('.fix-input');
                            let isErrCorrect = normalizeString(errInput.value) === normalizeString(q.wrongWord);
                            
                            // Check câu 3 (inexpensive hoặc cheap đều nhận)
                            let isFixCorrect = false;
                            if (q.wrongWord === "expensive" && (normalizeString(fixInput.value) === "cheap" || normalizeString(fixInput.value) === "inexpensive")) {
                                isFixCorrect = true;
                            } else {
                                isFixCorrect = normalizeString(fixInput.value) === normalizeString(q.correctWord);
                            }

                            if (isErrCorrect && isFixCorrect) {
                                errInput.classList.add('input-correct');
                                fixInput.classList.add('input-correct');
                                playSound('correct');
                                score++;
                                currentScoreEl.innerText = score;
                                confetti({ particleCount: 50, spread: 60, colors: ['#00e676', '#00e5ff', '#b388ff'] });
                            } else {
                                if (!isErrCorrect) errInput.classList.add('input-incorrect');
                                if (!isFixCorrect) fixInput.classList.add('input-incorrect');
                                playSound('incorrect');
                                
                                // Hiện đáp án đúng luôn
                                setTimeout(() => {
                                    errInput.value = q.wrongWord;
                                    fixInput.value = q.correctWord;
                                    errInput.classList.replace('input-incorrect', 'input-correct');
                                    fixInput.classList.replace('input-incorrect', 'input-correct');
                                }, 800);
                            }
                            
                            btn.disabled = true;
                            explanationBox.style.display = 'block';
                        };
                        
                        inputGroup.appendChild(btn);
                        card.appendChild(inputGroup);

                    } else if (sectionBlock.type === "gap_fill") {
                        // Render dạng điền từ
                        const sentenceHtml = q.qText.replace('[___]', `<input type="text" class="input-box gap-input" placeholder="Gõ từ...">`);
                        qText.innerHTML = sentenceHtml;
                        card.appendChild(qText);

                        const inputGroup = document.createElement('div');
                        inputGroup.className = 'input-group';
                        
                        const btn = document.createElement('button');
                        btn.className = 'btn-check';
                        btn.innerText = 'Kiểm tra';
                        
                        btn.onclick = () => {
                            const inputField = card.querySelector('.gap-input');
                            const isCorrect = normalizeString(inputField.value) === normalizeString(q.answer);

                            if (isCorrect) {
                                inputField.classList.add('input-correct');
                                playSound('correct');
                                score++;
                                currentScoreEl.innerText = score;
                                confetti({ particleCount: 50, spread: 60, colors: ['#00e676', '#00e5ff', '#b388ff'] });
                            } else {
                                inputField.classList.add('input-incorrect');
                                playSound('incorrect');
                                
                                // Hiện đáp án đúng sau khi rung lắc
                                setTimeout(() => {
                                    inputField.value = q.answer;
                                    inputField.classList.replace('input-incorrect', 'input-correct');
                                }, 800);
                            }

                            btn.disabled = true;
                            explanationBox.style.display = 'block';
                        };
                        
                        inputGroup.appendChild(btn);
                        card.appendChild(inputGroup);
                    }

                    card.appendChild(explanationBox);
                    quizContainer.appendChild(card);
                });
            });
        }

        // --- Logic Nộp bài ---
        function showNamePrompt() {
            document.getElementById('nameModal').style.display = 'flex';
            document.getElementById('studentName').focus();
        }

        function handleEnter(e) {
            if (e.key === 'Enter') submitQuiz();
        }

        function submitQuiz() {
            const nameInput = document.getElementById('studentName');
            const nameError = document.getElementById('nameError');
            const name = nameInput.value.trim();

            if (!name) {
                nameInput.style.borderColor = 'var(--incorrect)';
                nameError.style.display = 'block';
                setTimeout(() => nameInput.style.borderColor = 'var(--secondary)', 1000);
                return;
            }

            document.getElementById('nameModal').style.display = 'none';
            showResultModal(name);
        }

        function showResultModal(name) {
            const resultModal = document.getElementById('resultModal');
            const titleEl = document.getElementById('resultTitle');
            const scoreEl = document.getElementById('resultScore');
            const gifEl = document.getElementById('resultGif');

            let percentage = (score / totalQuestions) * 100;
            let feedback = '';
            let gifSrc = '';

            if (percentage === 100) {
                feedback = `🌟 TUYỆT HẢO! Phi hành gia ${name} đạt điểm tối đa!`;
                gifSrc = 'https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif'; 
                confetti({ particleCount: 300, spread: 150 });
            } else if (percentage >= 70) {
                feedback = `🎉 XUẤT SẮC! ${name} đã hoàn thành xuất sắc nhiệm vụ!`;
                gifSrc = 'https://media.giphy.com/media/xT0xezQGU5xCDJuCPe/giphy.gif'; 
                confetti({ particleCount: 150, spread: 100 });
            } else {
                feedback = `🚀 CỐ LÊN ${name}! Lần sau tàu sẽ bay xa hơn nhé!`;
                gifSrc = 'https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif'; 
            }

            titleEl.innerText = feedback;
            scoreEl.innerText = `Năng lượng thu thập: ${score} / ${totalQuestions} (${percentage.toFixed(0)}%)`;
            gifEl.src = gifSrc;
            
            resultModal.style.display = 'flex';
        }

        window.onload = () => {
            renderQuiz();
        };
    </script>
</body>
</html>
