<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 11 - Green Environment Test (SUPER DETAILED)</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #FDCB6E;
            --accent: #00C9A7;
            --danger: #FF4757;
            --success: #00D26A;
            --text-dark: #2D3436;
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; margin: 0; padding: 0; }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatPattern {
            0% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-20px) rotate(5deg) scale(1.05); }
            100% { transform: translateY(0) rotate(0deg) scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }
        
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        body {
            background: linear-gradient(-45deg, #8854C0, #FDCB6E, #00C9A7, #FF9A9E);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
            font-size: 16px;
        }

        .pattern-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='150' height='150' viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='20' y='30' font-size='20' fill='rgba(255,255,255,0.2)'%3E🌍%3C/text%3E%3Ctext x='90' y='80' font-size='25' fill='rgba(255,255,255,0.2)'%3E♻️%3C/text%3E%3Ctext x='30' y='120' font-size='18' fill='rgba(255,255,255,0.2)'%3E🌱%3C/text%3E%3Ctext x='110' y='20' font-size='22' fill='rgba(255,255,255,0.2)'%3E💧%3C/text%3E%3C/svg%3E");
            z-index: 0; pointer-events: none; animation: floatPattern 12s ease-in-out infinite;
        }

        .container { position: relative; z-index: 1; max-width: 950px; margin: 0 auto; padding-bottom: 120px; }

        .header-credit {
            text-align: center; font-size: 1.2rem; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-bottom: 20px; font-weight: 900;
        }

        .section-title {
            background: rgba(255, 255, 255, 0.95); padding: 15px 25px; border-radius: 20px;
            margin: 40px 0 20px; font-size: 1.5rem; font-weight: 900; color: var(--primary);
            box-shadow: 0 8px 0 rgba(0,0,0,0.1); text-align: center; border: 3px solid var(--primary);
        }

        .word-box {
            background: #fff3cd; border: 3px dashed #ffc107; border-radius: 15px;
            padding: 15px; margin-bottom: 20px; text-align: center; font-weight: 800; font-size: 1.2rem;
            color: #856404;
        }

        .card {
            background: rgba(255, 255, 255, 0.98); border-radius: 25px; padding: 25px;
            margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-3px); }

        .question-text { font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; line-height: 1.6; color: #2c3e50; }
        .question-text u { text-decoration-color: var(--danger); text-decoration-thickness: 3px; }

        /* MCQ Options */
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .btn-option {
            background: white; border: 3px solid #e0e0e0; border-radius: 18px; padding: 15px;
            font-size: 1.1rem; font-weight: 700; color: var(--text-dark); cursor: pointer;
            box-shadow: 0 6px 0 #e0e0e0; transition: all 0.15s; text-align: left;
        }
        .btn-option:hover:not(:disabled) { transform: scale(1.02); border-color: var(--primary); box-shadow: 0 6px 0 var(--primary); }
        .btn-option:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 0 0 transparent; }
        .btn-option.correct { background: var(--success); border-color: #00b35a; color: white; box-shadow: 0 6px 0 #00994d; }
        .btn-option.wrong { background: var(--danger); border-color: #e63946; color: white; box-shadow: 0 6px 0 #cc0000; animation: shake 0.4s ease-in-out; }

        /* Fill in blanks */
        .fill-input {
            border: 3px solid #ccc; border-radius: 10px; padding: 8px 15px;
            font-size: 1.1rem; font-weight: 700; outline: none; margin: 0 5px; text-align: center;
            min-width: 140px; transition: 0.3s;
        }
        .fill-input:focus { border-color: var(--secondary); background: #fffcf5; }
        .textarea-input { width: 100%; min-width: unset; text-align: left; margin: 10px 0; padding: 12px; }
        
        .btn-check {
            background: var(--accent); color: white; border: none; padding: 12px 25px;
            border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 5px 0 #009e83; transition: 0.1s; display: inline-block; margin-top: 10px;
        }
        .btn-check:hover { filter: brightness(1.1); }
        .btn-check:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }

        /* Matching */
        .matching-container { display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 768px) { .matching-container { flex-direction: row; } }
        .match-col { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .match-item {
            background: white; border: 3px solid #ccc; border-radius: 15px;
            padding: 15px; font-weight: 700; font-size: 1.05rem; cursor: pointer; box-shadow: 0 4px 0 #ccc;
            transition: 0.2s; text-align: left;
        }
        .match-item.selected { background: var(--secondary); border-color: #e5b05c; color: white; transform: scale(1.02); }
        .match-item.matched { background: var(--success); border-color: #00994d; color: white; opacity: 0.6; pointer-events: none; }
        
        .match-translation-box {
            background: #e8f8f5; border-left: 5px solid var(--accent);
            padding: 15px; margin-top: 15px; border-radius: 0 10px 10px 0;
            display: none; animation: popIn 0.3s ease-out;
        }

        /* Explanations */
        .explanation {
            display: none; background: #fff9e6; border-left: 6px solid var(--secondary);
            padding: 20px; margin-top: 20px; border-radius: 0 15px 15px 0;
            font-size: 1.05rem; line-height: 1.6; color: #333;
            animation: fadeInDown 0.4s ease-out forwards;
        }
        .explanation h4 { color: #d35400; margin-bottom: 12px; font-size: 1.15rem; border-bottom: 1px dashed #d35400; padding-bottom: 5px; display: inline-block;}
        .explanation p { margin-bottom: 8px; }
        .explanation strong { color: var(--primary); }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Score Bar */
        .score-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; background: white;
            padding: 15px 30px; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); display: flex;
            justify-content: space-between; align-items: center; z-index: 100;
        }
        .score-text { font-size: 1.4rem; font-weight: 900; color: var(--primary); }
        .btn-submit {
            background: var(--primary); color: white; font-size: 1.2rem; font-weight: 800;
            padding: 10px 30px; border-radius: 20px; border: none; box-shadow: 0 6px 0 #5c3985; cursor: pointer;
        }
        .btn-submit:active { transform: translateY(6px); box-shadow: none; }

        canvas#confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

    <div class="pattern-overlay"></div>
    <canvas id="confetti"></canvas>

    <div class="container" id="quiz-container">
        <h3 class="header-credit">✨ Giáo viên biên soạn: Ms Mai An ULIS ✨<br>FULL ĐỀ KIỂM TRA UNIT 11</h3>
    </div>

    <div class="score-bar">
        <div class="score-text">ĐIỂM: <span id="score-display">0</span> / <span id="total-display">0</span></div>
        <button class="btn-submit" onclick="finishQuiz()">NỘP BÀI 🎉</button>
    </div>

    <script>
        // --- ÂM THANH ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // --- PHÁO GIẤY ---
        const canvas = document.getElementById('confetti'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        function fireConfetti() {
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height / 2, r: Math.random() * 6 + 4,
                    dx: Math.random() * 12 - 6, dy: Math.random() * -12 - 6,
                    color: ['#FF4757', '#00D26A', '#FDCB6E', '#8854C0', '#00C9A7'][Math.floor(Math.random() * 5)]
                });
            }
        }
        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.x += p.dx; p.y += p.dy; p.dy += 0.4;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill();
                if (p.y > canvas.height) particles.splice(index, 1);
            });
            requestAnimationFrame(animateConfetti);
        }
        animateConfetti();
        function shuffleArray(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } return array; }

        // --- DỮ LIỆU ĐỀ BÀI FULL CHÍNH XÁC ---
        const quizData = [
            // PHẦN I
            {
                title: "I. Choose the word whose underlined part is pronounced differently.",
                type: "mcq",
                questions: [
                    { q: "1. a. rec<u>y</u>cle b. env<u>i</u>ronment c. char<u>i</u>ty d. inv<u>i</u>te", options: [{t:"a. rec<u>y</u>cle", c:false},{t:"b. env<u>i</u>ronment", c:false},{t:"c. char<u>i</u>ty", c:true},{t:"d. inv<u>i</u>te", c:false}], exp: "<h4>Giải thích chi tiết:</h4><p>Phần gạch chân của C phát âm là /ɪ/ (âm i ngắn), các từ còn lại A, B, D phát âm là /aɪ/.</p>" },
                    { q: "2. a. p<u>a</u>per b. b<u>a</u>g c. pl<u>a</u>stic d. n<u>a</u>tural", options: [{t:"a. p<u>a</u>per", c:true},{t:"b. b<u>a</u>g", c:false},{t:"c. pl<u>a</u>stic", c:false},{t:"d. n<u>a</u>tural", c:false}], exp: "<h4>Giải thích chi tiết:</h4><p>Đáp án A chữ 'a' đọc là /eɪ/. Các đáp án còn lại đọc là /æ/ (a bẹt).</p>" },
                    { q: "3. a. <u>c</u>ousin b. <u>c</u>ycle c. en<u>c</u>ourage d. <u>c</u>ontainer", options: [{t:"a. <u>c</u>ousin", c:false},{t:"b. <u>c</u>ycle", c:true},{t:"c. en<u>c</u>ourage", c:false},{t:"d. <u>c</u>ontainer", c:false}], exp: "<h4>Giải thích chi tiết:</h4><p>Chữ 'c' trong B đứng trước 'y' nên đọc là /s/. Các từ còn lại đọc là /k/.</p>" },
                    { q: "4. a. br<u>ea</u>thing b. gr<u>ee</u>n c. br<u>ee</u>ze d. br<u>ea</u>d", options: [{t:"a. br<u>ea</u>thing", c:false},{t:"b. gr<u>ee</u>n", c:false},{t:"c. br<u>ee</u>ze", c:false},{t:"d. br<u>ea</u>d", c:true}], exp: "<h4>Giải thích chi tiết:</h4><p>'ea' trong D đọc là /e/ (bánh mì). Các từ còn lại đọc là /iː/ (i dài).</p>" },
                    { q: "5. a. sav<u>ed</u> b. pollut<u>ed</u> c. enjoy<u>ed</u> d. reus<u>ed</u>", options: [{t:"a. sav<u>ed</u>", c:false},{t:"b. pollut<u>ed</u>", c:true},{t:"c. enjoy<u>ed</u>", c:false},{t:"d. reus<u>ed</u>", c:false}], exp: "<h4>Giải thích chi tiết:</h4><p>Động từ kết thúc bằng /t/ hoặc /d/ thì đuôi -ed đọc là /ɪd/. B 'pollute' tận cùng /t/ -> đọc là /ɪd/.</p>" }
                ]
            },
            // PHẦN II
            {
                title: "II. Choose the odd one out.",
                type: "mcq",
                questions: [
                    { q: "1. a. recycle b. reuse c. reorder d. reduce", options: [{t:"a. recycle", c:false},{t:"b. reuse", c:false},{t:"c. reorder", c:true},{t:"d. reduce", c:false}], exp: "<h4>Giải thích chi tiết:</h4><p>A, B, D là 3 nguyên tắc 3Rs về môi trường. C không thuộc nhóm.</p>" },
                    { q: "2. a. plastic b. paper c. glass d. bin", options: [{t:"a. plastic", c:false},{t:"b. paper", c:false},{t:"c. glass", c:false},{t:"d. bin", c:true}], exp: "<h4>Giải thích chi tiết:</h4><p>A, B, C là VẬT LIỆU tái chế. D là THÙNG RÁC (vật thể chứa).</p>" },
                    { q: "3. a. polluted b. charity c. refillable d. reusable", options: [{t:"a. polluted", c:false},{t:"b. charity", c:true},{t:"c. refillable", c:false},{t:"d. reusable", c:false}], exp: "<h4>Giải thích chi tiết:</h4><p>B là Danh từ (từ thiện), 3 từ còn lại là Tính từ.</p>" },
                    { q: "4. a. noise b. bottle c. can d. bulb", options: [{t:"a. noise", c:true},{t:"b. bottle", c:false},{t:"c. can", c:false},{t:"d. bulb", c:false}], exp: "<h4>Giải thích chi tiết:</h4><p>A là danh từ KHÔNG đếm được (tiếng ồn). B, C, D là đồ vật đếm được.</p>" },
                    { q: "5. a. rubbish b. litter c. envelope d. garbage", options: [{t:"a. rubbish", c:false},{t:"b. litter", c:false},{t:"c. envelope", c:true},{t:"d. garbage", c:false}], exp: "<h4>Giải thích chi tiết:</h4><p>A, B, D đều là RÁC THẢI. C là phong bì thư.</p>" }
                ]
            },
            // PHẦN III - BOX FILL
            {
                title: "III. How can we make every day a Green Day? Complete the sentences.",
                desc: "<div class='word-box'>[Turn off: Tắt/Khóa] &nbsp; | &nbsp; [Use: Sử dụng] &nbsp; | &nbsp; [Don't throw: Đừng vứt] &nbsp; | &nbsp; [Clean: Dọn dẹp] &nbsp; | &nbsp; [Collect: Thu gom]</div>",
                type: "fill_blanks",
                questions: [
                    { q: "1. [___] away things you can recycle.", ans: ["Don't throw", "Dont throw", "Don't throw away"], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch):</strong> Đừng vứt đi những thứ bạn có thể đem đi tái chế.</p><p><strong>Bước 2 (Phân tích ngữ pháp):</strong> Trong câu có trạng từ <strong>'away'</strong>.</p><p><strong>Bước 3 (Phân tích từ cho sẵn):</strong> Trong hộp chỉ có động từ <strong>'throw'</strong> khi ghép với 'away' sẽ tạo thành Cụm động từ (Phrasal verb) mang nghĩa hợp lý: <strong>throw away = vứt bỏ vào thùng rác</strong>.</p><p><strong>Bước 4 (Kết luận):</strong> Cần điền mệnh lệnh dạng phủ định -> <strong>Don't throw</strong>.</p>" },
                    { q: "2. [___] the tap when you brush your teeth.", ans: ["Turn off", "Turn off "], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch):</strong> Hãy khóa vòi nước khi bạn đang đánh răng.</p><p><strong>Bước 2 (Phân tích ngữ pháp):</strong> Tân ngữ phía sau là <strong>'the tap'</strong> (vòi nước máy).</p><p><strong>Bước 3 (Phân tích từ cho sẵn):</strong> Để tiết kiệm nước bảo vệ môi trường, hành động logic nhất với vòi nước là Tắt/Khóa nó lại. Ta có cụm từ <strong>turn off = tắt/khóa</strong>.</p><p><strong>Bước 4 (Kết luận):</strong> Điền <strong>Turn off</strong>.</p>" },
                    { q: "3. [___] up the beach.", ans: ["Clean"], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch):</strong> Hãy dọn dẹp sạch sẽ bãi biển.</p><p><strong>Bước 2 (Phân tích ngữ pháp):</strong> Chỗ trống đứng trước giới từ <strong>'up'</strong> và danh từ 'the beach' (bãi biển).</p><p><strong>Bước 3 (Phân tích từ cho sẵn):</strong> Ta có Cụm động từ cố định: <strong>clean up = dọn dẹp vệ sinh cho sạch sẽ</strong>. Rất phù hợp với hành động nhặt rác ở bãi biển.</p><p><strong>Bước 4 (Kết luận):</strong> Điền <strong>Clean</strong>.</p>" },
                    { q: "4. [___] the rubbish from the park near your school.", ans: ["Collect"], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch):</strong> Hãy thu gom rác thải từ công viên ở gần trường của bạn.</p><p><strong>Bước 2 (Phân tích ngữ pháp):</strong> Tân ngữ là <strong>'the rubbish'</strong> (rác rưởi).</p><p><strong>Bước 3 (Phân tích từ cho sẵn):</strong> Hành động thích hợp nhất đối với rác rưởi nằm rải rác trong công viên là đi Nhặt/Thu gom chúng lại. <strong>Collect = thu gom/nhặt</strong>.</p><p><strong>Bước 4 (Kết luận):</strong> Điền <strong>Collect</strong>.</p>" },
                    { q: "5. [___] the same plastic bags again and again.", ans: ["Use"], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch):</strong> Hãy sử dụng đi sử dụng lại cùng một chiếc túi nilon nhiều lần.</p><p><strong>Bước 2 (Phân tích ngữ pháp):</strong> Cụm từ quan trọng ở cuối câu: <strong>'again and again'</strong> (lặp đi lặp lại nhiều lần).</p><p><strong>Bước 3 (Phân tích từ cho sẵn):</strong> Để hạn chế rác thải nhựa, ta cần mang túi cũ ra Dùng lại. <strong>Use = Sử dụng</strong>.</p><p><strong>Bước 4 (Kết luận):</strong> Điền <strong>Use</strong>.</p>" },
                    { q: "6. [___] the lights when you go out of a room.", ans: ["Turn off"], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch):</strong> Hãy tắt đèn khi bạn đi ra khỏi phòng.</p><p><strong>Bước 2 (Phân tích ngữ pháp):</strong> Tân ngữ là <strong>'the lights'</strong> (bóng đèn).</p><p><strong>Bước 3 (Phân tích từ cho sẵn):</strong> Hành động bảo vệ môi trường (tiết kiệm điện) đối với bóng đèn khi rời đi là Tắt nó đi. <strong>Turn off = tắt (thiết bị điện)</strong>.</p><p><strong>Bước 4 (Kết luận):</strong> Điền <strong>Turn off</strong> (từ này được sử dụng 2 lần trong bài).</p>" }
                ]
            },
            // PHẦN IV - ĐÃ CẬP NHẬT GIẢI THÍCH CHI TIẾT 4 BƯỚC & XÓA CÂU LỖI
            {
                title: "IV. Choose the correct answers a, b, c or d.",
                type: "mcq",
                questions: [
                    { q: "1. Soil pollution can lead to lack ______ food.", options: [{t:"a. for", c:false},{t:"b. in", c:false},{t:"c. on", c:false},{t:"d. of", c:true}], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Ô nhiễm đất có thể dẫn đến việc thiếu hụt lương thực.</p><p><strong>Bước 2 (Phân tích):</strong> Chỗ trống đứng sau danh từ 'lack' và trước danh từ 'food'. Ta cần một giới từ phù hợp để nối.</p><p><strong>Bước 3 (Cấu trúc):</strong> Ta có cụm cố định: <strong>lack of + Noun</strong> = sự thiếu hụt cái gì đó.</p><p><strong>Bước 4 (Kết luận):</strong> Chọn đáp án <strong>d. of</strong>.</p>" },
                    { q: "2. Almost 27,000 trees are cut ______ every day just to make toilet paper!", options: [{t:"a. off", c:false},{t:"b. down", c:true},{t:"c. up", c:false},{t:"d. in", c:false}], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Gần 27.000 cây xanh bị đốn hạ mỗi ngày chỉ để làm giấy vệ sinh!</p><p><strong>Bước 2 (Phân tích):</strong> Động từ 'cut' cần đi với một giới từ để tạo thành Phrasal verb mang nghĩa 'chặt, đốn hạ' phù hợp với ngữ cảnh 'trees' (cây).</p><p><strong>Bước 3 (Từ vựng):</strong> <strong>cut down</strong> = đốn hạ, chặt bỏ. Các cụm khác: cut off (cắt đứt), cut up (cắt nhỏ).</p><p><strong>Bước 4 (Kết luận):</strong> Chọn đáp án <strong>b. down</strong>.</p>" },
                    { q: "3. The three Rs ______ reduce, reuse and recycle.", options: [{t:"a. mean by", c:false},{t:"b. turn to", c:false},{t:"c. stand for", c:true},{t:"d. put up", c:false}], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> 3 chữ R là viết tắt của reduce (giảm thiểu), reuse (tái sử dụng) và recycle (tái chế).</p><p><strong>Bước 2 (Phân tích):</strong> Câu cần một động từ mang ý nghĩa 'đại diện cho, là viết tắt của' để giải thích cho 'The three Rs'.</p><p><strong>Bước 3 (Từ vựng):</strong> <strong>stand for</strong> = là chữ viết tắt của, mang ý nghĩa đại diện cho. Các cụm khác không hợp lý.</p><p><strong>Bước 4 (Kết luận):</strong> Chọn đáp án <strong>c. stand for</strong>.</p>" },
                    { q: "4. You shouldn't throw those papers away; they're ______.", options: [{t:"a. refillable", c:false},{t:"b. reducible", c:false},{t:"c. recyclable", c:true},{t:"d. repayable", c:false}], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Bạn không nên vứt những tờ giấy đó đi; chúng có thể tái chế được.</p><p><strong>Bước 2 (Phân tích):</strong> Đứng sau to be 'are', ta cần một tính từ miêu tả tính chất của 'papers' (giấy tờ).</p><p><strong>Bước 3 (Từ vựng):</strong> Dựa vào ngữ cảnh 'không nên vứt đi', giấy là vật liệu có thể tái chế -> Tính từ <strong>recyclable</strong> (có thể tái chế). (refillable: có thể bơm/làm đầy lại).</p><p><strong>Bước 4 (Kết luận):</strong> Chọn đáp án <strong>c. recyclable</strong>.</p>" },
                    { q: "5. We should use reusable shopping bags ______ plastic bags.", options: [{t:"a. instead of", c:true},{t:"b. because of", c:false},{t:"c. in spite of", c:false},{t:"d. place of", c:false}], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Chúng ta nên sử dụng túi mua sắm dùng nhiều lần thay vì túi nilon.</p><p><strong>Bước 2 (Phân tích):</strong> Câu đưa ra hai sự lựa chọn túi. Cần một cụm giới từ chỉ sự thay thế.</p><p><strong>Bước 3 (Từ vựng):</strong> <strong>instead of</strong> = thay vì. (because of = bởi vì, in spite of = mặc dù. Đáp án d thiếu chữ 'in' ở đầu).</p><p><strong>Bước 4 (Kết luận):</strong> Chọn đáp án <strong>a. instead of</strong>.</p>" },
                    { q: "6. Thousands of people donated money and food to those in ______.", options: [{t:"a. length", c:false},{t:"b. need", c:true},{t:"c. order", c:false},{t:"d. space", c:false}], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Hàng ngàn người đã quyên góp tiền và thức ăn cho những người có hoàn cảnh khó khăn.</p><p><strong>Bước 2 (Phân tích):</strong> Cần một danh từ đi với 'in' để tạo thành cụm từ chỉ hoàn cảnh của con người.</p><p><strong>Bước 3 (Thành ngữ):</strong> Ta có cụm từ cố định: <strong>people in need / those in need</strong> = những người đang cần sự giúp đỡ, có hoàn cảnh khó khăn.</p><p><strong>Bước 4 (Kết luận):</strong> Chọn đáp án <strong>b. need</strong>.</p>" },
                    { q: "7. ______ pollution can cause hearing loss.", options: [{t:"a. Air", c:false},{t:"b. Water", c:false},{t:"c. Noise", c:true},{t:"d. Soil", c:false}], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Ô nhiễm tiếng ồn có thể gây ra bệnh suy giảm thính lực (điếc).</p><p><strong>Bước 2 (Phân tích):</strong> 'hearing loss' (suy giảm thính lực) là bệnh liên quan đến tai. Nguyên nhân gây ra nó phải tác động đến thính giác.</p><p><strong>Bước 3 (Từ vựng):</strong> <strong>Noise pollution</strong> = ô nhiễm tiếng ồn. (Air: không khí, Water: nước, Soil: đất).</p><p><strong>Bước 4 (Kết luận):</strong> Chọn đáp án <strong>c. Noise</strong>.</p>" },
                    { q: "8. If more people cycle, there will be ______ air pollution.", options: [{t:"a. much", c:false},{t:"b. more", c:false},{t:"c. less", c:true},{t:"d. little", c:false}], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Nếu có nhiều người đạp xe hơn, tình trạng ô nhiễm không khí sẽ ít đi.</p><p><strong>Bước 2 (Phân tích):</strong> Đạp xe là hành động bảo vệ môi trường, nên kết quả là ô nhiễm sẽ 'ít hơn'. Danh từ 'pollution' là không đếm được.</p><p><strong>Bước 3 (Ngữ pháp):</strong> So sánh hơn của từ chỉ số lượng ít 'little' (dành cho danh từ không đếm được) là <strong>less</strong> (ít hơn).</p><p><strong>Bước 4 (Kết luận):</strong> Chọn đáp án <strong>c. less</strong>.</p>" },
                    { q: "9. Which of the following cannot be recycled?", options: [{t:"a. Milk cartons", c:false},{t:"b. Glass bottles", c:false},{t:"c. Cans", c:false},{t:"d. Plastic bags", c:true}], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Vật nào dưới đây KHÔNG THỂ đem đi tái chế?</p><p><strong>Bước 2 (Phân tích):</strong> Câu hỏi yêu cầu tìm loại rác thải không thể (cannot) tái chế được trong số các đáp án.</p><p><strong>Bước 3 (Kiến thức thực tế):</strong> Hộp sữa (cartons), chai thủy tinh (bottles), lon (cans) đều dễ dàng tái chế. Túi nilon (<strong>Plastic bags</strong>) mỏng thường bị loại khỏi dây chuyền vì làm kẹt máy móc và rất khó tái chế.</p><p><strong>Bước 4 (Kết luận):</strong> Chọn đáp án <strong>d. Plastic bags</strong>.</p>" }
                ]
            },
            // PHẦN V - VERB FORM
            {
                title: "V. Complete the sentences with the correct form or tense of the verbs.",
                type: "fill_blanks",
                questions: [
                    { q: "1. If people share their cars to go to work, there [___] (not be) so many car fumes.", ans: ["won't be", "will not be"], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch câu):</strong> Nếu mọi người đi chung ô tô đi làm, sẽ không có quá nhiều khí thải xe hơi.</p><p><strong>Bước 2 (Dấu hiệu nhận biết):</strong> Câu bắt đầu bằng chữ <strong>'If'</strong> (Nếu). Động từ ở vế If là 'share' (đang giữ nguyên thể ở Hiện tại đơn). -> Suy ra đây là <strong>Câu điều kiện loại 1</strong> (nói về sự việc có thật/có thể xảy ra ở hiện tại hoặc tương lai).</p><p><strong>Bước 3 (Công thức ngữ pháp):</strong> If + S + V(hiện tại đơn), S + <strong>will + V(nguyên thể)</strong>.</p><p><strong>Bước 4 (Cách làm):</strong> Vế chính cần chia thì Tương lai đơn. Phủ định của 'will be' là 'will not be', viết tắt là <strong>won't be</strong>.</p>" },
                    { q: "2. I [___] (study) here for more than three years.", ans: ["have studied", "have studied ", "'ve studied"], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch câu):</strong> Tôi đã học ở đây được hơn 3 năm rồi.</p><p><strong>Bước 2 (Dấu hiệu nhận biết):</strong> Trong câu có cụm <strong>'for + khoảng thời gian'</strong> (for more than three years). Đây là dấu hiệu nhận biết kinh điển của thì <strong>Hiện tại hoàn thành</strong> (chỉ hành động bắt đầu từ quá khứ, kéo dài đến hiện tại).</p><p><strong>Bước 3 (Công thức ngữ pháp):</strong> Khẳng định HTHT: S + <strong>have/has + V-P2 (Quá khứ phân từ)</strong>.</p><p><strong>Bước 4 (Cách làm):</strong> Chủ ngữ là 'I' nên dùng trợ động từ 'have'. Động từ 'study' là động từ có quy tắc, đổi 'y' dài thành 'i' ngắn rồi thêm 'ed' -> <strong>have studied</strong>.</p>" },
                    { q: "3. What a nice dress! Where [___] (you/ buy) it?", ans: ["did you buy", "did you buy "], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch câu):</strong> Chiếc váy đẹp quá! Bạn đã mua nó ở đâu thế?</p><p><strong>Bước 2 (Phân tích ngữ cảnh):</strong> Bạn đang nhìn thấy chiếc váy người ta mặc, nghĩa là hành động 'mua váy' đã ĐÃ XẢY RA và KẾT THÚC HOÀN TOÀN trong quá khứ. -> Phải dùng thì <strong>Quá khứ đơn</strong>.</p><p><strong>Bước 3 (Công thức ngữ pháp):</strong> Câu hỏi Wh-question ở quá khứ đơn: Từ để hỏi + <strong>did + S + V(nguyên thể)</strong> + ...?</p><p><strong>Bước 4 (Cách làm):</strong> Áp dụng công thức vào chủ ngữ 'you' và động từ 'buy' -> <strong>did you buy</strong>.</p>" },
                    { q: "4. Don't forget to take your umbrella. It [___] (rain).", ans: ["is raining", "'s raining"], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch câu):</strong> Đừng quên mang theo ô của bạn nhé. Trời đang mưa đấy.</p><p><strong>Bước 2 (Phân tích ngữ cảnh):</strong> Lời nhắc nhở 'Đừng quên mang ô' cho thấy bối cảnh đang diễn ra ngay tại thời điểm người nói đang nói. Sự việc trời mưa đang diễn ra trước mắt. -> Dùng thì <strong>Hiện tại tiếp diễn</strong>.</p><p><strong>Bước 3 (Công thức ngữ pháp):</strong> S + <strong>am/is/are + V-ing</strong>.</p><p><strong>Bước 4 (Cách làm):</strong> Chủ ngữ giả 'It' đi với to be là 'is', thêm đuôi ing vào rain -> <strong>is raining</strong>.</p>" },
                    { q: "5. If we recycle paper products, we [___] (save) more trees.", ans: ["will save", "ll save"], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch câu):</strong> Nếu chúng ta tái chế các sản phẩm từ giấy, chúng ta sẽ cứu sống được nhiều cây xanh hơn.</p><p><strong>Bước 2 (Dấu hiệu nhận biết):</strong> Có chữ <strong>'If'</strong>. Vế đầu tiên chia Hiện tại đơn ('we recycle'). -> Đây là <strong>Câu điều kiện loại 1</strong>.</p><p><strong>Bước 3 (Công thức ngữ pháp):</strong> Vế mệnh đề chính (Main clause) sẽ chia ở thì Tương lai đơn: S + <strong>will + V(nguyên thể)</strong>.</p><p><strong>Bước 4 (Cách làm):</strong> Thêm 'will' vào trước động từ 'save' nguyên mẫu -> <strong>will save</strong>.</p>" },
                    { q: "6. Our class [___] (organise) a writing contest. We have to write about the environment.", ans: ["is organising", "is organizing", "are organising"], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch câu):</strong> Lớp của chúng tôi đang tổ chức một cuộc thi viết. Chúng tôi phải viết về môi trường.</p><p><strong>Bước 2 (Phân tích ngữ cảnh):</strong> Câu thứ 2 'Chúng tôi phải viết...' cho thấy sự kiện này đang diễn ra ngay lúc này hoặc là một kế hoạch chắc chắn sẽ xảy ra trong tương lai rất gần. -> Dùng thì <strong>Hiện tại tiếp diễn</strong>.</p><p><strong>Bước 3 (Công thức ngữ pháp):</strong> S + <strong>am/is/are + V-ing</strong>.</p><p><strong>Bước 4 (Cách làm):</strong> Chủ ngữ 'Our class' (Lớp tôi - số ít một tập thể) dùng to be là 'is'. Động từ kết thúc bằng 'e' (organise) thì bỏ 'e' thêm 'ing' -> <strong>is organising</strong>.</p>" },
                    { q: "7. Give old clothes to charity instead of [___] (throw) them away.", ans: ["throwing", "throwing "], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch câu):</strong> Hãy mang quần áo cũ cho hội từ thiện thay vì vứt chúng đi.</p><p><strong>Bước 2 (Phân tích ngữ pháp):</strong> Trước chỗ trống là từ <strong>'of'</strong> (thuộc cụm instead of).</p><p><strong>Bước 3 (Công thức ngữ pháp):</strong> Quy tắc vàng trong Tiếng Anh: Theo sau hầu hết các <strong>Giới từ</strong> (in, on, at, of, for, with...) động từ BẮT BUỘC phải ở dạng <strong>V-ing (Danh động từ)</strong>.</p><p><strong>Bước 4 (Cách làm):</strong> Thêm đuôi 'ing' vào throw -> <strong>throwing</strong>.</p>" },
                    { q: "8. Encouraging people [___] (use) public transport is a great way to reduce traffic jams.", ans: ["to use", "to use "], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch câu):</strong> Khuyến khích mọi người sử dụng giao thông công cộng là một cách tuyệt vời để giảm ùn tắc giao thông.</p><p><strong>Bước 2 (Dấu hiệu nhận biết):</strong> Động từ đứng trước ảnh hưởng tới chỗ trống là từ <strong>'Encouraging' (bắt nguồn từ Encourage)</strong>.</p><p><strong>Bước 3 (Công thức ngữ pháp):</strong> Ta có cấu trúc cố định: <strong>Encourage somebody TO DO something</strong> (Khuyến khích ai đó làm việc gì đó). Theo sau nó phải là động từ nguyên thể có 'to' (To V).</p><p><strong>Bước 4 (Cách làm):</strong> Thêm 'to' vào trước use -> <strong>to use</strong>.</p>" }
                ]
            },
            // PHẦN VI - WORD FORM
            {
                title: "VI. Complete the sentences with the correct form of the words.",
                type: "fill_blanks",
                questions: [
                    { q: "1. Water in the area is severely [___]. (pollute)", ans: ["polluted"], exp: "<h4>Giải thích CHI TIẾT:</h4><p><strong>Dịch nghĩa:</strong> Nguồn nước trong khu vực này bị ô nhiễm nghiêm trọng.</p><p><strong>Phân tích:</strong> Đứng sau động từ to be 'is' và trạng từ 'severely' (nghiêm trọng) cần một tính từ. Vì chủ ngữ là 'Water' (vật chịu tác động) nên ta dùng dạng quá khứ phân từ (V-ed) mang nghĩa bị động.</p><p><strong>Từ vựng:</strong> Động từ <em>pollute</em> chuyển thành tính từ <strong>polluted</strong> (bị ô nhiễm).</p>" },
                    { q: "2. Recycling also helps control [___] pollution by reducing waste. (environment)", ans: ["environmental"], exp: "<h4>Giải thích CHI TIẾT:</h4><p><strong>Dịch nghĩa:</strong> Tái chế cũng giúp kiểm soát ô nhiễm môi trường bằng cách giảm thiểu rác thải.</p><p><strong>Phân tích:</strong> Chỗ trống đứng ngay trước danh từ 'pollution' (sự ô nhiễm), do đó ta cần một tính từ để bổ nghĩa.</p><p><strong>Từ vựng:</strong> Danh từ <em>environment</em> (môi trường) chuyển sang tính từ là <strong>environmental</strong>. Ta có cụm: <em>environmental pollution</em> (ô nhiễm môi trường).</p>" },
                    { q: "3. You shouldn't buy food wrapped in a lot of [___]. (package)", ans: ["packaging"], exp: "<h4>Giải thích CHI TIẾT:</h4><p><strong>Dịch nghĩa:</strong> Bạn không nên mua các loại thực phẩm được bọc trong quá nhiều bao bì.</p><p><strong>Phân tích:</strong> Đứng sau lượng từ 'a lot of' (rất nhiều) ta cần một danh từ.</p><p><strong>Từ vựng:</strong> Động từ <em>package</em> chuyển thành danh từ là <strong>packaging</strong> (bao bì, vật liệu đóng gói).</p>" },
                    { q: "4. These bags are [___]. They can be used many times. (reuse)", ans: ["reusable"], exp: "<h4>Giải thích CHI TIẾT:</h4><p><strong>Dịch nghĩa:</strong> Những chiếc túi này có thể tái sử dụng được. Chúng có thể được dùng đi dùng lại nhiều lần.</p><p><strong>Phân tích:</strong> Đứng sau động từ to be 'are', ta cần một tính từ để miêu tả tính chất của những chiếc túi. Dữ kiện 'can be used many times' chỉ sự lặp lại.</p><p><strong>Từ vựng:</strong> Động từ <em>reuse</em> chuyển thành tính từ <strong>reusable</strong> (có thể tái sử dụng).</p>" },
                    { q: "5. [___] causes global warming. (deforest)", ans: ["Deforestation"], exp: "<h4>Giải thích CHI TIẾT:</h4><p><strong>Dịch nghĩa:</strong> Nạn phá rừng gây ra hiện tượng nóng lên toàn cầu.</p><p><strong>Phân tích:</strong> Từ cần điền đứng ở vị trí đầu câu, làm Chủ ngữ cho động từ 'causes', nên nó bắt buộc phải là một danh từ. (Nhớ viết hoa chữ cái đầu).</p><p><strong>Từ vựng:</strong> Động từ <em>deforest</em> (chặt phá rừng) có danh từ là <strong>Deforestation</strong> (nạn phá rừng).</p>" },
                    { q: "6. Many paperboard cartons are made of [___] paper. (recycle)", ans: ["recycled"], exp: "<h4>Giải thích CHI TIẾT:</h4><p><strong>Dịch nghĩa:</strong> Rất nhiều thùng carton bằng bìa cứng được làm từ giấy tái chế.</p><p><strong>Phân tích:</strong> Đứng trước danh từ 'paper' (giấy) cần một tính từ để bổ nghĩa. Giấy đã được con người trải qua quá trình tái chế, nên dùng V-ed mang nghĩa bị động.</p><p><strong>Từ vựng:</strong> Động từ <em>recycle</em> chuyển thành tính từ <strong>recycled</strong> (đã được tái chế).</p>" },
                    { q: "7. To save [___], turn off lights and television when not in use. (electric)", ans: ["electricity"], exp: "<h4>Giải thích CHI TIẾT:</h4><p><strong>Dịch nghĩa:</strong> Để tiết kiệm điện, hãy tắt đèn và tivi khi không sử dụng.</p><p><strong>Phân tích:</strong> Theo sau ngoại động từ 'save' (tiết kiệm) ta cần một danh từ làm tân ngữ (tiết kiệm cái gì?).</p><p><strong>Từ vựng:</strong> Tính từ gốc <em>electric</em> chuyển sang danh từ là <strong>electricity</strong> (điện năng).</p>" },
                    { q: "8. If we pollute the air, we will have [___] problems. (breathe)", ans: ["breathing"], exp: "<h4>Giải thích CHI TIẾT:</h4><p><strong>Dịch nghĩa:</strong> Nếu chúng ta làm ô nhiễm không khí, chúng ta sẽ mắc phải các vấn đề về hô hấp.</p><p><strong>Phân tích:</strong> Chỗ trống nằm trước danh từ 'problems'. Ta cần dùng Danh động từ (V-ing) đứng trước danh từ để tạo thành cụm danh từ ghép chỉ loại bệnh.</p><p><strong>Từ vựng:</strong> Động từ <em>breathe</em> (hít thở) thêm -ing thành <strong>breathing</strong>. Cụm cố định: <em>breathing problems</em> (các vấn đề về đường hô hấp).</p>" }
                ]
            },
            // PHẦN VII - MATCHING

                    "L3": "<strong>3 - E:</strong> (Hỏi) Bạn nên dùng loại túi nào? <br>=> (Đáp) Túi có thể tái sử dụng nhiều lần (Reusable bags).",

            // PHẦN X - REWRITE
            {
                title: "X. Complete the second sentence so that it means the same as first one.",
                type: "fill_blanks",
                questions: [
                    { q: "1. There are a few students taking part in the event.<br>➔ There aren't [___]", ans: ["many students taking part in the event.", "many students taking part in the event", "many students taking part in the event "], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Câu gốc: Chỉ có MỘT VÀI học sinh tham gia sự kiện. = Câu mới: KHÔNG CÓ NHIỀU học sinh tham gia sự kiện.</p><p><strong>Bước 2 (Phân tích cấu trúc):</strong> Trong Tiếng Anh, để diễn tả số lượng ít ỏi, ta dùng từ <strong>'a few'</strong> (một vài) trong câu khẳng định. Khi đổi sang dạng phủ định mang nghĩa tương đương, ta phải dùng từ trái nghĩa đi kèm với NOT. NOT + <strong>'many'</strong> (nhiều) = Không nhiều (tức là chỉ có một vài).</p><p><strong>Bước 3 (Cách làm):</strong> Đề bài đã cho sẵn 'There aren't' (There are not). Ta thay thế cụm từ 'a few' bằng từ <strong>'many'</strong>, phần đuôi giữ nguyên y hệt câu gốc.</p><p><strong>Bước 4 (Đáp án hoàn chỉnh):</strong> ... many students taking part in the event.</p>" },
                    { q: "2. They have lived here for two years.<br>➔ They moved [___]", ans: ["here two years ago.", "here two years ago", "here two years ago "], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Họ ĐÃ SỐNG ở đây được 2 năm rồi. = Họ ĐÃ CHUYỂN ĐẾN đây từ 2 năm trước.</p><p><strong>Bước 2 (Phân tích cấu trúc):</strong> Đây là dạng bài kinh điển: Chuyển đổi giữa thì <strong>Hiện tại hoàn thành</strong> (chỉ khoảng thời gian hành động diễn ra) sang <strong>Quá khứ đơn</strong> (chỉ mốc thời gian hành động bắt đầu).</p><p><strong>Bước 3 (Công thức):</strong> S + have/has + V-P2 + <strong>FOR + Khoảng thời gian</strong> = S + V-quá khứ + <strong>Khoảng thời gian + AGO</strong>.</p><p><strong>Bước 4 (Cách biến đổi):</strong> 'have lived here' (đã sống ở đây) thay bằng 'moved here' (đã chuyển đến đây). Từ 'for two years' (được 2 năm) thay bằng 'two years ago' (vào 2 năm trước). -> Đáp án: <strong>here two years ago.</strong></p>" },
                    { q: "3. You should turn unwanted lights off, or you will waste a lot of electricity.<br>➔ If [___]", ans: ["you don't turn unwanted lights off, you will waste a lot of electricity.", "you do not turn unwanted lights off, you will waste a lot of electricity."], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Bạn NÊN tắt các bóng đèn không cần thiết đi, NẾU KHÔNG bạn SẼ lãng phí rất nhiều điện. = NẾU bạn KHÔNG tắt các bóng đèn đi, bạn SẼ lãng phí rất nhiều điện.</p><p><strong>Bước 2 (Phân tích cấu trúc):</strong> Cấu trúc <strong>'Câu Mệnh lệnh/Khuyên bảo + OR + Tương lai đơn'</strong> mang ý nghĩa đe dọa/cảnh báo (Làm X đi, nếu không Y sẽ xảy ra). Để chuyển sang câu điều kiện <strong>'If'</strong> (loại 1), ta cần đưa vế đầu tiên về dạng PHỦ ĐỊNH (Nếu bạn KHÔNG làm X).</p><p><strong>Bước 3 (Cách biến đổi):</strong> Bỏ từ 'should', mượn trợ động từ phủ định 'don't' cho chủ ngữ 'you'. Bỏ chữ 'or' ở giữa và biến thành dấu phẩy. Vế sau giữ nguyên hoàn toàn.</p><p><strong>Bước 4 (Đáp án hoàn chỉnh):</strong> ... you don't turn unwanted lights off, you will waste a lot of electricity.</p>" },
                    { q: "4. Let's write about the three Rs?<br>➔ Why [___]", ans: ["not write about the three Rs?", "don't we write about the three Rs?", "not write about the three Rs", "don't we write about the three Rs"], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Hãy CÙNG NHAU viết về quy tắc 3 chữ R đi! = TẠI SAO CHÚNG TA KHÔNG viết về quy tắc 3 chữ R nhỉ?</p><p><strong>Bước 2 (Phân tích cấu trúc):</strong> Cả 2 mẫu câu này đều dùng để Đưa ra Lời đề nghị/Rủ rê (Making Suggestions).</p><p><strong>Bước 3 (Công thức tương đương):</strong> <strong>Let's + V-nguyên thể</strong> = Bằng với: <strong>Why don't we + V-nguyên thể?</strong> Hoặc có thể dùng: <strong>Why not + V-nguyên thể?</strong></p><p><strong>Bước 4 (Cách biến đổi):</strong> Bỏ 'Let's'. Điền cụm 'don't we' hoặc 'not' phía sau chữ Why đã cho. Giữ nguyên động từ 'write' và phần đuôi. Đừng quên dấu chấm hỏi. -> Đáp án: <strong>don't we write about the three Rs?</strong></p>" },
                    { q: "5. Learning about recycling is fun.<br>➔ It's [___]", ans: ["fun to learn about recycling.", "fun to learn about recycling", "fun to learn about recycling "], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> VIỆC HỌC về tái chế RẤT LÀ VUI. = RẤT LÀ VUI KHI ĐƯỢC HỌC về tái chế.</p><p><strong>Bước 2 (Phân tích cấu trúc):</strong> Đưa V-ing (Learning) lên làm Chủ ngữ là cách nói bình thường. Tiếng Anh có một cách nói trang trọng hơn là dùng <strong>Chủ ngữ giả 'It'</strong> để đưa Tính từ lên trước nhấn mạnh.</p><p><strong>Bước 3 (Công thức biến đổi):</strong> <strong>V-ing + is + Adj</strong> (Tính từ) => Biến đổi thành: <strong>It is (It's) + Adj + TO V-nguyên thể</strong>.</p><p><strong>Bước 4 (Cách làm):</strong> Đưa tính từ 'fun' lên ngay sau 'It's'. Biến 'Learning' thành dạng có 'to' là 'to learn'. Chép nguyên phần đuôi. -> Đáp án: <strong>fun to learn about recycling.</strong></p>" },
                    { q: "6. Plastic bags are cheaper than reusable bags.<br>➔ Reusable bags are [___]", ans: ["more expensive than plastic bags.", "more expensive than plastic bags"], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Túi nilon RẺ HƠN túi dùng nhiều lần. = Túi dùng nhiều lần ĐẮT HƠN túi nilon.</p><p><strong>Bước 2 (Phân tích cấu trúc):</strong> Đây là dạng bài đảo ngược <strong>Câu so sánh hơn</strong>. Khi đảo chủ thể B lên thay thế cho A, ta bắt buộc phải sử dụng Tính từ TRÁI NGHĨA.</p><p><strong>Bước 3 (Tìm tính từ):</strong> Tính từ gốc là 'cheap' (rẻ) -> Trái nghĩa của nó là <strong>'expensive' (đắt)</strong>. Lưu ý 'expensive' là tính từ dài có 3 âm tiết (ex-pen-sive), nên so sánh hơn của nó phải dùng chữ <strong>'more'</strong> đằng trước.</p><p><strong>Bước 4 (Cách làm):</strong> Đổi 'cheaper than' thành 'more expensive than', rồi cho cụm 'plastic bags' xuống cuối. -> Đáp án: <strong>more expensive than plastic bags.</strong></p>" },
                    { q: "7. It's not good to throw old clothes away.<br>➔ You [___]", ans: ["shouldn't throw old clothes away.", "should not throw old clothes away.", "shouldn't throw old clothes away"], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Sẽ KHÔNG TỐT KHI vứt quần áo cũ đi. = BẠN KHÔNG NÊN vứt quần áo cũ đi.</p><p><strong>Bước 2 (Phân tích cấu trúc):</strong> Cụm <strong>'It's not good to V'</strong> (Làm gì đó thì không tốt đâu) là một cách đưa ra lời khuyên gián tiếp. Cách đưa ra lời khuyên trực tiếp thường dùng động từ khuyết thiếu <strong>'Should' (nên)</strong>.</p><p><strong>Bước 3 (Công thức biến đổi):</strong> It's not good to + V = <strong>You shouldn't + V (Bạn không nên làm gì)</strong>.</p><p><strong>Bước 4 (Cách làm):</strong> Điền từ 'shouldn't'. Bỏ từ 'to' ở câu gốc đi. Hạ cụm động từ 'throw old clothes away' xuống phía sau. -> Đáp án: <strong>shouldn't throw old clothes away.</strong></p>" },
                    { q: "8. Remember to turn the tap off when you are brushing your teeth.<br>➔ Don't [___]", ans: ["forget to turn the tap off when you are brushing your teeth.", "forget to turn the tap off when you are brushing your teeth"], exp: "<h4>Giải thích CHI TIẾT 4 BƯỚC:</h4><p><strong>Bước 1 (Dịch nghĩa):</strong> Hãy NHỚ tắt vòi nước khi bạn đánh răng. = ĐỪNG QUÊN tắt vòi nước khi bạn đánh răng.</p><p><strong>Bước 2 (Phân tích cấu trúc):</strong> 'Remember' và 'Forget' là cặp động từ trái nghĩa kinh điển. Để chuyển đổi ý nghĩa giữ nguyên, Khẳng định của Remember phải đi với Phủ định của Forget.</p><p><strong>Bước 3 (Công thức biến đổi):</strong> <strong>Remember + To V</strong> (Nhớ phải làm gì) = <strong>Don't forget + To V</strong> (Đừng quên làm gì).</p><p><strong>Bước 4 (Cách làm):</strong> Đề đã cho 'Don't', ta chỉ cần thêm chữ 'forget' thay cho chữ 'Remember'. Toàn bộ phần phía sau từ chữ 'to turn...' chép y nguyên xuống. -> Đáp án: <strong>forget to turn the tap off when you are brushing your teeth.</strong></p>" }
                ]
            }
        ];

        const container = document.getElementById('quiz-container');
        let totalQuestionsCount = 0;
        let correctAnswersCount = 0;

        function renderQuiz() {
            quizData.forEach((section, sIndex) => {
                const secDiv = document.createElement('div');
                secDiv.innerHTML = `<h2 class="section-title">${section.title}</h2>`;
                if(section.desc) secDiv.innerHTML += section.desc;
                
                if (section.type === "mcq") {
                    section.questions.forEach((q, qIndex) => {
                        totalQuestionsCount++;
                        const qCard = document.createElement('div');
                        qCard.className = 'card';
                        
                        const shuffledOptions = shuffleArray([...q.options]);
                        let optionsHTML = '';
                        shuffledOptions.forEach((opt) => {
                            optionsHTML += `<button class="btn-option" onclick="handleMCQ(this, ${opt.c}, 'exp_${sIndex}_${qIndex}')">${opt.t}</button>`;
                        });

                        qCard.innerHTML = `
                            <div class="question-text">${q.q}</div>
                            <div class="options-grid">${optionsHTML}</div>
                            <div class="explanation" id="exp_${sIndex}_${qIndex}">${q.exp}</div>
                        `;
                        secDiv.appendChild(qCard);
                    });
                }
                else if (section.type === "fill_blanks") {
                    section.questions.forEach((q, qIndex) => {
                        const blankCount = (q.q.match(/\[___\]/g) || []).length;
                        totalQuestionsCount += blankCount; 
                        
                        const qCard = document.createElement('div');
                        qCard.className = 'card';
                        
                        let parsedQ = q.q;
                        let inputIds = [];
                        for(let i=0; i<blankCount; i++) {
                            const inId = `in_${sIndex}_${qIndex}_${i}`;
                            inputIds.push(inId);
                            const cssClass = sIndex === 8 ? "fill-input textarea-input" : "fill-input"; // Bài Rewrite dài hơn
                            parsedQ = parsedQ.replace('[___]', `<input type="text" autocomplete="off" class="${cssClass}" id="${inId}">`);
                        }

                        const idsStr = inputIds.join(',');
                        qCard.innerHTML = `
                            <div class="question-text">${parsedQ}</div>
                            <button class="btn-check" onclick="handleFill(${sIndex}, ${qIndex}, '${idsStr}', 'exp_${sIndex}_${qIndex}')">Kiểm tra Đáp án</button>
                            <div class="explanation" id="exp_${sIndex}_${qIndex}">${q.exp}</div>
                        `;
                        secDiv.appendChild(qCard);
                    });
                }
                else if (section.type === "matching") {
                    totalQuestionsCount += section.itemsL.length;
                    const qCard = document.createElement('div');
                    qCard.className = 'card';
                    
                    const shuffledR = shuffleArray([...section.itemsR]);
                    let htmlL = '', htmlR = '';
                    section.itemsL.forEach(item => {
                        htmlL += `<div class="match-item" id="${item.id}" onclick="handleMatchL(this)">${item.text}</div>`;
                    });
                    shuffledR.forEach(item => {
                        htmlR += `<div class="match-item" id="${item.id}" data-match="${item.matchId}" onclick="handleMatchR(this, '${sIndex}')">${item.text}</div>`;
                    });

                    qCard.innerHTML = `
                        <div class="matching-container">
                            <div class="match-col">${htmlL}</div>
                            <div class="match-col">${htmlR}</div>
                        </div>
                        <div class="match-translation-box" id="trans_box_${sIndex}"></div>
                    `;
                    secDiv.appendChild(qCard);
                    window[`trans_${sIndex}`] = section.translations;
                }

                container.appendChild(secDiv);
            });
            document.getElementById('total-display').innerText = totalQuestionsCount;
        }

        function handleMCQ(btn, isCorrect, expId) {
            const siblings = btn.parentElement.children;
            for(let b of siblings) { b.disabled = true; }
            if (isCorrect) {
                btn.classList.add('correct'); playSound('correct'); fireConfetti(); updateScore();
            } else {
                btn.classList.add('wrong'); playSound('wrong');
                for(let b of siblings) {
                    if(b.getAttribute('onclick').includes('true')) {
                        b.style.borderColor = "var(--success)"; b.style.borderWidth = "4px";
                    }
                }
            }
            document.getElementById(expId).style.display = 'block';
        }

        function handleFill(sIndex, qIndex, idsStr, expId) {
            const q = quizData[sIndex].questions[qIndex];
            const ids = idsStr.split(',');
            
            let allCorrect = true;
            ids.forEach((id) => {
                const el = document.getElementById(id);
                if(el.disabled) return; 
                
                const val = el.value.trim().toLowerCase().replace(/\s+/g, ' ');
                const isMatch = q.ans.some(a => a.trim().toLowerCase().replace(/\s+/g, ' ') === val);

                el.disabled = true;
                if (isMatch) {
                    el.style.borderColor = 'var(--success)'; 
                    el.style.backgroundColor = '#e8f8f5';
                    el.style.color = 'var(--success)';
                    updateScore();
                } else {
                    el.style.borderColor = 'var(--danger)'; 
                    el.style.backgroundColor = '#fdf2f2';
                    el.style.color = 'var(--danger)';
                    el.style.animation = 'shake 0.4s';
                    el.value = val ? `${val} ❌ -> Đáp án: ${q.ans[0]}` : `❌ -> Gợi ý: ${q.ans[0]}`;
                    allCorrect = false;
                }
            });

            event.target.disabled = true;
            event.target.style.opacity = '0.5';

            if (allCorrect) { playSound('correct'); fireConfetti(); } 
            else { playSound('wrong'); }
            
            document.getElementById(expId).style.display = 'block';
        }

        let selectedMatchL = null;
        function handleMatchL(el) {
            if (el.classList.contains('matched')) return;
            if(selectedMatchL) selectedMatchL.classList.remove('selected');
            selectedMatchL = el;
            el.classList.add('selected');
            playSound('correct'); 
        }

        function handleMatchR(el, sIndex) {
            if (el.classList.contains('matched') || !selectedMatchL) return;

            const targetId = el.getAttribute('data-match');
            if (selectedMatchL.id === targetId) {
                selectedMatchL.classList.remove('selected');
                selectedMatchL.classList.add('matched');
                el.classList.add('matched');
                playSound('correct'); fireConfetti(); updateScore();
                
                const transBox = document.getElementById(`trans_box_${sIndex}`);
                transBox.style.display = 'block';
                const transText = window[`trans_${sIndex}`][selectedMatchL.id];
                transBox.innerHTML = `<p style="margin-bottom:8px; font-size: 1.1rem; color: #2c3e50;">${transText}</p>` + transBox.innerHTML;
                
                selectedMatchL = null;
            } else {
                el.style.animation = 'none'; el.offsetHeight; 
                el.style.animation = 'shake 0.4s'; playSound('wrong');
                selectedMatchL.classList.remove('selected'); selectedMatchL = null;
            }
        }

        function updateScore() {
            correctAnswersCount++;
            document.getElementById('score-display').innerText = correctAnswersCount;
        }

        function finishQuiz() {
            const pct = Math.round((correctAnswersCount / totalQuestionsCount) * 100);
            let message = "";
            if (pct === 100) message = "ĐIỂM TUYỆT ĐỐI! Bạn quá xuất sắc! 🏆";
            else if (pct >= 80) message = "Rất tuyệt vời! Kiến thức rất vững chắc! 🌟";
            else if (pct >= 50) message = "Làm tốt lắm! Nhớ xem kỹ các phần giải thích nhé! 👍";
            else message = "Không sao! Đọc kỹ giải thích CỰC KỲ CHI TIẾT của cô Mai An để rút kinh nghiệm nhé! 💪";

            alert(`🎉 TỔNG KẾT ĐIỂM 🎉\nBạn làm đúng: ${correctAnswersCount}/${totalQuestionsCount} câu (${pct}%)\n\nNhận xét: ${message}`);
            if(pct >= 80) { for(let i=0; i<6; i++) setTimeout(fireConfetti, i*250); playSound('correct'); }
        }

        renderQuiz();
    </script>
</body>
</html>
