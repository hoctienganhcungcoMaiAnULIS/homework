<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Practice - Giáo viên tạo: Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-color: #8854C0; /* Hồng nhạt / Tím pastel */
            --secondary-color: #00C9A7; /* Xanh ngọc */
            --correct-color: #00D26A;
            --incorrect-color: #FF4757;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --border-glass: rgba(255, 255, 255, 0.18);
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #333;
            /* Dynamic Background SVG - Chủ đề Climbing/Adventure */
            background-image: 
                url("data:image/svg+xml,%3Csvg width='100vw' height='100vh' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10%25' y='20%25' font-size='60' opacity='0.3'%3E🧗‍♂️%3C/text%3E%3Ctext x='85%25' y='15%25' font-size='70' opacity='0.3'%3E⛰️%3C/text%3E%3Ctext x='20%25' y='80%25' font-size='50' opacity='0.3'%3E🧗‍♀️%3C/text%3E%3Ctext x='75%25' y='70%25' font-size='65' opacity='0.3'%3E🎯%3C/text%3E%3Ctext x='50%25' y='45%25' font-size='40' opacity='0.2'%3E🧗‍♂️%3C/text%3E%3C/svg%3E"),
                radial-gradient(circle at top left, var(--secondary-color), transparent 70%),
                radial-gradient(circle at bottom right, var(--primary-color), transparent 70%);
            background-color: #f0f4f8;
            background-attachment: fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow-glass);
            padding: 40px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .subtitle {
            text-align: center;
            color: #555;
            font-weight: 600;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .audio-section {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            text-align: center;
            border: 2px dashed var(--secondary-color);
        }

        .audio-section p {
            font-weight: 700;
            color: var(--primary-color);
            margin-top: 0;
        }

        audio {
            width: 100%;
            max-width: 500px;
            outline: none;
            border-radius: 30px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border-left: 6px solid var(--secondary-color);
        }

        .question-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .question-text {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            background: #fff;
            border: 2px solid #e1e8ed;
            border-radius: 15px;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .option:hover:not(.locked) {
            transform: scale(1.02);
            border-color: var(--secondary-color);
            box-shadow: 0 6px 12px rgba(0, 201, 167, 0.2);
        }

        .option.locked {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option.correct {
            background-color: #e8f9ee;
            border-color: var(--correct-color);
            color: #008a45;
            opacity: 1;
            box-shadow: 0 6px 15px rgba(0, 210, 106, 0.3);
            font-weight: 800;
        }

        .option.incorrect {
            background-color: #ffeef0;
            border-color: var(--incorrect-color);
            color: #cc001b;
            opacity: 1;
        }

        /* Hiệu ứng rung lắc khi sai */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .shake-animation {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        .explanation {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            border: 1px solid #dee2e6;
            animation: slideDown 0.4s ease forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .expl-step {
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .expl-step:last-child {
            margin-bottom: 0;
        }

        .expl-title {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .keyword {
            color: red;
            font-weight: 800;
        }

        .submit-btn {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 40px auto 0;
            padding: 16px 32px;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(136, 84, 192, 0.3);
            transition: all 0.3s ease;
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 25px rgba(136, 84, 192, 0.4);
        }

        /* Modal styling */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-score {
            font-size: 48px;
            font-weight: 900;
            color: var(--primary-color);
            margin: 10px 0;
        }

        .modal-img {
            width: 100%;
            max-width: 300px;
            border-radius: 16px;
            margin: 20px auto;
            display: block;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .close-btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }

        .close-btn:hover {
            background: #00b395;
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            .question-card { padding: 15px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Listening Practice</h1>
    <div class="subtitle">Giáo viên tạo: Ms Mai An ULIS | B1 Preliminary (PET)</div>

    <div class="audio-section">
        <p>🎧 Bấm Play để nghe đoạn hội thoại (Part 2) 🎧</p>
        <audio controls>
            <source src="https://englishpracticetest.net/wp-content/uploads/2022/11/b1-test-2-2.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ thẻ audio.
        </audio>
    </div>

    <div id="quiz-container">
        </div>

    <button class="submit-btn" onclick="submitQuiz()">Nộp Bài</button>
</div>

<div class="modal-overlay" id="resultModal">
    <div class="modal-content">
        <h2 style="color: #2c3e50; font-size: 24px; margin-top: 0;">Kết Quả Của Bạn!</h2>
        <div class="modal-score" id="scoreDisplay">0/6</div>
        <p id="feedbackText" style="font-size: 18px; font-weight: 600; color: #555;"></p>
        <img id="memeImg" class="modal-img" src="" alt="Meme cảm xúc">
        <button class="close-btn" onclick="closeModal()">Xem Lại Bài Chữa</button>
    </div>
</div>

<script>
    // Audio Context (Web Audio API) để tạo âm thanh trực tiếp, không lo link hỏng
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playCorrectSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime); // Tần số cao, nghe vui tai (Ding)
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    function playIncorrectSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime); // Tần số trầm (Téo tèo tèo)
        osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.4);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    }

    // Dữ liệu bài kiểm tra SIÊU CHI TIẾT
    const quizData = [
        {
            id: 8,
            question: "8. Simon’s mum decided to take him to the climbing centre because",
            options: [
                { id: "A", text: "she had enjoyed going there.", isCorrect: true },
                { id: "B", text: "her friend had recommended it.", isCorrect: false },
                { id: "C", text: "Simon had been there with his school.", isCorrect: false }
            ],
            explanation: `
                <div class="expl-step"><span class="expl-title">Bước 1: Dịch câu hỏi & Đáp án</span><br>
                Mẹ của Simon quyết định đưa cậu ấy đến trung tâm leo núi vì...<br>
                A. bà ấy đã thích thú khi đến đó.<br>
                B. bạn của bà ấy đã giới thiệu nó.<br>
                C. Simon đã đến đó cùng trường.</div>
                
                <div class="expl-step"><span class="expl-title" style="background: #e67e22;">Bước 2: Audio Script & Dịch nghĩa</span><br>
                <strong>Simon:</strong> "...Then recently she went with a friend and <span class="keyword">tried it herself – and she loved it!</span> So after that she wanted to take me, too."<br>
                <em>Dịch: "...Sau đó, gần đây bà ấy đi cùng một người bạn và <span class="keyword">tự mình trải nghiệm - và bà ấy rất thích nó!</span> Vì vậy sau lần đó bà ấy muốn đưa tôi đi cùng."</em></div>

                <div class="expl-step"><span class="expl-title" style="background: var(--correct-color);">Bước 3: Tại sao đúng?</span><br>
                Đáp án <strong>A</strong> đúng vì Simon khẳng định mẹ cậu ấy đã tự thử nghiệm và cực kỳ yêu thích nó (<strong>loved it = enjoyed going there</strong>), dẫn đến quyết định đưa cậu đi cùng.</div>

                <div class="expl-step"><span class="expl-title" style="background: var(--incorrect-color);">Bước 4: Phân tích bẫy (Distractors)</span><br>
                - <strong>Loại C:</strong> Simon nhắc đến trường học ("last year my school had a trip... but I missed it because I was sick") - Cậu ấy bị ốm và bỏ lỡ chuyến đi của trường, nên việc "Simon đã đến đó cùng trường" là SAI thông tin.<br>
                - <strong>Loại B:</strong> Người mẹ đi "cùng" một người bạn (went with a friend), chứ người bạn không đóng vai trò "recommend" (khuyên/giới thiệu) làm lý do chính thức. Lý do chính là mẹ tự trải nghiệm và thấy thích.</div>
            `
        },
        {
            id: 9,
            question: "9. Before he went to the centre, Simon was",
            options: [
                { id: "A", text: "worried about going climbing there.", isCorrect: false },
                { id: "B", text: "interested in seeing the climbing wall.", isCorrect: false },
                { id: "C", text: "disappointed to hear it was all indoors.", isCorrect: true }
            ],
            explanation: `
                <div class="expl-step"><span class="expl-title">Bước 1: Dịch câu hỏi & Đáp án</span><br>
                Trước khi đến trung tâm, Simon cảm thấy...<br>
                A. lo lắng về việc leo núi ở đó.<br>
                B. hứng thú muốn xem bức tường leo núi.<br>
                C. thất vọng khi nghe tin nó hoàn toàn ở trong nhà.</div>
                
                <div class="expl-step"><span class="expl-title" style="background: #e67e22;">Bước 2: Audio Script & Dịch nghĩa</span><br>
                <strong>Simon:</strong> "I was really looking forward to it. But then my mum explained that the wall was inside. <span class="keyword">I wasn’t so interested when I heard that – I prefer being outside.</span>"<br>
                <em>Dịch: "Tôi đã thực sự rất mong chờ nó. Nhưng rồi mẹ tôi giải thích rằng bức tường nằm ở bên trong nhà. <span class="keyword">Tôi đã không còn hứng thú lắm khi nghe điều đó - tôi thích ở ngoài trời hơn.</span>"</em></div>

                <div class="expl-step"><span class="expl-title" style="background: var(--correct-color);">Bước 3: Tại sao đúng?</span><br>
                Đáp án <strong>C</strong> đúng vì thái độ "wasn't so interested" (không hứng thú lắm) và "prefer being outside" (thích ngoài trời hơn) hoàn toàn đồng nghĩa với sự thất vọng (<strong>disappointed</strong>) khi biết bức tường nằm trong nhà (indoors).</div>

                <div class="expl-step"><span class="expl-title" style="background: var(--incorrect-color);">Bước 4: Phân tích bẫy (Distractors)</span><br>
                - <strong>Loại A:</strong> Cậu ấy không hề lo lắng (worried). Ngược lại, cậu ấy tự tin vì "I knew I was OK at climbing" (tôi biết mình leo núi khá ổn).<br>
                - <strong>Loại B:</strong> Lúc đầu cậu ấy mong chờ (looking forward to it), nhưng trạng thái cảm xúc cuối cùng TRƯỚC khi đi (sau khi nghe mẹ giải thích) là mất hứng thú, chứ không phải háo hức muốn xem bức tường.</div>
            `
        },
        {
            id: 10,
            question: "10. Simon says that at the centre there were",
            options: [
                { id: "A", text: "lots of people when it opened.", isCorrect: false },
                { id: "B", text: "many different types of people.", isCorrect: true },
                { id: "C", text: "no other people his age.", isCorrect: false }
            ],
            explanation: `
                <div class="expl-step"><span class="expl-title">Bước 1: Dịch câu hỏi & Đáp án</span><br>
                Simon nói rằng tại trung tâm có...<br>
                A. rất nhiều người khi nó vừa mở cửa.<br>
                B. nhiều kiểu người khác nhau.<br>
                C. không có người nào khác cùng tuổi cậu ấy.</div>
                
                <div class="expl-step"><span class="expl-title" style="background: #e67e22;">Bước 2: Audio Script & Dịch nghĩa</span><br>
                <strong>Simon:</strong> "I’d expected it’d be mainly young people there, but <span class="keyword">there were people of all ages – serious climbers, mums with five-year olds … and teenagers like me!</span>"<br>
                <em>Dịch: "Tôi đã đinh ninh rằng ở đó chủ yếu sẽ là người trẻ, nhưng <span class="keyword">thực tế có người ở mọi lứa tuổi - những người leo núi chuyên nghiệp, các bà mẹ với đứa trẻ 5 tuổi ... và cả những thiếu niên như tôi!</span>"</em></div>

                <div class="expl-step"><span class="expl-title" style="background: var(--correct-color);">Bước 3: Tại sao đúng?</span><br>
                Đáp án <strong>B</strong> đúng. Cụm từ "people of all ages" (người ở mọi lứa tuổi) cùng với việc liệt kê chuyên gia, các bà mẹ, trẻ con, thanh thiếu niên chính là minh chứng cho <strong>many different types of people</strong> (nhiều kiểu người khác nhau).</div>

                <div class="expl-step"><span class="expl-title" style="background: var(--incorrect-color);">Bước 4: Phân tích bẫy (Distractors)</span><br>
                - <strong>Loại A:</strong> Sai hoàn toàn. Script nói rõ: "...the centre had just opened, so it was <span class="keyword">quiet</span>" (vừa mở cửa nên rất vắng/yên tĩnh). Người ta chỉ đến đông vào trễ hơn trong buổi sáng.<br>
                - <strong>Loại C:</strong> Sai vì Simon xác nhận có cả "teenagers like me" (những thiếu niên giống cậu ấy), tức là có người cùng trang lứa.</div>
            `
        },
        {
            id: 11,
            question: "11. What did Simon think about the climbing wall?",
            options: [
                { id: "A", text: "He thought it looked very high.", isCorrect: false },
                { id: "B", text: "He was afraid he might fall.", isCorrect: false },
                { id: "C", text: "He found the foot holes helpful.", isCorrect: true }
            ],
            explanation: `
                <div class="expl-step"><span class="expl-title">Bước 1: Dịch câu hỏi & Đáp án</span><br>
                Simon nghĩ gì về bức tường leo núi?<br>
                A. Cậu ấy nghĩ nó trông rất cao.<br>
                B. Cậu ấy sợ mình có thể bị ngã.<br>
                C. Cậu ấy thấy các lỗ đặt chân rất hữu ích.</div>
                
                <div class="expl-step"><span class="expl-title" style="background: #e67e22;">Bước 2: Audio Script & Dịch nghĩa</span><br>
                <strong>Simon:</strong> "<span class="keyword">There were lots of really useful holes all over it, too, to put your feet in</span> – green ones for an easy climb, red for more difficult."<br>
                <em>Dịch: "<span class="keyword">Có rất nhiều những cái lỗ cực kỳ hữu ích trên khắp bức tường, để bạn đặt chân vào</span> - màu xanh cho mức leo dễ, màu đỏ cho mức khó hơn."</em></div>

                <div class="expl-step"><span class="expl-title" style="background: var(--correct-color);">Bước 3: Tại sao đúng?</span><br>
                Đáp án <strong>C</strong> chính xác. Từ "useful" (hữu ích) đồng nghĩa trực tiếp với từ <strong>helpful</strong> trong đáp án C, áp dụng cho "holes... to put your feet in" (lỗ để đặt chân).</div>

                <div class="expl-step"><span class="expl-title" style="background: var(--incorrect-color);">Bước 4: Phân tích bẫy (Distractors)</span><br>
                - <strong>Loại A:</strong> Bẫy kinh điển của Listening! Simon nói: "I’d <span class="keyword">imagined</span> it would look high... but <span class="keyword">actually it didn’t seem that far</span> to the top." (Từng tưởng tượng nó cao, nhưng THỰC TẾ nhìn nó không xa lắm tới đỉnh). Nghĩa là cảm nhận thực tế của cậu ấy là nó không cao.<br>
                - <strong>Loại B:</strong> Simon không sợ ngã. Cậu nói: "luckily it had rocks of different sizes... So there was <span class="keyword">little chance of falling off</span>" (Rất ít khả năng bị ngã).</div>
            `
        },
        {
            id: 12,
            question: "12. Why was Simon unhappy with his first climb?",
            options: [
                { id: "A", text: "He was slower than everyone else.", isCorrect: true },
                { id: "B", text: "He found it hurt his arms.", isCorrect: false },
                { id: "C", text: "He didn’t get to the top.", isCorrect: false }
            ],
            explanation: `
                <div class="expl-step"><span class="expl-title">Bước 1: Dịch câu hỏi & Đáp án</span><br>
                Tại sao Simon không vui với lần leo đầu tiên của mình?<br>
                A. Cậu ấy chậm hơn tất cả những người khác.<br>
                B. Cậu ấy thấy nó làm đau tay mình.<br>
                C. Cậu ấy không leo được lên tới đỉnh.</div>
                
                <div class="expl-step"><span class="expl-title" style="background: #e67e22;">Bước 2: Audio Script & Dịch nghĩa</span><br>
                <strong>Simon:</strong> "I thought I’d soon get to the top, but <span class="keyword">I was the last to get there</span>, so I was annoyed with myself."<br>
                <em>Dịch: "Tôi đã nghĩ mình sẽ sớm leo lên tới đỉnh, nhưng <span class="keyword">tôi lại là người cuối cùng lên được đó</span>, nên tôi khá bực bội với bản thân."</em></div>

                <div class="expl-step"><span class="expl-title" style="background: var(--correct-color);">Bước 3: Tại sao đúng?</span><br>
                Đáp án <strong>A</strong> đúng. Việc Simon là người "the last to get there" (lên đỉnh cuối cùng) chính là Paraphrase của <strong>slower than everyone else</strong> (chậm hơn mọi người). Vì thế cậu ấy thấy bực (annoyed = unhappy).</div>

                <div class="expl-step"><span class="expl-title" style="background: var(--incorrect-color);">Bước 4: Phân tích bẫy (Distractors)</span><br>
                - <strong>Loại C:</strong> Sai vì cậu ấy CÓ leo được lên đỉnh ("I was the last to <span class="keyword">get there</span>" - lên được nhưng lên muộn nhất).<br>
                - <strong>Loại B:</strong> Huấn luyện viên có cảnh báo việc đau tay ("The instructor warned us it can be painful for your arms"), nhưng Simon nói tiếp: "<span class="keyword">but I didn’t notice</span>" (nhưng tôi chả để ý/chả thấy đau).</div>
            `
        },
        {
            id: 13,
            question: "13. What does Simon feel he learnt from climbing at the centre?",
            options: [
                { id: "A", text: "how to improve his fitness", isCorrect: false },
                { id: "B", text: "to think before he does something", isCorrect: true },
                { id: "C", text: "the best way to work with other people", isCorrect: false }
            ],
            explanation: `
                <div class="expl-step"><span class="expl-title">Bước 1: Dịch câu hỏi & Đáp án</span><br>
                Simon cảm thấy cậu ấy học được gì từ việc leo núi ở trung tâm?<br>
                A. cách để cải thiện thể lực của mình<br>
                B. suy nghĩ trước khi làm một việc gì đó<br>
                C. cách tốt nhất để làm việc cùng người khác</div>
                
                <div class="expl-step"><span class="expl-title" style="background: #e67e22;">Bước 2: Audio Script & Dịch nghĩa</span><br>
                <strong>Simon:</strong> "And when I was climbing I had to <span class="keyword">think carefully where to put my feet before I moved</span> – so that’s <span class="keyword">helped me to think first before I do things.</span>"<br>
                <em>Dịch: "Và khi tôi đang leo, tôi phải <span class="keyword">suy nghĩ thật kỹ xem nên đặt chân ở đâu trước khi tôi di chuyển</span> - thế nên điều đó đã <span class="keyword">giúp tôi biết suy nghĩ trước khi làm mọi việc.</span>"</em></div>

                <div class="expl-step"><span class="expl-title" style="background: var(--correct-color);">Bước 3: Tại sao đúng?</span><br>
                Đáp án <strong>B</strong> đúng. Câu "helped me to think first before I do things" trong bài khớp 100% với đáp án <strong>to think before he does something</strong>.</div>

                <div class="expl-step"><span class="expl-title" style="background: var(--incorrect-color);">Bước 4: Phân tích bẫy (Distractors)</span><br>
                - <strong>Loại A:</strong> Simon nhận ra rằng cậu ấy có thể lực khỏe hơn bạn bè ("It’s shown me that I am fitter than my friends"), đây là một "phát hiện" về tình trạng hiện tại, chứ không phải bài học "cách để CẢI THIỆN (improve)" thể lực.<br>
                - <strong>Loại C:</strong> Simon thấy tuyệt vời khi ở cùng những người có chung sở thích ("great to be with other people"), nhưng không hề nhắc đến kỹ năng làm việc nhóm (work with other people). Môn leo núi là cậu tự leo một mình.</div>

        }
    ];

    let currentScore = 0;
    let questionsAnswered = 0;

    // Thuật toán xáo trộn mảng (Fisher-Yates)
    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // Render giao diện
    function initQuiz() {
        const container = document.getElementById('quiz-container');
        
        quizData.forEach((q, index) => {
            // Xáo trộn vị trí các đáp án (A,B,C hiển thị lộn xộn nhưng logic chấm đúng sai không đổi)
            const shuffledOptions = shuffleArray([...q.options]);

            let html = `
                <div class="question-card" id="q-card-${index}">
                    <div class="question-text">${q.question}</div>
                    <div class="options-container" id="opts-${index}">
            `;

            shuffledOptions.forEach(opt => {
                // Encode thuộc tính thành chuỗi an toàn
                const isCorrect = opt.isCorrect ? "true" : "false";
                html += `
                    <div class="option" onclick="selectOption(this, ${index}, ${isCorrect})">
                        ${opt.id}. ${opt.text}
                    </div>
                `;
            });

            html += `
                    </div>
                    <div class="explanation" id="expl-${index}">${q.explanation}</div>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    // Xử lý khi click vào đáp án
    function selectOption(element, qIndex, isCorrect) {
        const container = document.getElementById(`opts-${qIndex}`);
        const explanation = document.getElementById(`expl-${qIndex}`);
        const allOptions = container.querySelectorAll('.option');

        // Nếu đã trả lời rồi thì không cho bấm nữa
        if (container.classList.contains('answered')) return;

        // Đánh dấu đã trả lời
        container.classList.add('answered');
        questionsAnswered++;

        // Khóa tất cả các lựa chọn
        allOptions.forEach(opt => opt.classList.add('locked'));

        if (isCorrect) {
            // Xử lý khi ĐÚNG
            element.classList.add('correct');
            currentScore++;
            playCorrectSound();
            
            // Bắn pháo giấy nhỏ tại vị trí nút click
            const rect = element.getBoundingClientRect();
            const x = (rect.left + rect.width / 2) / window.innerWidth;
            const y = (rect.top + rect.height / 2) / window.innerHeight;
            confetti({
                particleCount: 50,
                spread: 60,
                origin: { x: x, y: y },
                colors: ['#00D26A', '#8854C0', '#00C9A7']
            });

        } else {
            // Xử lý khi SAI
            element.classList.add('incorrect');
            element.classList.add('shake-animation');
            playIncorrectSound();
            
            // Highlight đáp án đúng để học sinh biết ngay
            const correctOptText = quizData[qIndex].options.find(o => o.isCorrect).text;
            allOptions.forEach(opt => {
                if (opt.innerText.includes(correctOptText)) {
                    opt.classList.add('correct');
                    // Làm mờ viền một chút để biết đây là gợi ý chứ ko phải user chọn
                    opt.style.opacity = '0.8'; 
                }
            });
        }

        // Hiện khung giải thích siêu chi tiết ngay lập tức
        explanation.style.display = 'block';
    }

    // Xử lý nộp bài & Hiện Modal
    function submitQuiz() {
        if (questionsAnswered < quizData.length) {
            const confirmSubmit = confirm(`Bạn mới làm ${questionsAnswered}/${quizData.length} câu. Bạn có chắc chắn muốn nộp bài không?`);
            if (!confirmSubmit) return;
        }

        const percentage = Math.round((currentScore / quizData.length) * 100);
        document.getElementById('scoreDisplay').innerText = `${currentScore} / ${quizData.length} (${percentage}%)`;

        const memeImg = document.getElementById('memeImg');
        const feedbackText = document.getElementById('feedbackText');

        if (percentage === 100) {
            memeImg.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif";
            feedbackText.innerText = "Xuất sắc! Full điểm! Quá đỉnh quá đỉnh! 🏆";
            // Bắn pháo giấy lớn toàn màn hình
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
        } else if (percentage >= 60) {
            memeImg.src = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif";
            feedbackText.innerText = "Làm tốt lắm! Gật đầu tán thưởng nha! 👍";
        } else {
            memeImg.src = "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif";
            feedbackText.innerText = "Ôi không! Sai nhiều quá rùi, đọc kỹ lại giải thích bên dưới nhé! 😢";
        }

        document.getElementById('resultModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('resultModal').style.display = 'none';
        // Kéo lên đầu trang để xem lại giải thích
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Khởi tạo ngay khi tải trang
    window.onload = initQuiz;

</script>
