    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* Theme Dịu Mắt (Soft Pastel & Clean UI) */
        body {
            font-family: 'Nunito', sans-serif;
            color: #374151;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(-45deg, #a8edea, #fed6e3, #e0c3fc, #8ec5fc);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Họa tiết Hoa & Mèo (Line-art, siêu mờ, không hoa mắt) */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 0;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 24 24' fill='none' stroke='rgba(255,255,255,0.25)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/%3E%3C/svg%3E"),
                url("data:image/svg+xml,%3Csvg width='70' height='70' viewBox='0 0 24 24' fill='none' stroke='rgba(255,255,255,0.2)' stroke-width='1.5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 3a9 9 0 0 0-9 9 9 9 0 0 0 9 9 9 9 0 0 0 9-9 9 9 0 0 0-9-9zm0 16a7 7 0 1 1 0-14 7 7 0 0 1 0 14z'/%3E%3Cpath d='M8 11a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm8 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-4 4c-1.66 0-3-1.34-3-3h6c0 1.66-1.34 3-3 3z'/%3E%3C/svg%3E");
            background-position: 0 0, 80px 80px;
            background-size: 160px 160px, 140px 140px;
            animation: floatPattern 60s linear infinite;
        }

        @keyframes floatPattern {
            from { background-position: 0 0, 80px 80px; }
            to { background-position: 1000px 1000px, 1080px 1080px; }
        }

        /* Glassmorphism Panel (Trắng đục hơn để dễ đọc) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            z-index: 10;
        }

        /* Thẻ Đáp Án (Không A,B,C,D - Chuẩn Duolingo) */
        .option-card {
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #E5E7EB;
            box-shadow: 0 6px 0 #D1D5DB;
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            text-align: center;
        }

        .option-card:hover:not(.disabled) {
            transform: translateY(-2px);
            border-color: #A78BFA;
            background-color: #F5F3FF;
            box-shadow: 0 8px 0 #C4B5FD;
        }

        .option-card:active:not(.disabled) {
            transform: translateY(6px);
            box-shadow: 0 0 0 #C4B5FD;
            border-color: #8B5CF6;
        }

        .option-card.correct {
            background-color: #ECFDF5;
            color: #047857;
            border-color: #10B981;
            box-shadow: 0 6px 0 #059669;
        }

        .option-card.wrong {
            background-color: #FEF2F2;
            color: #B91C1C;
            border-color: #EF4444;
            box-shadow: 0 6px 0 #DC2626;
            animation: shake 0.4s;
        }

        .option-card.disabled {
            cursor: default;
            pointer-events: none;
        }

        /* Nút Bấm Chính */
        .btn-3d {
            transition: all 0.15s;
            border-bottom: 6px solid rgba(0,0,0,0.15);
        }
        .btn-3d:active {
            transform: translateY(6px);
            border-bottom: 0px solid rgba(0,0,0,0.15);
            margin-bottom: 6px;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-1deg); }
            75% { transform: translateX(5px) rotate(1deg); }
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar custom */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f3f4f6; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    </style>
</head>
<body class="text-gray-800">

    <header class="w-full glass-panel py-3 px-4 md:px-8 flex justify-between items-center sticky top-0 border-b border-white/50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-violet-500 text-white flex items-center justify-center font-black text-xl md:text-2xl shadow-sm">M</div>

                <h1 class="font-bold text-lg md:text-xl text-violet-700 leading-tight flex items-center gap-1 font-['Quicksand']">Ms. Mai An ULIS</h1>

    <script>
        // --- DATA SOURCE (Bảo toàn 28 câu) ---
        const quizData = [
            {                "questionNumber": 1,                "question": "Write a present continuous sentence using the prompts: <b>A number of workers/ exploit/ an open coalmine.</b>",                "answerOptions": [                    { "text": "A number of workers are exploiting an open coalmine.", "isCorrect": true },                    { "text": "A number of workers is exploiting an open coalmine.", "isCorrect": false },                    { "text": "A number of workers exploiting an open coalmine.", "isCorrect": false },                    { "text": "A number of workers are exploit an open coalmine.", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng 4 đáp án:</b>\n- exploit (v): khai thác.\n- open coalmine (n): mỏ than lộ thiên.\n- A number of + Noun (plural) -> Verb (plural).\n\n2. <b>Dịch nghĩa toàn câu:</b> \"Một số lượng công nhân đang khai thác một mỏ than lộ thiên.\"\n\n3. <b>Tại sao chọn đáp án này?</b>\n- Đề bài yêu cầu viết câu ở thì Hiện tại tiếp diễn (Present Continuous).\n- Cấu trúc: S + am/is/are + Ving.\n- Chủ ngữ 'A number of workers' (một số công nhân) đi với động từ số nhiều 'are'.\n\n<b>Đáp án đúng:</b> A number of workers are exploiting an open coalmine."            },            {                "questionNumber": 2,                "question": "Write a present continuous sentence using the prompts: <b>The government/ bring/ electricity to remote and rural areas/ these days.</b>",                "answerOptions": [                    { "text": "The government is bringing electricity to remote and rural areas these days.", "isCorrect": true },                    { "text": "The government bring electricity to remote and rural areas these days.", "isCorrect": false },                    { "text": "The government are bringing electricity to remote and rural areas these days.", "isCorrect": false },                    { "text": "The government is bring electricity to remote and rural areas these days.", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- government (n): chính phủ.\n- bring (v): mang lại, đem tới.\n- remote and rural areas (n): vùng sâu vùng xa và nông thôn.\n- these days (adv): dạo gần đây (dấu hiệu thì hiện tại/tiếp diễn).\n\n2. <b>Dịch nghĩa:</b> \"Chính phủ đang đưa điện lưới về các vùng sâu vùng xa và nông thôn trong những ngày này.\"\n\n3. <b>Tại sao chọn đáp án này?</b>\n- Thì hiện tại tiếp diễn diễn tả hành động đang diễn ra xung quanh thời điểm nói (these days).\n- Chủ ngữ 'The government' là danh từ tập hợp (coi là số ít trong ngữ cảnh này) -> dùng 'is'.\n\n<b>Đáp án đúng:</b> The government is bringing electricity to remote and rural areas these days."            },            {                "questionNumber": 3,                "question": "Write a present continuous sentence using the prompts: <b>About 62,500 power plants/ operate/ around the world.</b>",                "answerOptions": [                    { "text": "About 62,500 power plants are operating around the world.", "isCorrect": true },                    { "text": "About 62,500 power plants is operating around the world.", "isCorrect": false },                    { "text": "About 62,500 power plants operate around the world.", "isCorrect": false },                    { "text": "About 62,500 power plants operating around the world.", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- power plant (n): nhà máy điện.\n- operate (v): vận hành, hoạt động.\n- around the world: trên khắp thế giới.\n\n2. <b>Dịch nghĩa:</b> \"Khoảng 62.500 nhà máy điện đang hoạt động trên khắp thế giới.\"\n\n3. <b>Tại sao chọn đáp án này?</b>\n- Đề bài yêu cầu thì Hiện tại tiếp diễn.\n- Chủ ngữ 'About 62,500 power plants' là số nhiều -> dùng 'are'.\n- Operate -> Operating.\n\n<b>Đáp án đúng:</b> ...are operating..."            },            {                "questionNumber": 4,                "question": "Write a present continuous sentence using the prompts: <b>They/ not work/ under extreme pressure/ at the moment.</b>",                "answerOptions": [                    { "text": "They are not working under extreme pressure at the moment.", "isCorrect": true },                    { "text": "They do not working under extreme pressure at the moment.", "isCorrect": false },                    { "text": "They is not working under extreme pressure at the moment.", "isCorrect": false },                    { "text": "They not working under extreme pressure at the moment.", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- work (v): làm việc.\n- extreme pressure (n): áp lực cực lớn.\n- at the moment: ngay lúc này (dấu hiệu nhận biết).\n\n2. <b>Dịch nghĩa:</b> \"Họ đang không phải làm việc dưới áp lực cực lớn vào lúc này.\"\n\n3. <b>Tại sao chọn đáp án này?</b>\n- 'At the moment' -> Hiện tại tiếp diễn.\n- Câu phủ định với 'They' -> They are not + Ving.\n\n<b>Đáp án đúng:</b> They are not working..."            },            {                "questionNumber": 5,                "question": "Write a present continuous sentence using the prompts: <b>Mr. Handerson/ ride/ a monocycle in the parking lot?</b>",                "answerOptions": [                    { "text": "Is Mr. Handerson riding a monocycle in the parking lot?", "isCorrect": true },                    { "text": "Does Mr. Handerson riding a monocycle in the parking lot?", "isCorrect": false },                    { "text": "Are Mr. Handerson riding a monocycle in the parking lot?", "isCorrect": false },                    { "text": "Mr. Handerson is riding a monocycle in the parking lot?", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- ride (v): lái, đạp (xe).\n- monocycle (n): xe đạp một bánh.\n- parking lot (n): bãi đậu xe.\n\n2. <b>Dịch nghĩa:</b> \"Ông Handerson đang lái chiếc xe đạp một bánh trong bãi đậu xe phải không?\"\n\n3. <b>Tại sao chọn đáp án này?</b>\n- Câu hỏi (nghi vấn) thì Hiện tại tiếp diễn -> Đảo to be lên đầu.\n- Mr. Handerson (số ít) -> dùng 'Is'.\n- Ride -> Riding (bỏ 'e' thêm 'ing').\n\n<b>Đáp án đúng:</b> Is Mr. Handerson riding..."            },            {                "questionNumber": 6,                "question": "Write a present continuous sentence using the prompts: <b>The technicians/ place/ solar panels on the roofs of the house.</b>",                "answerOptions": [                    { "text": "The technicians are placing solar panels on the roofs of the house.", "isCorrect": true },                    { "text": "The technicians is placing solar panels on the roofs of the house.", "isCorrect": false },                    { "text": "The technicians placing solar panels on the roofs of the house.", "isCorrect": false },                    { "text": "The technicians are place solar panels on the roofs of the house.", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- technician (n): kỹ thuật viên.\n- place (v): đặt, lắp đặt.\n- solar panel (n): tấm pin năng lượng mặt trời.\n- roof (n): mái nhà.\n\n2. <b>Dịch nghĩa:</b> \"Các kỹ thuật viên đang lắp đặt các tấm pin mặt trời trên mái nhà.\"\n\n3. <b>Tại sao chọn đáp án này?</b>\n- Chủ ngữ 'The technicians' (số nhiều) -> dùng 'are'.\n- Place -> Placing (bỏ 'e' thêm 'ing').\n\n<b>Đáp án đúng:</b> The technicians are placing..."            },            {                "questionNumber": 7,                "question": "Write a present continuous sentence using the prompts: <b>you/ do/ research on biomass production in the country?</b>",                "answerOptions": [                    { "text": "Are you doing research on biomass production in the country?", "isCorrect": true },                    { "text": "Do you doing research on biomass production in the country?", "isCorrect": false },                    { "text": "You are doing research on biomass production in the country?", "isCorrect": false },                    { "text": "Is you doing research on biomass production in the country?", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- do research (v phrase): làm nghiên cứu.\n- biomass production (n phrase): sản xuất sinh khối.\n\n2. <b>Dịch nghĩa:</b> \"Bạn đang làm nghiên cứu về sản xuất năng lượng sinh khối trong nước phải không?\"\n\n3. <b>Tại sao chọn đáp án này?</b>\n- Câu hỏi với chủ ngữ 'you' -> dùng 'Are'.\n- Cấu trúc: Are + S + Ving...?\n\n<b>Đáp án đúng:</b> Are you doing..."            },            {                "questionNumber": 8,                "question": "Write a present continuous sentence using the prompts: <b>Countries around the world/ reduce/ their dependencies on coal.</b>",                "answerOptions": [                    { "text": "Countries around the world are reducing their dependencies on coal.", "isCorrect": true },                    { "text": "Countries around the world is reducing their dependencies on coal.", "isCorrect": false },                    { "text": "Countries around the world reducing their dependencies on coal.", "isCorrect": false },                    { "text": "Countries around the world are reduce their dependencies on coal.", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- reduce (v): giảm thiểu.\n- dependency (n): sự phụ thuộc.\n- coal (n): than đá.\n\n2. <b>Dịch nghĩa:</b> \"Các quốc gia trên thế giới đang giảm bớt sự phụ thuộc vào than đá.\"\n\n3. <b>Tại sao chọn đáp án này?</b>\n- Chủ ngữ chính 'Countries' (số nhiều) -> dùng 'are'.\n- Reduce -> Reducing.\n\n<b>Đáp án đúng:</b> ...are reducing..."            },            {                "questionNumber": 9,                "question": "At the moment they ____________ on two wind energy projects.",                "answerOptions": [                    { "text": "are working", "isCorrect": true },                    { "text": "work", "isCorrect": false },                    { "text": "will work", "isCorrect": false },                    { "text": "works", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- work (v): làm việc.\n- At the moment (adv): ngay lúc này.\n\n2. <b>Dịch nghĩa:</b> \"Ngay lúc này họ đang làm việc trên hai dự án năng lượng gió.\"\n\n3. <b>Tại sao chọn B?</b>\n- Dấu hiệu 'At the moment' -> dùng thì Hiện tại tiếp diễn.\n- Chủ ngữ 'they' -> 'are working'.\n\n<b>Đáp án đúng:</b> are working"            },            {                "questionNumber": 10,                "question": "Humans ____________ wind power for transportation thousands of years ago.",                "answerOptions": [                    { "text": "used", "isCorrect": true },                    { "text": "will use", "isCorrect": false },                    { "text": "use", "isCorrect": false },                    { "text": "are using", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- use (v): sử dụng.\n- thousands of years ago (adv): hàng ngàn năm trước.\n\n2. <b>Dịch nghĩa:</b> \"Con người đã sử dụng năng lượng gió để vận chuyển từ hàng ngàn năm trước.\"\n\n3. <b>Tại sao chọn D?</b>\n- Dấu hiệu 'thousands of years ago' -> hành động đã xảy ra và kết thúc trong quá khứ -> Quá khứ đơn.\n- V2/ed của use là used.\n\n<b>Đáp án đúng:</b> used"            },            {                "questionNumber": 11,                "question": "Right now many companies ____________ in \"green\" energy.",                "answerOptions": [                    { "text": "are investing", "isCorrect": true },                    { "text": "invest", "isCorrect": false },                    { "text": "is investing", "isCorrect": false },                    { "text": "will invest", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- invest (v): đầu tư.\n- Right now (adv): ngay bây giờ.\n\n2. <b>Dịch nghĩa:</b> \"Ngay bây giờ nhiều công ty đang đầu tư vào năng lượng xanh.\"\n\n3. <b>Tại sao chọn C?</b>\n- Dấu hiệu 'Right now' -> Hiện tại tiếp diễn.\n- Chủ ngữ 'many companies' (số nhiều) -> are investing.\n\n<b>Đáp án đúng:</b> are investing"            },            {                "questionNumber": 12,                "question": "In the future, cars ____________ petrol or diesel, but other fuels like electricity, and natural gas.",                "answerOptions": [                    { "text": "won't use", "isCorrect": true },                    { "text": "don't use", "isCorrect": false },                    { "text": "aren't using", "isCorrect": false },                    { "text": "didn't use", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- use (v): dùng.\n- petrol/diesel: xăng/dầu.\n- In the future (adv): trong tương lai.\n\n2. <b>Dịch nghĩa:</b> \"Trong tương lai, ô tô sẽ không dùng xăng hay dầu diesel nữa, mà dùng các nhiên liệu khác như điện và khí tự nhiên.\"\n\n3. <b>Tại sao chọn A?</b>\n- Dấu hiệu 'In the future' -> Tương lai đơn.\n- Ngữ cảnh: Sự thay đổi so với hiện tại -> phủ định (won't use).\n\n<b>Đáp án đúng:</b> won't use"            },            {                "questionNumber": 13,                "question": "Now wind power capacity ____________ rapidly around the world.",                "answerOptions": [                    { "text": "is growing", "isCorrect": true },                    { "text": "grows", "isCorrect": false },                    { "text": "grow", "isCorrect": false },                    { "text": "are growing", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- capacity (n): công suất, năng lực.\n- grow (v): tăng trưởng.\n- rapidly (adv): nhanh chóng.\n- Now (adv): bây giờ.\n\n2. <b>Dịch nghĩa:</b> \"Hiện nay công suất điện gió đang tăng trưởng nhanh chóng trên toàn thế giới.\"\n\n3. <b>Tại sao chọn D?</b>\n- Dấu hiệu 'Now' và từ 'rapidly' (diễn tả xu hướng thay đổi) -> Hiện tại tiếp diễn.\n- Chủ ngữ 'wind power capacity' (danh từ không đếm được/số ít) -> is growing.\n\n<b>Đáp án đúng:</b> is growing"            },            {                "questionNumber": 14,                "question": "A tidal power station ____________ electricity from the rise and fall of tides.",                "answerOptions": [                    { "text": "generates", "isCorrect": true },                    { "text": "is generating", "isCorrect": false },                    { "text": "are generating", "isCorrect": false },                    { "text": "generate", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- tidal power station (n): trạm năng lượng thủy triều.\n- generate (v): tạo ra (điện).\n- tide (n): thủy triều.\n\n2. <b>Dịch nghĩa:</b> \"Một trạm năng lượng thủy triều tạo ra điện từ sự lên xuống của thủy triều.\"\n\n3. <b>Tại sao chọn B?</b>\n- Đây là một sự thật hiển nhiên, chức năng của máy móc -> Thì hiện tại đơn.\n- Chủ ngữ 'A tidal power station' (số ít) -> generates.\n\n<b>Đáp án đúng:</b> generates"            },            {                "questionNumber": 15,                "question": "What ____________ if non-renewable resources run out?",                "answerOptions": [                    { "text": "will happen", "isCorrect": true },                    { "text": "is happening", "isCorrect": false },                    { "text": "happened", "isCorrect": false },                    { "text": "happen", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- happen (v): xảy ra.\n- run out (v): cạn kiệt.\n\n2. <b>Dịch nghĩa:</b> \"Chuyện gì sẽ xảy ra nếu các nguồn tài nguyên không tái tạo bị cạn kiệt?\"\n\n3. <b>Tại sao chọn C?</b>\n- Đây là Câu điều kiện loại 1 (giả định có thể xảy ra ở tương lai).\n- Mệnh đề If dùng hiện tại đơn (run out) -> Mệnh đề chính dùng Tương lai đơn (will + V).\n\n<b>Đáp án đúng:</b> will happen"            },            {                "questionNumber": 16,                "question": "One of the world's largest wind companies ____________ AI to capture more energy now.",                "answerOptions": [                    { "text": "is using", "isCorrect": true },                    { "text": "uses", "isCorrect": false },                    { "text": "are using", "isCorrect": false },                    { "text": "has used", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- use (v): sử dụng.\n- AI (Artificial Intelligence): trí tuệ nhân tạo.\n- now (adv): bây giờ.\n\n2. <b>Dịch nghĩa:</b> \"Một trong những công ty điện gió lớn nhất thế giới hiện đang sử dụng AI để thu được nhiều năng lượng hơn.\"\n\n3. <b>Tại sao chọn A?</b>\n- Dấu hiệu 'now' -> Hiện tại tiếp diễn.\n- Chủ ngữ là 'One' (trong cụm One of...) -> Số ít -> dùng 'is using'.\n\n<b>Đáp án đúng:</b> is using"            },            {                "questionNumber": 17,                "question": "We ____________ able to create a future that's free of carbon pollution soon.",                "answerOptions": [                    { "text": "will be", "isCorrect": true },                    { "text": "are", "isCorrect": false },                    { "text": "were", "isCorrect": false },                    { "text": "was", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- be able to (adj phrase): có thể, có khả năng.\n- soon (adv): sớm thôi.\n\n2. <b>Dịch nghĩa:</b> \"Chúng ta sẽ sớm có thể tạo ra một tương lai không có ô nhiễm carbon.\"\n\n3. <b>Tại sao chọn A?</b>\n- Dấu hiệu 'soon' (sớm thôi) -> Tương lai đơn.\n- Cấu trúc: will be able to.\n\n<b>Đáp án đúng:</b> will be"            },            {                "questionNumber": 18,                "question": "To save energy, I always ____________ the lights when I don't need them.",                "answerOptions": [                    { "text": "turn off", "isCorrect": true },                    { "text": "turned off", "isCorrect": false },                    { "text": "am turning off", "isCorrect": false },                    { "text": "will turn off", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- turn off (phrasal verb): tắt.\n- always (adv): luôn luôn.\n\n2. <b>Dịch nghĩa:</b> \"Để tiết kiệm năng lượng, tôi luôn tắt đèn khi không cần dùng.\"\n\n3. <b>Tại sao chọn C?</b>\n- 'Always' chỉ thói quen lặp đi lặp lại -> Thì hiện tại đơn.\n- Chủ ngữ 'I' đi với động từ nguyên thể 'turn off'.\n\n<b>Đáp án đúng:</b> turn off"            },            {                "questionNumber": 19,                "question": "I'm doing a project ____________ saving energy at school. Can you give me some tips?",                "answerOptions": [                    { "text": "on", "isCorrect": true },                    { "text": "in", "isCorrect": false },                    { "text": "at", "isCorrect": false },                    { "text": "to", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- project on/about sth: dự án về chủ đề gì.\n\n2. <b>Dịch nghĩa:</b> \"Mình đang làm một dự án về tiết kiệm năng lượng ở trường. Cậu cho mình vài mẹo được không?\"\n\n3. <b>Tại sao chọn 'on'?</b>\n- Cụm từ cố định: 'do a project on something' (làm dự án về cái gì).\n\n<b>Đáp án đúng:</b> on"            },            {                "questionNumber": 20,                "question": "Fossil fuels, including oil, coal and natural gas, are harmful ____________ the environment.",                "answerOptions": [                    { "text": "to", "isCorrect": true },                    { "text": "with", "isCorrect": false },                    { "text": "for", "isCorrect": false },                    { "text": "on", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- harmful (adj): có hại.\n- harmful to sb/sth: có hại cho ai/cái gì.\n\n2. <b>Dịch nghĩa:</b> \"Nhiên liệu hóa thạch, bao gồm dầu, than và khí đốt, thì có hại cho môi trường.\"\n\n3. <b>Tại sao chọn 'to'?</b>\n- Cấu trúc tính từ: harmful + to.\n\n<b>Đáp án đúng:</b> to"            },            {                "questionNumber": 21,                "question": "Once non-renewable resources are used ____________, they are gone forever.",                "answerOptions": [                    { "text": "up", "isCorrect": true },                    { "text": "in", "isCorrect": false },                    { "text": "for", "isCorrect": false },                    { "text": "off", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- use up (phrasal verb): dùng hết, dùng cạn kiệt.\n\n2. <b>Dịch nghĩa:</b> \"Một khi các nguồn tài nguyên không tái tạo bị dùng hết, chúng sẽ biến mất mãi mãi.\"\n\n3. <b>Tại sao chọn 'up'?</b>\n- Cụm động từ 'use up' mang nghĩa tiêu thụ hết sạch.\n\n<b>Đáp án đúng:</b> up"            },            {                "questionNumber": 22,                "question": "What will happen if non-renewable resources run ____________?",                "answerOptions": [                    { "text": "out", "isCorrect": true },                    { "text": "away", "isCorrect": false },                    { "text": "off", "isCorrect": false },                    { "text": "on", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- run out (phrasal verb): cạn kiệt, hết sạch.\n\n2. <b>Dịch nghĩa:</b> \"Điều gì sẽ xảy ra nếu các nguồn tài nguyên không tái tạo bị cạn kiệt?\"\n\n3. <b>Tại sao chọn 'out'?</b>\n- Cụm 'run out' nghĩa là không còn gì nữa.\n\n<b>Đáp án đúng:</b> out"            },            {                "questionNumber": 23,                "question": "Sulphur dioxide has a direct effect ____________ health and the environment.",                "answerOptions": [                    { "text": "on", "isCorrect": true },                    { "text": "to", "isCorrect": false },                    { "text": "in", "isCorrect": false },                    { "text": "at", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- effect (n): ảnh hưởng, tác động.\n- have an effect on sb/sth: có ảnh hưởng lên ai/cái gì.\n\n2. <b>Dịch nghĩa:</b> \"Lưu huỳnh đioxit có ảnh hưởng trực tiếp lên sức khỏe và môi trường.\"\n\n3. <b>Tại sao chọn 'on'?</b>\n- Danh từ 'effect/impact/influence' thường đi với giới từ 'on'.\n\n<b>Đáp án đúng:</b> on"            },            {                "questionNumber": 24,                "question": "We are looking ____________ cheap, clean, and effective sources of energy.",                "answerOptions": [                    { "text": "for", "isCorrect": true },                    { "text": "at", "isCorrect": false },                    { "text": "after", "isCorrect": false },                    { "text": "up", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- look for (phrasal verb): tìm kiếm.\n\n2. <b>Dịch nghĩa:</b> \"Chúng tôi đang tìm kiếm các nguồn năng lượng rẻ, sạch và hiệu quả.\"\n\n3. <b>Tại sao chọn 'for'?</b>\n- Ngữ cảnh là đang 'tìm kiếm' giải pháp -> look for.\n\n<b>Đáp án đúng:</b> for"            },            {                "questionNumber": 25,                "question": "Viet Nam still relies mostly ____________ non-renewable energy sources.",                "answerOptions": [                    { "text": "on", "isCorrect": true },                    { "text": "in", "isCorrect": false },                    { "text": "at", "isCorrect": false },                    { "text": "of", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- rely on (phrasal verb): dựa vào, phụ thuộc vào.\n\n2. <b>Dịch nghĩa:</b> \"Việt Nam vẫn dựa chủ yếu vào các nguồn năng lượng không tái tạo.\"\n\n3. <b>Tại sao chọn 'on'?</b>\n- Cụm cố định: rely on / depend on.\n\n<b>Đáp án đúng:</b> on"            },            {                "questionNumber": 26,                "question": "Sunlight is converted ____________ electricity by each solar cell in the panels.",                "answerOptions": [                    { "text": "into", "isCorrect": true },                    { "text": "to", "isCorrect": false },                    { "text": "from", "isCorrect": false },                    { "text": "off", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- convert (v): chuyển đổi.\n- convert A into B: chuyển đổi A thành B.\n\n2. <b>Dịch nghĩa:</b> \"Ánh sáng mặt trời được chuyển đổi thành điện năng bởi mỗi tế bào quang điện trong tấm pin.\"\n\n3. <b>Tại sao chọn 'into'?</b>\n- Khi nói về sự biến đổi trạng thái/chất, dùng 'into'.\n\n<b>Đáp án đúng:</b> into"            },            {                "questionNumber": 27,                "question": "Turning ____________ lights saves energy and it also saves money.",                "answerOptions": [                    { "text": "off", "isCorrect": true },                    { "text": "on", "isCorrect": false },                    { "text": "up", "isCorrect": false },                    { "text": "in", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- turn off (phrasal verb): tắt.\n\n2. <b>Dịch nghĩa:</b> \"Tắt đèn giúp tiết kiệm năng lượng và cũng tiết kiệm tiền bạc.\"\n\n3. <b>Tại sao chọn 'off'?</b>\n- Hành động 'tiết kiệm điện' liên quan đến việc 'tắt' thiết bị -> turn off.\n\n<b>Đáp án đúng:</b> off"            },            {                "questionNumber": 28,                "question": "In developing countries, biogas is mostly used ____________ cooking, heating and lighting.",                "answerOptions": [                    { "text": "for", "isCorrect": true },                    { "text": "in", "isCorrect": false },                    { "text": "to", "isCorrect": false },                    { "text": "by", "isCorrect": false }                ],                "rationale": "1. <b>Phân tích từ vựng:</b>\n- used for + Ving/Noun: được dùng cho mục đích gì.\n\n2. <b>Dịch nghĩa:</b> \"Ở các nước đang phát triển, khí sinh học chủ yếu được dùng cho việc nấu nướng, sưởi ấm và thắp sáng.\"\n\n3. <b>Tại sao chọn 'for'?</b>\n- Chỉ mục đích của việc sử dụng -> use for.\n\n<b>Đáp án đúng:</b> for"            }
        ];

        // --- TRẠNG THÁI ---
        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        // --- XÁO TRỘN ĐÁP ÁN ---
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // --- HỆ THỐNG ÂM THANH Web Audio API ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playCorrectSound() {
            playTone(600, 'sine', 0.1);
            setTimeout(() => playTone(900, 'sine', 0.2), 100);
        }

        function playWrongSound() {
            playTone(200, 'sawtooth', 0.2);
            setTimeout(() => playTone(150, 'sawtooth', 0.3), 150);
        }

        // DOM Elements
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackArea = document.getElementById('feedback-area');
        const explanationContent = document.getElementById('explanation-content');
        const nextBtn = document.getElementById('next-btn');
        const finishBtn = document.getElementById('finish-btn');
        const progressBar = document.getElementById('progress-bar');
        const currentQNum = document.getElementById('current-q-num');
        const scoreDisplay = document.getElementById('score');

        // Khởi tạo
        document.getElementById('total-q-num').innerText = quizData.length;
        renderQuestion();

        function renderQuestion() {
            const q = quizData[currentQuestionIndex];
            
            currentQNum.innerText = currentQuestionIndex + 1;
            questionText.innerHTML = q.question;
            
            optionsContainer.innerHTML = '';
            feedbackArea.classList.add('hidden');
            nextBtn.classList.add('hidden');
            finishBtn.classList.add('hidden');
            answered = false;

            const progress = ((currentQuestionIndex) / quizData.length) * 100;
            progressBar.style.width = `${progress}%`;

            // Xáo trộn và render mảng đã xáo trộn (KHÔNG prefix A,B,C,D)
            const shuffledOptions = shuffleArray([...q.answerOptions]);

            shuffledOptions.forEach((opt) => {
                const btn = document.createElement('div');
                btn.className = `option-card text-lg font-bold select-none`;
                btn.dataset.correct = opt.isCorrect;
                
                // Text căn giữa, dọn dẹp không còn A,B,C,D
                btn.innerHTML = `<span class="w-full inline-block text-center leading-snug text-[1.1rem]">${opt.text}</span>`;
                
                btn.onclick = () => checkAnswer(opt.isCorrect, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(isCorrect, btnElement) {
            if (answered) return;
            answered = true;
            const q = quizData[currentQuestionIndex];

            if (isCorrect) {
                btnElement.classList.add('correct');
                playCorrectSound();
                confettiEffect();
                score++;
                scoreDisplay.innerText = score;
                scoreDisplay.parentElement.classList.add('scale-105');
                setTimeout(() => scoreDisplay.parentElement.classList.remove('scale-105'), 200);
            } else {
                btnElement.classList.add('wrong');
                playWrongSound();
                
                // Tự động bôi màu đáp án đúng
                Array.from(optionsContainer.children).forEach(child => {
                    if (child.dataset.correct === "true") {
                        child.classList.add('correct');
                    }
                });
            }

            Array.from(optionsContainer.children).forEach(child => child.classList.add('disabled'));

            explanationContent.innerHTML = q.rationale;
            feedbackArea.classList.remove('hidden');

            if (currentQuestionIndex < quizData.length - 1) {
                nextBtn.classList.remove('hidden');
            } else {
                finishBtn.classList.remove('hidden');
                progressBar.style.width = '100%';
            }

            // Tự động trượt nhẹ xuống phần giải thích
            setTimeout(() => {
                feedbackArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function nextQuestion() {
            currentQuestionIndex++;
            renderQuestion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showResults() {
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-total').innerText = quizData.length;
            document.getElementById('result-modal').classList.remove('hidden');
            
            const duration = 3000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5, angle: 60, spread: 55, origin: { x: 0 },
                    colors: ['#8B5CF6', '#10B981', '#3B82F6']
                });
                confetti({
                    particleCount: 5, angle: 120, spread: 55, origin: { x: 1 },
                    colors: ['#8B5CF6', '#10B981', '#3B82F6']
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function confettiEffect() {
            confetti({
                particleCount: 60, spread: 60, origin: { y: 0.6 },
                colors: ['#8B5CF6', '#3B82F6', '#10B981'],
                disableForReducedMotion: true
            });
        }
    </script>
</body>
</html>
