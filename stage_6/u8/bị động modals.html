<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Ocean Quiz - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-text: #1a2b4c;
            --correct: #00D26A;
            --wrong: #FF4757;
            --card-bg: rgba(255, 255, 255, 0.92);
            --shadow: 0 6px 0 rgba(0,0,0,0.2);
            --accent: #FF7F50; 
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        @keyframes oceanGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #0b486b, #12577c);
            background-size: 400% 400%;
            animation: oceanGradient 20s ease infinite;
            color: var(--primary-text);
            position: relative;
            overflow-x: hidden;
        }

        /* --- SINH VẬT BIỂN --- */
        .ocean-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: rise infinite ease-in;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        .fish {
            position: absolute;
            opacity: 0.3;
            animation: swim linear infinite;
        }
        .fish svg { width: 60px; height: 60px; fill: #ffffff; }

        .fish.reverse { animation: swimReverse linear infinite; }
        .fish.reverse svg { transform: scaleX(-1); }

        .jellyfish {
            position: absolute;
            opacity: 0.25;
            animation: floatJelly ease-in-out infinite alternate;
        }
        .jellyfish svg { width: 80px; height: 80px; fill: #a2d2ff; }

        @keyframes swim {
            0% { transform: translateX(-100px) translateY(0); }
            50% { transform: translateX(50vw) translateY(-20px); }
            100% { transform: translateX(110vw) translateY(10px); }
        }
        @keyframes swimReverse {
            0% { transform: translateX(110vw) translateY(0); }
            50% { transform: translateX(50vw) translateY(30px); }
            100% { transform: translateX(-100px) translateY(-10px); }
        }
        @keyframes floatJelly {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-30px) scale(1.05); }
        }

        /* --- UI COMPONENTS --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .header h3 {
            margin: 0;
            font-size: 1.3rem;
            color: #0b486b;
            font-weight: 800;
        }

        .section-title {
            background: var(--accent);
            color: white;
            padding: 12px 25px;
            border-radius: 15px;
            display: inline-block;
            font-weight: 800;
            margin-bottom: 20px;
            box-shadow: 0 4px 0 #d9663d;
            font-size: 1.15rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
            backdrop-filter: blur(5px);
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.5;
            color: #1a2b4c;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .btn-option {
            background: #ffffff;
            border: 3px solid #b0c4de;
            border-radius: 15px;
            padding: 15px;
            font-size: 1.08rem;
            font-weight: 700;
            color: var(--primary-text);
            cursor: pointer;
            box-shadow: 0 5px 0 #b0c4de;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
            display: flex;
            align-items: center;
        }

        .btn-option:hover:not(:disabled) {
            transform: scale(1.03) translateY(-3px);
            box-shadow: 0 8px 0 #8fa8cc;
            border-color: #8fa8cc;
        }

        .btn-option:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #8fa8cc;
        }

        .btn-option.correct {
            background: var(--correct);
            border-color: #00b35a;
            box-shadow: 0 5px 0 #00b35a;
            color: white;
        }

        .btn-option.wrong {
            background: var(--wrong);
            border-color: #d63031;
            box-shadow: 0 5px 0 #d63031;
            color: white;
        }

        .gap-fill-btn {
            display: inline-block;
            min-width: 110px;
            height: 38px;
            border: 3px dashed #0b486b;
            border-radius: 10px;
            background: #e6f2ff;
            cursor: pointer;
            vertical-align: middle;
            margin: 0 5px;
            transition: all 0.2s;
            text-align: center;
            line-height: 32px;
            font-weight: 800;
            color: #0b486b;
        }

        .gap-fill-btn:hover { background: #cce6ff; transform: scale(1.05); }
        .gap-fill-btn.filled-correct { background: var(--correct); border-color: #00b35a; border-style: solid; color: white; }
        .gap-fill-btn.filled-wrong { background: var(--wrong); border-color: #d63031; border-style: solid; color: white; }

        .explanation {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(230, 242, 255, 0.8);
            border-left: 5px solid #00C9A7;
            border-radius: 10px;
            font-size: 1rem;
            line-height: 1.6;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 20%, 60% {transform: translateX(-5px);} 40%, 80% {transform: translateX(5px);} }

        .shake { animation: shake 0.4s ease; }

        .text-red { color: #d63031; font-weight: bold; }
        .text-green { color: #00b35a; font-weight: bold; }

        /* --- POPUP HIỂN THỊ GAP FILL (ĐÃ ĐƯỢC SỬA LỖI) --- */
        #gapPopup {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 72, 107, 0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Khung chứa nội dung câu hỏi bên trong Popup */
        #popupQuestionText {
            background: #e6f2ff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            line-height: 1.5;
            border-left: 5px solid var(--accent);
            text-align: left;
            color: #1a2b4c;
            font-weight: bold;
        }

        .close-popup-btn {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-popup-btn:hover { background: #ccc; }

        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Submit Button */
        .submit-btn {
            display: block;
            width: 100%;
            background: var(--accent);
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            padding: 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 #d9663d;
            margin-top: 40px;
            margin-bottom: 50px;
            transition: all 0.2s;
        }

        .submit-btn:hover { transform: translateY(-5px); box-shadow: 0 13px 0 #d9663d; }

        /* Modal Kết quả */
        #resultModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .result-box {
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
        }

        .result-box img {
            max-width: 100%;
            border-radius: 15px;
            margin: 20px 0;
            border: 5px solid var(--accent);
        }

        .result-score { font-size: 2.5rem; font-weight: 800; color: #0b486b; margin-bottom: 10px; }
        
        .q-phone {
            background: #e6f7ff;
            border-radius: 15px 15px 0 15px;
            padding: 15px;
            display: inline-block;
            position: relative;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            margin: 10px 0;
            border: 2px solid #91d5ff;
        }
        .q-phone::after {
            content: ''; position: absolute; bottom: -2px; right: -15px;
            border-width: 15px 15px 0 0; border-style: solid;
            border-color: #e6f7ff transparent transparent transparent;
        }

        .q-sale {
            background: #fff3cd;
            border: 4px solid #dc3545;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            font-weight: 800;
            color: #856404;
            display: inline-block;
            margin: 10px 0;
        }
        .q-sale::before {
            content: ''; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 2px dashed #dc3545; border-radius: 5px; pointer-events: none;
        }

        canvas#confetti {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999;
        }
    </style>
</head>

<script>
function createBubbles() {
    const ocean = document.getElementById('ocean-bg');
    for (let i = 0; i < 20; i++) {
        let bubble = document.createElement('div');
        bubble.className = 'bubble';
        let size = Math.random() * 20 + 5; 
        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';
        bubble.style.left = Math.random() * 100 + 'vw';
        bubble.style.animationDuration = Math.random() * 8 + 4 + 's'; 
        bubble.style.animationDelay = Math.random() * 5 + 's';
        ocean.appendChild(bubble);
    }
}
createBubbles();

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playDing() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

function playBuzz() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
}

const quizData = [
    // DẠNG 1
    {
        type: "gap", section: "Dạng 1: Viết lại các câu sau sang dạng bị động",

    },
    {
        type: "gap", section: "",
        question: "The mechanic could fix the broken engine yesterday.<br>➔ The broken engine <span class='gap-fill-btn' data-id='1'> BẤM CHỌN </span> (by the mechanic) yesterday.",
        options: [
            {t: "could fix", c: false}, {t: "could be fixed", c: true}, {t: "could fixed", c: false}, {t: "could be fix", c: false}

    {

            {t: "may sign", c: false}, {t: "may signed", c: false}, {t: "may be sign", c: false}, {t: "may be signed", c: true}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function renderQuiz() {
    const container = document.getElementById("quiz-container");
    let html = "";
    
    quizData.forEach((item, index) => {
        if (item.section) {
            html += `<div class="section-title">${item.section}</div>`;
        }
        
        html += `<div class="card" id="card-${index}">`;
        html += `<div class="question-text">Câu ${index + 1}: ${item.question}</div>`;
        
        if (item.type === "mcq") {
            const shuffledOptions = shuffleArray([...item.options]);
            html += `<div class="options-grid">`;
            shuffledOptions.forEach((opt) => {
                const isCorrStr = opt.c ? "true" : "false";
                html += `<button class="btn-option" onclick="checkMCQ(this, ${index}, ${isCorrStr})">${opt.t}</button>`;
            });
            html += `</div>`;
        }
        
        html += `<div class="explanation" id="exp-${index}">${item.exp}</div>`;
        html += `</div>`;
    });
    
    container.innerHTML = html;

    document.querySelectorAll('.gap-fill-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            if(this.classList.contains('filled-correct') || this.classList.contains('filled-wrong')) return;
            currentGapId = this.getAttribute('data-id');
            openGapPopup(currentGapId);
        });
    });
}

function checkMCQ(btn, qIndex, isCorrect) {
    if (btn.parentNode.hasAttribute('data-answered')) return;
    btn.parentNode.setAttribute('data-answered', 'true');
    
    const buttons = btn.parentNode.querySelectorAll('button');
    buttons.forEach(b => b.disabled = true);
    
    if (isCorrect) {
        btn.classList.add('correct');
        playDing();
        fireConfetti();
        score++;
    } else {
        btn.classList.add('wrong');
        btn.closest('.card').classList.add('shake');
        playBuzz();
        buttons.forEach(b => {
            const optText = b.innerText;
            const originalOption = quizData[qIndex].options.find(o => o.t === optText);
            if(originalOption && originalOption.c) b.style.border = "3px solid #00D26A";
        });
        setTimeout(() => btn.closest('.card').classList.remove('shake'), 400);
    }
    
    document.getElementById(`exp-${qIndex}`).style.display = "block";
    answeredCount++;
}

// Lôgic xử lý sự kiện khi mở Popup
function openGapPopup(qIndex) {
    const popup = document.getElementById("gapPopup");
    const grid = document.getElementById("gapOptionsGrid");
    const qTextDisplay = document.getElementById("popupQuestionText");
    
    grid.innerHTML = "";
    
    // Đã thêm: Đọc và đưa câu hỏi đang làm vào bên trong bảng Popup
    let rawQuestion = quizData[qIndex].question;
    let displayQuestion = rawQuestion.replace(/<span class='gap-fill-btn'.*?<\/span>/g, "<span style='color: #FF7F50;'> [ _________ ] </span>");
    qTextDisplay.innerHTML = `Câu ${parseInt(qIndex) + 1}: ` + displayQuestion;

    const shuffledOptions = shuffleArray([...quizData[qIndex].options]);
    shuffledOptions.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "btn-option";
        btn.innerText = opt.t;
        btn.onclick = () => selectGapOption(opt.t, opt.c, qIndex);
        grid.appendChild(btn);
    });
    
    popup.style.display = "flex";
}

function selectGapOption(text, isCorrect, qIndex) {
    document.getElementById("gapPopup").style.display = "none";
    const gapBtn = document.querySelector(`.gap-fill-btn[data-id="${qIndex}"]`);
    
    gapBtn.innerText = text;
    
    if (isCorrect) {
        gapBtn.classList.add('filled-correct');
        playDing();
        fireConfetti();
        score++;
    } else {
        gapBtn.classList.add('filled-wrong');
        gapBtn.closest('.card').classList.add('shake');
        playBuzz();
        setTimeout(() => gapBtn.closest('.card').classList.remove('shake'), 400);
    }
    
    document.getElementById(`exp-${qIndex}`).style.display = "block";
    answeredCount++;
}

function submitQuiz() {
    if (answeredCount < quizData.length) {
        alert("Em hãy hoàn thành tất cả các câu hỏi trước khi nộp bài nhé!");
        return;
    }
    
    const modal = document.getElementById("resultModal");
    const scoreDiv = document.getElementById("finalScore");
    const memeImg = document.getElementById("memeImg");
    const praiseText = document.getElementById("praiseText");
    
    const percentage = score / quizData.length;
    scoreDiv.innerText = `${score} / ${quizData.length}`;
    
    if (percentage === 1) {
        praiseText.innerText = "CHẤN ĐỘNG! Em là một thiên tài ngữ pháp thực thụ! 🏆";
        memeImg.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif"; 
    } else if (percentage >= 0.6) {
        praiseText.innerText = "Quá đỉnh! Nền tảng của em rất vững chắc đấy! 👏";
        memeImg.src = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif"; 
    } else {
        praiseText.innerText = "Hơi tiếc một chút! Nhưng sai ở đâu mình học ở đó, cố lên nhé! 💪";
        memeImg.src = "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif"; 
    }
    
    modal.style.display = "flex";
}

const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function createConfetti() {
    for (let i = 0; i < 50; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: canvas.height + Math.random() * 50,
            r: Math.random() * 6 + 2,
            dx: Math.random() * 4 - 2,
            dy: Math.random() * -10 - 5,
            color: `hsl(${Math.random() * 360}, 100%, 50%)`,
            tilt: Math.random() * 10
        });
    }
}

function animateConfetti() {
    requestAnimationFrame(animateConfetti);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    particles.forEach((p, index) => {
        p.dy += 0.3; 
        p.x += p.dx;
        p.y += p.dy;
        p.tilt += 0.1;
        
        ctx.beginPath();
        ctx.lineWidth = p.r;
        ctx.strokeStyle = p.color;
        ctx.moveTo(p.x + p.tilt + p.r, p.y);
        ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
        ctx.stroke();
        
        if (p.y > canvas.height) particles.splice(index, 1);
    });
}
animateConfetti();

function fireConfetti() {
    createConfetti();
}

window.onload = renderQuiz;
