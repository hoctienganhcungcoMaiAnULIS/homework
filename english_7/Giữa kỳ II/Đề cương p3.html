<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ms Mai An ULIS - English Gamified Test</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap');

        /* ANIMATED GRADIENT BACKGROUND WITH SVG PATTERN */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatPattern {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        body {
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(-45deg, #8854C0, #FDCB6E, #00C9A7, #FF8E53);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            position: relative;
            color: #333;
            min-height: 100vh;
        }

        /* Lớp họa tiết lơ lửng */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            /* SVG Pattern: Ngôi sao và chấm tròn vui nhộn */
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.2'%3E%3Cpath d='M30 5l2.5 7.5H40l-6 4.5 2.5 7.5L30 20l-6.5 4.5 2.5-7.5-6-4.5h7.5z'/%3E%3Ccircle cx='10' cy='40' r='3'/%3E%3Ccircle cx='50' cy='15' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: -1;
            animation: floatPattern 8s ease-in-out infinite;
            pointer-events: none;
        }

        .header-title {
            text-align: center;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 800;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .question-card {
            background: #fff;
            border: 3px solid #eee;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 6px 0 #eee;
            transition: all 0.3s ease;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .option-btn {
            background: #fff;
            border: 2px solid #e5e5e5;
            padding: 15px 20px;
            border-radius: 15px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #4b4b4b;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 5px 0 #e5e5e5;
            transition: all 0.1s ease;
            position: relative;
        }

        .option-btn:hover:not(.disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 7px 0 #e5e5e5;
        }

        .option-btn:active:not(.disabled) {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #e5e5e5;
        }

        .option-btn.correct {
            background: #00D26A;
            border-color: #00b35a;
            color: white;
            box-shadow: 0 5px 0 #008f48;
        }

        .option-btn.wrong {
            background: #FF4757;
            border-color: #e84150;
            color: white;
            box-shadow: 0 5px 0 #c23642;
        }

        .disabled {
            pointer-events: none;
            opacity: 0.8;
        }

        /* SHAKE ANIMATION */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.4s; }

        /* EXPLANATION BOX */
        .explanation-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f0f7ff;
            border-left: 6px solid #4834d4;
            border-radius: 10px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .explanation-box h4 {
            margin: 0 0 10px 0;
            color: #4834d4;
            font-size: 1.1rem;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #4834d4;
            color: white;
            font-size: 1.3rem;
            font-weight: 800;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0 #3c2aab;
            margin-top: 30px;
            transition: 0.2s;
            font-family: 'Quicksand', sans-serif;
        }

        .submit-btn:hover { background: #5a45ed; }
        .submit-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #3c2aab; }

        /* CONFETTI */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            z-index: 9999;
            pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        /* MODAL */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 20px; text-align: center;
            max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-content h2 { color: #4834d4; font-size: 2rem; margin-top:0; }
        .modal-content p { font-size: 1.2rem; font-weight: 700; color: #333; }
        .close-btn {
            margin-top: 20px; padding: 10px 30px; background: #00D26A; color: white;
            border: none; border-radius: 10px; font-weight: 700; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 0 #008f48;
        }
    </style>
</head>
<body>

    <div class="header-title">Giáo viên tạo: Ms Mai An ULIS</div>

    <div class="quiz-container" id="quiz-app">
        </div>
    <div class="quiz-container" style="background: transparent; box-shadow: none; padding: 0;">
         <button class="submit-btn" onclick="submitTest()">NỘP BÀI!</button>
    </div>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <h2>🎉 Hoàn Thành! 🎉</h2>
            <p id="scoreText">Bạn đúng 0/0 câu</p>
            <p id="feedbackText" style="color: #FF8E53;"></p>
            <button class="close-btn" onclick="closeModal()">Đóng</button>
        </div>
    </div>

<script>
    // --- 1. DỮ LIỆU CÂU HỎI & GIẢI THÍCH SIÊU CHI TIẾT ---
    const quizData = [
        // --- PHẦN REWRITE SENTENCES ---
        {
            qText: "Question 68. Both Vietnamese and Chinese people give children lucky money on Lunar New Year. <br>→ Like ___________________________.",
            options: [
                { text: "A. Like Vietnamese people, Chinese people give children lucky money on Lunar New Year.", isCorrect: true },
                { text: "B. Like Vietnamese people, Chinese people gives children lucky money on Lunar New Year.", isCorrect: false },
                { text: "C. Like Vietnamese people and Chinese people give children lucky money on Lunar New Year.", isCorrect: false },
                { text: "D. Like Vietnamese people, Chinese people giving children lucky money on Lunar New Year.", isCorrect: false }
            ],
            explain: `<b>1. Dịch câu hỏi:</b> Cả người Việt Nam và Trung Quốc đều mừng tuổi trẻ em vào dịp Tết Nguyên Đán. -> Giống như...<br>
            <b>2. Dịch nghĩa các đáp án:</b><br>
            A. Giống như người Việt Nam, người Trung Quốc mừng tuổi trẻ em vào dịp Tết.<br>
            B, C, D: Đều sai ngữ pháp (không có nghĩa hoàn chỉnh hợp lệ).<br>
            <b>3. Tại sao chọn A?</b> Đúng cấu trúc <i>Like + Noun/Pronoun, S + V</i> (Giống như [ai đó], [chủ ngữ] làm gì).<br>
            <b>4. Tại sao 3 đáp án còn lại SAI?</b><br>
            - B sai vì "Chinese people" là số nhiều, động từ "gives" (thêm s) là sai.<br>
            - C sai vì thừa chữ "and", phá vỡ cấu trúc "Like A, B do...".<br>
            - D sai vì thiếu động từ chính được chia theo thì, "giving" (V-ing) đứng một mình không thể làm động từ chính của câu.`
        },
        {
            qText: "Question 69. Bicycles are slower than motorbikes. (AS...AS)<br>→ ___________________________.",
            options: [
                { text: "A. Bicycles are not as fast as motorbikes.", isCorrect: true },
                { text: "B. Bicycles are not as slow as motorbikes.", isCorrect: false },
                { text: "C. Motorbikes are as fast as bicycles.", isCorrect: false },
                { text: "D. Bicycles are as fast as motorbikes.", isCorrect: false }
            ],
            explain: `<b>1. Dịch câu hỏi:</b> Xe đạp chậm hơn xe máy. (Sử dụng cấu trúc AS...AS)<br>
            <b>2. Dịch nghĩa các đáp án:</b><br>
            A. Xe đạp không nhanh bằng xe máy.<br>
            B. Xe đạp không chậm bằng xe máy.<br>
            C. Xe máy nhanh bằng xe đạp.<br>
            D. Xe đạp nhanh bằng xe máy.<br>
            <b>3. Tại sao chọn A?</b> Biến đổi từ so sánh hơn (chậm hơn) sang so sánh bằng phủ định (không nhanh bằng). Slower -> not as fast as.<br>
            <b>4. Tại sao 3 đáp án còn lại SAI?</b><br>
            - B sai nghĩa gốc (xe đạp thực tế chậm hơn, chứ không phải "không chậm bằng").<br>
            - C và D sai hoàn toàn về mặt logic và ý nghĩa so với câu gốc.`
        },
        {
            qText: "Question 70. Studying abroad can be scary. However, you can keep in contact with your friends and family on social media.<br>→ Although studying abroad ___________________________.",
            options: [
                { text: "A. Although studying abroad can be scary, you can keep in contact with your friends and family on social media.", isCorrect: true },
                { text: "B. Although studying abroad can be scary, but you can keep in contact with your friends and family on social media.", isCorrect: false },
                { text: "C. Although studying abroad can be scary; however, you can keep in contact with your friends.", isCorrect: false },
                { text: "D. Although studying abroad can be scary, you keeping in contact with your friends.", isCorrect: false }
            ],
            explain: `<b>1. Dịch câu hỏi:</b> Việc du học có thể đáng sợ. Tuy nhiên, bạn có thể giữ liên lạc với bạn bè và gia đình trên mạng xã hội.<br>
            <b>2. Dịch nghĩa các đáp án:</b><br>
            A. Mặc dù việc du học có thể đáng sợ, bạn vẫn có thể giữ liên lạc...<br>
            B. Sai ngữ pháp (Mặc dù... nhưng...).<br>
            C. Sai ngữ pháp (Mặc dù... tuy nhiên...).<br>
            D. Sai ngữ pháp (mất động từ chính).<br>
            <b>3. Tại sao chọn A?</b> Cấu trúc <i>Although + Mệnh đề 1, Mệnh đề 2</i> (Mặc dù... nhưng...).<br>
            <b>4. Tại sao 3 đáp án còn lại SAI?</b><br>
            - B sai vì trong tiếng Anh, đã dùng "Although" thì <b>KHÔNG DÙNG "but"</b> ở vế sau.<br>
            - C sai vì đã dùng "Although" thì không dùng kèm "however".<br>
            - D sai vì vế sau "you keeping" bị sai thì, thiếu động từ khuyết thiếu "can" như câu gốc.`
        },
        {
            qText: "Question 71. No one else in my family drives better than my father.<br>→ My father ___________________________.",
            options: [
                { text: "A. My father drives the best in my family.", isCorrect: true },
                { text: "B. My father drives best than anyone in my family.", isCorrect: false },
                { text: "C. My father drives the better in my family.", isCorrect: false },
                { text: "D. My father is drives the best in my family.", isCorrect: false }
            ],
            explain: `<b>1. Dịch câu hỏi:</b> Không ai trong gia đình tôi lái xe giỏi hơn bố tôi.<br>
            <b>2. Dịch nghĩa các đáp án:</b><br>
            A. Bố tôi lái xe giỏi nhất trong gia đình tôi.<br>
            B, C, D: Đều sai cấu trúc ngữ pháp.<br>
            <b>3. Tại sao chọn A?</b> Câu gốc là so sánh hơn mang nghĩa tuyệt đối -> Chuyển sang so sánh nhất. Trạng từ "well" (lái xe tốt) -> So sánh hơn là "better" -> So sánh nhất là "the best".<br>
            <b>4. Tại sao 3 đáp án còn lại SAI?</b><br>
            - B râu ông nọ cắm cằm bà kia: "best" (nhất) lại đi với "than" (hơn).<br>
            - C sai vì "the" đi với so sánh nhất, không đi với so sánh hơn "better" trong trường hợp này.<br>
            - D sai vì thừa động từ to be "is" đứng trước động từ thường "drives".`
        },
        {
            qText: "Question 72. Anna's mother is from China, but she can't speak Chinese. (HOWEVER)<br>→ Anna's mother ___________________________.",
            options: [
                { text: "A. Anna's mother is from China; however, she can't speak Chinese.", isCorrect: true },
                { text: "B. Anna's mother is from China however she can't speak Chinese.", isCorrect: false },
                { text: "C. Anna's mother is from China, however, she can't speak Chinese.", isCorrect: false },
                { text: "D. Anna's mother is from China; however she can't speak Chinese.", isCorrect: false }
            ],
            explain: `<b>1. Dịch câu hỏi:</b> Mẹ của Anna đến từ Trung Quốc, nhưng bà ấy không thể nói tiếng Trung.<br>
            <b>2. Dịch nghĩa:</b> Mẹ của Anna đến từ Trung Quốc; tuy nhiên, bà không thể nói tiếng Trung.<br>
            <b>3. Tại sao chọn A?</b> Câu này kiểm tra dấu câu với từ "However". Khi "however" nối 2 mệnh đề độc lập, nó phải đứng sau dấu chấm phẩy (;) và trước dấu phẩy (,). Cấu trúc: <i>Clause 1; however, Clause 2.</i><br>
            <b>4. Tại sao 3 đáp án còn lại SAI?</b><br>
            - B sai hoàn toàn vì thiếu dấu câu.<br>
            - C sai vì nối 2 mệnh đề độc lập bằng dấu phẩy (, however,) là lỗi "comma splice".<br>
            - D sai vì thiếu dấu phẩy (,) ngay sau chữ "however".`
        },
        {
            qText: "Question 73. Luke wants to study overseas, but he is afraid of living alone.<br>→ Although Luke ___________________________.",
            options: [
                { text: "A. Although Luke wants to study overseas, he is afraid of living alone.", isCorrect: true },
                { text: "B. Although Luke wants to study overseas, but he is afraid of living alone.", isCorrect: false },
                { text: "C. Although Luke wanting to study overseas, he is afraid of living alone.", isCorrect: false },
                { text: "D. Although Luke wants to study overseas he is afraid of living alone.", isCorrect: false }
            ],
            explain: `<b>1. Dịch câu hỏi:</b> Luke muốn đi du học, nhưng cậu ấy sợ phải sống một mình.<br>
            <b>2. Nghĩa:</b> Mặc dù Luke muốn đi du học, cậu ấy sợ sống một mình.<br>
            <b>3. Tại sao chọn A?</b> Cấu trúc tương phản: <i>Although + S + V, S + V</i>.<br>
            <b>4. Tại sao 3 đáp án còn lại SAI?</b><br>
            - B sai lỗi kinh điển: Đã có "Although" thì tuyệt đối <b>KHÔNG CÓ "but"</b>.<br>
            - C sai vì "wanting" (V-ing) không thể làm động từ chính của mệnh đề sau Although.<br>
            - D sai vì thiếu dấu phẩy (,) ngăn cách giữa 2 mệnh đề.`
        },
        {
            qText: "Question 74. People will hold the Mid-Autumn Festival on September 25th, 2026.<br>→ The Mid-Autumn Festival will take ___________________________.",
            options: [
                { text: "A. The Mid-Autumn Festival will take place on September 25th, 2026.", isCorrect: true },
                { text: "B. The Mid-Autumn Festival will take part on September 25th, 2026.", isCorrect: false },
                { text: "C. The Mid-Autumn Festival will take care on September 25th, 2026.", isCorrect: false },
                { text: "D. The Mid-Autumn Festival will take place in September 25th, 2026.", isCorrect: false }
            ],
            explain: `<b>1. Dịch câu hỏi:</b> Người ta sẽ tổ chức Tết Trung Thu vào ngày 25 tháng 9 năm 2026.<br>
            <b>2. Dịch nghĩa các đáp án:</b><br>
            A. Tết Trung Thu sẽ diễn ra vào ngày 25 tháng 9 năm 2026.<br>
            B. (Take part = tham gia) -> Sai nghĩa.<br>
            C. (Take care = chăm sóc) -> Sai nghĩa.<br>
            D. Sai giới từ.<br>
            <b>3. Tại sao chọn A?</b> Cụm từ <b>take place</b> mang nghĩa là "được tổ chức, diễn ra". Đi với ngày tháng đầy đủ dùng giới từ "on".<br>
            <b>4. Tại sao 3 đáp án còn lại SAI?</b><br>
            - B và C dùng sai cụm động từ (collocation) hoàn toàn không phù hợp ngữ cảnh.<br>
            - D sai giới từ. Với "September 25th" (có ngày) thì bắt buộc phải dùng giới từ <b>"on"</b>, không được dùng "in".`
        },
        {
            qText: "Question 75. Life in the countryside is quiet and peaceful. Life in the city is exciting. (DIFFERENT)<br>→ Life in the countryside ___________________________.",
            options: [
                { text: "A. Life in the countryside is different from life in the city.", isCorrect: true },
                { text: "B. Life in the countryside is different with life in the city.", isCorrect: false },
                { text: "C. Life in the countryside is different than life in the city.", isCorrect: false },
                { text: "D. Life in the countryside is different to life in the city.", isCorrect: false }
            ],
            explain: `<b>1. Dịch câu hỏi:</b> Cuộc sống ở nông thôn tĩnh lặng và thanh bình. Cuộc sống ở thành phố thì náo nhiệt.<br>
            <b>2. Dịch nghĩa:</b> Cuộc sống ở nông thôn khác với cuộc sống ở thành phố.<br>
            <b>3. Tại sao chọn A?</b> Cấu trúc bắt buộc cần ghi nhớ: <b>be different from</b> (khác biệt so với). Anh - Anh hay Anh - Mỹ chuẩn nhất đều dùng "from".<br>
            <b>4. Tại sao 3 đáp án còn lại SAI?</b><br>
            - B sai hoàn toàn vì tiếng Anh không dùng "different with". Đây là lỗi dịch word-by-word từ tiếng Việt (khác với).<br>
            - C ("different than") và D ("different to") thỉnh thoảng xuất hiện trong văn nói tiếng lóng vùng miền, nhưng trong ngữ pháp tiếng Anh chuẩn mực cấp phổ thông, <b>"from"</b> là đáp án duy nhất đúng.`
        },
        {
            qText: "Question 76. This table is fifteen dollars. That chair is ten dollars. (MORE ... THAN)<br>→ This table is ___________________________.",
            options: [
                { text: "A. This table is more expensive than that chair.", isCorrect: true },
                { text: "B. This table is more cheap than that chair.", isCorrect: false },
                { text: "C. This table is more price than that chair.", isCorrect: false },
                { text: "D. This table is more expensive that chair.", isCorrect: false }
            ],
            explain: `<b>1. Dịch câu hỏi:</b> Chiếc bàn này giá 15 đô. Chiếc ghế kia giá 10 đô.<br>
            <b>2. Dịch nghĩa:</b> Chiếc bàn này thì đắt tiền hơn chiếc ghế kia.<br>
            <b>3. Tại sao chọn A?</b> So sánh hơn với tính từ dài "expensive" (đắt): <b>S1 + be + more + adj + than + S2</b>.<br>
            <b>4. Tại sao 3 đáp án còn lại SAI?</b><br>
            - B sai vì "cheap" là tính từ ngắn, phải dùng "cheaper" chứ không dùng "more cheap". Hơn nữa bàn đắt hơn ghế nên dùng cheap là sai nghĩa.<br>
            - C sai vì "price" là danh từ, không đứng sau "more" trong cấu trúc này.<br>
            - D thiếu chữ <b>"than"</b> (bắt buộc phải có trong câu so sánh hơn).`
        },
        {

    // --- 2. WEB AUDIO API CƠ BẢN ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = new AudioContext();

    function playSound(type) {
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'correct') {
            // Ding sound
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); // High pitch
            oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
        } else {
            // Buzz sound (Téo tèo tèo)
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); // Low pitch
            oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        }
    }

    // --- 3. CONFETTI EFFECT ---
    function fireConfetti() {
        const colors = ['#00D26A', '#FF4757', '#FDCB6E', '#4834d4', '#FF8E53'];
        for (let i = 0; i < 30; i++) {
            let conf = document.createElement('div');
            conf.classList.add('confetti');
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 2500);
        }
    }

    // --- 4. RENDER VÀ LOGIC GAME ---
    const quizApp = document.getElementById('quiz-app');
    let totalCorrect = 0;
    let answeredQuestions = 0;

    // Shuffle options array
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initQuiz() {
        quizData.forEach((item, index) => {
            // Clone và shuffle đáp án
            const shuffledOptions = shuffleArray([...item.options]);

            let card = document.createElement('div');
            card.classList.add('question-card');
            card.id = `q-card-${index}`;

            let qHtml = `<div class="question-text">${item.qText}</div><div class="options-grid">`;

            shuffledOptions.forEach((opt, optIndex) => {
                // Encode the text carefully for data attributes
                const isCorrectStr = opt.isCorrect ? "true" : "false";
                qHtml += `<button class="option-btn" onclick="checkAnswer(this, ${index}, ${isCorrectStr})">${opt.text}</button>`;
            });

            qHtml += `</div>
            <div class="explanation-box" id="exp-${index}">
                <h4>Giáo viên giải thích chi tiết 👩‍🏫:</h4>
                ${item.explain}
            </div>`;

            card.innerHTML = qHtml;
            quizApp.appendChild(card);
        });
    }

    window.checkAnswer = function(btn, qIndex, isCorrect) {
        const card = document.getElementById(`q-card-${qIndex}`);
        const allBtns = card.querySelectorAll('.option-btn');
        const expBox = document.getElementById(`exp-${qIndex}`);

        // Disable all buttons in this question
        allBtns.forEach(b => b.classList.add('disabled'));

        if (isCorrect) {
            btn.classList.add('correct');
            playSound('correct');
            fireConfetti();
            totalCorrect++;
        } else {
            btn.classList.add('wrong');
            btn.classList.add('shake');
            playSound('wrong');
            // Highlight the correct one
            allBtns.forEach(b => {
                if(b.getAttribute('onclick').includes('true')) {
                    b.classList.add('correct');
                    b.style.opacity = '0.5';
                }
            });
        }

        // Show explanation immediately
        expBox.style.display = 'block';
        answeredQuestions++;
    }

    window.submitTest = function() {
        if(answeredQuestions < quizData.length) {
            alert(`Bạn mới làm ${answeredQuestions}/${quizData.length} câu. Hãy hoàn thành hết nhé!`);
            return;
        }
        const modal = document.getElementById('resultModal');
        const scoreText = document.getElementById('scoreText');
        const feedbackText = document.getElementById('feedbackText');

        scoreText.innerText = `Bạn trả lời đúng: ${totalCorrect} / ${quizData.length} câu`;

        let ratio = totalCorrect / quizData.length;
        if(ratio === 1) feedbackText.innerText = "Tuyệt vời! Bạn là Master Ngữ Pháp! 🏆";
        else if (ratio >= 0.8) feedbackText.innerText = "Rất tốt! Cố gắng chút nữa là hoàn hảo! 🌟";
        else if (ratio >= 0.5) feedbackText.innerText = "Cũng khá đấy! Hãy đọc kỹ giải thích để tiến bộ hơn nhé! 👍";
        else feedbackText.innerText = "Đừng nản chí! Học kỹ giải thích của cô và làm lại nhé! 💪";

        modal.style.display = 'flex';
        if(ratio >= 0.5) fireConfetti();
    }

    window.closeModal = function() {
        document.getElementById('resultModal').style.display = 'none';
    }

    // Start App
    initQuiz();
</script>
