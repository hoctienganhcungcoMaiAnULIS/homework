<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mastery - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #FDCB6E;
            --tertiary: #00C9A7;
            --correct: #00D26A;
            --wrong: #FF4757;
            --text-dark: #2d3436;
            --bg-card: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            /* Gradient Pastel Mượt Mà */
            background: linear-gradient(-45deg, #a18cd1, #fbc2eb, #fad0c4, #ffd1ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: var(--text-dark);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Họa tiết lơ lửng vui nhộn (Ngôi sao, tròn, hoa) */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.25'%3E%3Cpath d='M40 10l5 15h15l-12 10 5 15-13-10-13 10 5-15-12-10h15z'/%3E%3Ccircle cx='20' cy='60' r='5'/%3E%3Ccircle cx='60' cy='20' r='3'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: -1;
            animation: floatPattern 25s linear infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatPattern {
            0% { background-position: 0 0; }
            100% { background-position: 160px 160px; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
        }

        .teacher-name {
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--text-dark);
            margin-top: 5px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-size: 1.5rem;
            font-weight: 800;
        }
        .score-pill {
            background: var(--tertiary);
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            box-shadow: 0 5px 0 #009980;
        }

        .exercise-title {
            background: var(--text-dark);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            margin: 40px 0 20px 0;
            font-size: 1.5rem;
            font-weight: 800;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            text-align: center;
            text-transform: uppercase;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
            position: relative;
            transition: all 0.3s ease;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        /* Styles cho phần điền từ */
        .blank {
            display: inline-block;
            min-width: 130px;
            height: 45px;
            border-bottom: 4px dashed var(--primary);
            cursor: pointer;
            text-align: center;
            color: var(--primary);
            font-weight: 800;
            font-size: 1.3rem;
            transition: all 0.2s;
            padding: 0 15px;
            background: rgba(136, 84, 192, 0.1);
            border-radius: 12px 12px 0 0;
            vertical-align: middle;
            margin: 0 5px;
        }

        .blank:hover {
            background: rgba(136, 84, 192, 0.2);
            transform: scale(1.05);
        }

        .blank.answered-correct {
            color: white;
            background: var(--correct);
            border: none;
            border-radius: 12px;
            box-shadow: 0 5px 0 #00a050;
            pointer-events: none;
        }

        .blank.answered-wrong {
            color: white;
            background: var(--wrong);
            border: none;
            border-radius: 12px;
            box-shadow: 0 5px 0 #cc3945;
            pointer-events: none;
        }

        /* Styles cho phần Trắc nghiệm ABCD */
        .mcq-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .mcq-btn {
            background: white;
            border: 3px solid #eee;
            border-radius: 15px;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-dark);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            box-shadow: 0 5px 0 #eee;
            display: flex;
            align-items: center;
        }

        .mcq-btn:hover:not(:disabled) {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 8px 0 var(--primary);
        }

        .mcq-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 3px 0 var(--primary);
        }

        .mcq-btn.correct {
            background: var(--correct);
            border-color: var(--correct);
            color: white;
            box-shadow: 0 5px 0 #00a050;
        }

        .mcq-btn.wrong {
            background: var(--wrong);
            border-color: var(--wrong);
            color: white;
            box-shadow: 0 5px 0 #cc3945;
        }

        /* Giải thích */
        .explanation-box {
            display: none;
            margin-top: 25px;
            padding: 25px;
            background: #fdfbf7;
            border: 3px solid #ffeaa7;
            border-radius: 15px;
            font-size: 1.1rem;
            line-height: 1.7;
            animation: slideDown 0.4s ease-out;
        }

        .explanation-box h4 {
            color: #d35400;
            margin-bottom: 15px;
            font-size: 1.3rem;
            border-bottom: 2px dashed #ffeaa7;
            padding-bottom: 8px;
            text-transform: uppercase;
        }

        .explanation-step {
            margin-bottom: 15px;
        }
        
        .explanation-step strong {
            color: var(--primary);
        }

        u {
            text-decoration: underline;
            text-decoration-thickness: 3px;
            text-decoration-color: var(--wrong);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Modal cho Gap Fill */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 25px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            text-align: center;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 1.6rem;
            margin-bottom: 25px;
            color: var(--text-dark);
            font-weight: 800;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: white;
            border: 3px solid #eee;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 #eee;
        }

        .option-btn:hover {
            transform: translateY(-3px);
            border-color: var(--tertiary);
            box-shadow: 0 9px 0 var(--tertiary);
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        .submit-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: var(--wrong);
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 10px 0 #c0392b;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 13px 0 #c0392b;
            background: #ff5252;
        }

        .submit-btn:active {
            transform: translateY(7px);
            box-shadow: 0 3px 0 #c0392b;
        }

        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="container">
        <header>
            <div class="teacher-name">Giáo viên tạo: Ms Mai An ULIS</div>
            <h1>Blooket Mastery Challenge 🚀</h1>
            <div class="score-board">
                <div class="score-pill">Score: <span id="score">0</span> / 50</div>

        <div id="quiz-container"></div>

        <button class="submit-btn" onclick="finishQuiz()">Nộp bài & Nhận thưởng 🎁</button>
    </div>

    <div class="modal-overlay" id="word-modal">
        <div class="modal-content">
            <div class="modal-title">Chọn từ thích hợp:</div>
            <div id="modal-options"></div>
        </div>
    </div>

<script>
const quizData = [
    // ==========================================

    {
        type: 'mcq',
        ex: "Exercise 3. Choose the word that has the underlined part pronounced differently from the others. (Phonetics)",

        reason: "Đáp án C đúng vì chữ 'i' được phát âm là âm ngắn /ɪ/.",
        wrong: "3 đáp án còn lại sai vì chữ 'i' đều được phát âm là nguyên âm đôi /aɪ/."

    {

        ans: "D", vi: "Yêu cầu: Tìm từ có cách phát âm chữ 'a' khác.",
        vocab: { "A. maths": "/mæθs/ (n): toán học", "B. bag": "/bæɡ/ (n): túi xách", "C. cat": "/kæt/ (n): con mèo", "D. page": "/peɪdʒ/ (n): trang giấy" },
        reason: "Đáp án D có chữ 'a' phát âm là /eɪ/.", wrong: "Các đáp án A, B, C đều có chữ 'a' phát âm là âm bẹt /æ/."
    },
    {
        type: 'mcq', q: "Choose the correct answer:", options: [{ id: 'A', text: "<u>u</u>nder" }, { id: 'B', text: "t<u>u</u>ne" }, { id: 'C', text: "l<u>u</u>nch" }, { id: 'D', text: "m<u>u</u>st" }],

    },
    {
        type: 'mcq', q: "Choose the correct answer:", options: [{ id: 'A', text: "wi<u>th</u>" }, { id: 'B', text: "ba<u>th</u>" }, { id: 'C', text: "<u>th</u>ank" }, { id: 'D', text: "<u>th</u>esis" }],
        ans: "A", vi: "Yêu cầu: Tìm từ có cách phát âm âm 'th' khác.",
        vocab: { "A. with": "/wɪð/ (prep): với", "B. bath": "/bɑːθ/ (n): bồn tắm", "C. thank": "/θæŋk/ (v): cảm ơn", "D. thesis": "/ˈθiː.sɪs/ (n): luận văn" },

    },
    {
        type: 'mcq', q: "Choose the correct answer:", options: [{ id: 'A', text: "pen<u>s</u>" }, { id: 'B', text: "word<u>s</u>" }, { id: 'C', text: "call<u>s</u>" }, { id: 'D', text: "cat<u>s</u>" }],
        ans: "D", vi: "Yêu cầu: Tìm từ có cách phát âm đuôi 's' khác.",
        vocab: { "A. pens": "/penz/ (n): những chiếc bút", "B. words": "/wɜːdz/ (n): những từ vựng", "C. calls": "/kɔːlz/ (v): gọi", "D. cats": "/kæts/ (n): những con mèo" },
        reason: "Từ 'cats' kết thúc bằng âm vô thanh /t/ nên đuôi 's' đọc là /s/.", wrong: "Các từ còn lại kết thúc bằng âm hữu thanh nên đuôi 's' đọc là /z/."
    },
    {

        reason: "Từ 'to' phát âm chữ 'o' là /uː/.", wrong: "Các từ A, B, C phát âm chữ 'o' là nguyên âm đôi /əʊ/."

        reason: "Trong từ 'racket', chữ 'e' nằm ở âm tiết không mang trọng âm, bị biến âm thành /ɪ/ (hoặc /ə/).", wrong: "Các từ còn lại chữ 'e' đều phát âm rõ là /e/."

    },
    {
        type: 'mcq', q: "Choose the correct answer:", options: [{ id: 'A', text: "<u>s</u>orrow" }, { id: 'B', text: "ro<u>s</u>e" }, { id: 'C', text: "thi<u>s</u>" }, { id: 'D', text: "di<u>s</u>appear" }],

        reason: "Chữ 'y' ở cuối từ có 2 âm tiết không nhấn trọng âm (cloudy) đọc là /i/ (hoặc /ɪ/).", wrong: "Ở các từ A, B, D chữ 'y' được nhấn mạnh nên đọc là /aɪ/."

    {

// Hệ thống Âm thanh Web Audio API (Tạo tự động, không cần link file ngoài)
let audioCtx;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
    if(!audioCtx) initAudio();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
        osc.frequency.exponentialRampToValueAtTime(1046.5, audioCtx.currentTime + 0.1); 
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    } else {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }
}

function shuffleArray(array) {
    let curId = array.length;
    while (0 !== curId) {
        let randId = Math.floor(Math.random() * curId);
        curId -= 1;
        let tmp = array[curId]; array[curId] = array[randId]; array[randId] = tmp;
    }
    return array;
}

let score = 0;
let answeredCount = 0;
const totalQs = quizData.length;

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    let currentEx = "";

    quizData.forEach((item, index) => {
        if (item.ex && item.ex !== currentEx) {
            currentEx = item.ex;
            const exTitle = document.createElement('div');
            exTitle.className = 'exercise-title';
            exTitle.innerText = currentEx;
            container.appendChild(exTitle);
        }

        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${index}`;

        const qText = document.createElement('div');
        qText.className = 'question-text';
        
        // Render Text Question
        if (item.type === 'gap') {
            const parts = item.q.split('___');
            qText.innerHTML = `<strong>${index + 1}.</strong> ${parts[0]}<span class="blank" id="blank-${index}" onclick="openModal(${index})">Chọn từ</span>${parts[1]}`;
            card.appendChild(qText);
        } else if (item.type === 'mcq') {
            qText.innerHTML = `<strong>${index + 1}.</strong> ${item.q}`;
            card.appendChild(qText);
            
            const mcqGrid = document.createElement('div');
            mcqGrid.className = 'mcq-grid';
            item.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'mcq-btn';
                btn.innerHTML = opt.text;
                btn.onclick = () => checkMCQAnswer(index, opt.id, btn, mcqGrid);
                mcqGrid.appendChild(btn);
            });
            card.appendChild(mcqGrid);
        }
        
        // Box giải thích (Ẩn ban đầu)
        const explBox = document.createElement('div');
        explBox.className = 'explanation-box';
        explBox.id = `expl-${index}`;
        
        let vocabHTML = "";
        for(let word in item.vocab) {
            vocabHTML += `&bull; <strong>${word}</strong> ${item.vocab[word]}<br>`;
        }

        explBox.innerHTML = `
            <h4>📝 PHẦN GIẢI THÍCH CHI TIẾT</h4>
            <div class="explanation-step"><strong>1. Dịch/Yêu cầu:</strong><br>${item.vi}</div>
            <div class="explanation-step"><strong>2. Phân tích:</strong><br>${vocabHTML}</div>
            <div class="explanation-step"><strong>3. Tại sao Đúng?</strong><br>${item.reason}</div>
            <div class="explanation-step"><strong>4. Tại sao Sai?</strong><br>${item.wrong}</div>
        `;

        card.appendChild(explBox);
        container.appendChild(card);
    });
}

// ================= LOGIC MCQ (Phonetics) =================
function checkMCQAnswer(index, selectedId, btnEl, gridEl) {
    if(gridEl.hasAttribute('data-answered')) return; // Ngăn bấm nhiều lần
    gridEl.setAttribute('data-answered', 'true');
    initAudio();

    const item = quizData[index];
    const card = document.getElementById(`card-${index}`);
    const explBox = document.getElementById(`expl-${index}`);

    // Disable all buttons in this grid
    const allBtns = gridEl.querySelectorAll('.mcq-btn');
    allBtns.forEach(b => b.disabled = true);

    if (selectedId === item.ans) {
        btnEl.classList.add('correct');
        playSound('correct');
        fireConfetti();
        score++;
        document.getElementById('score').innerText = score;
    } else {
        btnEl.classList.add('wrong');
        // Highlight correct answer
        const correctIndex = item.options.findIndex(o => o.id === item.ans);
        allBtns[correctIndex].classList.add('correct');
        
        playSound('wrong');
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 500);
    }
    
    explBox.style.display = 'block';
    answeredCount++;
}

// ================= LOGIC GAP FILL =================
let currentActiveIndex = null;
const modal = document.getElementById('word-modal');
const modalOptions = document.getElementById('modal-options');

function openModal(index) {
    const blankEl = document.getElementById(`blank-${index}`);
    if(blankEl.classList.contains('answered-correct') || blankEl.classList.contains('answered-wrong')) return;
    
    initAudio();
    currentActiveIndex = index;
    
    const item = quizData[index];
    let options = [item.ans, ...item.distractors];
    options = shuffleArray(options.slice()); // Copy & Shuffle

    modalOptions.innerHTML = '';
    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkGapAnswer(opt);
        modalOptions.appendChild(btn);
    });

    modal.style.display = 'flex';
}

function checkGapAnswer(selectedWord) {
    modal.style.display = 'none';
    const item = quizData[currentActiveIndex];
    const card = document.getElementById(`card-${currentActiveIndex}`);
    const explBox = document.getElementById(`expl-${currentActiveIndex}`);
    const blankEl = document.getElementById(`blank-${currentActiveIndex}`);
    
    blankEl.innerText = selectedWord;

    if (selectedWord === item.ans) {
        blankEl.classList.add('answered-correct');
        playSound('correct');
        fireConfetti();
        score++;
        document.getElementById('score').innerText = score;
    } else {
        blankEl.classList.add('answered-wrong');
        blankEl.innerText = `${selectedWord} ❌ -> ${item.ans}`;
        playSound('wrong');
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 500);
    }

    explBox.style.display = 'block';
    answeredCount++;
}

modal.addEventListener('click', function(e) {
    if (e.target === modal) modal.style.display = 'none';
});

// ================= KẾT THÚC & HIỆU ỨNG =================
function finishQuiz() {
    if(answeredCount < totalQs) {
        alert(`Bạn mới làm ${answeredCount}/${totalQs} câu thôi. Hãy hoàn thành hết để nhận thưởng nhé! 💪`);
        return;
    }
    
    let msg = "";
    if(score === totalQs) msg = "Quá xuất sắc! Bạn là Master Tiếng Anh thực thụ! 🏆💯";
    else if(score >= totalQs * 0.8) msg = "Rất tuyệt vời! Chỉ sai một chút xíu thôi! 🌟";
    else if(score >= totalQs * 0.5) msg = "Khá lắm! Cố gắng luyện tập đọc phần giải thích thêm nhé! 👍";
    else msg = "Đừng nản chí! Đọc kỹ phần giải thích chi tiết bên dưới để tiến bộ hơn nhé! 📚";
    
    alert(`Bạn đạt ${score}/${totalQs} điểm!\n\n${msg}`);
    if(score >= totalQs * 0.5) {
        for(let i=0; i<5; i++) setTimeout(fireConfetti, i*400);
    }
}

function fireConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    const pieces = [];
    const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4CAF50', '#8BC34A', '#CDDC39', '#FFEB3B', '#FFC107', '#FF9800', '#FF5722'];

    for (let i = 0; i < 120; i++) {
        pieces.push({
            x: canvas.width / 2, y: canvas.height / 2 + 100,
            vx: (Math.random() - 0.5) * 25, vy: (Math.random() - 1) * 25,
            size: Math.random() * 12 + 6,
            color: colors[Math.floor(Math.random() * colors.length)],
            rotation: Math.random() * 360, rotationSpeed: (Math.random() - 0.5) * 10
        });
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let active = false;
        pieces.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.6; p.rotation += p.rotationSpeed;
            if (p.y < canvas.height) active = true;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation * Math.PI / 180);
            ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore();
        });
        if (active) requestAnimationFrame(animate);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    animate();
}

renderQuiz();
