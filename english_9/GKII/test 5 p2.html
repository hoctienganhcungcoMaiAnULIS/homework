<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mastery Quiz - Gamification</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: rgba(255, 255, 255, 0.25);
            --border: rgba(255, 255, 255, 0.4);
            --correct: #00D26A;
            --wrong: #FF4757;
            --text-dark: #2d3436;
            --text-light: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            /* DYNAMIC THEME: Loang màu Pastel liên tục */
            background: linear-gradient(-45deg, #a18cd1, #fbc2eb, #8fd3f4, #84fab0);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* DYNAMIC THEME: SVG Pattern lơ lửng */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250"><text x="20" y="40" font-size="35" opacity="0.8">🌴</text><text x="150" y="80" font-size="30" opacity="0.8">📚</text><text x="60" y="160" font-size="40" opacity="0.8">✈️</text><text x="180" y="200" font-size="35" opacity="0.8">🌊</text><text x="100" y="100" font-size="25" opacity="0.8">✨</text><text x="220" y="30" font-size="30" opacity="0.8">🎯</text></svg>');
            background-repeat: repeat;
            opacity: 0.3;
            z-index: -1;
            animation: floatBackground 40s linear infinite;
        }

        @keyframes floatBackground {
            from { background-position: 0 0; }
            to { background-position: 500px 500px; }
        }

        /* Glassmorphism Classes */
        .glass {
            background: var(--primary);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        /* Header / Top Control Bar */
        header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            margin: 10px 20px;
        }

        .teacher-info {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-dark);
            background: rgba(255,255,255,0.4);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #timer-display {
            font-size: 1.5rem;
            font-weight: 900;
            color: #2d3436;
            background: rgba(255,255,255,0.6);
            padding: 8px 20px;
            border-radius: 15px;
            letter-spacing: 2px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .btn-action {
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
            color: white;
            text-transform: uppercase;
        }

        .btn-start { background: #6c5ce7; }
        .btn-start:hover { background: #5b4bc4; transform: translateY(2px); box-shadow: 0 4px 0 rgba(0,0,0,0.15); }
        .btn-submit { background: #e84393; display: block; width: 100%; margin-top: 20px; font-size: 1.3rem; padding: 15px;}
        .btn-submit:hover { background: #d63080; transform: translateY(2px); box-shadow: 0 4px 0 rgba(0,0,0,0.15); }

        /* Split Screen Layout */
        .main-container {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 0 20px 20px 20px;
            overflow: hidden;
        }

        .pane {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            scroll-behavior: smooth;
        }

        .pane::-webkit-scrollbar { width: 8px; }
        .pane::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px;}
        .pane::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }

        /* Reading Passage Styles */
        .passage-section { margin-bottom: 40px; }
        .passage-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 15px; color: #2d3436; text-shadow: 1px 1px 2px rgba(255,255,255,0.5);}
        .paragraph-box {
            background: rgba(255,255,255,0.4);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .btn-translate {
            background: #ffeaa7;
            color: #d35400;
            border: none;
            padding: 6px 15px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
            box-shadow: 0 4px 0 rgba(211, 84, 0, 0.2);
            transition: all 0.2s;
        }
        .btn-translate:hover { transform: translateY(2px); box-shadow: 0 2px 0 rgba(211, 84, 0, 0.2); }

        .translation-box {
            display: none;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 15px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 1rem;
            color: #2c3e50;
            border-left: 4px solid #00b894;
        }

        /* Glossary Table */
        .glossary-wrapper { margin-top: 20px; margin-bottom: 30px;}
        .glossary-title { font-size: 1.2rem; font-weight: 800; color: #6c5ce7; margin-bottom: 10px;}
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: rgba(255,255,255,0.5);
            border-radius: 15px;
            overflow: hidden;
        }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.05); }
        th { background: rgba(108, 92, 231, 0.2); font-weight: 800; color: #2d3436; }
        td:first-child { font-weight: 700; color: #d63031; }

        /* Exercise Styles */
        .question-card {
            background: rgba(255,255,255,0.6);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .question-text {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: #2d3436;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 2px solid transparent;
            padding: 12px 20px;
            border-radius: 15px;
            font-size: 1.08rem;
            font-weight: 700;
            color: #2d3436;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            box-shadow: 0 5px 0 rgba(0,0,0,0.1);
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.02);
            border-color: #74b9ff;
        }

        .option-btn:disabled { cursor: not-allowed; }
        
        .option-btn.correct {
            background: var(--correct);
            color: white;
            border-color: #00b894;
            box-shadow: 0 5px 0 #00b894;
        }
        
        .option-btn.wrong {
            background: var(--wrong);
            color: white;
            border-color: #d63031;
            box-shadow: 0 5px 0 #d63031;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .explanation-box {
            display: none;
            background: #fffdf2;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            font-size: 1rem;
            line-height: 1.6;
            border: 2px dashed #fdcb6e;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal Overlay for Results */
        #result-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        
        .modal-content {
            background: white; padding: 40px; border-radius: 30px; text-align: center;
            max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .modal-title { font-size: 2.5rem; font-weight: 900; margin-bottom: 10px; color: #6c5ce7; }
        .modal-score { font-size: 4rem; font-weight: 900; color: #e84393; margin: 20px 0; }
        .modal-message { font-size: 1.2rem; font-weight: 700; margin-bottom: 30px; color: #2d3436; }
        
        .btn-restart {
            background: #00b894; color: white; border: none; padding: 15px 30px;
            font-size: 1.2rem; font-weight: 800; border-radius: 20px; cursor: pointer;
            box-shadow: 0 6px 0 #009477; transition: 0.2s;
        }
        .btn-restart:hover { transform: translateY(2px); box-shadow: 0 4px 0 #009477; }

        /* Confetti Canvas */
        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

    <canvas id="confetti"></canvas>

    <header class="glass">
        <div class="teacher-info">🎓 Giáo viên tạo: Ms Mai An ULIS</div>
        <div class="timer-container">
            <div id="timer-display">10:00</div>
            <button id="btn-timer" class="btn-action btn-start" onclick="toggleTimer()">BẮT ĐẦU TÍNH GIỜ</button>
        </div>
    </header>

    <div class="main-container">
        <div class="pane glass" id="left-pane">
            </div>

        <div class="pane glass" id="right-pane">
            <div id="questions-container"></div>
            <button class="btn-action btn-submit" onclick="submitQuiz()" style="display: none;" id="btn-submit">🎉 NỘP BÀI 🎉</button>
        </div>
    </div>

    <div id="result-modal">
        <div class="modal-content">
            <div class="modal-title">TỔNG KẾT BÀI THI</div>
            <div class="modal-score" id="final-score">0/0</div>
            <div class="modal-message" id="final-message"></div>
            <button class="btn-restart" onclick="location.reload()">LÀM LẠI BÀI</button>
        </div>
    </div>

    <script>
        // ==========================================
        // DỮ LIỆU ĐỀ BÀI (TEACHER'S BRAIN)
        // ==========================================
        const quizData = [
            {
                id: "passage1",
                title: "📝 Part 1: English Center Opening (Questions 13-16)",
                instruction: "Read the following announcement and choose the correct option.",
                paragraphs: [
                    {
                        text: "We are excited to open our new English Language Center! We offer courses for all levels, from beginners to (13) ......... students. Our friendly teachers will help you with speaking, listening, reading and writing.",

                    },
                    {
                        text: "Join us now to enjoy special discounts and free trial classes. For more details, visit our (14) ......... website or call us at 0963499933. We are looking forward (15) ......... you. Let’s start learning together (16) ......... our new center!",
                        vi: "Hãy tham gia ngay bây giờ để được hưởng các ưu đãi giảm giá đặc biệt và các lớp học thử miễn phí. Để biết thêm chi tiết, hãy truy cập trang web của chúng tôi hoặc gọi cho chúng tôi theo số 0963499933. Chúng tôi rất mong được gặp bạn. Hãy cùng nhau bắt đầu học tập tại trung tâm mới của chúng tôi nhé!"
                    }
                ],
                glossary: [

                    { word: "Beginner", pos: "n", vi: "Người mới bắt đầu" },
                    { word: "Discount", pos: "n", vi: "Sự giảm giá" },
                    { word: "Trial", pos: "n/adj", vi: "Sự học thử, thử nghiệm" },
                    { word: "Detail", pos: "n", vi: "Chi tiết" }
                ],
                questions: [
                    {
                        id: 13, text: "Question 13: ... from beginners to (13) ......... students.",
                        options: [
                            { text: "A. advance", correct: false },
                            { text: "B. advanced", correct: true },
                            { text: "C. advancing", correct: false },

                        ],

                    },
                    {
                        id: 14, text: "Question 14: ... visit our (14) ......... website...",
                        options: [
                            { text: "A. a", correct: false },
                            { text: "B. an", correct: false },
                            { text: "C. the", correct: false },
                            { text: "D. X (No article)", correct: true }
                        ],
                        explanation: "<b>1. Kiến thức ngữ pháp: Mạo từ (Articles) & Tính từ sở hữu</b><br><b>2. Tại sao chọn D (Không điền gì)?</b><br>Trước ô trống đã có từ 'our' (của chúng tôi) - đây là một tính từ sở hữu. Trong tiếng Anh, khi đã dùng tính từ sở hữu (my, your, his, her, our, their...) thì <b>KHÔNG</b> được dùng thêm mạo từ (a/an/the) trước danh từ nữa. Cụm đúng chỉ là 'our website' (trang web của chúng tôi)."
                    },
                    {
                        id: 15, text: "Question 15: We are looking forward (15) ......... you.",
                        options: [
                            { text: "A. to meet", correct: false },
                            { text: "B. meeting", correct: false },
                            { text: "C. to meeting", correct: true },
                            { text: "D. meet", correct: false }
                        ],
                        explanation: "<b>1. Cấu trúc ngữ pháp quan trọng:</b><br>Ta có cấu trúc cố định: <b>Look forward to + V-ing / Noun</b> (Mong đợi, mong ngóng điều gì/làm gì).<br><b>2. Tại sao chọn C?</b><br>Dựa vào cấu trúc trên, sau 'look forward' bắt buộc phải là giới từ 'to' đi kèm với một động từ thêm đuôi '-ing'. Vì vậy 'to meeting' là đáp án duy nhất chính xác."

                    {
                        id: 16, text: "Question 16: Let’s start learning together (16) ......... our new center!",
                        options: [
                            { text: "A. at", correct: true },
                            { text: "B. in", correct: false },
                            { text: "C. on", correct: false },
                            { text: "D. by", correct: false }
                        ],
                        explanation: "<b>1. Phân tích giới từ chỉ địa điểm:</b><br>A. at: tại (một địa điểm cụ thể, nơi chốn cụ thể).<br>B. in: bên trong (không gian kín).<br>C. on: trên bề mặt.<br><b>2. Tại sao chọn A?</b><br>'Our new center' (trung tâm mới của chúng tôi) chỉ một địa điểm làm việc/học tập cụ thể. Cụm từ phổ biến là 'at the center' (tại trung tâm). Do đó dùng 'at' là chính xác nhất."
                    }
                ]
            },
            {
                id: "passage2",

                paragraphs: [
                    {
                        text: "When learning a new language, it’s important to communicate with native speakers. This helps you pick up their pronunciation and get used (19) ......... different accents. Sometimes, you might figure out what a word means from the context. If you aren’t sure, don’t hesitate to (20) ......... the word in a dictionary or even translate it back to your own language to get a clue.",
                        vi: "Khi học một ngôn ngữ mới, việc giao tiếp với người bản xứ là rất quan trọng. Điều này giúp bạn học được cách phát âm của họ và làm quen với các giọng điệu khác nhau. Đôi khi, bạn có thể đoán được nghĩa của một từ dựa vào ngữ cảnh. Nếu bạn không chắc chắn, đừng ngần ngại tra cứu từ đó trong từ điển hoặc thậm chí dịch ngược lại ngôn ngữ mẹ đẻ của bạn để tìm manh mối."
                    },
                    {
                        text: "But remember that everyone may make mistakes when learning something new! In fact, making mistakes is an important part of the learning process. It shows you where you need to focus. Don’t be afraid to practise with native speakers, even (21) ......... you have difficulty (22) ......... yourself. They’ll likely appreciate your efforts and be happy to give your tips.",
                        vi: "Nhưng hãy nhớ rằng ai cũng có thể mắc sai lầm khi học một điều gì đó mới! Trên thực tế, phạm sai lầm là một phần quan trọng của quá trình học tập. Nó cho bạn biết bạn cần tập trung vào đâu. Đừng ngại thực hành với người bản xứ, ngay cả khi bạn gặp khó khăn trong việc diễn đạt ý mình. Rất có thể họ sẽ đánh giá cao nỗ lực của bạn và sẵn lòng cho bạn những lời khuyên."

                    {

                    { word: "Accent", pos: "n", vi: "Giọng điệu (vùng miền)" },
                    { word: "Hesitate", pos: "v", vi: "Do dự, ngần ngại" },
                    { word: "Appreciate", pos: "v", vi: "Trân trọng, đánh giá cao" },
                    { word: "Perseverance", pos: "n", vi: "Sự kiên trì, bền bỉ" },
                    { word: "Pay off", pos: "phrasal v", vi: "Đem lại kết quả tốt, đền đáp" },

                questions: [
                    {

                    {

                            { text: "D. It creates a personal connection that we cannot do with digital communication", correct: true }
                        ],
                        explanation: "<b>Phân tích logic câu kết:</b><br>Đoạn cuối đang tổng kết về giá trị của thư tay. Từ 'and' dùng để nối thêm một ý bổ sung cho việc 'gửi thư cho người khác'. Ý D: 'Nó tạo ra sự kết nối cá nhân mà giao tiếp kỹ thuật số không làm được' là lời chốt hạ hoàn hảo cho sự đối lập giữa viết thư tay và email trong toàn bộ bài văn."
                    }
                ]
            }
        ];

        // ==========================================
        // SYSTEM VARIABLES
        // ==========================================
        let timerInterval;
        let timeLeft = 600; // 10 minutes
        let isTimerRunning = false;
        let userAnswers = {}; 
        const totalQuestions = quizData.reduce((acc, curr) => acc + curr.questions.length, 0);

        // ==========================================
        // WEB AUDIO API (SOUND EFFECTS)
        // ==========================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playDing() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playWrong() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.4);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        // ==========================================
        // CONFETTI EFFECT
        // ==========================================
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        function triggerConfetti() {
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height / 2 - 50,
                    r: Math.random() * 6 + 2,
                    dx: Math.random() * 4 - 2,
                    dy: Math.random() * 4 + 2,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`
                });
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.x += p.dx; p.y += p.dy;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.color; ctx.fill();
                if (p.y > canvas.height) particles.splice(index, 1);
            });
            requestAnimationFrame(animateConfetti);
        }
        animateConfetti();

        // ==========================================
        // TIMER LOGIC
        // ==========================================
        function toggleTimer() {
            const btn = document.getElementById('btn-timer');
            if (isTimerRunning) {
                clearInterval(timerInterval);
                btn.innerText = "TIẾP TỤC";
                btn.style.background = "#f39c12";
                isTimerRunning = false;
            } else {
                if (audioCtx.state === 'suspended') audioCtx.resume(); // Khởi tạo audio khi user tương tác lần đầu
                timerInterval = setInterval(updateTimer, 1000);
                btn.innerText = "TẠM DỪNG";
                btn.style.background = "#e74c3c";
                isTimerRunning = true;
            }
        }

        function updateTimer() {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('timer-display').innerText = "00:00";
                alert("Đã hết giờ làm bài. Bạn vẫn có thể tiếp tục làm, nhưng nhớ là trong phòng thi thật, bạn chỉ nên làm một bài như thế này trong 10 phút thôi nha.");
                return;
            }
            timeLeft--;
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }

        // ==========================================
        // UTILITIES
        // ==========================================
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function toggleTranslation(btn) {
            const transBox = btn.nextElementSibling;
            if (transBox.style.display === "block") {
                transBox.style.display = "none";
                btn.innerText = "Mở dịch đoạn này 🌟";
            } else {
                transBox.style.display = "block";
                btn.innerText = "Đóng bản dịch ❌";
            }
        }

        // ==========================================
        // CORE RENDERING ENGINE
        // ==========================================
        function initApp() {
            const leftPane = document.getElementById('left-pane');
            const rightPane = document.getElementById('questions-container');

            quizData.forEach((passage) => {
                // RENDER TRÁI (READING)
                let passageHTML = `
                    <div class="passage-section">
                        <div class="passage-title">${passage.title}</div>
                        <p style="font-style: italic; margin-bottom: 10px; color: #555;">${passage.instruction}</p>
                `;

                passage.paragraphs.forEach(para => {
                    passageHTML += `
                        <div class="paragraph-box">
                            ${para.text}
                            <br>
                            <button class="btn-translate" onclick="toggleTranslation(this)">Mở dịch đoạn này 🌟</button>
                            <div class="translation-box">${para.vi}</div>
                        </div>
                    `;
                });

                // RENDER GLOSSARY
                if (passage.glossary && passage.glossary.length > 0) {
                    passageHTML += `
                        <div class="glossary-wrapper">
                            <div class="glossary-title">💡 Bảng Từ Vựng Cần Nhớ:</div>
                            <table>
                                <tr><th>Từ vựng</th><th>Loại từ</th><th>Nghĩa Tiếng Việt</th></tr>
                    `;
                    passage.glossary.forEach(word => {
                        passageHTML += `<tr><td>${word.word}</td><td>${word.pos}</td><td>${word.vi}</td></tr>`;
                    });
                    passageHTML += `</table></div>`;
                }
                passageHTML += `</div><hr style="border: 1px dashed rgba(255,255,255,0.5); margin: 30px 0;">`;
                leftPane.innerHTML += passageHTML;

                // RENDER PHẢI (QUESTIONS)
                let qHTML = `<div class="passage-title" style="font-size: 1.2rem; color: #e84393;">Questions for ${passage.title.split(':')[0]}</div>`;
                
                passage.questions.forEach(q => {
                    let shuffledOptions = shuffleArray(q.options);
                    qHTML += `
                        <div class="question-card" id="q-${q.id}">
                            <div class="question-text">${q.text}</div>
                            <div class="options-grid">
                    `;
                    shuffledOptions.forEach((opt, index) => {
                        // Pass JSON stringified object to inline onclick securely
                        const isCorrStr = opt.correct ? 'true' : 'false';
                        qHTML += `<button class="option-btn" onclick="handleAnswer(${q.id}, ${isCorrStr}, this)">${opt.text}</button>`;
                    });
                    qHTML += `
                            </div>
                            <div class="explanation-box" id="expl-${q.id}">
                                <div style="font-weight: 800; color: #d63031; margin-bottom: 5px;">📖 Giải thích chi tiết:</div>
                                ${q.explanation}
                            </div>
                        </div>
                    `;
                });
                qHTML += `<hr style="border: 1px dashed rgba(255,255,255,0.5); margin: 30px 0;">`;
                rightPane.innerHTML += qHTML;
            });
            
            document.getElementById('btn-submit').style.display = 'block';
        }

        // ==========================================
        // INTERACTION LOGIC
        // ==========================================
        function handleAnswer(qId, isCorrect, btnElement) {
            const card = document.getElementById(`q-${qId}`);
            const buttons = card.querySelectorAll('.option-btn');
            
            // Disable all buttons in this question
            buttons.forEach(b => b.disabled = true);

            // Ghi nhận điểm
            if (userAnswers[qId] === undefined) {
                userAnswers[qId] = isCorrect ? 1 : 0;
            }

            // Hiệu ứng âm thanh và hình ảnh
            if (isCorrect) {
                btnElement.classList.add('correct');
                playDing();
                triggerConfetti();
            } else {
                btnElement.classList.add('wrong');
                playWrong();
                // Tự động tìm và bôi xanh đáp án đúng
                buttons.forEach(b => {
                    // Dựa vào HTML onclick attribute để tìm đúng
                    if (b.getAttribute('onclick').includes('true')) {
                        b.classList.add('correct');
                    }
                });
            }

            // Hiện giải thích chi tiết
            const expl = document.getElementById(`expl-${qId}`);
            expl.style.display = 'block';
        }

        function submitQuiz() {
            clearInterval(timerInterval);
            let score = Object.values(userAnswers).reduce((a, b) => a + b, 0);
            const modal = document.getElementById('result-modal');
            const scoreEl = document.getElementById('final-score');
            const msgEl = document.getElementById('final-message');

            scoreEl.innerText = `${score} / ${totalQuestions}`;

            let ratio = score / totalQuestions;
            if (ratio === 1) {
                msgEl.innerText = "🏆 THIÊN TÀI! Bạn đã đạt điểm tuyệt đối. Xuất sắc!";
                msgEl.style.color = "#00b894";
                for(let i=0; i<5; i++) setTimeout(triggerConfetti, i*300);
            } else if (ratio >= 0.8) {
                msgEl.innerText = "🌟 LÀM TỐT LẮM! Kiến thức của bạn rất vững chắc.";
                msgEl.style.color = "#0984e3";
                triggerConfetti();
            } else if (ratio >= 0.5) {
                msgEl.innerText = "👍 KHÁ LẮM! Hãy đọc lại phần giải thích để khắc phục lỗi sai nhé.";
                msgEl.style.color = "#fdcb6e";
            } else {
                msgEl.innerText = "💪 CỐ LÊN NHÉ! Học tiếng Anh là một hành trình dài. Hãy đọc kỹ phần dịch và giải thích nha.";
                msgEl.style.color = "#d63031";
            }

            modal.style.display = 'flex';
        }

        // Khởi chạy khi load trang
        window.onload = initApp;

    </script>
</body>
</html>
