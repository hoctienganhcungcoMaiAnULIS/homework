            from { background-position: 0 0; }
            to { background-position: 600px 600px; }
        }

            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;

            position: relative;

            padding: 20px;

            padding: 30px;

            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-bottom: 3px dashed var(--accent);
            padding-bottom: 10px;

            border-left: 5px solid var(--secondary);
            padding: 15px;
            margin-top: 10px;
            border-radius: 0 15px 15px 0;
            font-size: 1rem;
            color: #4B5563;
        }

        .glossary-table {

            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);

        .glossary-table tr:nth-child(even) { background-color: #F9FAFB; }

        .question-card {
            background: white;
            border: 2px solid #E5E7EB;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 6px 0 #E5E7EB;
        }
        
        .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; color: #1F2937; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option {
            background: #F3F4F6;
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #374151;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 5px 0 #D1D5DB;

            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #FFFBEB;
            border: 2px solid #FDE68A;
            border-radius: 15px;
            font-size: 1rem;
            color: #92400E;
            line-height: 1.6;
        }

            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        /* Modal overlay for alerts and final score */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;

            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            background-color: #f00;
            z-index: 50;
        }
    </style>
</head>

// Shuffle Array helper
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// Audio Context Generation (Web Audio API - no external links needed)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playCorrectSound() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
}

function playWrongSound() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
}

function shootConfetti(element) {
    const rect = element.getBoundingClientRect();
    for(let i=0; i<30; i++) {
        const conf = document.createElement('div');
        conf.className = 'confetti';
        conf.style.left = rect.left + (rect.width/2) + 'px';
        conf.style.top = rect.top + (rect.height/2) + 'px';
        conf.style.backgroundColor = ['#00D26A', '#FDCB6E', '#FF4757', '#8854C0', '#00C9A7'][Math.floor(Math.random()*5)];
        document.body.appendChild(conf);

        const angle = Math.random() * Math.PI * 2;
        const velocity = 50 + Math.random() * 50;
        let x = 0, y = 0;
        
        let frame = 0;
        function animateConf() {
            frame++;
            x += Math.cos(angle) * velocity / 10;
            y += Math.sin(angle) * velocity / 10 + (frame * 0.5); // gravity
            conf.style.transform = `translate(${x}px, ${y}px) rotate(${frame*10}deg)`;
            if(frame < 40) {
                requestAnimationFrame(animateConf);
            } else {
                conf.remove();
            }
        }
        requestAnimationFrame(animateConf);
    }
}

                    })}
                    <br>
                    <button class="btn btn-translate" onclick="toggleTranslation('${translationId}')">Mở dịch đoạn này 🌟</button>
                    <div id="${translationId}" class="translation-box">${p.vi}</div>
                </div>
            `;
        });

        // Render Glossary
        leftHTML += `<h3 style="color: var(--primary); margin-top: 30px;">📚 Bảng từ vựng (Glossary)</h3>`;
        leftHTML += `<table class="glossary-table">
            <tr><th>Từ vựng</th><th>Loại từ</th><th>Nghĩa Tiếng Việt</th></tr>`;
        section.glossary.forEach(item => {
            leftHTML += `<tr><td><strong>${item.word}</strong></td><td><em>${item.pos}</em></td><td>${item.vi}</td></tr>`;
        });
        leftHTML += `</table><hr style="border: 1px dashed #CCC; margin: 40px 0;">`;

        // Render Questions
        section.questions.forEach(q => {
            totalQuestions++;
            let shuffledOptions = shuffleArray([...q.options]);
            const labels = ['A', 'B', 'C', 'D'];
            
            let optionsHTML = '';
            shuffledOptions.forEach((opt, optIndex) => {
                optionsHTML += `
                    <div class="option" id="opt_${q.id}_${optIndex}" 
                         onclick="checkAnswer('${q.id}', '${opt}', '${q.ans}', this, '${q.id}_exp')">
                        ${labels[optIndex]}. ${opt}
                    </div>
                `;
            });

            rightHTML += `
                <div class="question-card">
                    <div class="question-text">${questionNumber}. ${q.text.replace('Question ' + q.id.split('_')[2] + ':', '')}</div>
                    <div class="options-grid">${optionsHTML}</div>
                    <div id="${q.id}_exp" class="explanation">
                        <h4>💡 Giáo viên giải thích chi tiết:</h4>
                        ${q.explain}
                    </div>
                </div>
            `;
            questionNumber++;
        });
    });

    leftPanel.innerHTML = leftHTML;
    rightPanel.innerHTML = rightHTML;
}

function toggleTranslation(id) {
    const el = document.getElementById(id);
    el.style.display = (el.style.display === 'block') ? 'none' : 'block';
}

function checkAnswer(qId, selectedOpt, correctAns, element, expId) {
    if (answeredQuestions.has(qId)) return; // Prevent clicking again

    const optionsContainer = element.parentElement;
    const allOptions = optionsContainer.children;

    if (selectedOpt === correctAns) {
        element.classList.add('correct');
        playCorrectSound();
        shootConfetti(element);
        correctAnswersCount++;
        
        // Cập nhật khoảng trống bên trái (nếu có thể làm mapping, nhưng để giữ tính đơn giản và tránh lỗi DOM mapping, ta hiển thị đáp án đúng ở phần bên phải)
    } else {
        element.classList.add('wrong');
        playWrongSound();
        // Find and highlight correct answer
        for(let opt of allOptions) {
            if(opt.innerText.substring(3) === correctAns) {
                opt.classList.add('correct');
            }
        }
    }

    for(let opt of allOptions) {
        opt.classList.add('disabled');
    }

    // Show detailed explanation
    const expEl = document.getElementById(expId);
    expEl.style.display = 'block';
    expEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    answeredQuestions.add(qId);
}

// Timer Logic
function formatTime(seconds) {
    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
}

function updateTimerDisplay() {
    document.getElementById('timer-display').innerText = formatTime(timeRemaining);
}

function toggleTimer() {
    const btn = document.getElementById('btn-timer');
    if (!isTimerRunning) {
        isTimerRunning = true;
        btn.innerText = "TẠM DỪNG";
        btn.style.background = "#FDCB6E";
        timerInterval = setInterval(() => {
            timeRemaining--;
            updateTimerDisplay();
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                isTimerRunning = false;
                btn.innerText = "HẾT GIỜ";
                btn.style.background = "gray";
                btn.disabled = true;
                showModal("⏰ Đã hết giờ làm bài!", "Bạn vẫn có thể tiếp tục làm, nhưng nhớ là trong phòng thi thật, bạn chỉ nên làm một bài như thế này trong 10 phút thôi nha.");
            }
        }, 1000);
    } else {
        clearInterval(timerInterval);
        isTimerRunning = false;
        btn.innerText = "TIẾP TỤC";
        btn.style.background = "var(--correct)";
    }
}

// Submit and Feedback
function showModal(title, message) {
    const overlay = document.getElementById('modal-overlay');
    const content = document.getElementById('modal-content');
    content.innerHTML = `
        <h2>${title}</h2>
        <p>${message}</p>
        <button class="btn btn-start" onclick="document.getElementById('modal-overlay').style.display='none'">Đóng</button>
    `;
    overlay.style.display = 'flex';
}

function submitTest() {
    clearInterval(timerInterval);
    const score = correctAnswersCount;
    const total = totalQuestions;
    const percentage = (score / total) * 100;
    
    let feedback = "";
    if (percentage === 100) feedback = "🏆 Tuyệt đỉnh Thiên tài! Em xuất sắc không sai một câu nào. Tương lai học bá là đây!";
    else if (percentage >= 80) feedback = "🌟 Quá đỉnh! Em đã làm rất tốt. Chỉ một xíu nữa là hoàn hảo!";
    else if (percentage >= 50) feedback = "👍 Khá lắm! Em đã nắm được bài, nhưng hãy đọc kỹ giải thích để làm tốt hơn nhé!";
    else feedback = "💪 Không sao cả, vạn sự khởi đầu nan! Cố gắng đọc kỹ phần giải thích chi tiết của cô Mai An để rút kinh nghiệm nha!";

    showModal("🎉 TỔNG KẾT ĐIỂM", `Số câu đúng: <strong>${score} / ${total}</strong><br><br>${feedback}`);
}

// Initialize
window.onload = () => {
    renderContent();
    updateTimerDisplay();
};

</script>
