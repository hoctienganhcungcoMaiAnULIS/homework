<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm Giao tiếp & Giới từ - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #FF7E93; /* Hồng Hoa Đào đậm */
            --secondary: #FFB5B5; /* Hồng phấn/Hoa Đào nhạt */
            --correct: #00D26A; /* Xanh lá */
            --wrong: #FF4757; /* Đỏ cam */
            --bg-pattern: #FFF5F6; /* Nền trắng hồng */
            --text-main: #2f3542;
            --white: #ffffff;
            --shadow-color: rgba(255, 126, 147, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-pattern);
            background-image:  radial-gradient(var(--secondary) 0.5px, transparent 0.5px), radial-gradient(var(--secondary) 0.5px, var(--bg-pattern) 0.5px);
            background-size: 20px 20px;
            color: var(--text-main);
            padding-bottom: 50px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 10px 20px -10px rgba(255, 126, 147, 0.5);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .header h1 {
            font-weight: 800;
            font-size: 1.8rem;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* Question Card Style */
        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 0 rgba(255,181,181,0.2), 0 15px 20px rgba(0,0,0,0.03);
            border: 2px solid #ffe8e8;
            transition: transform 0.3s ease;
            position: relative;
        }

        .question-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 15px;
            box-shadow: 0 4px 0 rgba(216, 90, 112, 0.5);
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.5;
            color: #2c3e50;
        }

        /* Answer Grid */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 3D Button Style */
        .option-btn {
            background: white;
            border: 2px solid #ffe8e8;
            border-radius: 15px;
            padding: 15px 20px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #57606f;
            cursor: pointer;
            text-align: left;
            position: relative;
            transition: all 0.1s;
            box-shadow: 0 5px 0 #ffe8e8;
            outline: none;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #ffd1d1;
            border-color: var(--primary);
            color: var(--primary);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #ffd1d1;
        }

        /* Correct State */
        .option-btn.correct {
            background-color: var(--correct);
            color: white;
            border-color: #00b85c;
            box-shadow: 0 5px 0 #00944a;
        }

        /* Wrong State */
        .option-btn.wrong {
            background-color: var(--wrong);
            color: white;
            border-color: #ff2e40;
            box-shadow: 0 5px 0 #d61c2e;
            animation: shake 0.5s;
        }

        /* Correct Answer Hint (when chose wrong) */
        .option-btn.show-correct {
            background-color: #fff;
            border: 2px solid var(--correct);
            color: var(--correct);
            box-shadow: 0 5px 0 #00b85c;
        }

        /* Explanation Box */
        .explanation {
            margin-top: 20px;
            background: #fff8f8;
            border-left: 5px solid var(--primary);
            border-radius: 10px;
            padding: 20px;
            display: none; /* Hidden by default */
            animation: slideDown 0.4s ease-out;
        }

        .explanation.visible {
            display: block;
        }

        .explanation h4 {
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .explanation-content {
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap; /* Keeps line breaks from data */
        }
        
        .explanation-content strong {
            color: #2f3542;
            font-weight: 800;
        }

        /* Submit Button */
        .submit-section {
            text-align: center;
            margin-top: 40px;
        }

        .submit-btn {
            background: var(--primary);
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            padding: 15px 50px;
            border: none;
            border-radius: 50px;
            box-shadow: 0 8px 0 #D85A70, 0 15px 20px rgba(255, 126, 147, 0.4);
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #D85A70;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid var(--secondary);
            box-shadow: 0 20px 40px rgba(255, 126, 147, 0.2);
        }

        .score-display {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            margin: 20px 0;
        }

        /* Animations */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            50% { transform: translateX(10px) rotate(5deg); }
            75% { transform: translateX(-10px) rotate(-5deg); }
            100% { transform: translateX(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

    </style>
</head>

    // --- LOGIC XỬ LÝ ---
    let score = 0;
    const totalQuestions = quizData.questions.length;
    let questionsAnswered = 0;

    // Âm thanh
    const dingSound = document.getElementById('sound-correct');
    const buzzSound = document.getElementById('sound-wrong');

    // Hàm render bài thi
    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        
        quizData.questions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `q-${index}`;

            // Badge
            const badge = document.createElement('span');
            badge.className = 'question-badge';
            badge.innerText = `Câu ${q.questionNumber}`;
            
            // Question Text
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerText = q.question;

            // Options Grid
            const grid = document.createElement('div');
            grid.className = 'options-grid';

            // Find correct answer index for logic
            const correctOptionIndex = q.answerOptions.findIndex(opt => opt.isCorrect);

            q.answerOptions.forEach((opt, optIndex) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = opt.text; // Use innerHTML in case of special chars
                btn.onclick = () => checkAnswer(btn, opt.isCorrect, q.answerOptions, index);
                grid.appendChild(btn);
            });

            // Explanation Box
            const explanation = document.createElement('div');
            explanation.className = 'explanation';
            explanation.id = `expl-${index}`;
            explanation.innerHTML = `
                <h4><span style="font-size:1.5rem">💡</span> GIẢI THÍCH CHI TIẾT:</h4>
                <div class="explanation-content" id="expl-content-${index}"></div>
            `;

            card.appendChild(badge);
            card.appendChild(qText);
            card.appendChild(grid);
            card.appendChild(explanation);
            container.appendChild(card);
        });
    }

    // Hàm xử lý khi chọn đáp án
    function checkAnswer(selectedBtn, isCorrect, allOptions, questionIndex) {
        const card = document.getElementById(`q-${questionIndex}`);
        const buttons = card.querySelectorAll('.option-btn');
        const explanationBox = document.getElementById(`expl-${questionIndex}`);
        const explanationContent = document.getElementById(`expl-content-${questionIndex}`);

        // Disable all buttons in this card
        buttons.forEach(btn => btn.disabled = true);

        if (isCorrect) {
            selectedBtn.classList.add('correct');
            playSound(true);
            triggerConfetti();
            score++;
        } else {
            selectedBtn.classList.add('wrong');
            playSound(false);
            // Highlight correct answer
            const correctOpt = allOptions.find(o => o.isCorrect);
            buttons.forEach(btn => {
                if(btn.innerText === correctOpt.text) {
                    btn.classList.add('show-correct');
                }
            });
        }

        // Explanation logic
        const correctOptionData = allOptions.find(opt => opt.isCorrect);
        const detailedRationale = correctOptionData.rationale;

        // Format the explanation text
        let formattedRationale = detailedRationale
            .replace(/\n/g, '<br>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        explanationContent.innerHTML = formattedRationale;
        explanationBox.classList.add('visible');

        questionsAnswered++;
    }

    // Hàm chơi âm thanh
    function playSound(isCorrect) {
        if(isCorrect) {
            dingSound.currentTime = 0;
            dingSound.play().catch(e => console.log("Audio autoplay blocked"));
        } else {
            buzzSound.currentTime = 0;
            buzzSound.play().catch(e => console.log("Audio autoplay blocked"));
        }
    }

    // Hiệu ứng pháo giấy (Đã đổi màu tone Hoa Đào)
    function triggerConfetti() {
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#FF7E93', '#FFB5B5', '#FFFFFF', '#FF9A9E']
        });
    }

    // Nộp bài
    function finishQuiz() {
        const modal = document.getElementById('resultModal');
        const scoreDiv = document.getElementById('finalScore');
        const feedback = document.getElementById('feedbackText');

        scoreDiv.innerText = `${score}/${totalQuestions}`;

        const percentage = (score / totalQuestions) * 100;
        if (percentage === 100) {
            feedback.innerText = "Tuyệt vời! Em là thiên tài tiếng Anh! 🌟";
            triggerConfetti();
        } else if (percentage >= 80) {
            feedback.innerText = "Làm tốt lắm! Em rất nắm vững kiến thức! 🔥";
        } else if (percentage >= 50) {
            feedback.innerText = "Cố gắng lên nhé! Em cần ôn lại bài một chút! 📚";
        } else {
            feedback.innerText = "Đừng buồn nhé! Hãy xem kỹ lại phần giải thích chi tiết của cô nào! 💪";
        }

        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('resultModal').style.display = 'none';
    }

    // Khởi chạy
    window.onload = renderQuiz;
