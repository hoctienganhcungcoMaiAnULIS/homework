    <style>
        :root {
            --primary: #8854C0;
            --secondary: #FDCB6E;
            --accent: #00C9A7;

            left: 0;
            width: 100%;
            height: 300%;

            z-index: 0;

// --- AUDIO SYSTEM (Web Audio API) ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
    if (!audioCtx) audioCtx = new AudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    } else {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }
}

// --- CONFETTI SYSTEM ---
function createConfetti(rect) {
    const colors = ['#FF4757', '#00D26A', '#FDCB6E', '#8854C0', '#00C9A7'];
    for (let i = 0; i < 40; i++) {
        const conf = document.createElement('div');
        conf.className = 'confetti';
        conf.style.left = (rect.left + rect.width / 2) + window.scrollX + 'px';
        conf.style.top = (rect.top + rect.height / 2) + window.scrollY + 'px';
        conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        document.body.appendChild(conf);

        const angle = Math.random() * Math.PI * 2;
        const velocity = 50 + Math.random() * 100;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity - 100; 

        conf.animate([
            { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
            { transform: `translate(${tx}px, ${ty}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
        ], { duration: 1000, easing: 'cubic-bezier(.25,.8,.25,1)' });

        setTimeout(() => conf.remove(), 1000);
    }
}

// --- RENDER LOGIC ---
const quizContainer = document.getElementById('quiz-container');
let currentScore = 0;
const totalQuestions = 40;
let answeredQuestions = 0;

function shuffleArray(array) {
    let newArray = [...array];
    for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
    }
    return newArray;
}

function renderQuiz() {
    let html = '';
    let globalQIndex = 0;

    rawData.forEach((part) => {
        html += `<div class="part-title">${part.partTitle}</div>`;
        
        part.questions.forEach((qData) => {
            let displayQ = qData.q;
            
            html += `
            <div class="card" id="q-card-${globalQIndex}">
                <div class="question">${displayQ}</div>
                <div class="options" id="options-${globalQIndex}">
            `;

            // Auto Shuffle Options
            const shuffledOptions = shuffleArray(qData.options);

            shuffledOptions.forEach((opt) => {
                // FIXED BUG: Thêm lệnh replace để làm sạch dấu nháy đơn, tránh làm gãy chuỗi JS
                const safeOpt = opt.replace(/'/g, "\\'");
                const safeCorrect = qData.correct.replace(/'/g, "\\'");
                
                html += `<button class="btn-option" onclick="checkAnswer(this, ${globalQIndex}, '${safeOpt}', '${safeCorrect}')">${opt}</button>`;
            });

            html += `
                </div>
                <div class="explanation" id="exp-${globalQIndex}">
                    <div class="exp-step"><span class="exp-title">1. Dịch nghĩa:</span> ${qData.exp.t}</div>
                    <div class="exp-step"><span class="exp-title">2. Phân tích đáp án:</span><br>${qData.exp.o}</div>
                    <div class="exp-step"><span class="exp-title">3. Tại sao Đúng?</span><br> ${qData.exp.r}</div>
                    <div class="exp-step" style="color: var(--wrong);"><span class="exp-title">4. Tại sao Sai?</span><br> ${qData.exp.w}</div>
                </div>
            </div>`;
            globalQIndex++;
        });
    });

    quizContainer.innerHTML = html;
}

function checkAnswer(btn, qIndex, selectedOpt, correctOpt) {
    const parent = document.getElementById(`options-${qIndex}`);
    const buttons = parent.querySelectorAll('.btn-option');
    
    // Disable all buttons in this question
    buttons.forEach(b => b.disabled = true);

    const isCorrect = selectedOpt === correctOpt;

    if (isCorrect) {
        btn.classList.add('correct');
        playSound('correct');
        const rect = btn.getBoundingClientRect();
        createConfetti(rect);
        currentScore++;
    } else {
        btn.classList.add('wrong');
        btn.classList.add('shake');
        playSound('wrong');
        
        // Highlight correct answer
        buttons.forEach(b => {
            // Cũng cần thay thế nháy đơn để so sánh text content cho chuẩn
            if (b.innerText.replace(/'/g, "\\'") === correctOpt) {
                b.classList.add('correct');
                b.style.opacity = '0.7';
            }
        });
    }

    // Show explanation immediately
    document.getElementById(`exp-${qIndex}`).classList.add('show');
    answeredQuestions++;
}

function submitQuiz() {
    if(answeredQuestions < totalQuestions) {
        if(!confirm(`Bạn mới làm được ${answeredQuestions}/${totalQuestions} câu. Bạn có chắc chắn muốn nộp bài sớm không?`)) {
            return;
        }
    }

    const modal = document.getElementById('scoreModal');
    const scoreText = document.getElementById('finalScore');
    const praiseText = document.getElementById('praiseText');

    scoreText.innerText = `${currentScore} / ${totalQuestions}`;
    
    const percentage = currentScore / totalQuestions;
    if(percentage === 1) praiseText.innerText = "Điểm tuyệt đối! Em là một thiên tài vũ trụ! 🚀🛸";
    else if(percentage >= 0.8) praiseText.innerText = "Xuất sắc! Kiến thức của em bay cao như tên lửa! 🚀";
    else if(percentage >= 0.5) praiseText.innerText = "Khá lắm! Hãy cố gắng thêm một chút nữa nhé! ⭐";
    else praiseText.innerText = "Đừng buồn, hãy đọc kỹ phần giải thích chi tiết để tiến bộ hơn nha! 💪";

    modal.style.display = 'flex';
    playSound('correct');
    createConfetti(document.body.getBoundingClientRect());
}

// Init
window.onload = renderQuiz;

</script>
