<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập Tiếng Anh Tương Tác - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-purple: #8854C0;
            --primary-teal: #00C9A7;
            --primary-yellow: #FDCB6E;
            --correct-green: #00D26A;
            --wrong-red: #FF4757;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #2d3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 1. ANIMATED GRADIENT BACKGROUND & FLOATING PATTERNS */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Nunito', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            /* Gradient rực rỡ pastel */
            background: linear-gradient(-45deg, #E0C3FC, #8EC5FC, #ffb8d1, #FDCB6E);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            position: relative;
            padding: 20px 10px;
            overflow-x: hidden;
        }

        /* Lớp họa tiết hoa & mèo con lơ lửng */
        .pattern-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z' fill='rgba(255,255,255,0.3)'/%3E%3C/svg%3E"),
                url("data:image/svg+xml,%3Csvg width='50' height='50' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 3a9 9 0 0 0-9 9 9 9 0 0 0 9 9 9 9 0 0 0 9-9 9 9 0 0 0-9-9zm0 16a7 7 0 1 1 0-14 7 7 0 0 1 0 14z' fill='rgba(255,255,255,0.2)'/%3E%3Cpath d='M8 11a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm8 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-4 4c-1.66 0-3-1.34-3-3h6c0 1.66-1.34 3-3 3z' fill='rgba(255,255,255,0.2)'/%3E%3C/svg%3E");
            background-position: 0 0, 50px 50px;
            background-size: 150px 150px, 120px 120px;
            animation: floatPattern 40s linear infinite;
        }

        @keyframes floatPattern {
            from { background-position: 0 0, 50px 50px; }
            to { background-position: 1000px 1000px, 1050px 1050px; }
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* 2. GLASSMORPHISM UI */
        header {
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--glass-border);
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            margin-bottom: 25px;
        }

        header h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.8rem;
            color: #4a235a;
            font-weight: 800;
        }

        .author-tag {
            display: inline-block;
            background: rgba(136, 84, 192, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #5b2c6f;
            margin-top: 10px;
        }

        .score-board {
            position: sticky;
            top: 15px;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .score-item {
            font-weight: 800;
            font-size: 1.2rem;
            color: #4a235a;
        }

        .quiz-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 35px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            transition: transform 0.3s ease;
        }

        .question-number {
            background: var(--primary-teal);
            color: white;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 20px;
            box-shadow: 0 4px 0 #009e82;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 25px;
            line-height: 1.6;
            color: #2d3436;
        }

        /* 3. GAMIFIED BUTTONS */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 650px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .option-btn {
            background: white;
            border: 2px solid #e0e6ed;
            border-radius: 18px;
            padding: 18px 20px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.08rem;
            font-weight: 700;
            color: #3c4043;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 0 #dfe6e9; /* 3D Box Shadow */
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.02) translateY(-2px);
            border-color: var(--primary-purple);
            box-shadow: 0 10px 0 #d0bdf4;
        }

        .option-btn:active:not(:disabled) {
            transform: scale(0.98) translateY(6px);
            box-shadow: 0 2px 0 #d0bdf4;
        }

        .option-btn.correct {
            background-color: #e6ffed !important;
            border-color: var(--correct-green) !important;
            box-shadow: 0 6px 0 #00b85c !important;
            color: #006835 !important;
            transform: translateY(2px);
        }

        .option-btn.wrong {
            background-color: #ffeef0 !important;
            border-color: var(--wrong-red) !important;
            box-shadow: 0 6px 0 #d63031 !important;
            color: #b91c1c !important;
            transform: translateY(2px);
            animation: shake 0.4s;
        }

        .option-btn:disabled {
            cursor: default;
        }

        /* 4. EXPLANATION STYLING (EXACTLY AS REQUESTED) */
        .explanation-box {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.85);
            border: 3px dashed var(--primary-teal);
            border-radius: 20px;
            padding: 25px;
            display: none;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .explanation-header {
            font-weight: 900;
            color: var(--primary-purple);
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .explanation-content {
            font-size: 1rem;
            line-height: 1.7;
            color: #2d3436;
        }

        /* CSS Classes cho Giải thích */
        .p-word {
            color: #0984e3;
            font-weight: 800;
        }
        .p-phonetic {
            background: #e8dbf7;
            color: #6c5ce7;
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
            font-weight: bold;
        }
        .p-mean {
            color: #d35400;
            font-weight: 700;
        }
        .p-grammar {
            border-bottom: 2px solid #e17055;
            color: #e17055;
            font-style: italic;
            font-weight: bold;
        }
        .hl-green {
            color: #00b894;
            font-weight: 900;
            background: #e6ffea;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .hl-red {
            color: #d63031;
            text-decoration: line-through;
            font-weight: bold;
            opacity: 0.8;
        }

        /* 5. SUBMIT & MODAL STYLES */
        .submit-section {
            text-align: center;
            margin: 40px 0 60px;
        }

        .submit-btn {
            background: var(--primary-purple);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.4rem;
            font-weight: 900;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 0 #5b2c6f;
            transition: all 0.2s;
            font-family: 'Quicksand', sans-serif;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            background: #9b59d6;
            box-shadow: 0 13px 0 #5b2c6f;
        }

        .submit-btn:active {
            transform: translateY(7px);
            box-shadow: 0 3px 0 #5b2c6f;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-box {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-top: 15px solid var(--primary-purple);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .input-name {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 3px solid #dfe6e9;
            border-radius: 15px;
            font-size: 1.1rem;
            font-family: 'Nunito', sans-serif;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-name.error { border-color: var(--wrong-red); }

        .result-gif {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin: 15px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-2deg); }
            75% { transform: translateX(8px) rotate(2deg); }
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.9) translateY(-10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        #confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999;
        }

    </style>
</head>
<body>
    <div class="pattern-overlay"></div>
    <canvas id="confetti-canvas"></canvas>

    <div class="container">
        <header>
            <h1>Bài Tập Toàn Diện: Energy & Grammar</h1>
            <div class="author-tag">✨ Giáo viên tạo: Ms Mai An ULIS</div>
        </header>

        <div class="score-board">
            <div class="score-item">⭐ Điểm: <span id="score">0</span></div>
            <div class="score-item">🔥 Đã làm: <span id="progress">0</span>/36</div>
        </div>

        <div id="quiz-container">
            </div>

        <div class="submit-section">
            <button class="submit-btn" onclick="openNameModal()">🎯 NỘP BÀI & XEM KẾT QUẢ</button>
        </div>
    </div>

    <div class="modal-overlay" id="nameModal">
        <div class="modal-box">
            <h2 style="color: var(--primary-purple); font-weight: 800;">Nhập tên của bạn nhé!</h2>
            <input type="text" id="studentName" class="input-name" placeholder="Ví dụ: Nguyễn Văn A..." onkeypress="handleEnter(event)">
            <p id="nameError" style="color: var(--wrong-red); font-size: 0.9rem; display: none; margin-bottom: 15px;">Bạn quên nhập tên kìa!</p>
            <button class="submit-btn" style="padding: 12px 30px; font-size: 1.1rem; box-shadow: 0 6px 0 #5b2c6f;" onclick="showResults()">Tiếp Tục 🚀</button>
        </div>
    </div>

    <div class="modal-overlay" id="resultModal">
        <div class="modal-box" id="resultContent">
            </div>
    </div>

    <script>
        // --- 1. JSON DỮ LIỆU ĐỀ BÀI (Bảo toàn 100%) ---
        const quizData = { "questions": [  {   "questionNumber": 1,   "question": "____________ energy comes from the heat of the sun.",   "answerOptions": [    {     "text": "Solar",     "rationale": "1. Phân tích từ vựng:\n- A. Solar (adj): thuộc về mặt trời.\n- B. Wind (n): gió.\n- C. Hydro (n): thủy điện (nước).\n- D. Nuclear (adj): thuộc hạt nhân.\n\n2. Dịch nghĩa toàn câu: \"Năng lượng mặt trời đến từ sức nóng của mặt trời.\"\n\n3. Giải thích chi tiết:\nTừ khóa \"heat of the sun\" (sức nóng mặt trời) định nghĩa trực tiếp cho năng lượng mặt trời (Solar energy).",     "isCorrect": true    },    {     "text": "Wind",     "rationale": "1. Phân tích từ vựng:\n- A. Solar (adj): thuộc về mặt trời.\n- B. Wind (n): gió.\n- C. Hydro (n): thủy điện (nước).\n- D. Nuclear (adj): thuộc hạt nhân.\n\n2. Dịch nghĩa toàn câu: \"Năng lượng mặt trời đến từ sức nóng của mặt trời.\"\n\n3. Giải thích chi tiết:\nSai vì \"Wind\" liên quan đến gió (moving air), không phải nhiệt từ mặt trời.",     "isCorrect": false    },    {     "text": "Hydro",     "rationale": "1. Phân tích từ vựng:\n- A. Solar (adj): thuộc về mặt trời.\n- B. Wind (n): gió.\n- C. Hydro (n): thủy điện (nước).\n- D. Nuclear (adj): thuộc hạt nhân.\n\n2. Dịch nghĩa toàn câu: \"Năng lượng mặt trời đến từ sức nóng của mặt trời.\"\n\n3. Giải thích chi tiết:\nSai vì \"Hydro\" liên quan đến nước (water), không phải mặt trời.",     "isCorrect": false    },    {     "text": "Nuclear",     "rationale": "1. Phân tích từ vựng:\n- A. Solar (adj): thuộc về mặt trời.\n- B. Wind (n): gió.\n- C. Hydro (n): thủy điện (nước).\n- D. Nuclear (adj): thuộc hạt nhân.\n\n2. Dịch nghĩa toàn câu: \"Năng lượng mặt trời đến từ sức nóng của mặt trời.\"\n\n3. Giải thích chi tiết:\nSai vì \"Nuclear\" liên quan đến nguyên tử (atoms), không phải mặt trời.",     "isCorrect": false    }   ],   "hint": "Tìm từ liên quan đến 'sun' (mặt trời)."  },  {   "questionNumber": 2,   "question": "____________ can be produced by dead plants and animals as they decay.",   "answerOptions": [    {     "text": "Biogas",     "rationale": "1. Phân tích từ vựng:\n- A. Coal (n): than đá.\n- B. Biogas (n): khí sinh học.\n- C. Oil (n): dầu mỏ.\n- D. Solar (adj): thuộc mặt trời.\n\n2. Dịch nghĩa toàn câu: \"Khí sinh học có thể được tạo ra bởi thực vật và động vật chết khi chúng phân hủy.\"\n\n3. Giải thích chi tiết:\nTừ khóa \"dead plants and animals as they decay\" (xác thực vật động vật phân hủy) là quy trình tạo ra khí sinh học (biogas).",     "isCorrect": true    },    {     "text": "Coal",     "rationale": "1. Phân tích từ vựng:\n- A. Coal (n): than đá.\n- B. Biogas (n): khí sinh học.\n- C. Oil (n): dầu mỏ.\n- D. Solar (adj): thuộc mặt trời.\n\n2. Dịch nghĩa toàn câu: \"Khí sinh học có thể được tạo ra bởi thực vật và động vật chết khi chúng phân hủy.\"\n\n3. Giải thích chi tiết:\nSai. Mặc dù than đá cũng là nhiên liệu hóa thạch từ thực vật cổ đại, nhưng ngữ cảnh \"decay\" (phân hủy) trong thời gian ngắn thường ám chỉ quy trình sản xuất biogas.",     "isCorrect": false    },    {     "text": "Oil",     "rationale": "1. Phân tích từ vựng:\n- A. Coal (n): than đá.\n- B. Biogas (n): khí sinh học.\n- C. Oil (n): dầu mỏ.\n- D. Solar (adj): thuộc mặt trời.\n\n2. Dịch nghĩa toàn câu: \"Khí sinh học có thể được tạo ra bởi thực vật và động vật chết khi chúng phân hủy.\"\n\n3. Giải thích chi tiết:\nSai. Tương tự than đá, dầu mỏ mất hàng triệu năm, trong khi biogas có thể \"produced\" (sản xuất) chủ động.",     "isCorrect": false    },    {     "text": "Solar",     "rationale": "1. Phân tích từ vựng:\n- A. Coal (n): than đá.\n- B. Biogas (n): khí sinh học.\n- C. Oil (n): dầu mỏ.\n- D. Solar (adj): thuộc mặt trời.\n\n2. Dịch nghĩa toàn câu: \"Khí sinh học có thể được tạo ra bởi thực vật và động vật chết khi chúng phân hủy.\"\n\n3. Giải thích chi tiết:\nSai hoàn toàn về nghĩa.",     "isCorrect": false    }   ],   "hint": "Loại năng lượng nào sinh ra từ sự phân hủy sinh học?"  },  {   "questionNumber": 3,   "question": "____________ is often found in the ground, consisting mainly of methane (CH4).",   "answerOptions": [    {     "text": "Natural gas",     "rationale": "1. Phân tích từ vựng:\n- A. Natural gas (n): khí tự nhiên.\n- B. Hydro (n): thủy điện.\n- C. Wind (n): gió.\n- D. Biogas (n): khí sinh học.\n\n2. Dịch nghĩa toàn câu: \"Khí tự nhiên thường được tìm thấy trong lòng đất, thành phần chủ yếu là mê-tan (CH4).\"\n\n3. Giải thích chi tiết:\nTừ khóa \"found in the ground\" (tìm thấy trong đất) và \"consisting mainly of methane\" (chứa chủ yếu mê-tan) là định nghĩa của khí tự nhiên.",     "isCorrect": true    },    {     "text": "Hydro",     "rationale": "1. Phân tích từ vựng:\n- A. Natural gas (n): khí tự nhiên.\n- B. Hydro (n): thủy điện.\n- C. Wind (n): gió.\n- D. Biogas (n): khí sinh học.\n\n2. Dịch nghĩa toàn câu: \"Khí tự nhiên thường được tìm thấy trong lòng đất, thành phần chủ yếu là mê-tan (CH4).\"\n\n3. Giải thích chi tiết:\nSai. Hydro là năng lượng nước.",     "isCorrect": false    },    {     "text": "Wind",     "rationale": "1. Phân tích từ vựng:\n- A. Natural gas (n): khí tự nhiên.\n- B. Hydro (n): thủy điện.\n- C. Wind (n): gió.\n- D. Biogas (n): khí sinh học.\n\n2. Dịch nghĩa toàn câu: \"Khí tự nhiên thường được tìm thấy trong lòng đất, thành phần chủ yếu là mê-tan (CH4).\"\n\n3. Giải thích chi tiết:\nSai. Wind là năng lượng gió.",     "isCorrect": false    },    {     "text": "Biogas",     "rationale": "1. Phân tích từ vựng:\n- A. Natural gas (n): khí tự nhiên.\n- B. Hydro (n): thủy điện.\n- C. Wind (n): gió.\n- D. Biogas (n): khí sinh học.\n\n2. Dịch nghĩa toàn câu: \"Khí tự nhiên thường được tìm thấy trong lòng đất, thành phần chủ yếu là mê-tan (CH4).\"\n\n3. Giải thích chi tiết:\nSai. Biogas cũng chứa methane nhưng được sản xuất từ phân hủy rác thải/xác sinh vật, không phải khai thác sẵn trong lòng đất (found in the ground) như Natural gas.",     "isCorrect": false    }   ],   "hint": "Loại khí nào có sẵn trong lòng đất và chứa CH4?"  },  {   "questionNumber": 4,   "question": "___         let score = 0;
        let answeredCount = 0;
        const totalQuestions = quizData.questions.length;

        // --- 2. LOGIC ĐỊNH DẠNG GIẢI THÍCH (Tự động chèn CSS theo đúng 4 bước) ---
        function formatRationaleText(text) {
            // 1. Tô màu từ vựng (A. Word (adj): nghĩa)
            let formatted = text.replace(/- ([A-D])\. (.*?)\s*\((.*?)\):\s*(.*)/g, 
                "- $1. <span class='p-word'>$2</span> (<span class='p-grammar'>$3</span>): <span class='p-mean'>$4</span>");
            
            // 2. Highlight điểm mấu chốt
            formatted = formatted.replace(/Từ khóa "(.*?)"/g, "Từ khóa \"<span class='hl-green'>$1</span>\"");
            formatted = formatted.replace(/Đồng nghĩa với/g, "<span class='hl-green'>Đồng nghĩa với</span>");
            
            // 3. Highlight Lỗi sai
            formatted = formatted.replace(/Sai vì/g, "<span class='hl-red'>Sai vì</span>");
            formatted = formatted.replace(/Sai hoàn toàn/g, "<span class='hl-red'>Sai hoàn toàn</span>");
            formatted = formatted.replace(/Sai\./g, "<span class='hl-red'>Sai.</span>");
            
            return formatted;
        }

        // --- Thuật toán Xáo trộn mảng (Shuffle) ---
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // --- 3. RENDER GIAO DIỆN ---
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = quizData.questions.map((q, index) => {
                
                // Trộn đáp án nhưng vẫn giữ thông tin xem cái nào đúng
                const shuffledOptions = shuffleArray(q.answerOptions);
                
                // Lấy rationale từ câu đúng nhất để hiển thị full giải thích
                const correctRationale = q.answerOptions.find(o => o.isCorrect).rationale;

                return `
                <div class="quiz-card" id="q-${index}" data-answered="false">
                    <div class="question-number">Câu hỏi ${index + 1}</div>
                    <div class="question-text">${q.question.replace(/____________/g, "__________")}</div>
                    
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, optIndex) => `
                            <button class="option-btn" 
                                onclick="checkAnswer(this, ${index}, ${opt.isCorrect})">
                                ${opt.text}
                            </button>
                        `).join('')}
                    </div>

                    <div class="explanation-box" id="exp-${index}">
                        <div class="explanation-header">💡 Ms Mai An Phân Tích & Giải Thích:</div>
                        <div class="explanation-content">${formatRationaleText(correctRationale).replace(/\n/g, '<br>')}</div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // --- 4. LOGIC CHẤM ĐIỂM TỨC THÌ ---
        function checkAnswer(btn, qIndex, isCorrect) {
            const card = document.getElementById(`q-${qIndex}`);
            if (card.getAttribute('data-answered') === 'true') return;
            
            card.setAttribute('data-answered', 'true');
            const buttons = card.querySelectorAll('.option-btn');
            
            answeredCount++;
            document.getElementById('progress').innerText = answeredCount;

            if (isCorrect) {
                btn.classList.add('correct');
                score++;
                document.getElementById('score').innerText = score;
                playSound('correct');
                fireConfetti();
            } else {
                btn.classList.add('wrong');
                playSound('wrong');
                // Tự động tìm và bôi xanh nút đúng
                buttons.forEach(b => {
                    // Cần check lại text của nút để xem nút nào mang isCorrect
                    // Do ta đã pass isCorrect thẳng vào onclick, nên dùng dataset nếu cần.
                    // Cách nhanh: duyệt lại mảng option trộn ban đầu, nhưng đơn giản hơn:
                    if (b.onclick.toString().includes("true")) {
                        b.classList.add('correct');
                    }
                });
            }

            // Vô hiệu hóa các nút khác
            buttons.forEach(b => b.disabled = true);

            // Mở giải thích mượt mà
            document.getElementById(`exp-${qIndex}`).style.display = 'block';
        }

        // --- 5. HỆ THỐNG ÂM THANH & HIỆU ỨNG (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                // Tiếng Ding trong trẻo
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.15);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else {
                // Tiếng Buzz hụt hẫng nhẹ
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(120, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function fireConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#8854C0', '#00C9A7', '#FDCB6E', '#FF4757', '#8EC5FC'];

            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 25, vy: (Math.random() - 0.5) * 25 - 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: Math.random() * 8 + 6, life: 100
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = 0;
                particles.forEach(p => {
                    if (p.life > 0) {
                        p.x += p.vx; p.y += p.vy;
                        p.vy += 0.6; // Trọng lực rơi
                        p.life -= 1.2;
                        active++;
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                if (active > 0) requestAnimationFrame(animate);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            animate();
        }

        // --- 6. LOGIC NỘP BÀI (MODAL) ---
        function openNameModal() {
            document.getElementById('nameModal').classList.add('active');
            document.getElementById('studentName').focus();
        }

        function handleEnter(e) {
            if(e.key === 'Enter') showResults();
        }

        function showResults() {
            const name = document.getElementById('studentName').value.trim();
            if(!name) {
                document.getElementById('studentName').classList.add('error');
                document.getElementById('nameError').style.display = 'block';
                return;
            }

            // Tắt Name Modal
            document.getElementById('nameModal').classList.remove('active');
            
            // Tính toán kết quả
            const percentage = (score / totalQuestions) * 100;
            let greeting = "";
            let gifUrl = "";

            if (percentage === 100) {
                greeting = `🌟 THIÊN TÀI! ${name} xuất sắc tuyệt đối!`;
                gifUrl = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif"; // Minions Cheer
            } else if (percentage >= 60) {
                greeting = `Giỏi lắm ${name}! Đập tay nào! 👏`;
                gifUrl = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif"; // Thumbs up
            } else {
                greeting = `Cố lên ${name}! Ôn lại chút là thành siêu nhân ngay! 💪`;
                gifUrl = "https://media.giphy.com/media/d2lcHJTG5Tscg/giphy.gif"; // Crying Spongebob hài hước
            }

            const resultContentHTML = `
                <h2 style="color:#8854C0; font-weight:900; font-size: 1.6rem;">${greeting}</h2>
                <img src="${gifUrl}" alt="Result GIF" class="result-gif">
                <div style="font-size:3.5rem; font-weight:900; color:#00C9A7; margin:15px 0;">${score}/${totalQuestions}</div>
                <button class="submit-btn" style="padding: 10px 30px; font-size: 1.1rem;" onclick="location.reload()">Làm lại bài nhé</button>
            `;

            document.getElementById('resultContent').innerHTML = resultContentHTML;
            document.getElementById('resultModal').classList.add('active');

            if(percentage >= 60) fireConfetti();
        }

        // Bắt đầu ngay khi tải trang
        window.onload = renderQuiz;
    </script>
