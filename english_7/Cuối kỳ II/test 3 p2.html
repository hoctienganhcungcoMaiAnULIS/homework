<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Success 7 - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #00C9A7;
            --accent: #FDCB6E;
            --correct: #00D26A;
            --wrong: #FF4757;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: var(--primary);
            /* SVG Background with animated radial gradients */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(253, 203, 110, 0.5), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(0, 201, 167, 0.5), transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(255, 107, 107, 0.4), transparent 40%),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><text x="10%" y="20%" font-size="40" opacity="0.6">🚀</text><text x="80%" y="30%" font-size="50" opacity="0.6">💻</text><text x="20%" y="80%" font-size="45" opacity="0.6">🌏</text><text x="85%" y="85%" font-size="40" opacity="0.6">🍿</text><text x="50%" y="15%" font-size="35" opacity="0.6">✨</text><text x="60%" y="70%" font-size="40" opacity="0.6">🛸</text></svg>');
            background-attachment: fixed;
            background-size: cover;
            animation: bgFloat 20s ease-in-out infinite alternate;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #333;
        }

        @keyframes bgFloat {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-card {
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 90%;
            backdrop-filter: blur(15px);
        }

        .modal-card h2 {
            font-family: 'Quicksand', sans-serif;
            color: var(--primary);
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s;
            text-align: center;
        }

        .input-field:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(0, 201, 167, 0.3);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #a274db);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0 #633c91;
            transition: all 0.1s;
            font-family: 'Quicksand', sans-serif;
            width: 100%;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #633c91;
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            border-color: var(--wrong) !important;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Main App Layout */
        #app {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        header {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        header h1 {
            font-family: 'Quicksand', sans-serif;
            color: var(--primary);
            font-size: 1.5rem;
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #timer-display {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--wrong);
            background: #fff;
            padding: 5px 20px;
            border-radius: 20px;
            border: 3px solid var(--wrong);
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 20px;
            gap: 20px;
        }

        .panel {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 2px solid var(--glass-border);
            padding: 25px;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(136, 84, 192, 0.4); border-radius: 10px; }

        /* Reading Passage Styles */
        .passage-block {
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 1.15rem;
            line-height: 1.8;
        }

        .btn-translate {
            background: var(--accent);
            color: #555;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 0 #e0b055;
            transition: all 0.1s;
        }
        .btn-translate:active { transform: translateY(4px); box-shadow: 0 0 0; }

        .translation-box {
            display: none;
            background: #f0fdf4;
            border-left: 5px solid var(--correct);
            padding: 15px;
            margin-top: 15px;
            border-radius: 0 10px 10px 0;
            font-size: 1.1rem;
            color: #2e7d32;
        }

        .glossary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            margin-bottom: 30px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
        }
        .glossary-table th { background: var(--secondary); color: white; padding: 12px; }
        .glossary-table td { padding: 12px; border-bottom: 1px solid #eee; }

        /* Quiz Question Styles */
        .question-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 18px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            font-family: 'Quicksand', sans-serif;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #495057;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            box-shadow: 0 5px 0 #dee2e6;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.02);
            border-color: var(--secondary);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(5px);
            box-shadow: 0 0 0;
        }

        .option-btn.correct {
            background: var(--correct);
            color: white;
            border-color: var(--correct);
            box-shadow: 0 5px 0 #00ab55;
        }

        .option-btn.wrong {
            background: var(--wrong);
            color: white;
            border-color: var(--wrong);
            box-shadow: 0 5px 0 #d63031;
            animation: shake 0.4s;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .explanation-box {
            display: none;
            background: #fff3cd;
            border: 2px dashed #ffeaa7;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 1rem;
            line-height: 1.6;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .explanation-box h4 { color: #d35400; margin-bottom: 10px; font-family: 'Quicksand'; }
        .explanation-box ul { list-style-type: none; margin-bottom: 15px; }
        .explanation-box li { margin-bottom: 8px; }
        .quote-box {
            background: #e8f4f8;
            padding: 12px;
            border-left: 4px solid #3498db;
            border-radius: 5px;
            margin-top: 10px;
        }

        .submit-area {
            text-align: center;
            padding: 30px 0;
        }

        #submit-btn {
            background: linear-gradient(135deg, var(--secondary), #00ab55);
            font-size: 1.5rem;
            padding: 20px 40px;
            box-shadow: 0 8px 0 #008f47;
        }

        /* Result GIF styling */
        .result-gif {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Confetti Canvas */
        #confetti {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="auth-modal" class="modal-overlay">
        <div class="modal-card">
            <h2>🔒 Classroom Password</h2>
            <input type="password" id="pass-input" class="input-field" placeholder="Nhập mật khẩu...">
            <button class="btn" onclick="checkAuth()">Mở Khóa Đề Thi</button>
        </div>
    </div>

    <div id="name-modal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <h2>🎯 Nộp Bài & Xem Điểm</h2>
            <p style="margin-bottom: 15px; color: #666;">Nhập tên của bạn để cô ghi điểm nhé!</p>
            <input type="text" id="name-input" class="input-field" placeholder="Ví dụ: Nguyễn Văn A...">
            <button class="btn" onclick="showFinalResult()">Nộp Bài Ngay</button>
        </div>
    </div>

    <div id="result-modal" class="modal-overlay" style="display: none;">
        <div class="modal-card" style="max-width: 500px;">
            <img id="result-gif" class="result-gif" src="" alt="Meme cảm xúc">
            <h2 id="result-title" style="font-size: 2rem;"></h2>
            <p id="result-score" style="font-size: 1.5rem; font-weight: bold; color: var(--primary); margin: 15px 0;"></p>
            <p id="result-msg" style="font-size: 1.2rem; color: #555;"></p>
            <button class="btn" style="margin-top: 25px;" onclick="location.reload()">Làm lại bài</button>
        </div>
    </div>

    <canvas id="confetti"></canvas>

    <div id="app">
        <header>
            <h1>👩‍🏫 Ms Mai An ULIS - Bài tập Gamification</h1>
            <div class="timer-container">
                <button id="timer-btn" class="btn" style="padding: 10px 20px; font-size: 1rem;" onclick="startTimer()">▶ BẮT ĐẦU TÍNH GIỜ</button>
                <div id="timer-display">10:00</div>
            </div>
        </header>

        <div class="main-content">
            <div class="panel" id="left-panel">
                </div>

            <div class="panel" id="right-panel">
                <div id="quiz-container">
                    </div>
                <div class="submit-area">
                    <button id="submit-btn" class="btn" onclick="openNameModal()">🎯 NỘP BÀI & XEM KẾT QUẢ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- SECURITY ---
        // Obfuscated password array (+5 offset) to prevent easy reading in DevTools
        const authHash = [104, 116, 114, 102, 110, 102, 115, 122, 113, 110, 120]; 
        const getPass = () => String.fromCharCode(...authHash.map(num => num - 5));

        function checkAuth() {
            const input = document.getElementById('pass-input');
            if (input.value === getPass()) {
                document.getElementById('auth-modal').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                initQuiz();
            } else {
                input.classList.remove('shake');
                void input.offsetWidth; // trigger reflow
                input.classList.add('shake');
                input.value = '';
                playSound(false);
            }
        }

        document.getElementById('pass-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkAuth();
        });

        // --- AUDIO ENGINE (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(isCorrect) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (isCorrect) {
                // "Ding" sound
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } else {
                // "Teo teo teo" sound
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.setValueAtTime(250, audioCtx.currentTime + 0.15);
                osc.frequency.setValueAtTime(200, audioCtx.currentTime + 0.3);
                
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        // --- TIMER ---
        let timerInterval;
        let timeLeft = 600; // 10 minutes
        let timerRunning = false;

        function startTimer() {
            const btn = document.getElementById('timer-btn');
            if (!timerRunning) {
                timerRunning = true;
                btn.innerHTML = "⏸ TẠM DỪNG";
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        alert("Đã hết giờ làm bài! Bạn vẫn có thể tiếp tục làm, nhưng nhớ là trong phòng thi thật, bạn chỉ nên làm bài này trong 10 phút thôi nha.");
                    }
                }, 1000);
            } else {
                timerRunning = false;
                btn.innerHTML = "▶ TIẾP TỤC";
                clearInterval(timerInterval);
            }
        }

        function updateTimerDisplay() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }

        // --- DATA ---
        const passagesData = [
            {
                title: "Passage 1: 8 TIPS STAY SAFETY ONLINE",
                blocks: [
                    {
                        en: "1. Be nice (13) _____ people online.<br>2. Take care with what you share.<br>3. (14) ____ personal information private.",
                        vi: "1. Hãy đối xử tử tế với mọi người trên mạng.<br>2. Cẩn thận với những gì bạn chia sẻ.<br>3. Giữ kín thông tin cá nhân."
                    },
                    {
                        en: "4. Check your privacy settings.<br>5. Know how (15)_____ posts.<br>6. Keep your password (16) ____.<br>7. Never meet anyone in person you have only met online.",
                        vi: "4. Kiểm tra cài đặt quyền riêng tư của bạn.<br>5. Biết cách báo cáo các bài đăng xấu.<br>6. Giữ mật khẩu của bạn an toàn.<br>7. Không bao giờ gặp trực tiếp người mà bạn chỉ mới quen trên mạng."
                    }
                ],
                glossary: [
                    { word: "Privacy", type: "(n)", mean: "Sự riêng tư" },
                    { word: "Setting", type: "(n)", mean: "Cài đặt" },
                    { word: "Personal", type: "(adj)", mean: "Cá nhân" },
                    { word: "Post", type: "(n)", mean: "Bài đăng" },
                    { word: "Password", type: "(n)", mean: "Mật khẩu" }
                ]
            },
            {
                title: "Passage 2: WATCHING FILMS",
                blocks: [
                    {
                        en: "Watching films is one of the most popular ways to relax. People enjoy different types of films depending (19) ______ their interests. Some prefer action films, while others love romantic movies. Horror films are also popular (20) ______ they bring excitement and fear to the audience.",
                        vi: "Xem phim là một trong những cách giải trí phổ biến nhất. Mọi người thích các thể loại phim khác nhau tùy thuộc vào sở thích của họ. Một số thích phim hành động, trong khi những người khác yêu thích phim lãng mạn. Phim kinh dị cũng rất được yêu thích vì chúng mang lại sự phấn khích và sợ hãi cho khán giả."
                    },
                    {
                        en: "Films (21) ______ by talented directors and involve many actors and actresses. A good film usually has an interesting plot, great acting, and impressive visual effects.",
                        vi: "Các bộ phim được đạo diễn bởi những đạo diễn tài năng và có sự tham gia của nhiều nam nữ diễn viên. Một bộ phim hay thường có cốt truyện thú vị, diễn xuất tuyệt vời và hiệu ứng hình ảnh ấn tượng."
                    },
                    {
                        en: "Nowadays, people (22) ______ to the cinema less frequently because they can watch movies at home. With streaming services, they can enjoy their favorite films anytime (23) ______ having to buy tickets. However, many still believe that watching a movie in (24) ______ cinema is a better experience than watching it at home.",
                        vi: "Ngày nay, mọi người ít đi xem phim ở rạp hơn vì họ có thể xem phim ở nhà. Với các dịch vụ phát trực tuyến, họ có thể thưởng thức các bộ phim yêu thích bất cứ lúc nào mà không cần phải mua vé. Tuy nhiên, nhiều người vẫn tin rằng xem phim tại rạp là một trải nghiệm tuyệt vời hơn xem ở nhà."
                    }
                ],
                glossary: [
                    { word: "Depend on", type: "(v)", mean: "Phụ thuộc vào" },
                    { word: "Romantic", type: "(adj)", mean: "Lãng mạn" },
                    { word: "Excitement", type: "(n)", mean: "Sự phấn khích" },
                    { word: "Director", type: "(n)", mean: "Đạo diễn" },
                    { word: "Impressive", type: "(adj)", mean: "Ấn tượng" },
                    { word: "Visual effects", type: "(n.phr)", mean: "Hiệu ứng hình ảnh" },
                    { word: "Frequently", type: "(adv)", mean: "Thường xuyên" },
                    { word: "Streaming service", type: "(n.phr)", mean: "Dịch vụ phát trực tuyến" }
                ]
            },
            {
                title: "Passage 3: FLYING CARS",
                blocks: [
                    {
                        en: "Flying cars aren’t just science fiction anymore. Terrafugia, based in the United States, is developing a readable aircraft called the Transition. The vehicle has two seats, four wheels and wings that fold up, so it can be driven like a car.",
                        vi: "Ô tô bay không còn chỉ là khoa học viễn tưởng nữa. Terrafugia, có trụ sở tại Hoa Kỳ, đang phát triển một loại máy bay có thể chạy trên đường có tên là Transition. Phương tiện này có hai chỗ ngồi, bốn bánh và đôi cánh có thể gập lại, nên nó có thể được lái như một chiếc ô tô."
                    },
                    {
                        en: "Terrafugia first began to work on the Transition in 2006 and has come closer than anyone to making the flying car a reality. The company uses special tires and glass that are lighter than normal automotive ones, which makes it easier for the vehicle to fly.",
                        vi: "Terrafugia bắt đầu nghiên cứu Transition vào năm 2006 và đã tiến gần hơn bất kỳ ai trong việc biến ô tô bay thành hiện thực. Công ty sử dụng lốp và kính đặc biệt nhẹ hơn loại ô tô thông thường, giúp xe dễ dàng bay hơn."
                    },
                    {
                        en: "An owner needs to pass a test and complete 20 hours of flying time to be able to fly the Transition. The Transition can reach around 70 miles per hour (mph) on the road and 115 mph in the air. On the ground, it gets 35 miles per gallon.",
                        vi: "Chủ sở hữu cần phải vượt qua một bài kiểm tra và hoàn thành 20 giờ bay để có thể tự lái chiếc Transition. Transition có thể đạt tốc độ khoảng 70 dặm/giờ (mph) trên đường bộ và 115 mph trên không. Trên mặt đất, nó đi được 35 dặm cho mỗi gallon nhiên liệu."
                    }
                ],
                glossary: [
                    { word: "Science fiction", type: "(n)", mean: "Khoa học viễn tưởng" },
                    { word: "Develop", type: "(v)", mean: "Phát triển/Tạo ra" },
                    { word: "Vehicle", type: "(n)", mean: "Phương tiện" },
                    { word: "Fold up", type: "(v)", mean: "Gập lại" },
                    { word: "Reality", type: "(n)", mean: "Hiện thực" },
                    { word: "Automotive", type: "(adj)", mean: "Thuộc về ô tô" },
                    { word: "Complete", type: "(v)", mean: "Hoàn thành" }
                ]
            },
            {
                title: "Passage 4: THE MAORI",
                blocks: [

        // Shuffle Array utility
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

                p.blocks.forEach((b, i) => {
                    const blockId = `trans-${p.title.replace(/\s+/g,'')}-${i}`;
                    html += `
                        <div class="passage-block">
                            <p>${b.en}</p>
                            <button class="btn-translate" onclick="document.getElementById('${blockId}').style.display='block'">Mở dịch đoạn này 🌟</button>
                            <div id="${blockId}" class="translation-box">${b.vi}</div>
                        </div>
                    `;
                });

                // Glossary
                html += `<h3 style="margin-top:20px; color: var(--secondary); font-family: 'Quicksand';">📖 Bảng từ vựng (Glossary)</h3>`;
                html += `<table class="glossary-table"><tr><th>Từ vựng</th><th>Loại từ</th><th>Nghĩa Tiếng Việt</th></tr>`;
                p.glossary.forEach(g => {
                    html += `<tr><td><strong>${g.word}</strong></td><td>${g.type}</td><td>${g.mean}</td></tr>`;

                html += `</table><hr style="border: 1px dashed #ccc; margin: 30px 0;">`;

            // Render Questions
            const rightPanel = document.getElementById('quiz-container');
            quizQuestions.forEach((q, index) => {
                let html = `
                    <div class="question-card" id="qcard-${index}">
                        <div class="question-text">${q.text}</div>
                        <div class="options-grid" id="opts-${index}">
                `;
                
                let shuffledOptions = shuffleArray([...q.options]);
                
                shuffledOptions.forEach((opt, optIdx) => {
                    html += `
                        <button class="option-btn" onclick="checkAnswer(${index}, ${optIdx}, ${opt.correct})" id="btn-${index}-${optIdx}">
                            ${opt.text}
                        </button>
                    `;
                });
                
                html += `</div>
                        <div class="explanation-box" id="exp-${index}">
                            <h4>Phân tích đáp án:</h4>
                            <ul>
                `;
                // List all explanations dynamically in order of options (not shuffled for explain box)
                q.options.forEach(o => {
                    html += `<li><strong>${o.text}</strong>: ${o.exp}</li>`;
                });

                html += `</ul>
                            <div class="quote-box">
                                <strong>🔍 Dẫn chứng trong bài:</strong><br>
                                <em>"${q.quote}"</em><br>
                                👉 <strong>Dịch:</strong> ${q.viQuote}
                            </div>
                        </div>
                    </div>`;
                rightPanel.innerHTML += html;
            });
        }

        // Handle answering
        window.checkAnswer = function(qIndex, optIdx, isCorrect) {
            const btns = document.querySelectorAll(`#opts-${qIndex} .option-btn`);
            btns.forEach(b => b.disabled = true); // Disable all
            
            const selectedBtn = document.getElementById(`btn-${qIndex}-${optIdx}`);
            
            if (isCorrect) {
                selectedBtn.classList.add('correct');
                playSound(true);
                shootConfetti(selectedBtn);
                score++;
            } else {
                selectedBtn.classList.add('wrong');
                playSound(false);
                // Highlight correct one
                const correctOpt = quizQuestions[qIndex].options.find(o => o.correct);
                btns.forEach(b => {
                    if (b.innerText.trim() === correctOpt.text) b.classList.add('correct');
                });
            }
            
            document.getElementById(`exp-${qIndex}`).style.display = 'block';
            answeredQuestions++;
        };

        // --- SUBMIT & RESULT ---
        function openNameModal() {
            if (answeredQuestions < totalQuestions) {
                if(!confirm(`Bạn mới làm ${answeredQuestions}/${totalQuestions} câu. Bạn có chắc chắn muốn nộp bài sớm không?`)) return;
            }
            document.getElementById('name-modal').style.display = 'flex';
            clearInterval(timerInterval);
        }

        document.getElementById('name-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') showFinalResult();
        });

        function showFinalResult() {
            const nameInput = document.getElementById('name-input');
            const name = nameInput.value.trim();
            
            if (!name) {
                nameInput.classList.remove('shake');
                void nameInput.offsetWidth;
                nameInput.classList.add('shake');
                nameInput.placeholder = "⚠️ Vui lòng nhập tên trước khi xem điểm nhé!";
                return;
            }

            document.getElementById('name-modal').style.display = 'none';
            document.getElementById('result-modal').style.display = 'flex';
            
            const percent = (score / totalQuestions) * 100;
            const titleEl = document.getElementById('result-title');
            const msgEl = document.getElementById('result-msg');
            const gifEl = document.getElementById('result-gif');
            const scoreEl = document.getElementById('result-score');

            scoreEl.innerText = `Điểm của bạn: ${score} / ${totalQuestions}`;

            if (percent === 100) {
                titleEl.innerHTML = `🌟 THIÊN TÀI! ${name} xuất sắc tuyệt đối!`;
                msgEl.innerText = "Wow, em làm bài như một siêu sao vậy! Đúng 100% không trượt phát nào luôn! 💯🎉";
                gifEl.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif"; // Minions cheering
                shootMegaConfetti();
                playSound(true);
            } else if (percent >= 60) {
                titleEl.innerHTML = `👍 LÀM TỐT LẮM, ${name}!`;
                msgEl.innerText = "Tuyệt vời! Em đã nắm bài rất tốt. Xem lại mấy câu sai phần giải thích để rút kinh nghiệm nhé! 😉";
                gifEl.src = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif"; // High five
                playSound(true);
            } else {
                titleEl.innerHTML = `💪 CỐ LÊN NHÉ, ${name}!`;
                msgEl.innerText = "Không sao đâu! Đọc kỹ phần giải thích chi tiết cô đã ghi để lần sau làm tốt hơn nha. Em làm được mà! 🚀";
                gifEl.src = "https://media.giphy.com/media/L95W4wv8nnb9K/giphy.gif"; // Crying cute / sad
                playSound(false);
            }
        }

        // --- VISUAL EFFECTS (CONFETTI) ---
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        function randomColor() {
            const colors = ['#fbc531', '#e1b12c', '#4cd137', '#44bd32', '#00a8ff', '#0097e6', '#9c88ff', '#8c7ae6', '#e84118'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function createConfetti(x, y, amount = 30) {
            for (let i = 0; i < amount; i++) {
                particles.push({
                    x: x, y: y,
                    r: Math.random() * 6 + 2,
                    dx: Math.random() * 10 - 5,
                    dy: Math.random() * -10 - 5,
                    color: randomColor(),
                    tilt: Math.random() * 10
                });
            }
        }

        function shootConfetti(btn) {
            const rect = btn.getBoundingClientRect();
            createConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2, 40);
        }

        function shootMegaConfetti() {
            createConfetti(window.innerWidth / 4, window.innerHeight, 100);
            createConfetti((window.innerWidth / 4) * 3, window.innerHeight, 100);
        }

        function drawConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.dy += 0.3; // gravity
                p.x += p.dx;
                p.y += p.dy;
                p.tilt += 0.1;

                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
                ctx.stroke();

                if (p.y > canvas.height) particles.splice(index, 1);
            });
            requestAnimationFrame(drawConfetti);
        }
        drawConfetti();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

    </script>
</body>
</html>
