<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đề 02 – HK2 Global Success 7 | Ms Mai An ULIS</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c1: #a855f7;
  --c2: #ec4899;
  --c3: #3b82f6;
  --c4: #10b981;
  --correct: #00D26A;
  --wrong: #FF4757;
  --correct-bg: #dcfce7;
  --wrong-bg: #fee2e2;
}

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  background: linear-gradient(-45deg, #a855f7, #ec4899, #3b82f6, #10b981, #f59e0b, #ef4444);
  background-size: 600% 600%;
  animation: gradientShift 18s ease infinite;
  position: relative;
  overflow-x: hidden;
}

@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  25%  { background-position: 50% 0%; }
  50%  { background-position: 100% 50%; }
  75%  { background-position: 50% 100%; }
  100% { background-position: 0% 50%; }
}

/* ===== FLOATING PATTERN ===== */
#pattern-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.float-em {
  position: absolute;
  animation: floatRise linear infinite;
  opacity: 0.22;
  user-select: none;
  line-height: 1;
}

@keyframes floatRise {
  from { transform: translateY(105vh) rotate(0deg) scale(1); }
  50%  { transform: translateY(50vh) rotate(180deg) scale(1.1); }
  to   { transform: translateY(-10vh) rotate(360deg) scale(0.9); }
}

/* ===== HEADER ===== */
header {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 10px 16px 8px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1.5px solid rgba(255,255,255,0.3);
  box-shadow: 0 2px 20px rgba(0,0,0,0.1);
}

header h1 {
  font-size: 1.05rem;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  letter-spacing: 0.3px;
}

header p {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.9);
  font-weight: 700;
  margin-top: 2px;
}

/* ===== PROGRESS BAR ===== */
#prog-bar-wrap {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 7px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

#prog-bg {
  flex: 1;
  height: 14px;
  background: rgba(255,255,255,0.3);
  border-radius: 99px;
  overflow: hidden;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
}

#prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #00D26A, #00ffaa, #a8ff78);
  border-radius: 99px;
  width: 0%;
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 0 8px rgba(0,210,106,0.6);
}

#prog-txt {
  font-size: 0.82rem;
  font-weight: 900;
  color: #fff;
  min-width: 52px;
  text-align: right;
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

/* ===== QUIZ CONTAINER ===== */
#quiz-container {
  position: relative;
  z-index: 5;
  max-width: 780px;
  margin: 0 auto;
  padding: 20px 14px 10px;
}

/* ===== QUESTION CARD ===== */
.q-card {
  background: rgba(255,255,255,0.97);
  border-radius: 22px;
  padding: 20px 22px 18px;
  margin-bottom: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.07);
  position: relative;
  overflow: hidden;
  transition: transform 0.2s ease;
}

.q-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(90deg, var(--c1), var(--c2), var(--c3), var(--c4));
}

.q-header-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 8px;
}

.q-num-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, var(--c1), var(--c2));
  color: #fff;
  font-size: 0.75rem;
  font-weight: 900;
  padding: 4px 12px;
  border-radius: 99px;
  white-space: nowrap;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(168,85,247,0.4);
}

.q-status-icon {
  font-size: 1.4rem;
  line-height: 1;
  flex-shrink: 0;
}

.q-text {
  font-size: 1.13rem;
  font-weight: 700;
  color: #1e1b4b;
  line-height: 1.6;
  margin-bottom: 14px;
}

.q-text u {
  text-decoration: underline;
  text-decoration-thickness: 2.5px;
  text-underline-offset: 3px;
  color: #7c3aed;
  text-decoration-color: #7c3aed;
}

.q-text em {
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  padding: 8px 12px;
  border-radius: 10px;
  display: block;
  font-style: normal;
  font-size: 0.98rem;
  border-left: 3px solid #f59e0b;
  margin: 8px 0;
  line-height: 1.7;
}

/* ===== SIGNS (Q29, Q30) ===== */
.sign-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 16px;
}

.quiet-sign {
  background: #111;
  border-radius: 12px;
  padding: 14px 22px;
  text-align: center;
  width: 190px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.05);
}

.qs-line1 {
  color: #FFD700;
  font-size: 0.85rem;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.qs-icon {
  font-size: 2.2rem;
  display: block;
  margin: 4px 0;
}

.qs-line2 {
  background: #FFD700;
  color: #111;
  font-size: 1.05rem;
  font-weight: 900;
  padding: 5px 8px;
  border-radius: 5px;
  letter-spacing: 0.5px;
  line-height: 1.3;
}

.nodogs-sign {
  background: #fff;
  border: 3px solid #bbb;
  border-radius: 14px;
  padding: 16px 14px;
  text-align: center;
  width: 155px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}

.nd-circle {
  width: 88px;
  height: 88px;
  margin: 0 auto 10px;
}

.nd-circle svg { width: 100%; height: 100%; }

.nd-label {
  font-size: 0.82rem;
  font-weight: 900;
  color: #111;
  letter-spacing: 1px;
  line-height: 1.35;
  text-transform: uppercase;
}

/* ===== OPTIONS ===== */
.opts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.opts-grid.one-col {
  grid-template-columns: 1fr;
}

.opt-btn {
  background: #f3f4f6;
  border: 2.5px solid #e5e7eb;
  border-radius: 16px;
  padding: 11px 15px;
  font-family: 'Nunito', sans-serif;
  font-size: 1.06rem;
  font-weight: 700;
  color: #374151;
  cursor: pointer;
  text-align: left;
  transition: all 0.18s ease;
  box-shadow: 0 4px 0 #d1d5db, 0 6px 12px rgba(0,0,0,0.04);
  line-height: 1.5;
  position: relative;
}

.opt-btn:hover:not(:disabled) {
  transform: scale(1.025) translateY(-2px);
  box-shadow: 0 7px 0 #9ca3af, 0 10px 20px rgba(0,0,0,0.08);
  background: #ede9fe;
  border-color: var(--c1);
  color: #4c1d95;
}

.opt-btn:disabled { cursor: not-allowed; }

.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
  color: #14532d !important;
  box-shadow: 0 4px 0 #86efac !important;
}

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
  color: #7f1d1d !important;
  box-shadow: 0 4px 0 #fca5a5 !important;
}

.opt-btn u {
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 2px;
  color: #7c3aed;
}

/* ===== SHAKE ===== */
@keyframes shakeFX {
  0%,100% { transform: translateX(0) rotate(0deg); }
  15% { transform: translateX(-10px) rotate(-2deg); }
  30% { transform: translateX(10px) rotate(2deg); }
  45% { transform: translateX(-7px) rotate(-1deg); }
  60% { transform: translateX(7px) rotate(1deg); }
  75% { transform: translateX(-4px); }
  90% { transform: translateX(4px); }
}

.shake { animation: shakeFX 0.55s ease; }

/* ===== EXPLANATION BOX ===== */
.exp-box {
  display: none;
  margin-top: 14px;
  background: linear-gradient(135deg, #fef9ec, #f3e8ff);
  border-left: 5px solid #f59e0b;
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 0.98rem;
  line-height: 1.7;
  color: #1e1b4b;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.exp-box.open { display: block; }

.exp-box h4 {
  font-size: 0.88rem;
  font-weight: 900;
  color: #92400e;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(245,158,11,0.15);
  padding: 6px 10px;
  border-radius: 8px;
}

.exp-box p { margin-bottom: 7px; }
.exp-box strong { color: #5b21b6; }
.hl { color: #dc2626 !important; font-weight: 900 !important; }
.exp-box .vocab-row { padding-left: 8px; border-left: 3px solid #c084fc; margin: 4px 0; }

/* ===== SUBMIT BUTTON ===== */
#submit-btn {
  display: block;
  margin: 24px auto 16px;
  background: linear-gradient(135deg, #f59e0b, #ef4444, #ec4899);
  background-size: 200% 200%;
  animation: btnGrad 3s ease infinite;
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 1.18rem;
  font-weight: 900;
  padding: 16px 44px;
  border: none;
  border-radius: 99px;
  cursor: pointer;
  box-shadow: 0 6px 0 #b45309, 0 10px 24px rgba(239,68,68,0.35);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  letter-spacing: 0.5px;
  position: relative;
  z-index: 5;
}

@keyframes btnGrad {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

#submit-btn:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 10px 0 #b45309, 0 16px 30px rgba(239,68,68,0.45);
}

#submit-btn:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #b45309;
}

/* ===== MODALS ===== */
.modal-ov {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.68);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.modal-ov.hide { display: none; }

.modal-box {
  background: #fff;
  border-radius: 26px;
  padding: 32px 30px;
  max-width: 430px;
  width: 92%;
  text-align: center;
  box-shadow: 0 24px 70px rgba(0,0,0,0.28);
  animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes popIn {
  from { transform: scale(0.65) translateY(20px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}

.modal-box .m-icon { font-size: 3.2rem; display: block; margin-bottom: 10px; }
.modal-box h2 { font-size: 1.35rem; font-weight: 900; color: #1e1b4b; margin-bottom: 7px; }
.modal-box .m-sub { font-size: 0.9rem; color: #6b7280; font-weight: 600; margin-bottom: 16px; }

.m-input {
  width: 100%;
  padding: 12px 16px;
  border: 2.5px solid #e5e7eb;
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: #374151;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 8px;
}

.m-input:focus { border-color: var(--c1); box-shadow: 0 0 0 3px rgba(168,85,247,0.18); }
.m-input.m-error { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.15); }

.m-err-txt {
  min-height: 22px;
  font-size: 0.86rem;
  font-weight: 800;
  color: #ef4444;
  margin-bottom: 10px;
  text-align: left;
}

.m-btn {
  background: linear-gradient(135deg, var(--c1), var(--c2));
  color: #fff;
  border: none;
  border-radius: 99px;
  padding: 13px 36px;
  font-family: 'Nunito', sans-serif;
  font-size: 1.05rem;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 5px 0 #7e22ce, 0 8px 20px rgba(168,85,247,0.35);
  transition: transform 0.15s ease;
  width: 100%;
}

.m-btn:hover { transform: translateY(-2px); }
.m-btn:active { transform: translateY(2px); }

@keyframes inputShake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-12px); }
  40% { transform: translateX(12px); }
  60% { transform: translateX(-8px); }
  80% { transform: translateX(8px); }
}
.i-shake { animation: inputShake 0.45s ease; }

/* ===== RESULT MODAL ===== */
.res-title { font-size: 1.2rem; font-weight: 900; color: #1e1b4b; margin-bottom: 10px; line-height: 1.45; }
.res-score {
  font-size: 3.2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--c1), var(--c2), #f59e0b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin: 8px 0 4px;
  line-height: 1.1;
}
.res-detail { font-size: 1rem; color: #6b7280; font-weight: 700; margin-bottom: 14px; }
.res-meme {
  width: 200px;
  height: 150px;
  object-fit: cover;
  border-radius: 16px;
  margin: 0 auto 14px;
  display: block;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}
.res-grade { font-size: 0.95rem; font-weight: 700; color: #374151; margin-bottom: 14px; }
.res-grade strong { color: #7c3aed; font-size: 1.1rem; }

.restart-btn {
  background: linear-gradient(135deg, #10b981, #3b82f6);
  color: #fff;
  border: none;
  border-radius: 99px;
  padding: 12px 36px;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 4px 0 #047857, 0 8px 20px rgba(16,185,129,0.35);
  transition: transform 0.15s ease;
  width: 100%;
}
.restart-btn:hover { transform: translateY(-2px); }

/* ===== CONFETTI ===== */
#confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 520px) {
  .opts-grid { grid-template-columns: 1fr; }
  .q-text { font-size: 1.03rem; }
  .opt-btn { font-size: 0.98rem; }
  header h1 { font-size: 0.93rem; }
  #submit-btn { font-size: 1.05rem; padding: 14px 30px; }
}

/* ===== HIDDEN ===== */
.hide { display: none !important; }
</style>

<body>

<!-- Confetti -->
<canvas id="confetti-canvas"></canvas>

<!-- Floating pattern background -->
<div id="pattern-layer"></div>

<!-- ====== PASSWORD MODAL ====== -->
<div class="modal-ov" id="pwd-modal">
  <div class="modal-box">
    <span class="m-icon">🔒</span>
    <h2>Nhập mật khẩu để vào bài!</h2>
    <p class="m-sub">Xin mật khẩu từ Ms Mai An trước khi làm bài nhé 🌸</p>
    <input type="password" class="m-input" id="pwd-inp" placeholder="Nhập mật khẩu..." autocomplete="off">
    <div class="m-err-txt" id="pwd-err"></div>
    <button class="m-btn" id="pwd-btn">🚀 Vào bài ngay!</button>
  </div>
</div>

<!-- ====== NAME MODAL ====== -->
<div class="modal-ov hide" id="name-modal">
  <div class="modal-box">
    <span class="m-icon">✏️</span>
    <h2>Nhập tên của bạn</h2>
    <p class="m-sub">Để kết quả được cá nhân hóa riêng cho bạn! 🌟</p>
    <input type="text" class="m-input" id="name-inp" placeholder="Ví dụ: Nguyễn Văn A...">
    <div class="m-err-txt" id="name-err"></div>
    <button class="m-btn" id="name-btn">✅ Xem kết quả!</button>
  </div>
</div>

<!-- ====== RESULT MODAL ====== -->
<div class="modal-ov hide" id="result-modal">
  <div class="modal-box">
    <div class="res-title" id="res-title"></div>
    <div class="res-score" id="res-score"></div>
    <div class="res-detail" id="res-detail"></div>
    <img class="res-meme" id="res-meme" src="" alt="reaction" onerror="this.style.display='none'">
    <div class="res-grade" id="res-grade"></div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 Làm lại bài!</button>
  </div>
</div>

<!-- ====== MAIN CONTENT ====== -->
<div id="main" class="hide">

  <header>
    <h1>📝 ĐỀ 02 – KIỂM TRA CUỐI KỲ HK2 – GLOBAL SUCCESS 7 – MÔN TIẾNG ANH</h1>
    <p>👩‍🏫 Giáo viên tạo: Ms Mai An – ULIS &nbsp;|&nbsp; Tổng: 20 câu</p>
  </header>

  <div id="prog-bar-wrap">
    <div id="prog-bg"><div id="prog-fill"></div></div>
    <div id="prog-txt">0 / 20</div>
  </div>

  <div id="quiz-container"></div>

  <button id="submit-btn">🎯 NỘP BÀI &amp; XEM KẾT QUẢ</button>

</div>

<script>
/* ========== PASSWORD ========== */
const PC = [99,111,109,97,105,97,110,117,108,105,115];
const CORRECT_PWD = PC.map(c => String.fromCharCode(c)).join('');

document.getElementById('pwd-btn').addEventListener('click', checkPwd);
document.getElementById('pwd-inp').addEventListener('keydown', e => { if(e.key==='Enter') checkPwd(); });

function checkPwd() {
  const inp = document.getElementById('pwd-inp');
  const err = document.getElementById('pwd-err');
  if(inp.value.trim() === CORRECT_PWD) {
    document.getElementById('pwd-modal').classList.add('hide');
    document.getElementById('main').classList.remove('hide');
  } else {
    err.textContent = '❌ Mật khẩu không đúng! Hãy thử lại nhé~';
    inp.classList.remove('i-shake');
    void inp.offsetWidth;
    inp.classList.add('i-shake');
    inp.value = '';
    setTimeout(() => { inp.classList.remove('i-shake'); err.textContent = ''; }, 2000);
  }
}

/* ========== FLOATING PATTERN ========== */
(function() {
  const ems = ['🌸','⭐','🌟','🍎','🍋','🌈','🦋','🌺','🍀','💫','🌙','🎈','🌻','🍉','🦄','🐱','🌷','🎀','🍓','🌝'];
  const layer = document.getElementById('pattern-layer');
  for(let i = 0; i < 22; i++) {
    const el = document.createElement('span');
    el.className = 'float-em';
    el.textContent = ems[Math.floor(Math.random() * ems.length)];
    el.style.left = (Math.random() * 98) + '%';
    el.style.fontSize = (1.1 + Math.random() * 1.8) + 'rem';
    el.style.animationDuration = (10 + Math.random() * 14) + 's';
    el.style.animationDelay = -(Math.random() * 20) + 's';
    layer.appendChild(el);
  }
})();

/* ========== AUDIO ========== */
let actx;
function getAC() { if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); return actx; }

function playDing() {
  try {
    const ac = getAC();
    [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'sine'; osc.frequency.value = f;
      const t = ac.currentTime + i * 0.1;
      g.gain.setValueAtTime(0.28, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.4);
    });
  } catch(e) {}
}

function playBuzz() {
  try {
    const ac = getAC();
    [[160,0],[140,0.06],[170,0.12]].forEach(([freq, delay]) => {
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'sawtooth'; osc.frequency.value = freq;
      const t = ac.currentTime + delay;
      g.gain.setValueAtTime(0.22, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.45);
    });
  } catch(e) {}
}

/* ========== CONFETTI ========== */
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [], animRunning = false;

function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
resizeCanvas(); addEventListener('resize', resizeCanvas);

function launchConfetti(x, y) {
  const cols = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6fcf','#a855f7','#00D26A','#fbbf24'];
  const cx = x || innerWidth / 2;
  const cy = y || innerHeight / 3;
  for(let i = 0; i < 90; i++) {
    const angle = (Math.random() * Math.PI * 2);
    const speed = 3 + Math.random() * 7;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed * (Math.random() * 0.6 + 0.7),
      vy: Math.sin(angle) * speed - Math.random() * 4,
      color: cols[Math.floor(Math.random() * cols.length)],
      w: 6 + Math.random() * 8, h: 4 + Math.random() * 5,
      rot: Math.random() * 360, rotS: (Math.random() - 0.5) * 12,
      life: 1, gravity: 0.2 + Math.random() * 0.1
    });
  }
  if(!animRunning) rafConfetti();
}

function rafConfetti() {
  animRunning = true;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0.02);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
    p.vx *= 0.98; p.rot += p.rotS; p.life -= 0.016;
    ctx.save();
    ctx.globalAlpha = Math.min(p.life * 2, 1);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
  });
  if(particles.length > 0) requestAnimationFrame(rafConfetti);
  else { animRunning = false; ctx.clearRect(0,0,canvas.width,canvas.height); }
}

function shuffle(arr) {
  const a = [...arr];
  for(let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ========== STATE ========== */
let answered = [], correctArr = [], shuffledOpts = [];

function initState() {
  answered   = new Array(QS.length).fill(false);
  correctArr = new Array(QS.length).fill(false);
  shuffledOpts = [];
}

/* ========== RENDER ========== */
function renderQuiz() {
  initState();
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';

  QS.forEach((q, idx) => {
    const opts = shuffle(q.opts);
    shuffledOpts.push(opts);

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'card-' + idx;

    /* Special sign HTML */
    let signHTML = '';
    if(q.special === 'quiet-zone') {
      signHTML = `
      <div class="sign-wrap">
        <div class="quiet-sign">
          <div class="qs-line1">QUIET ZONE</div>
          <span class="qs-icon">🤫</span>
          <div class="qs-line2">DO NOT<br>DISTURB</div>
        </div>
      </div>`;
    } else if(q.special === 'no-dogs') {
      signHTML = `
      <div class="sign-wrap">
        <div class="nodogs-sign">
          <div class="nd-circle">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="50" r="46" fill="#fff8f8" stroke="#e53e3e" stroke-width="6"/>
              <text x="50" y="64" font-size="40" text-anchor="middle">🐕</text>
              <line x1="20" y1="20" x2="80" y2="80" stroke="#e53e3e" stroke-width="7" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="nd-label">NO DOGS<br>ALLOWED</div>
        </div>
      </div>`;
    }

    /* One-column if any option is long */
    const oneCol = opts.some(o => stripTags(o.t).length > 30);

    const optsHTML = opts.map((o, oi) =>
      `<button class="opt-btn" data-qi="${idx}" data-oi="${oi}" onclick="handleAnswer(${idx},${oi})">${o.t}</button>`
    ).join('');

    card.innerHTML = `
      <div class="q-header-row">
        <span class="q-num-badge">Câu ${q.num} &nbsp; ${q.section}</span>
        <span class="q-status-icon" id="stat-${idx}"></span>
      </div>
      <div class="q-text">${q.q}</div>
      ${signHTML}
      <div class="opts-grid${oneCol ? ' one-col' : ''}" id="opts-${idx}">
        ${optsHTML}
      </div>
      <div class="exp-box" id="exp-${idx}">${q.exp}</div>
    `;

    container.appendChild(card);
  });

  updateProgress();
}

/* ========== HANDLE ANSWER ========== */
function handleAnswer(qi, oi) {
  if(answered[qi]) return;
  answered[qi] = true;

  const opt = shuffledOpts[qi][oi];
  const btns = document.getElementById('opts-' + qi).querySelectorAll('.opt-btn');
  const statEl = document.getElementById('stat-' + qi);
  const expEl  = document.getElementById('exp-' + qi);

  btns.forEach(b => b.disabled = true);

  /* Highlight correct answers */
  btns.forEach((b, i) => {
    if(shuffledOpts[qi][i].ok) b.classList.add('correct');
  });

  if(opt.ok) {
    correctArr[qi] = true;
    statEl.textContent = '✅';
    playDing();
    /* confetti near card */
    const card = document.getElementById('card-' + qi);
    const r = card.getBoundingClientRect();
    launchConfetti(r.left + r.width / 2, r.top + 40);
  } else {
    btns[oi].classList.add('wrong');
    btns[oi].classList.add('shake');
    setTimeout(() => btns[oi].classList.remove('shake'), 600);
    statEl.textContent = '❌';
    playBuzz();
  }

  expEl.classList.add('open');
  updateProgress();
}

/* ========== PROGRESS ========== */
function updateProgress() {
  const count = answered.filter(Boolean).length;
  const pct   = Math.round(count / QS.length * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-txt').textContent  = count + ' / ' + QS.length;
}

/* ========== SUBMIT ========== */
document.getElementById('submit-btn').addEventListener('click', () => {
  document.getElementById('name-modal').classList.remove('hide');
  setTimeout(() => document.getElementById('name-inp').focus(), 200);
});

document.getElementById('name-btn').addEventListener('click', doSubmit);
document.getElementById('name-inp').addEventListener('keydown', e => { if(e.key==='Enter') doSubmit(); });

function doSubmit() {
  const inp  = document.getElementById('name-inp');
  const err  = document.getElementById('name-err');
  const name = inp.value.trim();

  if(!name) {
    err.textContent = '⚠️ Vui lòng nhập tên trước khi xem điểm nhé!';
    inp.classList.add('m-error');
    inp.classList.remove('i-shake');
    void inp.offsetWidth;
    inp.classList.add('i-shake');
    setTimeout(() => inp.classList.remove('i-shake'), 500);
    return;
  }

  err.textContent = '';
  inp.classList.remove('m-error');
  document.getElementById('name-modal').classList.add('hide');
  showResult(name);
}

/* ========== RESULT ========== */
function showResult(name) {
  const total   = QS.length;
  const correct = correctArr.filter(Boolean).length;
  const pct     = Math.round(correct / total * 100);
  const grade   = (correct / total * 10).toFixed(1);

  let title, meme;
  if(pct === 100) {
    title = `🌟 THIÊN TÀI TUYỆT ĐỐI! ${name} hoàn hảo không tì vết! 🎉🎊`;
    meme  = 'https://media.tenor.com/images/0aabd9c4f97df72e793f80b64ac63e49/tenor.gif';
  } else if(pct >= 80) {
    title = `🔥 XUẤT SẮC! ${name} làm rất tốt, tiếp tục phát huy nhé! 👏`;
    meme  = 'https://media.tenor.com/images/d491c8b85dcc5eb53fdfd6f6ea35f66c/tenor.gif';
  } else if(pct >= 60) {
    title = `😊 KHÁ TỐT! ${name} cần cố gắng thêm một chút nữa nhé! 💪`;
    meme  = 'https://media.tenor.com/images/c60f4a2b47c87e7de4b3756e0f5f6720/tenor.gif';
  } else {
    title = `😭 Ôi không! ${name} ơi, hãy ôn bài lại và thử lại nhé! Cố lên! 📚`;
    meme  = 'https://media.tenor.com/images/fb3c52a7bde35a6d7c0c793f87ab90bc/tenor.gif';
  }

  document.getElementById('res-title').textContent  = title;
  document.getElementById('res-score').textContent  = pct + '%';
  document.getElementById('res-detail').textContent = `Đúng ${correct} / ${total} câu`;
  document.getElementById('res-meme').src           = meme;
  document.getElementById('res-grade').innerHTML    = `Điểm số: <strong>${grade} / 10</strong>`;

  document.getElementById('result-modal').classList.remove('hide');

  if(pct >= 60) launchConfetti(innerWidth/2, innerHeight/3);
}

/* ========== RESTART ========== */
function restartQuiz() {
  document.getElementById('result-modal').classList.add('hide');
  document.getElementById('name-inp').value = '';
  renderQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ========== INIT ========== */
renderQuiz();
</script>
