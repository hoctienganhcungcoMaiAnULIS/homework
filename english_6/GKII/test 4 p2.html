<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamification English Test - By Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C5CE7;      /* Tím sáng pastel */
            --secondary: #00CEC9;    /* Xanh ngọc pastel */
            --tertiary: #FF7675;     /* Hồng cam pastel */
            --correct: #00B894;      /* Xanh lá đúng */
            --wrong: #D63031;        /* Đỏ sai */
            --text-dark: #2D3436;
            --glass-bg-light: rgba(255, 255, 255, 0.4);
            --glass-bg-med: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }

        /* DYNAMIC BACKGROUND & ANIMATION */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            height: 100vh;
            overflow: hidden;
            color: var(--text-dark);
            /* Phối màu gradient pastel loang mượt mà */
            background: linear-gradient(135deg, #A8CABA, #FAD0C4, #FFD1FF, #84FAB0, #8FD3F4);
            background-size: 300% 300%;
            animation: gradientMove 20s ease infinite;
            position: relative;
        }

        /* AUTO-GENERATED SVG EMOJI BACKGROUND (Floating Pattern) */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.8;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400"><text x="30" y="60" font-size="40" opacity="0.4">🗼</text><text x="180" y="100" font-size="45" opacity="0.3">📺</text><text x="320" y="50" font-size="30" opacity="0.5">🏖️</text><text x="100" y="220" font-size="50" opacity="0.4">🌉</text><text x="280" y="260" font-size="35" opacity="0.3">🌍</text><text x="50" y="350" font-size="30" opacity="0.5">🎥</text></svg>');
            background-repeat: repeat;
            animation: floatBackground 40s linear infinite;
        }

        @keyframes floatBackground {
            from { background-position: 0 0; }
            to { background-position: 400px 400px; }
        }

        /* HEADER / CONTROL BAR - GLASSMORPHISM */
        .top-bar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .teacher-info {
            font-size: 1rem;
            font-weight: 800;
            color: #4A235A;
            background: var(--glass-bg-med);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .timer-display {
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.3);
            background: rgba(0, 0, 0, 0.25);
            padding: 5px 20px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        .btn-control {
            cursor: pointer;
            padding: 10px 20px;
            font-size: 1.05rem;
            font-weight: 800;
            color: #fff;
            background: var(--tertiary);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 15px;
            box-shadow: 0 5px 0 #D63031;
            transition: all 0.1s;
        }

        .btn-control:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 transparent;
        }

        .btn-submit {
            background: var(--primary);
            box-shadow: 0 5px 0 #4A235A;
        }
        .btn-submit:active { box-shadow: 0 0 0 transparent; }

        /* SPLIT SCREEN LAYOUT */
        .main-container {
            display: flex;
            height: calc(100vh - 65px);
            position: relative;
            z-index: 10;
            padding: 20px;
            gap: 25px;
        }

        .pane {
            flex: 1;
            background: var(--glass-bg-light);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* SCROLLBAR STYLING */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.3); }

        /* READING PASSAGE (LEFT PANE) */
        .passage-block {
            background: var(--glass-bg-med);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .passage-title {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 15px;
            text-align: center;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
        }

        .passage-text {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 15px;
            text-align: justify;
            color: #2D3436;
        }

        .btn-translate {
            background: rgba(255, 255, 255, 0.6);
            color: #E15F41;
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(225, 95, 65, 0.3);
            margin-bottom: 15px;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }
        .btn-translate:hover { background: rgba(255, 255, 255, 0.8); }
        .btn-translate:active { transform: translateY(4px); box-shadow: none; }

        .translation-box {
            display: none;
            background: rgba(255, 234, 167, 0.5);
            backdrop-filter: blur(5px);
            padding: 15px 20px;
            border-left: 5px solid #E15F41;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            line-height: 1.7;
            color: #5D4037;
        }

        /* GLOSSARY TABLE - GLASSMORPHISM */
        .glossary-wrapper { margin-top: 20px; }
        .glossary-title {
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 12px;
            font-weight: 900;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--glass-bg-light);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--glass-border);
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        th { 
            background: rgba(108, 92, 231, 0.7); 
            color: white; 
            font-weight: 800; 
            backdrop-filter: blur(5px);
        }
        tr:last-child td { border-bottom: none; }
        td:nth-child(1) { font-weight: 800; color: #D63031; }
        td:nth-child(2) { color: #0984E3; font-style: italic; font-weight: 700; }

        /* EXERCISES (RIGHT PANE) */
        .question-card {
            background: var(--glass-bg-med);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: #2D3436;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 1.15rem;
            font-weight: 700;
            color: #2D3436;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 5px 0 rgba(0,0,0,0.1);
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(.disabled) {
            transform: scale(1.02) translateY(-2px);
            background: rgba(253, 203, 110, 0.8);
            border-color: #FDCB6E;
            box-shadow: 0 7px 0 rgba(225, 112, 85, 0.5);
        }

        .option-btn:active:not(.disabled) {
            transform: translateY(5px);
            box-shadow: 0 0 0 transparent;
        }

        .option-btn.correct {
            background: var(--correct);
            border-color: var(--correct);
            color: white;
            box-shadow: 0 5px 0 #009473;
        }

        .option-btn.wrong {
            background: var(--wrong);
            border-color: var(--wrong);
            color: white;
            box-shadow: 0 5px 0 #B32525;
            animation: shake 0.4s;
        }

        .option-btn.disabled { cursor: not-allowed; opacity: 0.8; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        /* EXPLANATION BOX - GLASSMORPHISM */
        .explanation-box {
            display: none;
            margin-top: 20px;
            background: rgba(129, 236, 236, 0.3);
            backdrop-filter: blur(10px);
            border: 2px dashed #00CEC9;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.1rem;
            line-height: 1.7;
            animation: slideDown 0.3s ease-out;
            color: #2D3436;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exp-title { font-weight: 900; color: #0097E6; margin-bottom: 8px; font-size: 1.2rem; }
        .exp-content b { color: #E84118; }

        /* MODAL (RESULT) - GLASSMORPHISM */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .result-modal {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            padding: 50px; border-radius: 30px;
            text-align: center; max-width: 500px;
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .result-score { font-size: 4.5rem; font-weight: 900; color: var(--primary); margin: 20px 0; text-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
        .result-msg { font-size: 1.6rem; font-weight: 800; color: #2D3436; margin-bottom: 25px; }
        .btn-close {
            background: var(--secondary); color: white; border: none; padding: 12px 35px;
            font-size: 1.2rem; font-weight: 800; border-radius: 15px; cursor: pointer;
            box-shadow: 0 5px 0 #00A8A8; transition: all 0.2s;
        }
        .btn-close:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }

        /* CONFETTI CONTAINER */
        #confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
        .confetti { position: absolute; width: 12px; height: 12px; border-radius: 50%; animation: fall 2s linear forwards; }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="teacher-info">👩‍🏫 Giáo viên: Ms Mai An ULIS</div>
        <div class="timer-container">
            <button class="btn-control" id="btn-timer" onclick="toggleTimer()">BẮT ĐẦU TÍNH GIỜ LÀM BÀI</button>
            <div class="timer-display" id="timer-display">10:00</div>
        </div>
        <button class="btn-control btn-submit" onclick="submitQuiz()">NỘP BÀI 🏆</button>
    </div>

    <div class="main-container">
        <div class="pane" id="left-pane"></div>
        
        <div class="pane" id="right-pane"></div>
    </div>

    <div class="overlay" id="result-overlay">
        <div class="result-modal">
            <h2 style="font-size: 2.2rem; color: #E15F41;">KẾT QUẢ CỦA BẠN</h2>
            <div class="result-score" id="score-text">0/20</div>
            <div class="result-msg" id="score-msg">Tuyệt vời!</div>
            <button class="btn-close" onclick="closeModal()">Xem lại bài giải chi tiết</button>
        </div>
    </div>

    <div id="confetti-container"></div>

    <script>
        /* ================= NEW DATA (Từ 4 ảnh mới cung cấp) ================= */
        const quizData = [
            {
                title: "PART 1: SPECIAL PROGRAMME",
                text: "We are excited to inform you that after a long time waiting, WHO LIES (13) ......... officially broadcasted (14) ......... 8PM next Sunday. There will be a contest for all the audience to detect whether their partners are lying (15) ......... not. The prize is very (16) .......... Let's look forward to watching.",
                translation: "Chúng tôi rất hào hứng thông báo cho bạn rằng sau một thời gian dài chờ đợi, chương trình WHO LIES (AI NÓI DỐI) (13) <b>được</b> chính thức phát sóng (14) <b>vào lúc</b> 8 giờ tối Chủ nhật tới. Sẽ có một cuộc thi dành cho tất cả khán giả để phát hiện xem liệu đối tác của họ có đang nói dối (15) <b>hay</b> không. Phần thưởng rất (16) <b>đáng giá</b>. Hãy cùng mong đợi để đón xem nhé.",
                glossary: [
                    { word: "Inform", pos: "Verb", meaning: "Thông báo" },
                    { word: "Broadcast", pos: "Verb", meaning: "Phát sóng, truyền hình" },
                    { word: "Officially", pos: "Adverb", meaning: "Một cách chính thức" },
                    { word: "Audience", pos: "Noun", meaning: "Khán giả, người xem" },
                    { word: "Detect", pos: "Verb", meaning: "Phát hiện, dò tìm" },
                    { word: "Whether... or not", pos: "Conjunction", meaning: "Liệu có... hay không" },
                    { word: "Partner", pos: "Noun", meaning: "Đối tác, người đồng hành/bạn đời" },
                    { word: "Lie", pos: "Verb", meaning: "Nói dối" },
                    { word: "Prize", pos: "Noun", meaning: "Giải thưởng" },
                    { word: "Look forward to", pos: "Phrasal verb", meaning: "Mong ngóng, mong đợi" }
                ],
                questions: [
                    {
                        q: "Question 13: ...WHO LIES (13) ......... officially broadcasted...",
                        options: ["be", "are", "am", "is"],
                        correctIndex: 3,
                        explanation: "<b>Dịch:</b> Chương trình WHO LIES được chính thức phát sóng...<br><b>Giải thích:</b> 'WHO LIES' ở đây là TÊN của một chương trình truyền hình (được viết hoa), do đó nó là danh từ số ít. Cấu trúc câu bị động ở hiện tại (hoặc mang ý nghĩa lịch trình tương lai): Tobe + Phân từ 2 (broadcasted). Động từ tobe số ít phù hợp nhất là <b>is</b>."
                    },
                    {
                        q: "Question 14: ...broadcasted (14) ......... 8PM next Sunday.",
                        options: ["on", "in", "at", "from"],
                        correctIndex: 2,
                        explanation: "<b>Dịch:</b> ...vào lúc 8 giờ tối Chủ nhật tới.<br><b>Giải thích:</b> Quy tắc giới từ chỉ thời gian: Đi với giờ cụ thể (8PM) ta luôn dùng giới từ <b>'at'</b> (VD: at 8PM, at 7 o'clock). Dùng 'on' cho thứ/ngày, 'in' cho tháng/năm."
                    },
                    {
                        q: "Question 15: ...detect whether their partners are lying (15) ......... not.",
                        options: ["or", "but", "and", "on"],
                        correctIndex: 0,
                        explanation: "<b>Dịch:</b> ...phát hiện xem liệu đối tác của họ có đang nói dối hay không.<br><b>Giải thích:</b> Cấu trúc cố định đi liền với nhau: <b>'whether... or not'</b> (liệu có... hay không). Đây là một cụm liên từ bạn bắt buộc phải học thuộc nhé."
                    },
                    {
                        q: "Question 16: The prize is very (16) ..........",
                        options: ["entertaining", "rewarding", "exciting", "education"],
                        correctIndex: 1,
                        explanation: "<b>Dịch:</b> Phần thưởng rất đáng giá.<br><b>Giải thích:</b> Cần một tính từ đứng sau tobe 'is' để miêu tả 'The prize' (giải thưởng).<br>- entertaining: mang tính giải trí<br>- <b>rewarding</b>: đáng giá, bổ ích, đem lại cảm giác thỏa mãn (phù hợp nhất miêu tả giải thưởng).<br>- exciting: thú vị, hào hứng<br>- education (Danh từ): giáo dục -> Sai loại từ."
                    }
                ]
            },
            {
                title: "PART 2: TV CHANNELS FOR CHILDREN",
                text: "There are many TV channels for children. They offer interesting (19) ......... for fun and learning. When children (20) ......... watching the programmes, they can visit far-away lands, meet interesting people, learn about the (21) ......... around them, laugh (22) ......... the comedians, and enjoy the funny (23) ......... colorful cartoon characters. They can also become (24) ......... at the studio of a programme.",
                translation: "Có rất nhiều kênh truyền hình dành cho trẻ em. Chúng cung cấp các (19) <b>chương trình</b> thú vị để vui chơi và học tập. Khi trẻ em (20) <b>đang</b> xem các chương trình này, chúng có thể ghé thăm những vùng đất xa xôi, gặp gỡ những con người thú vị, tìm hiểu về (21) <b>thế giới</b> xung quanh, cười đùa (22) <b>cùng với</b> các diễn viên hài và thích thú với những nhân vật hoạt hình vui nhộn (23) <b>và</b> đầy màu sắc. Chúng cũng có thể trở thành (24) <b>những vị khách mời</b> tại trường quay của một chương trình.",
                glossary: [
                    { word: "Offer", pos: "Verb", meaning: "Cung cấp, mang đến" },
                    { word: "Programme", pos: "Noun", meaning: "Chương trình (truyền hình/phát thanh)" },
                    { word: "Far-away", pos: "Adjective", meaning: "Xa xôi" },
                    { word: "Comedian", pos: "Noun", meaning: "Diễn viên hài kịch" },
                    { word: "Character", pos: "Noun", meaning: "Nhân vật (trong phim/truyện)" },
                    { word: "Cartoon", pos: "Noun", meaning: "Phim hoạt hình" },
                    { word: "Studio", pos: "Noun", meaning: "Phòng thu, trường quay" },
                    { word: "Guest", pos: "Noun", meaning: "Khách mời, vị khách" },
                    { word: "Enjoy", pos: "Verb", meaning: "Thích thú, tận hưởng" },
                    { word: "Colorful", pos: "Adjective", meaning: "Đầy màu sắc, sặc sỡ" }
                ],
                questions: [
                    {
                        q: "Question 19: They offer interesting (19) ......... for fun and learning.",
                        options: ["television", "shows", "animals", "programmes"],
                        correctIndex: 3,
                        explanation: "<b>Dịch:</b> Chúng cung cấp các chương trình thú vị để vui chơi và học tập.<br><b>Giải thích:</b> Câu trước đang nói về 'TV channels' (kênh truyền hình). Các kênh này sẽ phát sóng các 'chương trình'. Trong tiếng Anh-Anh, từ này viết là <b>'programmes'</b>. Từ 'shows' cũng được, nhưng 'programmes' bao quát và trang trọng hơn trong ngữ cảnh học tập. (Dựa vào câu sau có nhắc lại từ 'programmes')."
                    },
                    {
                        q: "Question 20: When children (20) ......... watching the programmes...",
                        options: ["aren't", "are", "isn't", "was"],
                        correctIndex: 1,
                        explanation: "<b>Dịch:</b> Khi bọn trẻ đang xem các chương trình...<br><b>Giải thích:</b> Chủ ngữ 'children' là số nhiều (những đứa trẻ). Phía sau có động từ dạng V-ing 'watching', tạo thành thì Hiện tại tiếp diễn (đang làm gì). Tobe đi với số nhiều ở hiện tại là <b>'are'</b>. Không chọn 'aren't' vì sai nghĩa (nếu không xem thì làm sao thăm được các vùng đất xa xôi)."
                    },
                    {
                        q: "Question 21: ...learn about the (21) ......... around them...",

        let totalQuestions = 0;

        /* ================= AUDIO API (Tạo âm thanh trực tiếp) ================= */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playDing() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playBuzz() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle'; /* Đổi sang triangle cho đỡ chói hơn sawtooth */
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + 0.1);
            osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        /* ================= CONFETTI ================= */
        function triggerConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#6C5CE7', '#00CEC9', '#FF7675', '#FDCB6E', '#00B894'];
            for(let i=0; i<35; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 1.5 + 1.2) + 's';
                container.appendChild(conf);
                setTimeout(() => conf.remove(), 2700);
            }
        }

        /* ================= CORE LOGIC ================= */
        function toggleTranslation(id) {
            const el = document.getElementById(`trans-${id}`);
            if (el.style.display === 'block') {
                el.style.display = 'none';
            } else {
                el.style.display = 'block';
            }
        }

        // Shuffle đáp án
        function shuffleOptions(options, correctIndex) {
            let mapped = options.map((opt, i) => ({ text: opt, isCorrect: i === correctIndex }));
            for (let i = mapped.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [mapped[i], mapped[j]] = [mapped[j], mapped[i]];
            }
            return mapped;
        }

        function buildUI() {
            const leftPane = document.getElementById('left-pane');
            const rightPane = document.getElementById('right-pane');
            let qIdGlobal = 0;

            quizData.forEach((part, partIndex) => {
                // -- BUILD LEFT PANE --
                const passageBlock = document.createElement('div');
                passageBlock.className = 'passage-block';
                
                const title = document.createElement('div');
                title.className = 'passage-title';
                title.innerHTML = part.title;
                passageBlock.appendChild(title);

                const text = document.createElement('div');
                text.className = 'passage-text';
                text.innerHTML = part.text;
                passageBlock.appendChild(text);

                const transBtn = document.createElement('button');
                transBtn.className = 'btn-translate';
                transBtn.innerHTML = 'Mở dịch đoạn này 🌟';
                transBtn.onclick = () => toggleTranslation(`part-${partIndex}`);
                passageBlock.appendChild(transBtn);

                const transBox = document.createElement('div');
                transBox.id = `trans-part-${partIndex}`;
                transBox.className = 'translation-box';
                transBox.innerHTML = part.translation;
                passageBlock.appendChild(transBox);

                // Glossary
                if (part.glossary && part.glossary.length > 0) {
                    const glossWrap = document.createElement('div');
                    glossWrap.className = 'glossary-wrapper';
                    const glossTitle = document.createElement('div');
                    glossTitle.className = 'glossary-title';
                    glossTitle.innerText = "📚 Bảng Từ Vựng VIP (B1-C2):";
                    glossWrap.appendChild(glossTitle);

                    const table = document.createElement('table');
                    const thead = document.createElement('thead');
                    thead.innerHTML = "<tr><th>Từ vựng</th><th>Loại từ</th><th>Nghĩa Tiếng Việt</th></tr>";
                    table.appendChild(thead);
                    
                    const tbody = document.createElement('tbody');
                    part.glossary.forEach(item => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `<td>${item.word}</td><td>${item.pos}</td><td>${item.meaning}</td>`;
                        tbody.appendChild(tr);
                    });
                    table.appendChild(tbody);
                    glossWrap.appendChild(table);
                    passageBlock.appendChild(glossWrap);
                }
                leftPane.appendChild(passageBlock);

                // -- BUILD RIGHT PANE (QUESTIONS) --
                part.questions.forEach((q) => {
                    qIdGlobal++;
                    totalQuestions++;
                    const currQId = qIdGlobal;

                    const qCard = document.createElement('div');
                    qCard.className = 'question-card';
                    qCard.id = `qcard-${currQId}`;

                    const qText = document.createElement('div');
                    qText.className = 'question-text';
                    qText.innerHTML = q.q;
                    qCard.appendChild(qText);

                    const optionsGrid = document.createElement('div');
                    optionsGrid.className = 'options-grid';
                    
                    const shuffled = shuffleOptions(q.options, q.correctIndex);
                    
                    shuffled.forEach((optData, optIdx) => {
                        const btn = document.createElement('button');
                        btn.className = 'option-btn';
                        btn.innerHTML = `<b>${String.fromCharCode(65 + optIdx)}.</b>&nbsp; ${optData.text}`;
                        
                        btn.onclick = function() {
                            if (answeredQuestions.has(currQId)) return;
                            answeredQuestions.add(currQId);
                            
                            Array.from(optionsGrid.children).forEach(b => b.classList.add('disabled'));

                            const expBox = document.getElementById(`exp-${currQId}`);

                            if (optData.isCorrect) {
                                btn.classList.add('correct');
                                playDing();
                                triggerConfetti();
                                score++;
                                expBox.style.display = 'block';
                            } else {
                                btn.classList.add('wrong');
                                playBuzz();
                                Array.from(optionsGrid.children).forEach((b, idx) => {
                                    if (shuffled[idx].isCorrect) {
                                        b.classList.add('correct');
                                    }
                                });
                                expBox.style.display = 'block';
                            }
                        };
                        optionsGrid.appendChild(btn);
                    });

                    qCard.appendChild(optionsGrid);

                    const expBox = document.createElement('div');
                    expBox.id = `exp-${currQId}`;
                    expBox.className = 'explanation-box';
                    expBox.innerHTML = `<div class="exp-title">💡 Giải thích từ cô Mai An:</div><div class="exp-content">${q.explanation}</div>`;
                    qCard.appendChild(expBox);

                    rightPane.appendChild(qCard);
                });
            });
        }

        /* ================= TIMER ================= */
        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer-display').innerText = 
                `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('btn-timer');
            if (!isTimerRunning) {
                if(timeLeft <= 0) return;
                isTimerRunning = true;
                btn.innerText = "TẠM DỪNG";
                btn.style.background = "#FDCB6E";
                btn.style.boxShadow = "0 5px 0 #E1A938";
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        isTimerRunning = false;
                        btn.innerText = "HẾT GIỜ";
                        btn.style.background = "var(--wrong)";
                        btn.style.boxShadow = "none";
                        alert("⏰ Đã hết giờ làm bài! Bạn vẫn có thể tiếp tục làm, nhưng hãy cố gắng đẩy nhanh tốc độ hơn vào lần sau nhé.");
                    }
                }, 1000);
            } else {
                isTimerRunning = false;
                clearInterval(timerInterval);
                btn.innerText = "TIẾP TỤC";
                btn.style.background = "var(--tertiary)";
                btn.style.boxShadow = "0 5px 0 #D63031";
            }
        }

        /* ================= SUBMIT & RESULT ================= */
        function submitQuiz() {
            clearInterval(timerInterval);
            const overlay = document.getElementById('result-overlay');
            const scoreText = document.getElementById('score-text');
            const scoreMsg = document.getElementById('score-msg');
            
            scoreText.innerText = `${score} / ${totalQuestions}`;
            
            let percentage = score / totalQuestions;
            if (percentage === 1) {
                scoreMsg.innerText = "Thiên tài ngoại ngữ xuất hiện! 🌟 Hoàn hảo tuyệt đối!";
                triggerConfetti(); triggerConfetti();
                playDing(); setTimeout(playDing, 300);
            } else if (percentage >= 0.8) {
                scoreMsg.innerText = "Làm tốt lắm! Bạn cực kỳ xuất sắc đấy! 🔥";
                triggerConfetti();
                playDing();
            } else if (percentage >= 0.5) {
                scoreMsg.innerText = "Cũng khá ghê! Cố gắng luyện tập thêm chút nữa nhé! 💪";
            } else {
                scoreMsg.innerText = "Đừng buồn nhé! Xem lại giải thích chi tiết để rút kinh nghiệm nè! ❤️";
                playBuzz();
            }

            overlay.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('result-overlay').style.display = 'none';
        }

        window.onload = () => {
            buildUI();
            updateTimerDisplay();
        };
    </script>
</body>
</html>
