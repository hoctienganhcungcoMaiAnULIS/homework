<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Practice - Giáo viên tạo: Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #00C9A7;
            --correct: #00D26A;
            --wrong: #FF4757;
            --text-dark: #2d3436;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: rgba(31, 38, 135, 0.15);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Hiệu ứng 3D lơ lửng cho các thẻ Glassmorphism */
        @keyframes float3D {
            0% { 
                transform: translateY(0px) perspective(1000px) rotateX(0deg) rotateY(0deg); 
                box-shadow: 0 8px 32px 0 var(--glass-shadow); 
            }
            50% { 
                transform: translateY(-12px) perspective(1000px) rotateX(1deg) rotateY(-1deg); 
                box-shadow: 0 20px 40px 0 rgba(31, 38, 135, 0.25); 
            }
            100% { 
                transform: translateY(0px) perspective(1000px) rotateX(0deg) rotateY(0deg); 
                box-shadow: 0 8px 32px 0 var(--glass-shadow); 
            }
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            background: linear-gradient(-45deg, #e0c3fc, #8ec5fc, #8854C0, #00C9A7);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Nền SVG nổi với Emoji chủ đề */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='500' height='500' viewBox='0 0 500 500'><text x='50' y='100' font-size='50' opacity='0.3' transform='rotate(-10 50 100)'>🏫</text><text x='350' y='120' font-size='60' opacity='0.3' transform='rotate(15 350 120)'>🎧</text><text x='100' y='350' font-size='70' opacity='0.3' transform='rotate(-20 100 350)'>🏄‍♂️</text><text x='400' y='400' font-size='55' opacity='0.3' transform='rotate(10 400 400)'>🛌</text><circle cx='250' cy='250' r='5' fill='%23ffffff' opacity='0.5'/><circle cx='150' cy='450' r='6' fill='%23ffffff' opacity='0.4'/><circle cx='450' cy='200' r='4' fill='%23ffffff' opacity='0.5'/></svg>");
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 40px 20px;
            perspective: 1200px; /* Tạo chiều sâu cho các phần tử con */
        }

        .header-title {
            text-align: center;
            color: #fff;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.2);
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-title h1 {
            font-size: 2.8em;
            margin: 0 0 15px 0;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .header-title p {
            font-size: 1.2em;
            margin: 0;
            background: rgba(255, 255, 255, 0.2);
            display: inline-block;
            padding: 8px 25px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Thiết kế chuẩn Glassmorphism */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.7);
            border-left: 1px solid rgba(255, 255, 255, 0.7);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 35px;
            margin-bottom: 35px;
            animation: float3D 6s ease-in-out infinite;
            transform-style: preserve-3d;
            position: relative;
            z-index: 1;
        }

        /* Làm các thẻ lơ lửng không cùng lúc */
        .glass-card:nth-child(even) {
            animation-delay: 1.5s;
            animation-duration: 7s;
        }
        
        .glass-card:nth-child(3n) {
            animation-delay: 0.5s;
            animation-duration: 6.5s;
        }

        .audio-container {
            text-align: center;
            position: sticky;
            top: 20px;
            z-index: 100;
            padding: 20px 35px;
            animation: none; /* Audio bar đứng im không lơ lửng quá mạnh */
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        audio {
            width: 100%;
            height: 55px;
            border-radius: 30px;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .question-text {
            font-size: 1.35em;
            font-weight: 800;
            margin-bottom: 25px;
            color: #2c3e50;
            text-shadow: 0px 1px 1px rgba(255,255,255,0.8);
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.85);
            border: 2px solid transparent;
            border-radius: 18px;
            padding: 16px 22px;
            font-size: 1.1em;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            color: var(--text-dark);
            cursor: pointer;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .option-btn .label {
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #a275e3);
            color: white;
            width: 35px;
            height: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 18px;
            box-shadow: 0 3px 8px rgba(136, 84, 192, 0.4);
            transition: all 0.3s ease;
        }

        /* Hover 3D rực rỡ */
        .option-btn:hover:not(:disabled) {
            transform: scale(1.03) translateY(-3px) perspective(500px) rotateX(2deg);
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
            background: #ffffff;
            border-color: var(--secondary);
        }

        .option-btn:hover:not(:disabled) .label {
            transform: scale(1.1) rotate(10deg);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, var(--correct), #20bf6b) !important;
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(0, 210, 106, 0.5);
            transform: scale(1.02);
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, var(--wrong), #ff7675) !important;
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.5);
        }

        .option-btn.correct .label, .option-btn.wrong .label {
            background: white;
            color: var(--text-dark);
            box-shadow: none;
        }

        .option-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px) rotate(-1deg); }
            40%, 80% { transform: translateX(10px) rotate(1deg); }
        }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        .explanation {
            margin-top: 25px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 18px;
            border-left: 6px solid var(--primary);
            display: none;
            font-size: 1em;
            line-height: 1.7;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            animation: slideUpFade 0.5s ease-out forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .explanation h4 {
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1.15em;
            border-bottom: 2px dashed rgba(136, 84, 192, 0.3);
            padding-bottom: 8px;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 20px;
            font-size: 1.4em;
            font-weight: 800;
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            font-family: 'Nunito', sans-serif;
            margin-top: 40px;
            backdrop-filter: blur(10px);
        }

        .submit-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, var(--secondary), var(--primary));
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 45px;
            border-radius: 30px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            transform: scale(0.7) translateY(50px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal-content h2 {
            margin-top: 0;
            color: var(--primary);
            font-size: 2.5em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .modal-content img {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 20px;
            margin: 25px 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .close-btn {
            background: linear-gradient(135deg, #2d3436, #636e72);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 15px;
            font-size: 1.2em;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .close-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">
        <h1>Listening Practice</h1>
        <p>Giáo viên tạo: Ms Mai An ULIS</p>
    </div>

    <div class="glass-card audio-container">
        <audio controls class="custom-audio" id="mainAudio">
            <source src="https://englishpracticetest.net/wp-content/uploads/2021/11/ket-practice-listening-test-01-part-4.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ thẻ audio.
        </audio>
    </div>

    <div id="quiz-container"></div>

    <button class="submit-btn" onclick="submitQuiz()">Nộp bài chấm điểm</button>
</div>

<div class="modal-overlay" id="resultModal">
    <div class="modal-content">
        <h2>Kết Quả</h2>
        <h3 id="scoreText">Bạn đúng 0/5 câu!</h3>
        <img id="resultGif" src="" alt="Meme Cảm Xúc">
        <br>
        <button class="close-btn" onclick="closeModal()">Đóng</button>
    </div>
</div>

<script>
    // Audio Context cho âm thanh hiệu ứng
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playDing() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    function playWrongSound() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.4);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    }

    // Dữ liệu câu hỏi với Giải thích siêu chi tiết
    const quizData = [
        {
            id: 16,
            q: "16. You will hear two friends talking about shopping. What did the boy buy yesterday?",
            options: [
                { text: "something to wear", correct: true },
                { text: "something to eat", correct: false },
                { text: "something to read", correct: false }
            ],
            exp: `
                <h4>Bước 1: Dịch câu hỏi và đáp án</h4>
                - What did the boy buy yesterday? (Cậu bé đã mua gì hôm qua?)<br>
                A. something to wear (một món đồ để mặc)<br>
                B. something to eat (một món đồ ăn)<br>
                C. something to read (một món đồ để đọc)<br><br>
                <h4>Bước 2: Audio Script & Dịch nghĩa</h4>
                Female: I’m glad I got the school book I wanted yesterday. (Tớ rất vui vì đã mua được cuốn sách giáo khoa tớ muốn hôm qua.)<br>
                Boy: Yes, my mum had already bought that and a new magazine for me. Everyone thinks the <span style="color: red; font-weight: bold;">gloves I got yesterday</span> are cool, too. (Ừ, mẹ tớ cũng đã mua cuốn đó và một tạp chí mới cho tớ rồi. Mọi người đều nghĩ <span style="color: red; font-weight: bold;">đôi găng tay tớ mua hôm qua</span> cũng rất ngầu.)<br>
                Girl: The T-shirt I liked was really colourful! (Chiếc áo phông tớ thích rất sặc sỡ!)<br>
                Boy: But nearly one hundred pounds! (Nhưng giá gần 100 bảng lận!)<br>
                Girl: I know. Let’s buy some snacks now. We can eat them during break at school. (Tớ biết. Giờ chúng ta đi mua chút đồ ăn vặt đi. Chúng ta có thể ăn trong giờ giải lao.)<br><br>
                <h4>Bước 3: Tại sao đúng?</h4>
                - Cậu bé nói rằng: "the gloves I got yesterday" (đôi găng tay tớ mua hôm qua). Găng tay (gloves) là trang phục -> Đáp án <b>something to wear</b>.<br><br>
                <h4>Bước 4: Bẫy (Distractors)</h4>
                - <b>something to read:</b> Có nhắc đến "magazine" (tạp chí) nhưng là do MẸ cậu bé mua (my mum had already bought).<br>
                - <b>something to eat:</b> Có nhắc đến "snacks" (đồ ăn vặt) nhưng là thứ dự định mua BÂY GIỜ (Let's buy... now), không phải hôm qua.
            `
        },
        {
            id: 17,
            q: "17. You will hear a teacher talking to a student called Lyn. Why didn’t Lyn come to school yesterday?",
            options: [
                { text: "She was sick.", correct: false },
                { text: "She was in a competition.", correct: false },
                { text: "She arrived back late from holiday.", correct: true }
            ],
            exp: `
                <h4>Bước 1: Dịch câu hỏi và đáp án</h4>
                - Why didn’t Lyn come to school yesterday? (Tại sao Lyn không đến trường hôm qua?)<br>
                A. She was sick. (Cô ấy bị ốm.)<br>
                B. She was in a competition. (Cô ấy đã tham gia một cuộc thi.)<br>
                C. She arrived back late from holiday. (Cô ấy trở về trễ từ kỳ nghỉ.)<br><br>
                <h4>Bước 2: Audio Script & Dịch nghĩa</h4>
                Lyn: Mr Jones, could I ask you about the tennis match on Saturday? (Thầy Jones, em có thể hỏi thầy về trận đấu tennis vào thứ Bảy không ạ?)<br>
                Mr Jones: Of course, Lyn. You missed class yesterday. Do you feel better? (Tất nhiên rồi Lyn. Em đã nghỉ học hôm qua. Em thấy khỏe hơn chưa?)<br>
                Lyn: Oh, I wasn’t ill. We were camping in Switzerland for a week and <span style="color: red; font-weight: bold;">our flight was cancelled on Sunday. We flew on Monday instead.</span> (Ồ, em không ốm đâu ạ. Gia đình em đã đi cắm trại ở Thụy Sĩ 1 tuần và <span style="color: red; font-weight: bold;">chuyến bay bị hủy vào Chủ nhật. Thay vào đó chúng em đã bay vào thứ Hai.</span>)<br><br>
                <h4>Bước 3: Tại sao đúng?</h4>
                - Chuyến bay về vào Chủ nhật bị hủy và phải bay bù vào thứ Hai, tức là cô ấy đã đi nghỉ mát (cắm trại ở Thụy Sĩ) và về muộn do sự cố chuyến bay. -> Đáp án <b>She arrived back late from holiday</b>.<br><br>
                <h4>Bước 4: Bẫy (Distractors)</h4>
                - <b>She was sick:</b> Thầy giáo hỏi "Do you feel better?" (tưởng Lyn ốm), nhưng Lyn khẳng định "I wasn't ill" (Em không bị ốm).<br>
                - <b>She was in a competition:</b> Cuộc thi tennis (tennis match) là sự kiện vào "thứ Bảy tới", không phải lý do nghỉ học hôm qua.
            `
        },
        {
            id: 18,
            q: "18. You will hear a boy talking about surfing. How did he learn to surf?",
            options: [
                { text: "by doing a course", correct: false },
                { text: "by watching videos", correct: true },
                { text: "by practising by himself", correct: false }
            ],
            exp: `
                <h4>Bước 1: Dịch câu hỏi và đáp án</h4>
                - How did he learn to surf? (Cậu ấy đã học lướt sóng bằng cách nào?)<br>
                A. by doing a course (bằng cách tham gia khóa học)<br>
                B. by watching videos (bằng cách xem video)<br>
                C. by practising by himself (bằng cách tự luyện tập)<br><br>
                <h4>Bước 2: Audio Script & Dịch nghĩa</h4>
                Boy: When I started surfing, I went to the beach with friends and tried and tried, but I didn’t seem to improve. Then, I saw that someone was organising lessons, but they were on Fridays when I play football. In the end, <span style="color: red; font-weight: bold;">I found a website with a famous surfer showing people the best way to learn</span>. (Khi bắt đầu lướt sóng, tớ đã ra biển cùng bạn bè và cố gắng thử đi thử lại, nhưng không tiến bộ. Sau đó, tớ thấy có người tổ chức các lớp học, nhưng lại vào thứ Sáu khi tớ bận đá bóng. Cuối cùng, <span style="color: red; font-weight: bold;">tớ tìm thấy một trang web có một vận động viên lướt sóng nổi tiếng hướng dẫn mọi người cách học tốt nhất</span>.)<br><br>
                <h4>Bước 3: Tại sao đúng?</h4>
                - Cậu bé chia sẻ rằng mình đã học được nhờ một trang web (website) có người "hướng dẫn mọi người" (showing people) -> Xem video hướng dẫn trực tuyến. -> Đáp án <b>by watching videos</b>.<br><br>
                <h4>Bước 4: Bẫy (Distractors)</h4>
                - <b>by practising by himself:</b> Cậu bé ban đầu có tự tập (tried and tried) nhưng "didn't seem to improve" (không hề tiến bộ).<br>
                - <b>by doing a course:</b> Cậu bé định đăng ký khóa học (organising lessons) nhưng lịch học trùng với lịch đá bóng nên đã không tham gia.
            `
        },
        {
            id: 19,
            q: "19. You will hear a girl talking about her day at school. Which subject did she like best?",
            options: [
                { text: "geography", correct: false },
                { text: "English", correct: false },
                { text: "biology", correct: true }
            ],
            exp: `
                <h4>Bước 1: Dịch câu hỏi và đáp án</h4>

    let score = 0;
    let answeredQuestions = 0;

    // Thuật toán xáo trộn mảng
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';

        quizData.forEach((item, qIndex) => {
            let shuffledOptions = [...item.options];
            shuffleArray(shuffledOptions);

            const card = document.createElement('div');
            card.className = 'glass-card';

            const questionTitle = document.createElement('div');
            questionTitle.className = 'question-text';
            questionTitle.textContent = item.q;
            card.appendChild(questionTitle);

            const optionsGrid = document.createElement('div');
            optionsGrid.className = 'options-grid';

            const labels = ['A', 'B', 'C'];
            
            shuffledOptions.forEach((opt, optIndex) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="label">${labels[optIndex]}</span> ${opt.text}`;
                
                btn.onclick = function() {
                    handleAnswer(btn, opt.correct, card, item.exp);
                };
                optionsGrid.appendChild(btn);
            });

            card.appendChild(optionsGrid);

            const explanationDiv = document.createElement('div');
            explanationDiv.className = 'explanation';
            explanationDiv.innerHTML = item.exp;
            card.appendChild(explanationDiv);

            container.appendChild(card);
        });
    }

    function handleAnswer(clickedBtn, isCorrect, card, explanationHTML) {
        const allBtns = card.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);

        const expDiv = card.querySelector('.explanation');
        expDiv.style.display = 'block';

        if (isCorrect) {
            clickedBtn.classList.add('correct');
            score++;
            playDing();
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#00D26A', '#8854C0', '#ffffff', '#00C9A7']
            });
        } else {
            clickedBtn.classList.add('wrong');
            clickedBtn.classList.add('shake');
            playWrongSound();
            
            allBtns.forEach(b => {
                const originalText = b.innerHTML;
                const optText = originalText.substring(originalText.indexOf('</span>') + 7).trim();
                quizData.forEach(q => {
                    q.options.forEach(o => {
                        if(o.text === optText && o.correct) {
                            b.classList.add('correct');
                        }
                    });
                });
            });
        }
        answeredQuestions++;
    }

    function submitQuiz() {
        if (answeredQuestions < quizData.length) {
            alert("Vui lòng hoàn thành tất cả các câu hỏi trước khi nộp bài nhé!");
            return;
        }

        const modal = document.getElementById('resultModal');
        const scoreText = document.getElementById('scoreText');
        const resultGif = document.getElementById('resultGif');

        const percentage = (score / quizData.length) * 100;
        scoreText.textContent = `Bạn làm đúng ${score}/${quizData.length} câu! (${percentage}%)`;

        if (percentage === 100) {
            resultGif.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif";
        } else if (percentage >= 60) {
            resultGif.src = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif";
        } else {
            resultGif.src = "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif";
        }

        modal.classList.add('active');
    }

    function closeModal() {
        document.getElementById('resultModal').classList.remove('active');
    }

    renderQuiz();
</script>
