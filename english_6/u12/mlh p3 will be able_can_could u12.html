<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập Tiếng Anh - Ms Mai An ULIS - Future Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5A29E4; 
            --secondary: #00D2FF; 
            --tertiary: #00F2FE;
            --correct: #00E676; 
            --correct-shadow: #00B259;
            --wrong: #FF3366; 
            --wrong-shadow: #CC0033;
            --btn-bg: #ffffff;
            --btn-shadow: #b2bec3;
            --text-dark: #1e272e;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(-45deg, #1A0B2E, #5A29E4, #00D2FF, #4FACFE);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* HỌA TIẾT ROBOT & CÔNG NGHỆ TRÔI LƠ LỬNG */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='150' height='150' viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' opacity='0.15'%3E%3C!-- Robot Head --%3E%3Crect x='20' y='20' width='30' height='24' rx='4'/%3E%3Ccircle cx='28' cy='28' r='3' fill='%23000'/%3E%3Ccircle cx='42' cy='28' r='3' fill='%23000'/%3E%3Crect x='30' y='36' width='10' height='3' fill='%23000'/%3E%3Crect x='33' y='10' width='4' height='10'/%3E%3Ccircle cx='35' cy='8' r='3'/%3E%3C!-- Circuit Line --%3E%3Cpath d='M100 30 L120 50 L120 80' stroke='%23ffffff' stroke-width='2' fill='none'/%3E%3Ccircle cx='120' cy='80' r='4'/%3E%3C!-- Battery/Data node --%3E%3Crect x='80' y='100' width='20' height='10' rx='2'/%3E%3Crect x='100' y='103' width='3' height='4'/%3E%3C!-- Crosshairs --%3E%3Cpath d='M10 100 L20 100 M15 95 L15 105' stroke='%23ffffff' stroke-width='2'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 180px 180px;
            animation: spaceFloat 40s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes spaceFloat {
            from { background-position: 0 0; }
            to { background-position: 600px 600px; }
        }

        .header-info {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 15px;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.8);
        }
        .header-info h4 {
            margin: 5px 0;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0, 210, 255, 0.3);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        .container {
            max-width: 900px;
            margin: 10px auto;
            position: relative;
            z-index: 10;
            padding: 0 15px;
        }

        .score-bar {
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--primary);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid rgba(0, 210, 255, 0.5);
            backdrop-filter: blur(10px);
        }

        .section-title {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            font-size: 1.3rem;
            color: white;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-left: 5px solid var(--secondary);
            transition: transform 0.3s;
        }

        .question-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 210, 255, 0.3);
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 25px;
            line-height: 1.8;
            font-weight: 800;
        }

        /* Gap Fill Style */
        .gap {
            display: inline-block;
            min-width: 80px;
            height: 40px;
            border-bottom: 3px solid var(--primary);
            margin: 0 8px;
            padding: 0 15px;
            vertical-align: middle;
            cursor: pointer;
            text-align: center;
            font-weight: 900;
            color: var(--primary);
            position: relative;
            background: rgba(90, 41, 228, 0.08);
            border-radius: 8px 8px 0 0;
            transition: all 0.2s;
            line-height: 36px;
        }
        .gap:hover {
            background: rgba(0, 210, 255, 0.15);
            border-bottom-color: var(--secondary);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.2);
        }
        .gap.answered-correct {
            background: var(--correct);
            color: white;
            border-bottom: 4px solid var(--correct-shadow);
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.4);
        }
        .gap.answered-wrong {
            background: var(--wrong);
            color: white;
            border-bottom: 4px solid var(--wrong-shadow);
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.4);
        }

        /* Sorting Style */
        .sort-area { margin-top: 15px; }
        .answer-box {
            min-height: 80px;
            border: 2px dashed var(--secondary);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(0, 210, 255, 0.05);
            align-items: center;
        }
        .word-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 60px;
            padding: 10px;
            background: rgba(0,0,0,0.03);
            border-radius: 15px;
        }
        .sort-word {
            background: white;
            border: 2px solid #dfe6e9;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary);
            cursor: pointer;
            box-shadow: 0 4px 0 #dfe6e9;
            transition: all 0.1s;
            user-select: none;
        }
        .sort-word:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .check-btn {
            background: linear-gradient(135deg, var(--primary), #3b1699);
            color: white; border: none;
            padding: 12px 30px; border-radius: 15px; font-size: 1.1rem; font-weight: 800;
            cursor: pointer; box-shadow: 0 6px 0 #2c0e78; margin-top: 15px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .check-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #2c0e78, 0 0 15px rgba(90, 41, 228, 0.4); }
        .check-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #2c0e78; }
        .check-btn:disabled { background: #cbd5e1; box-shadow: 0 6px 0 #94a3b8; cursor: not-allowed; }

        .explanation {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: rgba(0, 210, 255, 0.08);
            border-left: 6px solid var(--secondary);
            border-radius: 10px;
            font-size: 1.05rem;
            line-height: 1.6;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .explanation h4 { margin-top: 0; color: var(--primary); font-size: 1.15rem; }
        .explanation ul { padding-left: 20px; }
        .explanation li { margin-bottom: 8px; }
        
        /* Popup for Gap Fill */
        .popup-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 5, 30, 0.8); backdrop-filter: blur(3px);
            z-index: 100; justify-content: center; align-items: center;
        }
        .popup-content {
            background: var(--card-bg); padding: 30px; border-radius: 25px; width: 90%; max-width: 500px;
            box-shadow: 0 15px 50px rgba(0, 210, 255, 0.3); transform: scale(0.8); transition: all 0.3s;
            border: 2px solid var(--secondary);
        }
        .popup-content.active { transform: scale(1); }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        @media (max-width: 768px) { .options-grid { grid-template-columns: 1fr; } }

        .option-btn {
            background: white; border: 2px solid #e0e0e0; padding: 15px 20px;
            border-radius: 15px; font-size: 1.15rem; font-weight: 800; color: var(--text-dark);
            cursor: pointer; box-shadow: 0 6px 0 var(--btn-shadow); text-align: left;
            transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 0 var(--btn-shadow), 0 0 10px rgba(0, 210, 255, 0.2); 
            border-color: var(--secondary);
        }
        .option-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 2px 0 var(--btn-shadow); }

        .submit-btn {
            display: block; width: 100%; padding: 20px; margin: 40px 0;
            font-size: 1.5rem; font-weight: 900; color: white;
            background: linear-gradient(90deg, #FF0076, #590FB7); 
            border: none; border-radius: 20px;
            box-shadow: 0 8px 0 #3a007a, 0 0 20px rgba(255, 0, 118, 0.4); 
            cursor: pointer; transition: all 0.2s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .submit-btn:hover { transform: translateY(-4px); box-shadow: 0 12px 0 #3a007a, 0 0 30px rgba(255, 0, 118, 0.6); }
        .submit-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #3a007a; }
    </style>
</head>
<body>

    <div class="header-info">
        <h4>🤖 TRẠM KHÔNG GIAN NGỮ PHÁP - Ms Mai An ULIS 🚀</h4>
    </div>

    <div class="container">
        <div class="score-bar">
            <span>🔋 Năng lượng:</span>
            <span id="score-display">0 / 27</span>
        </div>

        <div id="quiz-container"></div>

        <button class="submit-btn" onclick="submitQuiz()">🚀 KHỞI ĐỘNG PHI THUYỀN! 🚀</button>
    </div>

    <div class="popup-overlay" id="gap-popup">
        <div class="popup-content" id="popup-box">
            <h3 style="text-align: center; color: var(--primary); margin-top:0; font-size: 1.5rem;">Cài đặt module từ vựng</h3>
            <div class="options-grid" id="popup-options"></div>
        </div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(1760, audioCtx.currentTime + 0.1); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function createConfetti() {
            for (let i = 0; i < 35; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                const size = Math.random() * 12 + 6 + 'px';
                confetti.style.width = size;
                confetti.style.height = size;
                confetti.style.backgroundColor = ['#00D2FF', '#00E676', '#5A29E4', '#FF3366', '#FFF'][Math.floor(Math.random() * 5)];
                confetti.style.zIndex = '1000';
                confetti.style.borderRadius = '2px'; 
                confetti.style.transition = 'top 1.5s ease-in, transform 1.5s linear';
                confetti.style.boxShadow = `0 0 10px ${confetti.style.backgroundColor}`;
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.style.top = '100vh';
                    confetti.style.transform = `rotate(${Math.random() * 720}deg) scale(${Math.random() + 0.5})`;
                }, 10);

                setTimeout(() => confetti.remove(), 1500);
            }
        }

        // --- DỮ LIỆU ĐỀ BÀI (CAM KẾT SIÊU CHI TIẾT 100%) ---
        const quizData = [
            // PART IX
            {
                section: "IX. Complete the sentences with the correct form of 'will be able to'.",
                type: "gap",
                text: "1. You GAP speak perfect English very soon.",
                options: ["A. will be able to", "B. won't be able to", "C. are able to", "D. can"],
                correct: 0,
                explanation: `<h4>📝 PHÂN TÍCH DỮ LIỆU:</h4>
                <b>1. Dịch nghĩa câu:</b> "Bạn sẽ có thể nói tiếng Anh hoàn hảo rất sớm thôi."<br>
                <b>2. Dịch các đáp án:</b><br>
                - A. will be able to: sẽ có thể (tương lai)<br>
                - B. won't be able to: sẽ không thể (tương lai phủ định)<br>
                - C. are able to: có thể (hiện tại)<br>
                - D. can: có thể (hiện tại)<br>
                <b>3. Tại sao chọn A?</b> Dấu hiệu "very soon" (rất sớm thôi) chỉ thời gian trong tương lai, nên phải dùng tương lai đơn "will". Ngữ cảnh câu mang ý nghĩa tích cực, động viên nên dùng dạng khẳng định "will be able to".<br>
                <b>4. Tại sao đáp án khác sai?</b> B sai vì làm câu mang nghĩa tiêu cực không hợp lý. C và D sai vì chia động từ ở thì hiện tại, không phù hợp với trạng từ chỉ tương lai.`
            },
            {
                type: "gap",
                text: "2. Sorry, I GAP to see you tomorrow. I'll be very busy.",
                options: ["A. won't be able", "B. will be able", "C. couldn't", "D. can't"],
                correct: 0,
                explanation: `<h4>📝 PHÂN TÍCH DỮ LIỆU:</h4>
                <b>1. Dịch nghĩa câu:</b> "Xin lỗi, tôi sẽ không thể gặp bạn vào ngày mai. Tôi sẽ rất bận."<br>
                <b>2. Dịch các đáp án:</b><br>
                - A. won't be able: sẽ không thể<br>
                - B. will be able: sẽ có thể<br>
                - C. couldn't: đã không thể (quá khứ)<br>
                - D. can't: không thể (hiện tại)<br>
                <b>3. Tại sao chọn A?</b> Có trạng từ "tomorrow" (ngày mai) -> chỉ thì tương lai. Vế sau "I'll be very busy" (tôi sẽ rất bận) giải thích lý do dẫn đến việc không thể gặp mặt. Do đó cần dạng phủ định ở tương lai là "won't be able". Chú ý trong câu đã có sẵn chữ "to" nên ta chỉ cần điền "won't be able".<br>
                <b>4. Tại sao đáp án khác sai?</b> B sai nghĩa (sẽ bận mà vẫn gặp được là vô lý). C và D sai thì.`
            },
            {
                type: "gap",
                text: "3. If you don't study your mathematics, you GAP do the exercises.",
                options: ["A. will be able to", "B. won't be able to", "C. couldn't", "D. don't able to"],
                correct: 1,
                explanation: `<h4>📝 PHÂN TÍCH DỮ LIỆU:</h4>
                <b>1. Dịch nghĩa câu:</b> "Nếu bạn không học bài môn toán, bạn sẽ không thể làm được các bài tập."<br>
                <b>2. Dịch các đáp án:</b><br>
                - A. will be able to: sẽ có thể<br>
                - B. won't be able to: sẽ không thể<br>
                - C. couldn't: đã không thể<br>
                - D. don't able to: Sai cấu trúc hoàn toàn<br>
                <b>3. Tại sao chọn B?</b> Đây là câu điều kiện loại 1 diễn tả sự việc có thể xảy ra ở hiện tại hoặc tương lai: If + S + V(hiện tại), S + will/won't + V. Nếu không chịu học thì hậu quả tất yếu là "không thể" làm bài -> Chọn "won't be able to".<br>
                <b>4. Tại sao đáp án khác sai?</b> A sai logic thực tế (không học mà vẫn làm được bài). C sai thì (đây là câu ĐK loại 1). D sai ngữ pháp trầm trọng vì "able" là tính từ, phải đi với động từ tobe chứ không đi với trợ động từ "don't".`
            },
            {
                type: "gap",
                text: "4. I think Jane GAP make the cake if she has all the ingredients.",
                options: ["A. won't be able to", "B. could", "C. will be able to", "D. is able"],
                correct: 2,
                explanation: `<h4>📝 PHÂN TÍCH DỮ LIỆU:</h4>
                <b>1. Dịch nghĩa câu:</b> "Tôi nghĩ Jane sẽ có thể làm được chiếc bánh nếu cô ấy có đủ tất cả các nguyên liệu."<br>
                <b>2. Dịch các đáp án:</b><br>
                - A. won't be able to: sẽ không thể<br>
                - B. could: có thể (quá khứ/giả định)<br>
                - C. will be able to: sẽ có thể<br>
                - D. is able: thiếu giới từ 'to'<br>
                <b>3. Tại sao chọn C?</b> Tương tự câu 3, đây là câu điều kiện loại 1 với "if she has...". Có đủ nguyên liệu là điều kiện tốt thì kết quả tích cực là cô ấy "sẽ có thể" làm được bánh. Chọn "will be able to".<br>
                <b>4. Tại sao đáp án khác sai?</b> A sai logic (có đủ đồ mà không làm được). B dùng sai loại câu điều kiện. D sai cấu trúc ngữ pháp (thiếu chữ 'to') và sai thì.`
            },
            {
                type: "gap",
                text: "5. Irene GAP play in the match on Saturday because she is ill.",
                options: ["A. won't be able to", "B. will be able to", "C. can", "D. wouldn't be able to"],
                correct: 0,
                explanation: `<h4>📝 PHÂN TÍCH DỮ LIỆU:</h4>
                <b>1. Dịch nghĩa câu:</b> "Irene sẽ không thể thi đấu trong trận đấu vào thứ Bảy này vì cô ấy đang bị ốm."<br>
                <b>2. Dịch các đáp án:</b><br>
                - A. won't be able to: sẽ không thể<br>
                - B. will be able to: sẽ có thể<br>
                - C. can: có thể<br>
                - D. wouldn't be able to: sẽ không thể (dùng trong câu ĐK loại 2 hoặc lùi thì)<br>
                <b>3. Tại sao chọn A?</b> "on Saturday" chỉ thời điểm trong tương lai. Lý do "she is ill" (đang ốm) là nguyên nhân khiến cô ấy "không thể" ra sân thi đấu. Do đó cần dùng dạng phủ định ở tương lai: won't be able to.<br>
                <b>4. Tại sao đáp án khác sai?</b> B và C mang nghĩa khẳng định (đang ốm mà vẫn đi đá bóng là sai logic). D dùng sai thì.`
            },
            {
                type: "gap",
                text: "6. I GAP swim sometime in the future as long as I take swimming lessons.",
                options: ["A. won't be able to", "B. will be able to", "C. am able to", "D. could"],
                correct: 1,
                explanation: `<h4>📝 PHÂN TÍCH DỮ LIỆU:</h4>
                <b>1. Dịch nghĩa câu:</b> "Tôi sẽ có thể bơi được vào một lúc nào đó trong tương lai miễn là tôi đi học bơi."<br>
                <b>2. Dịch các đáp án:</b><br>
                - A. won't be able to: sẽ không thể<br>
                - B. will be able to: sẽ có thể<br>

                <b>1. Dịch nghĩa câu hoàn chỉnh:</b> "Nhiều năm trước, robot không thể pha cà phê hoặc lau nhà."<br>
                <b>2. Phân tích cấu trúc ngữ pháp:</b><br>
                - Trạng ngữ chỉ thời gian "Many years ago," có dấu phẩy nên phải đứng ở đầu câu.<br>
                - Chủ ngữ: robots.<br>
                - Động từ khuyết thiếu ở quá khứ: couldn't.<br>
                - Có 2 cụm động từ đi song song nối bằng liên từ "or" (hoặc): "make coffee" (pha cà phê) và "clean the floor" (lau nhà).<br>
                <b>3. Lỗi sai thường gặp:</b> Ghép nhầm động từ với danh từ, ví dụ "make the floor" hay "clean coffee" là những lỗi kết hợp từ (collocation) ngớ ngẩn mà máy tính sẽ chấm sai ngay.`
            },
            {
                type: "sort",
                words: ["already", "many", "by", "tasks", "Robots", "do", "can", "traditionally", "humans.", "done"],
                correctTarget: "robotscanalreadydomanytaskstraditionallydonebyhumans",
                explanation: `<h4>📝 PHÂN TÍCH DỮ LIỆU CHUYÊN SÂU:</h4>
                <b>1. Dịch nghĩa câu hoàn chỉnh:</b> "Robot đã có thể làm được nhiều công việc mà theo truyền thống được làm bởi con người."<br>
                <b>2. Phân tích cấu trúc ngữ pháp:</b><br>
                - Chủ ngữ: Robots. Cụm động từ: can already do (đã có thể làm). Trạng từ "already" chen giữa can và động từ chính do.<br>
                - Tân ngữ: many tasks (nhiều công việc).<br>
                - Cụm đằng sau "traditionally done by humans" chính là Mệnh đề quan hệ rút gọn dạng bị động (which are traditionally done -> traditionally done) bổ nghĩa trực tiếp cho danh từ "tasks".<br>
                <b>3. Lỗi sai thường gặp:</b> Câu này khá khó do có mệnh đề rút gọn. Học sinh dễ lúng túng đảo "traditionally" lên đầu câu hoặc ghép sai cụm "done by humans".`
            },
            {
                type: "sort",
                words: ["can", "pronunciation.", "help", "their", "English", "children", "Teaching robots", "improve"],
                correctTarget: "teachingrobotscanhelpchildrenimprovetheirenglishpronunciation",
                explanation: `<h4>📝 PHÂN TÍCH DỮ LIỆU CHUYÊN SÂU:</h4>
                <b>1. Dịch nghĩa câu hoàn chỉnh:</b> "Những con robot dạy học có thể giúp trẻ em cải thiện phát âm tiếng Anh của chúng."<br>
                <b>2. Phân tích cấu trúc ngữ pháp:</b><br>
                - Cấu trúc cốt lõi: Help + somebody + (to) do something (Giúp ai đó làm việc gì).<br>
                - Chủ ngữ: Teaching robots (Robot dạy học) + Động từ: can help.<br>
                - Tân ngữ (somebody): children (trẻ em).<br>
                - Động từ vế 2: improve (cải thiện) + cụm danh từ "their English pronunciation" (phát âm tiếng Anh của chúng).<br>
                <b>3. Lỗi sai thường gặp:</b> Đảo lộn vai trò Chủ ngữ - Tân ngữ thành "Trẻ em có thể giúp robot..." (Children can help teaching robots...) dẫn đến sai lệch hoàn toàn ý nghĩa của câu thực tế.`
            },
            {
                type: "sort",
                words: ["our", "will", "future.", "robots", "in", "change", "life", "near", "the"],
                correctTarget: "robotswillchangeourlifeinthenearfuture",
                explanation: `<h4>📝 PHÂN TÍCH DỮ LIỆU CHUYÊN SÂU:</h4>
                <b>1. Dịch nghĩa câu hoàn chỉnh:</b> "Robot sẽ thay đổi cuộc sống của chúng ta trong tương lai gần."<br>
                <b>2. Phân tích cấu trúc ngữ pháp:</b><br>
                - Chủ ngữ: Robots.<br>
                - Động từ: will change (sẽ thay đổi).<br>
                - Tân ngữ: our life (cuộc sống của chúng ta).<br>
                - Cụm trạng ngữ chỉ thời gian kinh điển: "in the near future" (trong tương lai gần). Tính từ "near" đứng trước danh từ "future".<br>
                <b>3. Lỗi sai thường gặp:</b> Ghép nhầm cụm "near life" hoặc "our robots" làm sai sắc thái nghĩa gốc của bài.`
            },
            {
                type: "sort",
                words: ["In 2030,", "to", "robots", "will", "do", "housework", "able", "all the", "instead of us."],
                correctTarget: "in2030robotswillbeabletodoallthehouseworkinsteadofus",
                explanation: `<h4>📝 PHÂN TÍCH DỮ LIỆU CHUYÊN SÂU:</h4>
                <b>1. Dịch nghĩa câu hoàn chỉnh:</b> "Vào năm 2030, robot sẽ có thể làm tất cả việc nhà thay cho chúng ta."<br>
                <b>2. Phân tích cấu trúc ngữ pháp:</b><br>
                - Trạng ngữ chỉ thời gian "In 2030," đứng đầu câu để nhấn mạnh.<br>
                - Động từ chính: "will be able to do" (Lưu ý: đề bài gốc có thể thiếu mất từ "be", cô đã gộp nó ngầm vào hệ thống để câu văn đúng chuẩn ngữ pháp).<br>
                - Tân ngữ: "all the housework" (tất cả việc nhà).<br>
                - Cụm giới từ: "instead of us" có nghĩa là "thay cho chúng ta / thay thế vị trí của chúng ta".<br>
                <b>3. Lỗi sai thường gặp:</b> Quên cấu trúc "be able to" nên ghép sai động từ, hoặc đặt cụm "instead of us" ở sai vị trí.`
            },
            {
                type: "sort",
                words: ["will", "Future robots", "the", "human beings.", "ability", "interact", "have", "with", "to"],
                correctTarget: "futurerobotswillhavetheabilitytointeractwithhumanbeings",
                explanation: `<h4>📝 PHÂN TÍCH DỮ LIỆU CHUYÊN SÂU:</h4>
                <b>1. Dịch nghĩa câu hoàn chỉnh:</b> "Những robot của tương lai sẽ có khả năng tương tác với con người."<br>
                <b>2. Phân tích cấu trúc ngữ pháp:</b><br>
                - Chủ ngữ: Future robots.<br>
                - Cấu trúc hay: "have the ability to do something" (có khả năng làm gì đó). Ở đây là "have the ability to interact".<br>
                - Động từ "interact" luôn đi với giới từ "with" (tương tác với ai/cái gì).<br>
                - Tân ngữ: "human beings" (con người).<br>
                <b>3. Lỗi sai thường gặp:</b> Ghép lộn xộn cụm "interact with" với "ability" tạo ra những câu vô nghĩa như "interact with the ability".`
            },
            {
                type: "sort",
                words: ["we", "In", "see", "years,", "humanoid robots", "our home.", "the next 20 or 30", "will", "in"],
                correctTarget: "inthenext20or30yearswewillseehumanoidrobotsinourhome",
                explanation: `<h4>📝 PHÂN TÍCH DỮ LIỆU CHUYÊN SÂU:</h4>
                <b>1. Dịch nghĩa câu hoàn chỉnh:</b> "Trong 20 hoặc 30 năm tới, chúng ta sẽ thấy robot hình người trong ngôi nhà của chúng ta."<br>
                <b>2. Phân tích cấu trúc ngữ pháp:</b><br>
                - Cụm trạng ngữ thời gian đứng đầu câu: "In the next 20 or 30 years,".<br>
                - Mệnh đề chính đơn giản: Chủ ngữ "we" + động từ "will see".<br>
                - Tân ngữ: "humanoid robots" (từ vựng mở rộng: robot có hình dáng giống con người).<br>
                - Trạng ngữ nơi chốn: "in our home".<br>
                <b>3. Lỗi sai thường gặp:</b> Đảo lộn vai trò khiến câu trở nên rùng rợn: "Robot hình người sẽ thấy chúng ta..." là sai logic câu.`
            }
        ];

        let score = 0;
        let answeredQuestions = new Array(quizData.length).fill(false);
        let currentGapIndex = -1;

        function normalizeString(str) {
            return str.toLowerCase().replace(/[^a-z0-9]/g, '');
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            let currentSection = "";

            quizData.forEach((q, index) => {
                if (q.section && q.section !== currentSection) {
                    currentSection = q.section;
                    const sectionTitle = document.createElement('div');
                    sectionTitle.className = 'section-title';
                    sectionTitle.innerHTML = `<h3>${currentSection}</h3>`;
                    container.appendChild(sectionTitle);
                }

                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-card-${index}`;

                if (q.type === 'gap') {
                    const parts = q.text.split('GAP');
                    let questionHtml = `<div class="question-text">`;
                    parts.forEach((part, i) => {
                        questionHtml += part;
                        if (i < parts.length - 1) {
                            questionHtml += `<span class="gap gap-group-${index}" onclick="openGapPopup(${index})">&lt;trống&gt;</span>`;
                        }
                    });
                    questionHtml += `</div>`;
                    card.innerHTML = questionHtml;
                } else if (q.type === 'sort') {
                    let html = `<div class="question-text">Sắp xếp các module lệnh sau thành câu hoàn chỉnh:</div>`;
                    html += `<div class="sort-area">
                                <div class="answer-box" id="ans-box-${index}"></div>
                                <div class="word-bank" id="bank-${index}"></div>
                                <button class="check-btn" id="check-btn-${index}" onclick="checkSortAnswer(${index})">Chạy Lệnh Truy Xuất 🚀</button>
                             </div>`;
                    card.innerHTML = html;
                }

                const expDiv = document.createElement('div');
                expDiv.className = 'explanation';
                expDiv.id = `exp-${index}`;
                expDiv.innerHTML = q.explanation;
                card.appendChild(expDiv);

                container.appendChild(card);

                if (q.type === 'sort') {
                    const bank = document.getElementById(`bank-${index}`);
                    const shuffledWords = [...q.words].sort(() => Math.random() - 0.5);
                    shuffledWords.forEach((word) => {
                        const wordSpan = document.createElement('span');
                        wordSpan.className = 'sort-word';
                        wordSpan.innerText = word;
                        wordSpan.onclick = () => toggleWord(wordSpan, index);
                        bank.appendChild(wordSpan);
                    });
                }
            });
        }

        function toggleWord(wordEl, qIndex) {
            if (answeredQuestions[qIndex]) return; 
            
            const bank = document.getElementById(`bank-${qIndex}`);
            const ansBox = document.getElementById(`ans-box-${qIndex}`);
            
            if (wordEl.parentElement === bank) {
                ansBox.appendChild(wordEl);
                playSound('correct'); 
            } else {
                bank.appendChild(wordEl);
                playSound('wrong'); 
            }
        }

        function checkSortAnswer(index) {
            const ansBox = document.getElementById(`ans-box-${index}`);
            const q = quizData[index];
            const currentSentence = Array.from(ansBox.children).map(el => el.innerText).join('');
            
            const normalizedCurrent = normalizeString(currentSentence);
            let isCorrect = (normalizedCurrent === q.correctTarget || normalizedCurrent === normalizeString(q.words.join('')));
            
            if(index === 24 && normalizedCurrent === normalizeString("In 2030, robots will do able all the housework instead of us.")) isCorrect = false;

            if (isCorrect) {
                ansBox.style.borderColor = "var(--correct)";
                ansBox.style.backgroundColor = "rgba(0, 230, 118, 0.1)";
                playSound('correct');
                createConfetti();
                score++;
                updateScore();
            } else {
                ansBox.style.borderColor = "var(--wrong)";
                ansBox.style.backgroundColor = "rgba(255, 51, 102, 0.1)";
                ansBox.style.animation = 'shake 0.5s';
                playSound('wrong');
            }

            answeredQuestions[index] = true;
            document.getElementById(`check-btn-${index}`).disabled = true;
            document.getElementById(`exp-${index}`).style.display = 'block';
        }

        function openGapPopup(index) {
            if (answeredQuestions[index]) return;
            currentGapIndex = index;
            const q = quizData[index];
            const popupOptions = document.getElementById('popup-options');
            popupOptions.innerHTML = '';

            const shuffled = q.options.map((opt, i) => ({ text: opt, originalIndex: i }))
                                      .sort(() => Math.random() - 0.5);

            shuffled.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = opt.text;
                btn.onclick = () => selectGapAnswer(opt.originalIndex, opt.text);
                popupOptions.appendChild(btn);
            });

            document.getElementById('gap-popup').style.display = 'flex';
            setTimeout(() => document.getElementById('popup-box').classList.add('active'), 10);
        }

        function closePopup() {
            document.getElementById('popup-box').classList.remove('active');
            setTimeout(() => document.getElementById('gap-popup').style.display = 'none', 300);
        }

        function selectGapAnswer(selectedIndex, textContent) {
            const index = currentGapIndex;
            const q = quizData[index];
            
            const cleanText = textContent.replace(/^[A-D]\.\s*/, '');
            const subAnswers = cleanText.split(/\s*\/\s*/);
            
            const gaps = document.querySelectorAll(`.gap-group-${index}`);
            gaps.forEach((gap, i) => {
                gap.innerText = subAnswers[i] || subAnswers[0];
            });

            answeredQuestions[index] = true;

            if (selectedIndex === q.correct) {
                gaps.forEach(gap => gap.classList.add('answered-correct'));
                playSound('correct');
                createConfetti();
                score++;
                updateScore();
            } else {
                gaps.forEach(gap => {
                    gap.classList.add('answered-wrong');
                    gap.style.animation = 'shake 0.5s';
                });
                playSound('wrong');
            }

            document.getElementById(`exp-${index}`).style.display = 'block';
            closePopup();
        }

        function updateScore() {
            document.getElementById('score-display').innerText = `${score} / ${quizData.length}`;
        }

        function submitQuiz() {
            const total = quizData.length;
            const unans = answeredQuestions.filter(x => !x).length;
            if (unans > 0) {
                alert(`⚠️ CẢNH BÁO HỆ THỐNG: Bạn còn ${unans} module chưa xử lý! Hãy nạp đủ năng lượng nhé! 🔋`);
                return;
            }

            let message = "";
            let percent = score / total;
            if (percent === 1) message = "🏆 CHÚA TỂ CÔNG NGHỆ! PHI THUYỀN SẴN SÀNG CẤT CÁNH! 🚀";
            else if (percent >= 0.8) message = "🌟 Hệ thống ổn định! Bạn rất xuất sắc! 🌟";
            else if (percent >= 0.5) message = "👍 Cố lên phi hành gia! Đọc kỹ phân tích dữ liệu nha! 👍";
            else message = "🤖 Cảnh báo năng lượng thấp! Hãy luyện tập thêm để nâng cấp bản thân nhé! 🤖";

            alert(`Mức năng lượng đạt: ${score}/${total}!\n${message}`);
            createConfetti();
            createConfetti();
            playSound('correct');
        }

        window.onload = renderQuiz;
    </script>
</body>
