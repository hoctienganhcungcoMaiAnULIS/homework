<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamified English Test by Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Pastel & Neon Palette */
            --bg-color-1: #FF9A9E; /* Pink */
            --bg-color-2: #FECFEF; /* Light Pink */
            --bg-color-3: #A18CD1; /* Purple */
            --bg-color-4: #FBC2EB; /* Pastel Purple */
            --bg-color-5: #84FAB0; /* Mint Green */
            --bg-color-6: #8FD3F4; /* Light Blue */
            
            --correct: #00D26A;
            --correct-shadow: #00994D;
            --wrong: #FF4757;
            --wrong-shadow: #CC3946;
            --text-dark: #2C3E50;
            
            /* Glassmorphism Variables */
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            /* Animated Gradient Background */
            background: linear-gradient(-45deg, var(--bg-color-1), var(--bg-color-3), var(--bg-color-5), var(--bg-color-6));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Lớp họa tiết lơ lửng */
        .pattern-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }

        .floating-item {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.6;
            animation: floatUp linear infinite;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Glassmorphism Header */
        header {
            text-align: center;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 25px;
            border-radius: 25px;
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--glass-border);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.8rem;
            color: #4A235A;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.7);
        }

        h3 {
            font-size: 1.2rem;
            color: #283747;
            font-weight: 800;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* Glassmorphism Instruction Block */
        .instruction-block {
            background: rgba(255, 234, 167, 0.5); /* Pastel Yellow tint */
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 18px 25px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.15rem;
            margin-bottom: 25px;
            box-shadow: var(--glass-shadow);
            border: 1px solid rgba(253, 203, 110, 0.5);
            color: #D35400;
            text-align: center;
        }

        /* Glassmorphism Question Card */
        .question-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 35px;
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s ease;
        }

        .question-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.25);
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.6;
            color: #2C3E50;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        /* Glassmorphism Option Buttons */
        .option-btn {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 18px;
            padding: 18px 20px;
            font-size: 1.15rem;
            font-weight: 700;
            color: #2C3E50;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 rgba(255, 255, 255, 0.3);
            text-align: left;
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 12px 0 rgba(255, 255, 255, 0.4);
            border-color: #84FAB0;
            background: rgba(255, 255, 255, 0.6);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(255, 255, 255, 0.3);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Correct / Wrong States (Override Glass) */
        .option-btn.correct {
            background: linear-gradient(135deg, #00D26A, #00A855) !important;
            border-color: #008B46 !important;
            color: #FFF !important;
            box-shadow: 0 6px 0 var(--correct-shadow) !important;
            animation: popIn 0.5s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #FF4757, #E84150) !important;
            border-color: #C0392B !important;
            color: #FFF !important;
            box-shadow: 0 6px 0 var(--wrong-shadow) !important;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .option-btn.fade {
            opacity: 0.4;
            filter: grayscale(100%);
        }

        /* Glassmorphism Explanation Box */
        .explanation-box {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-left: 8px solid #FF7675;
            border-right: 1px solid rgba(255,255,255,0.5);
            border-top: 1px solid rgba(255,255,255,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.5);
            padding: 25px;
            border-radius: 0 20px 20px 0;
            display: none;
            font-size: 1.05rem;
            line-height: 1.7;
            box-shadow: var(--glass-shadow);
            animation: slideDown 0.4s ease-out forwards;
            color: #2D3436;
        }

        .explanation-box h4 {
            color: #D63031;
            font-size: 1.3rem;
            margin-bottom: 15px;
            border-bottom: 2px dashed rgba(214, 48, 49, 0.3);
            padding-bottom: 8px;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.8);
        }
        
        .explanation-box .step-title {
            font-weight: 900;
            color: #0984E3;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.5);
            display: inline-block;
            padding: 2px 10px;
            border-radius: 8px;
        }

        /* Glass Submit Button */
        .submit-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, rgba(9, 132, 227, 0.8), rgba(116, 185, 255, 0.8));
            backdrop-filter: blur(10px);
            color: white;
            font-size: 1.8rem;
            font-weight: 900;
            text-align: center;
            padding: 25px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 25px;
            box-shadow: 0 10px 0 #0652DD, var(--glass-shadow);
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 50px;
            margin-bottom: 60px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 0 #0652DD, 0 15px 30px rgba(9, 132, 227, 0.4);
            background: linear-gradient(135deg, rgba(116, 185, 255, 0.9), rgba(9, 132, 227, 0.9));
        }

        .submit-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #0652DD;
        }

        /* CSS vẽ biển báo Q29, Q30 */
        .sign-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .css-sign-yellow {
            background: #F1C40F;
            border: 4px solid #F39C12;
            padding: 20px 40px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
            color: black;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .css-sign-yellow .text {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.2;
        }
        .css-sign-yellow .icon {
            font-size: 3rem;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            padding: 10px;
        }

        .css-sign-circle {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .circle-slash {
            position: relative;
            width: 140px;
            height: 140px;
            border: 15px solid #E74C3C;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
        }
        .circle-slash::after {
            content: '';
            position: absolute;
            width: 160px;
            height: 15px;
            background: #E74C3C;
            transform: rotate(-45deg);
            z-index: 2;
        }
        .circle-slash .icon-group {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -15px;
        }
        .circle-slash .foot { font-size: 50px; transform: rotate(-20deg); margin-bottom: -15px; }
        .circle-slash .flower { font-size: 30px; }
        .sign-text-bottom {
            font-size: 1.5rem;
            font-weight: 900;
            color: #333;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.7);
            padding: 5px 15px;
            border-radius: 10px;
        }

        /* Animations */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .shake {
            animation: shakeAnim 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .confetti {
            position: fixed;
            width: 15px; height: 15px;
            z-index: 9999; pointer-events: none;
            border-radius: 3px;
        }

        /* Modal (Glassmorphism) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255,255,255,0.8);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-content h2 {
            font-size: 2.5rem;
            color: #8E44AD;
            margin-bottom: 20px;
            font-weight: 900;
        }

        .modal-content .score-text {
            font-size: 4.5rem;
            font-weight: 900;
            color: var(--correct);
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #E8FBF0;
        }

        .modal-btn {
            background: linear-gradient(135deg, #FF9F43, #FF6B6B);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 20px;
            box-shadow: 0 8px 0 #E84118;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.2s;
        }
        
        .modal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 11px 0 #E84118;
        }
        .modal-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #E84118;
        }
    </style>
</head>
<body>

    <div class="pattern-layer" id="patternLayer"></div>

    <div class="container">
        <header>
            <h1>SAMPLE TEST 2</h1>
            <h3>Giáo viên tạo: Ms Mai An ULIS</h3>
        </header>

        <div id="quiz-container">
            </div>

        <button class="submit-btn" onclick="showFinalScore()">Nộp Bài Lấy Điểm Nào! 🚀</button>
    </div>

    <div class="modal-overlay" id="scoreModal">
        <div class="modal-content">
            <h2>Kết Quả Của Em! 🎉</h2>
            <div class="score-text" id="finalScoreText">0/0</div>
            <p id="feedbackText" style="font-size: 1.3rem; font-weight: 800; color: #2D3436; line-height: 1.5;"></p>
            <button class="modal-btn" onclick="location.reload()">Làm Lại Lần Nữa 🔄</button>
        </div>
    </div>

<script>
    // --- WEB AUDIO API (KHÔNG CẦN LINK NGOÀI) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
    }

    function playDing() {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    function playBuzzer() {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    }

    // --- HIỆU ỨNG PHÁO GIẤY CONFETTI ---
    function shootConfetti(x, y) {
        const colors = ['#00D26A', '#FDCB6E', '#FF4757', '#0984E3', '#8E44AD', '#00C9A7'];
        for (let i = 0; i < 40; i++) {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            document.body.appendChild(confetti);
            
            confetti.style.left = x + 'px';
            confetti.style.top = y + 'px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = 8 + Math.random() * 12;
            let posX = x;
            let posY = y;
            let rot = Math.random() * 360;
            let time = 0;

            const animate = () => {
                time += 0.1;
                posX += Math.cos(angle) * velocity;
                posY += Math.sin(angle) * velocity + (time * time * 1.5); 
                rot += 15;
                
                confetti.style.transform = `translate(${posX - x}px, ${posY - y}px) rotate(${rot}deg)`;
                
                if (posY > window.innerHeight) {
                    confetti.remove();
                } else {
                    requestAnimationFrame(animate);
                }
            };
            requestAnimationFrame(animate);
        }
    }

    // --- DỮ LIỆU ĐỀ BÀI (SAMPLE TEST 2) VÀ GIẢI THÍCH CHI TIẾT ---
    const testData = [
        {
            instruction: "Mark the letter A, B, C or D on your answer sheet to indicate the word whose underlined part differs from the other three in pronunciation in each of the following questions.",
            questions: [
                {
                    id: 1,
                    text: "Question 1.",
                    options: [
                        { label: "A", text: "karat<u>e</u>", isCorrect: true },
                        { label: "B", text: "m<u>e</u>mber", isCorrect: false },
                        { label: "C", text: "m<u>e</u>dal", isCorrect: false },
                        { label: "D", text: "int<u>e</u>lligent", isCorrect: false }
                    ],
                    explanation: `
                        <p class="step-title">1. Dịch câu hỏi:</p>
                        <p>Chọn từ có phần gạch chân phát âm khác với ba từ còn lại.</p>
                        <p class="step-title">2. Phân tích từ vựng & Phát âm 4 đáp án:</p>
                        <p>A. karate /kəˈrɑːt<b>i</b>/ (n): Môn võ karate. Chữ "e" phát âm là <b>/i/</b>.</p>
                        <p>B. member /ˈm<b>e</b>mbə(r)/ (n): Thành viên. Chữ "e" phát âm là <b>/e/</b>.</p>
                        <p>C. medal /ˈm<b>e</b>dl/ (n): Huy chương. Chữ "e" phát âm là <b>/e/</b>.</p>
                        <p>D. intelligent /ɪnˈt<b>e</b>lɪdʒənt/ (adj): Thông minh. Chữ "e" phát âm là <b>/e/</b>.</p>
                        <p class="step-title">3. Tại sao chọn A?</p>
                        <p>Vì chữ "e" trong "karate" được phát âm là âm /i/ (đọc giống chữ "i" trong tiếng Việt), khác biệt hoàn toàn với nhóm còn lại.</p>
                        <p class="step-title">4. Tại sao 3 đáp án còn lại SAI?</p>
                        <p>Vì các đáp án B, C, D đều có phần gạch chân phát âm giống nhau là âm /e/.</p>
                    `
                },
                {
                    id: 2,
                    text: "Question 2.",
                    options: [
                        { label: "A", text: "c<u>a</u>ptain", isCorrect: false },
                        { label: "B", text: "b<u>a</u>dminton", isCorrect: false },
                        { label: "C", text: "b<u>a</u>seball", isCorrect: true },
                        { label: "D", text: "<u>a</u>ctive", isCorrect: false }
                    ],
                    explanation: `
                        <p class="step-title">1. Dịch câu hỏi:</p>
                        <p>Chọn từ có phần gạch chân phát âm khác với ba từ còn lại.</p>
                        <p class="step-title">2. Phân tích từ vựng & Phát âm 4 đáp án:</p>
                        <p>A. captain /ˈk<b>æ</b>ptɪn/ (n): Đội trưởng, thuyền trưởng. Chữ "a" phát âm là <b>/æ/</b> (âm a bẹt).</p>
                        <p>B. badminton /ˈb<b>æ</b>dmɪntən/ (n): Môn cầu lông. Chữ "a" phát âm là <b>/æ/</b>.</p>
                        <p>C. baseball /ˈb<b>eɪ</b>sbɔːl/ (n): Môn bóng chày. Chữ "a" phát âm là <b>/eɪ/</b>.</p>
                        <p>D. active /ˈ<b>æ</b>ktɪv/ (adj): Năng động. Chữ "a" phát âm là <b>/æ/</b>.</p>
                        <p class="step-title">3. Tại sao chọn C?</p>
                        <p>Vì chữ "a" trong "baseball" được phát âm là nguyên âm đôi /eɪ/.</p>
                        <p class="step-title">4. Tại sao 3 đáp án còn lại SAI?</p>
                        <p>Vì A, B, D đều được phát âm là âm /æ/ ngắn (há miệng to phát âm a lai e).</p>
                    `
                }
            ]
        },
        {
            instruction: "Mark the letter A, B, C or D on your answer sheet to indicate the word that differs from the other three in the position of primary stress in each of the following questions.",
            questions: [
                {
                    id: 3,
                    text: "Question 3.",
                    options: [
                        { label: "A", text: "racket", isCorrect: false },
                        { label: "B", text: "sporty", isCorrect: false },
                        { label: "C", text: "goggles", isCorrect: false },
                        { label: "D", text: "career", isCorrect: true }
                    ],
                    explanation: `
                        <p class="step-title">1. Dịch câu hỏi:</p>
                        <p>Chọn từ có vị trí trọng âm chính khác với ba từ còn lại.</p>
                        <p class="step-title">2. Phân tích từ vựng & Trọng âm 4 đáp án:</p>

                        <p>Đoạn văn ở Q17 là một đoạn văn kể lại kỷ niệm đẹp về chuyến đi (thời tiết đẹp, người thân thiện, ăn ngon). Câu kết bài chuẩn nhất thường là một <b>câu chốt lại cảm xúc</b> của người viết đối với trải nghiệm đó. "Tôi vẫn nhớ Đà Nẵng..." là một kết bài hoàn hảo, gói gọn lại sự lưu luyến.</p>
                        <p class="step-title">4. Tại sao 3 đáp án còn lại SAI?</p>
                        <p>- A đưa thông tin không liên quan (đi bằng tàu với bạn - trong khi bài tả đi với gia đình).</p>
                        <p>- B đưa ra thông tin tiêu cực, phá hỏng mạch cảm xúc đang vui vẻ của bài viết.</p>
                        <p>- D mang tính chất so sánh kiến thức địa lý, không mang tính cảm xúc cá nhân khép lại một bài kể chuyện kỷ niệm.</p>
                    `
                }
            ]
        },
        {
            instruction: "Mark the letter A, B, C or D on your answer sheet to indicate the sentence that is closest in meaning to the original sentence in each of the following questions.",
            questions: [
                {
                    id: 25,
                    text: "Question 25. I have a lot of homework. I can’t enjoy the programme.",
                    options: [
                        { label: "A", text: "I have a lot of homework, so I can’t enjoy the programme.", isCorrect: true },
                        { label: "B", text: "I have a lot of homework, I can’t enjoy the programme.", isCorrect: false },
                        { label: "C", text: "I have a lot of homework, but I can’t enjoy the programme.", isCorrect: false },
                        { label: "D", text: "I have a lot of homework because I can’t enjoy the programme.", isCorrect: false }
                    ],
                    explanation: `
                        <p class="step-title">1. Dịch câu gốc:</p>
                        <p>"Tôi có rất nhiều bài tập về nhà. Tôi không thể tận hưởng chương trình truyền hình."</p>
                        <p class="step-title">2. Phân tích 4 đáp án (Từ nối):</p>
                        <p>A. ... <b>so (vì vậy)</b>...: Chỉ nguyên nhân - kết quả. Hợp lý.</p>
                        <p>B. Thiếu từ nối giữa hai mệnh đề (Sai ngữ pháp câu ghép).</p>
                        <p>C. ... <b>but (nhưng)</b>...: Chỉ sự tương phản. Sai logic.</p>
                        <p>D. ... <b>because (bởi vì)</b>...: Đảo ngược nguyên nhân kết quả (Tôi có nhiều bài tập VÌ tôi không thể xem TV -> Sai hoàn toàn).</p>
                        <p class="step-title">3. Tại sao chọn A?</p>
                        <p>Mối quan hệ giữa hai câu gốc là Nguyên nhân - Kết quả (Có nhiều bài tập -> Dẫn đến kết quả là không xem được TV). Do đó dùng liên từ <b>"so"</b> ở giữa là hoàn toàn chính xác về mặt ngữ nghĩa và ngữ pháp.</p>
                    `
                },
                {
                    id: 26,
                    text: "Question 26. My sister can swim well. She can’t play badminton.",
                    options: [
                        { label: "A", text: "My sister can swim well, but she can play badminton.", isCorrect: false },
                        { label: "B", text: "My sister can swim well, but she can’t play badminton.", isCorrect: true },
                        { label: "C", text: "My sister can swim well and she can’t play badminton.", isCorrect: false },
                        { label: "D", text: "My sister can swim well, she can’t play badminton.", isCorrect: false }
                    ],
                    explanation: `
                        <p class="step-title">1. Dịch câu gốc:</p>
                        <p>"Chị tôi có thể bơi giỏi. Chị ấy không thể chơi cầu lông."</p>
                        <p class="step-title">2. Phân tích 4 đáp án (Từ nối):</p>
                        <p>A. Chị tôi bơi giỏi, NHƯNG chị ấy CÓ THỂ chơi cầu lông (Sai ý câu gốc).</p>
                        <p>B. Chị tôi bơi giỏi, <b>nhưng (but)</b> chị ấy KHÔNG THỂ chơi cầu lông (Chuẩn xác).</p>
                        <p>C. Dùng "and" (và) không diễn tả được sự tương phản (có thể >< không thể) mạnh mẽ bằng "but".</p>
                        <p>D. Lỗi "Comma splice" (Dùng dấu phẩy nối 2 mệnh đề độc lập mà không có từ nối) -> Sai ngữ pháp.</p>
                        <p class="step-title">3. Tại sao chọn B?</p>
                        <p>Hai câu gốc có sự đối lập rõ rệt: Một khả năng làm được (can) và một khả năng không làm được (can't). Liên từ nối chỉ sự tương phản tốt nhất trong trường hợp này là <b>"but"</b> (nhưng).</p>
                    `
                }
            ]
        },
        {
            instruction: "Mark the letter A, B, C or D on your answer sheet to indicate the sentence that is made from the given cues in each of the following questions.",
            questions: [
                {
                    id: 27,
                    text: "Question 27. Which/ cartoon/ be/ funnier,/ Doraemon or Pokemon?",
                    options: [
                        { label: "A", text: "Which cartoon be funnier, Doraemon or Pokemon?", isCorrect: false },
                        { label: "B", text: "Which is the cartoon funnier, Doraemon or Pokemon?", isCorrect: false },
                        { label: "C", text: "Which cartoon funnier, Doraemon or Pokemon?", isCorrect: false },
                        { label: "D", text: "Which cartoon is funnier, Doraemon or Pokemon?", isCorrect: true }
                    ],
                    explanation: `
                        <p class="step-title">1. Dịch từ gợi ý:</p>
                        <p>"Bộ phim hoạt hình nào / thì / hài hước hơn, / Doraemon hay Pokemon?"</p>
                        <p class="step-title">2. Phân tích 4 đáp án:</p>
                        <p>A. Giữ nguyên động từ "be" chưa chia là sai ngữ pháp.</p>
                        <p>B. Sai vị trí to be và tính từ ("is the cartoon funnier" -> sai trật tự).</p>
                        <p>C. Thiếu động từ to be hoàn toàn.</p>
                        <p>D. <b>Which cartoon is funnier...</b> (Chuẩn ngữ pháp câu hỏi với từ để hỏi Which + Noun + V?)</p>
                        <p class="step-title">3. Tại sao chọn D?</p>
                        <p>Cấu trúc câu hỏi lựa chọn: <b>Which + Danh từ (cartoon) + động từ to be (is) + Tính từ so sánh hơn (funnier), A or B?</b>. Đáp án D chia to be thành "is" chính xác vì "cartoon" là số ít.</p>
                    `
                },
                {
                    id: 28,
                    text: "Question 28. Why/ you/ want to check/ the TV schedule?",
                    options: [
                        { label: "A", text: "Why did you wanted to check the TV schedule?", isCorrect: false },
                        { label: "B", text: "Why do you want to check the TV schedule?", isCorrect: true },
                        { label: "C", text: "Why you want to check the TV schedule?", isCorrect: false },
                        { label: "D", text: "Why are you wanting to check the TV schedule?", isCorrect: false }
                    ],
                    explanation: `
                        <p class="step-title">1. Dịch từ gợi ý:</p>
                        <p>"Tại sao / bạn / muốn kiểm tra / lịch phát sóng TV?"</p>
                        <p class="step-title">2. Phân tích ngữ pháp 4 đáp án:</p>
                        <p>A. Sai cơ bản: Đã mượn trợ động từ "did" mà động từ chính "wanted" vẫn chia quá khứ thêm -ed.</p>
                        <p>B. Bạn tại sao muốn kiểm tra lịch TV? (Câu hỏi Thì hiện tại đơn chuẩn xác).</p>
                        <p>C. Thiếu trợ động từ "do" hoàn toàn.</p>
                        <p>D. Động từ chỉ cảm giác, mong muốn như "want" (muốn) KHÔNG BAO GIỜ được chia ở thì tiếp diễn (wanting).</p>
                        <p class="step-title">3. Tại sao chọn B?</p>
                        <p>Cấu trúc câu hỏi Wh- question ở thì Hiện tại đơn: <b>Wh- + do/does + S + V(nguyên thể)?</b>. => <i>Why do you want...</i> là cấu trúc hoàn hảo nhất.</p>
                    `
                }
            ]
        },
        {
            instruction: "Read the following sign or notice and mark the letter A, B, C or D on your answer sheet to indicate the correct answer to each of the following questions.",
            questions: [
                {
                    id: 29,
                    text: `Question 29: What is the meaning of the sign below?
                           <div class="sign-container">
                               <div class="css-sign-yellow">
                                   <div class="text">WEAR YOUR<br>HELMET</div>
                                   <div class="icon">🚲</div>
                                   <div class="text" style="font-size: 1rem;">SAFETY FIRST</div>
                               </div>
                           </div>`,
                    options: [
                        { label: "A", text: "You don’t need a helmet when riding a bike.", isCorrect: false },
                        { label: "B", text: "You should wear a helmet when you ride a bike.", isCorrect: true },
                        { label: "C", text: "Helmets are only for motorbike riders.", isCorrect: false },
                        { label: "D", text: "You mustn't wear a helmet when riding a bike.", isCorrect: false }
                    ],
                    explanation: `
                        <p class="step-title">1. Dịch biển báo và câu hỏi:</p>
                        <p>Biển báo ghi: "HÃY ĐỘI MŨ BẢO HIỂM. AN TOÀN LÀ TRÊN HẾT" (Kèm hình xe đạp).</p>
                        <p>Câu hỏi: Biển báo có ý nghĩa gì?</p>
                        <p class="step-title">2. Dịch 4 đáp án:</p>
                        <p>A. Bạn không cần đội mũ bảo hiểm khi đạp xe.</p>
                        <p>B. Bạn nên đội mũ bảo hiểm khi đạp xe.</p>
                        <p>C. Mũ bảo hiểm chỉ dành cho người đi xe máy.</p>
                        <p>D. Bạn không được phép đội mũ bảo hiểm khi đạp xe.</p>
                        <p class="step-title">3. Tại sao chọn B?</p>
                        <p>Nội dung biển báo mang tính khuyên bảo/nhắc nhở "Wear your helmet" (Hãy đội mũ). Do đó, sử dụng động từ khuyết thiếu <b>"should"</b> (nên làm gì đó) ở đáp án B là diễn đạt chính xác nhất tinh thần của biển báo.</p>
                        <p class="step-title">4. Tại sao 3 đáp án còn lại SAI?</p>
                        <p>- A, D mang ý nghĩa cấm đoán hoặc không cần thiết, đi ngược hoàn toàn với thông điệp "An toàn là trên hết".</p>
                        <p>- C bịa thêm thông tin "chỉ dành cho xe máy", sai vì hình minh họa trên biển báo rõ ràng là chiếc xe đạp.</p>
                    `
                },
                {
                    id: 30,
                    text: `Question 30: What is the meaning of the sign below?
                           <div class="sign-container">
                               <div class="css-sign-circle">
                                   <div class="circle-slash">
                                       <div class="icon-group">
                                           <div class="foot">👞</div>
                                           <div class="flower">🌼</div>
                                       </div>
                                   </div>
                                   <div class="sign-text-bottom">DON'T WALK HERE</div>
                               </div>
                           </div>`,
                    options: [
                        { label: "A", text: "You can walk here.", isCorrect: false },
                        { label: "B", text: "You can not walk here.", isCorrect: true },
                        { label: "C", text: "You can not ride a bike.", isCorrect: false },
                        { label: "D", text: "You can go alone here.", isCorrect: false }
                    ],
                    explanation: `
                        <p class="step-title">1. Dịch biển báo và câu hỏi:</p>
                        <p>Biển báo có dòng chữ: "DON'T WALK HERE" (KHÔNG BƯỚC ĐI Ở ĐÂY) kèm hình bàn chân giẫm lên hoa bị gạch chéo đỏ.</p>
                        <p>Câu hỏi: Biển báo có ý nghĩa gì?</p>
                        <p class="step-title">2. Dịch 4 đáp án:</p>
                        <p>A. Bạn CÓ THỂ đi bộ ở đây.</p>
                        <p>B. Bạn KHÔNG THỂ / KHÔNG ĐƯỢC đi bộ ở đây.</p>
                        <p>C. Bạn không được đi xe đạp.</p>
                        <p>D. Bạn có thể đi một mình ở đây.</p>
                        <p class="step-title">3. Tại sao chọn B?</p>
                        <p>Dòng chữ "Don't walk here" (Câu mệnh lệnh cấm) tương đương hoàn toàn với cấu trúc <b>"You can not walk here"</b> (Bạn không được phép đi bộ ở đây) để bảo vệ cỏ hoa.</p>
                        <p class="step-title">4. Tại sao 3 đáp án còn lại SAI?</p>
                        <p>- A sai vì thiếu từ phủ định (can thay vì can not).</p>
                        <p>- C sai chủ đề (biển báo nói về walk - đi bộ, không phải ride a bike - đi xe đạp).</p>
                        <p>- D sai hoàn toàn về mặt ngữ nghĩa.</p>
                    `
                }
            ]
        }
    ];

    let totalQuestions = 0;
    let correctCount = 0;
    let answeredQuestions = new Set();

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        
        testData.forEach(block => {
            const instructionDiv = document.createElement('div');
            instructionDiv.className = 'instruction-block';
            instructionDiv.innerHTML = block.instruction;
            container.appendChild(instructionDiv);

            block.questions.forEach(q => {
                totalQuestions++;
                
                const qCard = document.createElement('div');
                qCard.className = 'question-card';
                
                let shuffledOptions = [...q.options];
                shuffleArray(shuffledOptions);

                let optionsHTML = '';
                shuffledOptions.forEach((opt, index) => {
                    optionsHTML += `
                        <button class="option-btn" 
                                onclick="handleAnswer(${q.id}, this, ${opt.isCorrect})"
                                data-correct="${opt.isCorrect}">
                            <b>${String.fromCharCode(65 + index)}.</b> ${opt.text}
                        </button>
                    `;
                });

                qCard.innerHTML = `
                    <div class="question-text">${q.text}</div>
                    <div class="options-grid" id="options-${q.id}">
                        ${optionsHTML}
                    </div>
                    <div class="explanation-box" id="exp-${q.id}">
                        <h4>💡 Giải thích siêu chi tiết (Ms Mai An)</h4>
                        ${q.explanation}
                    </div>
                `;
                container.appendChild(qCard);
            });
        });
    }

    function handleAnswer(qId, btnElement, isCorrect) {
        if (answeredQuestions.has(qId)) return;
        answeredQuestions.add(qId);

        const optionsContainer = document.getElementById(`options-${qId}`);
        const allBtns = optionsContainer.querySelectorAll('.option-btn');
        const expBox = document.getElementById(`exp-${qId}`);

        allBtns.forEach(btn => {
            btn.disabled = true;
            if (btn.dataset.correct === "true" && !isCorrect) {
                btn.style.borderColor = "var(--correct)";
                btn.style.boxShadow = "0 6px 0 var(--correct-shadow)";
                btn.style.background = "rgba(0, 210, 106, 0.2)"; // Glass green tint
            } else if (btn !== btnElement) {
                btn.classList.add('fade');
            }
        });

        if (isCorrect) {
            btnElement.classList.add('correct');
            playDing();
            correctCount++;
            const rect = btnElement.getBoundingClientRect();
            shootConfetti(rect.left + rect.width / 2, rect.top);
        } else {
            btnElement.classList.add('wrong');
            btnElement.classList.add('shake');
            playBuzzer();
        }

        expBox.style.display = 'block';
    }

    function showFinalScore() {
        if (answeredQuestions.size < totalQuestions) {
            alert("Ôi! Em còn sót câu hỏi chưa làm kìa! Hãy kéo lên kiểm tra lại nhé! 🧐");
            return;
        }

        const modal = document.getElementById('scoreModal');
        const scoreText = document.getElementById('finalScoreText');
        const feedbackText = document.getElementById('feedbackText');

        scoreText.innerText = `${correctCount}/${totalQuestions}`;
        
        let percentage = correctCount / totalQuestions;
        if (percentage === 1) {
            feedbackText.innerText = "Wow! Tuyệt đỉnh! Em đúng là một thần đồng Tiếng Anh! 🌟🏆";
            shootConfetti(window.innerWidth/2, window.innerHeight/2);
            shootConfetti(window.innerWidth/4, window.innerHeight/2);
            shootConfetti(window.innerWidth*0.75, window.innerHeight/2);
        } else if (percentage >= 0.7) {
            feedbackText.innerText = "Giỏi lắm! Điểm số rất cao. Cố gắng một chút nữa là perfect! 🔥";
        } else if (percentage >= 0.5) {
            feedbackText.innerText = "Làm khá tốt! Em nhớ đọc kỹ giải thích của cô để rút kinh nghiệm nhé! 📚";
        } else {
            feedbackText.innerText = "Đừng nản chí! Đọc thật kỹ phần giải thích siêu chi tiết và thử lại nào! 💪";
        }

        modal.style.display = 'flex';
        playDing();
    }

    // --- TẠO HỌA TIẾT LƠ LỬNG ---
    function initFloatingPatterns() {
        const emojis = ['⭐', '🌸', '🍓', '☁️', '🐱', '🎵', '🍉', '🎈'];
        const layer = document.getElementById('patternLayer');
        
        for (let i = 0; i < 25; i++) {
            let el = document.createElement('div');
            el.className = 'floating-item';
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (12 + Math.random() * 20) + 's';
            el.style.animationDelay = (Math.random() * 5) + 's';
            
            layer.appendChild(el);
        }
    }

    window.onload = () => {
        initFloatingPatterns();
        renderQuiz();
    };

</script>
