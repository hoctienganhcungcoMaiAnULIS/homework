        // Khởi tạo Audio Context cho hiệu ứng âm thanh tự động tạo (không cần link ngoài)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
        }

        function playDing() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playWrongSound() {
            initAudio();
            // Tạo tiếng "téo tèo tèo tèo"
            const notes = [300, 250, 200, 150];
            let startTime = audioCtx.currentTime;

            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq, startTime + i * 0.15);
                
                gain.gain.setValueAtTime(0, startTime + i * 0.15);
                gain.gain.linearRampToValueAtTime(0.3, startTime + i * 0.15 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + i * 0.15 + 0.13);
                
                osc.start(startTime + i * 0.15);
                osc.stop(startTime + i * 0.15 + 0.15);
            });
        }

        function createConfetti(x, y) {
            const colors = ['#8854C0', '#00C9A7', '#00D26A', '#FF4757', '#FFD700', '#FF69B4'];
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                document.body.appendChild(confetti);
                
                confetti.style.left = x + 'px';
                confetti.style.top = y + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 5 + Math.random() * 10;
                const dx = Math.cos(angle) * velocity;
                const dy = Math.sin(angle) * velocity;
                
                let posX = x;
                let posY = y;
                let opacity = 1;
                
                function animate() {
                    posX += dx;
                    posY += dy + 2; // gravity
                    opacity -= 0.02;
                    confetti.style.transform = `translate(${posX - x}px, ${posY - y}px) rotate(${posY}deg)`;
                    confetti.style.opacity = opacity;
                    
                    if (opacity > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        confetti.remove();
                    }
                }
                requestAnimationFrame(animate);
            }
        }

                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Render câu hỏi
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            
            questionsData.forEach((q, index) => {
                // Tạo Card câu hỏi
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `card-${q.qNum}`;

                const title = document.createElement('div');
                title.className = 'question-title';
                title.innerText = `Câu ${q.qNum}: What problem was there in the ${q.place}?`;
                card.appendChild(title);

                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                // Trộn ngẫu nhiên các đáp án trước khi render
                const shuffledOptions = shuffleArray([...allOptions]);

                shuffledOptions.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt.text;
                    btn.onclick = (e) => handleAnswer(e, q.qNum, opt.id, q.answer, btn);
                    optionsGrid.appendChild(btn);
                });

                card.appendChild(optionsGrid);

                // Khung giải thích
                const explanation = document.createElement('div');
                explanation.className = 'explanation';
                explanation.id = `expl-${q.qNum}`;
                explanation.innerHTML = q.explanationHTML;
                card.appendChild(explanation);

                container.appendChild(card);
            });
        }

        // Xử lý khi chọn đáp án
        function handleAnswer(event, qNum, selectedOptionId, correctOptionId, btnElement) {
            initAudio(); // Đảm bảo âm thanh được phép chạy
            
            const card = document.getElementById(`card-${qNum}`);
            const buttons = card.querySelectorAll('.option-btn');
            
            // Khóa tất cả các nút trong câu hỏi này
            buttons.forEach(b => b.disabled = true);

            // Kiểm tra đúng / sai
            if (selectedOptionId === correctOptionId) {
                // ĐÚNG
                btnElement.classList.add('correct');
                playDing();
                
                // Vị trí chuột để bắn pháo giấy
                const rect = btnElement.getBoundingClientRect();
                createConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
                
                score++;
            } else {
                // SAI
                btnElement.classList.add('wrong');
                btnElement.classList.add('shake');
                playWrongSound();
                
                // Highlight đáp án đúng
                buttons.forEach(b => {
                    if (b.innerText.startsWith(correctOptionId + '.')) {
                        b.style.backgroundColor = 'var(--correct)';
                        b.style.color = 'white';
                        b.style.borderColor = 'var(--correct)';
                    }
                });
            }

            // Hiện giải thích
            const expl = document.getElementById(`expl-${qNum}`);
            expl.style.display = 'block';
            
            answeredQuestions++;
        }

        // Logic nộp bài
        function submitQuiz() {
            if (answeredQuestions < questionsData.length) {
                alert(`Bạn mới làm ${answeredQuestions}/${questionsData.length} câu. Hãy hoàn thành trước khi nộp nhé!`);
                return;
            }

            const percent = (score / questionsData.length) * 100;
            const textEl = document.getElementById('scoreText');
            const imgEl = document.getElementById('resultImage');
            const modal = document.getElementById('resultModal');

            textEl.innerText = `Bạn trả lời đúng ${score} / ${questionsData.length} câu (${percent}%).`;

            if (percent === 100) {
                imgEl.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif";
            } else if (percent >= 60) {
                imgEl.src = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif";
            } else {
                imgEl.src = "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif";
            }

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }

        // Bắt đầu render khi tải trang
        window.onload = renderQuiz;

    </script>
</body>
</html>
