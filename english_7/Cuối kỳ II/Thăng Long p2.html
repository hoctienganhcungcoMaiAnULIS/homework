    const hydroText = [
        "Energy that we get from water is called hydro energy, or hydro power. It is a renewable source of energy. It generates power by using a dam or diversion structure to alter the natural flow of a river or other body of water. Hydro power relies on the endless, constantly recharging system of the water cycle to produce electricity, using a fuel-water-that is not reduced or eliminated in the process. There are many types of hydro power facilities, though they are all powered by the kinetic energy of flowing water as it moves downstream. Hydro power utilizes turbines and generators to convert that kinetic energy into electricity, which is then fed into the electrical grid to power homes, businesses, and industries.",

    let audioCtx = null;
    function playBeep(isCorrect) {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator(); 
            const gain = audioCtx.createGain();
            osc.connect(gain); 
            gain.connect(audioCtx.destination);
            osc.type = 'sine'; 
            osc.frequency.value = isCorrect ? 880 : 440;
            gain.gain.value = 0.2; 
            osc.start(); 
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3); 
            osc.stop(audioCtx.currentTime + 0.3);
        } catch(e) {
            console.log("Audio bị trình duyệt chặn, bỏ qua...");
        }
    }

    function startTimer() { if(timerInterval) clearInterval(timerInterval); timerActive=true; timerInterval = setInterval(()=>{ if(timerActive && timerSeconds>0){ timerSeconds--; updateTimerDisplay(); } },1000); }

        let mcScore = 0; for(let i=0;i<5;i++) { if(userAnswersMC[i] !== null) { const origCorrect = mcqData[i].correct; if(shuffledOptions[i][userAnswersMC[i]] === mcqData[i].options[origCorrect]) mcScore++; } }
        let total = tfScore + mcScore; let percent = (total/10)*100;
        let gifUrl = percent === 100 ? "https://media.giphy.com/media/3o7abB06u9bNzA8LC8/giphy.gif" : (percent>=60 ? "https://media.giphy.com/media/xUPGcguWZHRC2HyBRS/giphy.gif" : "https://media.giphy.com/media/3o6ZtaO9BZHcOjmErm/giphy.gif");
        let praise = percent===100 ? "🌟 THIÊN TÀI!" : (percent>=60 ? "🎉 LÀM TỐT LẮM!" : "💪 CỐ LÊN NHÉ!");
        let modalDiv = document.createElement('div'); modalDiv.className = 'result-modal';
        modalDiv.innerHTML = `<div class="result-card"><h2 style="color:#1E88E5;">📊 KẾT QUẢ</h2><p style="font-size:1.2rem; font-weight:bold;">👤 ${name.trim()}</p><p style="font-size:2.5rem; color:#CC4E00; font-weight:900;">${total} / 10</p><p style="font-size:1.2rem; font-weight:bold;">${praise}</p><img src="${gifUrl}" style="width:100%; border-radius:30px; margin: 15px 0;" alt="meme"><button id="closeResultBtn" style="background:#00D26A; border:none; padding:12px 28px; border-radius:40px; color:white; font-size:1.2rem; font-weight:bold; cursor:pointer;">Đóng 🎮</button></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('closeResultBtn').onclick = () => modalDiv.remove();
    });
    
    function initQuiz() {
        buildParagraphs('driverlessParagraphs', driverlessText, transDriver); buildParagraphs('hydroParagraphs', hydroText, transHydro);
        const glosDriver = document.getElementById('glossaryDriver'); glossaryDriver.forEach(g => { glosDriver.innerHTML += `<tr><td><strong>${g[0]}</strong></td><td style="color:#1E88E5;">${g[1]}</td><td>${g[2]}</td></tr>`; });
        const glosHydro = document.getElementById('glossaryHydro'); glossaryHydro.forEach(g => { glosHydro.innerHTML += `<tr><td><strong>${g[0]}</strong></td><td style="color:#1E88E5;">${g[1]}</td><td>${g[2]}</td></tr>`; });
        renderExercises();
    }
</script>
