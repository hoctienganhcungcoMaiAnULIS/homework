<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra Tiếng Anh - Ms Mai An</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        /* ================= CẤM SỬA THEO YÊU CẦU ================= */
        /* GIAO DIỆN MÀN HÌNH KHÓA */
        #passwordModal {
          position:fixed; inset:0; z-index:9999;
          display:flex; align-items:center; justify-content:center;
          background:rgba(5,2,15,0.92); backdrop-filter:blur(20px);
        }
        .pw-card {
          background:linear-gradient(160deg, rgba(40,10,70,0.95) 0%, rgba(15,5,30,0.98) 100%);
          border:1.5px solid rgba(240,192,64,0.4); border-radius:24px; padding:48px 40px 40px; 
          max-width:440px; width:93%; text-align:center; position:relative; overflow:hidden;
          box-shadow:0 0 60px rgba(106,5,114,0.6), 0 0 120px rgba(240,192,64,0.1), inset 0 1px 0 rgba(240,192,64,0.15);
        }
        .pw-card::before {
          content:''; position:absolute; top:0; left:0; right:0; height:3px;
          background:linear-gradient(90deg, #6A0572, #F0C040, #6A0572);
        }
        .pw-crest { font-size:4rem; margin-bottom:8px; display:block; }
        .pw-title { font-family:'Cinzel', serif; font-size:1.4rem; font-weight:700; color:#F0C040; margin-bottom:6px; letter-spacing:1px; }
        .pw-sub   { font-size:.87rem; color:rgba(200,200,212,0.6); margin-bottom:24px; }
        .pw-input {
          width:100%; padding:13px 20px; border-radius:12px;
          border:1.5px solid rgba(240,192,64,0.3); background:rgba(255,255,255,0.05);
          color:#FFE082; font-size:1rem; font-family:'Nunito', sans-serif;
          outline:none; letter-spacing:3px; text-align:center; transition:all .3s;
        }
        .pw-input:focus { border-color:#F0C040; box-shadow:0 0 0 3px rgba(240,192,64,0.15); }
        .pw-input.error { border-color:#FF4757; box-shadow:0 0 0 3px rgba(255,71,87,0.25); animation:shake .4s ease; }
        .pw-input::placeholder { color:rgba(200,200,212,0.3); letter-spacing:1px; }
        .pw-btn {
          width:100%; padding:14px; margin-top:14px; border-radius:12px; border:none;
          background:linear-gradient(135deg, #6A0572 0%, #9B1FA8 40%, #F0C040 100%);
          color:#fff; font-size:1rem; font-weight:700; font-family:'Cinzel', serif;
          cursor:pointer; letter-spacing:.5px; transition:transform .2s;
        }
        .pw-btn:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(106,5,114,0.7); }
        .pw-err { color:#ff8a9a; font-size:.84rem; margin-top:10px; display:none; font-weight:700; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 15%,45%,75%{transform:translateX(-6px)} 30%,60%,90%{transform:translateX(6px)} }
        /* ================= KẾT THÚC PHẦN KHÓA ================= */

        /* MAIN GAMIFICATION THEME */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body {
            overflow: hidden;
            background: linear-gradient(-45deg, #ffd1dc, #b0e0e6, #e6e6fa, #f0fff0);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #333;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        /* Floating Pattern Emojis */
        .emoji-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;
            display: flex; flex-wrap: wrap; justify-content: space-around; align-items: center;
            opacity: 0.15; font-size: 4rem; filter: blur(3px);
        }

        /* Layout 50/50 Split Screen */
        #mainContent { display: none; height: 100vh; width: 100vw; }
        .header-teacher { position: absolute; top: 10px; left: 20px; font-weight: 800; color: #8a2be2; font-size: 1rem; z-index: 10; text-shadow: 1px 1px 3px rgba(255,255,255,0.8); }
        
        .split-container { display: flex; height: 100%; padding-top: 40px; }
        .left-pane, .right-pane { width: 50%; height: 100%; overflow-y: auto; padding: 20px 30px; scroll-behavior: smooth; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(138,43,226,0.5); border-radius: 10px; }
        
        /* Glassmorphism Classes */
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 25px;
            margin-bottom: 30px;
        }

        /* Reading Section */
        h2.passage-title { color: #512da8; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; font-size: 1.4rem; border-bottom: 2px dashed #b39ddb; padding-bottom: 10px;}
        .paragraph-box { margin-bottom: 20px; }
        .eng-text { font-size: 1.15rem; line-height: 1.7; color: #2c3e50; font-weight: 600; }
        .btn-translate {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            border: none; border-radius: 15px; padding: 6px 15px; font-weight: 700; color: #d81b60;
            cursor: pointer; margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 10px rgba(255,154,158,0.3);
        }
        .btn-translate:hover { transform: scale(1.05); }
        .vie-text {
            display: none; background: rgba(255,255,255,0.7); border-left: 4px solid #ff9a9e;
            padding: 10px 15px; margin-top: 10px; font-size: 1.05rem; color: #4a4a4a; border-radius: 0 10px 10px 0;
            animation: fadeIn 0.3s ease-in-out;
        }

        /* Glossary */
        table.glossary { width: 100%; border-collapse: collapse; margin-top: 10px; border-radius: 10px; overflow: hidden; }
        table.glossary th, table.glossary td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.05); }
        table.glossary th { background: rgba(138,43,226,0.15); color: #512da8; font-weight: 800; }
        table.glossary tr:last-child td { border-bottom: none; }

        /* Question Section */
        .q-number { font-size: 1.3rem; font-weight: 800; color: #e65100; margin-bottom: 10px; display: inline-block; background: #ffe0b2; padding: 5px 15px; border-radius: 20px; }
        .q-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        
        .opt-btn {
            background: rgba(255,255,255,0.9); border: 2px solid #e0e0e0; border-radius: 15px;
            padding: 12px 20px; font-size: 1.1rem; font-weight: 600; text-align: left; cursor: pointer;
            transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .opt-btn:hover { background: #f3e5f5; border-color: #ce93d8; transform: translateX(5px); }
        
        /* States */
        .opt-btn.correct { background: #c8e6c9 !important; border-color: #4caf50 !important; color: #1b5e20 !important; font-weight: 800; box-shadow: 0 0 15px rgba(76,175,80,0.4); }
        .opt-btn.wrong { background: #ffcdd2 !important; border-color: #f44336 !important; color: #b71c1c !important; }
        .opt-btn.disabled { pointer-events: none; opacity: 0.6; }

        /* Explanations strict colors */
        .explanation { display: none; margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.85); border-radius: 15px; border: 2px solid #81c784; animation: slideDown 0.4s ease; font-size: 1.05rem; line-height: 1.6;}
        .p-word { color: #1976d2; font-weight: bold; } /* Xanh dương */
        .p-mean { color: #d84315; font-weight: bold; } /* Màu đất nung */
        .p-grammar { text-decoration: underline; text-decoration-color: #d32f2f; text-decoration-thickness: 2px; color: #333; font-weight: bold; } /* Gạch đỏ */
        .hl-green { color: #2e7d32; font-weight: bold; } /* Xanh lá */
        .hl-red { color: #b71c1c; font-weight: bold; text-decoration: line-through; } /* Đỏ gạch ngang */
        .ev-box { background: #e3f2fd; padding: 10px; border-radius: 10px; margin-top: 10px; font-style: italic; border-left: 4px solid #2196f3;}

        /* Submit Button */
        .submit-area { text-align: center; margin: 40px 0; }
        .btn-submit {
            background: linear-gradient(45deg, #ff6b6b, #ff8e53); border: none; padding: 15px 40px; font-size: 1.5rem; font-weight: 800;
            color: white; border-radius: 30px; cursor: pointer; box-shadow: 0 8px 25px rgba(255,107,107,0.5); transition: 0.3s;
        }
        .btn-submit:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 12px 30px rgba(255,107,107,0.7); }

        /* Popup Score */
        #scoreModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px);
        }
        .score-card { background: white; border-radius: 25px; padding: 40px; text-align: center; max-width: 500px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .score-card input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ccc; border-radius: 10px; font-size: 1.1rem; text-align: center; font-weight:bold;}
        .score-card h1 { color: #8a2be2; margin-bottom: 10px; font-size: 2rem;}
        #finalResult { display: none; }
        #finalResult h2 { font-size: 3rem; color: #ff4757; }
        .meme-gif { max-width: 100%; border-radius: 15px; margin: 15px 0; }

        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        @keyframes slideDown { from {opacity: 0; transform: translateY(-10px);} to {opacity: 1; transform: translateY(0);} }
        @keyframes popIn { 0% {transform: scale(0.5); opacity: 0;} 100% {transform: scale(1); opacity: 1;} }
        @keyframes shakeError { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
        .shake-anim { animation: shakeError 0.4s ease; }
        
        /* Confetti */
        .confetti { position: fixed; width: 10px; height: 10px; background-color: #f00; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
    </style>
</head>
<body>

<div id="passwordModal">
  <div class="pw-card">
    <span class="pw-crest">🔒</span>
    <div class="pw-title">BẢO MẬT</div>

    <button class="pw-btn" onclick="checkPassword()">XÁC NHẬN</button>
    <div class="pw-err" id="pwErr">Mật khẩu không đúng! Vui lòng thử lại.</div>
  </div>
</div>
<script>
const _k  = [49, 54, 49, 49]; 
const _pw = _k.map(c => String.fromCharCode(c)).join('');

function checkPassword() {
  const inp = document.getElementById('pwInput');
  const err = document.getElementById('pwErr');
  if (inp.value === _pw) {
    document.getElementById('passwordModal').style.display = 'none';
    const main = document.getElementById('mainContent');
    if(main) main.style.display = 'block';
  } else {
    inp.classList.remove('error'); void inp.offsetWidth; inp.classList.add('error');
    err.style.display = 'block'; setTimeout(() => inp.classList.remove('error'), 500);
  }
}
document.addEventListener('DOMContentLoaded', () => {
  const pwInput = document.getElementById('pwInput');
  if(pwInput) pwInput.addEventListener('keydown', e => { if (e.key==='Enter') checkPassword(); });
});
</script>

<script>
// TÍCH HỢP WEB AUDIO API (KHÔNG CẦN FILE MP3 NGOÀI)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    if(type === 'correct') { // "Ding" bell
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
        osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1); // A6
        gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    } else { // "Ting ting" error
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }
}

// HIỆU ỨNG CONFETTI
function fireConfetti() {
    const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#ff69b4'];
    for (let i = 0; i < 50; i++) {
        const conf = document.createElement('div');
        conf.className = 'confetti';
        conf.style.left = Math.random() * 100 + 'vw';
        conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
        document.body.appendChild(conf);
        setTimeout(() => conf.remove(), 3000);
    }
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// ================= DỮ LIỆU BÀI GIẢNG VÀ CÂU HỎI CHUẨN MASTER =================
const passages = [
    {
        id: "p1",
        title: "PASSAGE 1: GREEN SCHOOL DAY",
        paragraphs: [
            {
                eng: "All Grade 9 students are invited to our Green School Day. It includes a short recycling talk and a clean-up at Riverside Park. Please (13) ______ for the event by filling in the online form sent to your class group. We need (14) ______ helpers for each class, so don’t wait too long. Teachers will check attendance, and you will receive a community service stamp for your term record.",
                vie: "Tất cả học sinh Lớp 9 được mời tham gia Ngày hội Trường học Xanh của chúng ta. Sự kiện bao gồm một buổi trò chuyện ngắn về tái chế và hoạt động dọn dẹp tại Công viên Riverside. Vui lòng (13) đăng ký tham gia sự kiện bằng cách điền vào biểu mẫu trực tuyến được gửi đến nhóm lớp của bạn. Chúng tôi cần (14) đủ số lượng người hỗ trợ cho mỗi lớp, vì vậy đừng chờ đợi quá lâu. Giáo viên sẽ điểm danh, và bạn sẽ nhận được một con dấu hoạt động phục vụ cộng đồng cho hồ sơ học kỳ của mình."
            },
            {
                eng: "Meet at the school gate (15) ______ Saturday, 24 January at 7:15 a.m. We will walk to the park together, clean the paths, and sort plastic, paper, and cans. Bring a refillable water bottle and wear comfortable shoes. If you have them, bring (16) ______ to protect your hands while picking up rubbish. The activity ends at 10:00 a.m. If it rains, we will work inside the school hall.",
                vie: "Tập trung tại cổng trường (15) vào Thứ Bảy, ngày 24 tháng 1 lúc 7:15 sáng. Chúng ta sẽ cùng nhau đi bộ đến công viên, dọn dẹp các lối đi, và phân loại nhựa, giấy, và lon. Hãy mang theo một chai nước có thể đổ đầy lại và đi giày thoải mái. Nếu bạn có, hãy mang theo (16) găng tay để bảo vệ tay của bạn trong khi nhặt rác. Hoạt động kết thúc lúc 10:00 sáng. Nếu trời mưa, chúng ta sẽ làm việc bên trong hội trường nhà trường."

        ]
    },
    {
        id: "p2",
        title: "PASSAGE 2: TEEN VOLUNTEERING",
        paragraphs: [
            {
                eng: "Teens may be online a lot, yet an increasing number of them volunteer after school to help others. They sign up through school clubs or community apps, and they usually work in small teams. At first, volunteering looks like extra work, (19) ______ it can be really beneficial. Some teens help at animal shelters, clean a beach, or tutor younger kids, even just one hour a week. These activities let them (20) ______ valuable experience in teamwork and leadership. They also learn to prioritize their time, (21) ______ build friendships with people outside their class.",
                vie: "Thanh thiếu niên có thể lên mạng nhiều, tuy nhiên ngày càng có nhiều em làm tình nguyện sau giờ học để giúp đỡ người khác. Các em đăng ký qua các câu lạc bộ trường học hoặc ứng dụng cộng đồng, và thường làm việc theo nhóm nhỏ. Thoạt đầu, công việc tình nguyện có vẻ như là việc làm thêm, (19) nhưng nó có thể mang lại lợi ích rất lớn. Một số thiếu niên giúp đỡ tại các trạm cứu hộ động vật, dọn dẹp bãi biển, hoặc dạy kèm trẻ nhỏ hơn, dù chỉ một giờ mỗi tuần. Những hoạt động này giúp các em (20) đạt được kinh nghiệm quý giá về làm việc nhóm và lãnh đạo. Các em cũng học cách ưu tiên thời gian của mình, (21) cũng như xây dựng tình bạn với những người ngoài lớp học của mình."
            },
            {
                eng: "Some parents worry volunteering will lower grades; However, most students say they study harder when their days have a clear purpose. Not only does they meet new friends, but (22) ______ problems in their neighborhood that adults sometimes miss. A student (23) ______ at a food bank told me he now understands the word “commitment”. Schools can support this by giving clear rules and safe transport. If teens (24) ______ balance volunteering with homework without burning out, volunteering can help them feel more confident and independent.",
                vie: "Một số phụ huynh lo lắng việc làm tình nguyện sẽ làm giảm điểm số; Tuy nhiên, hầu hết học sinh nói rằng các em học hành chăm chỉ hơn khi mỗi ngày của các em có mục đích rõ ràng. Không chỉ gặp gỡ bạn bè mới, mà (22) các em còn nhìn thấy những vấn đề trong khu phố của mình mà người lớn đôi khi bỏ sót. Một học sinh (23) người tình nguyện hàng tuần tại một ngân hàng thực phẩm nói với tôi rằng em ấy bây giờ đã hiểu từ “sự cam kết”. Các trường học có thể hỗ trợ điều này bằng cách đưa ra các quy tắc rõ ràng và phương tiện di chuyển an toàn. Nếu thanh thiếu niên (24) có thể cân bằng giữa việc làm tình nguyện và bài tập về nhà mà không bị kiệt sức, việc làm tình nguyện có thể giúp các em cảm thấy tự tin và độc lập hơn."

    {
        id: "p3",
        title: "PASSAGE 3: WILD ANIMAL HABITAT LOSS",

let currentScore = 0;
let answeredCount = 0;
const totalQs = questionsData.length;

// Khởi tạo bài đọc
function initReading() {
    const rc = document.getElementById('readingContainer');
    let html = '';
    passages.forEach(p => {
        html += `<div class="glass-panel">
            <h2 class="passage-title">${p.title}</h2>`;
        p.paragraphs.forEach((para, idx) => {
            html += `<div class="paragraph-box">
                <div class="eng-text">${para.eng}</div>
                <button class="btn-translate" onclick="toggleTranslate('${p.id}_${idx}')">Mở dịch đoạn này 🌟</button>
                <div class="vie-text" id="trans_${p.id}_${idx}">${para.vie}</div>
            </div>`;
        });
        html += `</div>`;
    });
    
    // Thêm bảng Glossary vào cuối bài đọc
    html += `<div class="glass-panel">
        <h2 class="passage-title">📚 GLOSSARY (TỪ VỰNG B1-C2)</h2>
        <table class="glossary">
            <tr><th>Từ vựng</th><th>Loại từ</th><th>Nghĩa Tiếng Việt</th></tr>`;
    glossary.forEach(g => {
        html += `<tr><td><strong>${g.word}</strong></td><td>${g.pos}</td><td>${g.mean}</td></tr>`;
    });
    html += `</table></div>`;
    
    rc.innerHTML = html;
}

function toggleTranslate(id) {
    const el = document.getElementById('trans_' + id);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

// Khởi tạo câu hỏi
function initQuestions() {
    const qc = document.getElementById('questionsContainer');
    let html = '';
    questionsData.forEach((q, idx) => {
        html += `<div class="glass-panel" id="qBox_${idx}">
            <div class="q-number">Question ${q.num}</div>
            <div class="q-text">${q.text}</div>
            <div class="options-grid" id="opts_${idx}">`;
        
        let shuffledOpts = shuffleArray([...q.options]);
        shuffledOpts.forEach((opt, optIdx) => {
            // Encode the string to pass via onclick safely
            const optStr = encodeURIComponent(JSON.stringify(opt));
            html += `<button class="opt-btn" id="btn_${idx}_${optIdx}" onclick="checkAnswer(${idx}, ${optIdx}, '${optStr}')">${opt.t}</button>`;
        });
        
        html += `</div><div id="expl_${idx}"></div></div>`;
    });
    qc.innerHTML = html;
}

function checkAnswer(qIdx, optIdx, optStrEncoded) {
    const qBox = document.getElementById(`qBox_${qIdx}`);
    const optsContainer = document.getElementById(`opts_${qIdx}`);
    const explContainer = document.getElementById(`expl_${qIdx}`);
    const btns = optsContainer.querySelectorAll('.opt-btn');
    
    // Parse selected option
    const opt = JSON.parse(decodeURIComponent(optStrEncoded));
    
    // Disable all buttons
    btns.forEach(b => b.classList.add('disabled'));
    
    const selectedBtn = document.getElementById(`btn_${qIdx}_${optIdx}`);
    
    if (opt.c) {
        selectedBtn.classList.add('correct');
        playSound('correct');
        fireConfetti();
        currentScore++;
    } else {
        selectedBtn.classList.add('wrong');
        selectedBtn.classList.add('shake-anim');
        playSound('wrong');
        
        // Find and highlight correct answer
        btns.forEach((b, i) => {
            const currentOptStr = b.getAttribute('onclick').match(/'([^']+)'/)[1];
            const currentOpt = JSON.parse(decodeURIComponent(currentOptStr));
            if(currentOpt.c) b.classList.add('correct');
        });
    }
    
    // Find explanation html from original data
    const realOptData = questionsData[qIdx].options.find(o => o.c === true);
    explContainer.innerHTML = realOptData.html;
    explContainer.querySelector('.explanation').style.display = 'block';
    
    answeredCount++;
}

function showSubmitPopup() {
    if (answeredCount < totalQs) {
        alert(`Con mới làm ${answeredCount}/${totalQs} câu. Hãy làm hết trước khi nộp bài nhé!`);
        return;
    }
    document.getElementById('scoreModal').style.display = 'flex';
}

function processScore() {
    const name = document.getElementById('studentName').value.trim();
    if (!name) { alert("Con quên nhập tên rồi kìa!"); return; }
    
    document.getElementById('nameInputStep').style.display = 'none';
    const finalDiv = document.getElementById('finalResult');
    finalDiv.style.display = 'block';
    
    document.getElementById('resName').innerText = "Học sinh: " + name;
    document.getElementById('resScore').innerText = `Điểm số: ${currentScore} / ${totalQs}`;
    
    const pct = currentScore / totalQs;
    let comment = "";
    let gif = "";
    
    if (pct === 1) {
        comment = "THIÊN TÀI XUẤT HIỆN! Tuyệt vời quá con yêu! 💯🏆";
        gif = "https://media.giphy.com/media/l41lZxzroU33typuU/giphy.gif"; 
    } else if (pct >= 0.6) {
        comment = "Rất Tốt! Ms Mai An rất tự hào về con! 🌟👍";
        gif = "https://media.giphy.com/media/xT0xezQGU5xCDJuCPe/giphy.gif";
    } else {
        comment = "Cố lên con nhé! Đọc kỹ phần giải thích của cô là sẽ giỏi ngay! 💪❤️";
        gif = "https://media.giphy.com/media/2UIcmK4pn7rYNLRboG/giphy.gif";
    }
    
    document.getElementById('resComment').innerText = comment;
    document.getElementById('resGif').src = gif;
}
