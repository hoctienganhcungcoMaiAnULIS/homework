<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Quiz - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Nunito:wght@400;600;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #FDCB6E;
            --accent: #00C9A7;
            --correct: #00D26A;
            --correct-shadow: #00b35a;
            --incorrect: #FF4757;
            --incorrect-shadow: #d93b49;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #2d3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Nền họa tiết hoa và mèo mờ */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' font-size='24'%3E🌸%3C/text%3E%3Ctext x='60' y='80' font-size='24'%3E🐱%3C/text%3E%3Ctext x='40' y='50' font-size='20'%3E🌼%3C/text%3E%3Ctext x='80' y='20' font-size='20'%3E😸%3C/text%3E%3C/svg%3E");
            opacity: 0.25;
            z-index: -1;
            pointer-events: none;
        }

        header {
            text-align: center;
            padding: 15px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 15px;
        }

        /* Thẻ câu hỏi Glassmorphism */
        .question-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }

        .question-title {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.5;
            color: #2c3e50;
        }

        /* Sign & Notice Recreations */
        .sign-box {
            background: #f1f2f6;
            border: 3px solid #2f3640;
            border-radius: 8px;
            padding: 15px;
            margin: 10px auto 20px;
            text-align: center;
            max-width: 300px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }
        .sign-speed { font-weight: 900; font-size: 1.2rem; }
        .sign-speed b { font-size: 2.5rem; display: block; margin-top: 5px;}
        .sign-promo { border: 4px solid #333; background: #fff; text-align: left; padding: 20px; border-radius: 0; }
        .sign-caution { background: #57606f; color: white; font-weight: bold; border-radius: 5px; }
        .sign-round { border-radius: 20px; background: white; border: 2px solid #555; }
        .sign-danger { background: #000; color: #fff; border: 3px solid #fff; outline: 3px solid #000; }
        .sign-bridge { background: #bdc3c7; border: 2px solid #7f8c8d; }
        .sign-noparking { font-size: 4rem; text-align: center; margin-bottom: 15px;}

        /* Options */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .option-btn {
            background: white;
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 15px 20px;
            font-size: 1.08rem;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 6px 0 #dfe6e9;
            transition: all 0.15s ease;
            position: relative;
            outline: none;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.02);
            border-color: var(--accent);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #dfe6e9;
        }

        .option-btn.correct {
            background: var(--correct);
            color: white;
            box-shadow: 0 6px 0 var(--correct-shadow);
            border-color: var(--correct-shadow);
        }

        .option-btn.incorrect {
            background: var(--incorrect);
            color: white;
            box-shadow: 0 6px 0 var(--incorrect-shadow);
            border-color: var(--incorrect-shadow);
            animation: quizShake 0.4s;
        }

        @keyframes quizShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        /* Giải thích */
        .explanation {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 15px;
            border-left: 5px solid var(--primary);
            font-size: 1rem;
            line-height: 1.6;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .vi-translation {
            background: #ffeaa7;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 700;
            color: #d35400;
            margin-bottom: 15px;
            border: 1px dashed #fdcb6e;
        }
        .p-word { color: #0984e3; font-weight: 800; }
        .p-phonetic { background: #e0d4f5; color: #6c5ce7; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .p-mean { color: #e17055; font-weight: 700; }
        .p-grammar { border-bottom: 2px solid #d63031; color: #2d3436; font-weight: 700; }
        .hl-green { color: #00b894; font-weight: 800; }
        .hl-red { color: #d63031; text-decoration: line-through; font-weight: 600; }

        /* Nút Nộp bài */
        #submit-wrap {
            text-align: center;
            margin-top: 40px;
        }

        .action-btn {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 20px;
            box-shadow: 0 8px 0 #4a3f9e;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Quicksand', sans-serif;
            text-transform: uppercase;
        }

        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 0 #4a3f9e; }
        .action-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #4a3f9e; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white; border-radius: 24px; padding: 40px;
            width: 90%; max-width: 450px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-content input {
            width: 100%; padding: 15px; border: 2px solid #dfe6e9;
            border-radius: 12px; font-size: 1.1rem; margin-top: 20px; margin-bottom: 20px;
            outline: none; transition: border 0.3s;
        }
        .modal-content input:focus { border-color: var(--primary); }
        .modal-content input.error { border-color: var(--incorrect); background: #ffeaea; }
        
        .result-gif { width: 100%; border-radius: 15px; margin: 20px 0; max-height: 250px; object-fit: cover;}
        .score-text { font-size: 2.5rem; font-weight: 900; color: var(--primary); margin: 10px 0;}

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

        /* GIAO DIỆN MÀN HÌNH KHÓA (CỦA NGƯỜI DÙNG) */
        #passwordModal {
          position:fixed; inset:0; z-index:9999;
          display:flex; align-items:center; justify-content:center;
          background:rgba(5,2,15,0.92); backdrop-filter:blur(20px);
        }
        .pw-card {
          background:linear-gradient(160deg, rgba(40,10,70,0.95) 0%, rgba(15,5,30,0.98) 100%);
          border:1.5px solid rgba(240,192,64,0.4); border-radius:24px; padding:48px 40px 40px; 
          max-width:440px; width:93%; text-align:center; position:relative; overflow:hidden;
          box-shadow:0 0 60px rgba(106,5,114,0.6), 0 0 120px rgba(240,192,64,0.1), inset 0 1px 0 rgba(240,192,64,0.15);
        }
        .pw-card::before {
          content:''; position:absolute; top:0; left:0; right:0; height:3px;
          background:linear-gradient(90deg, #6A0572, #F0C040, #6A0572);
        }
        .pw-crest { font-size:4rem; margin-bottom:8px; display:block; }
        .pw-title { font-family:'Cinzel', serif; font-size:1.4rem; font-weight:700; color:#F0C040; margin-bottom:6px; letter-spacing:1px; }
        .pw-sub   { font-size:.87rem; color:rgba(200,200,212,0.6); margin-bottom:24px; }
        .pw-input {
          width:100%; padding:13px 20px; border-radius:12px;
          border:1.5px solid rgba(240,192,64,0.3); background:rgba(255,255,255,0.05);
          color:#FFE082; font-size:1rem; font-family:'Nunito', sans-serif;
          outline:none; letter-spacing:3px; text-align:center; transition:all .3s;
        }
        .pw-input:focus { border-color:#F0C040; box-shadow:0 0 0 3px rgba(240,192,64,0.15); }
        .pw-input.error { border-color:#FF4757; box-shadow:0 0 0 3px rgba(255,71,87,0.25); animation:pwShake .4s ease; }
        .pw-input::placeholder { color:rgba(200,200,212,0.3); letter-spacing:1px; }
        .pw-btn {
          width:100%; padding:14px; margin-top:14px; border-radius:12px; border:none;
          background:linear-gradient(135deg, #6A0572 0%, #9B1FA8 40%, #F0C040 100%);
          color:#fff; font-size:1rem; font-weight:700; font-family:'Cinzel', serif;
          cursor:pointer; letter-spacing:.5px; transition:transform .2s;
        }
        .pw-btn:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(106,5,114,0.7); }
        .pw-err { color:#ff8a9a; font-size:.84rem; margin-top:10px; display:none; font-weight:700; }
        @keyframes pwShake { 0%,100%{transform:translateX(0)} 15%,45%,75%{transform:translateX(-6px)} 30%,60%,90%{transform:translateX(6px)} }
    </style>
</head>
<body>

    <div id="passwordModal">
      <div class="pw-card">
        <span class="pw-crest">🔒</span>
        <div class="pw-title">BẢO MẬT</div>
        <div class="pw-sub">Vui lòng nhập mật khẩu để làm bài</div>
        <input type="password" class="pw-input" id="pwInput" placeholder="Nhập mật khẩu..." autocomplete="off" />
        <button class="pw-btn" onclick="checkPassword()">XÁC NHẬN</button>
        <div class="pw-err" id="pwErr">Mật khẩu không đúng! Vui lòng thử lại.</div>
      </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="bg-pattern"></div>
        <canvas id="confetti-canvas"></canvas>

        <header>Giáo viên tạo: Ms Mai An ULIS</header>

        <div class="container" id="quiz-container">
            </div>

        <div id="submit-wrap">
            <button class="action-btn" id="submit-btn" onclick="openNameModal()" style="display:none;">🎯 NỘP BÀI & XEM KẾT QUẢ</button>
        </div>

        <div class="modal-overlay" id="name-modal">
            <div class="modal-content">
                <h2 style="color: #2d3436; font-family: 'Quicksand';">Nhập tên của bạn nhé! 🚀</h2>
                <input type="text" id="student-name" placeholder="Ví dụ: Nguyễn Văn A..." onkeypress="handleEnter(event)">
                <p id="name-error" style="color: red; font-size: 0.9rem; margin-bottom: 10px; display: none;">Bạn chưa nhập tên kìa!</p>
                <button class="action-btn" style="padding: 12px 30px; font-size: 1rem;" onclick="showResults()">XEM ĐIỂM NGAY</button>
            </div>
        </div>

        <div class="modal-overlay" id="result-modal">
            <div class="modal-content">
                <h2 id="result-greeting" style="color: #2d3436; font-family: 'Quicksand';">🌟 THIÊN TÀI!</h2>
                <img id="result-gif" class="result-gif" src="" alt="Result Meme">
                <p style="font-size: 1.2rem; color: #636e72;">Điểm số của bạn là:</p>
                <div class="score-text" id="result-score">0/0</div>
                <button class="action-btn" style="padding: 12px 30px; font-size: 1rem; margin-top: 15px;" onclick="location.reload()">LÀM LẠI BÀI</button>
            </div>
        </div>
    </div>

<script>
    // --- MÃ JAVASCRIPT BẢO MẬT TỪ NGƯỜI DÙNG ---
    const _k  = [49, 54, 49, 49]; 
    const _pw = _k.map(c => String.fromCharCode(c)).join('');

    function checkPassword() {
      const inp = document.getElementById('pwInput');
      const err = document.getElementById('pwErr');
      if (inp.value === _pw) {
        document.getElementById('passwordModal').style.display = 'none';
        const main = document.getElementById('mainContent');
        if(main) main.style.display = 'block';
        
        // Kích hoạt hiệu ứng nếu có
        if(typeof buildStarfield === 'function') buildStarfield();
        if(typeof spawnFloats === 'function') spawnFloats();
        
        // Gắn link file nghe nếu có mã hóa _s
        const audio = document.getElementById('audioPlayer');
        if(audio && typeof _s !== 'undefined') audio.src = atob(_s);
      } else {
        inp.classList.remove('error'); void inp.offsetWidth; inp.classList.add('error');
        err.style.display = 'block'; setTimeout(() => inp.classList.remove('error'), 500);
      }
    }
    document.addEventListener('DOMContentLoaded', () => {
      const pwInput = document.getElementById('pwInput');
      if(pwInput) pwInput.addEventListener('keydown', e => { if (e.key==='Enter') checkPassword(); });
    });


    // --- HỆ THỐNG DỮ LIỆU & LOGIC QUIZ CŨ ---
    const rawQuestions = [
        // ====== EXERCISE 13 ======
        {
            group: "Exercise 13. Mark the letter A, B, C or D to indicate the sentence that is closest in meaning.",
            text: "Question 1. It's a good idea to switch off electrical appliances when they aren't in use.",
            options: [
                { text: "You must switch off electrical appliances when they aren't in use.", isCorrect: false },
                { text: "You should switch off electrical appliances when they aren't in use.", isCorrect: true },
                { text: "You can switch on electrical appliances when they aren't in use.", isCorrect: false },
                { text: "You shouldn't switch off electrical appliances when they aren't in use.", isCorrect: false }
            ],
            explain: `
                <div class='vi-translation'>Thật là một ý kiến hay khi tắt các thiết bị điện khi chúng không được sử dụng.</div>
                <p><b>Phân tích đáp án:</b><br>
                - <span class='p-word'>A</span>: Bạn <span class='p-mean'>phải tắt</span> các thiết bị điện...<br>
                - <span class='p-word'>B</span>: Bạn <span class='p-mean'>nên tắt</span> các thiết bị điện...<br>
                - <span class='p-word'>C</span>: Bạn <span class='p-mean'>có thể bật</span> các thiết bị điện...<br>
                - <span class='p-word'>D</span>: Bạn <span class='p-mean'>không nên tắt</span> các thiết bị điện...
                </p>
                <p><b>Vì sao chọn B:</b> Cấu trúc <span class='p-grammar'>It's a good idea to V</span> (Đó là ý kiến hay/ Nên làm gì) đồng nghĩa với <span class='p-grammar'>should + V</span> (Nên làm gì). <span class='hl-green'>Nên đây là câu đồng nghĩa chính xác nhất.</span></p>
                <p><b>Vì sao các câu khác sai:</b> A sai vì dùng <span class='hl-red'>must</span> (bắt buộc) là quá mạnh. C sai nghĩa động từ <span class='hl-red'>switch on</span> (bật). D sai vì dùng <span class='hl-red'>shouldn't</span> (không nên).</p>
            `
        },
        {
            group: "Exercise 13",
            text: "Question 2. Although coal is the most polluting of fossil fuels, it is still the largest sources of energy worldwide.",
            options: [
                { text: "Despite being the most polluting of fossil fuels, coal is still the largest sources of energy worldwide.", isCorrect: true },
                { text: "Despite the most polluting of fossil fuels, it is still the largest sources of energy worldwide.", isCorrect: false },
                { text: "Despite coal being the most polluting of fossil fuels, it is still the largest sources of energy worldwide.", isCorrect: false },
                { text: "Despite is the most polluting of fossil fuels, coal is still the largest sources of energy worldwide.", isCorrect: false }
            ],
            explain: `
                <div class='vi-translation'>Mặc dù than đá là nhiên liệu hóa thạch gây ô nhiễm nhất, nó vẫn là nguồn năng lượng lớn nhất trên toàn thế giới.</div>
                <p><b>Phân tích đáp án:</b><br>
                - <span class='p-word'>A</span>: <span class='p-mean'>Bất chấp việc là</span> nhiên liệu gây ô nhiễm nhất, than đá vẫn là...<br>
                - <span class='p-word'>B</span>, <span class='p-word'>C</span>, <span class='p-word'>D</span>: Viết sai cấu trúc ngữ pháp cơ bản của "Despite".
                </p>
                <p><b>Vì sao chọn A:</b> Cấu trúc <span class='p-grammar'>Although + Mệnh đề</span> chuyển sang <span class='p-grammar'>Despite + V-ing / Cụm danh từ</span>. Do chủ ngữ 2 vế giống nhau ("coal" và "it"), ta dùng rút gọn V-ing: <span class='hl-green'>Despite being...</span>.</p>
                <p><b>Vì sao các câu khác sai:</b> B thiếu V-ing/Danh từ (<span class='hl-red'>Despite the most...</span> vô nghĩa). C bị lặp và cồng kềnh (<span class='hl-red'>Despite coal being... it is...</span>). D sai vì sau Despite không cộng trực tiếp động từ to be (<span class='hl-red'>Despite is...</span>).</p>
            `
        },
        {
            group: "Exercise 13",
            text: "Question 3. Ben prepared carefully for the casting. He wasn't chosen.",
            options: [
                { text: "Although Ben prepared carefully for the casting, but he wasn't chosen.", isCorrect: false },
                { text: "Ben wasn't chosen for the casting because he prepared carelessly.", isCorrect: false },
                { text: "If Ben prepares more carefully for the casting, he will be chosen.", isCorrect: false },
                { text: "Ben prepared carefully for the casting; however, he wasn't chosen.", isCorrect: true }
            ],
            explain: `
                <div class='vi-translation'>Ben đã chuẩn bị cẩn thận cho buổi thử vai. Anh ấy không được chọn.</div>
                <p><b>Phân tích đáp án:</b><br>
                - <span class='p-word'>A</span>: Mặc dù Ben chuẩn bị cẩn thận, nhưng anh ấy không được chọn.<br>
                - <span class='p-word'>B</span>: Ben không được chọn vì anh ấy chuẩn bị bất cẩn.<br>
                - <span class='p-word'>C</span>: Nếu Ben chuẩn bị cẩn thận hơn, anh ấy sẽ được chọn.<br>
                - <span class='p-word'>D</span>: Ben đã chuẩn bị cẩn thận; tuy nhiên, anh ấy không được chọn.
                </p>
                <p><b>Vì sao chọn D:</b> Hai câu mang nghĩa tương phản. Dùng <span class='p-grammar'>; however,</span> (tuy nhiên) <span class='hl-green'>nối 2 mệnh đề độc lập thể hiện sự tương phản là chính xác về cả ngữ pháp và ngữ nghĩa.</span></p>
                <p><b>Vì sao các câu khác sai:</b> A mắc lỗi ngữ pháp kinh điển: <span class='hl-red'>Although ... but ...</span> (Tiếng Anh không dùng 2 từ nối này trong cùng 1 câu). B sai nghĩa do từ <span class='hl-red'>carelessly</span>. C sai nghĩa, tự ý đổi thành câu điều kiện chưa xảy ra.</p>
            `
        },
        {
            group: "Exercise 13",
            text: "Question 4. How far is it from your house to the school?",
            options: [
                { text: "What is the distance between your house and the school?", isCorrect: true },
                { text: "How long does it take to go from your house to the school?", isCorrect: false },
                { text: "How often do you go from your house to the school?", isCorrect: false }
            ],
            explain: `
                <div class='vi-translation'>Khoảng cách từ nhà bạn đến trường là bao xa?</div>
                <p><b>Phân tích đáp án:</b><br>
                - <span class='p-word'>A</span>: <span class='p-mean'>Khoảng cách</span> giữa nhà bạn và trường là bao nhiêu?<br>

                <div class='vi-translation'>Thông báo này nghĩa là gì? ["Vui lòng sử dụng thùng rác để giữ không gian lễ hội gọn gàng!"]</div>
                <p><b>Phân tích:</b> Từ khóa <span class='p-word'>tidy</span> (gọn gàng) đồng nghĩa với <span class='p-word'>clean</span> (sạch sẽ). <span class='p-word'>Use trash bins</span> = <span class='p-word'>Put trash in bins</span>.</p>
                <p><b>Vì sao chọn B:</b> Viết lại câu y hệt nghĩa gốc: <span class='hl-green'>Bỏ rác vào thùng rác để giữ cho lễ hội sạch sẽ.</span></p>
                <p><b>Vì sao sai:</b> A (<span class='hl-red'>Vứt rác ra đất</span> - xúi bậy). C (<span class='hl-red'>Tránh ăn thức ăn</span> - không liên quan). D (<span class='hl-red'>Mang rác về nhà thay vì dùng thùng</span> - ngược thông báo).</p>

        },

            options: [

            ],
            explain: `

                <p><b>Phân tích:</b> Hành động "tease" (trêu chọc) hoặc "feed" (cho ăn tùy tiện) chính là hành động "disturb" (làm phiền/gây hại) cho thú.</p>
                <p><b>Vì sao chọn C:</b> <span class='hl-green'>Để nhắc nhở du khách không làm phiền động vật.</span> Tổng hợp đúng mục đích của việc cấm trêu chọc.</p>
                <p><b>Vì sao sai:</b> A (<span class='hl-red'>Yêu cầu chụp ảnh</span> - ko nhắc tới). B (<span class='hl-red'>Khuyến khích mang thức ăn</span> - ngược lại biển cấm cho ăn). D (<span class='hl-red'>Mời tới thăm thường xuyên</span> - ko liên quan).</p>
            `
        },
        {
            group: "Exercise 15",
            text: "<div class='sign-box sign-danger'>DANGER! 🐍<br>SNAKES IN THE AREA<br>STAY ALERT</div>What does the sign mean?",
            options: [
                { text: "Be careful! There are dangerous snakes here.", isCorrect: true },
                { text: "You can catch snakes in this area.", isCorrect: false },
                { text: "It is safe to walk around here.", isCorrect: false },
                { text: "Please feed the snakes.", isCorrect: false }
            ],
            explain: `
                <div class='vi-translation'>Biển báo có nghĩa gì? [NGUY HIỂM! CÓ RẮN TRONG KHU VỰC. HÃY CẢNH GIÁC]</div>
                <p><b>Phân tích:</b> <span class='p-word'>Danger</span> (Nguy hiểm) và <span class='p-word'>Stay alert</span> (Cảnh giác) đồng nghĩa với <span class='p-word'>Be careful</span> (Hãy cẩn thận).</p>
                <p><b>Vì sao chọn A:</b> Cảnh báo trực tiếp: <span class='hl-green'>Hãy cẩn thận! Có rắn nguy hiểm ở đây.</span> Rất khớp nghĩa gốc.</p>
                <p><b>Vì sao sai:</b> B (<span class='hl-red'>Bạn có thể bắt rắn</span> - rất liều mạng). C (<span class='hl-red'>Khu vực này an toàn</span> - trái ngược). D (<span class='hl-red'>Vui lòng cho rắn ăn</span> - quá sai).</p>
            `
        },
        {
            group: "Exercise 15",

            options: [
                { text: "You can only use the bridge until June.", isCorrect: false },
                { text: "Repairs to the bridge will start at the end of June.", isCorrect: false },
                { text: "From July on, you can drive across the bridge.", isCorrect: true },

            ],

                <div class='vi-translation'>Thông báo nói gì? [CẦU ĐÓNG CỬA để sửa chữa cho đến cuối THÁNG 6]</div>
                <p><b>Phân tích:</b> Cầu đóng cho TỚI HẾT tháng 6 ("until end JUNE"). Đồng nghĩa với việc hết tháng 6 (tức là sang tháng 7) thì cầu sẽ mở lại.</p>
                <p><b>Vì sao chọn C:</b> <span class='hl-green'>Từ tháng 7 trở đi, bạn có thể lái xe qua cầu.</span> Đây là suy luận logic chuẩn xác nhất từ thông báo.</p>
                <p><b>Vì sao sai:</b> A (<span class='hl-red'>Chỉ dùng được tới tháng 6</span> - sai, tháng 6 đang đóng cửa). B (<span class='hl-red'>Bắt đầu sửa vào cuối tháng 6</span> - sai, sửa TỚI cuối t6). D (<span class='hl-red'>Được phép dùng trong tháng 6</span> - sai hoàn toàn).</p>

        {
            group: "Exercise 15",

            options: [
                { text: "No pedestrian traffic.", isCorrect: false },
                { text: "No playing in the street.", isCorrect: false },
                { text: "No passing allowed.", isCorrect: false },
                { text: "No parking allowed.", isCorrect: true }
            ],
            explain: `
                <div class='vi-translation'>Biển báo này nói gì? [Chữ P bị gạch chéo đỏ]</div>
                <p><b>Phân tích:</b> Chữ <span class='p-word'>P</span> viết tắt cho từ <span class='p-word'>Parking</span> (Đỗ xe). Biển báo gạch chéo là biển cấm.</p>
                <p><b>Vì sao chọn D:</b> <span class='hl-green'>No parking allowed</span> (Không được phép đỗ xe). Đây là kiến thức biển báo giao thông cơ bản.</p>
                <p><b>Vì sao sai:</b> A (<span class='hl-red'>Cấm người đi bộ</span>). B (<span class='hl-red'>Cấm chơi dưới đường</span>). C (<span class='hl-red'>Cấm vượt</span>).</p>
            `
        }
    ];

    let currentScore = 0;
    let answeredCount = 0;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playAudio(isCorrect) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (isCorrect) {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(1318.51, audioCtx.currentTime + 0.1); 
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';

        rawQuestions.forEach((q, qIndex) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            const shuffledOptions = shuffleArray([...q.options]);

            let optionsHtml = '';
            shuffledOptions.forEach((opt, optIndex) => {
                optionsHtml += `<button class="option-btn" onclick="checkAnswer(this, ${qIndex}, ${opt.isCorrect})">${opt.text}</button>`;
            });

            card.innerHTML = `
                <div style="font-size: 0.9rem; color: #8854C0; font-weight: 800; margin-bottom: 8px; text-transform: uppercase;">${q.group}</div>
                <div class="question-title">${q.text}</div>
                <div class="options-grid" id="options-${qIndex}">
                    ${optionsHtml}
                </div>
                <div class="explanation" id="exp-${qIndex}">
                    ${q.explain}
                </div>
            `;
            container.appendChild(card);
        });
    }

    function checkAnswer(btn, qIndex, isCorrect) {
        const grid = document.getElementById(`options-${qIndex}`);
        const buttons = grid.getElementsByTagName('button');
        for(let b of buttons) {
            b.disabled = true;
            b.style.cursor = 'not-allowed';
            if(b.getAttribute('onclick').includes('true')) {
                b.style.borderColor = 'var(--correct)';
                b.style.borderWidth = '3px';
            }
        }

        answeredCount++;
        
        if (isCorrect) {
            btn.classList.add('correct');
            currentScore++;
            playAudio(true);
            fireConfetti();
        } else {
            btn.classList.add('incorrect');
            playAudio(false);
        }

        document.getElementById(`exp-${qIndex}`).style.display = 'block';

        if (answeredCount === rawQuestions.length) {
            document.getElementById('submit-btn').style.display = 'inline-block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    }

    function openNameModal() {
        document.getElementById('name-modal').style.display = 'flex';
        document.getElementById('student-name').focus();
    }

    function handleEnter(e) {
        if(e.key === 'Enter') showResults();
    }

    function showResults() {
        const nameInput = document.getElementById('student-name');
        const name = nameInput.value.trim();
        const err = document.getElementById('name-error');

        if (!name) {
            nameInput.classList.add('error');
            err.style.display = 'block';
            return;
        }

        nameInput.classList.remove('error');
        err.style.display = 'none';

        document.getElementById('name-modal').style.display = 'none';
        
        const total = rawQuestions.length;
        const percentage = currentScore / total;
        
        const greeting = document.getElementById('result-greeting');
        const gif = document.getElementById('result-gif');
        const scoreTxt = document.getElementById('result-score');

        scoreTxt.innerText = `${currentScore} / ${total}`;

        if (percentage === 1) {
            greeting.innerText = `🌟 XUẤT SẮC TUYỆT ĐỐI! ${name} ơi, đỉnh quá!`;
            gif.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif"; 
            fireConfettiBurst();
        } else if (percentage >= 0.6) {
            greeting.innerText = `👏 GIỎI LẮM ${name}! Cố xíu nữa là full điểm rồi!`;
            gif.src = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif"; 
        } else {
            greeting.innerText = `💪 ĐỪNG NẢN LÒNG ${name}! Xem lại kỹ giải thích nhé!`;
            gif.src = "https://media.giphy.com/media/10tIvnxRO9Iqnm/giphy.gif"; 
        }

        document.getElementById('result-modal').style.display = 'flex';
    }

    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];

    function fireConfetti() {
        for(let i=0; i<30; i++) particles.push(createParticle());
    }

    function fireConfettiBurst() {
        for(let i=0; i<150; i++) particles.push(createParticle());
    }

    function createParticle() {
        const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#ff6348'];
        return {
            x: Math.random() * canvas.width,
            y: -20,
            r: Math.random() * 6 + 4,
            dx: Math.random() * 4 - 2,
            dy: Math.random() * 5 + 2,
            color: colors[Math.floor(Math.random() * colors.length)],
            tilt: Math.floor(Math.random() * 10) - 10,
            tiltAngle: 0,
            tiltAngleInc: (Math.random() * 0.07) + 0.05
        };
    }

    function drawConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for(let i=0; i<particles.length; i++) {
            let p = particles[i];
            ctx.beginPath();
            ctx.lineWidth = p.r;
            ctx.strokeStyle = p.color;
            ctx.moveTo(p.x + p.tilt + p.r, p.y);
            ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
            ctx.stroke();
            
            p.y += p.dy;
            p.x += p.dx;
            p.tiltAngle += p.tiltAngleInc;
            p.tilt = Math.sin(p.tiltAngle) * 15;

            if (p.y > canvas.height) {
                particles.splice(i, 1);
                i--;
            }
        }
        requestAnimationFrame(drawConfetti);
    }
    drawConfetti();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    renderQuiz();

</script>
