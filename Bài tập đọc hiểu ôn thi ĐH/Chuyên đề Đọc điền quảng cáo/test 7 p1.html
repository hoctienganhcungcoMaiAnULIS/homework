<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST 7 – ĐỌC ĐIỀN QUẢNG CÁO | Ms Mai An ULIS</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #FF2D78;
  --pink-light: #ff8ab8;
  --cyan: #00E5FF;
  --cyan-dim: rgba(0,229,255,0.15);
  --purple: #7B2FBE;
  --purple-light: #c084fc;
  --yellow: #FFE600;
  --bg: #0d0a1a;
  --bg2: #130f22;
  --bg3: #1a1030;
  --glass: rgba(255,45,120,0.08);
  --glass-border: rgba(255,45,120,0.25);
  --cyan-border: rgba(0,229,255,0.25);
  --text-main: #f0e8ff;
  --text-muted: #9b85c0;
  --card-bg: rgba(19,15,34,0.82);
  --opt-bg: rgba(255,255,255,0.05);
  --opt-hover: rgba(0,229,255,0.12);
  --red: #FF2D78;
  --green: #00FF9D;
  --radius: 18px;
  --radius-sm: 12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text-main);min-height:100vh;overflow:hidden;}

/* BG */
.bg-base{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0d0a1a 0%,#110c2a 35%,#0a1228 70%,#0e0a1e 100%);background-size:300% 300%;animation:bgPulse 18s ease infinite;}
@keyframes bgPulse{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.neon-blob{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:blobDrift ease-in-out infinite;}
@keyframes blobDrift{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-28px) scale(1.07)}}

/* Grid lines */
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.04;
  background-image:linear-gradient(rgba(0,229,255,1) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,1) 1px,transparent 1px);
  background-size:52px 52px;}

.bg-emojis{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.bg-emojis span{position:absolute;opacity:0.09;animation:floatE linear infinite;}
@keyframes floatE{0%{transform:translateY(110vh) rotate(0deg);opacity:0.05}10%{opacity:0.11}90%{opacity:0.09}100%{transform:translateY(-15vh) rotate(360deg);opacity:0.03}}

/* PASSWORD */
#pwOverlay{position:fixed;inset:0;z-index:9999;background:rgba(8,5,18,0.98);display:flex;align-items:center;justify-content:center;}
.pw-card{background:rgba(13,10,26,0.96);border:1.5px solid var(--glass-border);border-radius:26px;padding:2.5rem 2.8rem 2.2rem;text-align:center;max-width:400px;width:90%;box-shadow:0 0 80px rgba(255,45,120,0.18),0 20px 60px rgba(0,0,0,0.6);backdrop-filter:blur(20px);position:relative;overflow:hidden;}
.pw-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,45,120,0.06),rgba(0,229,255,0.04));pointer-events:none;}
.pw-card .lock-icon{font-size:3.2rem;margin-bottom:0.7rem;display:block;}
.pw-card h2{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;color:var(--cyan);margin-bottom:0.25rem;letter-spacing:0.5px;}
.pw-card p{font-size:0.87rem;color:var(--text-muted);margin-bottom:1.4rem;}
#pwInput{width:100%;padding:0.72rem 1.1rem;border-radius:12px;border:1.5px solid rgba(0,229,255,0.3);background:rgba(255,255,255,0.04);color:var(--text-main);font-family:'Nunito',sans-serif;font-size:1rem;outline:none;text-align:center;letter-spacing:3px;transition:border .2s;}
#pwInput:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,45,120,0.15);}
#pwInput.shake{animation:shake .4s;border-color:var(--red);}
#pwError{color:var(--red);font-size:0.86rem;margin-top:.5rem;min-height:1.2em;}
#pwBtn{margin-top:1rem;width:100%;padding:.75rem;border-radius:12px;border:none;background:linear-gradient(90deg,var(--pink),var(--purple));color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.95rem;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 22px rgba(255,45,120,0.4);transition:transform .15s,box-shadow .15s;}
#pwBtn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,45,120,0.55);}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}

/* APP */
#app{display:none;position:relative;z-index:2;height:100vh;flex-direction:column;}
#app.visible{display:flex;}

/* HEADER */
header{background:rgba(8,5,20,0.9);border-bottom:1px solid rgba(0,229,255,0.15);backdrop-filter:blur(16px);padding:.5rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-shrink:0;flex-wrap:wrap;z-index:10;}
.header-title h1{font-family:'Space Grotesk',sans-serif;font-size:1rem;color:var(--cyan);letter-spacing:.5px;}
.header-title p{font-size:.75rem;color:var(--text-muted);}
.header-controls{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
#timerBtn{padding:.4rem 1rem;border-radius:20px;border:1.5px solid var(--cyan);background:rgba(0,229,255,0.08);color:var(--cyan);font-family:'Nunito',sans-serif;font-size:.84rem;font-weight:700;cursor:pointer;transition:all .2s;}
#timerBtn:hover{background:rgba(0,229,255,0.18);}
#timerDisplay{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;color:var(--yellow);min-width:60px;text-align:center;display:none;}
#timerDisplay.danger{color:var(--red);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#pauseBtn{display:none;padding:.35rem .85rem;border-radius:20px;border:1.5px solid var(--yellow);background:rgba(255,230,0,.08);color:var(--yellow);font-size:.8rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;}
.progress-bar-wrap{flex:1;min-width:110px;max-width:200px;}
.progress-label{font-size:.72rem;color:var(--text-muted);margin-bottom:3px;}
.progress-bar{background:rgba(255,255,255,.07);border-radius:10px;height:7px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--cyan));border-radius:10px;transition:width .4s;width:0%;}
#submitBtn{padding:.46rem 1.1rem;border-radius:20px;border:none;background:linear-gradient(90deg,var(--cyan),#00b8cc);color:#0d0a1a;font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:800;cursor:pointer;white-space:nowrap;box-shadow:0 3px 14px rgba(0,229,255,0.35);transition:transform .15s;}
#submitBtn:hover{transform:translateY(-2px);}

/* SPLIT */
.split-screen{display:flex;flex:1;overflow:hidden;}

/* LEFT */
.left-panel{width:46%;flex-shrink:0;overflow-y:auto;overflow-x:hidden;padding:1.2rem 1rem 1.5rem 1.3rem;border-right:1px solid rgba(0,229,255,0.12);scroll-behavior:smooth;}
.left-panel::-webkit-scrollbar{width:5px;}
.left-panel::-webkit-scrollbar-thumb{background:rgba(255,45,120,.3);border-radius:10px;}
.exercise-block{margin-bottom:2rem;}
.exercise-label{display:inline-block;background:linear-gradient(90deg,var(--pink),var(--purple));color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.75rem;padding:.26rem .9rem;border-radius:20px;margin-bottom:.7rem;letter-spacing:.5px;}
.passage-title{font-family:'Space Grotesk',sans-serif;font-size:.98rem;color:var(--yellow);margin-bottom:.4rem;text-align:center;}
.passage-source{font-size:.76rem;color:var(--text-muted);text-align:right;font-style:italic;margin-bottom:.55rem;}
.passage-card{background:rgba(19,15,34,.78);border:1px solid var(--glass-border);border-radius:var(--radius);padding:1rem 1.15rem;font-size:.96rem;line-height:1.88;margin-bottom:.6rem;backdrop-filter:blur(10px);}
.blank{display:inline-block;min-width:85px;padding:0 6px;border-bottom:2px solid var(--cyan);text-align:center;font-weight:800;font-size:.91rem;transition:color .3s,border-color .3s;color:var(--text-muted);}
.blank.correct{color:var(--green);border-color:var(--green);}
.blank.wrong{color:var(--red);border-color:var(--red);text-decoration:line-through;}
.translate-btn{display:block;margin:0 auto .3rem;background:rgba(255,230,0,.09);border:1.5px solid rgba(255,230,0,.35);color:var(--yellow);font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;padding:.3rem 1rem;border-radius:20px;cursor:pointer;transition:all .2s;}
.translate-btn:hover{background:rgba(255,230,0,.2);}
.translation-box{display:none;background:rgba(255,230,0,.06);border:1px solid rgba(255,230,0,.2);border-radius:var(--radius-sm);padding:.75rem 1rem;font-size:.88rem;line-height:1.72;color:#fff8c0;margin-bottom:.65rem;}
.glossary-title{font-family:'Space Grotesk',sans-serif;font-size:.82rem;color:var(--pink);margin:1rem 0 .5rem;letter-spacing:.5px;}
.glossary-table{width:100%;border-collapse:collapse;font-size:.82rem;}
.glossary-table th{background:rgba(255,45,120,.1);color:var(--pink);padding:.38rem .65rem;text-align:left;border-bottom:1px solid rgba(255,45,120,.2);}
.glossary-table td{padding:.35rem .65rem;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:top;}
.glossary-table tr:hover td{background:rgba(255,45,120,.04);}
.word-cell{font-weight:800;color:var(--cyan);}
.pos-cell{color:var(--yellow);font-style:italic;}
.vi-cell{color:var(--text-muted);}

/* RIGHT */
.right-panel{flex:1;overflow-y:auto;overflow-x:hidden;padding:1.2rem 1.3rem 1.5rem 1rem;scroll-behavior:smooth;}
.right-panel::-webkit-scrollbar{width:5px;}
.right-panel::-webkit-scrollbar-thumb{background:rgba(255,45,120,.25);border-radius:10px;}
.q-section-title{font-family:'Space Grotesk',sans-serif;font-size:.82rem;color:var(--pink);margin-bottom:.8rem;margin-top:.5rem;border-left:3px solid var(--cyan);padding-left:.65rem;letter-spacing:.5px;}
.question-card{background:var(--card-bg);border:1px solid var(--glass-border);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:.85rem;backdrop-filter:blur(10px);transition:box-shadow .2s,border-color .2s;}
.question-card:hover{box-shadow:0 0 0 1px rgba(0,229,255,.25),0 6px 24px rgba(255,45,120,.1);}
.q-number{display:inline-block;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.72rem;padding:.15rem .6rem;border-radius:20px;margin-bottom:.5rem;letter-spacing:.5px;}
.q-text{font-size:.97rem;font-weight:700;color:var(--text-main);margin-bottom:.7rem;line-height:1.55;}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:.46rem;}
.option-btn{background:var(--opt-bg);border:1.5px solid rgba(255,45,120,.18);border-radius:var(--radius-sm);padding:.46rem .7rem;color:var(--text-main);font-family:'Nunito',sans-serif;font-size:.91rem;font-weight:600;cursor:pointer;text-align:left;line-height:1.4;transition:all .18s;}
.option-btn:hover:not(:disabled){background:var(--opt-hover);border-color:var(--cyan);transform:translateY(-1px);}
.option-btn:disabled{cursor:default;}
.option-btn.correct{background:rgba(0,255,157,.14);border-color:var(--green);color:var(--green);}
.option-btn.wrong{background:rgba(255,45,120,.16);border-color:var(--red);color:var(--red);}
.option-btn.correct-reveal{background:rgba(0,255,157,.1);border-color:var(--green);color:var(--green);animation:pgr .5s;}
.option-btn.shake{animation:shake .4s;}
@keyframes pgr{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 4px rgba(0,255,157,.3)}}
.opt-letter{display:inline-block;font-family:'Space Grotesk',sans-serif;font-size:.72rem;margin-right:5px;color:var(--cyan);}
.option-btn.correct .opt-letter,.option-btn.correct-reveal .opt-letter{color:var(--green);}
.option-btn.wrong .opt-letter{color:var(--red);}
.explanation-box{display:none;margin-top:.7rem;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);padding:.8rem .9rem;font-size:.87rem;line-height:1.72;}
.exp-q-vi{color:var(--yellow);font-weight:700;margin-bottom:.5rem;font-size:.88rem;}
.exp-option{margin:.2rem 0;}
.correct-tag{color:var(--green);font-weight:800;}
.wrong-tag{color:var(--red);font-weight:700;}
.exp-evidence{margin-top:.55rem;background:rgba(0,229,255,.06);border-left:3px solid var(--cyan);padding:.5rem .7rem;border-radius:0 8px 8px 0;}
.ev-label{font-size:.76rem;color:var(--cyan);font-weight:700;margin-bottom:.22rem;}
.ev-en{color:var(--text-main);font-style:italic;}
.ev-vi{color:#fff8c0;margin-top:.18rem;}
.kw{color:var(--red);font-weight:900;}

/* TIMEOUT */
#timeoutBanner{display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(255,45,120,.95);color:#fff;padding:.65rem 1.4rem;border-radius:12px;font-size:.87rem;font-weight:700;z-index:100;max-width:92vw;text-align:center;line-height:1.5;box-shadow:0 4px 22px rgba(255,45,120,.45);}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(5,3,15,.9);align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.modal-overlay.active{display:flex;}
.modal-card{background:rgba(13,10,26,.97);border:1.5px solid var(--glass-border);border-radius:24px;padding:2rem 2.3rem;max-width:420px;width:92%;text-align:center;box-shadow:0 0 80px rgba(255,45,120,.18),0 24px 60px rgba(0,0,0,.6);}
.modal-card h2{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;color:var(--cyan);margin-bottom:.5rem;}
.modal-card p{color:var(--text-muted);font-size:.88rem;margin-bottom:1.2rem;}
#nameInput{width:100%;padding:.7rem 1rem;border-radius:12px;border:1.5px solid rgba(0,229,255,.3);background:rgba(255,255,255,.05);color:var(--text-main);font-family:'Nunito',sans-serif;font-size:1rem;outline:none;}
#nameInput:focus{border-color:var(--pink);}
#nameInput.err{border-color:var(--red);}
#nameError{color:var(--red);font-size:.82rem;margin-top:.4rem;min-height:1.1em;}
#nameSubmitBtn{margin-top:1rem;width:100%;padding:.7rem;border-radius:12px;border:none;background:linear-gradient(90deg,var(--pink),var(--purple));color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.95rem;cursor:pointer;box-shadow:0 4px 18px rgba(255,45,120,.35);transition:transform .15s;}
#nameSubmitBtn:hover{transform:translateY(-2px);}
#resultModal .modal-card{max-width:480px;}
.result-title{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;color:var(--cyan);margin-bottom:.35rem;line-height:1.35;}
.result-score{font-family:'Space Grotesk',sans-serif;font-size:3.4rem;background:linear-gradient(90deg,var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:.4rem 0;}
.result-comment{font-size:.97rem;color:var(--text-main);margin-bottom:1rem;line-height:1.65;}
.result-meme{width:100%;max-height:180px;object-fit:contain;border-radius:12px;margin-bottom:1rem;}
.result-btns{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;}
.result-btn{padding:.56rem 1.3rem;border-radius:20px;border:none;font-family:'Space Grotesk',sans-serif;font-size:.82rem;cursor:pointer;transition:transform .15s;}
.result-btn:hover{transform:translateY(-2px);}
.btn-retry{background:linear-gradient(90deg,var(--pink),var(--purple));color:#fff;}
.btn-review{background:rgba(255,255,255,.08);color:var(--text-main);border:1.5px solid var(--glass-border);}
.confetti-piece{position:fixed;pointer-events:none;z-index:9999;animation:cfFall 1.2s ease forwards;}
@keyframes cfFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(200px) rotate(720deg)}}

@media(max-width:700px){
  .split-screen{flex-direction:column;overflow-y:auto}
  .left-panel,.right-panel{width:100%;overflow:visible}
  .left-panel{border-right:none;border-bottom:1px solid rgba(0,229,255,.12)}
  body{overflow:auto} #app.visible{height:auto;overflow:auto}
  .options-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="bg-base"></div>
<div class="bg-grid"></div>
<div class="neon-blob" style="width:380px;height:380px;background:#FF2D78;top:-100px;left:-80px;opacity:.1;animation-duration:10s;"></div>
<div class="neon-blob" style="width:320px;height:320px;background:#00E5FF;bottom:-80px;right:-60px;opacity:.09;animation-duration:13s;animation-delay:-5s;"></div>
<div class="neon-blob" style="width:220px;height:220px;background:#7B2FBE;top:45%;left:45%;opacity:.08;animation-duration:16s;animation-delay:-8s;"></div>
<div class="bg-emojis" id="bgEmojis"></div>

<!-- Password -->
<div id="pwOverlay">
  <div class="pw-card">
    <span class="lock-icon">🎵</span>
    <h2>TEST 7 – ĐỌC ĐIỀN QUẢNG CÁO</h2>
    <p>Ms Mai An ULIS · Nhập mật khẩu để bắt đầu</p>
    <input type="password" id="pwInput" placeholder="Mật khẩu..." autocomplete="off">
    <div id="pwError"></div>
    <button id="pwBtn">⚡ KHỞI ĐỘNG</button>
  </div>
</div>

<!-- Name Modal -->
<div class="modal-overlay" id="nameModal">
  <div class="modal-card">
    <h2>NHẬP TÊN</h2>
    <p>Để cá nhân hóa kết quả bài thi nha!</p>
    <input type="text" id="nameInput" placeholder="Ví dụ: Nguyễn Văn A..." maxlength="50">
    <div id="nameError"></div>
    <button id="nameSubmitBtn">✅ XEM KẾT QUẢ</button>
  </div>
</div>

<!-- Result Modal -->
<div class="modal-overlay" id="resultModal">
  <div class="modal-card">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-comment" id="resultComment"></div>
    <img class="result-meme" id="resultMeme" src="" alt="" onerror="this.style.display='none'">
    <div class="result-btns">
      <button class="result-btn btn-retry" onclick="location.reload()">🔄 Làm lại</button>
      <button class="result-btn btn-review" onclick="document.getElementById('resultModal').classList.remove('active')">👀 Xem lại bài</button>
    </div>
  </div>
</div>

<div id="timeoutBanner">⏰ Đã hết giờ! Trong phòng thi thật, hãy hoàn thành bài đọc điền trong 10 phút nhé.</div>

<!-- App -->
<div id="app">
  <header>
    <div class="header-title">
      <h1>TEST 7 – ĐỌC ĐIỀN QUẢNG CÁO</h1>
      <p>Giáo viên: Ms Mai An ULIS</p>
    </div>
    <div class="header-controls">
      <button id="timerBtn" onclick="startTimer()">⏱ Bắt đầu tính giờ</button>
      <div id="timerDisplay">10:00</div>
      <button id="pauseBtn" onclick="togglePause()">⏸ Tạm dừng</button>
      <div class="progress-bar-wrap">
        <div class="progress-label">Tiến độ: <span id="progressText">0/18</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <button id="submitBtn" onclick="openNameModal()">🎯 Nộp bài</button>
    </div>
  </header>
  <div class="split-screen">
    <div class="left-panel" id="leftPanel"></div>
    <div class="right-panel" id="rightPanel"></div>
  </div>
</div>

<script>
// Password (ASCII)
const _k=[99,111,109,97,105,97,110,117,108,105,115];
const _p=_k.map(c=>String.fromCharCode(c)).join('');
document.getElementById('pwBtn').addEventListener('click',checkPW);
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPW();});
function checkPW(){
  const v=document.getElementById('pwInput').value;
  if(v===_p){document.getElementById('pwOverlay').style.display='none';document.getElementById('app').classList.add('visible');buildApp();}
  else{
    document.getElementById('pwError').textContent='❌ Mật khẩu không đúng. Vui lòng thử lại!';
    const inp=document.getElementById('pwInput');inp.classList.remove('shake');void inp.offsetWidth;inp.classList.add('shake');inp.value='';setTimeout(()=>inp.classList.remove('shake'),500);
  }
}

// BG emojis
(function(){
  const emojis=['🎵','🏋️','🥤','🎧','🌟','🎬','🎶','🏙️','✨','🎤','💿','🍫','🎉','🌃','🎆','🎇','🎼','💪'];
  const c=document.getElementById('bgEmojis');
  for(let i=0;i<18;i++){
    const e=document.createElement('span');e.textContent=emojis[i%emojis.length];
    e.style.cssText=`left:${Math.random()*100}%;font-size:${1.3+Math.random()*1.7}rem;animation-duration:${18+Math.random()*22}s;animation-delay:${Math.random()*20}s;`;
    c.appendChild(e);
  }
})();

function shuffleArray(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

// ===== DATA =====
const rawQ=[
  {

let answered={},timerInterval=null,timeLeft=600,timerRunning=false,studentName='';

function buildApp(){buildLeft();buildRight();}

function buildLeft(){
  const p=document.getElementById('leftPanel');p.innerHTML='';
  passages.forEach(pass=>{
    const block=document.createElement('div');block.className='exercise-block';
    let html=`<div class="exercise-label">${pass.label}</div>
<div class="passage-title">⚡ ${pass.title}</div>`;
    pass.paragraphs.forEach((para,idx)=>{
      const uid=`${pass.exNum}_${idx}`;
      html+=`<div class="passage-card">${para.text}</div>
<button class="translate-btn" onclick="toggleTr('tr_${uid}',this)">🌟 Mở dịch đoạn này</button>
<div class="translation-box" id="tr_${uid}">${para.translation}</div>`;
    });
    html+=`<div class="passage-source">${pass.source}</div>
<div class="glossary-title">⚡ Từ vựng – ${pass.title}</div>
<table class="glossary-table"><thead><tr><th>Từ vựng</th><th>Loại từ</th><th>Nghĩa</th></tr></thead><tbody>`;
    pass.glossary.forEach(g=>{html+=`<tr><td class="word-cell">${g.word}</td><td class="pos-cell">${g.pos}</td><td class="vi-cell">${g.vi}</td></tr>`;});
    html+=`</tbody></table>`;
    block.innerHTML=html;p.appendChild(block);
  });
}

function buildRight(){
  const p=document.getElementById('rightPanel');p.innerHTML='';
  const sec={1:'Exercise 1 – Control Your Weight with Our Special Offer',7:'Exercise 2 – Experience the Magic of "Die With A Smile"',13:'Exercise 3 – "Glamour Thang Long" in Hanoi'};
  questions.forEach(q=>{
    if(sec[q.id]){const s=document.createElement('div');s.className='q-section-title';s.textContent=sec[q.id];p.appendChild(s);}
    const card=document.createElement('div');card.className='question-card';card.id=`qcard_${q.id}`;
    let opts='';
    q.options.forEach(o=>{opts+=`<button class="option-btn" id="opt_${q.id}_${o.letter}" onclick="sel(${q.id},'${o.letter}',this)"><span class="opt-letter">${o.letter}.</span> ${o.text}</button>`;});
    card.innerHTML=`<div class="q-number">Câu ${q.id}</div><div class="q-text">${q.qText}</div><div class="options-grid" id="opts_${q.id}">${opts}</div><div class="explanation-box" id="exp_${q.id}"></div>`;
    p.appendChild(card);
  });
}

function sel(qId,letter,btn){
  if(answered[qId])return;
  const q=questions.find(x=>x.id===qId);
  const ok=letter===q.correct;
  document.querySelectorAll(`#opts_${qId} .option-btn`).forEach(b=>b.disabled=true);
  answered[qId]={selected:letter,correct:ok};
  updateProgress();
  if(ok){btn.classList.add('correct');playOK();spawnConfetti(btn);setBlank(qId,q.options.find(o=>o.letter===letter).text,true,false);}
  else{
    btn.classList.add('wrong','shake');playFail();
    setBlank(qId,q.options.find(o=>o.letter===letter).text,false,false);
    setTimeout(()=>setBlank(qId,q.options.find(o=>o.letter===q.correct).text,false,true),600);
    setTimeout(()=>{const cb=document.getElementById(`opt_${qId}_${q.correct}`);if(cb)cb.classList.add('correct-reveal');},120);
  }
  showExp(qId,q);
}

function setBlank(qId,text,correct,fix){
  const el=document.getElementById(`b${qId}`);if(!el)return;
  el.textContent=text;el.className='blank';el.classList.add(correct||fix?'correct':'wrong');
}

function showExp(qId,q){
  const box=document.getElementById(`exp_${qId}`);
  let html=`<div class="exp-q-vi">💬 ${q.qVi}</div>`;
  q.options.forEach(o=>{const isC=o.letter===q.correct;html+=`<div class="exp-option"><span class="${isC?'correct-tag':'wrong-tag'}">${o.letter}. ${o.text}</span> — ${q.explanations[o.letter]||''}</div>`;});
  html+=`<div class="exp-evidence"><div class="ev-label">🔍 Dẫn chứng trong bài:</div><div class="ev-en">${q.evidenceEn}</div><div class="ev-vi">👉 ${q.evidenceVi}</div></div>`;
  box.innerHTML=html;box.style.display='block';
}

function toggleTr(id,btn){
  const b=document.getElementById(id);
  if(b.style.display==='block'){b.style.display='none';btn.textContent='🌟 Mở dịch đoạn này';}
  else{b.style.display='block';btn.textContent='🔼 Ẩn bản dịch';}
}
function updateProgress(){
  const c=Object.keys(answered).length;
  document.getElementById('progressText').textContent=`${c}/18`;
  document.getElementById('progressFill').style.width=`${c/18*100}%`;
}

function startTimer(){
  document.getElementById('timerBtn').style.display='none';
  document.getElementById('timerDisplay').style.display='block';
  document.getElementById('pauseBtn').style.display='inline-block';
  timerRunning=true;timerInterval=setInterval(tick,1000);
}
function tick(){
  if(!timerRunning)return;timeLeft--;
  const m=Math.floor(Math.max(0,timeLeft)/60),s=Math.max(0,timeLeft)%60;
  document.getElementById('timerDisplay').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if(timeLeft<=60)document.getElementById('timerDisplay').classList.add('danger');
  if(timeLeft<=0){
    clearInterval(timerInterval);
    const tb=document.getElementById('timeoutBanner');tb.style.display='block';
    document.getElementById('pauseBtn').style.display='none';
    setTimeout(()=>tb.style.display='none',12000);
  }
}
function togglePause(){
  timerRunning=!timerRunning;
  document.getElementById('pauseBtn').textContent=timerRunning?'⏸ Tạm dừng':'▶️ Tiếp tục';
}

function openNameModal(){document.getElementById('nameModal').classList.add('active');document.getElementById('nameInput').focus();}
document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmName();});
document.getElementById('nameSubmitBtn').addEventListener('click',confirmName);
function confirmName(){
  const v=document.getElementById('nameInput').value.trim();
  if(!v){document.getElementById('nameError').textContent='⚠️ Vui lòng nhập tên trước!';document.getElementById('nameInput').classList.add('err');return;}
  studentName=v;document.getElementById('nameModal').classList.remove('active');showResult();
}
function showResult(){
  const score=Object.values(answered).filter(a=>a.correct).length,pct=score/18*100;
  let title,comment,gif;
  if(pct===100){title=`⚡ PERFECT! ${studentName} hoàn hảo tuyệt đối!`;comment=`Toàn bộ 18/18 câu đúng! Đây là thành tích đỉnh cao. Ms Mai An tự hào về bạn lắm! 🎉`;gif='https://media.giphy.com/media/26u4cqiYI30juCOGY/giphy.gif';}
  else if(pct>=60){title=`⚡ GREAT JOB, ${studentName}!`;comment=`Bạn đạt ${score}/18 câu đúng. Còn một chút nữa là hoàn hảo! Ôn lại phần giải thích nhé. 💪`;gif='https://media.giphy.com/media/xT9IgG50Lg7rusQ5y8/giphy.gif';}
  else{title=`⚡ KEEP GOING, ${studentName}!`;comment=`Bạn đạt ${score}/18 câu. Đừng nản! Đọc giải thích kỹ rồi thử lại, bạn làm được! 🚀`;gif='https://media.giphy.com/media/d2lcHJTG5Tscg/giphy.gif';}
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultScore').textContent=`${score} / 18`;
  document.getElementById('resultComment').textContent=comment;
  document.getElementById('resultMeme').src=gif;
  document.getElementById('resultModal').classList.add('active');
}

let _ctx=null;
function getCtx(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();return _ctx;}
function playOK(){try{const c=getCtx();[[523,0],[659,.1],[784,.2],[1047,.3]].forEach(([f,d])=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.15,c.currentTime+d);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d+.28);o.start(c.currentTime+d);o.stop(c.currentTime+d+.32);});}catch(e){}}
function playFail(){try{const c=getCtx();[[320,0],[260,.1],[200,.22]].forEach(([f,d])=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(.11,c.currentTime+d);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d+.2);o.start(c.currentTime+d);o.stop(c.currentTime+d+.25);});}catch(e){}}

function spawnConfetti(el){
  const r=el.getBoundingClientRect();
  const cols=['#FF2D78','#00E5FF','#7B2FBE','#FFE600','#00FF9D','#FF6B9D','#c084fc','#67e8f9'];
  for(let i=0;i<40;i++){
    const c=document.createElement('div');c.className='confetti-piece';
    c.style.left=(r.left+r.width/2+(Math.random()-.5)*100)+'px';
    c.style.top=(r.top+r.height/2+(Math.random()-.5)*40)+'px';
    c.style.background=cols[Math.floor(Math.random()*cols.length)];
    c.style.width=(7+Math.random()*8)+'px';c.style.height=(7+Math.random()*8)+'px';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    c.style.animationDuration=(.8+Math.random()*.6)+'s';
    c.style.animationDelay=(Math.random()*.15)+'s';
    document.body.appendChild(c);setTimeout(()=>c.remove(),1500);
  }
}
