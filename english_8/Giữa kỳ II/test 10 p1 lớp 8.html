<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teddy Bear Quiz - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Bảng màu Teddy Bear Theme */
            --primary: #8B4513; /* Nâu đất (SaddleBrown) */
            --secondary: #F4A460; /* Cam đất sáng (SandyBrown) */
            --accent: #D2691E; /* Nâu cam (Chocolate) */
            --danger: #FF6B6B; /* Đỏ pastel (Sai) */
            --success: #6BCB77; /* Xanh pastel (Đúng) */
            --glass-bg: rgba(255, 250, 240, 0.65); /* Trắng kem trong suốt */
            --glass-border: rgba(139, 69, 19, 0.2);
            --text-dark: #4A2E15; /* Nâu đậm */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', 'Quicksand', sans-serif;
        }

        body {
            /* Nền Gradient loang mượt mà tông ấm */
            background: linear-gradient(-45deg, #DEB887, #FFDAB9, #FFE4C4, #F5DEB3);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Họa tiết lơ lửng (Gấu, chân gấu, mật ong, trái tim) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' font-size='24'%3E🧸%3C/text%3E%3Ctext x='80' y='80' font-size='20'%3E🐾%3C/text%3E%3Ctext x='40' y='60' font-size='22'%3E🍯%3C/text%3E%3Ctext x='90' y='20' font-size='18'%3E🍂%3C/text%3E%3Ctext x='20' y='100' font-size='20'%3E🤎%3C/text%3E%3C/svg%3E");
            background-size: 250px 250px;
            opacity: 0.5;
            z-index: -1;
            animation: floatingPattern 35s linear infinite;
            pointer-events: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatingPattern {
            from { background-position: 0 0; }
            to { background-position: 500px 500px; }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h3 {
            font-size: 1.3rem;
            font-weight: 900;
            color: #fff;
            background: var(--primary);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.4);
            border: 2px solid #fff;
        }

        .quiz-container {
            max-width: 850px;
            margin: 0 auto;
        }

        /* Thẻ câu hỏi Kính mờ */
        .question-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(139, 69, 19, 0.15);
            transition: transform 0.3s ease;
        }

        .instruction {
            font-size: 0.95rem;
            color: #8B4513;
            font-style: italic;
            margin-bottom: 12px;
            font-weight: 700;
            background: rgba(255,255,255,0.5);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 900;
            margin-bottom: 25px;
            line-height: 1.6;
            color: var(--text-dark);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        @media(max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .option-btn {
            background: #ffffff;
            border: 3px solid #F4A460;
            border-radius: 20px;
            padding: 16px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            cursor: pointer;
            box-shadow: 0 6px 0 #D2691E;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 8px 0 #D2691E;
            background: #FFF8DC;
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #D2691E;
        }

        .option-btn.correct {
            background: var(--success) !important;
            color: white;
            border-color: #2E8B57;
            box-shadow: 0 6px 0 #2E8B57 !important;
        }

        .option-btn.incorrect {
            background: var(--danger) !important;
            color: white;
            border-color: #B22222;
            box-shadow: 0 6px 0 #B22222 !important;
            animation: shake 0.5s;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.85;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px) rotate(-1deg); }
            40%, 80% { transform: translateX(6px) rotate(1deg); }
        }

        /* Khung Giải thích Siêu Chi tiết */
        .explanation {
            display: none;
            margin-top: 25px;
            padding: 20px 25px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            border-left: 6px solid var(--accent);
            font-size: 1.05rem;
            line-height: 1.6;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            animation: slideDown 0.4s ease-out;
            color: #333;
        }

        .explanation h4 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .explanation ul { margin-left: 25px; margin-bottom: 12px; }
        .explanation li { margin-bottom: 6px; }
        
        .explanation-step { margin-bottom: 15px; }
        .step-title { font-weight: 800; color: #D2691E; background: #FFF8DC; padding: 2px 8px; border-radius: 8px; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .submit-btn {
            display: block;
            width: 100%;
            max-width: 320px;
            margin: 40px auto;
            padding: 18px 30px;
            font-size: 1.4rem;
            font-weight: 900;
            color: white;
            background: var(--primary);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 0 #5C2E0B;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .submit-btn:hover {
            transform: scale(1.05);
            background: #A0522D;
        }
        .submit-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #5C2E0B;
        }

        /* Vẽ biển báo bằng CSS (Question 29) */
        .sign-no-food {
            background: white;
            border: 8px solid #E63946;
            border-radius: 15px;
            width: 200px;
            text-align: center;
            padding: 10px;
            margin: 15px auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-family: Arial, sans-serif;
        }
        .sign-no-food .circle-slash {
            position: relative;
            width: 100px;
            height: 100px;
            border: 8px solid #E63946;
            border-radius: 50%;
            margin: 0 auto 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            overflow: hidden;
        }
        .sign-no-food .circle-slash::after {
            content: '';
            position: absolute;
            width: 120%;
            height: 8px;
            background: #E63946;
            transform: rotate(-45deg);
        }
        .sign-no-food .text-bold {
            font-size: 20px;
            font-weight: 900;
            line-height: 1.1;
            color: black;
        }

        /* Vẽ notice bằng CSS (Question 30) */
        .notice-board {
            background: white;
            border: 2px solid #2B2D42;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.1);
            font-family: 'Times New Roman', serif;
        }
        .notice-board p {
            color: red;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: left;
            margin: 0;
            line-height: 1.4;
        }

        /* Confetti Container */
        #confetti-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999;
        }
        .confetti {
            position: absolute; width: 12px; height: 12px;
            border-radius: 50%;
            animation: fall 2.5s linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; }
        }

        /* Popup Điểm */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(74, 46, 21, 0.7); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        .score-popup {
            background: #FFF8DC; padding: 40px; border-radius: 35px;
            text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            max-width: 450px; width: 90%;
            border: 5px solid var(--secondary);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .score-popup h2 { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
        .score-popup .points { font-size: 4.5rem; font-weight: 900; color: var(--success); margin: 20px 0; text-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
        .score-popup button {
            background: var(--primary); color: white; border: none; padding: 15px 35px;
            font-size: 1.3rem; border-radius: 25px; font-weight: 900; cursor: pointer;
            box-shadow: 0 6px 0 #5C2E0B;
            transition: all 0.2s;
        }
        .score-popup button:hover { transform: scale(1.05); }
        .score-popup button:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }
        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="confetti-container"></div>

    <div class="header">
        <h3>🧸 Giáo viên tạo: Ms Mai An ULIS 🍯</h3>
    </div>

    <div class="quiz-container" id="quiz-container">
        </div>

    <button class="submit-btn" onclick="showScore()">NỘP BÀI 🐾</button>

    <div class="overlay" id="score-overlay">
        <div class="score-popup">
            <h2>Hoàn Thành! 🧸</h2>
            <p id="score-message" style="font-size: 1.2rem; font-weight: bold; color: #8B4513;">Gấu nhỏ làm bài rất tốt!</p>
            <div class="points" id="score-points">0/20</div>
            <button onclick="document.getElementById('score-overlay').style.display='none'">Xem Lại Bài</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                id: 1,
                instruction: "Mark the letter A, B, C or D on your answer sheet to indicate the word whose underlined part differs from the other three in pronunciation.",
                question: "Question 1:",
                options: [
                    { text: "acc<u>e</u>ss", isCorrect: false },
                    { text: "c<u>e</u>ntre", isCorrect: false },
                    { text: "mark<u>e</u>t", isCorrect: true },
                    { text: "w<u>e</u>ll-lit", isCorrect: false }
                ],
                explanation: `
                    <div class="explanation-step"><span class="step-title">1. Dịch yêu cầu:</span> Chọn từ có phần gạch chân phát âm khác với ba từ còn lại.</div>
                    <div class="explanation-step"><span class="step-title">2. Phân tích 4 đáp án:</span>
                        <ul>
                            <li><b>A. access</b> (n/v): Lối vào / Truy cập. Chữ 'e' phát âm là âm /e/ (hoặc đôi khi âm schwa nhẹ tùy giọng, nhưng gốc là /es/).</li>
                            <li><b>B. centre</b> (n): Trung tâm. Chữ 'e' phát âm là âm /e/ (/ˈsentə/).</li>
                            <li><b>C. market</b> (n): Chợ. Chữ 'e' phát âm là âm /ɪ/ (/ˈmɑːkɪt/).</li>
                            <li><b>D. well-lit</b> (adj): Sáng sủa. Chữ 'e' phát âm là âm /e/ (/wel/).</li>
                        </ul>
                    </div>
                    <div class="explanation-step"><span class="step-title">3. Tại sao chọn C?</span> Vì chữ 'e' trong "market" phát âm là âm ngắn <b>/ɪ/</b>.</div>
                    <div class="explanation-step"><span class="step-title">4. Tại sao 3 đáp án kia sai?</span> Vì phần gạch chân ở 3 từ còn lại đều được phát âm là âm <b>/e/</b>.</div>
                `
            },
            {
                id: 2,
                instruction: "Mark the letter A, B, C or D on your answer sheet to indicate the word whose underlined part differs from the other three in pronunciation.",
                question: "Question 2:",
                options: [
                    { text: "ret<u>u</u>rn", isCorrect: false },
                    { text: "f<u>u</u>rther", isCorrect: false },
                    { text: "sched<u>u</u>le", isCorrect: true },
                    { text: "p<u>u</u>rchase", isCorrect: false }
                ],
                explanation: `
                    <div class="explanation-step"><span class="step-title">1. Dịch yêu cầu:</span> Chọn từ có phần gạch chân phát âm khác với ba từ còn lại.</div>
                    <div class="explanation-step"><span class="step-title">2. Phân tích 4 đáp án:</span>
                        <ul>
                            <li><b>A. return</b> (v/n): Trở về. Chữ 'u' phát âm là âm /ɜː/ (/rɪˈtɜːn/).</li>
                            <li><b>B. further</b> (adj/adv): Xa hơn. Chữ 'u' phát âm là âm /ɜː/ (/ˈfɜːðə/).</li>
                            <li><b>C. schedule</b> (n): Lịch trình. Chữ 'u' phát âm là âm /uː/ hoặc /ʊ/ hoặc /ə/ tùy vùng, nhưng phổ biến là /uː/ (/ˈʃedʒuːl/).</li>
                            <li><b>D. purchase</b> (v/n): Mua sắm. Chữ 'ur' phát âm là âm /ɜː/ (/ˈpɜːtʃəs/).</li>
                        </ul>
                    </div>
                    <div class="explanation-step"><span class="step-title">3. Tại sao chọn C?</span> Chữ 'u' trong "schedule" phát âm tạo thành âm /uː/ (hoặc u ngắn).</div>
                    <div class="explanation-step"><span class="step-title">4. Tại sao 3 đáp án kia sai?</span> Vì chữ 'u' kết hợp với 'r' ở 3 đáp án còn lại đều tạo thành âm dài <b>/ɜː/</b>.</div>
                `
            },
            {
                id: 3,
                instruction: "Mark the letter A, B, C or D on your answer sheet to indicate the word that differs from the other three in the position of primary stress.",
                question: "Question 3:",
                options: [
                    { text: "customer", isCorrect: false },
                    { text: "advantage", isCorrect: true },
                    { text: "decorate", isCorrect: false },
                    { text: "homemaker", isCorrect: false }
                ],
                explanation: `
                    <div class="explanation-step"><span class="step-title">1. Dịch yêu cầu:</span> Chọn từ có trọng âm chính khác với ba từ còn lại.</div>
                    <div class="explanation-step"><span class="step-title">2. Phân tích 4 đáp án:</span>
                        <ul>
                            <li><b>A. customer</b> (n): Khách hàng. Trọng âm rơi vào âm tiết thứ 1 ('customer).</li>
                            <li><b>B. advantage</b> (n): Lợi thế. Trọng âm rơi vào âm tiết thứ 2 (ad'vantage).</li>
                            <li><b>C. decorate</b> (v): Trang trí. Trọng âm rơi vào âm tiết thứ 1 ('decorate).</li>
                            <li><b>D. homemaker</b> (n): Người nội trợ. Trọng âm rơi vào âm tiết thứ 1 ('homemaker).</li>
                        </ul>
                    </div>
                    <div class="explanation-step"><span class="step-title">3. Tại sao chọn B?</span> Trọng âm của "advantage" rơi vào âm tiết <b>thứ hai</b>.</div>
                    <div class="explanation-step"><span class="step-title">4. Tại sao 3 đáp án kia sai?</span> Ba từ còn lại đều có trọng âm rơi vào âm tiết <b>thứ nhất</b>.</div>
                `
            },
            {
                id: 4,
                instruction: "Mark the letter A, B, C or D on your answer sheet to indicate the word that differs from the other three in the position of primary stress.",
                question: "Question 4:",
                options: [
                    { text: "builder", isCorrect: false },
                    { text: "teacher", isCorrect: false },
                    { text: "writer", isCorrect: false },
                    { text: "career", isCorrect: true }
                ],
                explanation: `
                    <div class="explanation-step"><span class="step-title">1. Dịch yêu cầu:</span> Chọn từ có trọng âm chính khác vị trí.</div>
                    <div class="explanation-step"><span class="step-title">2. Phân tích 4 đáp án:</span>
                        <ul>
                            <li><b>A. builder</b> (n): Thợ xây. Trọng âm rơi vào âm tiết thứ 1 ('builder).</li>
                            <li><b>B. teacher</b> (n): Giáo viên. Trọng âm rơi vào âm tiết thứ 1 ('teacher).</li>
                            <li><b>C. writer</b> (n): Nhà văn. Trọng âm rơi vào âm tiết thứ 1 ('writer).</li>
                            <li><b>D. career</b> (n): Sự nghiệp. Trọng âm rơi vào âm tiết thứ 2 (ca'reer).</li>
                        </ul>
                    </div>
                    <div class="explanation-step"><span class="step-title">3. Tại sao chọn D?</span> Những từ có đuôi "-eer" thường nhận trọng âm vào chính nó. Nên trọng âm rơi vào âm tiết <b>thứ hai</b>.</div>
                    <div class="explanation-step"><span class="step-title">4. Tại sao 3 đáp án kia sai?</span> Ba từ chỉ nghề nghiệp có chứa hậu tố "-er", hậu tố này không làm ảnh hưởng đến trọng âm gốc, nên đều rơi vào âm <b>thứ nhất</b>.</div>
                `
            },
            {
                id: 5,
                question: "Question 5: I don’t know the reason _______ he left his hometown.",
                options: [
                    { text: "What", isCorrect: false },
                    { text: "where", isCorrect: false },
                    { text: "that", isCorrect: false },
                    { text: "why", isCorrect: true }
                ],
                explanation: `
                    <div class="explanation-step"><span class="step-title">1. Dịch câu hỏi:</span> "Tôi không biết lý do _______ anh ấy rời bỏ quê hương của mình."</div>
                    <div class="explanation-step"><span class="step-title">2. Phân tích 4 đáp án:</span>
                        <ul>
                            <li><b>A. What</b>: Cái gì.</li>
                            <li><b>B. where</b>: Nơi mà (Trạng từ quan hệ chỉ nơi chốn).</li>
                            <li><b>C. that</b>: Rằng / Mà (Đại từ quan hệ).</li>
                            <li><b>D. why</b>: Tại sao (Trạng từ quan hệ chỉ lý do).</li>
                        </ul>
                    </div>
                    <div class="explanation-step"><span class="step-title">3. Tại sao chọn D?</span> Phía trước khoảng trống là danh từ "the reason" (lý do). Trạng từ quan hệ duy nhất đi kèm với "the reason" để giải thích cho nguyên nhân là <b>why</b> (the reason why = lý do tại sao).</div>
                    <div class="explanation-step"><span class="step-title">4. Tại sao 3 đáp án kia sai?</span> Sai chức năng ngữ pháp. "Where" dùng cho nơi chốn, "What" không phải đại từ quan hệ thay thế cho danh từ đứng trước, "that" có thể dùng được thay thế cho "for which" / "why" trong một số trường hợp, nhưng "why" là lựa chọn tối ưu và chính xác nhất theo chuẩn ngữ pháp phổ thông đi liền cụm "the reason".</div>
                `
            },
            {
                id: 6,
                question: "Question 6: Remember to switch off the lights _______ you go out.",
                options: [
                    { text: "Before", isCorrect: true },
                    { text: "after", isCorrect: false },
                    { text: "until", isCorrect: false },
                    { text: "while", isCorrect: false }
                ],
                explanation: `
                    <div class="explanation-step"><span class="step-title">1. Dịch câu hỏi:</span> "Nhớ tắt đèn _______ bạn đi ra ngoài."</div>
                    <div class="explanation-step"><span class="step-title">2. Phân tích 4 đáp án:</span>
                        <ul>
                            <li><b>A. Before</b>: Trước khi.</li>
                            <li><b>B. after</b>: Sau khi.</li>
                            <li><b>C. until</b>: Cho đến khi.</li>

                            <li><b>A.</b> Sai động từ (causing không thể đóng vai trò động từ chính), sai giới từ (for humans).</li>
                            <li><b>B.</b> Sai danh từ: "All" đi với danh từ đếm được số nhiều, nên "disaster" phải thêm "s".</li>
                            <li><b>C.</b> Tất cả các thảm họa thiên nhiên đều gây ra thiệt hại và sự tàn phá đối với con người. (Chuẩn).</li>
                            <li><b>D.</b> Sai giới từ: gây ra cho ai đó dùng "to", không dùng "with".</li>
                        </ul>
                    </div>
                    <div class="explanation-step"><span class="step-title">3. Tại sao chọn C?</span> Đảm bảo 2 quy tắc: Sau "All" danh từ "disasters" có s, và cụm từ cố định <b>cause damage/destruction TO someone/something</b>.</div>
                    <div class="explanation-step"><span class="step-title">4. Tại sao 3 đáp án kia sai?</span> Sai mạo từ số nhiều, sai chia động từ hoặc sai giới từ đi kèm.</div>
                `
            },
            {
                id: 28,
                instruction: "Mark the sentence that is made from the given cues.",
                question: "Question 28: most / common type / natural disasters / the world / are / floods and storms.",
                options: [
                    { text: "The most common types of natural disasters in the world are floods and storms.", isCorrect: true },
                    { text: "The most common type of natural disasters in the world are floods and storms.", isCorrect: false },
                    { text: "The most common types of natural disasters on the world are floods and storms.", isCorrect: false },
                    { text: "The most common type of natural disasters of the world are floods and storms.", isCorrect: false }
                ],
                explanation: `
                    <div class="explanation-step"><span class="step-title">1. Dịch từ khóa:</span> Phổ biến nhất / loại / thảm họa thiên nhiên / thế giới / là / lũ lụt và bão.</div>
                    <div class="explanation-step"><span class="step-title">2. Phân tích 4 đáp án:</span>
                        <ul>
                            <li><b>A.</b> Các loại thảm họa thiên nhiên phổ biến nhất trên thế giới là lũ lụt và bão. (Chuẩn xác).</li>
                            <li><b>B.</b> Thiếu "s" ở chữ "type", trong khi phía sau liệt kê tận 2 loại (floods and storms) và động từ tobe là "are".</li>
                            <li><b>C.</b> Sai giới từ (on the world -> phải là "in the world").</li>
                            <li><b>D.</b> Thiếu "s" ở "type" và sai giới từ (of the world).</li>
                        </ul>
                    </div>
                    <div class="explanation-step"><span class="step-title">3. Tại sao chọn A?</span> Sự hòa hợp giữa chủ ngữ và động từ: Vì tân ngữ là số nhiều "floods and storms" và tobe "are", chủ ngữ "types" buộc phải để số nhiều. Giới từ chuẩn "in the world".</div>
                    <div class="explanation-step"><span class="step-title">4. Tại sao 3 đáp án kia sai?</span> Sai giới từ chỉ nơi chốn (on/of) và sai lỗi danh từ số ít/số nhiều.</div>
                `
            },
            {
                id: 29,
                instruction: "Read the following sign or notice and mark the correct answer.",
                question: `Question 29: What does the sign mean?<br>
                <div class="sign-no-food">
                    <div class="circle-slash">
                        🍔🥤
                    </div>
                    <div class="text-bold">NO FOOD<br>OR<br>DRINK</div>
                </div>`,
                options: [
                    { text: "You are allowed to eat and drink here without any restrictions.", isCorrect: false },
                    { text: "Eating and drinking are not permitted in this area at all times.", isCorrect: true },
                    { text: "You can bring drinks but not food into this area.", isCorrect: false },
                    { text: "Food is permitted but drinks are not allowed in this area.", isCorrect: false }
                ],
                explanation: `
                    <div class="explanation-step"><span class="step-title">1. Dịch biển báo:</span> Biển báo màu đỏ có vòng tròn gạch chéo hình cái burger và cốc nước, kèm dòng chữ "NO FOOD OR DRINK" -> "KHÔNG ĐỒ ĂN HOẶC THỨC UỐNG".</div>
                    <div class="explanation-step"><span class="step-title">2. Phân tích 4 đáp án:</span>
                        <ul>
                            <li><b>A.</b> Bạn được phép ăn uống ở đây mà không có hạn chế nào.</li>
                            <li><b>B.</b> Việc ăn và uống không được cho phép trong khu vực này vào mọi lúc.</li>
                            <li><b>C.</b> Bạn có thể mang đồ uống nhưng không được mang đồ ăn.</li>
                            <li><b>D.</b> Đồ ăn được phép nhưng đồ uống thì không.</li>
                        </ul>
                    </div>
                    <div class="explanation-step"><span class="step-title">3. Tại sao chọn B?</span> Khớp hoàn toàn với thông điệp cấm (not permitted) đối với cả đồ ăn và thức uống của biển báo.</div>
                    <div class="explanation-step"><span class="step-title">4. Tại sao 3 đáp án kia sai?</span> Dịch sai hoàn toàn ý nghĩa của biển cấm. C và D hiểu sai thành chỉ cấm 1 trong 2 thứ.</div>
                `
            },
            {
                id: 30,
                instruction: "Read the following sign or notice and mark the correct answer.",
                question: `Question 30: What does the notice say?<br>
                <div class="notice-board">
                    <p>The library will be closed on Sunday for cleaning. It will open again on Monday morning.</p>
                </div>`,
                options: [
                    { text: "The library will be open on Sunday for cleaning", isCorrect: false },
                    { text: "The library will be closed on Sunday and open again on Monday.", isCorrect: true },
                    { text: "The library will close early on Sunday for cleaning.", isCorrect: false },
                    { text: "The library will be closed all weekend.", isCorrect: false }
                ],
                explanation: `
                    <div class="explanation-step"><span class="step-title">1. Dịch thông báo:</span> "Thư viện sẽ đóng cửa vào Chủ nhật để dọn dẹp. Nó sẽ mở cửa trở lại vào sáng thứ Hai."</div>
                    <div class="explanation-step"><span class="step-title">2. Phân tích 4 đáp án:</span>
                        <ul>
                            <li><b>A.</b> Thư viện sẽ mở cửa vào Chủ nhật để dọn dẹp. (Sai thực tế).</li>
                            <li><b>B.</b> Thư viện sẽ đóng cửa vào Chủ nhật và mở lại vào thứ Hai.</li>
                            <li><b>C.</b> Thư viện sẽ đóng cửa sớm vào Chủ nhật... (Sai, thông báo nói đóng cả ngày).</li>
                            <li><b>D.</b> Thư viện sẽ đóng cửa cả cuối tuần. (Sai, cuối tuần gồm cả T7, nhưng thông báo chỉ nhắc Chủ nhật).</li>
                        </ul>
                    </div>
                    <div class="explanation-step"><span class="step-title">3. Tại sao chọn B?</span> Đáp án B tóm tắt và nhắc lại chính xác 100% nội dung thông tin được ghi trên bảng.</div>
                    <div class="explanation-step"><span class="step-title">4. Tại sao 3 đáp án kia sai?</span> Bóp méo thông tin về việc đóng cửa của thư viện.</div>
                `
            }
        ];

        let score = 0;
        let answeredQuestions = new Set();

        // Web Audio API Sound Generator
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playCorrectSound() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1); 
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        function playWrongSound() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // Lightweight Confetti
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#8B4513', '#D2691E', '#F4A460', '#FFD700', '#6BCB77', '#FF6B6B'];
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                container.appendChild(conf);
                setTimeout(() => conf.remove(), 4000);
            }
        }

        // Đảo vị trí Array (Fisher-Yates)
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            
            quizData.forEach((q, qIndex) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-${q.id}`;

                let htmlContent = '';
                if(q.instruction) htmlContent += `<div class="instruction">${q.instruction}</div>`;
                htmlContent += `<div class="question-text">${q.question}</div>`;

                // Xáo trộn đáp án
                let shuffledOptions = shuffleArray([...q.options]);

                htmlContent += `<div class="options-grid" id="opts-${q.id}">`;
                shuffledOptions.forEach((opt, optIndex) => {
                    htmlContent += `<button class="option-btn" onclick="checkAnswer(${q.id}, ${opt.isCorrect}, this)">
                        ${['A', 'B', 'C', 'D'][optIndex]}. ${opt.text}
                    </button>`;
                });
                htmlContent += `</div>`;
                
                htmlContent += `<div class="explanation" id="exp-${q.id}">
                    <h4>💡 Giải thích siêu chi tiết:</h4>
                    ${q.explanation}
                </div>`;

                card.innerHTML = htmlContent;
                container.appendChild(card);
            });
        }

        function checkAnswer(qId, isCorrect, btnElement) {
            // Nếu đã trả lời câu này thì bỏ qua
            if (answeredQuestions.has(qId)) return;
            
            answeredQuestions.add(qId);
            const parent = document.getElementById(`opts-${qId}`);
            const buttons = parent.getElementsByClassName('option-btn');
            
            // Khóa nút
            for(let btn of buttons) { btn.disabled = true; }

            // Xử lý đúng / sai
            if (isCorrect) {
                btnElement.classList.add('correct');
                playCorrectSound();
                createConfetti();
                score++;
            } else {
                btnElement.classList.add('incorrect');
                playWrongSound();
                // Highlight đáp án đúng
                for(let btn of buttons) {
                    if(btn.onclick.toString().includes('true')) {
                        btn.classList.add('correct');
                    }
                }
            }

            // Hiện giải thích chi tiết
            document.getElementById(`exp-${qId}`).style.display = 'block';
        }

        function showScore() {
            const overlay = document.getElementById('score-overlay');
            const total = quizData.length;
            document.getElementById('score-points').innerText = `${score} / ${total}`;
            
            let message = "Gấu nhỏ xuất sắc quá! 🎓🧸";
            if(score < total / 2) message = "Đừng buồn, cùng cố gắng hơn ở lần sau nhé! 💪🍯";
            else if(score < total) message = "Tuyệt vời, chỉ xíu nữa là hoàn hảo rồi! 🌟🐾";
            
            document.getElementById('score-message').innerText = message;
            overlay.style.display = 'flex';
            if(score > total / 2) createConfetti();
        }

        // Khởi tạo
        window.onload = renderQuiz;
    </script>
</body>
</html>
