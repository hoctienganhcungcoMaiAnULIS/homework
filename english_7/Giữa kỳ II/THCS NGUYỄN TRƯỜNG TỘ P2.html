<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Quiz - Ms Mai An ULIS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

        :root {
            --primary: #8854C0;
            --secondary: #FDCB6E;
            --tertiary: #00C9A7;
            --correct: #00D26A;
            --correct-shadow: #00A152;
            --wrong: #FF4757;
            --wrong-shadow: #D43946;
            --btn-color: #ffffff;
            --btn-shadow: #e5e5e5;
            --text-dark: #2d3436;
        }

        * {
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatPattern {
            0% { background-position: 0px 0px; }
            100% { background-position: 1000px 1000px; }
        }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(-45deg, #8854C0, #ff9ff3, #FDCB6E, #00C9A7);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* SVG Pattern Background Overlay */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.2'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            animation: floatPattern 40s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        .header {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--primary);
            z-index: 10;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
        }

        .section-title {
            color: var(--primary);
            font-size: 1.8rem;
            border-bottom: 3px dashed var(--secondary);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .reading-box {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .vocab-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .vocab-table th {
            background: var(--tertiary);
            color: white;
            padding: 10px;
        }

        .vocab-table td {
            background: #fff;
            padding: 10px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        .question-card {
            background: #fafafa;
            border: 2px solid #f1f2f6;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .question-card:hover {
            border-color: var(--primary);
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .gap-btn {
            background: #dfe4ea;
            color: var(--text-dark);
            border: 2px dashed #a4b0be;
            padding: 5px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.1rem;
            display: inline-block;
            transition: 0.2s;
        }

        .gap-btn:hover {
            background: #ced6e0;
            transform: scale(1.05);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-option {
            background: #ffffff;
            border: 2px solid #e5e5e5;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            cursor: pointer;
            box-shadow: 0 6px 0 var(--btn-shadow);
            transition: all 0.1s;
            text-align: left;
        }

        .btn-option:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 0 var(--btn-shadow);
            border-color: var(--primary);
        }

        .btn-option:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--btn-shadow);
        }

        .btn-option.correct {
            background: var(--correct);
            border-color: var(--correct);
            color: white;
            box-shadow: 0 6px 0 var(--correct-shadow);
        }

        .btn-option.wrong {
            background: var(--wrong);
            border-color: var(--wrong);
            color: white;
            box-shadow: 0 6px 0 var(--wrong-shadow);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.4s;
        }

        .explanation {
            display: none;
            margin-top: 15px;
            background: #e0f7fa;
            border-left: 5px solid var(--tertiary);
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            line-height: 1.5;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exp-step {
            margin-bottom: 8px;
        }
        .exp-title { font-weight: 800; color: #00838f; }

        /* Modal cho Gap Fill */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .submit-btn {
            background: var(--tertiary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 #009688;
            margin: 20px auto;
            display: block;
            transition: 0.1s;
        }

        .submit-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #009688;
        }

        .confetti {
            position: fixed;
            width: 10px; height: 10px;
            background-color: #f00;
            z-index: 999;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="pattern-overlay"></div>

    <div class="header">
        Giáo viên tạo: Ms Mai An ULIS <br>
        Bấm vào chỗ trống (Gap Fill) hoặc các nút đáp án (A,B,C,D) để làm bài nhé!
    </div>

    <div class="container" id="quiz-container">
        </div>

    <button class="submit-btn" onclick="submitQuiz()">Nộp bài ngay!</button>

    <div class="modal-overlay" id="gapModal">
        <div class="modal-content">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Chọn từ đúng nhất:</h2>
            <div class="options-grid" id="modalOptions">
                </div>
            <button class="submit-btn" style="background:#ff6b6b; box-shadow: 0 8px 0 #ee5253; margin-top:20px; padding: 10px 20px; font-size:1rem;" onclick="closeModal()">Đóng</button>
        </div>
    </div>

    <script>
        // --- DATA DEFINITION ---
        const quizData = [
            // SECTION II
            {
                section: "II. Verb Tenses",
                type: "gap-fill",
                q: "1. My sister [GAP] romantic movies.",
                opts: [
                    {t: "doesn't love", m: "không thích (phủ định, số ít)", c: true},
                    {t: "don't love", m: "không thích (phủ định, số nhiều)", c: false},
                    {t: "isn't loving", m: "đang không thích (tiếp diễn)", c: false},
                    {t: "didn't loved", m: "đã không thích (sai cấu trúc)", c: false}
                ],
                trans: "Chị gái tôi không thích phim lãng mạn.",
                whyRight: "Chủ ngữ 'My sister' là ngôi thứ ba số ít, diễn tả sở thích chung nên dùng thì Hiện tại đơn với trợ động từ 'doesn't' + V(nguyên thể).",
                whyWrong: "B sai vì dùng trợ động từ số nhiều 'don't'. C sai vì 'love' là động từ chỉ trạng thái, hiếm khi dùng ở thì tiếp diễn. D sai cấu trúc quá khứ đơn (đã mượn trợ động từ 'didn't' thì động từ chính không được thêm 'ed')."
            },
            {
                type: "gap-fill",
                q: "2. Right now, we [GAP] a horror movie at the cinema.",
                opts: [
                    {t: "are watching", m: "đang xem (tiếp diễn, số nhiều)", c: true},
                    {t: "watch", m: "xem (hiện tại đơn)", c: false},
                    {t: "watched", m: "đã xem (quá khứ đơn)", c: false},
                    {t: "is watching", m: "đang xem (tiếp diễn, số ít)", c: false}
                ],
                trans: "Ngay lúc này, chúng tôi đang xem một bộ phim kinh dị tại rạp chiếu phim.",
                whyRight: "Dấu hiệu 'Right now' (Ngay lúc này) chỉ hành động đang xảy ra tại thời điểm nói -> dùng thì Hiện tại tiếp diễn. Chủ ngữ 'we' đi với tobe 'are'.",
                whyWrong: "A và B sai vì không phải thì tiếp diễn. D sai vì tobe 'is' chỉ dùng cho ngôi số ít."
            },
            {
                type: "gap-fill",
                q: "3. Last night, I [GAP] an amazing action film.",
                opts: [
                    {t: "saw", m: "đã xem/thấy (quá khứ đơn)", c: true},
                    {t: "see", m: "xem/thấy (hiện tại đơn)", c: false},
                    {t: "seed", m: "từ không có thật (sai quy tắc)", c: false},
                    {t: "was seeing", m: "đang xem/thấy (quá khứ tiếp diễn)", c: false}
                ],
                trans: "Tối qua, tôi đã xem một bộ phim hành động tuyệt vời.",
                whyRight: "Dấu hiệu 'Last night' (Tối qua) chỉ hành động đã xảy ra và kết thúc trong quá khứ -> dùng thì Quá khứ đơn. Động từ bất quy tắc 'see' chuyển thành 'saw'.",
                whyWrong: "B là hiện tại đơn. C sai vì 'see' là động từ bất quy tắc, không thêm '-ed'. D là quá khứ tiếp diễn không phù hợp ngữ cảnh diễn đạt một sự kiện đã hoàn tất."
            },
            {
                type: "gap-fill",
                q: "4. Tomorrow, they [GAP] to the film festival in the city.",
                opts: [
                    {t: "will go", m: "sẽ đi (tương lai đơn)", c: true},
                    {t: "go", m: "đi (hiện tại đơn)", c: false},
                    {t: "went", m: "đã đi (quá khứ đơn)", c: false},
                    {t: "are go", m: "sai cấu trúc ngữ pháp", c: false}
                ],
                trans: "Ngày mai, họ sẽ đi đến liên hoan phim ở thành phố.",
                whyRight: "Dấu hiệu 'Tomorrow' (Ngày mai) chỉ hành động sẽ xảy ra trong tương lai -> dùng thì Tương lai đơn (will + V nguyên thể).",
                whyWrong: "B là hiện tại đơn. C là quá khứ đơn. D sai hoàn toàn về cấu trúc (tobe không đi liền với động từ nguyên thể)."
            },
            {
                type: "gap-fill",
                q: "5. Look! The bus [GAP].",
                opts: [
                    {t: "is coming", m: "đang tới (tiếp diễn, số ít)", c: true},
                    {t: "comes", m: "tới (hiện tại đơn)", c: false},
                    {t: "came", m: "đã tới (quá khứ đơn)", c: false},
                    {t: "will come", m: "sẽ tới (tương lai đơn)", c: false}
                ],
                trans: "Nhìn kìa! Xe buýt đang tới.",
                whyRight: "Dấu hiệu 'Look!' (Nhìn kìa!) dùng để gây sự chú ý về một sự việc ĐANG diễn ra ngay trước mắt -> dùng thì Hiện tại tiếp diễn. 'The bus' số ít đi với 'is'.",
                whyWrong: "B, C, D không phải thì hiện tại tiếp diễn nên không phù hợp với hành động đang xảy ra trực tiếp ngay lúc nói."
            },
            {
                type: "gap-fill",
                q: "6. She [GAP] the train because she woke up late.",
                opts: [
                    {t: "missed", m: "đã lỡ (quá khứ đơn)", c: true},
                    {t: "misses", m: "lỡ (hiện tại đơn)", c: false},
                    {t: "is missing", m: "đang lỡ (tiếp diễn)", c: false},
                    {t: "miss", m: "lỡ (hiện tại, nguyên thể)", c: false}
                ],
                trans: "Cô ấy đã lỡ chuyến tàu vì cô ấy đã thức dậy muộn.",
                whyRight: "Vế sau 'she woke up late' (cô ấy đã thức dậy muộn) dùng thì Quá khứ đơn, nên hành động lỡ tàu cũng phải xảy ra trong quá khứ -> dùng 'missed'.",
                whyWrong: "B, C, D đều ở hiện tại, không tương hợp (không lùi thì) với vế nguyên nhân đã xảy ra trong quá khứ."
            },
            {
                type: "gap-fill",
                q: "7. Every year, people [GAP] the Rio Carnival in Brazil. ",
                opts: [
                    {t: "celebrate", m: "tổ chức/kỷ niệm (hiện tại đơn)", c: true},
                    {t: "celebrates", m: "tổ chức/kỷ niệm (số ít)", c: false},
                    {t: "celebrated", m: "đã tổ chức (quá khứ đơn)", c: false},
                    {t: "are celebrating", m: "đang tổ chức (tiếp diễn)", c: false}
                ],
                trans: "Mỗi năm, người dân tổ chức Lễ hội Carnival Rio ở Brazil.",
                whyRight: "Dấu hiệu 'Every year' (Mỗi năm) chỉ một thói quen, sự việc lặp đi lặp lại -> dùng thì Hiện tại đơn. Chủ ngữ 'people' (người dân) là danh từ số nhiều nên động từ giữ nguyên.",
                whyWrong: "B sai vì động từ thêm 's' chỉ dùng cho chủ ngữ số ít. C là quá khứ đơn. D là hiện tại tiếp diễn, không dùng cho sự thật lặp lại."
            },
            {
                type: "gap-fill",
                q: "8. Listen! [GAP] Christmas songs?",
                opts: [
                    {t: "Are the children singing", m: "bọn trẻ đang hát phải không (tiếp diễn)", c: true},
                    {t: "Do the children sing", m: "bọn trẻ hát phải không (hiện tại đơn)", c: false},
                    {t: "Is the children singing", m: "sai tobe (children là số nhiều)", c: false},
                    {t: "The children are singing", m: "bọn trẻ đang hát (câu khẳng định)", c: false}
                ],
                trans: "Nghe này! Có phải bọn trẻ đang hát các bài hát Giáng sinh không?",
                whyRight: "Dấu hiệu 'Listen!' yêu cầu chú ý hành động đang xảy ra -> dùng Hiện tại tiếp diễn. Đây là câu hỏi (?) nên phải đảo tobe 'Are' lên trước chủ ngữ số nhiều 'the children'.",
                whyWrong: "B dùng hiện tại đơn. C sai vì 'children' là số nhiều phải dùng 'Are', không dùng 'Is'. D là cấu trúc câu khẳng định, không phải câu hỏi."
            },
            {
                type: "gap-fill",
                q: "9. Last year, we [GAP] in the Songkran festival in Thailand.",
                opts: [
                    {t: "took part", m: "đã tham gia (quá khứ đơn)", c: true},
                    {t: "take part", m: "tham gia (hiện tại đơn)", c: false},
                    {t: "takes part", m: "tham gia (số ít)", c: false},
                    {t: "taking part", m: "đang tham gia (thiếu tobe)", c: false}
                ],
                trans: "Năm ngoái, chúng tôi đã tham gia lễ hội Songkran ở Thái Lan.",
                whyRight: "Dấu hiệu 'Last year' (Năm ngoái) chỉ hành động đã kết thúc trong quá khứ -> dùng Quá khứ đơn. Động từ bất quy tắc 'take' đổi thành 'took'.",
                whyWrong: "B và C là hiện tại đơn. D là V-ing không thể đứng một mình làm động từ chính trong câu."
            },
            {
                type: "gap-fill",
                q: "10. Next month, they [GAP] a big festival in Japan.",
                opts: [
                    {t: "will organize", m: "sẽ tổ chức (tương lai đơn)", c: true},
                    {t: "organize", m: "tổ chức (hiện tại đơn)", c: false},
                    {t: "organized", m: "đã tổ chức (quá khứ đơn)", c: false},
                    {t: "organizes", m: "tổ chức (số ít)", c: false}
                ],
                trans: "Tháng tới, họ sẽ tổ chức một lễ hội lớn ở Nhật Bản.",
                whyRight: "Dấu hiệu 'Next month' (Tháng tới) chỉ sự việc sẽ xảy ra trong tương lai -> dùng Tương lai đơn (will + V nguyên thể).",
                whyWrong: "B, D là hiện tại đơn. C là quá khứ đơn. Đều sai về mặt thời gian."
            },

            // SECTION III
            {
                section: "III. Word Forms",
                type: "gap-fill",
                q: "1. It is very [GAP] to ride a motorbike without wearing a helmet. (danger)",
                opts: [
                    {t: "dangerous", m: "nguy hiểm (tính từ)", c: true},
                    {t: "danger", m: "sự nguy hiểm (danh từ)", c: false},
                    {t: "dangerously", m: "một cách nguy hiểm (trạng từ)", c: false},
                    {t: "endanger", m: "gây nguy hiểm (động từ)", c: false}
                ],
                trans: "Rất nguy hiểm khi đi xe máy mà không đội mũ bảo hiểm.",
                whyRight: "Cấu trúc 'It is + adj + to V' (Thật là ... để làm gì). Đứng sau 'very' cần một tính từ. Tính từ của 'danger' là 'dangerous'.",
                whyWrong: "B là danh từ. C là trạng từ. D là động từ. Tất cả đều không phù hợp với cấu trúc cần tính từ."
            },
            {
                type: "gap-fill",
                q: "2. The road signs help us drive [GAP]. (safe)",
                opts: [
                    {t: "safely", m: "một cách an toàn (trạng từ)", c: true},
                    {t: "safe", m: "an toàn (tính từ)", c: false},
                    {t: "safety", m: "sự an toàn (danh từ)", c: false},
                    {t: "safeness", m: "tình trạng an toàn (danh từ hiếm)", c: false}
                ],
                trans: "Các biển báo giao thông giúp chúng ta lái xe một cách an toàn.",
                whyRight: "Động từ thường 'drive' (lái xe) cần một Trạng từ (Adverb) bổ nghĩa để chỉ cách thức hành động. Trạng từ của 'safe' là 'safely'.",

            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function playBuzz() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        // --- CONFETTI ENGINE ---
        function shootConfetti(x, y) {
            const colors = ['#00D26A', '#FDCB6E', '#8854C0', '#00C9A7', '#FF4757'];
            for (let i = 0; i < 30; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti';
                document.body.appendChild(conf);
                conf.style.left = x + 'px';
                conf.style.top = y + 'px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                let angle = Math.random() * Math.PI * 2;
                let velocity = 5 + Math.random() * 10;
                let dx = Math.cos(angle) * velocity;
                let dy = Math.sin(angle) * velocity;
                
                let opacity = 1;
                function animate() {
                    dy += 0.5; // gravity
                    let currentLeft = parseFloat(conf.style.left);
                    let currentTop = parseFloat(conf.style.top);
                    conf.style.left = (currentLeft + dx) + 'px';
                    conf.style.top = (currentTop + dy) + 'px';
                    opacity -= 0.02;
                    conf.style.opacity = opacity;
                    if (opacity > 0) requestAnimationFrame(animate);
                    else conf.remove();
                }
                requestAnimationFrame(animate);
            }
        }

        // --- RENDER ENGINE ---
        const container = document.getElementById('quiz-container');
        let currentActiveGapIndex = -1;
        let score = 0;
        let answeredQuestions = new Set();

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function renderExplanation(data) {
            let optsAnalysis = data.opts.map(o => `<b>${o.t}</b>: ${o.m}`).join('<br>');
            return `
                <div class="exp-step"><span class="exp-title">1. Dịch câu hỏi:</span> ${data.trans}</div>
                <div class="exp-step"><span class="exp-title">2. Phân tích 4 đáp án:</span><br>${optsAnalysis}</div>
                <div class="exp-step"><span class="exp-title">3. Tại sao đúng:</span> ${data.whyRight}</div>
                <div class="exp-step"><span class="exp-title">4. Tại sao sai:</span> ${data.whyWrong}</div>
            `;
        }

        function init() {
            let currentSection = "";
            quizData.forEach((data, index) => {
                // Render Section Title & HTML blocks
                if (data.section && data.section !== currentSection) {
                    currentSection = data.section;
                    let secTitle = document.createElement('div');
                    secTitle.className = 'section-title';
                    secTitle.innerText = currentSection;
                    container.appendChild(secTitle);
                }
                if (data.html) {
                    let htmlBlock = document.createElement('div');
                    htmlBlock.innerHTML = data.html;
                    container.appendChild(htmlBlock);
                }

                // Render Question Card
                let card = document.createElement('div');
                card.className = 'question-card';
                card.id = 'qcard-' + index;

                // Gap fill vs ABCD
                if (data.type === 'gap-fill') {
                    let parts = data.q.split('[GAP]');
                    card.innerHTML = `
                        <div class="question-text">
                            ${parts[0]} <span class="gap-btn" id="gap-${index}" onclick="openModal(${index})"> [ Bấm để chọn từ ] </span> ${parts[1]}
                        </div>
                        <div class="explanation" id="exp-${index}">${renderExplanation(data)}</div>
                    `;
                } else {
                    // ABCD
                    let shuffledOpts = shuffleArray(data.opts);
                    let btnsHtml = shuffledOpts.map((o, i) => `
                        <button class="btn-option" onclick="handleAbcdClick(${index}, ${o.c}, this, event)">${o.t}</button>
                    `).join('');
                    card.innerHTML = `
                        <div class="question-text">${data.q}</div>
                        <div class="options-grid">${btnsHtml}</div>
                        <div class="explanation" id="exp-${index}">${renderExplanation(data)}</div>
                    `;
                }
                container.appendChild(card);
            });
        }

        // --- INTERACTION LOGIC ---
        function handleAbcdClick(qIndex, isCorrect, btnElement, event) {
            let card = document.getElementById('qcard-' + qIndex);
            // Disable other buttons
            let btns = card.querySelectorAll('.btn-option');
            btns.forEach(b => b.style.pointerEvents = 'none');

            if (!answeredQuestions.has(qIndex)) {
                answeredQuestions.add(qIndex);
                if (isCorrect) score++;
            }

            if (isCorrect) {
                btnElement.classList.add('correct');
                playDing();
                shootConfetti(event.clientX, event.clientY);
            } else {
                btnElement.classList.add('wrong');
                btnElement.classList.add('shake');
                playBuzz();
                // Highlight correct
                quizData[qIndex].opts.forEach(o => {
                    if (o.c) {
                        btns.forEach(b => { if(b.innerText === o.t) b.classList.add('correct'); });
                    }
                });
            }
            
            // Show explanation
            document.getElementById('exp-' + qIndex).style.display = 'block';
        }

        // Modal Logic
        const modal = document.getElementById('gapModal');
        const modalOptions = document.getElementById('modalOptions');

        function openModal(index) {
            currentActiveGapIndex = index;
            let data = quizData[index];
            let shuffledOpts = shuffleArray(data.opts);
            
            modalOptions.innerHTML = shuffledOpts.map(o => `
                <button class="btn-option" onclick="handleGapSelect('${o.t}', ${o.c})">${o.t}</button>
            `).join('');
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function handleGapSelect(text, isCorrect) {
            let gapBtn = document.getElementById('gap-' + currentActiveGapIndex);
            gapBtn.innerText = text;
            gapBtn.style.pointerEvents = 'none'; // Disable after choice

            if (!answeredQuestions.has(currentActiveGapIndex)) {
                answeredQuestions.add(currentActiveGapIndex);
                if (isCorrect) score++;
            }

            if (isCorrect) {
                gapBtn.style.background = 'var(--correct)';
                gapBtn.style.color = 'white';
                gapBtn.style.borderColor = 'var(--correct)';
                playDing();
                let rect = gapBtn.getBoundingClientRect();
                shootConfetti(rect.left + rect.width/2, rect.top + rect.height/2);
            } else {
                gapBtn.style.background = 'var(--wrong)';
                gapBtn.style.color = 'white';
                gapBtn.style.borderColor = 'var(--wrong)';
                gapBtn.classList.add('shake');
                setTimeout(() => gapBtn.classList.remove('shake'), 400);
                playBuzz();
            }

            // Show explanation
            document.getElementById('exp-' + currentActiveGapIndex).style.display = 'block';
            closeModal();
        }

        function submitQuiz() {
            let total = quizData.length;
            let percent = Math.round((score / total) * 100);
            let praise = "";
            if (percent === 100) praise = "Tuyệt đỉnh! Con là thiên tài tiếng Anh! 🏆";
            else if (percent >= 80) praise = "Rất xuất sắc! Cô Mai An rất tự hào về con! 🌟";
            else if (percent >= 50) praise = "Làm tốt lắm! Hãy đọc kỹ giải thích để giỏi hơn nữa nhé! 👍";
            else praise = "Đừng buồn nhé, hãy đọc phần giải thích siêu chi tiết để phục thù nào! 💪";

            alert(`Chúc mừng con đã hoàn thành bài thi!\nĐiểm số: ${score}/${total} (${percent}%)\n\nNhận xét: ${praise}`);
        }

        // Initialize quiz on load
        window.onload = init;
    </script>
</body>
</html>
