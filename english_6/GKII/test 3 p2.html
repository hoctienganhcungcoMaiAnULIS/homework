<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập Tiếng Anh - Gamification</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8854C0;
            --secondary: #FDCB6E;
            --tertiary: #00C9A7;
            --correct: #00D26A;
            --wrong: #FF4757;
            --text-color: #2D3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }

        /* DYNAMIC BACKGROUND & ANIMATION */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            height: 100vh;
            overflow: hidden;
            color: var(--text-color);
            background: linear-gradient(-45deg, #FF9A9E, #FECFEF, #A18CD1, #FBC2EB, #84FAB0, #8FD3F4);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            position: relative;
        }

        /* AUTO-GENERATED SVG EMOJI BACKGROUND (Floating Pattern) */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300"><text x="20" y="50" font-size="30" opacity="0.5">⚽</text><text x="150" y="80" font-size="40" opacity="0.3">🏆</text><text x="250" y="40" font-size="25" opacity="0.4">🌟</text><text x="80" y="180" font-size="35" opacity="0.5">📺</text><text x="220" y="220" font-size="30" opacity="0.4">🏀</text><text x="40" y="270" font-size="20" opacity="0.6">🎵</text></svg>');
            background-repeat: repeat;
            animation: floatBackground 30s linear infinite;
        }

        @keyframes floatBackground {
            from { background-position: 0 0; }
            to { background-position: 300px 300px; }
        }

        /* HEADER / CONTROL BAR */
        .top-bar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .teacher-info {
            font-size: 0.9rem;
            font-weight: 700;
            color: #fff;
            background: rgba(136, 84, 192, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .timer-display {
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.3);
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 15px;
            border-radius: 10px;
        }

        .btn-control {
            cursor: pointer;
            padding: 8px 15px;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            background: var(--tertiary);
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 0 #00A68A;
            transition: all 0.1s;
        }

        .btn-control:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #00A68A;
        }

        .btn-submit {
            background: var(--primary);
            box-shadow: 0 4px 0 #5E3A85;
        }
        .btn-submit:active { box-shadow: 0 0 0 #5E3A85; }

        /* SPLIT SCREEN LAYOUT */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
            position: relative;
            z-index: 10;
            padding: 15px;
            gap: 20px;
        }

        .pane {
            flex: 1;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 25px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* SCROLLBAR STYLING */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }

        /* READING PASSAGE (LEFT PANE) */
        .passage-block {
            background: rgba(255,255,255,0.7);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: inset 0 2px 10px rgba(255,255,255,1), 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .passage-title {
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 15px;
            text-align: center;
            text-transform: uppercase;
            font-weight: 900;
        }

        .passage-text {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 15px;
            text-align: justify;
        }

        .btn-translate {
            background: #FF9F43;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 0 #D47B29;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        .btn-translate:hover { filter: brightness(1.1); }
        .btn-translate:active { transform: translateY(4px); box-shadow: none; }

        .translation-box {
            display: none;
            background: #FFF3E0;
            padding: 15px;
            border-left: 5px solid #FF9F43;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #5D4037;
        }

        /* GLOSSARY TABLE */
        .glossary-wrapper { margin-top: 15px; }
        .glossary-title {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 800;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background: var(--primary); color: white; font-weight: 700; }
        tr:last-child td { border-bottom: none; }
        td:nth-child(1) { font-weight: 800; color: #E84393; }
        td:nth-child(2) { color: #0984E3; font-style: italic; }

        /* EXERCISES (RIGHT PANE) */
        .question-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.05);
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: #2D3436;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: #F1F2F6;
            border: 2px solid #DFE4EA;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #2F3542;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 5px 0 #DFE4EA;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(.disabled) {
            transform: scale(1.02) translateY(-2px);
            background: #ECCC68;
            border-color: #ECCC68;
            box-shadow: 0 7px 0 #D4B24B;
        }

        .option-btn:active:not(.disabled) {
            transform: translateY(5px);
            box-shadow: 0 0 0 transparent;
        }

        .option-btn.correct {
            background: var(--correct);
            border-color: var(--correct);
            color: white;
            box-shadow: 0 5px 0 #00A855;
        }

        .option-btn.wrong {
            background: var(--wrong);
            border-color: var(--wrong);
            color: white;
            box-shadow: 0 5px 0 #D93845;
            animation: shake 0.4s;
        }

        .option-btn.disabled { cursor: not-allowed; opacity: 0.8; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        /* EXPLANATION BOX */
        .explanation-box {
            display: none;
            margin-top: 15px;
            background: #E8F8F5;
            border: 2px dashed #1ABC9C;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.05rem;
            line-height: 1.6;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exp-title { font-weight: 900; color: #16A085; margin-bottom: 8px; font-size: 1.1rem; }
        .exp-content { color: #2C3E50; }
        .exp-content b { color: #E74C3C; }

        /* MODAL (RESULT) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .result-modal {
            background: white; padding: 40px; border-radius: 30px;
            text-align: center; max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .result-score { font-size: 4rem; font-weight: 900; color: var(--primary); margin: 20px 0; }
        .result-msg { font-size: 1.5rem; font-weight: 700; color: #2D3436; margin-bottom: 20px; }
        .btn-close {
            background: var(--tertiary); color: white; border: none; padding: 10px 30px;
            font-size: 1.2rem; font-weight: 800; border-radius: 15px; cursor: pointer;
            box-shadow: 0 5px 0 #00A68A;
        }

        /* CONFETTI CONTAINER */
        #confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
        .confetti { position: absolute; width: 10px; height: 10px; animation: fall 2s linear forwards; }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="teacher-info">👩‍🏫 Giáo viên tạo: Ms Mai An ULIS</div>
        <div class="timer-container">
            <button class="btn-control" id="btn-timer" onclick="toggleTimer()">BẮT ĐẦU TÍNH GIỜ LÀM BÀI</button>
            <div class="timer-display" id="timer-display">10:00</div>
        </div>
        <button class="btn-control btn-submit" onclick="submitQuiz()">NỘP BÀI 🏆</button>
    </div>

    <div class="main-container">
        <div class="pane" id="left-pane"></div>
        
        <div class="pane" id="right-pane"></div>
    </div>

    <div class="overlay" id="result-overlay">
        <div class="result-modal">
            <h2 style="font-size: 2rem; color: #FF9F43;">KẾT QUẢ CỦA BẠN</h2>
            <div class="result-score" id="score-text">0/18</div>
            <div class="result-msg" id="score-msg">Tuyệt vời!</div>
            <button class="btn-close" onclick="closeModal()">Xem lại bài giải chi tiết</button>
        </div>
    </div>

    <div id="confetti-container"></div>

    <script>
        /* ================= DATA ================= */
        const quizData = [
            {
                title: "PART 1: NEW SPORTS EVENT!",
                text: "We are excited to inform you about the upcoming <b>City Sports Festival!</b> This event (13) _____ place at Greenfield Stadium next Saturday. Athletes from different schools will (14) _____ in various sports, (15) _____ football, basketball, and swimming. The prizes for the winners are (16) _____, so don't miss this amazing event!",
                translation: "Chúng tôi rất vui mừng thông báo cho bạn về <b>Lễ hội Thể thao Thành phố</b> sắp tới! Sự kiện này (13) <b>sẽ diễn ra</b> tại Sân vận động Greenfield vào thứ Bảy tuần sau. Các vận động viên từ các trường học khác nhau sẽ (14) <b>thi đấu</b> trong nhiều môn thể thao khác nhau, (15) <b>như là</b> bóng đá, bóng rổ và bơi lội. Giải thưởng dành cho những người chiến thắng rất (16) <b>có giá trị</b>, vì vậy đừng bỏ lỡ sự kiện tuyệt vời này nhé!",
                glossary: [
                    { word: "Inform", pos: "Verb (Động từ)", meaning: "Thông báo, báo tin" },
                    { word: "Upcoming", pos: "Adjective (Tính từ)", meaning: "Sắp tới, sắp diễn ra" },
                    { word: "Take place", pos: "Phrasal Verb (Cụm ĐT)", meaning: "Diễn ra, tổ chức (sự kiện)" },
                    { word: "Stadium", pos: "Noun (Danh từ)", meaning: "Sân vận động" },
                    { word: "Athlete", pos: "Noun (Danh từ)", meaning: "Vận động viên" },
                    { word: "Compete", pos: "Verb (Động từ)", meaning: "Thi đấu, cạnh tranh" },
                    { word: "Various", pos: "Adjective (Tính từ)", meaning: "Đa dạng, nhiều loại khác nhau" },
                    { word: "Prize", pos: "Noun (Danh từ)", meaning: "Giải thưởng" },
                    { word: "Valuable", pos: "Adjective (Tính từ)", meaning: "Có giá trị lớn, quý giá" },
                    { word: "Amazing", pos: "Adjective (Tính từ)", meaning: "Tuyệt vời, đáng kinh ngạc" }
                ],
                questions: [
                    {
                        q: "Question 13: This event (13) _____ place at Greenfield Stadium next Saturday.",
                        options: ["takes", "take", "taking", "taken"],
                        correctIndex: 0,
                        explanation: "<b>Dịch:</b> Sự kiện này diễn ra tại Sân vận động Greenfield.<br><b>Giải thích:</b> Cụm từ cố định <b>'take place'</b> mang nghĩa là <i>diễn ra</i>. Chủ ngữ 'This event' (sự kiện này) là số ít, nên động từ 'take' phải thêm 's' thành <b>takes</b>. Các lựa chọn khác sai ngữ pháp: 'take' (chỉ dùng cho số nhiều), 'taking' (thiếu tobe), 'taken' (phân từ 2)."
                    },
                    {
                        q: "Question 14: Athletes from different schools will (14) _____ in various sports...",
                        options: ["complete", "compete", "compare", "compass"],
                        correctIndex: 1,
                        explanation: "<b>Dịch:</b> Các vận động viên sẽ thi đấu trong nhiều môn thể thao.<br><b>Giải thích:</b> Dựa vào ngữ cảnh thể thao, ta cần từ mang nghĩa thi đấu.<br>- <b>compete (v):</b> thi đấu, cạnh tranh -> ĐÁP ÁN ĐÚNG.<br>- complete (v): hoàn thành<br>- compare (v): so sánh<br>- compass (n): cái la bàn."
                    },
                    {
                        q: "Question 15: ...in various sports, (15) _____ football, basketball, and swimming.",
                        options: ["or", "so", "but", "such as"],
                        correctIndex: 3,
                        explanation: "<b>Dịch:</b> ...nhiều môn thể thao khác nhau, như là bóng đá, bóng rổ và bơi lội.<br><b>Giải thích:</b> Đoạn này đang liệt kê ví dụ cho cụm 'various sports'. Cụm <b>'such as'</b> mang nghĩa 'như là' dùng để liệt kê ví dụ. Các từ khác: 'or' (hoặc), 'so' (vì vậy), 'but' (nhưng) đều không hợp nghĩa."
                    },
                    {
                        q: "Question 16: The prizes for the winners are (16) _____...",
                        options: ["value", "valueless", "valuable", "values"],
                        correctIndex: 2,
                        explanation: "<b>Dịch:</b> Giải thưởng dành cho những người chiến thắng rất có giá trị.<br><b>Giải thích:</b> Sau động từ tobe 'are' ta cần một Tính từ (Adjective) để miêu tả giải thưởng.<br>- value (n/v): giá trị / định giá<br>- valueless (adj): vô giá trị (sai nghĩa)<br>- <b>valuable (adj):</b> có giá trị, quý giá -> ĐÁP ÁN ĐÚNG<br>- values (n): những giá trị (số nhiều)."
                    }
                ]
            },
            {
                title: "PART 2: MICHAEL JORDAN",
                text: "My favorite sports star is Michael Jordan. He (19) _____ a famous basketball player in American National Basketball Association (NBA). He (20) _____ 15 seasons in the NBA, winning 6 championships with the Chicago Bulls. The NBA website writes: “... Michael Jordan is (21) _____ basketball player (22) _____ all time.” The spirit of Michael Jordan (23) _____ that he never gave up. It may be one of the secrets of the success for Michael Jordan. Such a spirit makes a difference in our lives, so we (24) _____ try our best if we want to be successful. He is also a very nice and generous person because he uses his money to help those who need his help.",
                translation: "Ngôi sao thể thao yêu thích của tôi là Michael Jordan. Anh ấy (19) <b>là</b> một cầu thủ bóng rổ nổi tiếng trong Hiệp hội Bóng rổ Quốc gia Mỹ (NBA). Anh ấy (20) <b>đã chơi</b> 15 mùa giải tại NBA, giành được 6 chức vô địch cùng với đội Chicago Bulls. Trang web của NBA viết: “... Michael Jordan là cầu thủ bóng rổ (21) <b>vĩ đại nhất</b> (22) <b>mọi thời đại</b>.” Tinh thần của Michael Jordan (23) <b>chính là</b> việc anh ấy không bao giờ bỏ cuộc. Đó có thể là một trong những bí quyết thành công của Michael Jordan. Một tinh thần như vậy tạo ra sự khác biệt trong cuộc sống của chúng ta, vì vậy chúng ta (24) <b>nên</b> cố gắng hết sức nếu muốn thành công. Anh ấy cũng là một người rất tử tế và hào phóng vì anh ấy sử dụng tiền của mình để giúp đỡ những người cần sự giúp đỡ.",
                glossary: [
                    { word: "Famous", pos: "Adjective (Tính từ)", meaning: "Nổi tiếng" },
                    { word: "Association", pos: "Noun (Danh từ)", meaning: "Hiệp hội, tổ chức" },
                    { word: "Season", pos: "Noun (Danh từ)", meaning: "Mùa giải (thể thao)" },
                    { word: "Championship", pos: "Noun (Danh từ)", meaning: "Chức vô địch, giải vô địch" },
                    { word: "Greatest", pos: "Adjective (Tính từ)", meaning: "Vĩ đại nhất (so sánh nhất)" },
                    { word: "Spirit", pos: "Noun (Danh từ)", meaning: "Tinh thần, ý chí" },
                    { word: "Give up", pos: "Phrasal Verb (Cụm ĐT)", meaning: "Từ bỏ, đầu hàng" },
                    { word: "Secret", pos: "Noun (Danh từ)", meaning: "Bí mật, bí quyết" },
                    { word: "Generous", pos: "Adjective (Tính từ)", meaning: "Hào phóng, rộng lượng" },
                    { word: "Make a difference", pos: "Idiom (Thành ngữ)", meaning: "Tạo ra sự khác biệt/tác động tích cực" }
                ],
                questions: [
                    {
                        q: "Question 19: He (19) _____ a famous basketball player...",
                        options: ["is", "has", "was", "be"],
                        correctIndex: 0,
                        explanation: "<b>Dịch:</b> Anh ấy là một cầu thủ bóng rổ nổi tiếng.<br><b>Giải thích:</b> Câu văn đang diễn tả một sự thật hiển nhiên ở hiện tại (Michael Jordan là một cầu thủ nổi tiếng). Do đó ta dùng thì Hiện tại đơn, chủ ngữ 'He' đi với tobe là <b>'is'</b>. Loại 'was' vì sự nổi tiếng của anh ấy vẫn còn ở hiện tại."
                    },
                    {
                        q: "Question 20: He (20) _____ 15 seasons in the NBA...",
                        options: ["played", "did", "took", "take"],
                        correctIndex: 0,
                        explanation: "<b>Dịch:</b> Anh ấy đã chơi 15 mùa giải tại NBA.<br><b>Giải thích:</b> Cầu thủ thi đấu thể thao ta dùng động từ 'play'. Hành động chơi 15 mùa giải này đã kết thúc trong quá khứ (anh ấy đã giải nghệ), nên ta dùng thì Quá khứ đơn là <b>'played'</b>."
                    },
                    {
                        q: "Question 21: Michael Jordan is (21) _____ basketball player...",
                        options: ["greatest", "the greatest", "greater", "great"],
                        correctIndex: 1,
                        explanation: "<b>Dịch:</b> ...là cầu thủ bóng rổ vĩ đại nhất.<br><b>Giải thích:</b> Ngữ cảnh ngụ ý so sánh anh ấy với toàn bộ các cầu thủ khác trên thế giới. Ta dùng cấu trúc So sánh nhất của tính từ ngắn (great): <b>the + adj-est</b> -> <b>the greatest</b>. Bắt buộc phải có mạo từ 'the'."
                    },
                    {
                        q: "Question 22: ...basketball player (22) _____ all time.",

        let totalQuestions = 0;

        /* ================= AUDIO API ================= */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playDing() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playBuzz() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(250, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.1);
            osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        /* ================= CONFETTI ================= */
        function triggerConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#FF9A9E', '#FDCB6E', '#00C9A7', '#8854C0', '#00D26A'];
            for(let i=0; i<30; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
                container.appendChild(conf);
                setTimeout(() => conf.remove(), 2500);
            }
        }

        /* ================= CORE LOGIC ================= */
        function toggleTranslation(id) {
            const el = document.getElementById(`trans-${id}`);
            if (el.style.display === 'block') {
                el.style.display = 'none';
            } else {
                el.style.display = 'block';
            }
        }

        // Shuffle logic that keeps track of the correct answer
        function shuffleOptions(options, correctIndex) {
            let mapped = options.map((opt, i) => ({ text: opt, isCorrect: i === correctIndex }));
            for (let i = mapped.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [mapped[i], mapped[j]] = [mapped[j], mapped[i]];
            }
            return mapped;
        }

                            answeredQuestions.add(currQId);
                            
                            // Disable all buttons in this question
                            Array.from(optionsGrid.children).forEach(b => b.classList.add('disabled'));

                            const expBox = document.getElementById(`exp-${currQId}`);

                            if (optData.isCorrect) {
                                btn.classList.add('correct');
                                playDing();
                                triggerConfetti();

                                // Show explanation immediately
                                expBox.style.display = 'block';
                            }
                        };
                        optionsGrid.appendChild(btn);
                    });

                    qCard.appendChild(optionsGrid);

                    // Explanation Box
                    const expBox = document.createElement('div');
                    expBox.id = `exp-${currQId}`;
                    expBox.className = 'explanation-box';
                    expBox.innerHTML = `<div class="exp-title">💡 Giải thích chi tiết từ cô Mai An:</div><div class="exp-content">${q.explanation}</div>`;
                    qCard.appendChild(expBox);

                    rightPane.appendChild(qCard);
                });
            });
        }

        /* ================= TIMER ================= */
        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer-display').innerText = 
                `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('btn-timer');
            if (!isTimerRunning) {
                if(timeLeft <= 0) return;
                isTimerRunning = true;
                btn.innerText = "TẠM DỪNG";
                btn.style.background = "#FF9F43";
                btn.style.boxShadow = "0 4px 0 #D47B29";
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        isTimerRunning = false;
                        btn.innerText = "HẾT GIỜ";
                        btn.style.background = "#FF4757";
                        btn.style.boxShadow = "none";
                        alert("⏰ Đã hết giờ làm bài! Bạn vẫn có thể tiếp tục làm, nhưng nhớ là trong phòng thi thật, bạn chỉ nên làm một bài như thế này trong 10 phút thôi nha.");
                    }
                }, 1000);
            } else {
                isTimerRunning = false;
                clearInterval(timerInterval);
                btn.innerText = "TIẾP TỤC";
                btn.style.background = "var(--tertiary)";
                btn.style.boxShadow = "0 4px 0 #00A68A";
            }
        }

        /* ================= SUBMIT & RESULT ================= */
        function submitQuiz() {
            clearInterval(timerInterval);
            const overlay = document.getElementById('result-overlay');
            const scoreText = document.getElementById('score-text');
            const scoreMsg = document.getElementById('score-msg');
            
            scoreText.innerText = `${score} / ${totalQuestions}`;
            
            let percentage = score / totalQuestions;
            if (percentage === 1) {
                scoreMsg.innerText = "Thiên tài ngoại ngữ xuất hiện! 🌟 Hoàn hảo tuyệt đối!";
                triggerConfetti(); triggerConfetti();
                playDing();
            } else if (percentage >= 0.8) {
                scoreMsg.innerText = "Làm tốt lắm! Bạn cực kỳ xuất sắc đấy! 🔥";
                triggerConfetti();
                playDing();
            } else if (percentage >= 0.5) {
                scoreMsg.innerText = "Cũng khá ghê! Cố gắng luyện tập thêm chút nữa nhé! 💪";
            } else {
                scoreMsg.innerText = "Đừng buồn nhé! Xem lại giải thích bên dưới để rút kinh nghiệm nè! ❤️";
                playBuzz();
            }

            overlay.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('result-overlay').style.display = 'none';
        }

        // Initialize
        window.onload = () => {
            buildUI();
            updateTimerDisplay();
        };
    </script>
</body>
</html>
