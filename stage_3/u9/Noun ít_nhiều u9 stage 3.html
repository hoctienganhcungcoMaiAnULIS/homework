<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #C58352;    /* Nâu Gấu Teddy */
            --secondary: #E8B478;  /* Vàng Mật Ong */
            --tertiary: #E29578;   /* Hồng Cam Đất */
            --correct: #28C76F;    /* Xanh lá tươi tắn */
            --wrong: #FF4D4F;      /* Đỏ cam */
            --text-dark: #4A3B32;  /* Nâu đen ấm */
            --bg-card: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatPattern {
            0% { background-position: 0px 0px; }
            100% { background-position: 1000px 1000px; }
        }

        body {
            /* Gradient tone ấm áp: Caramel, Honey, Biscuit, Soft Pink */
            background: linear-gradient(-45deg, #C58352, #E8B478, #E29578, #FFDAC1);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
            position: relative;
        }

        /* Họa tiết Gấu Teddy, Dấu chân gấu & Trái tim lơ lửng */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.8'%3E%3C!-- Bear Head --%3E%3Ccircle cx='30' cy='30' r='14'/%3E%3Ccircle cx='18' cy='18' r='6'/%3E%3Ccircle cx='42' cy='18' r='6'/%3E%3Ccircle cx='30' cy='34' r='6' fill='%23ffffff' fill-opacity='0.9'/%3E%3C!-- Paw Print --%3E%3Ccircle cx='90' cy='85' r='10'/%3E%3Ccircle cx='77' cy='72' r='4.5'/%3E%3Ccircle cx='90' cy='66' r='4.5'/%3E%3Ccircle cx='103' cy='72' r='4.5'/%3E%3C!-- Heart --%3E%3Cpath d='M 65 35 A 5 5 0 0 0 55 35 A 5 5 0 0 0 45 35 Q 45 42 55 50 Q 65 42 65 35 Z'/%3E%3C/g%3E%3C/svg%3E");
            animation: floatPattern 45s linear infinite;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
            text-shadow: 2px 2px 4px rgba(139, 69, 19, 0.3);
        }

        .small-heading {
            font-size: 1.2rem;
            font-weight: 800;
            background: rgba(255,255,255,0.25);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.4);
            color: #5A3A22;
            text-shadow: none;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .section-title {
            background: white;
            color: var(--primary);
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 1.4rem;
            font-weight: 800;
            margin: 40px 0 20px 0;
            box-shadow: 0 6px 0 rgba(197, 131, 82, 0.2);
            text-align: center;
            border: 2px dashed var(--secondary);
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(139, 69, 19, 0.1);
            border: 3px solid white;
            transition: all 0.3s ease;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .btn-option {
            background: white;
            border: 2px solid #E8E0D5;
            border-radius: 18px;
            padding: 15px 20px;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-dark);
            cursor: pointer;
            box-shadow: 0 6px 0 #E8E0D5;
            transition: transform 0.1s, box-shadow 0.1s, background 0.3s;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-option:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #E8E0D5;
            border-color: var(--secondary);
        }

        .btn-option:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #E8E0D5;
        }

        .btn-option.correct {
            background: var(--correct);
            border-color: #20A159;
            color: white;
            box-shadow: 0 6px 0 #20A159;
        }

        .btn-option.wrong {
            background: var(--wrong);
            border-color: #D33D40;
            color: white;
            box-shadow: 0 6px 0 #D33D40;
        }

        .btn-option:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Gap Fill Style - Honey Theme */
        .gap-btn {
            background: #FFF8E7;
            border: 2px dashed #E8B478;
            border-radius: 10px;
            padding: 5px 15px;
            color: #A66D2B;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 0 #F4D399;
            transition: all 0.2s;
            display: inline-block;
        }
        .gap-btn:hover {
            transform: scale(1.05);
            background: #F4D399;
        }
        .gap-btn.answered-correct {
            background: var(--correct); border-color: #20A159; color: white; border-style: solid; box-shadow: 0 4px 0 #20A159;
        }
        .gap-btn.answered-wrong {
            background: var(--wrong); border-color: #D33D40; color: white; border-style: solid; box-shadow: 0 4px 0 #D33D40;
        }

        /* Explanation Box */
        .explanation {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #FFF9F2;
            border-left: 6px solid var(--secondary);
            border-radius: 10px;
            font-size: 1.05rem;
            line-height: 1.6;
            animation: slideDown 0.4s ease forwards;
            color: var(--text-dark);
        }

        .explanation h4 { margin-bottom: 10px; color: var(--primary); font-size: 1.15rem; }
        .explanation p { margin-bottom: 8px; }
        .explanation ul { margin-left: 20px; margin-bottom: 10px; }
        .explanation li { margin-bottom: 5px; }
        .expl-highlight { font-weight: 800; color: var(--wrong); }
        .expl-correct { font-weight: 800; color: var(--correct); }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        /* Modal Popup */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(74, 59, 50, 0.6); z-index: 1000; justify-content: center; align-items: center;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px;
            text-align: center; box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid var(--secondary);
        }
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Nút Submit */
        .submit-btn {
            display: block; width: 100%; max-width: 400px; margin: 40px auto;
            background: linear-gradient(135deg, #E8B478, #C58352);
            color: white; font-size: 1.5rem; font-weight: 900;
            padding: 20px; border-radius: 25px; border: none;
            box-shadow: 0 8px 0 #A66D2B; cursor: pointer; text-transform: uppercase;
            transition: all 0.2s; text-align: center; text-decoration: none;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 11px 0 #A66D2B; }
        .submit-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #A66D2B; }

        /* Confetti (Sắc ấm) */
        .confetti {
            position: fixed; width: 10px; height: 10px; z-index: 9999;
            pointer-events: none; animation: fall linear forwards;
            border-radius: 2px;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        /* Floating Score */
        .score-bar {
            position: sticky; top: 10px; background: rgba(255,255,255,0.9);
            padding: 10px 20px; border-radius: 20px; display: flex; justify-content: space-between;
            align-items: center; font-size: 1.2rem; font-weight: 800; box-shadow: 0 4px 10px rgba(139, 69, 19, 0.15);
            z-index: 100; margin-bottom: 20px; border: 2px solid var(--primary); backdrop-filter: blur(5px);
            color: var(--text-dark);
        }
    </style>
</head>
<body>

<div class="pattern-overlay"></div>

<div class="container">
    <header>
        <div class="small-heading">Giáo viên tạo: Ms Mai An ULIS</div>
        <h1>🧸 Ngữ Pháp Siêu Vui: Danh Từ Số Nhiều 🍯</h1>
    </header>

    <div class="score-bar">
        <span>Tiến độ: <span id="progress-text">0/30</span></span>
        <span>Mật ong: 🍯 <span id="score-text" style="color: var(--primary);">0</span></span>
    </div>

    <div id="quiz-container">
        </div>

    <button class="submit-btn" onclick="finishQuiz()">Nộp bài ngay 🐾</button>
</div>

<div class="modal-overlay" id="gapModal">
    <div class="modal-content">
        <h2 style="margin-bottom: 20px; color: var(--primary);">Chọn từ đúng điền vào chỗ trống 🍯:</h2>
        <div class="options-grid" id="modal-options">
            </div>
        <button onclick="closeModal()" style="margin-top: 20px; padding: 10px 20px; border-radius: 10px; border: none; background: #eee; color: var(--text-dark); cursor:pointer; font-weight:bold;">Đóng ❌</button>
    </div>
</div>

<div class="modal-overlay" id="resultModal">
    <div class="modal-content" style="background: #FFF9F2;">
        <h1 style="font-size: 4rem; margin-bottom: 10px;">🧸</h1>
        <h2 id="final-compliment" style="color: var(--primary); margin-bottom: 15px; font-size: 1.8rem;">Tuyệt vời!</h2>
        <p style="font-size: 1.3rem; margin-bottom: 20px; color: var(--text-dark);">Bạn đã trả lời đúng <strong id="final-score" style="color: var(--correct); font-size: 1.8rem;"></strong> câu.</p>
        <button class="submit-btn" style="font-size: 1.2rem; padding: 15px;" onclick="location.reload()">Làm lại bài thi 🔄</button>
    </div>
</div>

<script>
    // --- BỘ DỮ LIỆU ĐỀ BÀI (NGUYÊN BẢN THEO YÊU CẦU TOÀN VẸN DỮ LIỆU) ---
    const quizData = [
        // BÀI 1: Khoanh tròn dạng số nhiều ĐÚNG
        { section: "Bài 1: Khoanh tròn vào dạng số nhiều ĐÚNG của các danh từ sau (10 câu). Áp dụng các quy tắc thêm 's', 'es' hoặc đổi đuôi." },
        { id: 1, type: "choice", q: "book 👉", 
          options: [{t: "books", c: true}, {t: "bookes", c: false}, {t: "book", c: false}, {t: "bookses", c: false}],
          transQ: "Chọn dạng số nhiều đúng của danh từ 'book' (quyển sách).",
          optsExpl: "A. books (Những quyển sách); B. bookes (Sai chính tả); C. book (Danh từ số ít); D. bookses (Sai chính tả).",
          whyC: "Danh từ 'book' tận cùng là phụ âm 'k', theo quy tắc chung ta chỉ cần thêm đuôi 's' để tạo thành số nhiều.",
          whyW: "Đuôi 'es' chỉ được thêm vào sau các danh từ có tận cùng là: -s, -ss, -sh, -ch, -x, -o, -z. 'book' không thuộc nhóm này nên thêm 'es' là sai hoàn toàn." },
        { id: 2, type: "choice", q: "box 👉", 
          options: [{t: "boxes", c: true}, {t: "boxs", c: false}, {t: "box", c: false}, {t: "boxies", c: false}],
          transQ: "Chọn dạng số nhiều đúng của danh từ 'box' (cái hộp).",
          optsExpl: "A. boxes (Những cái hộp); B. boxs (Sai chính tả); C. box (Danh từ số ít); D. boxies (Sai chính tả).",
          whyC: "Danh từ 'box' có tận cùng là chữ 'x'. Theo quy tắc, các danh từ tận cùng bằng -s, -ss, -sh, -ch, -x, -o, -z phải thêm 'es'.",
          whyW: "Nếu chỉ thêm 's' (boxs) thì sẽ rất khó phát âm. Các đáp án khác sai quy tắc ngữ pháp." },
        { id: 3, type: "choice", q: "baby 👉", 
          options: [{t: "babies", c: true}, {t: "babys", c: false}, {t: "babyies", c: false}, {t: "babyes", c: false}],
          transQ: "Chọn dạng số nhiều đúng của danh từ 'baby' (em bé).",
          optsExpl: "A. babies (Những em bé); B. babys (Sai chính tả); C. babyies (Sai chính tả); D. babyes (Sai chính tả).",
          whyC: "Danh từ 'baby' tận cùng là chữ 'y', trước 'y' là một phụ âm ('b'). Quy tắc: Đổi 'y' thành 'i' rồi thêm 'es'.",
          whyW: "Việc giữ nguyên 'y' và thêm 's' (babys) chỉ áp dụng khi trước 'y' là một nguyên âm (u, e, o, a, i)." },
        { id: 4, type: "choice", q: "knife 👉", 
          options: [{t: "knives", c: true}, {t: "knifes", c: false}, {t: "kniffs", c: false}, {t: "knive", c: false}],
          transQ: "Chọn dạng số nhiều đúng của danh từ 'knife' (con dao).",
          optsExpl: "A. knives (Những con dao); B. knifes (Sai chính tả); C. kniffs (Sai chính tả); D. knive (Sai chính tả).",
          whyC: "Danh từ 'knife' tận cùng bằng '-fe'. Quy tắc bất quy tắc: Ta phải đổi đuôi '-fe' thành '-ves'.",
          whyW: "Thêm trực tiếp 's' vào sau 'fe' là lỗi sai phổ biến. Cần ghi nhớ quy tắc đổi 'f/fe' thành 'ves' cho một số từ (như leaf -> leaves, wife -> wives)." },
        { id: 5, type: "choice", q: "boy 👉", 
          options: [{t: "boys", c: true}, {t: "boyes", c: false}, {t: "boies", c: false}, {t: "boy", c: false}],
          transQ: "Chọn dạng số nhiều đúng của danh từ 'boy' (cậu bé).",
          optsExpl: "A. boys (Những cậu bé); B. boyes (Sai chính tả); C. boies (Sai chính tả); D. boy (Số ít).",
          whyC: "Danh từ 'boy' tận cùng là chữ 'y', nhưng trước 'y' là MỘT NGUYÊN ÂM ('o'). Do đó, ta chỉ việc thêm 's' theo quy tắc chung.",
          whyW: "Không được đổi 'y' thành 'i' rồi thêm 'es' vì chữ cái đứng trước 'y' không phải là phụ âm. Các đáp án B, C sai hoàn toàn." },
        { id: 6, type: "choice", q: "tomato 👉", 
          options: [{t: "tomatoes", c: true}, {t: "tomatos", c: false}, {t: "tomato", c: false}, {t: "tomatoeses", c: false}],
          transQ: "Chọn dạng số nhiều đúng của danh từ 'tomato' (quả cà chua).",
          optsExpl: "A. tomatoes (Những quả cà chua); B. tomatos (Sai chính tả); C. tomato (Số ít); D. tomatoeses (Sai).",
          whyC: "Danh từ 'tomato' tận cùng là chữ 'o', trước nó là một phụ âm ('t'). Hầu hết các từ như vậy đều thêm 'es' (ví dụ: potato -> potatoes, hero -> heroes).",
          whyW: "Thêm 's' (tomatos) là dạng viết sai chính tả rất dễ mắc bẫy. Phải nhớ quy tắc thêm 'es' sau chữ 'o'." },
        { id: 7, type: "choice", q: "watch 👉", 
          options: [{t: "watches", c: true}, {t: "watchs", c: false}, {t: "watchies", c: false}, {t: "watch", c: false}],
          transQ: "Chọn dạng số nhiều đúng của danh từ 'watch' (đồng hồ đeo tay).",
          optsExpl: "A. watches (Những chiếc đồng hồ); B. watchs (Sai chính tả); C. watchies (Sai); D. watch (Số ít).",
          whyC: "Tận cùng của từ 'watch' là '-ch' (một trong nhóm ông Sáu chạy xe SH dỏm: o, s, ch, x, sh, z). Ta bắt buộc phải thêm đuôi 'es'.",
          whyW: "Nếu thêm 's' (watchs), người đọc sẽ không thể phát âm được hai âm gió đứng sát nhau. 'es' được sinh ra để tạo thêm một âm tiết /iz/ giúp dễ đọc." },
        { id: 8, type: "choice", q: "country 👉", 
          options: [{t: "countries", c: true}, {t: "countrys", c: false}, {t: "countres", c: false}, {t: "countryes", c: false}],
          transQ: "Chọn dạng số nhiều đúng của danh từ 'country' (đất nước).",
          optsExpl: "A. countries (Các quốc gia); B. countrys (Sai); C. countres (Sai); D. countryes (Sai).",
          whyC: "'country' tận cùng bằng 'y', trước 'y' là phụ âm 'r'. Áp dụng quy tắc: Đổi 'y' thành 'i' và thêm 'es'.",
          whyW: "Giữ nguyên 'y' thêm 's' (countrys) là sai vì trước 'y' là phụ âm, không phải nguyên âm." },
        { id: 9, type: "choice", q: "class 👉", 
          options: [{t: "classes", c: true}, {t: "classs", c: false}, {t: "class", c: false}, {t: "classies", c: false}],
          transQ: "Chọn dạng số nhiều đúng của danh từ 'class' (lớp học).",
          optsExpl: "A. classes (Những lớp học); B. classs (Sai); C. class (Số ít); D. classies (Sai).",
          whyC: "Từ này tận cùng bằng hai chữ 's' (-ss). Thuộc nhóm quy tắc bắt buộc thêm 'es' phía sau.",
          whyW: "Viết 'classs' với 3 chữ 's' liên tiếp là hoàn toàn sai quy tắc chính tả tiếng Anh." },
        { id: 10, type: "choice", q: "key 👉", 
          options: [{t: "keys", c: true}, {t: "keies", c: false}, {t: "keyes", c: false}, {t: "key", c: false}],
          transQ: "Chọn dạng số nhiều đúng của danh từ 'key' (chìa khóa).",
          optsExpl: "A. keys (Những chiếc chìa khóa); B. keies (Sai); C. keyes (Sai); D. key (Số ít).",
          whyC: "Từ 'key' kết thúc bằng 'y', nhưng đứng trước 'y' là nguyên âm 'e'. Do đó, ta giữ nguyên chữ 'y' và chỉ việc thêm 's'.",
          whyW: "Không áp dụng quy tắc đổi 'y' thành 'i' + 'es' (keies) ở đây vì có nguyên âm đứng trước." },

        // BÀI 2: Viết dạng số nhiều (Biến thành Gap Fill)
        { section: "Bài 2: Viết dạng số nhiều của các danh từ sau vào chỗ trống (10 câu). Thử thách trí nhớ với các danh từ bất quy tắc!" },
        { id: 11, type: "gap", q: "a man ➔ [GAP]", gapAns: "men",
          options: [{t: "men", c: true}, {t: "mans", c: false}, {t: "manes", c: false}, {t: "mens", c: false}],
          transQ: "Viết số nhiều của 'a man' (một người đàn ông).",
          optsExpl: "A. men (Những người đàn ông); B. mans (Sai); C. manes (Sai); D. mens (Sai).",

    // --- LOGIC HỆ THỐNG ---
    const container = document.getElementById('quiz-container');
    let answeredQuestions = 0;
    let correctAnswers = 0;
    let currentGapId = null;

    // Web Audio API Context
    let audioCtx;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(type) {
        initAudio();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'correct') {
            // Âm thanh Ding trong trẻo
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); // A5
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        } else {
            // Âm thanh Buzz Téo tèo tèo
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    function fireConfetti() {
        const warmColors = ['#C58352', '#E8B478', '#E29578', '#FFDAC1', '#28C76F'];
        for(let i=0; i<30; i++) {
            let conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.backgroundColor = warmColors[Math.floor(Math.random() * warmColors.length)];
            conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 3000);
        }
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function renderQuiz() {
        let html = '';
        quizData.forEach((item) => {
            if (item.section) {
                html += `<div class="section-title">${item.section}</div>`;
                return;
            }

            const qId = item.id;
            let questionHtml = '';
            
            if (item.type === 'choice') {
                questionHtml = `<div class="question-text">Question ${qId}: ${item.q}</div>`;
                let shuffledOptions = shuffleArray([...item.options]);
                let optionsHtml = '<div class="options-grid">';
                shuffledOptions.forEach((opt, idx) => {
                    const letter = String.fromCharCode(65 + idx);
                    optionsHtml += `<button class="btn-option" id="btn-${qId}-${idx}" onclick="handleChoice(${qId}, ${idx}, ${opt.c})">${letter}. ${opt.t}</button>`;
                });
                optionsHtml += '</div>';
                questionHtml += optionsHtml;
            } else if (item.type === 'gap') {
                let textWithGap = item.q.replace('[GAP]', `<div class="gap-btn" id="gap-${qId}" onclick="openGapModal(${qId})">Bấm chọn từ...</div>`);
                questionHtml = `<div class="question-text">Question ${qId}: ${textWithGap}</div>`;
            }

            let explHtml = `
                <div class="explanation" id="expl-${qId}">
                    <h4>🌟 Giải thích chi tiết:</h4>
                    <p><strong>1. Dịch câu hỏi:</strong> ${item.transQ}</p>
                    <p><strong>2. Phân tích 4 đáp án:</strong> ${item.optsExpl}</p>
                    <p><strong>3. <span class="expl-correct">Tại sao đúng?</span></strong> ${item.whyC}</p>
                    <p><strong>4. <span class="expl-highlight">Tại sao các đáp án khác sai?</span></strong> ${item.whyW}</p>
                </div>
            `;

            html += `<div class="card" id="card-${qId}">${questionHtml}${explHtml}</div>`;
        });
        container.innerHTML = html;
    }

    function handleChoice(qId, optIdx, isCorrect) {
        const card = document.getElementById(`card-${qId}`);
        const buttons = card.querySelectorAll('.btn-option');
        if (buttons[0].disabled) return;

        buttons.forEach(btn => btn.disabled = true);
        const clickedBtn = document.getElementById(`btn-${qId}-${optIdx}`);
        processAnswer(card, clickedBtn, isCorrect, qId);
    }

    function openGapModal(qId) {
        const card = document.getElementById(`card-${qId}`);
        if(card.classList.contains('answered')) return;

        currentGapId = qId;
        const item = quizData.find(x => x.id === qId);
        let shuffledOptions = shuffleArray([...item.options]);
        
        let html = '';
        shuffledOptions.forEach((opt, idx) => {
            html += `<button class="btn-option" onclick="handleGapChoice(${idx}, ${opt.c}, '${opt.t}')">${opt.t}</button>`;
        });
        document.getElementById('modal-options').innerHTML = html;
        document.getElementById('gapModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('gapModal').style.display = 'none';
        currentGapId = null;
    }

    function handleGapChoice(optIdx, isCorrect, textStr) {
        const qId = currentGapId;
        closeModal();
        
        const card = document.getElementById(`card-${qId}`);
        const gapBtn = document.getElementById(`gap-${qId}`);
        gapBtn.innerText = textStr;

        processAnswer(card, gapBtn, isCorrect, qId);
        
        if(isCorrect) {
            gapBtn.classList.add('answered-correct');
        } else {
            gapBtn.classList.add('answered-wrong');
        }
    }

    function processAnswer(card, elementTarget, isCorrect, qId) {
        card.classList.add('answered');
        document.getElementById(`expl-${qId}`).style.display = 'block';

        if (isCorrect) {
            elementTarget.classList.add('correct');
            playSound('correct');
            fireConfetti();
            correctAnswers++;
        } else {
            elementTarget.classList.add('wrong');
            playSound('wrong');
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 500);
            
            if(elementTarget.classList.contains('btn-option')) {
                const item = quizData.find(x => x.id === qId);
                const buttons = card.querySelectorAll('.btn-option');
                buttons.forEach(btn => {
                    if(item.options.find(o => btn.innerText.includes(o.t) && o.c)) {
                        btn.classList.add('correct');
                        btn.style.opacity = '0.5';
                    }
                });
            }
        }

        answeredQuestions++;
        updateScoreBoard();
    }

    function updateScoreBoard() {
        document.getElementById('progress-text').innerText = `${answeredQuestions}/30`;
        document.getElementById('score-text').innerText = correctAnswers * 10;
    }

    function finishQuiz() {
        if (answeredQuestions < 30) {
            alert('Bạn hãy hoàn thành tất cả 30 câu hỏi để xem kết quả nhé! 🐾🍯');
            return;
        }
        
        document.getElementById('final-score').innerText = `${correctAnswers}/30`;
        let comp = document.getElementById('final-compliment');
        if(correctAnswers === 30) comp.innerText = "Tuyệt đỉnh! Master Ngữ Pháp! 🧸✨";
        else if(correctAnswers >= 25) comp.innerText = "Xuất sắc lắm học trò cưng! 🍯🚀";
        else if(correctAnswers >= 15) comp.innerText = "Khá lắm, gấu nhỏ cố lên nhé! 🐾💪";
        else comp.innerText = "Đừng buồn, xem kỹ giải thích để làm tốt hơn nhé! 🤎";

        document.getElementById('resultModal').style.display = 'flex';
        fireConfetti();
        fireConfetti();
    }

    window.onload = renderQuiz;

    document.getElementById('gapModal').addEventListener('click', function(e) {
        if(e.target === this) closeModal();
    });
</script>

</body>
</html>
