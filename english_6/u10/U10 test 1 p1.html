<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Test – Future & Smart Home | Ms Mai An ULIS</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#8854C0;--yellow:#FDCB6E;--teal:#00C9A7;--pink:#FF6B9D;
  --green:#00D26A;--red:#FF4757;--card:#ffffffef;
}

@keyframes gradientShift{
  0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
}
@keyframes floatA{
  0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-22px) rotate(5deg)}
}
@keyframes floatB{
  0%,100%{transform:translateY(0) rotate(4deg)}50%{transform:translateY(-18px) rotate(-6deg)}
}
@keyframes floatC{
  0%,100%{transform:translateY(0) rotate(0deg)}33%{transform:translateY(-14px) rotate(8deg)}66%{transform:translateY(-26px) rotate(-4deg)}
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-9px) rotate(-1deg)}
  30%{transform:translateX(9px) rotate(1deg)}
  45%{transform:translateX(-7px)}
  60%{transform:translateX(7px)}
  75%{transform:translateX(-4px)}
  90%{transform:translateX(4px)}
}
@keyframes popIn{
  0%{transform:scale(0.85);opacity:0}
  60%{transform:scale(1.04)}
  100%{transform:scale(1);opacity:1}
}
@keyframes slideDown{
  from{opacity:0;transform:translateY(-12px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes pulse{
  0%,100%{transform:scale(1)}
  40%{transform:scale(1.06)}
}
@keyframes correctFlash{
  0%{background-position:0% 50%}100%{background-position:100% 50%}
}
@keyframes spin{
  from{transform:rotate(0deg)}to{transform:rotate(360deg)}
}

body{
  font-family:'Nunito',sans-serif;
  min-height:100vh;
  background:linear-gradient(-45deg,#8854C0,#FDCB6E,#00C9A7,#FF6B9D,#A8E6CF,#c7b5ff,#FFD3B6,#00C9A7);
  background-size:600% 600%;
  animation:gradientShift 10s ease infinite;
  padding:20px 16px 60px;
  position:relative;
  overflow-x:hidden;
}

/* Floating pattern layer */
.floats{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.fi{position:absolute;opacity:.13;animation-timing-function:ease-in-out;animation-iteration-count:infinite}

.wrap{max-width:860px;margin:0 auto;position:relative;z-index:1}

/* Header */
header{
  text-align:center;
  padding:14px 24px 16px;
  background:rgba(255,255,255,.22);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-radius:22px;
  margin-bottom:28px;
  border:2.5px solid rgba(255,255,255,.45);
  box-shadow:0 8px 32px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.5);
}
header h1{
  font-size:clamp(1.2rem,3vw,1.7rem);
  font-weight:900;
  color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,.25);
  line-height:1.3;
}
header p{
  font-size:.9rem;color:rgba(255,255,255,.92);font-weight:700;margin-top:4px;
  text-shadow:0 1px 6px rgba(0,0,0,.2);
}

/* Progress bar */
.progress-wrap{
  background:rgba(255,255,255,.25);border-radius:20px;height:12px;
  margin-bottom:24px;overflow:hidden;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.15);
}
.progress-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--green),var(--teal));
  border-radius:20px;transition:width .4s ease;
  box-shadow:0 2px 8px rgba(0,210,106,.4);
}
.progress-label{
  text-align:center;font-size:.82rem;font-weight:800;
  color:rgba(255,255,255,.95);margin-top:4px;text-shadow:0 1px 4px rgba(0,0,0,.2);
}

/* Section header */
.sec{
  padding:10px 20px;
  background:rgba(255,255,255,.28);
  backdrop-filter:blur(8px);
  border-radius:14px;
  margin:22px 0 12px;
  font-weight:900;font-size:1rem;color:#fff;
  text-shadow:0 1px 6px rgba(0,0,0,.2);
  border-left:5px solid rgba(255,255,255,.65);
  box-shadow:0 4px 15px rgba(0,0,0,.08);
}

/* Question card */
.qcard{
  background:var(--card);
  border-radius:24px;
  padding:22px 24px 20px;
  margin-bottom:18px;
  box-shadow:0 6px 28px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.06);
  border:2px solid rgba(255,255,255,.8);
  animation:popIn .35s ease;
  transition:box-shadow .3s;
}
.qcard:hover{box-shadow:0 10px 36px rgba(0,0,0,.13)}

.qnum{
  font-size:.78rem;font-weight:900;color:var(--purple);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px;
}
.qtxt{
  font-size:1.05rem;font-weight:700;color:#2d3436;
  margin-bottom:16px;line-height:1.7;
}
.qtxt u{text-decoration:underline;text-underline-offset:3px}
.instr{
  font-size:.82rem;font-weight:600;color:#7f8c8d;
  margin-bottom:12px;font-style:italic;
}

/* Options */
.opts{display:grid;gap:9px}
.obtn{
  background:linear-gradient(135deg,#f5f7ff,#eaedff);
  border:3px solid #c5d0ff;
  border-radius:16px;
  padding:12px 16px;
  font-size:.98rem;font-weight:700;color:#3d3d6b;
  cursor:pointer;text-align:left;
  transition:transform .15s,box-shadow .15s,background .2s,border-color .2s;
  box-shadow:0 4px 0 #b0befc,0 6px 14px rgba(0,0,0,.07);
  display:flex;align-items:center;gap:11px;
  font-family:'Nunito',sans-serif;
  position:relative;overflow:hidden;
}
.obtn .lbl{
  background:var(--purple);color:#fff;
  border-radius:9px;min-width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  font-size:.82rem;font-weight:900;flex-shrink:0;
  transition:background .2s;
}
.obtn:hover:not(:disabled){
  transform:scale(1.02) translateY(-2px);
  box-shadow:0 6px 0 #b0befc,0 12px 24px rgba(0,0,0,.1);
  border-color:var(--purple);background:linear-gradient(135deg,#eeeaff,#e2e0ff);
}
.obtn.correct{
  background:linear-gradient(135deg,#d0ffe8,#a3ffce);
  border-color:var(--green);color:#006335;
  box-shadow:0 4px 0 #00a850,0 8px 20px rgba(0,210,106,.22);
  animation:pulse .35s ease;
}
.obtn.correct .lbl{background:var(--green)}
.obtn.wrong{
  background:linear-gradient(135deg,#ffe3e6,#ffccd2);
  border-color:var(--red);color:#7a0010;
  box-shadow:0 4px 0 #cc2233,0 8px 20px rgba(255,71,87,.22);
  animation:shake .45s ease;
}
.obtn.wrong .lbl{background:var(--red)}
.obtn:disabled{cursor:not-allowed;opacity:.95}

/* Explanation box */
.expbox{
  display:none;margin-top:14px;
  background:linear-gradient(135deg,#fffae6,#fff7d6);
  border-radius:16px;padding:16px 18px;
  border-left:5px solid var(--yellow);
  font-size:.9rem;line-height:1.8;color:#4a3f00;
  animation:slideDown .3s ease;
  box-shadow:0 4px 16px rgba(253,203,110,.18);
}
.expbox.show{display:block}
.etitle{
  font-weight:900;color:var(--purple);font-size:1rem;
  margin-bottom:10px;
}

/* Sign containers */
.sign-wrap{display:flex;justify-content:center;margin-bottom:16px;gap:20px;flex-wrap:wrap}

.caution-box{
  background:#FFD700;
  border:4px solid #111;
  border-radius:8px;
  padding:12px 18px;
  text-align:center;
  min-width:140px;
  box-shadow:4px 4px 12px rgba(0,0,0,.3);
  font-family:Arial,sans-serif;
}
.caution-box .c-top{
  display:flex;align-items:center;justify-content:center;
  gap:7px;margin-bottom:6px;
}
.tri{
  width:0;height:0;
  border-left:13px solid transparent;
  border-right:13px solid transparent;
  border-bottom:22px solid #111;
  position:relative;flex-shrink:0;
}
.tri::after{
  content:'!';position:absolute;
  bottom:-20px;left:-5px;
  color:#FFD700;font-weight:900;font-size:12px;
}
.c-label{font-weight:900;font-size:1.05rem;color:#111;letter-spacing:1px}
.c-figure{font-size:2.4rem;margin:3px 0}
.c-msg{
  background:#111;color:#FFD700;
  padding:5px 10px;font-weight:800;
  font-size:.9rem;border-radius:5px;margin-top:3px;
}

.house-box{display:inline-block}
.h-roof{
  width:0;height:0;
  border-left:70px solid transparent;
  border-right:70px solid transparent;
  border-bottom:60px solid #8B1A1A;
}
.h-wall{
  background:#8B1A1A;width:140px;
  padding:10px 8px 12px;
  text-align:center;
  border-radius:0 0 6px 6px;
}
.h-txt{color:#fff;font-weight:900;font-size:1.15rem;letter-spacing:1px;line-height:1.25}
.h-board{
  background:#fff;border:2.5px solid #8B1A1A;
  width:72px;height:18px;
  border-radius:3px;margin:8px auto 0;
}

/* Submit button */
.subbtn{
  display:block;width:100%;max-width:320px;margin:32px auto 0;
  padding:16px 32px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;border:none;border-radius:22px;
  font-size:1.15rem;font-weight:900;cursor:pointer;
  box-shadow:0 6px 0 #5c3a8a,0 12px 28px rgba(136,84,192,.38);
  transition:transform .2s,box-shadow .2s;
  font-family:'Nunito',sans-serif;letter-spacing:.5px;
}
.subbtn:hover{transform:translateY(-2px);box-shadow:0 8px 0 #5c3a8a,0 16px 36px rgba(136,84,192,.45)}
.subbtn:active{transform:translateY(3px);box-shadow:0 3px 0 #5c3a8a}

/* Modal */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.62);
  display:none;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
}
.overlay.show{display:flex}
.modal{
  background:#fff;border-radius:30px;
  padding:38px 36px;text-align:center;
  max-width:420px;width:100%;
  animation:popIn .45s ease;
  box-shadow:0 24px 60px rgba(0,0,0,.28);
}
.m-emoji{font-size:5rem;margin-bottom:12px;display:block}
.m-title{font-size:1.9rem;font-weight:900;color:var(--purple);margin-bottom:10px}
.m-score{font-size:3.2rem;font-weight:900;color:var(--green);margin:14px 0}
.m-bar-wrap{background:#eee;border-radius:20px;height:14px;overflow:hidden;margin:0 0 16px;box-shadow:inset 0 2px 4px rgba(0,0,0,.12)}
.m-bar{height:100%;background:linear-gradient(90deg,var(--green),var(--teal));border-radius:20px;transition:width 1s ease}
.m-msg{font-size:1.05rem;color:#555;font-weight:700;line-height:1.6;margin-bottom:20px}
.m-close{
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;border:none;border-radius:16px;
  padding:13px 32px;font-size:1rem;font-weight:900;
  cursor:pointer;font-family:'Nunito',sans-serif;
  box-shadow:0 4px 0 #5c3a8a;transition:transform .2s;
}
.m-close:hover{transform:translateY(-2px)}

/* Confetti canvas */
#ccanvas{position:fixed;inset:0;pointer-events:none;z-index:999}

/* Sentence list box */
.sbox{
  background:#f0f4ff;border-radius:14px;
  padding:14px 18px;margin:10px 0 14px;
  line-height:2.1;font-size:.95rem;color:#2d3436;
  border-left:4px solid var(--purple);
}

/* Inline code style */
code{background:#f0e8ff;color:var(--purple);padding:2px 7px;border-radius:6px;font-family:'Nunito',sans-serif;font-weight:700}
</style>
</head>
<body>

<canvas id="ccanvas"></canvas>
<div class="floats" id="floatLayer"></div>

<div class="wrap">
  <header>
    <h1>🏠 English Test: Future &amp; Smart Home</h1>
    <p>👩‍🏫 Giáo viên: Ms Mai An ULIS</p>
  </header>

  <div class="progress-wrap">
    <div class="progress-bar" id="progBar"></div>
  </div>
  <div class="progress-label" id="progLabel">0 / 20 câu đã trả lời</div>

  <div id="qzone"></div>

  <button class="subbtn" onclick="submitQuiz()">🎯 Nộp Bài &amp; Xem Điểm</button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <span class="m-emoji" id="mEmoji">🎉</span>
    <div class="m-title">Kết Quả Bài Thi</div>
    <div class="m-score" id="mScore">0/20</div>
    <div class="m-bar-wrap"><div class="m-bar" id="mBar" style="width:0%"></div></div>
    <div class="m-msg" id="mMsg">Chúc mừng em!</div>
    <button class="m-close" onclick="document.getElementById('overlay').classList.remove('show')">📝 Xem Lại Bài ✨</button>
  </div>
</div>

<script>
// ── FLOATING ICONS ──────────────────────────────────────────────────────────
const ICONS=['⭐','🌸','🍎','🍋','🌈','🐱','☁️','🌺','🎈','✨','🍓','🌙','💫','🦋','🌻','🍊','🐶','🍉','🎀','🌟'];
const fl=document.getElementById('floatLayer');
const anims=['floatA','floatB','floatC'];
for(let i=0;i<28;i++){
  const s=document.createElement('span');
  s.className='fi';
  s.textContent=ICONS[i%ICONS.length];
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;`+
    `font-size:${1.4+Math.random()*1.8}rem;`+
    `animation-name:${anims[i%3]};`+
    `animation-duration:${4+Math.random()*6}s;`+
    `animation-delay:${Math.random()*5}s;`;
  fl.appendChild(s);
}

// ── AUDIO ────────────────────────────────────────────────────────────────────
let actx;
function ensureCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function playCorrect(){
  ensureCtx();
  [[0,523],[.18,659],[.34,784],[.50,1047]].forEach(([t,f])=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);
    o.type='sine';o.frequency.value=f;
    const st=actx.currentTime+t;
    g.gain.setValueAtTime(0.38,st);
    g.gain.exponentialRampToValueAtTime(.001,st+.35);
    o.start(st);o.stop(st+.36);
  });
}
function playWrong(){
  ensureCtx();
  const o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);
  o.type='sawtooth';
  o.frequency.setValueAtTime(220,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(90,actx.currentTime+.4);
  g.gain.setValueAtTime(.28,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.45);
  o.start();o.stop(actx.currentTime+.46);
}

// ── CONFETTI ─────────────────────────────────────────────────────────────────
const cc=document.getElementById('ccanvas');
const cx=cc.getContext('2d');
let pieces=[],cfActive=false;
function launchConfetti(big=false){
  cc.width=window.innerWidth;cc.height=window.innerHeight;
  pieces=[];
  const n=big?160:80;
  for(let i=0;i<n;i++){
    pieces.push({
      x:Math.random()*cc.width,y:Math.random()*cc.height*.4-60,
      w:6+Math.random()*9,h:5+Math.random()*7,
      color:`hsl(${Math.random()*360},90%,60%)`,
      vx:(Math.random()-.5)*5,vy:2+Math.random()*4,
      ang:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.18,
      gravity:.08
    });
  }
  cfActive=true;animConf();
  setTimeout(()=>{cfActive=false;cx.clearRect(0,0,cc.width,cc.height)},big?3200:2200);
}
function animConf(){
  if(!cfActive)return;
  cx.clearRect(0,0,cc.width,cc.height);
  pieces.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.ang+=p.spin;
    cx.save();cx.translate(p.x,p.y);cx.rotate(p.ang);
    cx.fillStyle=p.color;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore();
  });
  requestAnimationFrame(animConf);
}

// ── SHUFFLE ──────────────────────────────────────────────────────────────────
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}
  return b;
}

// ── QUESTIONS DATA ───────────────────────────────────────────────────────────
const QS=[
  // ── PHONETICS ──────────────────────────────────────────────────────────────
  {
    id:1,sec:'🔊 PHONETICS – Phát Âm Đuôi "-ed"',
    instr:'Mark the letter A, B, C or D to indicate the word whose underlined part DIFFERS from the other three in pronunciation.',
    body:'Question 1.',
    shuf:false,
    opts:[
      {id:'A',html:'watch<u>ed</u>',ok:false},
      {id:'B',html:'dropp<u>ed</u>',ok:false},
      {id:'C',html:'wash<u>ed</u>',ok:false},
      {id:'D',html:'travel<u>ed</u>',ok:true}
    ],
    exp:`<div class="etitle">🎯 Đáp án đúng: D. travel<u>ed</u></div>
<strong>📚 Quy tắc phát âm đuôi "-ed" (3 trường hợp):</strong><br>
▸ Đọc <code>/ɪd/</code> → sau âm <strong>/t/</strong> hoặc <strong>/d/</strong> (wanted, needed)<br>
▸ Đọc <code>/t/</code> → sau phụ âm <strong>vô thanh</strong>: /p, k, f, s, ʃ, tʃ/ (jumped, watched)<br>
▸ Đọc <code>/d/</code> → sau phụ âm <strong>hữu thanh</strong> và nguyên âm (played, traveled)<br><br>
<strong>🔍 Phân tích từng đáp án:</strong><br>
• A. watch<u>ed</u>: <em>watch</em> kết thúc bằng /tʃ/ (vô thanh) → đuôi -ed đọc là <strong>/t/</strong><br>
• B. dropp<u>ed</u>: <em>drop</em> kết thúc bằng /p/ (vô thanh) → đuôi -ed đọc là <strong>/t/</strong><br>
• C. wash<u>ed</u>: <em>wash</em> kết thúc bằng /ʃ/ (vô thanh) → đuôi -ed đọc là <strong>/t/</strong><br>
• D. travel<u>ed</u>: <em>travel</em> kết thúc bằng /l/ (hữu thanh) → đuôi -ed đọc là <strong>/d/</strong> ← KHÁC!<br><br>
<strong>⭐ Kết luận:</strong> A, B, C đều đọc đuôi -ed = <strong>/t/</strong>. Chỉ D đọc = <strong>/d/</strong> → D là đáp án khác biệt.`
  },
  {
    id:2,sec:null,
    instr:'Mark the letter A, B, C or D to indicate the word whose underlined part DIFFERS from the other three in pronunciation.',
    body:'Question 2.',
    shuf:false,
    opts:[
      {id:'A',html:'<u>ch</u>eap',ok:false},
      {id:'B',html:'ma<u>ch</u>ine',ok:true},
      {id:'C',html:'wat<u>ch</u>',ok:false},
      {id:'D',html:'<u>ch</u>ildren',ok:false}
    ],
    exp:`<div class="etitle">🎯 Đáp án đúng: B. ma<u>ch</u>ine</div>
<strong>📚 Phân tích cách đọc "ch" trong tiếng Anh:</strong><br>
▸ Thông thường <code>ch</code> đọc là <strong>/tʃ/</strong> (âm "ch" như "chair")<br>
▸ Ngoại lệ: trong từ gốc Pháp/Hy Lạp, <code>ch</code> đọc là <strong>/ʃ/</strong> (âm "sh")<br><br>
<strong>🔍 Phân tích từng đáp án:</strong><br>
• A. <u>ch</u>eap /tʃiːp/ → "ch" đọc là <strong>/tʃ/</strong><br>
• B. ma<u>ch</u>ine /məˈʃiːn/ → "ch" đọc là <strong>/ʃ/</strong> ← KHÁC! (từ gốc Pháp)<br>
• C. wat<u>ch</u> /wɒtʃ/ → "ch" đọc là <strong>/tʃ/</strong><br>
• D. <u>ch</u>ildren /ˈtʃɪldrən/ → "ch" đọc là <strong>/tʃ/</strong><br><br>
<strong>💡 Ghi nhớ các từ "ch" = /ʃ/ phổ biến:</strong> machine, chef, champagne, chauffeur, brochure.<br><br>
<strong>⭐ Kết luận:</strong> A, C, D đều đọc "ch" = <strong>/tʃ/</strong>. Chỉ B (machine) đọc "ch" = <strong>/ʃ/</strong> → B là đáp án khác biệt.`
  },

  // ── STRESS ─────────────────────────────────────────────────────────────────
  {
    id:3,sec:'🎵 STRESS – Trọng Âm Từ',
    instr:'Mark the letter A, B, C or D to indicate the word that DIFFERS from the other three in the position of primary stress.',
    body:'Question 3.',
    shuf:false,
    opts:[
      {id:'A',html:'cottage',ok:false},
      {id:'B',html:'cooker',ok:false},
      {id:'C',html:'outside',ok:true},
      {id:'D',html:'housework',ok:false}
    ],
    exp:`<div class="etitle">🎯 Đáp án đúng: C. outside</div>
<strong>📚 Phân tích trọng âm:</strong><br>

// ── STATE ─────────────────────────────────────────────────────────────────────
const answered={};
const TOTAL=QS.length;

function updateProgress(){
  const n=Object.keys(answered).length;
  const pct=(n/TOTAL)*100;
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progLabel').textContent=`${n} / ${TOTAL} câu đã trả lời`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const zone=document.getElementById('qzone');
  let html='',lastSec='';
  QS.forEach(q=>{
    if(q.sec&&q.sec!==lastSec){
      html+=`<div class="sec">${q.sec}</div>`;
      lastSec=q.sec;
    }
    const opts=q.shuf?shuffle(q.opts):q.opts;
    html+=`<div class="qcard" id="card-${q.id}">
      <div class="qnum">❓ Question ${q.id}</div>
      <div class="instr">${q.instr}</div>
      ${q.sign||''}
      <div class="qtxt">${q.body}</div>
      <div class="opts" id="opts-${q.id}">`;
    opts.forEach((o,i)=>{
      const lbl=String.fromCharCode(65+i);
      html+=`<button class="obtn" id="ob-${q.id}-${o.id}"
        onclick="pick(${q.id},'${o.id}',${o.ok},this)"
        data-ok="${o.ok}">
        <span class="lbl">${lbl}</span>
        <span>${o.html}</span>
      </button>`;
    });
    html+=`</div>
      <div class="expbox" id="exp-${q.id}">${q.exp}</div>
    </div>`;
  });
  zone.innerHTML=html;
}

function pick(qid,oid,isOk,btn){
  if(answered[qid])return;
  answered[qid]={ok:isOk};
  // disable all
  document.querySelectorAll(`#opts-${qid} .obtn`).forEach(b=>{
    b.disabled=true;
    if(b.dataset.ok==='true')b.classList.add('correct');
  });
  if(isOk){
    btn.classList.add('correct');
    playCorrect();
    launchConfetti(false);
  } else {
    btn.classList.add('wrong');
    playWrong();
  }
  const exp=document.getElementById('exp-'+qid);
  exp.classList.add('show');
  setTimeout(()=>exp.scrollIntoView({behavior:'smooth',block:'nearest'}),220);
  updateProgress();
}

function submitQuiz(){
  const correct=Object.values(answered).filter(a=>a.ok).length;
  const pct=(correct/TOTAL)*100;
  document.getElementById('mScore').textContent=`${correct} / ${TOTAL}`;
  document.getElementById('mBar').style.width=pct+'%';
  let emoji,msg;
  if(pct===100){emoji='🏆';msg='Xuất sắc tuyệt vời! Em là thiên tài! Perfect 10/10! 🌟'}
  else if(pct>=80){emoji='🎉';msg='Giỏi lắm! Em đã làm rất tốt! Keep it up! ⭐'}
  else if(pct>=60){emoji='😊';msg='Khá tốt! Cố gắng thêm nhé em! You can do it! 💪'}
  else if(pct>=40){emoji='🌈';msg='Cần ôn tập thêm! Hãy xem lại phần giải thích nhé! 📚'}
  else{emoji='💡';msg='Xem lại phần giải thích và cố gắng ôn tập thêm nhé! Keep trying! 🌱'}
  document.getElementById('mEmoji').textContent=emoji;
  document.getElementById('mMsg').textContent=msg;
  document.getElementById('overlay').classList.add('show');
  if(pct>=60)launchConfetti(true);
}

render();
updateProgress();
</script>
