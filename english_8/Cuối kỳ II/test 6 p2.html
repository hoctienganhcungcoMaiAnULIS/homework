<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ĐỀ THI ĐỌC HIỂU TIẾNG ANH | Ms Mai An ULIS</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,600;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --primary-pastel: #A0C4FF; --secondary-pastel: #BDB2FF; --accent-pastel: #FFC6FF;
  --gold: #f0c040; --correct: #00D26A; --wrong: #FF4757;
  --glass-bg: rgba(25, 10, 45, 0.45); --glass-border: rgba(255, 255, 255, 0.15);
  --text-main: #f8f9fa; --text-muted: #dcdde1;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; min-height: 100vh; background: #0f0c29; color: var(--text-main); overflow-x: hidden; }

/* ===== BACKGROUND ANIMATION & SVG PATTERN ===== */
.bg-gradient {
  position: fixed; inset: 0; z-index: -2;
  background: linear-gradient(-45deg, #1e1335, #3a1c71, #d76d77, #ffaf7b, #3a1c71);
  background-size: 400% 400%; animation: gradientBG 15s ease infinite;
}
@keyframes gradientBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

.svg-pattern {
  position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.35;
  background-image: radial-gradient(circle at center, rgba(255,255,255,0.1) 0, transparent 60%);
}
.emoji-float { position: absolute; font-size: 2.5rem; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); animation: floatUp var(--dur) linear infinite; opacity: 0.6; }
@keyframes floatUp { 0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; } }

/* ===== GIAO DIỆN MÀN HÌNH KHÓA ===== */
#passwordModal {
  position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center;
  background:rgba(5,2,15,0.92); backdrop-filter:blur(20px);
}
.pw-card {
  background:linear-gradient(160deg, rgba(40,10,70,0.95) 0%, rgba(15,5,30,0.98) 100%);
  border:1.5px solid rgba(240,192,64,0.4); border-radius:24px; padding:48px 40px 40px; 
  max-width:440px; width:93%; text-align:center; position:relative; overflow:hidden;
  box-shadow:0 0 60px rgba(106,5,114,0.6), 0 0 120px rgba(240,192,64,0.1), inset 0 1px 0 rgba(240,192,64,0.15);
}
.pw-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, #6A0572, #F0C040, #6A0572); }
.pw-crest { font-size:4rem; margin-bottom:8px; display:block; }
.pw-title { font-family:'Cinzel', serif; font-size:1.4rem; font-weight:700; color:#F0C040; margin-bottom:6px; letter-spacing:1px; }
.pw-sub   { font-size:.87rem; color:rgba(200,200,212,0.6); margin-bottom:24px; }
.pw-input {
  width:100%; padding:13px 20px; border-radius:12px; border:1.5px solid rgba(240,192,64,0.3); background:rgba(255,255,255,0.05);
  color:#FFE082; font-size:1rem; font-family:'Nunito', sans-serif; outline:none; letter-spacing:3px; text-align:center; transition:all .3s;
}
.pw-input:focus { border-color:#F0C040; box-shadow:0 0 0 3px rgba(240,192,64,0.15); }
.pw-input.error { border-color:#FF4757; box-shadow:0 0 0 3px rgba(255,71,87,0.25); animation:shake .4s ease; }
.pw-input::placeholder { color:rgba(200,200,212,0.3); letter-spacing:1px; }
.pw-btn {
  width:100%; padding:14px; margin-top:14px; border-radius:12px; border:none;
  background:linear-gradient(135deg, #6A0572 0%, #9B1FA8 40%, #F0C040 100%);
  color:#fff; font-size:1rem; font-weight:700; font-family:'Cinzel', serif; cursor:pointer; letter-spacing:.5px; transition:transform .2s;
}
.pw-btn:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(106,5,114,0.7); }
.pw-err { color:#ff8a9a; font-size:.84rem; margin-top:10px; display:none; font-weight:700; }
@keyframes shake { 0%,100%{transform:translateX(0)} 15%,45%,75%{transform:translateX(-6px)} 30%,60%,90%{transform:translateX(6px)} }

/* ===== MAIN LAYOUT & HEADER ===== */
#mainContent { display: none; padding: 20px; max-width: 1400px; margin: 0 auto; }
header {
  text-align: center; padding: 16px; background: var(--glass-bg); backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border); border-radius: 18px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.header-icon { font-size: 2.2rem; margin-bottom: 5px; }
.test-name { font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--gold); text-shadow: 0 0 10px rgba(240,192,64,0.5); }
.teacher-tag { display: inline-block; margin-top: 8px; padding: 4px 14px; background: rgba(240,192,64,0.15); border: 1px solid rgba(240,192,64,0.4); border-radius: 20px; font-size: 0.85rem; color: var(--gold); font-weight: bold;}

.score-bar {
  display: flex; align-items: center; justify-content: space-around; background: var(--glass-bg); backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border); border-radius: 14px; padding: 12px; margin-bottom: 20px; font-weight: 800; font-size: 1.1rem; color: var(--secondary-pastel);
}

/* ===== SPLIT SCREEN (BỐ CỤC 50/50) ===== */
.split-block {
  display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 40px;
  background: transparent; align-items: start;
}
.left-pane, .right-pane {
  background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border);
  border-radius: 20px; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  max-height: 80vh; overflow-y: auto;
}
.left-pane::-webkit-scrollbar, .right-pane::-webkit-scrollbar { width: 6px; }
.left-pane::-webkit-scrollbar-thumb, .right-pane::-webkit-scrollbar-thumb { background: var(--secondary-pastel); border-radius: 4px; }

/* ===== READING PASSAGE STYLES ===== */
.reading-title { font-size: 1.4rem; font-weight: 900; color: var(--accent-pastel); margin-bottom: 16px; text-align: center; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px dashed rgba(255,198,255,0.3); padding-bottom: 10px;}
.passage-para { font-size: 1.15rem; line-height: 1.7; margin-bottom: 12px; text-align: justify; }
.trans-btn {
  background: rgba(160, 196, 255, 0.15); border: 1px solid rgba(160, 196, 255, 0.4); border-radius: 8px;
  padding: 6px 12px; color: var(--primary-pastel); font-size: 0.9rem; font-weight: bold; cursor: pointer;
  margin-bottom: 16px; transition: all 0.3s; display: inline-flex; align-items: center; gap: 6px;
}
.trans-btn:hover { background: rgba(160, 196, 255, 0.3); transform: translateX(5px); }
.trans-content {
  display: none; background: rgba(255, 255, 255, 0.05); border-left: 4px solid var(--primary-pastel);
  padding: 12px 16px; margin-bottom: 20px; border-radius: 0 8px 8px 0; font-style: italic; color: #e1e8f0; line-height: 1.6;
}

/* GLOSSARY TABLE */
.glossary-wrap { margin-top: 24px; border-top: 2px solid rgba(255,255,255,0.1); padding-top: 16px; }
.glossary-title { font-size: 1.1rem; font-weight: 800; color: var(--gold); margin-bottom: 12px; display: flex; align-items: center; gap: 8px;}
.glossary-table { width: 100%; border-collapse: collapse; font-size: 1rem; }
.glossary-table th { background: rgba(240,192,64,0.15); color: var(--gold); padding: 10px; text-align: left; border-bottom: 1px solid rgba(240,192,64,0.3); }
.glossary-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.glossary-table tr:last-child td { border-bottom: none; }
.g-word { color: var(--accent-pastel); font-weight: bold; }
.g-pos { color: #a29bfe; font-style: italic; font-size: 0.9rem;}

/* ===== QUESTION CARDS ===== */
.q-card { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.q-card:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.q-text { font-size: 1.15rem; font-weight: 700; margin-bottom: 14px; line-height: 1.5;}
.q-num { display: inline-block; background: var(--secondary-pastel); color: #1a0533; padding: 2px 10px; border-radius: 6px; margin-right: 8px; font-weight: 900; }
.options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
.opt-btn {
  background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2); border-radius: 12px;
  padding: 14px 18px; color: var(--text-main); font-size: 1.05rem; font-family: 'Nunito', sans-serif; font-weight: 600;
  text-align: left; cursor: pointer; transition: all 0.25s; line-height: 1.4;
}
.opt-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); border-color: var(--secondary-pastel); transform: translateX(4px); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
.opt-btn.correct { background: linear-gradient(135deg, #00b09b, #96c93d) !important; border-color: #00ff88 !important; color: #fff !important; font-weight: 800; box-shadow: 0 4px 20px rgba(0,210,106,0.4) !important; }
.opt-btn.wrong { background: linear-gradient(135deg, #cb2d3e, #ef473a) !important; border-color: #ff6b81 !important; color: #fff !important; animation: shake 0.4s ease; box-shadow: 0 4px 20px rgba(255,71,87,0.4) !important; }

/* ===== EXPLANATION BOX (CHUẨN CSS CLASSES MỚI) ===== */
.explanation {
  display: none; margin-top: 16px; background: rgba(10, 5, 20, 0.7); border-left: 5px solid var(--secondary-pastel);
  border-radius: 10px; padding: 20px; font-size: 1.05rem; line-height: 1.7; color: #e1e8f0; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
  animation: slideDown 0.3s ease;
}
@keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
.explanation.show { display: block; }
.ex-title { font-size: 1.15rem; font-weight: 900; color: var(--gold); margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px dashed rgba(240,192,64,0.3); padding-bottom: 6px;}

/* Classes bắt buộc cho giải thích */
.ex-step { color: var(--accent-pastel); font-weight: 800; margin-top: 14px; margin-bottom: 6px; font-size: 1.1rem; display: block;}
.p-word { color: #4facfe; font-weight: 900; }
.p-mean { color: #e67e22; font-style: italic; font-weight: 700; }
.p-grammar { text-decoration: underline; text-decoration-color: #ff4757; text-decoration-thickness: 2px; font-weight: 900; color: #f1c40f; }
.hl-green { color: #00D26A; font-weight: 900; }
.hl-red { color: #FF4757; text-decoration: line-through; font-weight: bold; }
.ex-quote { background: rgba(255,255,255,0.05); padding: 10px 14px; border-radius: 8px; border-left: 3px solid #3498db; margin: 10px 0; font-family: monospace; font-size: 1rem; color: #81ecec;}
.ex-trans-quote { background: rgba(46, 204, 113, 0.1); padding: 10px 14px; border-radius: 8px; border-left: 3px solid #2ecc71; margin-bottom: 10px; font-weight: 600; color: #a8e6cf;}

/* ===== SUBMIT & MODALS ===== */
.submit-wrap { text-align: center; margin: 40px 0; }
.submit-btn {
  padding: 18px 48px; background: linear-gradient(135deg, #FF9A9E, #FECFEF); border: 3px solid #fff; border-radius: 30px;
  color: #333; font-family: 'Cinzel', serif; font-size: 1.3rem; font-weight: 900; cursor: pointer;
  box-shadow: 0 10px 30px rgba(255,154,158,0.5); transition: all 0.3s;
}
.submit-btn:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 15px 40px rgba(255,154,158,0.7); }

#nameModal, #resultModal {
  position: fixed; inset: 0; z-index: 9998; display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
}
#nameModal.show, #resultModal.show { display: flex; }
.modal-content { background: var(--glass-bg); border: 2px solid var(--accent-pastel); border-radius: 24px; padding: 40px; text-align: center; max-width: 500px; width: 90%; box-shadow: 0 0 60px rgba(255,198,255,0.3); }
.modal-content h3 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.5rem; margin-bottom: 12px; }
#nameInput { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid var(--secondary-pastel); background: rgba(255,255,255,0.1); color: #fff; font-size: 1.1rem; outline: none; text-align: center; margin-bottom: 16px;}
#nameInput:focus { border-color: var(--gold); }
.confirm-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #00C9A7, #845EC2); border: none; border-radius: 12px; color: #fff; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.3s; }
.confirm-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(132,94,194,0.5); }

.res-score { font-size: 3.5rem; font-weight: 900; color: var(--correct); text-shadow: 0 0 20px rgba(0,210,106,0.5); margin: 10px 0; }
.res-comment { font-size: 1.2rem; color: var(--accent-pastel); margin-bottom: 20px; font-weight: bold; }
#memeImg { width: 100%; max-width: 280px; border-radius: 16px; margin: 0 auto 20px; display: block; border: 4px solid var(--gold); box-shadow: 0 8px 24px rgba(0,0,0,0.4);}

/* Confetti */
.confetti { position: fixed; width: 10px; height: 10px; background-color: #f00; z-index: 9999; animation: fall linear forwards; }
@keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }

/* Responsive */
@media(max-width: 960px) {
  .split-block { grid-template-columns: 1fr; }
  .left-pane, .right-pane { max-height: none; }
}
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="svg-pattern" id="emojiContainer"></div>

<div id="passwordModal">
  <div class="pw-card">
    <span class="pw-crest">🔒</span>
    <div class="pw-title">BẢO MẬT</div>
    <div class="pw-sub">Vui lòng nhập mật khẩu</div>
    <input type="password" class="pw-input" id="pwInput" placeholder="Nhập mật khẩu..." autocomplete="off" />
    <button class="pw-btn" onclick="checkPassword()">XÁC NHẬN</button>
    <div class="pw-err" id="pwErr">Mật khẩu không đúng! Vui lòng thử lại.</div>
  </div>
</div>

<div id="nameModal">
  <div class="modal-content">
    <div style="font-size:3rem;margin-bottom:10px">🧙‍♂️</div>
    <h3>Tên chiến binh của bạn?</h3>
    <input type="text" id="nameInput" placeholder="VD: Nguyễn Văn A..." maxlength="50">
    <div id="nameError" style="color:#ff6b81; font-weight:bold; margin-bottom:10px; display:none;">⚠️ Vui lòng nhập tên!</div>
    <button class="confirm-btn" onclick="confirmName()">✨ XEM BẢNG PHONG THẦN!</button>
  </div>
</div>

<div id="resultModal">
  <div class="modal-content">
    <h3 id="resultTitle"></h3>
    <div class="res-score" id="resultScore"></div>
    <div class="res-comment" id="resultComment"></div>
    <img id="memeImg" src="" alt="Result Meme">
    <button class="confirm-btn" onclick="document.getElementById('resultModal').classList.remove('show')">🔮 ĐÓNG</button>
  </div>
</div>

<div id="mainContent">
  <header>
    <div class="header-icon">📚🌟✨</div>
    <div class="test-name">ĐỀ THI ĐỌC HIỂU TIẾNG ANH CHUYÊN SÂU</div>
    <span class="teacher-tag">👩‍🏫 Giáo viên tạo: Ms Mai An ULIS</span>
  </header>

  <div class="score-bar">
    <div>✅ Đúng: <span style="color:var(--correct)" id="correctCount">0</span></div>
    <div>📝 Đã làm: <span style="color:var(--gold)" id="answeredCount">0</span> / 20</div>
    <div>🎯 Điểm: <span style="color:var(--accent-pastel)" id="scoreDisplay">0</span></div>
  </div>

  <div id="quizContainer"></div>

  <div class="submit-wrap">
    <button class="submit-btn" onclick="openNameModal()">🎯 NỘP BÀI TÍNH ĐIỂM & XEM KẾT QUẢ</button>
  </div>
</div>

<script>
// ===== EMOJI BACKGROUND =====
const emojis = ['🚀', '🌍', '📱', '👽', '🚌', '🪐', '👾', '🎫'];
const container = document.getElementById('emojiContainer');
for(let i=0; i<30; i++) {
  const el = document.createElement('div');
  el.className = 'emoji-float';
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = `${Math.random() * 100}vw`;
  el.style.setProperty('--dur', `${15 + Math.random() * 20}s`);
  el.style.animationDelay = `${-Math.random() * 20}s`;
  el.style.fontSize = `${1.5 + Math.random() * 2}rem`;
  container.appendChild(el);
}

// ===== MÀN HÌNH KHÓA (Pass: comaianulis) =====
const _k = [99,111,109,97,105,97,110,117,108,105,115];
const _pw = _k.map(c => String.fromCharCode(c)).join('');

function checkPassword() {
  const inp = document.getElementById('pwInput');
  const err = document.getElementById('pwErr');
  if (inp.value === _pw) {
    document.getElementById('passwordModal').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    buildQuiz();
  } else {
    inp.classList.remove('error'); void inp.offsetWidth; inp.classList.add('error');
    err.style.display = 'block'; setTimeout(() => inp.classList.remove('error'), 500);
  }
}
document.getElementById('pwInput').addEventListener('keydown', e => { if(e.key==='Enter') checkPassword(); });

// ===== AUDIO API =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getCtx(){ if(!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }
function playCorrect() {
  const ctx = getCtx();
  [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = freq;
    const t = ctx.currentTime + i * 0.1;
    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.3, t + 0.05); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.start(t); o.stop(t + 0.3);
  });
}
function playWrong() {
  const ctx = getCtx();
  [200, 150].forEach((freq, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sawtooth'; o.frequency.value = freq;
    const t = ctx.currentTime + i * 0.2;
    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.3, t + 0.05); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.start(t); o.stop(t + 0.3);
  });
}

// ===== CONFETTI =====
function launchConfetti() {
  const colors = ['#00D26A', '#f0c040', '#A0C4FF', '#FFC6FF'];
  for(let i=0; i<50; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (Math.random() * 2 + 2) + 's';
    c.style.animationDelay = (Math.random() * 0.5) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

// ===== TOGGLE TRANSLATION =====
function toggleTrans(btn) {
  const content = btn.nextElementSibling;
  if(content.style.display === 'block') {
    content.style.display = 'none';
    btn.innerHTML = 'Mở dịch đoạn này 🌟';
  } else {
    content.style.display = 'block';
    btn.innerHTML = 'Đóng bản dịch 🙈';
  }
}

// ===== SHUFFLE =====
function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random()*(i+1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

// ===== DATA DE THI =====
const quizData = [
  {
    reading: `
      <div class="reading-title">🚌 PASSAGE 1: PUBLIC TRANSPORT ANNOUNCEMENT</div>
      
      <p class="passage-para">Welcome to City Bus Service! To have a safe trip, please (13) ____ these rules:</p>
      <button class="trans-btn" onclick="toggleTrans(this)">Mở dịch đoạn này 🌟</button>
      <div class="trans-content">Chào mừng đến với Dịch vụ Xe buýt Thành phố! Để có một chuyến đi an toàn, vui lòng (13) ____ những quy tắc này:</div>

      <p class="passage-para">● Always have your ticket ready (14) ____ checking.</p>
      <button class="trans-btn" onclick="toggleTrans(this)">Mở dịch đoạn này 🌟</button>
      <div class="trans-content">● Luôn chuẩn bị sẵn vé của bạn (14) ____ việc kiểm tra.</div>

      <p class="passage-para">● Listen to (15) ____ announcements for important news.</p>
      <button class="trans-btn" onclick="toggleTrans(this)">Mở dịch đoạn này 🌟</button>
      <div class="trans-content">● Lắng nghe (15) ____ các thông báo để biết tin tức quan trọng.</div>

// ===== BUILD UI =====
function buildQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  
  quizData.forEach((block) => {
    // Wrap in split-screen format
    const splitBlock = document.createElement('div');
    splitBlock.className = 'split-block';

    // Left pane (Reading)
    const leftPane = document.createElement('div');
    leftPane.className = 'left-pane';
    leftPane.innerHTML = block.reading;

    // Right pane (Questions)
    const rightPane = document.createElement('div');
    rightPane.className = 'right-pane';
    
    block.questions.forEach(q => {
      const qCard = document.createElement('div');
      qCard.className = 'q-card';
      qCard.id = `qcard-${q.id}`;

      // Shuffle options safely
      const shuffled = shuffle(q.options);

      qCard.innerHTML = `
        <div class="q-text"><span class="q-num">${q.id}</span>${q.text.replace(`Question ${q.id}:`, '')}</div>
        <div class="options-grid" id="opts-${q.id}">
          ${shuffled.map((opt, i) => `
            <button class="opt-btn" id="opt-${q.id}-${i}"
              onclick="checkAnswer(${q.id}, ${opt.c}, this)"
              data-correct="${opt.c}">
              ${opt.l}
            </button>
          `).join('')}
        </div>
        <div class="explanation" id="exp-${q.id}">
          ${q.explanation}
        </div>
      `;
      rightPane.appendChild(qCard);
    });

    splitBlock.appendChild(leftPane);
    splitBlock.appendChild(rightPane);
    container.appendChild(splitBlock);
  });
}

// ===== CHECK ANSWER LOGIC =====
const answered = {};
function checkAnswer(qId, isCorrect, btn) {
  if (answered[qId]) return;
  answered[qId] = true;
  
  // Disable all
  const btns = document.querySelectorAll(`#opts-${qId} .opt-btn`);
  btns.forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === 'true') {
      b.classList.add('correct'); // Auto highlight correct
    }
  });

  if (isCorrect) {
    btn.classList.add('correct');
    correctCount++;
    playCorrect();
    launchConfetti();
  } else {
    btn.classList.add('wrong');
    playWrong();
  }

  // Show explanation
  document.getElementById(`exp-${qId}`).classList.add('show');
  
  // Update Score
  answeredCount++;
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('answeredCount').textContent = answeredCount;
  document.getElementById('scoreDisplay').textContent = ((correctCount / 20) * 10).toFixed(1);
}

// ===== SUBMIT LOGIC =====
function openNameModal() {
  document.getElementById('nameModal').classList.add('show');
  document.getElementById('nameInput').focus();
}

function confirmName() {
  const name = document.getElementById('nameInput').value.trim();
  const err = document.getElementById('nameError');
  if (!name) {
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  document.getElementById('nameModal').classList.remove('show');
  
  // Prepare Result
  const pct = correctCount / 20;
  let title, comment, meme;

  if (pct === 1) {
    title = `🌟 THIÊN TÀI XUẤT CHÚNG!`;
    comment = `Tuyệt đỉnh ${name}! Em làm bài xuất sắc 100%. Cô Mai An rất tự hào về em! 🏆✨`;
    meme = "https://media.giphy.com/media/xT0xezQGU5xCDJuCPe/giphy.gif";
  } else if (pct >= 0.6) {
    title = `👏 RẤT TỐT ${name.toUpperCase()}!`;
    comment = `Em đã làm bài rất cẩn thận! Tiếp tục phát huy nhé! 💪`;
    meme = "https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif";
  } else {
    title = `😢 CỐ LÊN NHÉ ${name.toUpperCase()}!`;
    comment = `Đừng buồn! Em hãy đọc thật kỹ phần Giải thích chi tiết để tiến bộ hơn nhé! 🦉`;
    meme = "https://media.giphy.com/media/2rtQMJvhzOnRe/giphy.gif";
  }

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultScore').textContent = `${correctCount}/20`;
  document.getElementById('resultComment').textContent = comment;
  document.getElementById('memeImg').src = meme;
  document.getElementById('resultModal').classList.add('show');
}
