<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Gamification Quiz - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-text: #2c3e50;
            --correct: #00D26A;
            --wrong: #FF4757;
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 6px 0 rgba(0,0,0,0.15);
            --accent: #FF6B6B; /* Summer Coral/Red */
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        /* --- SUMMER GRADIENT BACKGROUND --- */
        @keyframes summerGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            /* Gradient Mùa Hè: Vàng nắng - Cam đào - Hồng dâu */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #f6d365, #fda085, #ffecd2);
            background-size: 400% 400%;
            animation: summerGradient 15s ease infinite;
            color: var(--primary-text);
            position: relative;
            overflow-x: hidden;
        }

        /* --- HIỆU ỨNG BAY BỔNG MÙA HÈ --- */
        .summer-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-item {
            position: absolute;
            bottom: -100px;
            opacity: 0.6;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-120vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* --- UI COMPONENTS --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            border: 3px solid #f6d365;
        }

        .header h3 {
            margin: 0;
            font-size: 1.3rem;
            color: #FF6B6B;
            font-weight: 800;
            text-transform: uppercase;
        }

        .section-title {
            background: #f6d365;
            color: #d35400;
            padding: 12px 25px;
            border-radius: 15px;
            display: inline-block;
            font-weight: 800;
            margin-bottom: 20px;
            box-shadow: 0 4px 0 #e67e22;
            font-size: 1.15rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
            border: 2px solid #fff;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.5;
            color: #2c3e50;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .btn-option {
            background: #ffffff;
            border: 3px solid #ffecd2;
            border-radius: 15px;
            padding: 15px;
            font-size: 1.08rem;
            font-weight: 700;
            color: var(--primary-text);
            cursor: pointer;
            box-shadow: 0 5px 0 #ffecd2;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
            display: flex;
            align-items: center;
        }

        .btn-option:hover:not(:disabled) {
            transform: scale(1.03) translateY(-3px);
            box-shadow: 0 8px 0 #f6d365;
            border-color: #f6d365;
        }

        .btn-option:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #f6d365;
        }

        .btn-option.correct { background: var(--correct); border-color: #00b35a; box-shadow: 0 5px 0 #00b35a; color: white; }
        .btn-option.wrong { background: var(--wrong); border-color: #d63031; box-shadow: 0 5px 0 #d63031; color: white; }

        .gap-fill-btn {
            display: inline-block;
            min-width: 110px;
            height: 38px;
            border: 3px dashed #FF6B6B;
            border-radius: 10px;
            background: #ffeaa7;
            cursor: pointer;
            vertical-align: middle;
            margin: 0 5px;
            transition: all 0.2s;
            text-align: center;
            line-height: 32px;
            font-weight: 800;
            color: #d63031;
        }

        .gap-fill-btn:hover { background: #f6e58d; transform: scale(1.05); }
        .gap-fill-btn.filled-correct { background: var(--correct); border-color: #00b35a; border-style: solid; color: white; }
        .gap-fill-btn.filled-wrong { background: var(--wrong); border-color: #d63031; border-style: solid; color: white; }

        .explanation {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #fff9e6;
            border-left: 5px solid #FF6B6B;
            border-radius: 10px;
            font-size: 1rem;
            line-height: 1.6;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 20%, 60% {transform: translateX(-5px);} 40%, 80% {transform: translateX(5px);} }

        .shake { animation: shake 0.4s ease; }

        .text-red { color: #d63031; font-weight: bold; }
        .text-green { color: #00b35a; font-weight: bold; }

        /* Popup cho Gap Fill */
        #gapPopup {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(253, 160, 133, 0.85); /* Summer overlay */
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 4px solid #f6d365;
            animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #popupQuestionText {
            background: #fff4e6;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            line-height: 1.5;
            border-left: 5px solid #FF6B6B;
            text-align: left;
            color: #d35400;
            font-weight: bold;
        }

        .close-popup-btn {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background: #ffeaa7;
            color: #d35400;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-popup-btn:hover { background: #f6e58d; }

        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Submit Button */
        .submit-btn {
            display: block;
            width: 100%;
            background: #FF6B6B;
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            padding: 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 #d63031;
            margin-top: 40px;
            margin-bottom: 50px;
            transition: all 0.2s;
        }

        .submit-btn:hover { transform: translateY(-5px); box-shadow: 0 13px 0 #d63031; }

        /* Modal Kết quả */
        #resultModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .result-box {
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            border: 5px solid #f6d365;
        }

        .result-box img { max-width: 100%; border-radius: 15px; margin: 20px 0; border: 4px solid #FF6B6B; }
        .result-score { font-size: 2.5rem; font-weight: 800; color: #d35400; margin-bottom: 10px; }
        
        /* --- TRANG TRÍ RIÊNG CHO CÂU 29 & 30 --- */
        .q-invite {
            background: #fff0f5;
            border: 3px dashed #ff69b4;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 3px 3px 10px rgba(255,105,180,0.2);
            margin: 10px 0;
            color: #c71585;
            font-weight: bold;
        }
        .q-invite::before { content: '💌 THIỆP MỜI SINH NHẬT 💌'; display: block; margin-bottom: 10px; font-size: 1.2rem; color: #ff1493; }

        .q-garden {
            background: #e8f5e9;
            border: 4px solid #4caf50;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-weight: 800;
            color: #2e7d32;
            display: inline-block;
            margin: 10px 0;
            width: 100%;
        }
        .q-garden::before { content: '🌱 KHU VƯỜN TRƯỜNG HỌC 🌱'; display: block; margin-bottom: 10px; font-size: 1.2rem; color: #1b5e20; }

        canvas#confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

<div class="summer-container" id="summer-bg"></div>

<canvas id="confetti"></canvas>

<div class="container">
    <div class="header">
        <h3 class="teacher-title">🌻 MÙA HÈ RỰC RỠ CÙNG MS MAI AN ULIS 🌻</h3>
    </div>

    <div id="quiz-container">
        </div>

    <button class="submit-btn" onclick="submitQuiz()">NỘP BÀI NHẬN QUÀ MÙA HÈ 🍦</button>
</div>

<div id="gapPopup">
    <div class="popup-content">
        <h3 style="margin-top:0; color:#d35400;">Chọn từ để điền vào ô trống:</h3>
        <div id="popupQuestionText"></div>
        <div class="options-grid" id="gapOptionsGrid"></div>
        <button class="close-popup-btn" onclick="document.getElementById('gapPopup').style.display='none'">ĐÓNG LẠI XEM ĐỀ</button>
    </div>
</div>

<div id="resultModal">
    <div class="result-box">
        <h2 style="color: #00D26A; margin-top:0; font-size: 2rem;">KẾT QUẢ CỦA BẠN!</h2>
        <div class="result-score" id="finalScore">0 / 30</div>
        <div id="praiseText" style="font-size: 1.2rem; font-weight: bold; color: #555;"></div>
        <img id="memeImg" src="" alt="Result Meme">
        <button class="submit-btn" style="margin-top: 20px; margin-bottom: 0; padding: 15px; font-size: 1.2rem;" onclick="location.reload()">CHƠI LẠI LẦN NỮA 🔄</button>
    </div>
</div>

<script>
// --- TẠO HIỆU ỨNG BAY MÙA HÈ ---
const summerIcons = ['🍦', '☀️', '🏖️', '🍉', '🌴', '🌻'];
function createSummerEffects() {
    const bg = document.getElementById('summer-bg');
    for (let i = 0; i < 25; i++) {
        let item = document.createElement('div');
        item.className = 'floating-item';
        item.innerText = summerIcons[Math.floor(Math.random() * summerIcons.length)];
        item.style.fontSize = (Math.random() * 30 + 20) + 'px';
        item.style.left = Math.random() * 100 + 'vw';
        item.style.animationDuration = (Math.random() * 10 + 8) + 's';
        item.style.animationDelay = (Math.random() * 10) + 's';
        bg.appendChild(item);
    }
}
createSummerEffects();

// --- WEB AUDIO API ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playDing() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

function playBuzz() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
}

// --- DỮ LIỆU CÂU HỎI SIÊU CHI TIẾT ---
const quizData = [
    // DẠNG 1
    {
        type: "gap", section: "Dạng 1: Viết lại các câu sau sang dạng bị động",
        question: "We can see many cute animals in the zoo.<br>➔ Many cute animals <span class='gap-fill-btn' data-id='0'> BẤM CHỌN </span> in the zoo.",
        options: [
            {t: "can be seen", c: true}, {t: "can see", c: false}, {t: "can be see", c: false}, {t: "can seen", c: false}
        ],
        exp: "<b>1. Dịch câu hỏi:</b> Chúng ta có thể nhìn thấy nhiều con vật đáng yêu trong sở thú.<br><b>2. Phân tích 4 đáp án:</b><br>A. can be seen: có thể được nhìn thấy.<br>B. can see: có thể nhìn thấy (Chủ động).<br>C. can be see: Sai (chưa chia cột 3).<br>D. can seen: Sai (thiếu be).<br><b>3. Tại sao đúng:</b> Động vật (animals) là vật bị tác động, nên ta dùng bị động của Modal Verb (can): <span class='text-red'>S + can + be + V3/ed</span> (see -> saw -> seen).<br><b>4. Tại sao sai:</b> Các con vật ở đây là đối tượng 'được' con người nhìn thấy, nên không thể dùng chủ động (B)."
    },
    {
        type: "gap", section: "",
        question: "Super Mario could save the princess in the game.<br>➔ The princess <span class='gap-fill-btn' data-id='1'> BẤM CHỌN </span> (by Super Mario) in the game.",
        options: [
            {t: "could save", c: false}, {t: "could be saved", c: true}, {t: "could saved", c: false}, {t: "could be save", c: false}
        ],
        exp: "<b>1. Dịch câu hỏi:</b> Super Mario đã có thể cứu công chúa trong trò chơi.<br><b>2. Phân tích 4 đáp án:</b><br>A. could save: có thể cứu.<br>B. could be saved: có thể được cứu.<br>C. could saved: Sai cấu trúc.<br>D. could be save: Sai (chưa chia ed).<br><b>3. Tại sao đúng:</b> Công chúa (the princess) là người nhận hành động 'cứu' -> Bị động. Cấu trúc: <span class='text-red'>could + be + V3/ed</span> (save thêm d thành saved).<br><b>4. Tại sao sai:</b> A mang nghĩa chủ động (công chúa đi cứu người khác). C và D thiếu thành phần cấu tạo bị động cơ bản."
    },
    {
        type: "gap", section: "",
        question: "The teacher may check our English homework tomorrow.<br>➔ Our English homework <span class='gap-fill-btn' data-id='2'> BẤM CHỌN </span> (by the teacher) tomorrow.",
        options: [
            {t: "may check", c: false}, {t: "may checked", c: false}, {t: "may be check", c: false}, {t: "may be checked", c: true}
        ],
        exp: "<b>1. Dịch câu hỏi:</b> Cô giáo có thể sẽ kiểm tra bài tập tiếng Anh của chúng ta vào ngày mai.<br><b>2. Phân tích 4 đáp án:</b><br>A. may check: có thể kiểm tra.<br>B. may checked: Sai cấu trúc.<br>C. may be check: Sai (thiếu ed).<br>D. may be checked: có thể được kiểm tra.<br><b>3. Tại sao đúng:</b> Bài tập (homework) không tự kiểm tra được -> Bị động. Cấu trúc: <span class='text-red'>may + be + V3/ed</span>.<br><b>4. Tại sao sai:</b> Các lỗi cực phổ biến: quên chữ 'be' (như B) hoặc quên thêm đuôi '-ed' cho động từ chính (như C)."
    },
    {
        type: "gap", section: "",
        question: "Mom might bake a big chocolate cake for my birthday.<br>➔ A big chocolate cake <span class='gap-fill-btn' data-id='3'> BẤM CHỌN </span> for my birthday.",
        options: [
            {t: "might be baked", c: true}, {t: "might bake", c: false}, {t: "might baked", c: false}, {t: "might be bake", c: false}
        ],
        exp: "<b>1. Dịch câu hỏi:</b> Mẹ có thể sẽ nướng một chiếc bánh sô-cô-la lớn cho sinh nhật của mình.<br><b>2. Phân tích 4 đáp án:</b><br>A. might be baked: có thể được nướng.<br>B. might bake: có thể nướng.<br>C. might baked: Sai (thiếu be).<br>D. might be bake: Sai (thiếu d).<br><b>3. Tại sao đúng:</b> Bánh (sự vật) nhận hành động nướng -> Bị động với Might: <span class='text-red'>might + be + V3/ed</span>.<br><b>4. Tại sao sai:</b> Câu B sai hoàn toàn vì bánh không thể tự nướng được. C và D sai ngữ pháp cơ bản."
    },
    {
        type: "gap", section: "",
        question: "You should brush your teeth every night.<br>➔ Your teeth <span class='gap-fill-btn' data-id='4'> BẤM CHỌN </span> every night.",
        options: [
            {t: "should brush", c: false}, {t: "should be brush", c: false}, {t: "should be brushed", c: true}, {t: "should brushed", c: false}
        ],
        exp: "<b>1. Dịch câu hỏi:</b> Bạn nên đánh răng mỗi tối.<br><b>2. Phân tích 4 đáp án:</b><br>A. should brush: nên đánh.<br>B. should be brush: Sai (thiếu đuôi ed).<br>C. should be brushed: nên được đánh.<br>D. should brushed: Sai (thiếu be).<br><b>3. Tại sao đúng:</b> Răng (teeth) nhận hành động 'đánh/chải' -> Bị động: <span class='text-red'>should + be + V3/ed</span>.<br><b>4. Tại sao sai:</b> Các phương án còn lại vi phạm cấu trúc thể bị động. Từ 'brush' là động từ có quy tắc, chỉ cần thêm -ed."
    },
    {
        type: "gap", section: "",
        question: "Children ought to drink milk every morning.<br>➔ Milk <span class='gap-fill-btn' data-id='5'> BẤM CHỌN </span> every morning.",
        options: [
            {t: "ought to drink", c: false}, {t: "ought to be drunk", c: true}, {t: "ought be drunk", c: false}, {t: "ought to be drank", c: false}
        ],
        exp: "<b>1. Dịch câu hỏi:</b> Trẻ em nên uống sữa mỗi buổi sáng.<br><b>2. Phân tích 4 đáp án:</b><br>A. ought to drink: nên uống.<br>B. ought to be drunk: nên được uống.<br>C. ought be drunk: Sai (thiếu to).<br>D. ought to be drank: Sai (drank là V2).<br><b>3. Tại sao đúng:</b> Cấu trúc bị động của ought to: <span class='text-red'>ought to + be + V3</span>. Động từ bất quy tắc: drink - drank - drunk. Ta phải dùng V3 là 'drunk'.<br><b>4. Tại sao sai:</b> Lỗi bẫy rất hay gặp: quên chữ 'to' (đáp án C) hoặc dùng nhầm V2 (đáp án D)."
    },
    {
        type: "gap", section: "",
        question: "We must feed the hungry cat right now.<br>➔ The hungry cat <span class='gap-fill-btn' data-id='6'> BẤM CHỌN </span> right now.",
        options: [
            {t: "must feed", c: false}, {t: "must be feed", c: false}, {t: "must fed", c: false}, {t: "must be fed", c: true}
        ],
        exp: "<b>1. Dịch câu hỏi:</b> Chúng ta phải cho chú mèo đói ăn ngay bây giờ.<br><b>2. Phân tích 4 đáp án:</b><br>A. must feed: phải cho ăn.<br>B. must be feed: Sai (chưa chia cột 3).<br>C. must fed: Sai (thiếu be).<br>D. must be fed: phải được cho ăn.<br><b>3. Tại sao đúng:</b> Chú mèo nhận hành động 'được cho ăn' -> Bị động. Cấu trúc: <span class='text-red'>must + be + V3</span>. Động từ: feed - fed - fed.<br><b>4. Tại sao sai:</b> Dùng chủ động (A) sẽ mang nghĩa chú mèo tự đi lấy thức ăn cho người khác. B chưa chuyển V3."
    },
    {
        type: "gap", section: "",

    {
        type: "gap", section: "",
        question: "<div class='q-invite'>(May / invite) Tom <span class='gap-fill-btn' data-id='28'> BẤM CHỌN </span> to Mary's birthday party.</div>",
        options: [
            {t: "may invite", c: false}, {t: "may be invited", c: true}, {t: "may be invite", c: false}, {t: "may invited", c: false}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function renderQuiz() {
    const container = document.getElementById("quiz-container");
    let html = "";
    
    quizData.forEach((item, index) => {
        if (item.section) {
            html += `<div class="section-title">${item.section}</div>`;
        }
        
        html += `<div class="card" id="card-${index}">`;
        html += `<div class="question-text">Câu ${index + 1}: ${item.question}</div>`;
        
        if (item.type === "mcq") {
            const shuffledOptions = shuffleArray([...item.options]);
            html += `<div class="options-grid">`;
            shuffledOptions.forEach((opt) => {
                const isCorrStr = opt.c ? "true" : "false";
                html += `<button class="btn-option" onclick="checkMCQ(this, ${index}, ${isCorrStr})">${opt.t}</button>`;
            });
            html += `</div>`;
        }
        
        html += `<div class="explanation" id="exp-${index}">${item.exp}</div>`;
        html += `</div>`;
    });
    
    container.innerHTML = html;

    document.querySelectorAll('.gap-fill-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            if(this.classList.contains('filled-correct') || this.classList.contains('filled-wrong')) return;
            openGapPopup(this.getAttribute('data-id'));
        });
    });
}

function checkMCQ(btn, qIndex, isCorrect) {
    if (btn.parentNode.hasAttribute('data-answered')) return;
    btn.parentNode.setAttribute('data-answered', 'true');
    
    const buttons = btn.parentNode.querySelectorAll('button');
    buttons.forEach(b => b.disabled = true);
    
    if (isCorrect) {
        btn.classList.add('correct');
        playDing();
        fireConfetti();
        score++;
    } else {
        btn.classList.add('wrong');
        btn.closest('.card').classList.add('shake');
        playBuzz();
        buttons.forEach(b => {
            const optText = b.innerText;
            const originalOption = quizData[qIndex].options.find(o => o.t === optText);
            if(originalOption && originalOption.c) b.style.border = "3px solid #00D26A";
        });
        setTimeout(() => btn.closest('.card').classList.remove('shake'), 400);
    }
    
    document.getElementById(`exp-${qIndex}`).style.display = "block";
    answeredCount++;
}

let score = 0;
let answeredCount = 0;

function openGapPopup(qIndex) {
    const popup = document.getElementById("gapPopup");
    const grid = document.getElementById("gapOptionsGrid");
    const qTextDisplay = document.getElementById("popupQuestionText");
    
    grid.innerHTML = "";
    
    let rawQuestion = quizData[qIndex].question;
    let displayQuestion = rawQuestion.replace(/<span class='gap-fill-btn'.*?<\/span>/g, "<span style='color: #FF6B6B;'> [ _________ ] </span>");
    qTextDisplay.innerHTML = `Câu ${parseInt(qIndex) + 1}: ` + displayQuestion;

    const shuffledOptions = shuffleArray([...quizData[qIndex].options]);
    shuffledOptions.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "btn-option";
        btn.innerText = opt.t;
        btn.onclick = () => selectGapOption(opt.t, opt.c, qIndex);
        grid.appendChild(btn);
    });
    
    popup.style.display = "flex";
}

function selectGapOption(text, isCorrect, qIndex) {
    document.getElementById("gapPopup").style.display = "none";
    const gapBtn = document.querySelector(`.gap-fill-btn[data-id="${qIndex}"]`);
    
    gapBtn.innerText = text;
    
    if (isCorrect) {
        gapBtn.classList.add('filled-correct');
        playDing();
        fireConfetti();
        score++;
    } else {
        gapBtn.classList.add('filled-wrong');
        gapBtn.closest('.card').classList.add('shake');
        playBuzz();
        setTimeout(() => gapBtn.closest('.card').classList.remove('shake'), 400);
    }
    
    document.getElementById(`exp-${qIndex}`).style.display = "block";
    answeredCount++;
}

function submitQuiz() {
    if (answeredCount < quizData.length) {
        alert("Em hãy làm hết các câu hỏi mùa hè rồi hẵng nộp bài nha! 🌻");
        return;
    }
    
    const modal = document.getElementById("resultModal");
    const scoreDiv = document.getElementById("finalScore");
    const memeImg = document.getElementById("memeImg");
    const praiseText = document.getElementById("praiseText");
    
    const percentage = score / quizData.length;
    scoreDiv.innerText = `${score} / ${quizData.length}`;
    
    if (percentage === 1) {
        praiseText.innerText = "TUYỆT VỜI! Em xứng đáng với một ly kem khổng lồ cho sự hoàn hảo này! 🏆🍦";
        memeImg.src = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif"; 
    } else if (percentage >= 0.6) {
        praiseText.innerText = "Giỏi lắm! Kiến thức của em đã sạc đầy như năng lượng Mặt Trời rồi! 👏☀️";
        memeImg.src = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif"; 
    } else {
        praiseText.innerText = "Trượt vỏ chuối mất rồi! Nhưng không sao, mình vừa học vừa chơi mà, cố lên nhé! 💪🌴";
        memeImg.src = "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif"; 
    }
    
    modal.style.display = "flex";
}

const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function createConfetti() {
    for (let i = 0; i < 50; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: canvas.height + Math.random() * 50,
            r: Math.random() * 6 + 2,
            dx: Math.random() * 4 - 2,
            dy: Math.random() * -10 - 5,
            color: `hsl(${Math.random() * 360}, 100%, 50%)`,
            tilt: Math.random() * 10
        });
    }
}

function animateConfetti() {
    requestAnimationFrame(animateConfetti);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    particles.forEach((p, index) => {
        p.dy += 0.3; 
        p.x += p.dx;
        p.y += p.dy;
        p.tilt += 0.1;
        
        ctx.beginPath();
        ctx.lineWidth = p.r;
        ctx.strokeStyle = p.color;
        ctx.moveTo(p.x + p.tilt + p.r, p.y);
        ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
        ctx.stroke();
        
        if (p.y > canvas.height) particles.splice(index, 1);
    });
}
animateConfetti();

function fireConfetti() {
    createConfetti();
}

window.onload = renderQuiz;

</script>
