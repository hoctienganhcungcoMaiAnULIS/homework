<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 10: Communication in the Future</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #8854C0;
            --tertiary: #00C9A7;
            --correct: #00D26A;
            --incorrect: #FF4757;
            --text-dark: #2d3436;
            --glass-bg: rgba(255, 255, 255, 0.35);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            /* Nền gradient pastel siêu mượt */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a18cd1, #fbc2eb, #8fd3f4);
            background-size: 400% 400%;
            animation: gradientBg 15s ease infinite;
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Họa tiết Mèo con và Hoa lơ lửng */
        .bg-patterns {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .pattern-item {
            position: absolute;
            font-size: 2rem;
            opacity: 0.5;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Cấu hình dùng chung hiệu ứng Glassmorphism */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }

        .teacher-info {
            font-size: 1.1rem;
            color: #5f27cd;
            font-weight: 900;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        h1 {
            font-size: 2rem;
            color: #2d3436;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.6);
        }

        .section-title {
            background: rgba(0, 201, 167, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white;
            padding: 12px 25px;
            border-radius: 15px;
            margin: 20px 0;
            font-size: 1.3rem;
            font-weight: 900;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 15px rgba(0, 201, 167, 0.4);
            display: inline-block;
        }

        .question-card {
            padding: 25px;
            margin-bottom: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .question-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(31, 38, 135, 0.2);
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1.5;
            color: #2d3436;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .btn-option {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 rgba(255, 255, 255, 0.6);
            color: var(--text-dark);
            text-align: center;
            user-select: none;
        }

        .btn-option:hover:not(:disabled) {
            transform: scale(1.03);
            background: rgba(253, 203, 110, 0.8); /* Vàng pastel */
            border-color: #ffa502;
            box-shadow: 0 6px 0 rgba(255, 165, 2, 0.5);
        }

        .btn-option:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 0 0 transparent;
        }

        /* Nút khi chọn ĐÚNG */
        .btn-option.correct, .btn-option.correct-reveal {
            background: rgba(0, 210, 106, 0.9) !important;
            color: white !important;
            border-color: #00b359 !important;
            box-shadow: 0 6px 0 #00994d !important;
        }

        /* Nút khi chọn SAI */
        .btn-option.incorrect {
            background: rgba(255, 71, 87, 0.9) !important;
            color: white !important;
            border-color: #d63031 !important;
            box-shadow: 0 6px 0 #b33939 !important;
            animation: shake 0.5s;
        }

        .btn-option:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-2deg); }
            50% { transform: translateX(5px) rotate(2deg); }
            75% { transform: translateX(-5px) rotate(-2deg); }
            100% { transform: translateX(0); }
        }

        /* Khung giải thích Glassmorphism */
        .explanation {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-left: 6px solid #5f27cd;
            border-radius: 10px;
            font-size: 1.05rem;
            line-height: 1.6;
            animation: fadeIn 0.5s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CSS MÀU SẮC GIẢI THÍCH */
        .p-word { color: #0984e3; font-weight: 900; }
        .p-phonetic { background: #6c5ce7; color: white; padding: 2px 8px; border-radius: 10px; font-family: monospace; }
        .p-mean { color: #d63031; font-style: italic; font-weight: 700;}
        .p-grammar { color: #e15f41; text-decoration: underline; font-weight: bold; }
        .hl-green { color: #00b894; font-weight: 900; font-size: 1.1rem; }
        .hl-red { color: #d63031; font-weight: 900; }

        .submit-area {
            text-align: center;
            margin: 40px 0;
        }

        .btn-submit {
            background: rgba(136, 84, 192, 0.9);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 1.5rem;
            padding: 15px 40px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 #5f27cd, 0 15px 20px rgba(0,0,0,0.2);
            font-weight: 900;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            background: rgba(156, 104, 217, 0.95);
        }

        .btn-submit:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #5f27cd;
        }

        /* Modal Popup Glassmorphism */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .modal-content {
            padding: 30px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: rgba(255,255,255,0.7);
            border: 3px solid rgba(255,255,255,0.9);
            border-radius: 15px;
            font-size: 1.2rem;
            outline: none;
            transition: border-color 0.3s;
            font-weight: bold;
            color: #2d3436;
        }

        .modal-content input:focus {
            border-color: #8854C0;
            background: rgba(255,255,255,0.9);
        }

        .modal-content input.error {
            border-color: var(--incorrect);
            animation: shake 0.4s;
        }

        .error-text {
            color: #d63031;
            font-weight: 900;
            background: rgba(255,255,255,0.7);
            padding: 5px;
            border-radius: 5px;
            display: none;
            margin-bottom: 15px;
        }

        .gif-container img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 3px solid white;
        }
    </style>
</head>
<body>

    <div class="bg-patterns" id="bgPatterns"></div>

    <div class="container">
        <header class="glass-panel">
            <div class="teacher-info">🌸 Giáo viên tạo: Ms Mai An ULIS 🐱</div>
            <h1>TEST FOR UNIT 10: COMMUNICATION IN THE FUTURE</h1>
            <div id="scoreDisplay" style="font-size: 1.3rem; font-weight: 900; color: #5f27cd; margin-top: 10px; text-shadow: 1px 1px 0px white;">
                Điểm hiện tại: <span id="currentScore">0</span> / 30
            </div>
        </header>

        <div id="quizContainer">
            </div>

        <div class="submit-area">
            <button class="btn-submit" onclick="showNamePrompt()">🎯 NỘP BÀI & XEM KẾT QUẢ 🎯</button>
        </div>
    </div>

    <div class="modal-overlay" id="nameModal">
        <div class="modal-content glass-panel">
            <h2 style="color: #5f27cd; font-size: 1.8rem; text-shadow: 1px 1px white;">Bạn tên là gì nhỉ? 🐾</h2>
            <input type="text" id="studentName" placeholder="Ví dụ: Nguyễn Văn A..." onkeypress="handleEnter(event)">
            <p class="error-text" id="nameError">⚠️ Vui lòng nhập tên trước khi xem điểm nhé!</p>
            <button class="btn-submit" style="font-size: 1.2rem; padding: 10px 30px;" onclick="submitQuiz()">Xem Kết Quả!</button>
        </div>
    </div>

    <div class="modal-overlay" id="resultModal">
        <div class="modal-content glass-panel">
            <h2 id="resultTitle" style="color: #5f27cd; font-size: 2rem; margin-bottom: 10px; text-shadow: 2px 2px white;"></h2>
            <p id="resultScore" style="font-size: 1.5rem; font-weight: 900; color: #2d3436; background: rgba(255,255,255,0.6); display: inline-block; padding: 5px 15px; border-radius: 10px;"></p>
            <div class="gif-container">
                <img id="resultGif" src="" alt="Result Meme">
            </div>
            <button class="btn-submit" style="font-size: 1.2rem; padding: 10px 30px; margin-top: 20px; background: #00C9A7; box-shadow: 0 6px 0 #00a88a; border-color: white;" onclick="location.reload()">Làm lại từ đầu 🔄</button>
        </div>
    </div>

    <script>
        // --- Web Audio API cho hiệu ứng âm thanh ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // Note C5
                osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); // Note C6
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'incorrect') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // --- Tạo họa tiết nền ---
        const patterns = ['🌸', '🌼', '🌺', '🌻', '🐱', '🐈', '🐾', '✨', '💖'];
        const bgContainer = document.getElementById('bgPatterns');
        for(let i = 0; i < 35; i++) {
            let el = document.createElement('div');
            el.className = 'pattern-item';
            el.innerText = patterns[Math.floor(Math.random() * patterns.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (Math.random() * 10 + 10) + 's';
            el.style.animationDelay = (Math.random() * 5) + 's';
            el.style.fontSize = (Math.random() * 2 + 1.5) + 'rem';
            bgContainer.appendChild(el);
        }

        // --- CSDL Câu hỏi ---
        const quizData = [
            // PHẦN I: PRONUNCIATION
            {
                section: "I. Choose the word whose underlined part is pronounced differently from the others.",
                questions: [
                    {
                        question: "1. a. telepath<u>y</u>  b. s<u>y</u>stem  c. repl<u>y</u>  d. batter<u>y</u>",
                        options: [
                            { text: "telepath<u>y</u>", isCorrect: false },
                            { text: "s<u>y</u>stem", isCorrect: false },
                            { text: "repl<u>y</u>", isCorrect: true },
                            { text: "batter<u>y</u>", isCorrect: false }
                        ],
                        explanation: `
                            <p><b>Dịch:</b> Chọn từ có phần gạch chân phát âm khác với các từ còn lại.</p>
                            <p><b>Phân tích 4 đáp án:</b></p>
                            <ul>
                                <li><span class='p-word'>telepathy</span> <span class='p-phonetic'>/təˈlepəθi/</span> <span class='p-mean'>(n): thần giao cách cảm.</span> Phần gạch chân phát âm là /i/</li>
                                <li><span class='p-word'>system</span> <span class='p-phonetic'>/ˈsɪstəm/</span> <span class='p-mean'>(n): hệ thống.</span> Phần gạch chân phát âm là /ɪ/ (gần giống /i/)</li>
                                <li><span class='p-word'>reply</span> <span class='p-phonetic'>/rɪˈplaɪ/</span> <span class='p-mean'>(v, n): trả lời.</span> Phần gạch chân phát âm là <span class='hl-green'>/aɪ/</span></li>
                                <li><span class='p-word'>battery</span> <span class='p-phonetic'>/ˈbætəri/</span> <span class='p-mean'>(n): cục pin.</span> Phần gạch chân phát âm là /i/</li>
                            </ul>
                            <p><b>Giải thích:</b> Đáp án đúng là <span class='hl-green'>reply</span> vì chữ "y" được phát âm là /aɪ/, trong khi <span class='hl-red'>3 từ còn lại</span> chữ "y" đều được phát âm là âm /i/ hoặc /ɪ/.</p>
                        `
                    },
                    {
                        question: "2. a. <u>c</u>inema  b. <u>c</u>ultural  c. <u>c</u>onference  d. <u>c</u>ommunicate",
                        options: [
                            { text: "<u>c</u>inema", isCorrect: true },
                            { text: "<u>c</u>ultural", isCorrect: false },
                            { text: "<u>c</u>onference", isCorrect: false },
                            { text: "<u>c</u>ommunicate", isCorrect: false }
                        ],
                        explanation: `
                            <p><b>Dịch:</b> Chọn từ có phần gạch chân phát âm khác với các từ còn lại.</p>
                            <p><b>Phân tích 4 đáp án:</b></p>
                            <ul>
                                <li><span class='p-word'>cinema</span> <span class='p-phonetic'>/ˈsɪnəmə/</span> <span class='p-mean'>(n): rạp chiếu phim.</span> Phần gạch chân phát âm là <span class='hl-green'>/s/</span></li>
                                <li><span class='p-word'>cultural</span> <span class='p-phonetic'>/ˈkʌltʃərəl/</span> <span class='p-mean'>(adj): thuộc về văn hóa.</span> Phần gạch chân phát âm là /k/</li>
                                <li><span class='p-word'>conference</span> <span class='p-phonetic'>/ˈkɒnfərəns/</span> <span class='p-mean'>(n): hội nghị.</span> Phần gạch chân phát âm là /k/</li>
                                <li><span class='p-word'>communicate</span> <span class='p-phonetic'>/kəˈmjuːnɪkeɪt/</span> <span class='p-mean'>(v): giao tiếp.</span> Phần gạch chân phát âm là /k/</li>
                            </ul>
                            <p><b>Giải thích:</b> Chữ "c" trong <span class='hl-green'>cinema</span> phát âm là âm /s/ (sờ nhẹ). Trong <span class='hl-red'>các từ còn lại</span>, chữ "c" đều phát âm là âm /k/.</p>
                        `
                    },
                    {
                        question: "3. a. watch<u>ed</u>  b. practic<u>ed</u>  c. decid<u>ed</u>  d. check<u>ed</u>",
                        options: [
                            { text: "watch<u>ed</u>", isCorrect: false },
                            { text: "practic<u>ed</u>", isCorrect: false },
                            { text: "decid<u>ed</u>", isCorrect: true },
                            { text: "check<u>ed</u>", isCorrect: false }
                        ],
                        explanation: `
                            <p><b>Dịch:</b> Chọn từ có phần gạch chân phát âm khác với các từ còn lại.</p>
                            <p><b>Phân tích 4 đáp án:</b></p>
                            <ul>
                                <li><span class='p-word'>watched</span> <span class='p-phonetic'>/wɒtʃt/</span> <span class='p-mean'>(v-ed): đã xem.</span> Đuôi -ed phát âm là /t/</li>
                                <li><span class='p-word'>practiced</span> <span class='p-phonetic'>/ˈpræktɪst/</span> <span class='p-mean'>(v-ed): đã thực hành.</span> Đuôi -ed phát âm là /t/</li>
                                <li><span class='p-word'>decided</span> <span class='p-phonetic'>/dɪˈsaɪdɪd/</span> <span class='p-mean'>(v-ed): đã quyết định.</span> Đuôi -ed phát âm là <span class='hl-green'>/ɪd/</span></li>
                                <li><span class='p-word'>checked</span> <span class='p-phonetic'>/tʃekt/</span> <span class='p-mean'>(v-ed): đã kiểm tra.</span> Đuôi -ed phát âm là /t/</li>
                            </ul>
                            <p><span class='p-grammar'>Quy tắc phát âm đuôi -ed:</span> Động từ tận cùng bằng âm /t/ hoặc /d/ (như deci<b>d</b>e) thì -ed được phát âm là <span class='hl-green'>/ɪd/</span>. Các âm vô thanh /tʃ/, /s/, /k/ cộng thêm -ed sẽ phát âm là /t/.</p>
                        `
                    },
                    {
                        question: "4. a. m<u>ea</u>n  b. r<u>ea</u>ch  c. l<u>ea</u>ve  d. br<u>ea</u>k",
                        options: [
                            { text: "m<u>ea</u>n", isCorrect: false },
                            { text: "r<u>ea</u>ch", isCorrect: false },
                            { text: "l<u>ea</u>ve", isCorrect: false },
                            { text: "br<u>ea</u>k", isCorrect: true }
                        ],
                        explanation: `
                            <p><b>Dịch:</b> Chọn từ có phần gạch chân phát âm khác với các từ còn lại.</p>
                            <p><b>Phân tích 4 đáp án:</b></p>
                            <ul>
                                <li><span class='p-word'>mean</span> <span class='p-phonetic'>/miːn/</span> <span class='p-mean'>(v): có nghĩa là.</span> Âm /iː/</li>
                                <li><span class='p-word'>reach</span> <span class='p-phonetic'>/riːtʃ/</span> <span class='p-mean'>(v): vươn tới, đạt tới.</span> Âm /iː/</li>
                                <li><span class='p-word'>leave</span> <span class='p-phonetic'>/liːv/</span> <span class='p-mean'>(v): rời đi.</span> Âm /iː/</li>
                                <li><span class='p-word'>break</span> <span class='p-phonetic'>/breɪk/</span> <span class='p-mean'>(v): làm vỡ, làm gãy.</span> Âm <span class='hl-green'>/eɪ/</span></li>
                            </ul>
                            <p><b>Giải thích:</b> Từ <span class='hl-green'>break</span> là một trường hợp ngoại lệ kinh điển của vần "ea", nó được phát âm là âm /eɪ/ (giống âm A trong tiếng Việt). <span class='hl-red'>Ba từ còn lại</span> đều phát âm là âm /iː/ (âm i dài).</p>
                        `
                    },
                    {
                        question: "5. a. dev<u>i</u>ce  b. emoj<u>i</u>  c. pr<u>i</u>vate  d. t<u>i</u>ny",
                        options: [

                            <p><span class='p-grammar'>Cấu trúc ngữ pháp:</span> Động từ <b>communicate</b> khi mang nghĩa giao tiếp, trò chuyện với ai đó, ta dùng giới từ <span class='hl-green'>WITH</span>. Cấu trúc là: <b>communicate with somebody</b>.</p>
                            <p>Do đó, đáp án đúng là <b>with</b>. Các giới từ <span class='hl-red'>of, by, through</span> đều không đúng với cấu trúc này.</p>
                        `
                    },
                    {
                        question: "2. We discussed our project on holography _______ two hours yesterday.",
                        options: [
                            { text: "for", isCorrect: true },
                            { text: "by", isCorrect: false },
                            { text: "in", isCorrect: false },
                            { text: "at", isCorrect: false }
                        ],
                        explanation: `
                            <p><b>Dịch câu:</b> Hôm qua, chúng tôi đã thảo luận về dự án ảnh ba chiều của mình _____ hai tiếng đồng hồ.</p>
                            <p><b>Phân tích:</b></p>
                            <p><span class='p-grammar'>Quy tắc dùng giới từ chỉ thời gian:</span> Khi muốn nói về khoảng thời gian kéo dài bao lâu (ví dụ: 2 giờ, 3 tháng, 5 năm...), chúng ta dùng giới từ <span class='hl-green'>FOR</span> đứng trước khoảng thời gian đó. </p>
                            <p><span class='hl-red'>In</span> thường dùng cho tháng, năm, thập kỷ. <span class='hl-red'>At</span> dùng cho giờ giấc cụ thể (at 7 AM).</p>
                        `
                    },
                    {
                        question: "3. My whole face is accommodating all the screen, but I can't _______ my webcam.",
                        options: [
                            { text: "zoom in", isCorrect: false },
                            { text: "zoom out", isCorrect: true },
                            { text: "move up", isCorrect: false },
                            { text: "move down", isCorrect: false }
                        ],
                        explanation: `
                            <p><b>Dịch câu:</b> Toàn bộ khuôn mặt của tôi đang chiếm hết màn hình, nhưng tôi không thể _____ webcam của mình.</p>
                            <p><b>Phân tích:</b></p>
                            <ul>
                                <li><span class='hl-red'>zoom in</span>: phóng to.</li>
                                <li><span class='hl-green'>zoom out</span>: thu nhỏ lại (rút tầm nhìn ra xa).</li>
                            </ul>
                            <p><b>Giải thích:</b> Do khuôn mặt đang <i>"chiếm hết màn hình" (accommodating all the screen)</i>, tức là hình ảnh đang quá to, nên người này muốn <span class='hl-green'>thu nhỏ (zoom out)</span> hình ảnh lại nhưng webcam bị lỗi không làm được.</p>
                        `
                    },
                    {
                        question: "4. Letters were a common _______ of communication prior to the electronic age.",
                        options: [
                            { text: "skill", isCorrect: false },
                            { text: "means", isCorrect: true },
                            { text: "channel", isCorrect: false },
                            { text: "system", isCorrect: false }
                        ],
                        explanation: `
                            <p><b>Dịch câu:</b> Thư từ từng là một _____ giao tiếp phổ biến trước thời đại điện tử.</p>
                            <p><b>Phân tích:</b></p>
                            <ul>
                                <li><span class='hl-red'>skill</span> <span class='p-mean'>(n): kỹ năng.</span></li>
                                <li><span class='hl-green'>means</span> <span class='p-mean'>(n): phương tiện, cách thức.</span></li>
                                <li><span class='hl-red'>channel</span> <span class='p-mean'>(n): kênh.</span></li>
                            </ul>
                            <p><span class='p-grammar'>Collocation:</span> Từ vựng chuẩn cần điền là <span class='hl-green'>means of communication</span> (phương tiện giao tiếp). Thư từ chính là một loại phương tiện giao tiếp truyền thống.</p>
                        `
                    },
                    {
                        question: "5. They couldn't communicate in _______, because William was illiterate.",
                        options: [
                            { text: "body language", isCorrect: false },
                            { text: "sign language", isCorrect: false },
                            { text: "writing", isCorrect: true },
                            { text: "speaking", isCorrect: false }
                        ],
                        explanation: `
                            <p><b>Dịch câu:</b> Họ không thể giao tiếp bằng _____, bởi vì William bị mù chữ.</p>
                            <p><b>Phân tích:</b></p>
                            <p>Khóa từ ở đây là <span class='p-word'>"illiterate"</span> (mù chữ, không biết đọc biết viết). Nếu một người mù chữ, họ sẽ không thể giao tiếp thông qua <span class='hl-green'>writing</span> (chữ viết/văn bản). Họ vẫn có thể nói (speaking) hoặc dùng ngôn ngữ hình thể (body language).</p>
                        `
                    },
                    {
                        question: "6. _______ allows you to hold meetings with colleagues who are located in different places.",
                        options: [
                            { text: "Face-to-face meeting", isCorrect: false },
                            { text: "Voice message", isCorrect: false },
                            { text: "Telepathy", isCorrect: false },
                            { text: "Video conferencing", isCorrect: true }
                        ],
                        explanation: `
                            <p><b>Dịch câu:</b> _____ cho phép bạn tổ chức các cuộc họp với những đồng nghiệp đang ở các địa điểm khác nhau.</p>
                            <p><b>Phân tích:</b></p>
                            <ul>
                                <li><span class='hl-red'>Face-to-face meeting</span>: họp trực tiếp (phải ở cùng một chỗ).</li>
                                <li><span class='hl-green'>Video conferencing</span>: hội nghị truyền hình (họp qua video từ xa).</li>
                            </ul>
                            <p><b>Giải thích:</b> Vì đồng nghiệp đang ở <i>"different places" (các địa điểm khác nhau)</i>, cách duy nhất để tổ chức họp nhóm mặt đối mặt ảo là sử dụng <span class='hl-green'>hội nghị truyền hình (Video conferencing)</span>.</p>
                        `
                    },
                    {
                        question: "7. In the future people _______ communicate with each other using body implants and holograms.",
                        options: [
                            { text: "will", isCorrect: true },
                            { text: "should", isCorrect: false },
                            { text: "can", isCorrect: false },
                            { text: "must", isCorrect: false }
                        ],
                        explanation: `
                            <p><b>Dịch câu:</b> Trong tương lai mọi người _____ giao tiếp với nhau bằng cách sử dụng các mô cấy trên cơ thể và hình ảnh không gian ba chiều.</p>
                            <p><span class='p-grammar'>Ngữ pháp về thì:</span> Cụm từ chỉ thời gian <span class='p-word'>"In the future"</span> (Trong tương lai) là dấu hiệu kinh điển của thì Tương lai đơn. Cấu trúc là: <b>will + V(nguyên thể)</b> diễn tả một dự đoán về tương lai. Vì vậy <span class='hl-green'>will</span> là đáp án chính xác nhất.</p>
                        `
                    },
                    {
                        question: "8. _______ texting abbreviations tend to be grammatically incorrect, they are very commonly used in messages.",
                        options: [
                            { text: "Because", isCorrect: false },
                            { text: "If", isCorrect: false },
                            { text: "Although", isCorrect: true },
                            { text: "While", isCorrect: false }
                        ],
                        explanation: `
                            <p><b>Dịch câu:</b> _____ các từ viết tắt khi nhắn tin có xu hướng sai về mặt ngữ pháp, chúng lại được sử dụng rất phổ biến trong tin nhắn.</p>
                            <p><b>Phân tích:</b></p>
                            <p>Vế 1: Sai ngữ pháp (Tiêu cực). Vế 2: Được dùng rất phổ biến (Tích cực). Mối quan hệ giữa 2 mệnh đề là <b>sự nhượng bộ / tương phản</b>. Từ nối phù hợp nhất mang nghĩa "Mặc dù" là <span class='hl-green'>Although</span>.</p>
                            <p><span class='hl-red'>Because</span> (Bởi vì) chỉ nguyên nhân. <span class='hl-red'>If</span> (Nếu) chỉ điều kiện.</p>
                        `
                    },
                    {
                        question: "9. My phone cannot connect to the wi-fi here. What about _______?",
                        options: [
                            { text: "you're", isCorrect: false },
                            { text: "you", isCorrect: false },
                            { text: "your", isCorrect: false },
                            { text: "yours", isCorrect: true }
                        ],
                        explanation: `
                            <p><b>Dịch câu:</b> Điện thoại của tôi không thể kết nối wi-fi ở đây. Còn điện thoại của bạn thì sao?</p>
                            <p><span class='p-grammar'>Ngữ pháp Đại từ sở hữu:</span> Ở đây ta cần một từ mang nghĩa "điện thoại của bạn" (your phone). Để tránh lặp từ "phone", ta sử dụng Đại từ sở hữu <span class='hl-green'>yours</span> (= your phone). Chữ <span class='hl-red'>your</span> (tính từ sở hữu) không bao giờ đứng một mình ở cuối câu mà không có danh từ theo sau.</p>
                        `
                    },
                    {
                        question: "10. 'Click this button to open the emoji panel and...' 'Hold on. _______'",
                        options: [
                            { text: "Is that your button?", isCorrect: false },
                            { text: "Sorry for interrupting.", isCorrect: false },
                            { text: "Can you repeat that please?", isCorrect: true },
                            { text: "You're kidding!", isCorrect: false }
                        ],
                        explanation: `
                            <p><b>Dịch ngữ cảnh:</b> "Nhấn nút này để mở bảng biểu tượng cảm xúc và..." - "Khoan đã. _____"</p>
                            <p><b>Phân tích tình huống giao tiếp:</b></p>
                            <p>Người B ngắt lời người A bằng cụm <span class='p-word'>"Hold on"</span> (Khoan đã, đợi chút). Điều này thường xảy ra khi người nghe chưa kịp làm theo, hoặc chưa nghe rõ, chưa hiểu kịp hướng dẫn của người nói. Do đó, phản hồi phù hợp nhất tiếp theo là yêu cầu người kia nhắc lại: <span class='hl-green'>Can you repeat that please?</span> (Bạn có thể nhắc lại đoạn đó được không?).</p>
                        `
                    }
                ]
            }
        ];

        // --- Logic App ---
        const quizContainer = document.getElementById('quizContainer');
        const currentScoreEl = document.getElementById('currentScore');
        let score = 0;
        const totalQuestions = 30; // 5 + 5 + 10 + 10 = 30
        let questionCounter = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Tạo giao diện câu hỏi
        function renderQuiz() {
            quizData.forEach((sectionBlock) => {
                const sectionTitle = document.createElement('div');
                sectionTitle.className = 'section-title';
                sectionTitle.innerHTML = sectionBlock.section;
                quizContainer.appendChild(sectionTitle);

                sectionBlock.questions.forEach((q) => {
                    questionCounter++;
                    
                    const card = document.createElement('div');
                    card.className = 'question-card glass-panel';
                    
                    const qText = document.createElement('div');
                    qText.className = 'question-text';
                    qText.innerHTML = q.question;
                    card.appendChild(qText);

                    const optionsGrid = document.createElement('div');
                    optionsGrid.className = 'options-grid';
                    
                    const shuffledOptions = shuffleArray([...q.options]);

                    shuffledOptions.forEach(opt => {
                        const btn = document.createElement('button');
                        btn.className = 'btn-option';
                        btn.innerHTML = opt.text;
                        btn.dataset.correct = opt.isCorrect; // Lưu cờ correct để dò lại
                        btn.onclick = () => handleAnswer(btn, opt.isCorrect, card, optionsGrid, q.explanation);
                        optionsGrid.appendChild(btn);
                    });
                    card.appendChild(optionsGrid);

                    const explanationBox = document.createElement('div');
                    explanationBox.className = 'explanation';
                    explanationBox.innerHTML = q.explanation;
                    card.appendChild(explanationBox);

                    quizContainer.appendChild(card);
                });
            });
        }

        function handleAnswer(btn, isCorrect, card, optionsGrid, explanationHTML) {
            // Khóa tất cả các nút & HIỆN ĐÁP ÁN ĐÚNG DÙ CHỌN SAI
            const buttons = optionsGrid.querySelectorAll('.btn-option');
            buttons.forEach(b => {
                b.disabled = true;
                // Tự động bật màu xanh cho nút chứa đáp án đúng
                if (b.dataset.correct === 'true') {
                    b.classList.add('correct-reveal');
                }
            });

            if (isCorrect) {
                btn.classList.add('correct'); // Chắc chắn nút được bấm ưu tiên class đúng
                playSound('correct');
                score++;
                currentScoreEl.innerText = score;
                confetti({
                    particleCount: 60,
                    spread: 70,
                    origin: { y: 0.8 },
                    colors: ['#00D26A', '#FDCB6E', '#8854C0']
                });
            } else {
                btn.classList.add('incorrect');
                playSound('incorrect');
            }

            // HIỆN GIẢI THÍCH NGAY LẬP TỨC
            const expBox = card.querySelector('.explanation');
            expBox.style.display = 'block';
        }

        // --- Logic Submit & Tên ---
        function showNamePrompt() {
            document.getElementById('nameModal').style.display = 'flex';
            document.getElementById('studentName').focus();
        }

        function handleEnter(e) {
            if (e.key === 'Enter') submitQuiz();
        }

        function submitQuiz() {
            const nameInput = document.getElementById('studentName');
            const nameError = document.getElementById('nameError');
            const name = nameInput.value.trim();

            if (!name) {
                nameInput.classList.add('error');
                nameError.style.display = 'block';
                setTimeout(() => nameInput.classList.remove('error'), 400);
                return;
            }

            document.getElementById('nameModal').style.display = 'none';
            showResultModal(name);
        }

        function showResultModal(name) {
            const resultModal = document.getElementById('resultModal');
            const titleEl = document.getElementById('resultTitle');
            const scoreEl = document.getElementById('resultScore');
            const gifEl = document.getElementById('resultGif');

            let percentage = (score / totalQuestions) * 100;
            let feedback = '';
            let gifSrc = '';

            if (percentage === 100) {
                feedback = `🌟 THIÊN TÀI! ${name} xuất sắc tuyệt đối!`;
                gifSrc = 'https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif'; 
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
            } else if (percentage >= 60) {
                feedback = `🎉 GIỎI QUÁ! ${name} làm rất tốt!`;
                gifSrc = 'https://media.giphy.com/media/xT0xezQGU5xCDJuCPe/giphy.gif'; 
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else {
                feedback = `💪 CỐ LÊN NHÉ ${name}! Ôn lại bài thật kỹ nào!`;
                gifSrc = 'https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif'; 
            }

            titleEl.innerText = feedback;
            scoreEl.innerText = `Điểm của bạn: ${score} / ${totalQuestions} (${percentage.toFixed(0)}%)`;
            gifEl.src = gifSrc;
            
            resultModal.style.display = 'flex';
        }

        window.onload = () => {
            renderQuiz();
        };
    </script>
</body>
