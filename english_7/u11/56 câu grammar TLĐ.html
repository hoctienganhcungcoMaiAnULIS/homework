<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Simple Quiz | Ms Mai An ULIS</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--p:#8854C0;--g:#FDCB6E;--t:#00C9A7;--ok:#00D26A;--no:#FF4757;--lp:#f5eeff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden}
.bg-anim{position:fixed;inset:0;z-index:-2;background:linear-gradient(135deg,#ffd6e7,#c3aed6,#a8edea,#ffecd2,#ffd6e7,#c3aed6);background-size:400% 400%;animation:bgmove 14s ease infinite}
@keyframes bgmove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.bg-svg{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.float-item{position:absolute;animation:floatUp linear infinite;opacity:.18}
@keyframes floatUp{0%{transform:translateY(110vh) rotate(0deg);opacity:0}10%{opacity:.18}90%{opacity:.18}100%{transform:translateY(-15vh) rotate(720deg);opacity:0}}
.wrap{max-width:860px;margin:0 auto;padding:14px}
/* Header */
.hdr{text-align:center;padding:14px 20px 12px;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border-radius:22px;margin-bottom:18px;box-shadow:0 6px 28px rgba(136,84,192,.18)}
.hdr h1{font-size:1.35rem;font-weight:900;background:linear-gradient(135deg,#8854C0,#00C9A7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:.8rem;color:#777;margin-top:3px}
/* Exercise card */
.ex-card{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-radius:24px;padding:22px;margin-bottom:22px;box-shadow:0 6px 28px rgba(136,84,192,.13)}
.ex-title{font-size:.95rem;font-weight:900;color:#8854C0;margin-bottom:18px;padding-bottom:10px;border-bottom:3px solid #e0d0f5}
/* Word bank */
.word-bank{display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;background:rgba(253,203,110,.2);border-radius:16px;margin-bottom:16px;align-items:center}
.wb-lbl{font-weight:800;font-size:.8rem;color:#a07800;width:100%;margin-bottom:2px}
.wb-word{padding:3px 13px;background:white;border:2px solid #FDCB6E;border-radius:20px;font-weight:700;font-size:.82rem;color:#8a6800}
/* Question item */
.q-item{margin-bottom:16px;padding:15px;background:rgba(245,238,255,.85);border-radius:16px;transition:box-shadow .3s}
.q-num{font-weight:900;color:#8854C0;margin-right:5px}
.q-text{font-size:.93rem;line-height:1.85;color:#2d2d2d}
/* Binary choice buttons */
.bc-btn{display:inline-block;padding:3px 14px;margin:1px 3px;border-radius:20px;border:2px solid #8854C0;background:white;color:#8854C0;font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 0 #6a3fa0;vertical-align:middle}
.bc-btn:hover:not(:disabled){transform:scale(1.07) translateY(-1px);background:#f0e8ff}
.bc-btn.ok{background:#00D26A;color:white;border-color:#00D26A;box-shadow:0 4px 0 #009947}
.bc-btn.no{background:#FF4757;color:white;border-color:#FF4757;box-shadow:0 4px 0 #cc1927;animation:shake .4s ease}
.bc-btn:disabled{cursor:not-allowed}
/* Blank button */
.bl-btn{display:inline-block;min-width:110px;padding:3px 14px;margin:1px 4px;border-radius:20px;border:2px dashed #8854C0;background:rgba(136,84,192,.1);color:#8854C0;font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s;text-align:center;vertical-align:middle}
.bl-btn .hint{font-size:.7rem;color:#aaa;display:block;font-weight:600}
.bl-btn:hover:not(.answered){transform:scale(1.04);background:rgba(136,84,192,.18)}
.bl-btn.ok{border-style:solid;background:rgba(0,210,106,.15);color:#005a25;border-color:#00D26A}
.bl-btn.no{border-style:solid;background:rgba(255,71,87,.15);color:#cc0000;border-color:#FF4757;animation:shake .4s ease}
/* Explanation */
.exp{display:none;margin-top:12px;padding:13px 16px;background:linear-gradient(135deg,rgba(253,203,110,.18),rgba(0,201,167,.13));border-left:4px solid #FDCB6E;border-radius:12px;font-size:.83rem;line-height:1.75;color:#2d2d2d;animation:fadeIn .3s ease}
.exp.show{display:block}
.exp .ca{color:#00D26A;font-weight:900}
.exp .wa{color:#FF4757;font-weight:700}
.exp .rule{background:rgba(136,84,192,.12);padding:8px 12px;border-radius:10px;margin-top:8px;font-weight:700;color:#6a2fa0}
/* Submit */
.sub-btn{display:block;width:100%;padding:17px;border-radius:20px;border:none;background:linear-gradient(135deg,#8854C0,#00C9A7);color:white;font-family:'Nunito',sans-serif;font-weight:900;font-size:1.15rem;cursor:pointer;margin:22px 0;box-shadow:0 8px 0 #5a3090;transition:all .2s}
.sub-btn:hover{transform:translateY(-3px);box-shadow:0 11px 0 #5a3090}
.sub-btn:active{transform:translateY(4px);box-shadow:0 4px 0 #5a3090}
/* Modal */
.m-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:16px}
.m-ov.show{display:flex}
.modal{background:white;border-radius:26px;padding:24px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.28);animation:fadeIn .25s ease}
.m-title{font-weight:900;color:#8854C0;margin-bottom:12px;font-size:.95rem}
.m-sent{font-size:.85rem;color:#444;margin-bottom:14px;line-height:1.65;background:#f5eeff;padding:10px 14px;border-radius:12px}
.m-opts{display:flex;flex-wrap:wrap;gap:10px}
.m-opt{flex:1;min-width:80px;padding:10px 14px;border-radius:16px;border:2px solid #8854C0;background:white;color:#8854C0;font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s;text-align:center;box-shadow:0 4px 0 #6a3fa0}
.m-opt:hover{transform:translateY(-2px);background:#f0e8ff}
.m-close{margin-top:14px;width:100%;padding:9px;border-radius:14px;border:none;background:#eee;color:#666;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;font-size:.85rem}
/* Score modal */
.sc-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;align-items:center;justify-content:center;padding:16px}
.sc-ov.show{display:flex}
.sc-modal{background:white;border-radius:32px;padding:36px 28px;max-width:380px;width:100%;text-align:center;animation:bounceIn .5s ease}
.sc-emoji{font-size:3.5rem;margin-bottom:10px}
.sc-title{font-size:1.3rem;font-weight:900;color:#8854C0;margin-bottom:6px}
.sc-num{font-size:2.8rem;font-weight:900;color:#00D26A}
.sc-total{font-size:1rem;color:#aaa;font-weight:700}
.sc-cmt{font-size:.95rem;color:#555;margin-top:12px;line-height:1.55}
.sc-close{margin-top:20px;padding:13px 30px;border-radius:20px;border:none;background:linear-gradient(135deg,#8854C0,#00C9A7);color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;box-shadow:0 5px 0 #5a3090}
/* Animations */
@keyframes shake{0%,100%{transform:translateX(0)}10%,90%{transform:translateX(-5px)}30%,70%{transform:translateX(5px)}50%{transform:translateX(-5px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounceIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
/* Progress */
.progress-bar{background:rgba(255,255,255,.5);border-radius:20px;height:8px;margin-bottom:18px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,#8854C0,#00C9A7);height:100%;border-radius:20px;transition:width .4s ease;width:0%}
.progress-lbl{text-align:right;font-size:.78rem;font-weight:700;color:#8854C0;margin-top:3px}
</style>
</head>
<body>
<div class="bg-anim"></div>
<div class="bg-svg" id="bg-svg"></div>
<canvas id="confetti-canvas"></canvas>

<div class="wrap">
  <div class="hdr">
    <h1>🌟 Future Simple – Tiếng Anh 7</h1>
    <p>👩‍🏫 Giáo viên: <b>Ms Mai An ULIS</b> &nbsp;|&nbsp; Exercises 6, 7, 8, 9 &nbsp;|&nbsp; Global Success</p>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
  <div class="progress-lbl" id="prog-lbl">0 / 56 câu đúng</div>
  <div id="quiz-root"></div>
  <button class="sub-btn" onclick="submitQuiz()">🎉 Nộp Bài & Xem Kết Quả</button>
</div>

<!-- Fill-in popup -->
<div class="m-ov" id="m-ov" onclick="closeModalOut(event)">
  <div class="modal">
    <div class="m-title" id="m-title">📝 Chọn đáp án:</div>
    <div class="m-sent" id="m-sent"></div>
    <div class="m-opts" id="m-opts"></div>
    <button class="m-close" onclick="closeModal()">✕ Đóng</button>
  </div>
</div>

<!-- Score popup -->
<div class="sc-ov" id="sc-ov">
  <div class="sc-modal">
    <div class="sc-emoji" id="sc-emoji">🏆</div>
    <div class="sc-title">Kết quả của bạn</div>
    <div class="sc-num" id="sc-num">0</div>
    <div class="sc-total" id="sc-total">/ 56 câu</div>
    <div class="sc-cmt" id="sc-cmt"></div>
    <button class="sc-close" onclick="document.getElementById('sc-ov').classList.remove('show')">📖 Xem lại bài ✨</button>
  </div>
</div>

<script>
// ===================== DATA =====================
const EXERCISES = [
{
  id:'ex6', title:'Exercise 6. Circle the correct option in brackets.',
  type:'binary',
  qs:[
    {id:'e6q1', num:1,
      parts:['Gasoline is currently the main fuel, but it will ',' out soon.'],
      opts:['run','runs'], ans:'run',
      exp:`<b>✅ Đáp án: <span class="ca">run</span></b><br>
🇻🇳 <i>"Xăng dầu hiện là nhiên liệu chính, nhưng nó sẽ sớm <b>cạn kiệt</b>."</i><br><br>
📖 <b>Phân tích 2 đáp án:</b><br>
• <b>run</b> (V nguyên thể): cạn, hết → <span class="ca">✓ ĐÚNG</span> — Sau "will" phải dùng động từ nguyên thể (bare infinitive). Cụm "run out" = cạn kiệt.<br>
• <b>runs</b> (V chia ngôi 3 số ít – thì HT đơn): → <span class="wa">✗ SAI</span> — Sau "will" KHÔNG bao giờ chia động từ theo ngôi.<br>
<div class="rule">📌 Quy tắc: <u>will + V nguyên thể</u> → will run, will go, will come... (không thêm -s/-es/-ed)</div>`},
    {id:'e6q2', num:2,
      parts:['People will develop renewable energies ',' reduce nature destruction.'],
      opts:['for','to'], ans:'to',
      exp:`<b>✅ Đáp án: <span class="ca">to</span></b><br>
🇻🇳 <i>"Mọi người sẽ phát triển năng lượng tái tạo <b>để</b> giảm sự tàn phá thiên nhiên."</i><br><br>
📖 <b>Phân tích 2 đáp án:</b><br>
• <b>to reduce</b> (to + V nguyên thể): chỉ <b>mục đích</b> → <span class="ca">✓ ĐÚNG</span> — "to + V" = "để làm gì".<br>
• <b>for reduce</b>: → <span class="wa">✗ SAI</span> — "for" + V nguyên thể không hợp ngữ pháp; "for" đi kèm danh từ hoặc V-ing (for reducing), nhưng trong câu này "to reduce" là chuẩn.<br>
<div class="rule">📌 Quy tắc chỉ MỤC ĐÍCH: S + V + <u>to + V nguyên thể</u> → "to reduce" = "để giảm"</div>`},
    {id:'e6q3', num:3,
      parts:['','they build houses in the sea in ten years?'],
      opts:['Do','Will'], ans:'Will',
      exp:`<b>✅ Đáp án: <span class="ca">Will</span></b><br>
🇻🇳 <i>"Họ có <b>sẽ</b> xây nhà dưới biển trong mười năm nữa không?"</i><br><br>
📖 <b>Phân tích 2 đáp án:</b><br>
• <b>Will</b>: trợ động từ thì tương lai đơn → <span class="ca">✓ ĐÚNG</span> — Dấu hiệu "in ten years" (trong mười năm nữa) → thì tương lai.<br>
• <b>Do</b>: trợ động từ thì hiện tại đơn → <span class="wa">✗ SAI</span> — "in ten years" là tương lai, không dùng "Do".<br>
<div class="rule">📌 Câu hỏi TL đơn: <u>Will + S + V nguyên thể + ?</u> → Will they build...?</div>`},
    {id:'e6q4', num:4,
      parts:['If more people ',' , air pollution will reduce.'],
      opts:['cycle','will cycle'], ans:'cycle',
      exp:`<b>✅ Đáp án: <span class="ca">cycle</span></b><br>
🇻🇳 <i>"Nếu nhiều người <b>đi xe đạp</b> hơn, ô nhiễm không khí sẽ giảm."</i><br><br>
📖 <b>Phân tích 2 đáp án:</b><br>
• <b>cycle</b> (V hiện tại đơn): → <span class="ca">✓ ĐÚNG</span> — Mệnh đề "if" trong câu điều kiện loại 1 dùng <b>thì hiện tại đơn</b>.<br>
• <b>will cycle</b>: → <span class="wa">✗ SAI</span> — Mệnh đề "If" KHÔNG bao giờ dùng "will".<br>
<div class="rule">📌 Câu ĐK loại 1: <u>If + S + V (HTĐ)</u>, S + will + V → If + cycle ✓</div>`},
    {id:'e6q5', num:5,
      parts:['Mai thinks she ',' a picture of the landscape in her hometown.'],
      opts:['draws','will draw'], ans:'will draw',
      exp:`<b>✅ Đáp án: <span class="ca">will draw</span></b><br>
🇻🇳 <i>"Mai nghĩ rằng cô ấy <b>sẽ vẽ</b> một bức tranh về phong cảnh quê hương."</i><br><br>
📖 <b>Phân tích 2 đáp án:</b><br>
• <b>will draw</b>: → <span class="ca">✓ ĐÚNG</span> — "Mai thinks" (Mai nghĩ/dự đoán) → đây là dự đoán về tương lai → dùng "will".<br>
• <b>draws</b> (HTĐ): → <span class="wa">✗ SAI</span> — HTĐ diễn tả thói quen/sự thật, không diễn tả dự đoán tương lai.<br>
<div class="rule">📌 "Think/believe/hope/expect + will + V" → diễn tả dự đoán về tương lai</div>`},
    {id:'e6q6', num:6,
      parts:['He ',' come to the party tomorrow.'],
      opts:["doesn't","won't"], ans:"won't",
      exp:`<b>✅ Đáp án: <span class="ca">won't</span></b><br>
🇻🇳 <i>"Anh ấy <b>sẽ không</b> đến bữa tiệc ngày mai."</i><br><br>
📖 <b>Phân tích 2 đáp án:</b><br>
• <b>won't</b> (= will not): phủ định tương lai → <span class="ca">✓ ĐÚNG</span> — Dấu hiệu "tomorrow" (ngày mai) → thì tương lai.<br>
• <b>doesn't</b>: phủ định HTĐ → <span class="wa">✗ SAI</span> — HTĐ dùng cho thói quen/sự thật, không dùng với "tomorrow".<br>
<div class="rule">📌 Phủ định tương lai: S + <u>won't (will not)</u> + V nguyên thể</div>`},
    {id:'e6q7', num:7,
      parts:['I think the students ',' to school by driverless bus.'],
      opts:['will soon go','soon will go'], ans:'will soon go',
      exp:`<b>✅ Đáp án: <span class="ca">will soon go</span></b><br>
🇻🇳 <i>"Tôi nghĩ các học sinh <b>sẽ sớm</b> đến trường bằng xe buýt tự lái."</i><br><br>
📖 <b>Phân tích 2 đáp án:</b><br>
• <b>will soon go</b>: → <span class="ca">✓ ĐÚNG</span> — Trạng từ chỉ thời gian ngắn (soon, already, just...) đứng <b>GIỮA</b> "will" và động từ chính.<br>
• <b>soon will go</b>: → <span class="wa">✗ SAI</span> — Trạng từ KHÔNG đứng trước "will" trong cấu trúc tương lai đơn.<br>
<div class="rule">📌 Vị trí trạng từ: will + <u>soon/just/already/never</u> + V → will soon go ✓</div>`},
    {id:'e6q8', num:8,
      parts:["That wasn't my mistake. It was ",' .'],
      opts:['mine','yours'], ans:'yours',
      exp:`<b>✅ Đáp án: <span class="ca">yours</span></b><br>
🇻🇳 <i>"Đó không phải lỗi của tôi. Đó là lỗi <b>của bạn</b>."</i><br><br>
📖 <b>Phân tích 2 đáp án:</b><br>
• <b>yours</b> (đại từ sở hữu = của bạn): → <span class="ca">✓ ĐÚNG</span> — Dựa vào ngữ cảnh: "không phải lỗi của TÔI" → phải là lỗi của NGƯỜI KHÁC (bạn = yours).<br>
• <b>mine</b> (đại từ sở hữu = của tôi): → <span class="wa">✗ SAI</span> — Vế trước đã phủ nhận "my mistake", nên không thể dùng "mine".<br>
<div class="rule">📌 Đại từ sở hữu đứng độc lập (không kèm N): mine, yours, his, hers, ours, theirs</div>`},
    {id:'e6q9', num:9,
      parts:['','gave a lot of clothes to the street children.'],
      opts:['She','Her'], ans:'She',
      exp:`<b>✅ Đáp án: <span class="ca">She</span></b><br>
🇻🇳 <i>"<b>Cô ấy</b> đã cho rất nhiều quần áo cho trẻ em đường phố."</i><br><br>
📖 <b>Phân tích 2 đáp án:</b><br>
• <b>She</b> (đại từ chủ ngữ – Subject pronoun): → <span class="ca">✓ ĐÚNG</span> — Đứng đầu câu, trước động từ "gave" → cần chủ ngữ.<br>
• <b>Her</b> (đại từ tân ngữ / tính từ sở hữu): → <span class="wa">✗ SAI</span> — "Her" làm tân ngữ hoặc đứng trước danh từ, KHÔNG làm chủ ngữ.<br>
<div class="rule">📌 Chủ ngữ câu → dùng đại từ CHỦ NGỮ: I, You, He, <u>She</u>, It, We, They</div>`},
    {id:'e6q10', num:10,
      parts:['The white villa over there is ',' .'],
      opts:['our','ours'], ans:'ours',
      exp:`<b>✅ Đáp án: <span class="ca">ours</span></b><br>
🇻🇳 <i>"Biệt thự trắng đằng kia là <b>của chúng tôi</b>."</i><br><br>
📖 <b>Phân tích 2 đáp án:</b><br>
• <b>ours</b> (đại từ sở hữu = của chúng tôi): → <span class="ca">✓ ĐÚNG</span> — Đứng sau động từ "is", không có danh từ theo sau → dùng đại từ sở hữu.<br>
• <b>our</b> (tính từ sở hữu): → <span class="wa">✗ SAI</span> — "our" PHẢI đứng trước danh từ (our house, our car...), không đứng độc lập.<br>
<div class="rule">📌 our + N → "our villa" | ours đứng độc lập → "is <u>ours</u>" ✓</div>`},
  ]
},
{
  id:'ex7', title:"Exercise 7. Complete the sentences with will or won't.",
  type:'fill',
  qs:[
    {id:'e7q1',num:1, parts:["We haven't got any money, so we ",' go on holiday this year.'],
     hint:"will / won't", opts:['will',"won't"], ans:"won't",
     exp:`<b>✅ Đáp án: <span class="ca">won't</span></b><br>
🇻🇳 <i>"Chúng tôi không có tiền, vì vậy chúng tôi <b>sẽ không</b> đi nghỉ hè năm nay."</i><br><br>
📖 <b>Phân tích:</b> "haven't got any money" (không có tiền) → nguyên nhân dẫn đến kết quả tiêu cực: <b>sẽ không đi</b> nghỉ hè. Dùng "won't" (= will not) cho phủ định tương lai.<br>
<div class="rule">📌 Cause → Negative effect: no money → won't go on holiday</div>`},
    {id:'e7q2',num:2, parts:['Our teacher is ill, so she ',' be at school next week.'],
     hint:"will / won't", opts:['will',"won't"], ans:"won't",
     exp:`<b>✅ Đáp án: <span class="ca">won't</span></b><br>

// ===================== STATE =====================
const state = {}; // blankId → {answered: bool, correct: bool}
let totalAnswered = 0;
let totalCorrect = 0;
const TOTAL = 56;

// Current modal context
let activeBlankId = null;

// ===================== RENDER =====================
function buildSentenceHTML(parts, opts, qid) {
  // For binary type, interleave options between parts
  let html = parts[0];
  html += opts.map((o,i) => `<button class="bc-btn" id="bc_${qid}_${i}" onclick="pickBinary('${qid}',${i},'${escQ(o)}')">${o}</button>`).join(' / ');
  html += parts[1] || '';
  return html;
}

function buildFillHTML(parts, hint, blankId) {
  return `${parts[0]}<button class="bl-btn" id="bl_${blankId}" onclick="openModal('${blankId}')"><small class="hint">${escQ(hint)}</small></button>${parts[1] || ''}`;
}

function buildMultiHTML(segments, qid) {
  let html = '';
  segments.forEach((seg, i) => {
    if (seg.t !== undefined) html += seg.t;
    else {
      const bid = seg.b;
      html += `<button class="bl-btn" id="bl_${bid}" onclick="openModal('${bid}')"><small class="hint">${escQ(seg.hint)}</small></button>`;
      // register in state
      if (!state[bid]) state[bid] = {answered:false, correct:false, opts:seg.opts, ans:seg.ans, qid};
    }
  });
  return html;
}

function escQ(s){ return s.replace(/'/g,"\\'"); }

function renderAll() {
  const root = document.getElementById('quiz-root');
  let html = '';
  EXERCISES.forEach(ex => {
    html += `<div class="ex-card">`;
    html += `<div class="ex-title">${ex.title}</div>`;
    if (ex.wordBank) {
      html += `<div class="word-bank"><div class="wb-lbl">📚 Word Bank:</div>`;
      ex.wordBank.forEach(w => { html += `<span class="wb-word">${w}</span>`; });
      html += `</div>`;
    }
    if (ex.intro) html += `<p style="font-weight:700;color:#8854C0;margin-bottom:14px;font-size:.9rem">📅 ${ex.intro}</p>`;
    ex.qs.forEach(q => {
      html += `<div class="q-item" id="qi_${q.id}">`;
      html += `<div class="q-text"><span class="q-num">${q.num}.</span>`;
      if (ex.type === 'binary') {
        html += buildSentenceHTML(q.parts, q.opts, q.id);
        if (!state[q.id]) state[q.id] = {answered:false, correct:false, opts:q.opts, ans:q.ans, type:'binary'};
      } else if (q.type === 'multi') {
        html += buildMultiHTML(q.segments, q.id);
        // store exp reference on qid
        if (!state[q.id+'_meta']) state[q.id+'_meta'] = {exp: q.exp};
      } else {
        const bid = q.id;
        html += buildFillHTML(q.parts, q.hint, bid);
        if (!state[bid]) state[bid] = {answered:false, correct:false, opts:q.opts, ans:q.ans, type:'fill'};
      }
      html += `</div>`;
      // Explanation area
      const expId = (q.type === 'multi') ? q.id+'_exp' : q.id+'_exp';
      html += `<div class="exp" id="${expId}">${q.exp}</div>`;
      html += `</div>`;
    });
    html += `</div>`;
  });
  root.innerHTML = html;
}

// ===================== BINARY CHOICE =====================
function pickBinary(qid, idx, chosen) {
  const s = state[qid];
  if (s.answered) return;
  s.answered = true;
  const correct = (chosen === s.ans);
  s.correct = correct;
  if (correct) { totalCorrect++; triggerConfetti(); playSound(true); }
  else { playSound(false); }
  totalAnswered++;
  updateProgress();
  // Update buttons
  s.opts.forEach((opt, i) => {
    const btn = document.getElementById(`bc_${qid}_${i}`);
    btn.disabled = true;
    if (opt === s.ans) btn.classList.add('ok');
    else if (i === idx && !correct) btn.classList.add('no');
  });
  // Show explanation
  document.getElementById(qid+'_exp').classList.add('show');
}

// ===================== FILL MODAL =====================
function openModal(blankId) {
  const s = state[blankId];
  if (!s || s.answered) return;
  activeBlankId = blankId;
  // Find question sentence for context
  let sentence = '';
  const btn = document.getElementById('bl_'+blankId);
  if (btn) {
    const qi = btn.closest('.q-item');
    const txt = qi ? qi.querySelector('.q-text').innerText : '';
    sentence = txt;
  }
  document.getElementById('m-title').innerHTML = '📝 Chọn đáp án:';
  document.getElementById('m-sent').textContent = sentence;
  const optsDiv = document.getElementById('m-opts');
  optsDiv.innerHTML = '';
  s.opts.forEach(opt => {
    const btn2 = document.createElement('button');
    btn2.className = 'm-opt';
    btn2.textContent = opt;
    btn2.onclick = () => pickFill(blankId, opt);
    optsDiv.appendChild(btn2);
  });
  document.getElementById('m-ov').classList.add('show');
}

function pickFill(blankId, chosen) {
  const s = state[blankId];
  if (!s || s.answered) { closeModal(); return; }
  s.answered = true;
  const correct = (chosen === s.ans);
  s.correct = correct;
  if (correct) { totalCorrect++; triggerConfetti(); playSound(true); }
  else { playSound(false); }
  totalAnswered++;
  updateProgress();
  // Update blank button
  const blankBtn = document.getElementById('bl_'+blankId);
  if (blankBtn) {
    blankBtn.innerHTML = correct
      ? `✅ ${chosen}`
      : `❌ ${chosen} <small style="display:block;font-size:.7rem">(Đáp án: ${s.ans})</small>`;
    blankBtn.classList.add('answered');
    blankBtn.classList.add(correct ? 'ok' : 'no');
    blankBtn.onclick = null;
  }
  // Show explanation – find the right exp div
  // For multi-fill, find parent q-item and get exp there
  let expDivId = blankId + '_exp';
  // Check if it's a multi-blank (sub-blank id)
  if (!document.getElementById(expDivId)) {
    // Find parent qid
    const parent = document.getElementById('bl_'+blankId);
    if (parent) {
      const qi = parent.closest('.q-item');
      if (qi) {
        const expDiv = qi.querySelector('.exp');
        if (expDiv) expDiv.classList.add('show');
      }
    }
  } else {
    document.getElementById(expDivId).classList.add('show');
  }
  closeModal();
}

function closeModal() { document.getElementById('m-ov').classList.remove('show'); activeBlankId = null; }
function closeModalOut(e) { if (e.target === document.getElementById('m-ov')) closeModal(); }

// ===================== PROGRESS =====================
function updateProgress() {
  const pct = Math.round(totalCorrect / TOTAL * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-lbl').textContent = `${totalCorrect} / ${TOTAL} câu đúng`;
}

// ===================== SUBMIT =====================
function submitQuiz() {
  // Count all answers
  let correct = 0, total = 0;
  for (const [k, v] of Object.entries(state)) {
    if (k.endsWith('_meta') || k.endsWith('_exp')) continue;
    if (v.answered !== undefined) {
      total++;
      if (v.correct) correct++;
    }
  }
  const pct = Math.round(correct / TOTAL * 100);
  let emoji, comment;
  if (pct >= 90) { emoji = '🏆'; comment = 'Xuất sắc! Bạn hiểu rất sâu thì tương lai đơn rồi! Tiếp tục phát huy nhé! 🌟'; }
  else if (pct >= 70) { emoji = '🎉'; comment = 'Rất giỏi! Chỉ cần ôn thêm một chút là hoàn hảo! Cố lên! 💪'; }
  else if (pct >= 50) { emoji = '😊'; comment = 'Khá tốt! Hãy xem lại phần giải thích các câu sai và thử lại nhé! 📖'; }
  else { emoji = '💡'; comment = 'Đừng nản lòng! Ôn kỹ cấu trúc "will + V nguyên thể" và làm lại nhé! Bạn làm được! 🌈'; }
  document.getElementById('sc-emoji').textContent = emoji;
  document.getElementById('sc-num').textContent = correct;
  document.getElementById('sc-total').textContent = `/ ${TOTAL} câu`;
  document.getElementById('sc-cmt').textContent = `(${pct}%) – ${comment}`;
  document.getElementById('sc-ov').classList.add('show');
  if (pct >= 70) bigConfetti();
}

// ===================== AUDIO =====================
function playSound(correct) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (correct) {
      [523, 659, 784].forEach((freq, i) => {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq; osc.type = 'sine';
        gain.gain.setValueAtTime(.3, ctx.currentTime + i*.1);
        gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + i*.1 + .3);
        osc.start(ctx.currentTime + i*.1); osc.stop(ctx.currentTime + i*.1 + .3);
      });
    } else {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(250, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + .3);
      gain.gain.setValueAtTime(.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .3);
      osc.start(); osc.stop(ctx.currentTime + .3);
    }
  } catch(e) {}
}

// ===================== CONFETTI =====================
const canvas = document.getElementById('confetti-canvas');
const ctx2 = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
let particles = [];
function triggerConfetti() {
  for (let i = 0; i < 40; i++) {
    particles.push({
      x: Math.random() * canvas.width, y: canvas.height * -.1,
      w: Math.random()*10+5, h: Math.random()*6+3,
      color: ['#FF4757','#FDCB6E','#00C9A7','#8854C0','#ff9ff3','#54a0ff'][Math.floor(Math.random()*6)],
      vx: (Math.random()-0.5)*4, vy: Math.random()*3+2,
      rot: Math.random()*360, vrot: (Math.random()-0.5)*6,
      life: 1
    });
  }
  if (!animRunning) animate();
}
function bigConfetti() { for(let i=0;i<5;i++) setTimeout(triggerConfetti, i*200); }
let animRunning = false;
function animate() {
  animRunning = true;
  ctx2.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.rot += p.vrot; p.life -= .012;
    ctx2.save(); ctx2.translate(p.x, p.y); ctx2.rotate(p.rot * Math.PI/180);
    ctx2.globalAlpha = p.life; ctx2.fillStyle = p.color;
    ctx2.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx2.restore();
  });
  if (particles.length > 0) requestAnimationFrame(animate); else animRunning = false;
}

// ===================== BG DECORATIONS =====================
function makeBG() {
  const icons = ['⭐','🌟','🌸','🍭','🎈','☁️','🦋','🌈','💫','🍀','🎵','🏅','🌺','🎀'];
  const svg = document.getElementById('bg-svg');
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'float-item';
    el.textContent = icons[i % icons.length];
    el.style.cssText = `left:${Math.random()*100}vw;font-size:${Math.random()*20+14}px;animation-duration:${Math.random()*12+10}s;animation-delay:-${Math.random()*14}s`;
    svg.appendChild(el);
  }
}
