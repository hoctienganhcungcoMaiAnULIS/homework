<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1 English Reading Test - Ms Mai An ULIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Pastel + Neon Palette for Comedy/Stage Theme */
            --primary: #9B5DE5;   /* Tím nghệ thuật */
            --secondary: #FEE440; /* Vàng ánh đèn sân khấu */
            --accent1: #6A0572;   /* Tím đậm chữ */
            --accent2: #F15BB5;   /* Hồng Neon nổi bật */
            --accent3: #00BBF9;   /* Xanh dương tươi sáng */
            --correct: #00D26A;
            --correct-shadow: #00994D;
            --wrong: #FF4757;
            --wrong-shadow: #CC3946;
            --text-dark: #2D3436;
            --bg-glass: rgba(255, 255, 255, 0.55);
            --border-glass: rgba(255, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: linear-gradient(-45deg, #FEE440, #F15BB5, #9B5DE5, #00BBF9);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #bg-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.65;
            pointer-events: none;
            animation: floatPattern 50s linear infinite;
        }

        @keyframes floatPattern {
            from { background-position: 0 0; }
            to { background-position: 1000px -1000px; }
        }

        /* Top Control Bar */
        #header {
            position: relative;
            z-index: 10;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--border-glass);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .header-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--accent1);
            background: white;
            padding: 6px 18px;
            border-radius: 20px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 8px 25px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent1);
        }

        .btn {
            cursor: pointer;
            border: none;
            font-weight: 700;
            border-radius: 15px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            font-family: 'Quicksand', sans-serif;
        }

        .btn:active { transform: translateY(4px) !important; }

        .btn-timer {
            background: var(--accent3);
            color: #fff;
            padding: 8px 20px;
            font-size: 1.1rem;
            box-shadow: 0 4px 0 #008CB8;
        }
        .btn-timer:hover { transform: scale(1.05); }

        .btn-submit {
            background: var(--accent2);
            color: white;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 20px;
            box-shadow: 0 5px 0 #C43D90;
        }
        .btn-submit:hover { transform: scale(1.05); }

        /* Split Screen */
        #main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            z-index: 10;
            padding: 20px;
            gap: 20px;
        }

        .panel {
            flex: 1;
            overflow-y: auto;
            border-radius: 25px;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 2px solid var(--border-glass);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.4); }

        /* Reading Panel */
        .passage-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent1);
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 1px 1px 0px #fff;
        }

        .paragraph-box {
            background: rgba(255, 255, 255, 0.7);
            padding: 22px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 2px solid white;
            transition: transform 0.2s;
        }
        .paragraph-box:hover { transform: translateY(-2px); }

        .paragraph-text {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .btn-translate {
            background: var(--secondary);
            color: #6A0572;
            padding: 10px 18px;
            font-size: 0.95rem;
            border-radius: 12px;
            box-shadow: 0 4px 0 #D4B200;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-translate:hover { transform: scale(1.03); }

        .translation-text {
            display: none;
            margin-top: 15px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.9);
            border-left: 6px solid var(--primary);
            border-radius: 10px;
            font-size: 1.05rem;
            color: #2D3436;
            line-height: 1.6;
        }

        /* Glossary */
        .glossary-box {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
            border: 2px solid var(--border-glass);
        }
        .glossary-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent1);
            margin-bottom: 15px;
            text-align: center;
        }
        .glossary-table { width: 100%; border-collapse: collapse; }
        .glossary-table th, .glossary-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .glossary-table th { background: var(--primary); color: white; border-radius: 8px 8px 0 0; }
        .glossary-table tr:hover { background: #fdf5ff; }

        /* Quiz Panel */
        .question-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 2px solid white;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--accent1);
        }

        .options-grid { display: flex; flex-direction: column; gap: 12px; }

        .option-btn {
            background: white;
            border: 2px solid #E2E8F0;
            padding: 15px 20px;
            font-size: 1.08rem;
            text-align: left;
            border-radius: 15px;
            color: var(--text-dark);
            box-shadow: 0 4px 0 #E2E8F0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .option-btn:not(.disabled):hover {
            transform: scale(1.02) translateX(5px);
            border-color: var(--primary);
            box-shadow: 0 4px 0 var(--primary);
        }

        .option-btn.correct { background: var(--correct); color: white; border-color: var(--correct-shadow); box-shadow: 0 4px 0 var(--correct-shadow); }
        .option-btn.wrong { background: var(--wrong); color: white; border-color: var(--wrong-shadow); box-shadow: 0 4px 0 var(--wrong-shadow); animation: shake 0.4s; }
        .option-btn.disabled { cursor: not-allowed; opacity: 0.8; }

        /* MỚI: Cải tiến UI hộp giải thích để phân ranh giới rõ ràng */
        .explanation-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #FFF9E6; 
            border: 2px dashed var(--accent2);
            border-radius: 15px;
            font-size: 1.05rem;
            line-height: 1.7;
            color: #2D3436;
            animation: popIn 0.4s forwards;
        }

        .exp-section { margin-bottom: 12px; }
        .exp-evidence {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid var(--accent2);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-top: 15px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Modal Overlays... */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            z-index: 1000; display: none; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 30px; text-align: center;
            max-width: 500px; width: 90%; animation: popIn 0.5s; border: 4px solid var(--secondary);
        }
        .modal-title { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
        .modal-score { font-size: 4.5rem; font-weight: 800; color: var(--accent2); margin: 20px 0; }
        .modal-message { font-size: 1.2rem; color: #636E72; margin-bottom: 30px; font-weight: 600; }
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2000; }
    </style>
</head>
<body>

    <div id="bg-pattern"></div>
    <canvas id="confetti-canvas"></canvas>

    <div id="header">
        <div class="header-title">Giáo viên tạo: Ms Mai An ULIS</div>
        <div class="timer-container">
            <span id="timer-display">10:00</span>
            <button class="btn btn-timer" id="btn-timer-toggle" onclick="toggleTimer()">BẮT ĐẦU TÍNH GIỜ LÀM BÀI</button>
        </div>
        <button class="btn btn-submit" onclick="submitTest()">NỘP BÀI 🎉</button>
    </div>

    <div id="main-content">
        <div class="panel" id="left-panel">
            <div class="passage-title">Jessica Hail – Comedian</div>
            <div id="reading-container"></div>
            <div class="glossary-box">
                <div class="glossary-title">📚 Glossary (Từ vựng B1-C2)</div>
                <table class="glossary-table" id="glossary-table">
                    <thead><tr><th>Vocabulary</th><th>Part of Speech</th><th>Vietnamese Meaning</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div class="panel" id="right-panel">
            <div id="quiz-container"></div>
        </div>
    </div>

    <div class="modal-overlay" id="result-modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-title">Làm tốt lắm!</div>
            <div class="modal-score" id="modal-score">0/5</div>
            <div class="modal-message" id="modal-message">Tuyệt vời, bạn đã hoàn thành bài thi!</div>
            <button class="btn btn-submit" onclick="closeModal()">Xem lại đáp án</button>
        </div>
    </div>

    <script>
        function initBackground() {
            const svgContent = `
                <svg xmlns='http://www.w3.org/2000/svg' width='250' height='250'>
                    <text x='20' y='40' font-size='35' opacity='0.5'>🎭</text>
                    <text x='150' y='80' font-size='40' opacity='0.4'>😂</text>
                    <text x='50' y='160' font-size='30' opacity='0.5'>🎤</text>
                    <text x='180' y='190' font-size='25' opacity='0.6'>🌟</text>
                    <text x='100' y='120' font-size='35' opacity='0.4'>🎬</text>
                </svg>
            `;
            const encodedSVG = encodeURIComponent(svgContent).replace(/'/g, "%27").replace(/"/g, "%22");
            document.getElementById('bg-pattern').style.backgroundImage = `url("data:image/svg+xml;utf8,${encodedSVG}")`;
        }

        const passages = [
            {
                en: "I’ve always enjoyed performing and making people laugh. When I was at school, I used to annoy some of my teachers as I was always telling jokes in class. All my classmates used to laugh a lot and I had a great time.",
                vi: "Tôi luôn thích biểu diễn và làm cho mọi người cười. Khi còn ở trường, tôi từng làm phiền một số giáo viên của mình vì tôi luôn kể chuyện cười trong lớp. Tất cả bạn cùng lớp của tôi thường cười rất nhiều và tôi đã có một khoảng thời gian tuyệt vời."
            },
            {
                en: "When I left school, I got a job in a fast food restaurant during the day and took acting classes in the evening. I also started performing in theatres at the weekends. Sometimes the audience loved me, but other times nobody laughed at my jokes. That was the worst feeling in the world.",
                vi: "Khi rời ghế nhà trường, tôi kiếm được một công việc tại một nhà hàng thức ăn nhanh vào ban ngày và tham gia các lớp học diễn xuất vào ban đêm. Tôi cũng bắt đầu biểu diễn ở các nhà hát vào cuối tuần. Đôi khi khán giả rất yêu mến tôi, nhưng những lúc khác lại không ai cười trước những câu nói đùa của tôi. Đó là cảm giác tồi tệ nhất trên đời."
            },
            {
                en: "After two or three years, I appeared on TV a few times and became better known. I finally got a part in a TV comedy show and I’ve worked on TV ever since. I still do theatre work, and although it’s harder than being on TV, I enjoy it much more. During those years when I performed in theatres, I learned so much. It was great to start performing while I was still young. It gave me a lot of experience and it helped me become confident on stage.",
                vi: "Sau hai hoặc ba năm, tôi đã xuất hiện trên TV một vài lần và trở nên nổi tiếng hơn. Cuối cùng, tôi nhận được một vai diễn trong một chương trình hài kịch trên TV và tôi đã làm việc trên TV kể từ đó. Tôi vẫn tham gia diễn kịch, và mặc dù nó khó hơn làm việc trên TV, tôi lại thích nó hơn nhiều. Trong những năm tháng biểu diễn ở nhà hát, tôi đã học được rất nhiều điều. Thật tuyệt khi bắt đầu biểu diễn khi tôi còn trẻ. Nó mang lại cho tôi rất nhiều kinh nghiệm và giúp tôi trở nên tự tin trên sân khấu."
            },
            {
                en: "It isn’t easy to keep on being successful because it’s so difficult trying to think of new ideas all the time. When I can’t think of anything to write about, I get very miserable. Then I usually go for a walk. Walking is a great way to relax and it also helps you to think. I can go out for a walk in the morning with no ideas in my head. When I return, my head is full of them and I can’t wait to write them down!",
                vi: "Thật không dễ dàng để tiếp tục thành công bởi vì việc luôn phải cố gắng nghĩ ra những ý tưởng mới là rất khó khăn. Khi tôi không thể nghĩ ra điều gì để viết, tôi cảm thấy rất khốn khổ. Khi đó, tôi thường đi dạo. Đi dạo là một cách tuyệt vời để thư giãn và nó cũng giúp bạn suy nghĩ thông suốt. Tôi có thể ra ngoài đi dạo vào buổi sáng với một cái đầu trống rỗng không có ý tưởng nào. Khi tôi trở về, đầu tôi tràn ngập những ý tưởng và tôi nóng lòng muốn viết chúng ra ngay!"
            },
            {
                en: "As well as walking, mountain climbing and diving help me to relax, too. I’m planning a climbing trip to Nepal soon, which I’m really looking forward to! I’m sure I’ll come back with a lot of new jokes and ideas. Inspiration is very important in my profession. If I’m inspired, I can create new performances and make people laugh out loud! It’s fantastic. I think comedy is the cure for many things. It can take away your worries and help you relax.",
                vi: "Cũng như đi dạo, leo núi và lặn cũng giúp tôi thư giãn. Tôi đang lên kế hoạch cho một chuyến leo núi đến Nepal sắp tới, điều mà tôi đang rất mong đợi! Tôi chắc chắn rằng mình sẽ trở về với rất nhiều câu chuyện cười và ý tưởng mới. Nguồn cảm hứng là rất quan trọng trong nghề nghiệp của tôi. Nếu tôi có cảm hứng, tôi có thể tạo ra những màn biểu diễn mới và khiến mọi người cười phá lên! Thật tuyệt vời. Tôi nghĩ hài kịch là liều thuốc cho nhiều thứ. Nó có thể xua tan những lo lắng của bạn và giúp bạn thư giãn."
            }
        ];

        const glossary = [
            { word: "perform", pos: "v", vi: "biểu diễn" },
            { word: "audience", pos: "n", vi: "khán giả" },
            { word: "confident", pos: "adj", vi: "tự tin" },
            { word: "successful", pos: "adj", vi: "thành công" },
            { word: "miserable", pos: "adj", vi: "khốn khổ, buồn bã" },
            { word: "experience", pos: "n", vi: "kinh nghiệm" },
            { word: "look forward to", pos: "v", vi: "mong đợi" },
            { word: "inspiration", pos: "n", vi: "nguồn cảm hứng" },
            { word: "profession", pos: "n", vi: "nghề nghiệp" },
            { word: "cure", pos: "n", vi: "liều thuốc, cách chữa trị" }
        ];

        // MỚI: DỮ LIỆU GIẢI THÍCH ĐƯỢC VIẾT LẠI HOÀN TOÀN, ĐẢM BẢO KHỚP TỪNG CHỮ
        const questionsData = [
            {
                id: 1,
                question: "1. What does Jessica say about her life at school?",
                options: [
                    { text: "Her friends were very funny.", isCorrect: false },
                    { text: "She enjoyed performing for her classmates.", isCorrect: true },
                    { text: "She disliked the teachers.", isCorrect: false },
                    { text: "Her jokes were bad.", isCorrect: false }
                ],
                fullExplanation: `
                    <div class="exp-section">
                        <strong>Dịch câu hỏi:</strong> Jessica nói gì về cuộc sống của cô ấy ở trường?
                    </div>
                    <div class="exp-section">
                        <strong>Phân tích 4 đáp án:</strong><br>
                        A. <em>Her friends were very funny. (Bạn bè cô ấy rất hài hước.)</em> ❌ <strong>Sai</strong> vì cô ấy mới là người kể chuyện cười, không phải bạn bè.<br>
                        B. <em>She enjoyed performing for her classmates. (Cô ấy thích biểu diễn cho các bạn cùng lớp xem.)</em> ✅ <strong>Đúng</strong>.<br>
                        C. <em>She disliked the teachers. (Cô ấy không thích giáo viên.)</em> ❌ <strong>Sai</strong> vì cô ấy chỉ làm phiền (annoy) giáo viên chứ không nói là ghét (dislike).<br>
                        D. <em>Her jokes were bad. (Những câu chuyện cười của cô ấy rất tệ.)</em> ❌ <strong>Sai</strong> vì bạn bè đã cười rất nhiều.
                    </div>
                    <div class="exp-evidence">
                        <strong>🔍 Dẫn chứng trong bài (Đoạn 1):</strong><br>
                        "All my classmates used to laugh a lot and I had a great time."<br>
                        👉 <strong>Dịch:</strong> "Tất cả bạn cùng lớp của tôi thường cười rất nhiều và tôi đã có một khoảng thời gian tuyệt vời."<br><br>
                        <span style="color: red; font-weight: bold;">Cụm từ "had a great time" (có khoảng thời gian tuyệt vời) bằng nghĩa với "enjoyed" (thích thú/tận hưởng việc biểu diễn cho bạn bè).</span>
                    </div>
                `
            },
            {
                id: 2,
                question: "2. What did Jessica do when she left school?",
                options: [
                    { text: "She trained to be a teacher.", isCorrect: false },
                    { text: "She started performing in a restaurant.", isCorrect: false },
                    { text: "She got a job and studied acting.", isCorrect: true },
                    { text: "She got a job in a theatre.", isCorrect: false }
                ],
                fullExplanation: `
                    <div class="exp-section">
                        <strong>Dịch câu hỏi:</strong> Jessica đã làm gì khi rời ghế nhà trường?
                    </div>
                    <div class="exp-section">
                        <strong>Phân tích 4 đáp án:</strong><br>
                        A. <em>She trained to be a teacher. (Cô ấy học để trở thành giáo viên.)</em> ❌ <strong>Sai</strong>.<br>
                        B. <em>She started performing in a restaurant. (Cô ấy bắt đầu biểu diễn ở nhà hàng.)</em> ❌ <strong>Sai</strong> vì cô ấy làm phục vụ nhà hàng, biểu diễn ở nhà hát.<br>
                        C. <em>She got a job and studied acting. (Cô ấy kiếm được việc làm và học diễn xuất.)</em> ✅ <strong>Đúng</strong>.<br>
                        D. <em>She got a job in a theatre. (Cô ấy kiếm được công việc ở nhà hát.)</em> ❌ <strong>Sai</strong> vì công việc ban ngày là ở nhà hàng thức ăn nhanh.
                    </div>
                    <div class="exp-evidence">
                        <strong>🔍 Dẫn chứng trong bài (Đoạn 2):</strong><br>
                        "When I left school, I got a job in a fast food restaurant during the day and took acting classes in the evening."<br>
                        👉 <strong>Dịch:</strong> "Khi rời ghế nhà trường, tôi kiếm được một công việc tại một nhà hàng thức ăn nhanh vào ban ngày (got a job) và tham gia các lớp học diễn xuất vào ban đêm (studied acting)."<br><br>
                        <span style="color: red; font-weight: bold;">Đáp án C miêu tả chính xác 2 hành động: Kiếm việc (nhà hàng) và Học diễn xuất (lớp học buổi tối).</span>
                    </div>
                `
            },
            {
                id: 3,
                question: "3. What does she say about her working life?",
                options: [
                    { text: "People have always enjoyed her performances.", isCorrect: false },
                    { text: "Being on TV is the most difficult thing she’s done.", isCorrect: false },
                    { text: "Her first job was in a theatre.", isCorrect: false },
                    { text: "She’s worked in a variety of places.", isCorrect: true }
                ],
                fullExplanation: `
                    <div class="exp-section">
                        <strong>Dịch câu hỏi:</strong> Cô ấy nói gì về cuộc sống làm việc của mình?
                    </div>
                    <div class="exp-section">
                        <strong>Phân tích 4 đáp án:</strong><br>
                        A. <em>People have always enjoyed her performances. (Mọi người LUÔN LUÔN thích màn trình diễn của cô ấy.)</em> ❌ <strong>Sai</strong> vì có những lúc "nobody laughed" (không ai cười).<br>
                        B. <em>Being on TV is the most difficult thing she’s done. (Lên TV là việc khó nhất cô từng làm.)</em> ❌ <strong>Sai</strong> vì cô nói làm ở nhà hát khó hơn lên TV.<br>
                        C. <em>Her first job was in a theatre. (Công việc đầu tiên là ở nhà hát.)</em> ❌ <strong>Sai</strong> vì việc đầu tiên là ở nhà hàng thức ăn nhanh.<br>
                        D. <em>She’s worked in a variety of places. (Cô ấy đã làm việc ở nhiều nơi khác nhau.)</em> ✅ <strong>Đúng</strong>.
                    </div>
                    <div class="exp-evidence">
                        <strong>🔍 Dẫn chứng trong bài:</strong><br>
                        👉 <strong>Dịch khái quát:</strong> Xuyên suốt bài đọc, tác giả kể rằng mình đã làm việc ở <span style="color: red; font-weight: bold;">nhà hàng thức ăn nhanh (fast food restaurant)</span>, sau đó biểu diễn ở <span style="color: red; font-weight: bold;">nhà hát (theatres)</span>, và cuối cùng là làm việc <span style="color: red; font-weight: bold;">trên truyền hình (on TV)</span>.<br><br>
                        <span style="color: red; font-weight: bold;">Điều này hoàn toàn khớp với đáp án D: "a variety of places" (nhiều nơi đa dạng).</span>
                    </div>
                `
            },
            {
                id: 4,
                question: "4. Why does Jessica like walking?",
                options: [
                    { text: "It makes her laugh.", isCorrect: false },
                    { text: "It helps her to get ideas.", isCorrect: true },
                    { text: "It takes away her worries.", isCorrect: false },
                    { text: "It allows her to empty her mind.", isCorrect: false }
                ],
                fullExplanation: `
                    <div class="exp-section">
                        <strong>Dịch câu hỏi:</strong> Tại sao Jessica thích đi dạo?
                    </div>
                    <div class="exp-section">
                        <strong>Phân tích 4 đáp án:</strong><br>
                        A. <em>It makes her laugh. (Nó khiến cô ấy cười.)</em> ❌ <strong>Sai</strong>.<br>
                        B. <em>It helps her to get ideas. (Nó giúp cô ấy có ý tưởng.)</em> ✅ <strong>Đúng</strong>.<br>
                        C. <em>It takes away her worries. (Nó xua tan lo lắng của cô.)</em> ❌ <strong>Sai</strong> vì theo bài, "hài kịch" (comedy) mới là thứ xua tan lo lắng.<br>
                        D. <em>It allows her to empty her mind. (Nó cho phép cô làm trống rỗng tâm trí.)</em> ❌ <strong>Sai</strong> vì mục đích của việc đi bộ là LẤP ĐẦY tâm trí bằng ý tưởng.
                    </div>
                    <div class="exp-evidence">
                        <strong>🔍 Dẫn chứng trong bài (Đoạn 4):</strong><br>
                        "I can go out for a walk in the morning with no ideas in my head. When I return, my head is full of them..."<br>
                        👉 <strong>Dịch:</strong> "Tôi có thể ra ngoài đi dạo vào buổi sáng với một cái đầu không có ý tưởng nào. Khi tôi trở về, đầu tôi tràn ngập chúng (những ý tưởng)..."<br><br>
                        <span style="color: red; font-weight: bold;">=> Việc đi bộ giúp cô tìm thấy (get) những ý tưởng (ideas) mới.</span>
                    </div>
                `
            },
            {
                id: 5,
                question: "5. Which of the following is the best description of the writer?",
                options: [
                    { text: "The comedian who never stops laughing herself.", isCorrect: false },
                    { text: "The funny person who loves her work but never has time to relax.", isCorrect: false },
                    { text: "The successful comedian who is always looking for new ideas.", isCorrect: true },
                    { text: "The popular star who loves being on TV more than anything else.", isCorrect: false }
                ],
                fullExplanation: `
                    <div class="exp-section">
                        <strong>Dịch câu hỏi:</strong> Câu nào dưới đây mô tả đúng nhất về tác giả?
                    </div>
                    <div class="exp-section">
                        <strong>Phân tích 4 đáp án:</strong><br>
                        A. <em>The comedian who never stops laughing herself. (Diễn viên hài không bao giờ ngừng cười.)</em> ❌ <strong>Sai</strong> vì cô ấy cũng có lúc thấy "miserable" (khốn khổ).<br>
                        B. <em>The funny person who loves her work but never has time to relax. (Người vui vẻ yêu công việc nhưng không bao giờ có thời gian thư giãn.)</em> ❌ <strong>Sai</strong> vì cô ấy có thời gian đi dạo, lặn, leo núi.<br>
                        C. <em>The successful comedian who is always looking for new ideas. (Diễn viên hài thành công luôn tìm kiếm ý tưởng mới.)</em> ✅ <strong>Đúng</strong>.<br>
                        D. <em>The popular star who loves being on TV more than anything else. (Ngôi sao nổi tiếng thích lên TV hơn bất cứ điều gì.)</em> ❌ <strong>Sai</strong> vì cô ấy nói thích làm ở nhà hát HƠN (enjoy it much more).
                    </div>
                    <div class="exp-evidence">
                        <strong>🔍 Dẫn chứng trong bài (Đoạn 4):</strong><br>
                        "It isn’t easy to keep on being successful because it’s so difficult trying to think of new ideas all the time."<br>
                        👉 <strong>Dịch:</strong> "Thật không dễ dàng để tiếp tục thành công bởi vì việc luôn phải cố gắng nghĩ ra những ý tưởng mới là rất khó khăn."<br><br>
                        <span style="color: red; font-weight: bold;">Câu văn này tóm gọn chân dung tác giả: Một người đã THÀNH CÔNG (successful) nhưng luôn phải trăn trở đi tìm Ý TƯỞNG MỚI (new ideas).</span>
                    </div>
                `
            }
        ];

        let audioCtx; let score = 0; let answeredQuestions = new Set();
        let timerInterval; let timeLeft = 600; let isTimerRunning = false; let timerStarted = false;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playCorrectSound() {
            initAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
        function playWrongSound() {
            initAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function renderPassages() {
            const container = document.getElementById('reading-container');
            passages.forEach((p, index) => {
                const box = document.createElement('div'); box.className = 'paragraph-box';
                box.innerHTML = `<div class="paragraph-text">${p.en}</div><button class="btn btn-translate" onclick="toggleTranslation(${index})">Mở dịch đoạn này 🌟</button><div class="translation-text" id="trans-${index}"><strong>Bản dịch:</strong><br>${p.vi}</div>`;
                container.appendChild(box);
            });
        }
        function toggleTranslation(index) { const el = document.getElementById(`trans-${index}`); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
        
        function renderGlossary() {
            const tbody = document.querySelector('#glossary-table tbody');
            glossary.forEach(g => {
                const tr = document.createElement('tr'); tr.innerHTML = `<td><strong>${g.word}</strong></td><td><em>${g.pos}</em></td><td>${g.vi}</td>`;
                tbody.appendChild(tr);
            });
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questionsData.forEach((q, qIndex) => {
                const card = document.createElement('div'); card.className = 'question-card'; card.id = `qcard-${q.id}`;
                const shuffledOptions = shuffleArray([...q.options]);
                let optionsHTML = '<div class="options-grid">';
                const letters = ['A', 'B', 'C', 'D'];
                shuffledOptions.forEach((opt, oIndex) => {
                    const btnId = `btn-${q.id}-${oIndex}`;
                    optionsHTML += `<button class="btn option-btn" id="${btnId}" onclick="handleAnswer(${q.id}, ${oIndex}, ${opt.isCorrect}, '${btnId}')"><strong>${letters[oIndex]}.</strong> &nbsp; ${opt.text}</button>`;
                });
                optionsHTML += '</div>';
                card.innerHTML = `<div class="question-text">${q.question}</div>${optionsHTML}<div class="explanation-box" id="exp-${q.id}">${q.fullExplanation}</div>`;
                container.appendChild(card);
            });
        }

        function handleAnswer(qId, oIndex, isCorrect, btnId) {
            if (answeredQuestions.has(qId)) return;
            answeredQuestions.add(qId); initAudio();
            const card = document.getElementById(`qcard-${qId}`); const buttons = card.querySelectorAll('.option-btn');
            const clickedBtn = document.getElementById(btnId); const expBox = document.getElementById(`exp-${qId}`);
            buttons.forEach(btn => btn.classList.add('disabled'));
            if (isCorrect) { clickedBtn.classList.add('correct'); playCorrectSound(); score++; } 
            else {
                clickedBtn.classList.add('wrong'); playWrongSound();
                const correctText = questionsData.find(q => q.id === qId).options.find(o => o.isCorrect).text;
                buttons.forEach(btn => { if (btn.innerText.includes(correctText)) btn.classList.add('correct'); });
            }
            expBox.style.display = 'block';
        }

        function toggleTimer() {
            initAudio(); const btn = document.getElementById('btn-timer-toggle');
            if (!timerStarted) { timerStarted = true; isTimerRunning = true; btn.innerText = "TẠM DỪNG ⏸️"; btn.style.background = "#FFB6C1"; btn.style.boxShadow = "0 4px 0 #D1949F"; timerInterval = setInterval(updateTimer, 1000); } 
            else {
                if (isTimerRunning) { isTimerRunning = false; clearInterval(timerInterval); btn.innerText = "TIẾP TỤC ▶️"; btn.style.background = "var(--accent3)"; btn.style.boxShadow = "0 4px 0 #008CB8"; } 
                else { isTimerRunning = true; btn.innerText = "TẠM DỪNG ⏸️"; btn.style.background = "#FFB6C1"; btn.style.boxShadow = "0 4px 0 #D1949F"; timerInterval = setInterval(updateTimer, 1000); }
            }
        }
        function updateTimer() {
            if (timeLeft > 0) { timeLeft--; const m = Math.floor(timeLeft / 60).toString().padStart(2, '0'); const s = (timeLeft % 60).toString().padStart(2, '0'); document.getElementById('timer-display').innerText = `${m}:${s}`; } 
            else { clearInterval(timerInterval); isTimerRunning = false; alert("Đã hết giờ làm bài..."); document.getElementById('btn-timer-toggle').innerText = "HẾT GIỜ"; document.getElementById('btn-timer-toggle').classList.add('disabled'); }
        }

        function submitTest() {
            clearInterval(timerInterval); const total = questionsData.length;
            const modal = document.getElementById('result-modal'); const titleEl = document.getElementById('modal-title');
            const scoreEl = document.getElementById('modal-score'); const msgEl = document.getElementById('modal-message');
            scoreEl.innerText = `${score}/${total}`;
            if (score === total) { titleEl.innerText = "Ngôi sao hài kịch! 🏆"; msgEl.innerText = "Xuất sắc tuyệt đối!"; startConfettiLoop(); playCorrectSound(); setTimeout(playCorrectSound, 200); } 
            else if (score >= total - 2) { titleEl.innerText = "Làm tốt lắm! 🌟"; msgEl.innerText = "Kiến thức của bạn rất vững."; startConfettiLoop(); playCorrectSound(); } 
            else { titleEl.innerText = "Cố lên nhé! 💪"; msgEl.innerText = "Hãy đọc kỹ phần giải thích chi tiết màu đỏ để hiểu rõ hơn nha."; }
            modal.style.display = 'flex';
        }
        function closeModal() { document.getElementById('result-modal').style.display = 'none'; stopConfettiLoop(); }

        let confettiParticles = []; let confettiCtx; let animationId;
        function startConfettiLoop() {
            const canvas = document.getElementById('confetti-canvas'); confettiCtx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<150; i++) confettiParticles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height, w: Math.random() * 12 + 6, h: Math.random() * 12 + 6, c: ['#FEE440', '#F15BB5', '#9B5DE5', '#00BBF9', '#00D26A'][Math.floor(Math.random()*5)], v: Math.random() * 6 + 2, r: Math.random() * 360 });
            renderConfetti();
        }
        function renderConfetti() {
            confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            confettiParticles.forEach(p => {
                p.y += p.v; p.r += 2; if(p.y > window.innerHeight) p.y = -10;
                confettiCtx.save(); confettiCtx.translate(p.x, p.y); confettiCtx.rotate(p.r * Math.PI / 180);
                confettiCtx.fillStyle = p.c; confettiCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h); confettiCtx.restore();
            });
            animationId = requestAnimationFrame(renderConfetti);
        }
        function stopConfettiLoop() { cancelAnimationFrame(animationId); if(confettiCtx) confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight); confettiParticles = []; }

        window.onload = () => { initBackground(); renderPassages(); renderGlossary(); renderQuiz(); };
        window.addEventListener('resize', () => { const canvas = document.getElementById('confetti-canvas'); if (canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } });
    </script>
